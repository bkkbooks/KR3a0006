  - {type: variant, offset: 105, length: 689, content: 聖人絕而不言孔子曰言忠信行篤敬雖蠻貊之邦不可棄也今萬方絕國之君奉贄獻者懷天子之盛德而欲觀中國之禮儀故設明堂辟雍以示之揚干戚昭雅頌以風之今乃以玩好不用之器奇蟲不畜之獸角抵諸戲炫燿之物陳夸之殆與周公之待遠方殊也昔周公處謙讓以交卑士執禮德以下天下故辭越裳之贄見恭讓之禮也既與入文王之廟是見大孝之禮也目覩威儀干戚之容耳聽清歌雅頌之聲心充至德欣然以歸此四夷所以慕義內附非重譯狄鞮來觀猛獸熊羆也夫犀象兕虎南夷之所多也騾驢馲駞北狄之常畜也中國所鮮外國賤之南越以孔雀珥門戶崑山之旁以玉璞抵烏鵲今貴人之所賤珍人之所饒非所以厚中國而明盛德也隋和世之名寶也而不能安危存亡故喻德示威惟賢臣良相不在犬馬珍怪也是以聖王以賢為寶不以珠玉為寶昔晏子修之罇俎之間而折衝乎千里不能者雖隋和滿篋無益於存亡矣大夫曰晏子相齊三君崔慶無道劫其君亂其國靈公國圍莊公弒死景公之時晉人來攻取垂都舉臨菑邊邑削城郭焚宮室隳寶器盡何衝之所能折乎由此觀之賢良所言賢人為寶則損益無輕重也賢良曰管仲去魯入齊齊霸魯削非持其眾而歸齊也伍子胥挾弓干闔閭破楚入郢非負其兵而適吳也故賢者所在國重所去國輕楚有子玉得臣文公側席虞有宮之奇晉獻不寐夫賢臣所在辟除開塞者亦遠矣故春秋曰山有虎豹葵藿為之不採國有賢士邊境為之不害也備胡第三十八大夫曰鄙語曰賢者容不辱以世俗言之鄉曲有桀人尚辟之今明天子在上匈奴公為寇侵擾邊境是仁義犯而藜藿採昔狄人侵太王匡人畏孔子故不仁者仁之賊也是以縣官厲武以討不義設機械以備不仁賢良曰匈奴處沙漠之中生不食之地天所賤而棄之無壇宇之居男女之別以廣野為閭里以穹廬為家室衣皮蒙毛食肉飲血會市行牧豎居如中國之麋鹿耳好事之臣求其義責之禮使中國干戈, SBCK: ''}
