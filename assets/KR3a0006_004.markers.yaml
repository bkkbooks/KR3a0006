  - {type: variant, offset: 2584, length: 264, content: 擇醜好鄭嫗不擇遠近商人不媿恥辱戎士不愛死力士不在親事君不避其難皆為利祿也儒墨內貪外矜往來游說栖栖然亦未為得也故尊榮者士之願也富貴者士之期也方李斯在荀卿之門闒茸與之齊軫及其奮翼高舉龍昇驥騖過九軼二翱翔萬仞鴻鵠華騮且同侶況跛牂燕雀之屬乎席天下之權御宇內之眾後車百乘食祿萬鍾而拘儒布褐不完糟糠不飽非甘菽藿而卑廣廈亦不能得已雖欲嚇人其何已乎文學曰君子懷德小人懷土賢士徇名貪夫死利李斯貪其所欲致其所惡孫叔敖早見於未萌三去相而不悔非樂卑賤而惡重祿也慮患遠而避害謹也夫郊祭之牛養食朞年衣之文繡以入廟堂太宰執其鸞刀以啟其毛方此之時願任重而上峻坂, WYG: 聞無乃}
