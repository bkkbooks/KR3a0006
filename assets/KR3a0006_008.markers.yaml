  - {type: variant, offset: 1253, length: 3, content: 蠶食內, WYG: 未臣雖無事欲釋備如之何賢良曰吳王所以見禽於越者以其越近而陵逺也秦所以亡者以外備胡越而内亡其政也夫音扶用軍於外政敗於内備為所患增主所憂詩序曰文武以天保以上治内采薇以下治外始於憂勤終于逸樂指武篇曰内治未得不可以正外本惠未襲不可以制末是以春秋先京師而後諸夏先諸茟而後夷狄及周惠王以遭亂世繼先王之體而強楚稱王諸侯背叛欲申先王之命一統天下不先廣養京師以及諸夏諸夏以及夷狄内治未得忿則不料力權得失興兵而征強楚師大敗樽辱不行大為天下戮笑幸逢齊桓公以得安尊故内治未得不可以正外本惠未襲不可以制末故人主得其道則遐邇潜行而歸之文王是也不得其道則臣妾為冦秦王是也詮言曰用兵者先為不可勝以待敵之可勝也治國者先為不可奪以待敵之可奪也舜修之歴山而海内從化文王修之岐周而天下從風兵略曰兵之勝敗本在於政政勝其民下附其上則兵强矣民勝其政下畔其上則兵弱矣故徳義足以懐天下之民事業足以當天下之急選舉足以得賢士之心謀慮足以知強弱之勢此必勝之本也地廣人衆不足以為強堅甲利兵不足以為勝髙城深池不足以為固嚴令繁刑不足以為威為存政者雖小必存為亡政者雖大必亡叢談曰所伐而當其福五之所伐不當其禍十之夫音扶文衰則武勝徳盛則備寡汜論曰一世之間而文武代為雌雄有時而用也今世之為武者則非文也為文者則非武也文武更相非而不知時世之用也此見隅曲之一指而不知八極之廣大也故東面而望不見西牆南面而視不覩北方唯無所嚮者則無所不通大夫曰徃者四夷俱强並為冦虐朝鮮踰徼刼燕之東地東越東海略浙江之南南越内}
