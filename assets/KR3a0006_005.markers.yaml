  - {type: variant, offset: 1371, length: 0, content: '', WYG: 袁盎傳曰袁盎楚人也字􅁝父故為羣盗徙處安陵髙后時盎嘗為吕禄舍人及孝文帝即位盎兄噲任盎為中郎綘侯為丞相朝罷趨出意得甚上禮之恭嘗目送之盎進曰陛下以丞相何如人上曰社稷臣盎曰絳侯所謂功臣非社稷臣社稷臣主在與在主亡與亡方吕后時諸吕用事擅相王劉氏不絶如帶是時絳侯為太尉主兵柄弗能正吕后崩大臣相與共畔諸吕太尉主兵適㑹其成功所謂功臣非社稷臣丞相如有驕主色陛下謙讓臣主失禮竊為陛下不取也後朝上益莊丞相益畏已而絳侯望袁盎曰吾與而兄善今兒廷毁我盎遂不謝及絳侯免相之國國人上書告以為反徴繫請室宗室諸公莫敢為言唯袁盎明綘侯無罪綘侯得釋盎頗有力綘侯乃大與盎結交}
