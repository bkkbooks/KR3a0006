body:
  text: 刺議第二十六丞相史曰山林不讓椒桂以成其崇君子不辭􅀒薪之言以廣其名故多見者􅀶多聞者知距諫者塞專巳者􅀌故謀及下者無失䇿舉及衆者無頓功詩云詢于蒭蕘故布衣皆得風議何况公卿之史乎春秋士不載文而書咺者以爲宰士也孔子曰雖不吾以吾其與聞諸侯僕雖不敏亦當傾耳下風攝齊勾指受業徑於君子之塗矣使文學言之而是僕之言有何害使文學言之而非雖㣲丞相史孰不非也文學曰以正輔人謂之忠以邪􅋚人謂之佞夫怫過納善者君之忠臣大夫之直士也孔子曰大夫有爭臣三人雖無道不失其家今子處宰士之列無忠正之心枉不能正邪不能匡順流以容身從風以說上上所古則苟聽上所行則曲從􅀂影之隨形響之於聲終無所月非衣儒衣冠儒冠而不能行其道非其儒也譬􅀂土龍文章首目具而非龍也葶歴似菜而味殊玉石相似而異􅀋子非孔氏執經守道之儒乃公卿靣從之儒非吾徒也冉有爲季氏宰而附益之孔子曰小子鳴鼓而攻之可也故輔桀者不爲智爲桀歛者不爲仁氶相史默然不對利議第二十七大夫曰作世明主憂勞萬人思念北邉之未安故使使者舉賢良文學高弟詳延有道之士將欲觀殊議異䇿虚心傾耳以聽庻幾云得諸生無能岀竒計遠圖匈奴安邉境之䇿明枯竹守空言不知趨舍之宜時世之變議論無所依如􅂰癢而搔背辯訟公門之下訩訩不可勝聽如品即口以成事此豈明主所欲聞哉文學曰諸生對􅁽殊路同歸指在於崇禮義退財利復往古之道匡當世之失莫不云太平雖未盡可亶用宜略有可行者焉執事闇於明禮而喻於利末沮事隳議計慮籌䇿以故至今未決非儒無成事公卿欲成也大夫曰色厲而内荏亂真者也文表而柔裏亂實也文學裒衣􅀶帶竊周公之服鞠躬踧踖竊仲尼之容議論稱誦竊商賜之辭刺譏言治過管晏之才心卑卿相志小萬乗及授之政昏亂不治故以言舉人􅀂以毛相馬此其所以多不稱舉詔䇿曰朕嘉宇内之士故詳延四方豪俊文學􅀶習之士趨遷官禄言者不必有德何者言之易而行之難有舍其車而識其牛貴其不言而多成事也吳鐸以其舌自破主父􅅯以其舌自殺鶡鴠夜鳴無益於明主父鳴鴟無益於死非有司欲成利文學桎梏於舊術牽於間言者也文學曰能言之能行之者湯武也能言不能行者有司也文學竊周公之服有司竊周公之位文學桎梏於舊術有司桎梏於財利主父􅅯以舌自殺有司以利自困夫驥之才千里非造父不能使禹之知萬人非舜爲相不能用故季􅁊子􅃪政栁下惠忽然不見孔子爲司冦然後悖熾驥舉之在伯樂其功在造父造父攝轡馬無駑良皆可取道周公之時士無賢不肖皆可與言至治故御之良者善調馬相之賢者善使士今舉異才而使減騶御之是猶枙驥鹽車而使責之疾此賢良文學多不稱舉也大夫曰嘻諸生闒茸無行多言而不用情貌不相副􅀂穿踰之盜自古而患之是孔丘斥逐於魯君曽不用於世也何者以其首攝多端迂時而不要也故秦王燔去其術而不行坑之渭中而不用乃安得鼓口舌申顔眉預前論議是非國家之事也國病第二十八文學曰國有賢士而不用非士之過有國者之耻孔子大聖也諸侯莫能用當小位於魯三月不令而行不禁而止沛􅀂時雨之灌萬物莫不興起也况乎位天下之本朝而施聖主之徳音教澤乎今公卿處尊位執天下之要十有餘年功德不施於天下而勤勞於百姓百姓貧陋困窮而私家累萬金此君子所耻而伐檀所刺也昔者商鞅相秦後禮讓先貪鄙尚首功務進取無德序於民而嚴刑罰於國俗日壞而民滋怨故惠王烹􅉁其身以謝天下當此之時亦不能論事矣今執政患儒貧賤而多言亦憂執事冨貴而多患也大夫視文學悒悒而不言也丞相史曰夫辯國家之政事論執政之得失何不徐徐道理相喻何至切切如此乎大夫難罷鹽鐡者非有利也憂國家之用邉境之費也諸生誾誾争鹽鐡亦非爲巳也欲反之於古而輔成仁義也二者各有所宗時世異務又安可堅任古術而非今之理也且夫小雅非人必有以易之諸生莫有能安集國中懷臧之來遠方使邉境無冦虜之災租稅盡爲諸生除之何况鹽鐡均輸乎所以貴術儒者貴其處謙推譲以道盡人今辯訟愕愕然無赤賜之辭而見鄙倍之色非所聞也大夫言過而諸生亦如之諸生不􅀡謝大夫耳賢良文學皆離席曰鄙人固陋希渉大庭狂言多不稱以逆執事夫藥酒苦於口利於病忠言逆於耳而利於行故愕愕者福也諓諓者賤也林中多疾風富貴多䛕言萬里之朝日聞唯唯而後聞諸生之愕愕此乃公卿之良藥鍼石大夫色少寛靣文學而蘇也賢良曰窮巷多曲辯而寡見者難喻文學守死渣滓之語而終不移夫往古之事昔有之語巳可覩矣今以近世觀之自以目有所見耳有所聞世殊而事異文景之際建元之始民朴而歸本吏廉而自重殷殷屯屯人􅄛而家富今政非改而敎非易也何世之彌薄而俗之滋衰也吏即少廉民即寡耻刑非誅惡而姦猶不止世人有言鄙儒不如都士文學皆岀山東希渉大論子大夫論京師之日乆顧分明政治識之事故所以然者也賢良曰夫山東天下之腹心賢士之戰塲也高皇帝龍飛鳳舉於宋楚之間山東子弟蕭曹樊酈􅅬灌之屬爲輔雖即異世亦旣閎夭太顚而巳禹岀西羗文王生北夷然聖德高世有萬人之才􅀒迭羣之任岀入都市一旦不知返數然後終於厮役而已僕雖不生長京師才駑下愚不足以大議竊所以聞閭里長老之言往者常民衣服温暖而不靡噐質朴牢而致用衣足以蔽體噐足以便事馬足以易歩車足以自載酒足以合歡而不湛樂足以理心而不淫入無宴樂之聞出無佚遊之觀行即􅀒羸止作鋤耘用約而財饒本修而民富送死哀而不華養生適而不奢大臣正而無欲執政寛而不苛故􅀺民寜其性百吏保其官建元始崇文修德天下乂安其後邪臣各以􅇊藝􅉛亂至治外障山海内興諸利楊可勝告緡江充禁服張大夫革令杜周治獄罰贖科適㣲細並行不可勝載夏蘭之屬妄􅅮王温舒之徒妄殺殘吏萠起擾亂良民當此之時百姓不保其首領豪富莫必其族姓聖主􅁴焉乃刑戮充等誅滅殘賊以殺死罪之怨塞天下之責故居民肆然復安然其禍累世不復瘡痍至今未息故百官尚有殘疾之政而强宰尚有强奪之心大臣擅權而斷擊豪猾多黨而侵陵富貴奢侈貧賤􅆲殺女工難成而易弊車器難就而易敗車不累朞器不終歳一車千石一衣十鍾常民文杯畫案几席緝􅗿婢妾衣紈􅂂􅁝匹庻粺飯肉食里有俗黨有塲康莊馳逐窮巷蹹鞠秉耒抱挿躬耕身織者寡娶要歛從容􅀓白黛靑者衆無而爲有貧而强夸文表無裏紈袴枲裝生不養死厚送葬死殫家遣女滿車冨者欲過貧者欲及富者空藏貧者稱貸是以民年急而歳促貧即寡耻乏即少廉此所以刑非誅惡而姦猶不止也故國有嚴不急之徴即生前不足疾矣鹽鐡論卷第五鹽鐡論卷第六散不足二十九救匱三十鹽鐡箴石三十一除狹三十二疾貪三十三後刑三十四授時三十五水旱三十六散不足第二十九大夫曰吾以賢良爲少愈乃反其幽明若胡車相隨而鳴諸生獨不見季夏之螇乎音聲入耳秋風至而聲無者生無易由言不顧其患患至而後黙晩矣賢良曰孔子讀史記喟然而歎傷正德之廢君臣之危也夫賢人君子以天下爲任者也任大者思逺思逺者忘近誠心閔悼惻􅀮加爾故忠心獨而無累此詩人所以傷而作比干子胥遺身忘禍也其惡勞人若斯之急安能黙乎詩云憂心如惔不敢戯談孔子栖栖疾固也墨子遑遑閔世也大夫黙然丞相曰願聞散不足賢良曰宮室輿馬衣服器械喪􅀕食飲聲色玩好人情之所不能巳也故聖人爲之制度以防之間者士大夫務於權利忌於禮義故百姓倣傚頗踰制度今故陳之曰古者􅂖物菜果不時不食鳥獸魚鼈不中殺不食故繳罔不入於澤雜毛不取今冨者逐驅殱罔􅆯掩捕麑鷇躭􅊺沉猶鋪百川鮮羔䍮􅶢胎扁皮黄口春鵝秋雛冬葵温非浚茈蓼蘇豐奕耳菜毛果蟲貉古者采椽茅茨陶桴復冗足禦寒暑蔽風雨而巳及其後世采椽不斵茅茨不剪無斵削之事磨礱之功大夫逹棱楹士潁首庻人斧成木構而巳今冨者井幹増梁雕文檻脩憂壁飾古者衣服不中制器械不中用不粥於市今民間雕琢不中之物刻畫無用之器玩好玄黄雜青五色繡衣􅃧弄蒲人雜婦百獸馬􅃧􅃲虎唐銻追人竒蟲胡妲古者諸侯不秣馬天子有命以車就牧庻人之乗者馬足以代其勞而巳故行則服枙止則就犂今冨者連車列􅀐驂貳輜軿中者微輿短轂煩尾掌蹄夫一馬伏􅇫當中家六口之食亡丁男一人之事古者庻人耋老而後衣絲其餘則麻枲而巳故命曰布衣及其後則絲裏枲表直領無禕􅂁合不縁夫羅紈文繡者人君后妃之服也繭紬縑練者㛰姻之嘉飾也是以文繒薄織不粥於市今冨者縟繡羅紈中者素綈錦冰常民而􅀍后妃之服褻人而居㛰姻之飾夫紈素之賈倍縑縑之用倍紈也古者椎車無柔棧輿無植及其後木軨不衣長轂數幅蒲薦苙蓋蓋無染絲之飾大夫士則單􅃨木具盤韋柔革常民染輿大軨蜀輪今庻人冨者銀黄華左搔結綏韜杠中者錯鏕塗采珥靳飛鈴古者鹿裘皮冐蹄足不去及其後大夫士􅈢貉縫腋羔麑豹祛庻人則毛絝衳彤樸羝皮􅀓今冨者鼯􅈢白鳬翥中者罽衣金縷燕䶅代黄古者庻人賤􅀐䋲控革鞮皮廌而巳及其後革鞍􅈊成鐡鑣不飾今冨者耳銀鑷黄金琅勒罽繡弇汙垂珥胡鮮中者染韋紹系采畫􅁀乾古者汗尊坏飮盖無爵觴樽爼及其後庻人器用即竹桞陶瓠而巳唯瑚璉觴豆而後彫文彤􅃮今冨者銀口黄耳金罍玉鍾中者舒玉紵器金錯蜀杯夫一文杯得銅杯十賈賤而用不殊箕子之譏始在天子今在匹夫古者燔􅁰食稗而熚豚以相饗其後鄕人飮酒老者重豆少者立食一醬一肉旅飮而巳及其後賔㛰相召則豆􅅅白飯綦膾熟肉今民間酒食殽旅重疊燔炙滿案臑鼈膾腥麑􅆑鶉鴳撜抅鮐醴醢醯衆物雜味古者庻人春夏耕耘秋冬收藏昏晨力作夜以繼日詩云晝爾于茅宵爾索綯亟其乗屋其始播百榖非膢臘不休息今賔昏酒食接連相因折醒什半棄事相隨慮無乏日古者庻人糲食藜藿非鄕飮酒膢臘􅀕祀無酒肉故諸侯無故不殺牛羊大夫士無故不殺犬豕今閭巷縣佰阡伯屠沽無故烹殺相聚野外􅀒粟而往挈肉而歸夫一豕之肉得中年之收十五斗粟當丁男半月之食古者庻人魚菽之􅀕春秋脩其祖祠士一廟大夫三以時有事于五祀盖無出門之􅀕今冨者析名嶽望山川椎牛擊皷􅃧倡儛像中者南居當路水上雲臺屠羊殺狗鼓瑟吹笙貧者鷄豕五芳衛保散臘傾盖社塲古者德行求福故􅀕祀而寛仁義求吉故卜筮而希今世俗寛於行而求於􅀑怠於禮而篤於􅀕嫚親而貴勢至妄而信日聽訑言而幸得出實物而享虚福古者君子夙夜孳孳思其德小人晨昏孜孜思其力故君子不素飡小人不空食世俗飾僞行詐爲民巫祝以取􅁵謝堅􅋕徤舌或以成業致冨故憚事之人釋本相學是以街巷有巫閭里有祝古者無杠樠之寢牀栘之案及其後世庻人即采木之杠葉華之樠士不斤成大夫葦莞而巳今冨者黼繡帷幄塗屏錯跗中者錦綈高張采畫丹􅃮古者皮毛草蓐無茵席之加旃蒻之羙及其後大夫士復薦草縁蒲平單莞庻人即草蓐索經單藺遽蒢而巳今冨者繡茵翟柔蒲子露林中者􅱽皮代􅏧闒坐平莞古者不粥絍不市食及其後則有屠沽沽酒市脯魚鹽而巳今熟食徧列殽施成市作業墮怠食必趣時楊豚韭􅆑狗䐲馬朘煎魚切肝羊淹雞寒蜩馬駱日蹇捕庸脯胹羔豆賜􅑹膹鴈􅅅自鮑甘瓠熱梁和炙古者土鼓􅒘枹擊木拊石以盡其歡及後卿大夫有管磬士有琴瑟往者民間酒㑹各以黨俗彈筝鼓􅇲而巳無要妙之音變羽之轉今冨者鍾鼓五樂歌兒數曹中者鳴竽調瑟鄭儛趙謳古者瓦棺容尸木板堲周足以收形骸藏髮齒而巳及其後桐棺不衣采椁不斵今冨者繡􅘘題湊中者梓棺楩椁貧者􅀞荒衣􅂁繒囊緹槖古者明器有形無實示民不用也及其後則有醯醢之藏桐馬偶人彌􅀕其物不備今厚資多藏噐用如生人郡國繇吏素桑楺偶車櫓輪匹夫無貌領桐人衣紈綈古者不封不樹反虞􅀕於寢無檀宇之居廟堂之位及其後則封之庻人之墳半仞其高可􅀮今冨者積土成山列樹成林臺榭連閣集觀増樓中者祠堂屏閤垣􅆣罘罳古者隣有䘮舂不相杵巷不歌謡孔子食於有䘮者之側未嘗飽也子於是日哭則不歌今俗因人之䘮以求酒肉幸與小坐而責辨歌舞俳優連􅀏伎戯古者男女之際尚矣嫁娶之服未之以記及虞夏之後盖表布内絲骨笄􅁚珥封君夫人加錦尚褧而巳今冨者皮衣朱貉繁路環佩中者長􅅂交禕璧端簮珥古者事生盡愛送死盡哀故聖人爲制節非虚加之今生不能致其愛敬死以奢侈相高雖無哀戚之心而厚葬重幣者則稱以為孝顯名立於世光榮著於俗故􅀺民相慕効至於發屋賣業古者夫婦之好一男一女而成家室之道及後士一妾大夫二諸侯有姪娣九女而巳今諸侯百數卿大夫十數中者侍御冨者盈室是以女或曠怨失時男或放死無匹古者凶年不備豐年補敗仍舊貫而不改作今工異變而吏殊心壞敗成功以匿􅍏意意極乎功業務存乎靣目積功以市譽不恤民之急田野不辟而飾亭落邑居丘墟而高其郭古者不以人力徇於禽獸不奪民財以養狗馬是以財􅄛而力有餘今猛獸竒蟲不可以耕耘而令當耕耘者養食之百姓或短褐不完而犬馬衣文繡􅀺民或糠糟不接而禽獸食肉古者人君敬事愛下使民以時天子以天下爲家臣妾各以其時供公職古今之通義也今縣官多畜奴婢坐稟衣食私作産業爲姦利力作不盡縣官失實百姓或無斗筲之儲官奴累百金􅀺民昏晨不釋事奴婢垂拱遨遊也古者親近而䟽逺貴所同而賤非􅀋不賞無功不養無用今蠻貊無功縣官居肆廣屋大第坐禀衣食百姓或旦暮不贍蠻夷或厭酒肉􅀺民泮汗力作今蠻夷交脛肆踞古者庻人鹿菲草芰縮絲尚韋而巳及其後則綦下不借鞔鞮革舄今冨者革中名工輕靡使容紈裏紃下越端縱縁中者鄧里間作蒯苴秦堅婢妾韋沓絲􅂂走者茸芰狗官古聖人勞躬養神節欲􅃴情尊天敬地􅂂德行仁是以上天歆焉永其世而豐其年故尭秀眉高彩享國百載及秦始皇覽怪迂信禨祥使盧生求羡門高徐市等入海求不死之藥當此之時燕齊之士釋鋤耒争言神仙方士於是趣咸陽者以千數言仙人食金飲珠然後壽與天地相保於是數巡狩五嶽濵海之館以求神仙􅅾萊之屬數幸之郡縣冨人以貲佐貧者築道旁其後小者亡逃大者藏匿吏捕索掣頓不以道理名宫之旁廬舍丘落無生苗立樹百姓離心怨思者十有半書曰享多儀儀不及物曰不享故聖人非仁義不載於巳非正道不禦於前是以先帝誅文成五利等宣帝建學官親近忠良欲以絶怪惡之端而昭至徳之塗也宫室奢侈林木之蠹也器械雕琢財用之蠹也衣服靡麗布帛之蠹也狗馬食人之食五榖之蠹也口腹從恣魚肉之蠹也用費不節府庫之蠹也漏積不禁田野之蠹也喪􅀕無度傷生之蠹也墮成變故傷功工商上通傷農故一杯棬用百人之力一屏風就萬人之功其爲害亦多矣目脩於五色耳營於五音體極輕薄口極􅅴脆功積於無用財盡於不急口腹不可爲多故國病聚不足即政怠人病聚不足則身危丞相曰治聚不足奈何救匱第三十賢良曰蓋橈枉者過直救文者以質昔者晏子相齊一􅈢裘三十載故民奢示之以儉民儉示之以禮方今公卿大夫子孫誠能節車輿適衣服躬親節儉率以敦朴罷園池損田宅内無事乎市列外無事乎山澤農夫有所施其功女工有所粥其業如是則氣脉和平無聚不足之病矣大夫曰孤子語孝躄者語杖貧者語仁賤者語治議不在巳者易稱從旁議者易是其當局則亂故公孫弘布􅀍倪寛練􅂁衣若僕妾食􅀂庸夫淮南逆於内蠻夷􅁀於外盗賊不爲禁奢侈不爲節􅀂疫歲之巫徒能鼓口耳何散不足之能治乎賢良曰高皇帝之時蕭曹為公􅅬灌之屬爲卿濟濟然斯則賢矣文景之際建元之始大臣尚有爭引守正之義自此之後多承意從欲少敢直言靣議而正刺因公而徇私故武安丞相訟園田爭曲直人主之前夫九層之臺一傾公輸子不能正本朝一邪伊望不能復故公孫丞相倪大夫側身行道分禄以養賢卑巳以下士功業顯立日力不足無行人子産之􅁇而葛繹彭侯之等隳壞其緒紕亂其紀毀其客館議堂以爲馬廐婦舍無養士之禮而尚驕矜之色廉耻陵遲而爭於利矣故良田廣宅民無所之不耻爲利者滿朝市列田畜者彌郡國横􅁀掣頓大第巨舍之旁道路且不通此固難醫而不可爲工大夫勃然作色黙而不應鹽鐡箴石第三十一丞相曰吾聞諸鄭長孫曰君子正顔色則遠􅁀嫚出辭氣則遠鄙倍矣故言可述行可則此有司夙昔所願覩也􅀂夫劒客論􅀶奕辯盛色而相蘇秦立權以不相假使有司不能取賢良之議而賢良文學被不遜之名竊爲諸生不取也公孫龍有言曰論之爲道辯故不可以不屬意屬意相寛相寛其歸爭爭而不讓則入於鄙今有司以不仁又蒙素飡無以更責雪耻矣縣官所招舉賢良文學而及親民偉仕亦未見其能用箴石而醫百姓之疾也賢良曰賈生有言曰懇言則辭淺而不入深言則逆耳而失指故曰談何容易談且不易而况行之乎此胡建所以不得其死而吳得幾不免於患也語曰五盜執一良人枉木惡直䋲今欲下箴石通關鬲則恐有盛胡之累懷箴槖艾則被不工之名狼䟦其胡載􅠶其尾君子之路行止之道固狹耳此子石所以歎息也除狹第三十二大夫曰賢者處大林遭風雷而不迷愚者雖處乎敞大路猶暗惑焉今守相親剖符賛拜蒞一郡之衆古方伯之位也受命專制宰割千里不御於内善惡在於巳巳不能故耳道何狹之有哉賢良曰古之進士也鄕擇而里選論其才能然後官之勝職任然後爵而禄之故士修之鄕曲升諸朝廷行之幽􅀮明足顯著䟽遠無失士小大無遺功是以賢者進用不肖者簡黜今吏道壅而不選冨者以財賈官勇者以死射功戯車􅂦躍咸出􅀘吏累功積日或至卿相埀靑䋲擐銀龜擅殺生之柄專萬民之命弱者猶使羊將狼也其亂必矣强者則是予狂夫利劒也必妄殺生也是以往者郡國􅀺民相乗而不能理或至鋸頸殺不辜而不能正執綱紀非其道盖􅀶亂愈甚古者封賢禄能不過百里百里之中而爲都疆埀不過五十猶以爲一人之身明不能照聰不得逹故立卿大夫士以佐之而政治乃備今守相或無古諸侯之賢而蒞千里之政主一郡之衆施聖主之德擅生殺之法至重也非仁人不能任非其人不能行一人之身治亂在已千里與之轉化不可不熟擇也故人主有私人以財不私人以官懸賞以待功序爵以俟賢舉善􅀂不足黜惡􅀂仇讐固爲其非功而殘百姓也夫􅀓主德開臣途在於選賢而器使之擇練守相然後任之
