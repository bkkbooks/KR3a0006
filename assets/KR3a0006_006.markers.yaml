  - {type: variant, offset: 135, length: 18, content: 傷而作比干子胥遺身忘禍也其惡勞人若斯, SBCK: 周窮士}
  - {type: variant, offset: 135, length: 0, content: '', WYG: 身殺死而終葅醢也未見其為宗廟器覩其為世戮也當此之時東流亦安之乎文學曰騏驥之輓音晚鹽車垂頭於太行音杭屠者持刀而睨音義之太公之窮困負販於朝歌也蓬頭相聚而笑之王逸曰吕望鼓刀在列肆文王親徃問之望曰下屠屠牛上屠屠國文王喜載與俱歸當此之時非無逺筋音斤駿才也非文王伯樂音洛莫知之賈也伯樂姓孫名陽善相馬天上有一星名伯樂在天熙星之旁人見孫陽識馬因號之曰伯樂天熙一作天駟孔子曰吕望行年五十賣食棘津年七十屠於朝歌九十乃為天子師則遇文王也夫驥罷鹽車此非無形容也莫知之也使驥不遇伯樂安得千里之足造父亦無千里之手矣春秋後語曰蘇代欲見齊王王不見代代說淳于髠曰人有賣駿馬者三旦立於市人莫與言及見伯樂還而視之去而顧之一旦價十倍足下有意為臣伯樂乎韓嬰曰明主能愛其所愛闇主則必危其所愛夫文王非無使辟親比己者超然乃舉太公於舟人而用之豈私之㢤以為親邪則異族之人也以為故耶則未嘗相識也以為姣好耶則太公年七十二齳然而齒墮矣然而好之者文王欲立貴道欲白貴名兼制天下以惠中國而不可以獨故舉是人而用之貴道果立貴名果白兼制天下立國七十一姬姓獨居五十二周之子孫苟不狂惑莫不為天下顕諸侯夫是之謂能愛其所愛矣故惟明主能愛其所愛闇主必危其所愛此之謂也汗明見春申君候問三月而後得見談卒春申君大說之汗明欲復談春申君曰僕已知先生先生太息矣汗明憱憱焉曰明願有問君而恐固不審君之聖孰與堯也春申君曰先生過矣臣何足以當堯汗明曰然則君料臣孰與舜春申君曰先生即舜也汗明曰不然臣請為君終言之君之賢實不如堯臣之能不及舜夫以賢舜事聖堯三年而後乃相知也今君一旦而知臣是君聖於堯而臣賢於舜也春申君曰善召門吏為汗先生著客籍五日一見汗明曰君亦聞驥乎夫驥之齒至矣服鹽車而上太行蹄申膝折尾湛胕潰漉汁􅎈地白汗交流外阪遷延負棘而不能上伯樂遭之下車攀而哭之解紵衣以羃之驥於是俛而噴仰而鳴聲達於天若出金石聲者何也彼見伯樂之知己也今僕之不肖阨於州部堀穴窮巷沉洿鄙俗之日久矣君獨無意湔祓僕使得為君髙鳴屈於梁乎子路宰我生不逢伯樂音洛之舉而遇狂屠故君子}
