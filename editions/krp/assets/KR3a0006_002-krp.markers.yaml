  - {type: variant, offset: 763, length: 214, content: 荀子曰義與利者人之所兩有也雖堯舜不能去民之欲利然而能使其欲利不克其好義也雖桀紂亦不能去民之好義然而能使其好義不勝其欲利也故義勝利者為治世利克義者為亂世上重義則義克利上重利則利克義故天子不言多少諸侯不言利害大夫不言得䘮士不通財貨有國之君不息牛羊錯質之臣不息鷄豚冢卿不修幣大夫不為場園從士以上皆羞利而不與民争業樂分施而耻積藏坊記曰子云君子不盡利以遺民詩云彼有遺秉此有不歛穧伊寡婦之利故君子仕則不稼田則不漁食時不力珍大夫不坐羊士不坐犬, SBCK: ''}
