  - {type: variant, offset: 4235, length: 9, content: 為陽佐輔陽剛陰柔季, WYG: 故也或曰不欲斥言但云其所服用之物皆已故耳雖破宛得寳馬非計也劉向曰貳師將軍李廣利捐五萬之師靡億萬之費經四年之勞而厪獲駿馬三十匹雖斬宛王母寡之首猶不足以復其費也當此之時將卒方赤面而事四夷師旅相望郡國並發黎人困苦姦偽萌生盗賊並起守尉}
