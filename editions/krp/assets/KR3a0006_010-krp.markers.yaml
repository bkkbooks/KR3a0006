  - {type: variant, offset: 9909, length: 387, content: 許慎曰衝臨衝也所以臨敵城衝突壤之者也隆髙也劉熈曰隆隆强也言體隆而强也樂書曰韶蕭韶也舜之樂也武大武也武王之樂也應劭曰烏號弓也楚有柘桑其材堅勁鳥峙其上及其將飛枝必撓下勁能復起巢鳥隨之鳥不得飛欲墮而號伐其枝以為弓因曰烏號之弓也張揖曰黄帝鑄鼎於荆山鼎湖得道而仙乗龍上天小臣不得上挽悉持龍髯㧞墮黄帝之弓百姓仰望抱弓而號故後世名其弓曰烏號也兵略曰二世皇帝勢為天子富有天下人迹所至舟檝所通莫不為郡縣然縱耳目之欲窮侈靡之變不顧百姓之飢寒窮匱也興萬乗之駕而作阿房之宫發閭左之戍牧太半之賦百姓之隨逮肆刑挽輅首路死者一旦不知千萬之數天下敖然若焦熱傾然若苦烈上下不相寜吏民不相憀戍卒陳勝興於大澤攘臂袒右稱為大楚而天下響應當此之時非有牢甲利兵勁弩强衝也伐棘棗而為矜周錐鑿而為刃剡摲筡奮儋钁以當修㦸强弩攻城略地莫不降下天下為之麋沸螘動雲徹席卷方數千里勢位至賤而器械甚不利然一人唱而天下應之者積怨在於民也, SBCK: ''}
