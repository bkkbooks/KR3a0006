  - {type: variant, offset: 981, length: 0, content: '', krp: 雜事篇曰荆人卞和得玉璞而獻之荆厲王使玉尹相之曰石也王以和為謾而斷其左足厲王薨武王即位和復奉玉璞而獻之武王武王使玉尹相之曰石也又以為謾而㫁其右足武王薨共王即位和乃奉玉璞而哭扵荆山中三日三夜泣盡而繼之以血共王聞之使人問之曰天下刑之者衆矣子獨何哭之悲也對曰寳玉而名之曰石貞士而戮之以謾此臣之所以悲也共王曰惜矣吾先王之聴難剖石而易斬人之足}
  - {type: variant, offset: 982, length: 0, content: '', WYG: 死者不可生㫁者不可属何聴之殊也乃使人理其璞而得寶焉故名之曰和氏之璧故曰珠玉者人主之所貴也和雖獻寶而美未為玉尹用也進寳且若彼之難也况進賢人乎賢人與姦臣猶仇讐也扵庸君意不合夫欲使姦臣進其讐扵不合意之君其難萬倍扵和氏之璧又無㫁兩足之臣以推其難猶㧞山也千嵗一合若繼踵然後覇王之君興焉其賢而不用不可勝載故有道者之未戮也冝白玉之璞未獻耳陳元曰至音不合衆聽故伯牙絶絃至寳不同衆好故卞和泣血楚辭曰屈原既放㳺扵江潭行吟澤畔顔色憔悴形容枯槁漁父見而問之曰子非三閭大夫與何故至扵斯屈原曰舉世皆濁而我獨清衆人皆醉而我獨醒是以見放漁父曰聖人者不凝滯扵物而能與世推移舉世皆濁何不淈其泥而揚其波衆人皆醉何不餔其糟而歠其釃何故懐瑾握瑜而自令見放為屈原曰吾聞之新沐者必彈冠新浴者必振衣安能以身之察察受物之汶汶者乎寧赴湘流葬扵江魚之腹中又安䏻以皎皎之白而䝉世俗之塵埃乎漁父莞爾而笑鼓枻而去歌曰滄浪之水清兮可以濯吾纓滄浪之水濁兮可以濯吾足遂去不復與言夫音扶}
