  - {type: variant, offset: 2260, length: 434, content: 子之為方也若以管窺天以郄視文越人之為方也不待切脉望色聼聲寫形言病之所在聞病之陽論得其隂聞病之隂論得其陽病應見於大表不出千里决者至衆不可曲止也子以吾言為不誠試入診太子當聞其耳鳴而鼻張循其兩股以至於隂當尚温也中庶子聞扁鵲言目眩然而不瞚舌撟然而不下乃以扁鵲言入報虢君虢君聞之大驚出見扁鵲於中闕曰竊聞髙義之日乆矣然未嘗得拜謁於前也先生過小國幸而舉之偏國寡臣幸甚有先生則活無先生則棄捐填溝壑長終而不得反言未卒因噓唏服臆䰟精泄横流涕長􅏰忽忽承䀹悲不能自止容貎變更扁鵲曰若太子病所謂尸蹷者也夫以陽入隂中動胃繵緣中經維絡别下於三焦膀胱是以陽脉下遂隂脉上爭㑹氣閉而不通隂上而陽内行下内鼔而不起上外絶而不為使上有絶陽之絡下有破隂之紐破隂絶陽之色已廢脉亂故形静如死狀太子未死也夫以陽入隂支蘭藏者生以隂入陽支蘭藏者死凡此數事皆五藏蹷中之時暴作也良工取之拙者疑殆扁鵲乃使弟子子陽厲鍼砥石以取外三陽五㑹有間太子蘓乃使子豹為五分之熨以八减之齊和煑之以更熨兩脇下太子起坐更適隂陽但服湯二旬而復故夫音扶, SBCK: ''}
