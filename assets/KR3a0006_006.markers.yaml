  - {type: variant, offset: 99, length: 0, content: '', krp: 忠為質以仁為衞不出環堵之内而聞千里之外不善以忠化冦暴以仁圍何必持劍乎子路曰由也請攝齊以事先生矣宰予晝寢論語筆解作畫寢謂以五色畫其寢室也欲損三年之喪孔子曰糞土之墻不可杇也若由不得其死然故内無其質而外學其文雖有賢師良友若畫音壞脂鏤音陋氷費日損功故良師不能飾戚施香澤不能化嫫音模母也修務訓曰曼頬皓齒形夸骨佳不待脂粉芳澤而性可恱者西施陽文也啳􅢦哆噅籧蒢戚施雖粉白黛黑弗能為美者嫫母仳倠也文學曰蒙以不潔鄙夫掩鼻惡人盛飾可以宗祀上帝孟子曰西子蒙不潔則人皆掩鼻而過之雖有惡人齋戒沐浴則可以祀上帝修務訓曰毛嬙西施}
  - {type: variant, offset: 101, length: 0, content: '', WYG: 之美人也若使美人銜腐䑕蒙蝟皮衣豹裘帶死蛇則布衣韋帶之人過者莫不左右睥睨而掩鼻嘗試使之施芳澤正蛾眉設笄珥衣阿錫曳齊紈粉白黛黑佩玉環揄步雜芝若籠蒙目視冶由笑目流眺口曾撓竒牙出靨䩉揺則雖王公大人有嚴志頡頏之行亦無不憚悇癢心而恱其色矣今以中人之才蒙愚惑之智被汙辱之行無本業所修方術所務焉得無有睥面掩鼻之容㢤使二人不涉聖人之門不免}
  - {type: variant, offset: 101, length: 0, content: '', krp: 之美人也若使美人銜腐䑕蒙蝟皮衣豹裘帶死蛇則布衣韋帶之人過者莫不左右睥睨而掩鼻嘗試使之施芳澤正蛾眉設笄珥衣阿錫曳齊紈粉白黛黑佩玉環揄步雜芝若籠蒙目視冶由笑目流眺口曾撓竒牙出靨䩉揺則雖王公大人有嚴志頡頏之行亦無不憚悇癢心而恱其色矣今以中人之才蒙愚惑之智被汙辱之行無本業所修方術所務焉得無有睥面掩鼻之容㢤使二人不涉聖人之門不免}
  - {type: variant, offset: 102, length: 1, content: 任, WYG: 窮夫安得卿大夫之名故砥所以致於刃學所以盡其才也子思曰學所以益才也礪所以致刃也吾嘗幽處而深思不若學之速吾嘗跂而望不若登髙之博見孟子曰人皆知以食愈飢莫知以學愈愚夫學者崇名立身之本也儀狀齊等而飾貌者好質性同倫而學問者智是故砥礪琢磨非金也而可以利金詩書辟立非我也而可以厲心韓嬰曰劒雖利不厲不㫁材雖美不學不髙雖有旨酒嘉殽不嘗不知其旨雖有善道不學不達其功孔子曰觚不觚觚哉觚哉故事人加則為宗廟器否則厮養之舋音問才張耳傳曰厮養卒厮者養馬之役也韋昭曰析薪為厮炊烹為養于越之鋌音定不礪舋器破而未離}
