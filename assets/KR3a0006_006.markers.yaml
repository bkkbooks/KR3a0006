  - {type: punctuation, offset: 159, content: 《, id: KR3a0006_tls_006-bkkpn36}
  - {type: variant, offset: 159, length: 0, content: '', WYG: 對曰一心可以事百君百心不可以事一君王恢曰五帝不相同樂三王不相襲禮者非故相反也各因世之宜也教與時變備與敵化守一而不易不足以子民公卿既定大業之路建不竭之本願無顧細故之語牽儒墨論也文學曰師曠之調五音不失宫商聖王之治世不離去聲仁義故有改制之名無變道之實修務訓曰昔晋平公令官為鐘鐘成而示師曠師曠曰鐘音不調平公曰寡人以示工工皆以為調而以為不調何也師曠曰使後世無知音者則巳若有知音者必知鐘之不調故師曠之欲調鐘也以為後之有知音者也陳元曰夫明者獨見不惑於朱紫聰者獨聞不謬於清濁故離朱不為巧眩移目師曠不為新聲易耳董仲舒曰三王之道所祖不同非其相反將以捄溢扶衰所衰之變然也故孔子曰無為而治者其舜乎改正朔易服色以順天命而已其餘盡循堯道何更為哉故王者有改制之名亡變道之實上自黄帝下及三王莫不明徳教謹庠序崇仁義立教化此百世不易之道也殷周因修而昌秦王變法而亡主術訓曰今夫權衡䂓矩一定而不易不為秦楚變莭不為呉越改容常一而不邪方行而不流一日刑之萬世傳之而以無為為之故國有亡主而世無廢道人有困窮而理無不通語曰家有常業雖饑不餓國有常法雖危不亡}
