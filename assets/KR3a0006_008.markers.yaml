  - {type: variant, offset: 2344, length: 1, content: 明, WYG: 兵法曰興師十萬日費千金夫秦嘗積衆暴兵數十萬人雖有覆軍殺將係虜單于之功亦適足以結怨深讐不足以償天下之費夫上虚府庫下敝百姓甘心于外國非完事也古者天子封畿千里繇音遥役五百里勝聲相聞疾病相恤無過時之師無踰時之役内節於民心而事適其力是以行者勸務而止者安業今山東之戎馬甲士戍音絮邊郡者絶殊遼逺身在胡越心懐老母老母垂泣室婦悲恨推其饑渴念其寒苦詩云昔我徃矣楊栁依依今我來思雨雪霏霏行道遲遲載渴載饑我心傷悲莫知我哀故聖人憐其如此閔其久去父母妻子暴露中野居寒苦之地故春使使去聲者勞賜舉失職者所以哀逺民而慰撫老母也漢昭紀曰始元元年赦天下賜民百户牛酒遣故廷尉}
