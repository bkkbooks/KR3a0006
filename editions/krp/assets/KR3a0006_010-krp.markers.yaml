  - {type: variant, offset: 393, length: 125, content: 去聲春秋曰正月公狩于郎傳曰春曰蒐夏曰苗秋曰獮春蒐者不殺小麛及孕重者冬狩皆取之百姓皆出不失其馳不抵禽不詭遇逐不出防此苗獮蒐狩之義也故苗獮蒐狩之禮簡其戎事也主父偃曰司馬法曰國雖大好戰必亡天下雖平忘戰必危天下既平天下大凱春蒐秋獮諸侯春振旅秋治兵所以不忘戰也, SBCK: ''}
