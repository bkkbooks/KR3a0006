body:
  text: 鹽鐵論卷二非鞅第七大夫曰昔商君相秦也內立法度嚴刑罰飭政教姦偽無所容外設百倍之利收山澤之稅國富民強器械完飾蓄積有餘是以征敵伐國攘地斥境不賦百姓而師以贍故利用不竭而民不知地盡西河而民不苦鹽鐵之利所以佐百姓之急足軍旅之費務蓄積以備乏絶所給甚衆有益於國無害於人百姓何苦爾而文學何憂也文學曰蓋文帝之時無鹽鐵之利而民富今有之而百姓困乏未見利之所利也而見其害也且利不從天來不從地出一取之民間謂之百倍此計之失者也無異於愚人反裘而負薪愛其毛不知其皮盡也夫李梅實多者來年為之衰新穀熟而舊穀為之虧自天地不能兩盈而況於人事乎故利於彼者必耗於此猶陰陽之不並曜晝夜之有長短也商鞅峭法長利秦人不聊生相與哭孝公吳起長兵攻取楚人搔動相與泣悼王其後楚日以危秦日以弱故利蓄而怨積地廣而禍搆惡在利用不竭而民不知地盡西河而人不苦也今商鞅之册任於內吳起之兵用於外行者勤於路居者匱於室老母號泣怨女歎息文學雖欲無憂其可得也大夫曰秦任商君國以富強其後卒并六國而成帝業及二世之時邪臣擅斷公道不行諸侯叛弛宗廟隳亡春秋曰末言爾祭仲亡也夫善歌者使人續其聲善作者使人紹其功椎車之蟬攫負子之教也周道之成周公之力也雖有裨諶之草創無子産之潤色有文武之規矩而無周呂之鑿枘則功業不成今以趙高之亡秦而非商鞅猶以崇虎亂殷而非伊尹也文學曰善鑿者建周而不拔善基者致高而不蹶伊尹以堯舜之道為殷國基子孫紹位百代不絶商鞅以重刑峭法為秦國基故二世而奪刑既嚴峻矣又作為相坐之法造誹謗增肉刑百姓齋栗不知所措手足也賦斂既煩數矣又外禁山澤之原內設百倍之利民無所開説容言崇利而簡義高力而尚功非不廣壤進地也然猶人之病水益水而疾深知其為秦開帝業不知其為秦致亡道也狐刺之鑿雖公輸子不能善其枘畚土之基雖良匠不能成其高譬若秋蓬被霜遭風則零落雖有十子産如之何故扁鵲不能肉白骨微箕不能存亡國也大夫曰言之非難行之為難故賢者處實而效功亦非徒陳空文而已昔商君明於開塞之術假當世之權為秦致利成業是以戰勝攻取并近滅遠乘燕趙陵齊楚諸侯斂衽西面而向風其後蒙恬征胡斥地千里踰之河北若壞朽折腐何者商君之遺謀備飭素修也故舉而有利動而有功夫蓄積籌策國家之所以強也故弛廢而歸之民未覩巨計而涉大道也文學曰商鞅之開塞非不行也蒙恬卻胡千里非無功也威震天下非不強也諸侯隨風西面非不從也然而皆秦之所以亡也商鞅以權數危秦國蒙恬以得千里亡秦社稷此二子者知利而不知害知進而不知退故果身死而衆敗此所謂戀朐之智而愚人之計也夫何大道之有故曰小人先合而後忤初雖乘馬卒必泣血此之謂也大夫曰淑好之人戚施之所妬也賢知之士闟茸之所惡也是以上官大夫短屈原於頃襄公伯寮訴子路於季孫夫商君起布衣自魏入秦期年而相之革法明教而秦人大治故兵動而地割兵休而國富孝公大説封之於商之地方五百里功如丘山名傳後世世人不能為是以相與嫉其能而疵其功也文學曰君子進必以道退不失義高而勿矜勞而不伐位尊而行恭功大而理順故俗不疾其能而世不妬其業今商鞅棄道而用權廢德而任力峭法盛刑以虐戾為俗欺舊交以為功刑公族以立威無恩於百姓無信於諸侯人與之為怨家與之為讎雖以獲功見封猶食毒肉愈飽而罹其咎也蘇秦合縱連橫統理六國業非不大也桀紂與堯舜並稱至今不亡名非不長也然非者不足貴故事不苟多名不苟傳也大夫曰縞素不能自分於緇墨賢聖不能自理於亂世是以箕子執囚比干被刑伍員相闔閭以霸夫差不道流而殺之樂毅信功於燕昭而見疑於惠王人臣盡節以徇名遭世主之不用大夫種輔翼越王為之深謀卒擒強吳據有東夷終賜屬鏤而死驕主背恩德聽流説不計其功故也豈身之罪哉文學曰比干剖心子胥鴟夷非輕犯君以危身強諫以干名也憯怛之忠誠心動於內忘禍患之發於外志在匡君救民故身死而不怨君子能行是不能禦非雖在刑戮之中非其罪也是以比干死而殷人怨子胥死而吳人恨今秦怨毒商鞅之法甚於私仇故孝公卒之日舉國而攻之東西南北莫可奔走仰天而歎曰嗟乎為政之弊至於斯極也卒車裂族夷為天下笑斯人自殺非人殺之也朝錯第八大夫曰春秋之法君親無將將而必誅故臣罪莫重於弒君子罪莫重於弒父日者淮南衡山修文學招四方遊士山東儒墨咸聚於江淮之間講議集論著書數十篇然卒於背義不臣使謀叛逆誅及宗族朝錯變法易常不用制度迫蹙宗室侵削諸侯蕃臣不附骨肉不親吳楚積怨斬錯東市以慰三軍之士而謝諸侯斯亦誰殺之乎文學曰孔子不飲盜泉之流曾子不入勝母之閭名且惡之而況為不臣不子乎是以孔子沐浴而朝告之哀公陳文子有馬十乘棄而違之傳曰君子可貴可賤可刑可殺而不可使為亂若夫外飾其貌而內無其實口誦其文而行不由其道是盜固與盜而不容於君子之域春秋不以寡犯衆誅絶之義有所止不兼怨惡也故舜之誅誅鯀其舉舉禹夫以璵璠之玼而棄其璞以一人之罪而兼其衆則天下無美寶信士也朝生言諸侯之地大富則驕奢急即合從故因吳之過而削之會稽因楚之罪而奪之東海所以均輕重分其權而為萬世慮也弦高誕於秦而信於鄭朝生忠於漢而讎於諸侯人臣各死其主為其國用此解揚之所以厚於晉而薄於荊也刺權第九大夫曰今夫越之具區楚之雲夢宋之巨野齊之孟諸有國之富而霸王之資也人君統而守之則強不禁則亡齊以其腸胃豫人家強而不制枝大而折幹以專巨海之富而擅魚鹽之利也勢足以使衆恩足以恤下是以齊國內倍而外附權移於臣政墜於家公室卑而田宗強轉轂遊海者蓋三千乘失之於本而末不可救今山川海澤之原非獨雲夢孟諸也鼓鑄煮鹽其勢必深居幽谷而人民所罕至姦猾交通山海之際恐生大姦乘利驕溢散朴滋偽則人之貴本者寡大農鹽鐵丞咸陽孔僅等上請願募民自給費因縣官器煮鹽豫用以杜浮偽之路由此觀之令意所禁微有司之慮亦遠矣文學曰有司之慮遠而權家之利近令意所禁微而僣奢之道著自利害之設三業之起貴人之家雲行於塗轂擊於道攘公法申私利跨山澤擅官市非特巨海魚鹽也執國家之柄以行海內非特田常之勢陪臣之權也威重於六卿富纍於陶衛輿服僣於王公宮室溢於制度并兼列宅隔絶閭巷閣道錯連足以遊觀鑿池曲道足以騁騖臨淵釣魚放犬走兔隆豺鼎力踏鞠鬭雞中山素女撫流徵於堂上鳴鼓巴俞作於堂下婦女被羅紈婢妾曳絺紵子孫連車列騎田獵出入畢弋捷健是以耕者釋耒而不勤百姓冰釋而懈怠何者己為之而彼取之僣侈相效上升而不息此百姓所以滋偽而罕歸本也大夫曰官尊者祿厚本美者枝茂故文王德而子孫封周公相而伯禽富水廣者魚大父尊者子貴傳曰河海潤千里盛德及四海況之妻子乎故夫貴於朝妻貴於室富曰苟美古之道也孟子曰王子與人同而如彼者居使然也居編戶之列而望卿相之子孫是以跛夫之欲及樓季也無錢而欲千金之寶不亦虛望哉文學曰禹稷自布衣思天下有不得其所者若己推而納之溝中故起而佐堯平治水土教民稼穡其自任天下如此其重也豈云食祿以養妻子而已乎夫食萬人之力者蒙其憂任其勞一人失職一官不治皆公卿之纍也故君子之仕行其義非樂其勢也受祿以潤賢非私其利見賢不隱食祿不專此公叔之所以為文魏成子所以為賢也故文王德成而後封子孫天下不以為黨周公功成而後受封天下不以為貪今則不然親戚相推朋黨相舉父尊於位子溢於內夫貴於朝妻謁行於外無周公之德而有其富無管仲之功而有其侈故編戶跛夫而望疾步也刺復第十大夫為色矜而心不懌曰但居者不知負載之勞從旁議者與當局者異憂方今為天下腹居郡諸侯並臻中外未然心憧憧若涉大川遭風而未薄是以夙夜思念國家之用寢而忘寐飢而忘食計數不離於前萬事簡閲於心丞史器小不足與謀獨鬱大道思覩文學若俟周邵而望高子御史案事郡國察廉舉賢才歲不乏也今賢良文學臻者六十餘人懷六藝之術騁意極論宜若開光發蒙信往而乖於今道古而不合於世務意者不足以知士也將多飾文誣能以亂實邪何賢士之難覩也自千乘倪寬以治尚書位冠九卿及所聞覩選舉之士擢升贊憲甚顯然未見絶倫比而為縣官興滯立功也文學曰輸子之制材木也正其規矩而鑿枘調師曠之諧五音也正其六律而宮商調當世之工匠不能調其鑿枘則改規矩不能協聲音則變舊律是以鑿枘剌戾而不合聲音泛越而不和夫舉規矩而知宜吹律而知變上也因循而不作以俟其人次也是以曹丞相日飲醇酒倪大夫閉口不言故治大者不可以煩煩則亂治小者不可以怠怠則廢春秋曰其政恢卓恢卓可以為卿相其政察察察察可以為匹夫夫維綱不張禮義不行公卿之憂也案上之文期會之事丞史之任也尚書曰俊乂在官百僚師師百工惟時庶尹允諧言官得其人人任其事故官治而不亂事起而不廢士守其職大夫理其位公卿總要執凡而已故任能者責成而不勞任己者事廢而無功桓公之於管仲耳而目之故君子勞於求賢逸於用之豈云殆哉昔周公之相也謙卑而不鄰以勞天下之士是以俊乂滿朝賢智充門孔子無爵位以布衣從才士七十有餘人皆諸侯卿相之人也況處三公之尊以養天下之士哉今以公卿之上位爵祿之美而不能致士則未有進賢之道堯之舉舜也賓而妻之桓公舉管仲也賓而師之以天子而妻匹夫可謂親賢矣以諸侯而師匹夫可謂敬賓矣是以賢者從之若流歸之不疑今當世在位者既無燕昭之下士鹿鳴之樂賢而行臧文子椒之意蔽賢妬能自高其智訾人之才足己而不問卑士而不友以位尚賢以祿驕士而求士之用亦難矣大夫繆然不言蓋賢良長嘆息焉御史進曰太公相文武以王天下管仲相桓公以霸諸侯故賢者得位猶龍得水騰蛇遊霧也公孫丞相以春秋説先帝遽即三公處周召之列據萬里之勢為天下準繩衣不重彩食不兼味以先天下而無益於治博士褚泰徐偃等承明詔建節馳傳巡省郡國舉孝廉勸元元而流俗不改招舉賢良方正文學之士超遷官爵或至卿大夫非燕昭之薦士文王之廣賢也然而未覩功業所成殆非龍蛇之才而鹿鳴之所樂賢也文學曰冰炭不同器日月不並明當公孫弘之時人主方設謀垂意於四夷故權譎之謀進荊楚之士用將帥或至封侯食邑而勀獲者咸蒙厚賞是以奮擊之士由此興其後干戈不休軍旅相望甲士糜弊縣官用不足故設險興利之臣起磻溪熊羆之士隱涇渭造渠以通漕運東郭咸陽孔僅建鹽鐵策諸利富者買爵販官免刑除罪公用彌多而為者徇私上下兼求百姓不堪抏弊而從法故憯急之臣進而見知廢格之法起杜周咸宣之屬以峻文決理貴而王溫舒之徒以鷹隼擊殺顯其欲據仁義以道事君者寡偷合取容者衆獨以一公孫弘如之何論儒第十一御史曰文學祖述仲尼稱誦其德以為自古及今未之有也然孔子修道魯衛之間教化洙泗之上弟子不為變當世不為治魯國之削滋甚齊宣王褒儒尊學孟軻淳于髡之徒受上大夫之祿不任職而論國事蓋齊稷下先生千有餘人當此之時非一公孫弘也弱燕攻齊長驅至臨淄湣王遁逃死於莒而不能救王建禽於秦與之俱虜而不能存若此儒者之安國尊君未始有效也文學曰無鞭策雖造父不能調駟馬無勢位雖舜禹不能治萬民孔子曰鳳鳥不至河不出圖吾已矣夫故軺車良馬無以馳之聖德仁義無所施之齊威宣之時顯賢進士國家富強威行敵國及湣王奮二世之餘烈南舉楚淮北并巨宋苞十二國西摧三晉卻強秦五國賓從鄒魯之君泗上諸侯皆入臣矜功不休百姓不堪諸儒諫不從各分散慎到捷子亡去田駢如薛而孫卿適楚內無良臣故諸侯合謀而伐之王建聽流説信反間用后勝之計不與諸侯從親以亡國為秦所禽不亦宜乎御史曰伊尹以割烹事湯百里以飯牛要穆公始為苟合信然與之霸王如此何言不從何道不行故商君以王道説孝公不用即以強國之道卒以就功鄒子以儒術干世主不用即以變化始終之論卒以顯名故馬效千里不必胡代士貴成功不必文辭孟軻守舊術不知世務故困於梁宋孔子能方不能圓故飢于黎丘今晚世之儒勤德時有乏匱言以為非因此不行自周室以來千有餘歲獨有文武成康如言必參一焉取所不能及而稱之猶躄者能言遠不能行也聖人異塗同歸或行或止其趣一也商君雖革法改教志存於強國利民鄒子之作變化之術亦歸於仁義祭仲自貶損以行權時也故小枉大直君子為之今硜硜然守一道引尾生之意即晉文之譎諸侯以尊周室不足道而管仲蒙恥辱以存亡不足稱也文學曰伊尹之干湯知聖主也百里之歸秦知明君也二君之能知霸主其册素形於己非暗而以冥冥決事也孔子曰名不正則言不順言不順則事不成如何其苟合而以成霸王也君子執德秉義而行故造次必於是顛沛必於是孟子曰居今之朝不易其俗而成千乘之勢不能一朝居也寧窮飢居於陋巷安能變己而從俗化闔廬殺僚公子札去而之延陵終身不入吳國魯公殺子赤叔眄退而隱處不食其祿虧義得尊枉道取容效死不為也聞正道不行釋事而退未聞枉道以求容也御史曰論語親於其身為不善者君子不入也有是言而行不足從也季氏為無道逐其君奪其政而冉求仲由臣焉禮男女不授受不交爵孔子適衛因嬖臣彌子瑕以見衛夫人子路不説子瑕佞臣也夫子因之非正也男女不交孔子見南子非禮也禮義由孔氏且貶道以求容惡在其釋事而退也文學曰天下不平庶國不寧明王之憂也上無天子下無方伯天下煩亂賢聖之憂也是以堯憂洪水伊尹憂民管仲束縛孔子周流憂百姓之禍而欲安其危也是以負鼎俎囚拘匍匐以救之故追亡者趨拯溺者濡今民陷溝壑雖欲無濡豈得已哉御史默不對憂邊第十二大夫曰文學言天下不平庶國不寧明王之憂也故王者之於天下猶一室之中也有一人不得其所則謂之不樂故民流溺而弗救非惠君也國家有難而不憂非忠臣也夫守節死難者人臣之職也衣食飢寒者慈父之道也今子弟遠勞於外人主為之夙夜不寧群臣盡力畢議册滋國用故少府丞令請建酒榷以贍邊給戰士拯救民於難也為人父兄者豈可以已乎內省衣食以恤在外者猶未足今又欲罷諸用減奉邊之費未可為慈父賢兄也文學曰周之季末天子微弱諸侯力政故國君不安謀臣奔馳何者敵國衆而社稷危也今九州同域天下一統陛下優遊巖廊覽群臣極言至論內詠雅頌外鳴和鑾純德粲然並於唐虞功烈流於子孫夫蠻貊之人不食之地何足以煩慮而有戰國之憂哉若陛下不棄加之以德施之以惠北夷必內向款塞自至然後以為胡制於外臣即胸奴沒齒不食其所用矣大夫曰聖主思念中國之未寧北邊之未安使故廷尉評等問人間所疾苦拯恤貧賤周贍不足群臣所宣明王之德安宇內者未得其紀故問諸生諸生議不干天則入淵乃欲以閭里之治而況國家之大事亦不幾矣發於畎畝出於窮巷不知冰水之寒若醉而新寐殊不足與言也文學曰夫欲安民富國之道在於反本本立而道生順天之理因地之利即不勞而功成夫不修其源而事其流無本以統之雖竭精神盡思慮無益於治欲安之適足以危之欲救之適足以敗之夫治亂之端在於本末而已不至勞其心而道可得也孔子曰不通於論者難於言治道不同者不相與謀今公卿意有所倚故文學之言不可用也大夫曰吾聞為人臣者盡忠以順職為人子者致孝以承業君有非則臣覆蓋之父有非則子匿逃之故君薨臣不變君之政父沒則子不改父之道也春秋譏毀泉臺為其隳先祖之所為而揚君父之惡也今鹽鐵均輸所從來久矣而欲罷之得無害先帝之功而妨聖主之德乎有司倚於忠孝之路是道殊而不同於文學之謀也文學曰明者因時而變知者隨世而制孔子曰麻冕禮也今也純儉吾從衆故聖人上賢不離古順俗而不偏宜魯定公序昭穆順祖禰昭公廢卿士以省事節用不可謂變祖之所為而改父之道也二世充大阿房以崇緒趙高增纍秦法以廣威而未可謂忠臣孝子也
