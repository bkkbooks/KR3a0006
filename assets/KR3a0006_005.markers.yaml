  - {type: variant, offset: 1358, length: 0, content: '', WYG: 魏世家曰魏文侯與士大夫坐問曰寡人何如君也羣臣皆曰君仁君也次至任座曰君非仁君也曰子何以言之對曰君伐中山不以封君之弟而以封君之長子臣以此知君之非仁君文侯怒而逐任座座起而出次至翟璜文侯問寡人何如君也翟璜對曰君仁君也曰子何以言之對曰臣聞之其君仁者其臣直向任座之言直臣是以知君仁君文侯曰善復召任座入拜為上卿}
