  - {type: variant, offset: 6044, length: 348, content: 春秋元命苞曰文王造之而未遂武王遂之而未成周公旦抱少主而成之故曰成王尸子曰昔者武王崩成王幼周公旦踐東宫履乗石假為天子十年蒙恬曰昔周成王初立未離襁褓周公旦負王以朝卒定天下越絶書曰周公以盛德武王封周公使傅相成王成王少周公臣事之當是之時賞賜不加於無功刑罰不加於無罪天下家給人足米麥茂美使人以時說之以禮上順天地澤及夷狄君道篇曰周公踐天子之位布德施恵逺而逾明十三牧方三人出舉逺方之民有饑寒而不得衣食者有獄訟而失職者有賢才而不舉者以入告乎天子天子於其君之朝也揖而進之曰意朕之政教有不得者歟何其所臨之民有飢寒不得衣食者有獄訟而失職者有賢才而不舉者也其君歸也乃召其國大夫告周天子之言百姓聞之皆喜曰此誠天子也何居之深逺而見我之明也豈可欺哉故牧者所以辟四門明四目逹四聪也是以近者親之逺者安之詩曰柔逺能邇以定我王此之謂矣, SBCK: ''}
