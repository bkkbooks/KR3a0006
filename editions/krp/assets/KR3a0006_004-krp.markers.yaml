  - {type: variant, offset: 10741, length: 260, content: 貨殖傳曰子貢既學於仲尼退而仕於衛廢著鬻財於曹魯之間七十子之徒賜最為饒益原憲不厭糟糠匿於窮巷子貢結駟連騎束帛之幣以聘享諸侯所至國君無不分庭與之抗禮夫使孔子名布揚於天下者子貢先後之也此所謂得勢而益彰者乎又曰范蠡既雪㑹稽之恥乃喟然作而歎曰計然之䇿七越用其五而得意既已施於國吾欲用之家乃乘扁舟浮於江湖變名易姓適齊為䲭夷子皮之陶為朱公朱公以為陶天下之中諸侯四通貨物所交易也乃治産積居與時逐而不責於人故善治生者能擇人而任時十九年之中三致千金再分散與貧交疏昆弟此所謂富好行其德者後年衰老而聼子孫子孫修業而息之遂至巨萬故言富者皆稱陶朱公, SBCK: ''}
