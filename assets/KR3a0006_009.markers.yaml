  - {type: variant, offset: 4210, length: 10, content: 天道好生惡殺好賞惡罰, WYG: 呉越廹於江海三川循環之處於五湖之間地相廹壤相次其勢易相禽通作擒也金鼓未聞旌旗未舒行音杭陳音陣未定兵以接矣師無輜音之重之費士無乏絶之勞此所謂食於㕑倉而戰於門郊者也伍子胥曰夫吴之與越也仇讐敵戰之國也三江環之民無所移有吴則無越有越則無吴將不可改於是矣吾聞之陸人居陸水人居水夫上黨之國我攻而勝之吾不能居其地不能乗其車夫越國吾攻而勝之吾能居其地吾能乗其舟此利也不可失也已君必滅之失此利也雖悔之亦無及已今匈奴牧於無窮之澤東西南北不可窮極雖輕車利馬不能得也况負重羸音縲兵以求之乎其勢不相及也茫茫乎若行九臯未知所止皓皓古本浩浩乎若無網羅而漁江海雖及之三軍罷音疲弊適遺之餌也故明王知其所無利以為役不可數音朔行而權不可乆張也故詔公卿大夫賢良文學所以復枉興微之路公卿宜思百姓之急匈奴之害縁聖主之心定安平之業今乃留心於末計雖本議不順上意未為盡於忠也大夫曰初貳師不克宛而還也議者}
