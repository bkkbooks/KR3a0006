  - {type: indent, offset: 0, content: 　, id: KR3a0006_krp_010-bkkind1}
  - {type: variant, offset: 1, length: 1, content: 鐵, SBCK: 鐡取下第四十一大夫曰不􅁤之民困橈公利而欲擅山澤從文學賢良之意則利歸於下而縣官無可爲者上之所行則非之上之所言則譏之專欲損上徇下􅉛主而適臣尚安得上下之義君臣之禮而何頌聲能作也賢良曰古者上取有量自養有度樂歳不盜年饑則肆用民之力不過歳三日籍歛不過十一君篤愛臣盡力上下交讓天下平浚發爾私上讓下也遂及我私先公職也孟子曰未有仁而遺其親義而後其君也君君臣臣何爲其無禮義乎及周之末塗德惠塞而嗜欲衆君奢侈而上求多民困於下怠於公乎是以有􅂂畝之稅碩䑕之詩作也衞靈公當隆冬興衆穿池海春諌曰天寒百姓凍餒願公之罷役也公曰天寒哉我何不寒哉人之言曰安者不能恤危飽者不能食饑故餘梁肉者難爲言􅀮約處佚樂者難爲言勤苦夫高堂􅃉宇廣廈洞房者不知專屋狹廬上漏下濕者之廇也繫馬百駟貨財充内儲陳納新者不知有旦無暮稱貸者之急廣第唐園良田連比者不知無運踵之業竄頭宅者之役也原馬被山牛羊滿谷者不知無􅀌豚􅇤犢者之窶也高枕談卧無呌號者不知憂私責與吏正戚者之愁也被紈躡韋􅅮梁齧肥者不知短􅄄之寒糖􅹞之苦也從容房闈之間垂拱持案食者不知蹠耒躬耕者之勤也乗堅驅良列􅀐成行者不知􅀒擔歩行者之難也同牀旃席侍御滿側者不知􅀒輅輓舩登高絶流者之難也衣輕暖􅀍英裘處温室戴安車者不知乗邉城飄胡代鄕淸風者之危寒也妻子好合子孫保之不知老母之顦顇匹婦之悲恨也耳聽五音目視弄優者不知蒙流矢距敵方外之死者也東嚮伏几振筆如文調者不知求索之急箠楚之痛者也坐旃茵之上安圖籍之言若易然亦不知歩渉者之難也昔商鞅之任秦也刑人􅀂刈菅芳用師􅀂彈丸從軍旅者􅁀骨長城戍漕者輦車相望生而往死而旋彼獨非人子耶故君子仁以恕義以度所好惡與天下共之所不施不仁者公利好貨居者有積行者有嚢大王好色内無怨女外無曠夫文王作刑國無怨獄武王行師士樂爲之死民樂爲之用􅀂斯則民何苦而怨何求而譏公卿愀然寂􅀂無人於是遂罷議止詞奏曰賢良文學不明縣官事猥以鹽鐡而爲不便請且罷郡國􅅦沽關内鐡官奏可擊之第四十二賢良曰文學旣拜咸取列大夫辭丞相御史大夫曰前議公事賢良文學稱引往古頗乖世務論者不必相反期於可行往者縣官未事胡越之時邉城四靣受敵北邉尤􅀍其苦先帝絕三方之難撫從方國以爲蕃蔽窮極郡國以討匈奴匈奴壤界獸圈􅀌弱無與此困亡之時也遼遠不遂使得復喘息休養士馬􅀒紿西域西域迫近胡冦沮心内解必爲巨患是以主上欲掃除煩倉廩之費也終日逐禽罷而釋之則非計也盖舜紹緒禹成功今欲以小舉擊之何如文學曰異時縣官修輕賦公用饒人富給其後保胡越通四夷費用不足於是興利害筭車舡以訾助邉贖罪告緡與人以患矣甲士死於軍旅中士罷於轉漕仍之以科適吏徴發極矣夫勞而息之極而反本古之道也雖舜禹興不能易也大夫曰昔夏后底洪水之災百姓孔勤罷於籠臿及至其後咸享其功先帝之時郡國頗煩於戎事然亦寛三陲之役語曰見機不遂者隕功一日違敵累世爲患休勞用供困弊乗時帝王之道聖賢之所不能失也功業有緒惡勞而不卒猶耕者勌休而困止也夫事輟者無功耕怠者無􅀗也文學曰地廣而不得者國危兵强而凌敵者身亡虎兕相據而螻蟻得志兩敵相機而匹夫乗間是以聖王見利慮害見遠存近方今爲縣官計者莫􅀂偃兵休士厚幣結和親修文德而巳􅀂不恤人之急不計其難弊持以窮無用之地亡十􅀗一非文學之所知也鹽鐡}
