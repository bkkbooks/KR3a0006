  - {type: variant, offset: 485, length: 191, content: 莫為用此高皇帝所以仗劍而取天下也夫兩主好合內外交通天下安寧世世無患士民何事三王何怒焉大夫曰伯翳之始封秦地為七十里穆公開霸孝公廣業自卑至上自小至大故先祖基之子孫成之軒轅戰涿鹿殺兩皞蚩尤而為帝湯武伐夏商誅桀紂而為王黃帝以戰成功湯武以伐成孝故手足之勤腹腸之養也當世之務後世之利也今四夷內侵不攘萬世必有此長患先帝興義兵以誅暴強東滅朝鮮西定冉駹南擒百越北挫強胡追匈奴以廣北州湯武之舉蚩尤之兵也, WYG: 姦禁}
