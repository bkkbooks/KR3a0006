  - {type: variant, offset: 57, length: 1, content: 可, WYG: 能移風易俗其誠心弗施也故貪鄙在率不在下教訓在政不在民也主術訓曰通於本者不亂於末覩於要者不惑于詳是故有諸已不非諸人無諸已不求諸人所立於下者不廢於上所禁於民者不行於身孔子曰其身正不令而行其身不正雖令不從故禁勝於身則令行於民矣劉峻曰神非舜禹心異朱均才絓中庸在於所習是}
