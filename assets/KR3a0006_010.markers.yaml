  - {type: variant, offset: 4431, length: 3, content: 少伯正, WYG: 敵呉子曰不和於國不可以出軍不和於軍不可以出陣不和於陣不可以進戰不和於戰不可以决勝周之致逺不以地利以人和也百世不奪非以險以徳也婁敬曰武王伐紂不期而㑹孟津上八百諸侯遂滅殷成王即位周公}
