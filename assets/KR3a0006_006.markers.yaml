  - {type: variant, offset: 4160, length: 1, content: 優, WYG: 立秋日祭獸王者亦以此日出獵還以祭宗廟故有貙膢之祭也蔡邕獨㫁曰臘者嵗終大祭縦吏民宴飲風俗通曰按韓子書山居谷汲者膢臘而買水楚俗常以十二月祭飲食也又曰嘗新始殺也食新曰膒膢按禮傳夏曰嘉平殷曰清祀周曰大蜡漢改為臘臘者獵也言田獵取獸以祭祀其先祖也或曰臘者接也新故交接故大祭以報功也漢家火行衰於戌故曰臘也審老親之腹非唐園唯菜是盛音成夫音扶䓸音奸糲音辣乞者所不取而子以養去聲親雖欲以禮非其貴也文學曰無其能而竊其位無其功而有其祿雖有富貴由通作猶蹠音卒蹻音脚之養也髙臺極望食案方丈而不可謂孝老親之腹非盗囊也何故常盛音成不道之物詩傳曰田子為相三年歸休得金百鎰奉其母母曰子安得此金對曰所受俸祿也母曰為相三年不食乎治官如此非吾所欲也孝子之事親也盡力致誠不義之物不入於館為人子不可不孝也子其去之田子愧慙走出造朝還金退請就獄王賢其母說其義即舍田子罪令復為相以金賜其母詩云宜爾子孫䋲䋲兮夫音扶取非有非職財入而患從之}
  - {type: page-break, offset: 4160, content: '', id: KR3a0006_WYG_006-31a, image: WYG0695/WYG0695-0567c.png}
