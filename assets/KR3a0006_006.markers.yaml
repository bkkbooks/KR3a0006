  - {type: variant, offset: 15, length: 1, content: 吾, WYG: 七十子躬受聖人之術有名列於孔子之門皆諸侯卿相去聲之才可南面者數人雜言曰楚昭王召孔子将使執政而封}
  - {type: variant, offset: 15, length: 1, content: 吾, krp: 七十子躬受聖人之術有名列於孔子之門皆諸侯卿相去聲之才可南面者數人雜言曰楚昭王召孔子将使執政而封}
  - {type: variant, offset: 17, length: 10, content: 賢良為少愈乃反其幽明, SBCK: 㢘饑尾生以信死由小器而􅉛大體匹夫匹婦之爲諒也經於溝瀆而莫之知也何功名之有蘇秦張儀智足以强國勇足以威敵一怒而諸侯懼安居而天下息萬乗之主莫不屈體卑辭幣請交此所謂天下名士也夫智不足與謀而權不能舉當世民斯爲下也今舉亡而爲有虚而爲盈布衣穿􅂂深念徐行}
  - {type: variant, offset: 17, length: 0, content: '', WYG: 書社七百里子西謂楚王曰王之臣用兵有如子路者乎使諸侯有如宰予者乎長官五官有如子貢者乎昔文王處酆武王處鎬酆鎬之間百乘之地伐上殺主立為天子世皆曰聖王今以孔子之}
  - {type: page-break, offset: 17, content: '', id: KR3a0006_WYG_006-1b, image: WYG0695/WYG0695-0552b.png}
  - {type: variant, offset: 17, length: 0, content: '', krp: 書社七百里子西謂楚王曰王之臣用兵有如子路者乎使諸侯有如宰予者乎長官五官有如子貢者乎昔文王處酆武王處鎬酆鎬之間百乘之地伐上殺主立為天子世皆曰聖王今以孔子之}
  - {type: variant, offset: 18, length: 6, content: 良為少愈乃反, WYG: 而有書社七百里之地而三子佐之非楚之利也楚王遂止可政事者冉有季路言語宰我子貢宰我秉事有寵於齊田常作難去聲道不行身死庭中簡公殺於檀臺人間訓曰諸御鞅復於簡公曰陳成常宰予二子二子者甚相憎也臣恐}
