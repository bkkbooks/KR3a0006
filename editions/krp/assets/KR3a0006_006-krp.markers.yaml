  - {type: variant, offset: 7362, length: 377, content: 鮑叔之力也韓非子曰管仲鮑叔相謂曰君亂甚矣必失國齊國之諸公子其可輔者非公子糾則小白也與子人事一人焉先達者相收管仲乃従公子糾鮑叔従小白國人果弑君小白先入為君魯人拘管仲而效之鮑叔言而相之故諺曰巫咸雖善祝不能自祓也秦醫雖善除不能自弹也以管仲之聖而待鮑叔之助此鄙諺所謂虜自賣裘而不售士自譽便而不信者也詩傳曰鮑叔薦管仲曰臣所不如管夷吾者五寛惠柔愛臣弗如也忠信可結於百姓臣弗如也制禮約法於四方臣弗如也决獄折中臣弗如也執枹鼓立於軍門使士卒勇臣弗如也齊桓公使管仲治國管仲對曰賤不能臨貴桓公以為上卿而國不治桓公曰何故管仲對曰貧不能使富桓公賜之齊國市租一年而國不治桓公曰何故對曰疏不能制親桓公立以為仲父齊國大安而遂覇天下孔子曰管仲之賢不得此三權者亦不能使其君南面而覇矣尊賢萹曰管仲桓公之賊也鮑叔以為賢於巳而進之為相七十言而說乃聼遂使桓公除報讐之心而委國政焉桓公垂拱無事而朝諸侯, SBCK: ''}
