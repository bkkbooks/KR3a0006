  - {type: 'tls:seg', offset: 60, content: '', id: KR3a0006_tls_006-2a.10}
  - {type: variant, offset: 62, length: 0, content: '', SBCK: 罪卒然有急然後車馳人趨無益於死所盜不足償於臧􅀗妻子奔亡無處所身在深牢莫知恤視方此之時何暇得以笑乎大夫曰文學節高行矯然若不可卷盛節潔言皦然若不可􅄺然戍卒陳勝釋輓輅首爲叛逆自立張楚素非有回由處士之行宰相列臣之位也􅁬於大澤不過旬月而齊魯儒墨縉紳之徒肆}
  - {type: variant, offset: 63, length: 0, content: '', SBCK: 長衣長衣官之也􅀒孔氏之禮器詩書委質爲臣孔甲爲渉􅀶士卒俱死陳爲天下大笑深藏高逝者固若是也文學曰周室衰禮義壞不能統理天下諸侯交争相滅亡并爲六國兵革不休民不得寜息秦以虎狼之心􅁞食諸侯并吞戰國以爲郡縣伐能矜功自以爲過尭舜而羞與之同棄仁義而尚刑罰以爲今時不師於文而決於武趙高治獄於内蒙恬用兵於外百姓愁苦同心而}
