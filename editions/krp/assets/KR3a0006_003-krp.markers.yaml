  - {type: variant, offset: 16198, length: 259, content: 孟子曰當堯之時天下猶未平洪水横流氾濫于天下堯獨憂之舉舜而敷治焉泰族訓曰伊尹憂天下之不治調和五味負鼎爼而行五就桀五就湯將欲以濁為清以危為安也許慎曰管仲相齊公子紏不死子紏之難而奔魯束縛以歸齊桓公用之而霸也劉向曰孔子生於亂世莫之能容也故言行於君澤加於民然後仕言不行於君澤不加於民則處孔子懐天覆之心挾仁聖之徳憫時俗之汚泥傷紀綱之廢壊服重歴逺周流應聘乃俟幸施道以子百姓而當世諸侯莫能任用是以徳積而不肆大道屈而不伸海内不蒙其化羣生不被其恩故喟然歎曰如有用我者則吾其為東周乎故孔子行說非欲私身運德於一城將欲舒之於天下而建之於羣生者耳, SBCK: ''}
