body:
  text: 鹽鐡論卷三漢桓寛撰明張之象註晁錯第八大夫曰春秋之法君親無將將而必誅公羊傳曰此陳侯之弟招也何以不稱弟貶曷為貶為殺世子偃師貶曰陳侯之弟招殺陳世子偃師大夫相殺稱人此其稱名氏以殺何言將自是弑君也今將爾詞為與親弑者同君親無將將而必誅焉然則曷為不於其弑焉貶以親者弑然後其罪惡甚春秋不待貶絶而罪惡見者不貶絶以見罪惡也貶絶然後罪惡見者貶絶以見罪惡也今招之罪已重矣曷為復貶乎此著招之有罪也何著乎招之有罪言楚之托招以滅陳也顔師古曰將謂將有其意也故臣罪莫重於弑君子罪莫重於弑父趙武靈王曰家聴於親國聽於君古今之公行也子不反親臣不逆主先王之通誼也日者淮南衡山修文學招四方遊士山東儒墨咸聚於江淮之間講議集論著書數十篇然卒於背義謀叛逆誅及宗族淮南鴻烈序曰文帝以淮南厲王長子安襲封淮南王次為衡山王太傅賈誼諫曰怨讐之人不可貴也後淮南衡山卒反如賈誼言初安為辯逹善屬文皇帝為從父數上書召見孝文皇帝甚重之詔使為離騷賦自旦受詔日早食已上愛而祕之天下方術之士多往歸焉於是遂與蘓飛李尚左吳田由雷被毛被伍被晉昌等及諸儒大山小山之徒共講論道徳緫統仁義著書數十篇號曰鴻烈鴻大也烈明也以為大明道之言也司馬遷曰詩之所謂戎狄是膺荆舒是懲信哉是言也淮南衡山親為骨肉疆土千里列為諸侯不務遵蕃臣職以承輔天子而專挾邪僻之計謀為畔逆仍父子再失國各不終其身為天下笑此非獨王過也亦其俗薄臣下漸靡使然也夫荆楚僄勇輕悍好作亂乃自古記之矣使晁錯變法易常不用制度廹蹙宗族侵削諸侯蕃臣不附骨肉不親吳楚積怨斬錯東市以慰三軍之士而謝諸侯斯亦誰殺之乎晁錯傳曰晁錯為御史大夫請諸侯之罪過削其地収其枝郡奏上上令公卿列侯宗室集議莫敢難獨竇嬰争之由此與錯有郤錯所更令三十章諸侯皆諠譁疾晁錯錯父聞之從潁川來謂錯曰上初即位公為政用事侵削諸侯别踈人骨肉人口議多怨公者何也晁錯曰固也不如此天子不尊宗廟不安錯父曰劉氏安矣而晁氏危矣吾去公歸矣遂飲藥死曰吾不忍見禍及吾身死十餘日吳楚七國果反以誅錯為名及竇嬰袁盎進説上令晁錯衣朝衣斬東市文學曰孔子不飲盜泉之流曾子不入勝母之閭名且惡音汙之而况為不臣不子乎叢談曰邑名勝母曽子不入水名盜泉孔子不飲醜其聲也鍾離意曰孔子忍渇於盜泉之水曽參廻車於勝母之閭惡其名也是以孔子沐浴而朝音潮告之哀公陳文子有馬十乗去聲棄而違之論語曰陳成子弑簡公孔子沐浴而朝告於哀公曰陳恒弑其君請討之公曰告夫三子孔子曰以吾從大夫之後不敢不告也崔子弑齊君陳文子有馬十乘棄而違之至於他邦則曰猶吾大夫崔子也違之之一邦則又曰猶吾大夫崔子也違之傳去聲曰君子可貴可賤可刑可殺而不可使為亂孔子曰事君可貴可賤可富可貧可刑可殺而不可使為亂馬氏曰在物者有命故可貴可賤可生可殺在已者有義故不可使為亂也精神訓曰晏子與崔子盟臨死地而不易其義殖華將戰而死莒君厚賂而止之不改其行故晏子可廹以仁不可刼以兵殖華可止以義而不可縣以利君子義死而不可以死亡恐也若夫音扶外飾其貎而内無其實口誦其文而行去聲不由其道是盜固與盜而不容於君子之域春秋不以寡犯衆誅絶之義有所止不兼怨惡也故舜之誅誅鯀其舉舉禹夏紀曰當帝堯之時鴻水㴞天浩浩懐山襄陵下民其憂堯求能治水者群臣四岳皆曰鯀可堯曰鯀為人負命毁族不可四岳曰等之未有賢於鯀者願帝試之於是堯聽四岳用鯀治水九年而水不息功用不成於是帝堯乃求人更得舜舜登用攝行天子之政廵狩行視鯀之治水無狀乃殛鯀於羽山以死天下皆以舜之誅為是於是舜舉鯀子禹而使續鯀之業堯崩帝舜問四岳曰有能成美堯之事者使居官皆曰伯禹為司空可成美堯之功舜曰嗟然命禹汝平水土禹拜稽首譲於契后稷咎繇舜曰汝其往視爾事矣禹傷先人父鯀功之不成受誅乃勞身焦思居外十三年過家門不敢入左傳曰初臼季使過兾見兾缺耨其妻饁之敬相待如賓與之歸言諸文公曰敬德之聚也能敬必有徳徳以治民君請用之臣聞之出門如賓承事如祭仁之則也公曰其父有罪可乎對曰舜之罪也殛鯀其舉也興禹管敬仲桓之賊也實相以濟康誥曰父不慈子不祗兄不友弟不共不相及也詩曰采葑采菲無以下體君取節焉可也文公以為下軍大夫夫音扶以璵音歟璠音煩之玼音此而棄其璞以一人之罪而兼其衆則天下無美寳信士也淮南子曰夏后之璜不能無考明月之珠不能無纇晁生言諸侯之地大富則驕奢急即合從故因吳之過而削之㑹稽因楚之罪而奪之東海所以均輕重分其權而為萬世慮也弦髙誕於秦而信於鄭鄭世家曰繆公元年春秦繆公使三將將兵欲襲鄭至滑逢鄭商人弦髙詐以十二牛勞軍故秦兵不至而還晉敗之於崤汜論曰惟聖人為能知權言而必信期而必當天下之髙行也直躬者其父攘羊而子證之尾生與婦人期而死之直而證父信而溺死雖有直信孰能貴之夫三軍矯命過之大者也秦繆公興兵襲鄭過周而東鄭賈入弦髙將西販牛道遇秦師於周鄭之間乃矯鄭伯之命犒以十二牛賓秦師而却之以存鄭國故事有所至信反為過誕反為功晁生忠於漢而讐於諸侯晁錯傳曰晁錯已死謁者僕射鄧公為校尉擊吳椘軍為將軍上書言軍事謁見上上問曰道軍所來聞晁錯死吳楚罷不鄧公曰吳王為反數十年矣發怒削地以誅錯為名其意非在錯也且臣恐天下之士噤口不敢復言也上曰何哉鄧公曰夫晁錯患諸侯強大不可制故請削地以尊京師萬世之利也計畫始行卒受大戮内杜忠臣之口外為諸侯報仇臣竊為陛下不取也於是景帝黙然良乆曰公言善吾亦恨之乃拜鄧公為城陽中尉人臣各死其主為其國用此解揚之所以厚於晉而薄於荆也奉使篇曰楚莊王舉兵伐宋宋告急晉景公欲發兵救宋伯宗諫曰天方開楚未可伐也乃求壯士得霍人解揚字子虎往命宋毋降道過鄭鄭新與楚親乃執解揚而獻之楚楚王厚賜與約使反其言令宋趣降三要解揚乃許於是楚乘揚以樓車令呼宋使降遂倍楚約而致其晉君命曰晉方悉國兵以救宋宋雖急慎毋降楚晉兵今至矣楚莊王大怒將烹之解揚曰君能制命為義臣能承命為信受吾君命以出雖死無二王曰汝之許我已而倍之其信安在解揚曰死以許王欲以成吾君命臣不恨也顧謂楚臣曰為人臣無忘盡忠而得死者楚王諸弟皆諫王赦之於是莊王卒赦解揚而歸之晉爵之為上卿故後世言霍虎刺權第九大夫曰今夫音扶越之具區楚之雲夢宋之鉅野齊之孟諸有國之富而伯音霸王之資也人主統而一之則強不禁則亡齊以其腸胃予人家強而不制枝大而折榦以專巨海之富而擅魚鹽之利也勢足以使衆恩足以䘏下是以齊國内倍而外附權移於臣政墜於家公室卑而田宗強轉轂游海者盖三千乘去聲失之於本而末不可救齊世家曰田釐子乞事齊景公為大夫其收賦稅於民以小斗受之其粟予民以大斗行隂德於民而景公弗禁由此田氏得齊衆心宗族益強民思田氏晏子數諫景公景公弗聽已而使於晋與叔向私語曰齊國之政其卒歸於田氏矣田乞卒子常代立是為田成子相簡公復修釐子之政以大斗出貸以小斗收齊人歌之曰嫗乎采芭歸乎田成子管子曰權不兩錯政不二門故曰脛大於股者難以歩指大於臂者難以把本小末大不能相使也范睢曰木實繁者披其枝披其枝者傷其心大其都者危其國尊其臣者卑其主韓非子曰愛臣太親必危其身人臣太貴必易主位主妾無等必危嫡子兄弟不服必危社稷千乘之君無備必有百乘之臣在其側以徙其民而傾其國萬乗之君無備必有千乗之家在其側以徙其威而傾其國是以姦臣蕃息主道衰亡是故諸侯之博大天子之害也羣臣之大富君主之敗也故曰腓大於股難以趨走主失其神虎随其後說山訓曰末不可以強於本指不可以大於臂下輕上重其覆必易今山川海澤之原非獨雲夢孟諸也鼓金煑鹽其勢必深居幽谷而人民所罕至姦猾交通山海之際恐生大姦乗利驕溢敦樸滋偽則人之貴本者寡大農鹽鐵丞孔僅等上請願募民自給費因縣官器煑鹽予用以杜浮偽之路由此觀之令意所禁㣲有司之慮亦逺矣文學曰有司之慮逺而權家之利近令意所禁微而僣奢之道著自利害之設三業之起貴人之家雲行於塗如淳曰如雲而行言其衆多也轂擊於道顔師古曰轂擊言車乘交馳其轂相擊也攘公法申私利跨山澤擅官市非特巨海魚鹽也執國家之柄以行海内非特田常之勢陪臣之權也威重於六卿富累於陶衛魏冉封陶商鞅姓衛輿服僣於王公宫室溢於制度并兼列宅隔絶閭巷閣道錯連足以游觀鑿池曲道足以騁騖臨淵釣魚放犬走兎隆豺鼎力蹋音逹鞠闘雞蹋鞠以革為圜囊實以毛髮蹵蹋為戲劉向别録云黄帝造以練武士者也左傳曰季郈之雞闘季氏介其雞郈氏為之金距中山素女撫流徵音紙於堂上鳴鼓巴歈音俞作於堂下宋玉曰歌於郢中者引商列羽雜以流徵和者止數人其曲彌髙其和彌寡西域傳云巴歈二州名其人善舞或曰歈水之人善歌舞漢髙帝伐秦巴人從軍歌舞䧟陣髙祖采其聲後人因加此字一曰吳歌曰歈婦女被羅紈婢妾曳絺紵子孫連車列騎田獵出入畢戈捷健是以耕者釋耒而不勤百姓氷釋而解音懈怠何者已為之而彼取之僣侈相效上升而不息此百姓所以滋偽而罕歸本也大夫曰官尊者禄厚本美者枝茂故文王德而子孫封周公相去聲而伯禽富琴操曰文王以紂時為岐侯躬脩道徳執行仁義百姓附親是時紂為無道刳胎斮渉廢壊仁人天統易運諸侯瓦解皆歸文王傳曰文王兼制天下立國七十一姬姓獨居五十二周之子孫苟不狂惑莫不為天下顯諸侯明堂篇曰昔殷紂亂天下脯鬼侯以饗諸侯是以周公相武王以伐紂武王崩成王幼弱周公相天子之位以治天下六年朝諸侯於明堂制禮作樂頒度量而天下大服七年致政於成王成王以周公有大勲勞於天下是以封周公曲阜地方七百里革車千乘命魯公世世祀周公以天子之禮樂是以魯君孟春乘大輅載弧韣旂十有二旒日月之章祀帝於郊配以后稷天子之禮也水廣者魚大父尊者子貴奉使篇曰江漢之魚吞舟大國之樹必巨傳去聲曰河海潤千里盛徳及四海况夫妻子乎莊子曰河潤九里澤及三族故夫貴於朝音潮妻貴於室富曰苟美古之道也孟子曰王子與人同而如彼者居使然也居編户之列而望卿相去聲之子孫是以跛音避夫之欲及樓季也許慎曰樓季魏文侯之弟無錢而欲千金之寳不亦虗望哉韓嬰曰盈把之木無合拱之枝榮澤之水無吞舟之魚文學曰禹稷自布衣思天下有不得其所者若已推而納之溝中故起而佐堯平治水土教民稼穡其自任天下如此其重也豈云食禄以養去聲其妻子而已乎孟子曰禹稷當平世三過其門而不入孔子賢之禹思天下之民有溺者由已溺之也稷思天下之民有飢者由已飢之也是以如是其急也夫音扶食萬人之力者蒙其憂任其勞韓信曰乗人之車者載人之患衣人之衣者懐人之憂食人之食者死人之事一人失職一官不治皆公卿之累也故君子之仕行其義非樂音洛其勢也受祿以潤賢非私其利見賢不隠食禄不專此公叔之所以為文魏成子所以為賢也論語云公叔文子之臣大夫僎與文子同升諸公孔子曰可以為文矣魏世家曰魏文侯謂李克曰先生嘗教寡人曰家貧則思良妻國亂則思良相今所置非成則璜二子何如李克對曰臣聞之卑不謀尊踈不謀戚臣在闕門之外不敢當命文侯曰先生臨事勿讓李克曰君不察故也居視其所親富視其所與逹視其所舉窮視其所不為貧視其所不取五者足以定之矣何待克哉文侯曰先生就舎寡人之相定矣李克趨而出過翟璜之家翟璜曰今者聞君召先生而卜相果誰為之李克曰魏成子為相矣翟璜忿然作色曰以耳目之所覩記臣何負於魏成子西河之守臣之所進也君内以鄴為憂臣進西門豹君謀欲伐中山臣進樂羊中山已拔無使守之臣進先生君之子無傅臣進屈侯鮒臣何以負於魏成子李克曰且子之言克於子之君者豈將比周以求大官哉君問而置相非成則璜二子何如對曰君不察故也居視其所親富視其所與逹視其所舉窮視其所不為貧視其所不取五者足以定之矣何待克哉是以知魏成子之為相也且子安得與魏成子比乎魏成子以食禄千鍾什九在外什一在内是以東得卜子夏田子方段干木此三人者君皆師之子之所進五人者君皆臣之子惡得與魏成子比也翟璜逡廵再拜曰璜鄙人也失對願卒為弟子故周德成而後封子孫不以為黨周公功成而後受封天下不以為貪今則不然親戚相推朋黨相舉公尊於位子溢於内夫貴於朝音潮妻謁行於外無周公之徳而有其富無管仲之功而有其侈故編户跛音避夫而望疾歩也管仲傳曰管仲富擬於公室有三歸反坫齊人不以為侈刺復第十大夫乃為色矜而心不懌曰但居者不知負戴之勞從旁議者與當局者異憂方今為天下腹居郡諸侯並臻中外未然心憧憧音冲若渉大川遭風而未薄通作泊是以夙夜思念國家之用寢而忘寐饑而忘食計數不離於前萬事簡閱於心丞史噐小不足與謀獨鬱大道思覩文學若俟周召而望子髙周召周公旦召公奭也郎顗曰昔唐堯在上羣龍為用文武創徳周召作輔是以能逹天地之功增日月之耀者也髙士傳曰伯成子高者唐虞之時至禹去而耕禹往趨而問之子髙曰昔堯治天下至公無私不賞而民勸不罰而民畏今子賞而不勸罸而不威徳自此衰刑自此作夫子盍行乎無落吾事俋俋乎耕而不顧御史按事郡國察亷舉賢才嵗不乏也今賢良文學臻者六十餘人懐六藝之術騁意極論宜若開光發䝉信往而乖於今道古而不合於世務意者不足以知士也將多飾文誣能以亂實耶何賢士之難覩也自千乗去聲兒寛以治尚書位冠去聲九卿兒寛千乗人也及所聞覩選舉之士擢升贊憲甚顯然未見絶倫比而為縣官興滯立功也文學曰輸子之制材木也正其規矩而鑿枘音芮調師曠之諧五音也正其六律而宫商調拾遺記曰師曠者或出於晋靈之世以主樂官妙辨音律晋平公之時以隂陽之樂顯於當世燻目為瞽人以絶塞衆慮專心於星筭音律之中考鐘吕以定四時無毫釐之異孟子曰公輸子之巧不以規矩不能成方圓師曠之聪不以六律不能正五音修務訓曰無規矩雖奚仲不能以定方圓無凖䋲雖魯般不能以定曲直當世之工匠不能調其鑿枘音芮則改規矩不能協聲音則變舊律是以鑿枘音芮刺音郎逹反戾而不合聲音泛越而不和夫音扶舉規矩而知宜吹律而知變上也因循而不作以俟其人次也韓非子曰巧匠目意中䋲然必先以規矩為度上智捷舉中事然必以先王之法為比是以曹丞相日飲醇酒曹參世家曰參始㣲時與蕭何善及為將相有郤至何且死所推賢唯參參代何為漢相國舉無所變更一遵蕭何約束擇郡國吏木拙於文辭重厚長者即召除為丞相史吏之言文刻深欲務聲名者輒斥去之日夜飲醇酒卿大夫已下吏及賓客見參不視事来者皆欲有言至者參輙飲以醇酒間之必有所言復飲之醉而後去終莫得開說以為常相舍後園近吏舍吏舍日飲歌呼從吏惡之無如之何乃請參游園中聞吏醉歌呼從吏幸相國召按之乃反取酒張坐飲亦歌呼與相應和參見人之有細過專掩匿覆盖之府中無事百姓歌之曰蕭何為法顜若畫一曹參代之守而勿失載其清淨民以寧一兒大夫閉口不言兒寛傳曰寛治尚書以射策為掌故功次補廷尉文學卒史寛為人温良有廉智自將善屬文然懦於武口弗能發明也時張湯為廷尉廷尉府盡用文史法律之吏而寛以儒生在其間見謂不習事不署曹除為從史及遷左内史寛既治民勸農業緩刑罰理獄訟卑體下士務在於得人心擇用仁厚士推情與下不求名聲吏民大信愛之故治大者不可以煩煩則亂治小者不可怠怠則廢春秋曰其政恢卓恢卓可以為卿相去聲其政察察察察可以為匹夫夫音扶綱維不張禮義不行公卿之憂也案上之文期㑹之事丞史之任也尚書曰俊乂在官百僚師師百工惟時庶尹允諧言官得其人人任其事故官治而不亂事起而不廢士守其職大夫理其位公卿總要執凡而已故任能者責成而不勞任已者事廢而無功子賤治單父彈鳴琴身不下堂而單父治巫馬期以星出以星入日夜不處以身親之而單父亦治巫馬期問於子賤子賤曰我任人子任力任人者佚任力者勞韓非子曰事在四方要在中央聖人執要四方来效吕氏春秋曰天無形而萬物以成至精無象而萬物以化大聖無事而千官盡能主術訓曰夫乗衆人之智則無不任也用衆人之力則無不勝也千鈞之重烏獲不能舉也衆人相一則百人有餘力矣是故任一人之力者則烏獲不足恃乗衆人之智者則天下不足有也桓公之於管仲耳而目之故君子勞於求賢逸於用人豈云殆哉雜事篇曰有司請吏於齊桓公桓公曰以告仲父有司又請桓公曰以告仲父若是者二在側者曰一則告仲父二則告仲父易哉為君桓公曰吾未得仲父則難已得仲父曷為其不易也故王者勞於求人佚於得賢吕氏春秋曰賢主勞於求人而佚於治事昔周公之相去聲也謙卑而不鄰以勞天下之士是以俊乂滿朝音潮賢知去聲充門傳曰周公踐天子之位七年布衣之士所贄而師者十二人所友見者十二人窮巷白屋先見者四十九人時進善百人教士千人宫朝者萬人成王封伯禽於魯周公誡之曰往矣子無以魯國驕士吾文王之子武王之弟成王之叔父也又相天下吾於天下亦不輕矣然一沐三握髪一飯三吐哺猶恐失天下之士吾聞徳行寛裕守之以恭者榮土地廣大守之以儉者安禄位尊盛守之以卑者貴人衆兵強守之以畏者勝聪明睿智守之以愚者善博文強記守之以淺者智夫此六者皆謙德也夫貴為天子富有天下由此徳也不謙而失天下亡其身者桀紂是也可不慎歟故易有一道大足以守天下中足以守其國家近足以守其身謙之謂也夫天道虧盈而益謙地道變盈而流謙鬼神害盈而福謙人道惡盈而好謙是以衣成則必缺袵宫成則必缺隅屋成則必加拙示不成者天道然也易曰謙亨君子有終吉詩曰湯降不遲聖敬日躋誡之哉其無以魯國驕士也語林曰賢者國之紀人之望自古帝王皆以之安危故書曰惟后非賢不乂惟賢非后不食昔者周公體大聖之德而勤於吐握由是天下之士爭歸之向使周公驕而且吝亦當髙翔逺去所至寡矣孔子無爵位以布衣從才士七十有餘人皆諸侯卿相去聲之人也况處三公之尊以養去聲天下之士哉仲尼弟子列傳孔子曰受業身通者七十有二人皆異能之士也孔子世家曰楚昭王將以書社地七百里封孔子楚令尹子西曰王之使使諸侯有如子貢者乎曰無有王之輔相有如顔回者乎曰無有王之將率有如子路者乎曰無有王之官尹有如宰予者乎曰無有且楚之祖封於周號為子五十里今孔丘述三王之法明周召之業王若用之則楚安得世世堂堂方數千里乎夫文王在豐武王在鎬百里之君卒王天下今孔丘得據土壤賢弟子為佐非楚之福也昭王乃止吕氏春秋曰孔墨布衣之士也萬乗之主千乗之君不能與之爭士也劉向曰春秋之後衆賢輔國者既没而禮義衰矣孔子雖論詩書定禮樂王道燦然分明以匹夫無勢化之者七十二人而已皆天下之俊也時君莫尚之是以王道遂用不興故曰非威不立非勢不行今以公卿之上位爵禄之美而不能致士則未有進賢之道堯之舉舜也賓而妻去聲之桓公舉管仲也賓而師之泰族訓曰堯治天下政教平徳潤洽在位七十載乃求所屬天下之統令四岳舉側陋四岳舉舜而薦之堯堯乃妻以二女以觀其内任以百官以觀其外既入大麓烈風雷雨不迷乃屬以九子贈以昭華之玉而傳天下焉孟子曰桓公之於管仲學焉而後臣之故不勞而霸以天子而妻去聲匹夫可謂親賢矣以諸侯而師匹夫可謂敬賓矣是以賢者從之若流歸之不疑孔子曰以富貴為人下者何人不與以富貴敬愛人者何人不親今當世在位者既無燕昭之下士鹿鳴之樂音洛賢而行臧文子椒之意雜事篇曰燕易王時國大亂齊閔王興師伐燕屠燕國載其寳噐而歸易王死及燕國復太子立為燕王是為燕昭王昭王賢即位卑身厚幣以招賢者謂郭隗曰齊因孤國之亂而襲破燕孤極知燕小力少不足以報然得賢士與共國以雪先生之醜孤之願也先生視可者得身事之隗曰臣聞古之人君有以千金求千里馬者三年不能得㳙人言於君曰請求之君遣之三月得千里馬買其骨五百金反以報君君大怒曰所求者生馬安用死馬捐五百金涓人對曰死馬且市之五百金况生馬乎天下必以王為能市馬馬今至矣於是不朞年千里馬至者二今王誠欲必致士請從隗始隗且見事况賢於隗者乎豈逺千里哉於是昭王為隗築宫而師之樂毅自魏往鄒衍自齊往劇辛自趙往士爭走燕燕王弔死問孤與百姓同甘苦二十八年燕國殷富士卒樂軼輕戰於是遂以樂毅為上將軍與秦楚三晉合謀以伐齊樂毅之筴得賢之功也詩序曰小雅鹿鳴燕羣臣嘉賓也既飯食又實幣帛筐篚以將其厚意然後忠臣嘉賓得盡其心矣孔子曰臧文仲其竊位者與知栁下恵之賢而不與立也王逸曰子椒為楚大夫處蘭芷之位而行淫慢佞諛之志又欲援引面從不賢之類使居親近無有憂國之心苟欲自進求入於君身得爵禄而已復何能敬愛賢人而舉用之也蔽賢妬能自髙其知去聲訾音紫人之才足已而不問卑士而不友以位尚賢以禄驕士而求士之用亦難矣詩傳曰楚莊王聽朝罷宴樊姬下堂而迎之曰何罷之晏也得無飢倦乎莊王曰今日聽忠賢之言不知飢倦也樊姬曰王之所謂忠賢者諸侯之客歟中國之士歟莊王曰則沈令尹也樊姬掩口而笑王曰姬之所笑何也姬曰妾得於王尚湯沐執巾櫛振袵席十有一年矣然妾未嘗不遣人之梁鄭之間求美人而進之於王也與妾同列者十人賢於妾者二人妾豈不欲擅王之寵哉不敢私願蔽衆美欲王之多見則娛今沈令尹相楚數年矣未嘗見進賢而退不肖也又焉得為忠賢乎莊王旦朝以樊姬之言告沈令尹令尹避席而進孫叔敖叔敖治楚三年而楚國霸楚史援筆而書之於䇿曰楚之霸樊姬之力也詩曰百爾所思不如我所之樊姬之謂也傳曰傷善者國之殘也䔩善者國之讒也列子曰以賢臨人未有得人者也以賢下人未有不得人者也主術訓曰文王智而好問故聖武王勇而好問故勝說林訓曰一目之羅不可以得鳥無餌之釣不可以得魚遇士無禮不可以得賢大夫繆然不言盖賢良長歎息焉御史進曰太公相去聲文武以王去聲天下管仲相去聲桓公以伯音霸諸侯要畧曰文王之時紂為天子賦歛無度戮殺無止康樂沈湎宫中成市作為炮烙之刑刳諫者剔孕婦天下同心而苦之文王四世纍善修德行義處岐周之間地方不過百里天下二老歸之文王欲以卑弱制強暴以為天下去殘除賊而成王道故太公之謀生焉文王業之而不卒武王繼文王之業用太公之謀悉索薄賦躬擐甲胄以伐無道而討不義誓師牧野以踐天子之位齊世家曰桓公既得管仲修齊國政連五家之兵設輕重魚鹽之利以贍貧窮禄賢能齊人皆說七年㑹諸侯於甄而桓公於是始霸焉故賢者得位猶龍得水騰虵音蛇遊霧也韓非子曰飛龍乗雲騰蛇遊霧雲罷霧霽而龍蛇與螾螘同也則失其所乗也賢人而詘於不肖者權輕位卑也不肖而能服於賢者權重位尊也叢談曰騰虵遊霧而升騰龍乗雲而舉猿得木而挺魚得水而騖處地宜也孔子曰自季孫之賜我千鍾而友益親自南宫項叔之乗我車也而道加行故道有時而後重有勢而後行㣲夫二子之賜丘之道幾於廢也公孫丞相去聲以春秋說音稅先帝遽即三公處周召之列據萬里之勢為天下凖䋲衣不重彩食不兼味以先天下而無益於治公孫𢎞傳曰𢎞為人恢竒多聞嘗稱以為人主病不廣大人臣病不儉節𢎞為布被食不重肉毎朝㑹議開陳其端令人主自擇不肯面折廷爭於是天子察其行敦厚辨論有餘習文法吏事而又緣飾以儒術上大說之西京雜記曰公孫𢎞起家徒歩為丞相故人髙賀從之𢎞食以脫粟飯覆以布被賀怨曰何用故人富貴為脫粟布被我自有之𢎞大慙賀告人曰公孫𢎞内服貂蟬外衣麻枲内厨五鼎外膳一殽豈可以示天下於是朝廷疑其矯焉𢎞歎曰寜逢惡賓不逢故人食貨志曰自公孫𢎞以春秋之義䋲臣下取漢相吏益慘急而法令察當是時招尊方正賢良文學之士或至公卿大夫公孫𢎞以宰相布被食不重味為天下先然而無益於治修務於功利矣博士褚泰泰平凖書作大徐偃等承明詔建節馳傳去聲廵省郡國漢武紀曰元狩六年六月詔曰日者有司以幣輕多姦農傷而末衆又禁兼并之塗故改幣以約之稽諸往古制宜於今廢期有月而山澤之民未諭夫仁行而從善義立則俗易意奉憲者所以導之未明與將百姓所安殊路而矯䖍吏因乗勢以侵蒸庶邪何紛然其擾也今遣博士大等六人分循行天下存問鰥寡廢疾無以自振業者貸與之諭三老孝弟以為民師舉獨行之君子徵詣行在所朕嘉賢者樂知其人廣宣厥道士有特招使者之任也詳問𨼆處亡位及寃失職姦猾為害野荒治苛者舉奏郡國有所以為便者上丞相御史以聞舉孝亷勸元元而流俗不改漢紀曰元朔元年冬十有一月詔曰夫十室之邑必有忠信三人並行厥有我師今或至闔郡不薦一人是化不下究而積行之君子壅於上聞也二千石官長紀綱人倫將何以佐朕燭幽隠勸元元厲蒸庶崇鄉黨之訓哉且進賢受上賞蓛賢䝉顯戮古之道也其議不舉賢者罪有司奏議曰古者諸侯貢士一適謂之好德再適謂之賢賢三適謂之有功乃加九錫不貢士一則黜爵再則黜地三則黜爵地畢夫附下罔上者死附上罔下者刑與聞國政而無益於民者斥在上位而不得進賢者退此所以勸善黜惡也今詔書昭先帝聖緒令二千石舉孝亷所以勸元元移風易俗也不舉孝不奉詔當以不敬論不察亷不勝任也當免奏可招舉賢良方正文學之士超遷官爵或至卿大夫班固曰公孫𢎞卜式兒寛皆以鴻漸之翼困於燕雀逺迹羊豕之間非遇其時焉能致此位乎是時漢興六十餘載海内又安府庫充實而四夷未賓制度多闕上方欲用文武求之如弗及始以蒲輪迎枚生見主父而歎息羣士慕響異人並臻卜式㧞於芻牧𢎞羊擢於賈𥪡衛青奮於奴僕日磾出於降虜斯亦曩時版築飯牛之朋已漢之得人於兹為盛儒雅則公孫𢎞董仲舒兒寛篤行則石建石慶推賢則韓安國鄭當時定令則趙禹張湯文章則司馬遷相如滑稽則東方朔枚臯應對則嚴助朱買臣厯數則唐都洛下閎協律則李延年奉使則張騫蘇武受遺則霍光金日磾其餘不可勝紀是以興造功業制度遺文後世莫及非特燕昭之薦士文王之廣賢也君道篇曰燕昭王問於郭隗曰寡人地狹人寡齊人削取八城匈奴驅馳樓煩之下以孤之不肖得承宗廟恐危社稷存之有道乎郭隗曰有然恐王之不能用也昭王避席願請聞之郭隗曰帝者之臣其名臣也其實師也王者之臣其名臣也其實友也霸者之臣其名臣也其實賓也危國之臣其名臣也其實虜也今王將東面目指氣使以求臣則厮役之材至矣南面聼朝不失揖讓之禮以求臣則人臣之材至矣西面等禮相亢下之以色不乗勢以求臣則朋友之材至矣北面拘指逡廵而退以求臣則師傅之材至矣如此則上可以王下可以霸唯王擇焉燕王曰寡人願學而無師郭隗曰王誠欲興道隗請為天下之士開路於是燕王常置郭隗上坐南面居三年蘓子聞之從周歸燕鄒衍聞之從齊歸燕樂毅聞之從趙歸燕屈景聞之從楚歸燕四子畢至果以弱燕并強齊夫燕齊非均權敵戰之國也所以然者四子之力也詩曰濟濟多士文王以寜此之謂也周紀曰西伯曰文王遵后稷公劉之業則古公公季之法篤仁敬老慈幼禮下賢者日中不暇食以待士士以此多歸之伯夷叔齊在孤竹聞西伯善養老盍往歸之太顛閎夭散宜生鬻子辛甲大夫之徒皆往歸之呂氏春秋曰國雖小其食足以食天下之賢者其車足以乗天下之賢者其財足以禮天下之賢者與天下之賢者為徒此文王之所以王也然而未覩功業所成殆非龍虵音蛇之才而鹿鳴之所樂音洛賢也文學曰氷炭不同器日月不並明顔淵曰鮑魚蘭芷不同篋而藏堯舜桀紂不同國而治韓非子曰氷炭不同器而乆寒暑不兼時而至劉峻曰薫蕕不同器梟鸞不接翼當公孫𢎞之時人主方設謀垂意於四夷故權譎之謀進荆楚之士用將帥或至封侯食邑而勉獲者咸蒙厚賞是以奮擊之士由此興其後干戈不休軍旅相望甲士麋弊縣官用不足故設險興利之臣起磻溪熊羆之士隠平凖書曰武帝之時嚴助朱買臣等招來東甌事两越江淮之間蕭然煩費矣唐䝉司馬相如開路西南夷鑿山通道千餘里以廣巴蜀巴蜀之民罷焉彭吳賈滅朝鮮置滄海之郡則燕齊之間靡然發動及王恢設謀馬邑匈奴絶和親侵擾北邉兵連而不觧天下苦其勞而干戈日滋行者齎居者送中外騷擾而相奉百姓抗弊以巧法財賂衰耗而不贍入物者補官出貨者除罪選舉凌遲㢘恥相冐武力進用法嚴令具興利之臣自此始也尚書中候曰吕尚釣磻溪得玉璜刻曰姬受命吕佐旌六韜曰文王卜田史扁為卜曰于渭之陽將大得焉非熊非羆非虎非彲兆得公侯天遺汝師文王齋戒三日田于渭陽卒見吕尚坐茅以漁武王曰朂哉夫子尚桓桓如虎如貔如熊如羆于商郊弗迓克奔以役西土朂哉夫子涇淮造渠以通漕運東郭偃孔僅建鹽鐵册通作䇿諸利富者買爵販官免刑除罪貢禹曰孝文皇帝時貴亷潔賤貪汚賈人贅壻及吏生贓者禁固不得為吏無贖罪之法故令行禁止海内大化武帝始臨天下尊賢用士自見功大遂從嗜欲廼行一時之變使犯法者贖罪入榖者補吏是以官亂民貧盗賊並起蕭望之曰天漢四年常使死罪人入五十萬錢減死罪一等豪強吏民請奪假貸至為盗賊以贖罪其後姦邪横暴羣盗並起至攻城邑殺郡守充滿山谷吏不能禁明詔遣繡衣使者以興兵撃之誅者過半然後衰止公用彌多而為者狥私上下無求百姓不堪抗弊而從法故􅉃音慘急之臣進而見知廢格音閣之法起平凖書曰吏道雜而多端則官職耗廢自公孫𢎞以春秋之義䋲臣下取漢相張湯用峻文决理為廷尉於是見知之法生而廢格沮誹窮治之獄用矣其明年淮南衡山江都王謀反迹見而公卿尋端治之竞其黨與而坐死者數萬人長吏益惨急而法令明察張晏曰見知謂吏見知不舉故為放縱以其罪罪之也如淳曰廢格謂廢格天子文法使不行也杜周減宣之屬以峻文决理貴而王温舒之徒以鷹隼擊殺顯平凖書曰御史大夫張湯方隆貴用事减宣杜周等為中丞義縱尹齊王温舒等用惨急刻深為九卿酷吏傳云以鷹擊毛摯為治徐廣曰摯鳥將擊必張羽毛也其欲據仁義以道事君者寡偷合取容者衆獨以一公孫𢎞如之何論儒第十一御史曰文學祖述仲尼稱誦其徳以為自古及今未之有也然孔子修道齊魯之間教化洙泗之上弟子不為變當世不為治魯國之削滋甚齊宣王褒儒尊學孟軻淳于髠之徒受上大夫之禄不任職而論國事盖齊稷下先生千有餘人齊世家曰宣王喜文學游說之士自如騶衍淳于髠田駢接予慎到環淵之徒七十六人皆腸列第為上大夫不治而議論是以齊稷下學士復盛且數百千人劉向别録曰齊有稷門城門也談說之士期㑹於稷下也虞喜曰齊有稷山立館其下以待游士也當此之時非一公孫𢎞也弱燕攻齊長驅至臨淄湣音敏王遁逃死於莒而不能救王建禽通作擒於秦與之俱虜而不能存若此儒者之安國尊君未始有效也文學曰無鞭策雖造父不能調駟馬無勢位雖舜禹不能治萬民秦紀曰造父以善御幸於周繆王得驥温驪騄耳驊騮之駟西廵狩樂而忘歸徐偃王作亂造父為繆王御長驅歸周以救亂繆王以趙城封造父荀子曰造父者天下之善御者也無輿馬則無所見其能羿者天下之善射者也無弓矢則無所見其巧大儒者善調一天下者也無百里之地則無所見其功孔子曰鳳鳥不至河不出圖吾已矣夫音扶故軺音韶車良馬無以馳之釋名曰軺車軺遥也逺也四向逺望之車也古本作翹車逸詩曰翹翹車乗招我以弓聖德仁義無所施之指武篇曰五帝三王教以仁義而天下變也孔子亦教以仁義而天下不從者何也昔明王有紱冕以尊賢有斧鉞以誅惡故其賞至重而刑至深而天下變孔子賢顔淵無以賞之賤孺悲無以罰之故天下不從是故道非權不立非勢不行是道尊然後行齊宣之時不顯賢進士國家富強威行敵國詩傳曰孟子說齊宣王而不說淳于髠侍孟子曰今日說公之君公之君不說意者其未知善之為善乎淳于髠曰夫子亦誠無善耳昔者瓠巴鼓瑟而潜魚出聼伯牙鼓琴而六馬仰秣魚馬猶知善之為善而况君人者也孟子曰夫震雷之起也破竹折木震驚天下而不能使聾者卒有聞日月之明徧照天下而不能使盲者卒有見今公之君若此也淳于髠曰不然昔者揖封生髙商齊人好歌杞梁之妻悲哭而人稱詠夫聲無細而不聞行無隠而不形夫子苟賢居魯而魯國之削何也孟子曰不用賢削何有也吞舟之魚不居潜澤度量之士不居汙世夫蓺冬至必彫吾亦時矣詩曰不自我先不自我後非遭凋世者歟尊賢篇曰齊宣王坐淳于髠侍宣王曰先生論寡人何好淳于髠曰古者所好四而王所好三焉宣王曰古者所好何與寡人所好淳于髠曰古者好馬王亦好馬古者好味王亦好味古者好色王亦好色古者好士王獨不好士宣王曰國無士耳有則寡人亦說之矣淳于髠曰古者驊騮騏驥今無有王選於衆王好馬矣古者有豹象之胎今無有王選於衆王好味矣古者有毛嬙西施今無有王選於衆王好色矣王必將待堯舜禹湯之士而後好之則堯舜禹湯之士亦不好王矣宣王嘿然無以應齊䇿曰先生王斗造門而欲見齊宣王宣王使謁者延入王斗曰斗趨見王為好勢王趨見斗為好士於王何如使者復還報王曰先生徐之寡人請從宣王因趨而迎之於門與入曰寡人奉先君之宗廟守社稷聞先生直言正諌不諱王斗對曰王聞之過斗生於亂世事亂君焉敢直言正諫宣王忿然作色不說有間王斗曰昔先君桓公所好者五九合諸侯一匡天下天子授籍立為太伯今王有四焉宣王說曰寡人愚陋守齊國唯恐夫抎之焉能有四焉王斗曰先君好馬王亦好馬先君好狗王亦好狗先君好酒王亦好酒先君好色王亦好色先君好士而王不好士宣王曰當今之世無士寡人何好王斗曰世無騏驥騄駬王之駟已備矣世無東郭俊盧氏之狗王之走狗已具矣世無毛嬙西施王宫已充矣王亦不好士也何患無士王曰寡人憂國愛民固願得士以治之王斗曰君之憂國愛民不若王愛尺穀也王曰何謂也王斗曰王使人為冠不使左右便辟而使工者何也為能之也今王治齊非左右便辟無使也臣故曰不如愛尺糓也宣王謝曰寡人有罪國家於是舉士五人任官齊國大治及湣音敏王奮二世之餘烈南舉楚淮北并巨宋苞十二國西摧三晉卻強秦五國賓從鄒魯之君泗上諸侯皆入臣齊世家曰湣王七年與宋攻魏敗之觀澤十二年攻魏二十三年與秦撃敗楚於重丘二十六年齊君韓魏共攻秦至函谷軍焉二十九年齊佐趙滅中山三十六年王為東帝三十八年伐宋宋王出亡死於温齊南割楚之淮北西侵三晉欲以并周室為天子泗上諸侯鄒魯之君皆稱臣諸侯恐懼矜功不休百姓不堪諸侯諫不從各分散慎到捷子亡去田駢如薛而孫卿適楚内無良臣故諸侯合謀而伐之齊䇿曰齊負郭之民有孤狐咺者正議閔王斮之檀衢百姓不附齊孫室子陳舉直言殺之東閭宗室離心司馬穰苴為政者也殺之大臣不親以故燕舉兵使昌國君將而撃之齊使向子將而應之齊軍破向子輿一乗亡逹子收餘卒復振與燕戰求所以賞者閔王不肯與軍破走王奔莒淖齒數之曰夫千乗博昌之間方數百里雨血霑衣王知之乎王曰不知嬴博之間地坼至泉王知之乎王曰不知人有當闕而哭者求之則不得去之則聞其聲王知之乎王曰不知淖齒曰天雨血霑衣者天以告也地坼至泉者地以告也人有當闕而哭者人以告也天地人皆以告矣而王不知戒焉何得無誅乎於是殺閔王於鼔里雜事篇曰齊閔王亡居衛晝日歩走謂公玉丹曰我已亡矣而不知其故吾所以亡者其何哉公玉丹對曰臣以王為已知之矣王故尚未之知耶王之所以亡者以賢也以天下之主皆不肖而惡王之賢也因與合兵而攻王此王之所以亡也閔王慨然歎息曰賢固若是其苦耶丹又謂閔王曰古人有辭天下無憂色者臣聞其聲於王見其實王名稱東帝實有天下去國居衛容貎充盈顔色發揚無重國之意王曰甚善丹知寡人自去國而居衛也帶三益矣遂以自賢驕盈不止閔王亡走衛衛君避宫舍之稱臣而供具閔王不遜衛人侵之閔王去走鄒魯有驕色鄒魯不納遂走莒楚使淖齒將兵救齊因相閔王淖齒擢閔王之筋而懸之廟梁宿昔而殺之而與燕共分齊地悲夫閔王臨大齊之國地方數千里然而兵敗於諸侯地奪於燕昭宗廟䘮亡社稷不祀宫室空虗身亡逃竄甚於徒𨽻尚不知所以亡甚可痛也猶自以為賢豈不哀哉公玉丹徒𨽻之中而道之謟佞甚矣閔王不覺追而善之以辱為榮以憂為樂其亡晩矣而卒見殺故齊閔王雖至死亡終身不諭者也悲夫王建聽流說信反間音諫用后勝之計不與諸侯從親以亡國為秦所禽通作擒不亦宜乎齊策曰始皇嘗遣使者遺君王后玉連環曰齊多智而觧此環否君王后以示羣臣羣臣不知解君王后引錐椎破之謂秦使曰謹以解矣及君王后病且卒誡建曰羣臣之可用者某建曰請書之君王后曰善取筆牘受書君王后曰老婦已忘矣君王后死後后勝相齊多受秦間金玉使賓客入秦皆為變辭勸王朝秦不修攻戰之備齊王建入朝於秦雍門司馬前曰所為立王者為社稷耶為王立王耶王曰為社稷司馬曰為社稷王何以去社稷而入秦齊王還車而反即墨大夫聞雍門司馬諌而聼之則以為可即入見齊王曰齊地方數千里帶甲數百萬夫三晋大夫皆不便秦而在阿鄄之間者百數王收而與之百萬之衆使收三晋之故地即臨晋之闗可以入矣鄢郢大夫不欲為秦而在城南下者百數王收而與之百萬之師使收楚故地即武闗可以入矣如此則齊威可立秦國可亡矣舍南面之稱制乃西面而事秦竊為大王不取也齊王不聼秦使陳馳誘齊王内之約與五百里之地齊王不聼即墨大夫而聼陳馳遂入秦處之共松栢之間餓而死齊世家曰始君王后事秦謹與諸侯信齊亦東邊海上秦日夜攻三晉燕楚五國各自救於秦以故王建立四十餘年不受兵君王后死后勝相齊多受秦間金多使賓客入秦秦又多予金客皆為反間勸王去從朝秦不修攻戰之備不助五國攻秦秦以故得滅五國五國已亡秦兵卒入臨淄民莫敢格者王建遂降遷於共故齊人怨王建不蚤與諸侯合從攻秦聼姦臣賓客以亡其國歌之曰松耶栢耶住建共者客耶疾建用客之不詳也御史曰伊尹以割烹事湯百里以飯上聲牛要平聲穆公始為苟合信然與之伯音霸王去聲何言不從何道不行孟子傳曰伊尹負鼎而勉湯以王百里奚飯牛車下而繆公用霸作先合然後引之大道故商君以王道說孝公不用即以強國之道卒以就功鄒子以儒術干世主不用即以變化始終之論卒以顯名衛鞅傳曰公孫鞅聞秦孝公下令國中求賢者將修繆公之業東復侵地廼遂西入秦因孝公寵臣景監以求見孝公孝公既見衛鞅語事良乆孝公時時睡弗聼罷而孝公怒景監曰子之客妄人耳安足用耶景監以讓衛鞅衛鞅曰吾說公以帝道其志不開悟矣後五日復求見鞅鞅復見孝公益愈然而未中㫖罷而孝公復讓景監景監亦讓鞅鞅曰吾說公以王道而未入也請復見鞅鞅復見孝公孝公善之而未用也罷而去孝公謂景監曰汝客善可與語矣鞅曰吾說公以霸道其意欲用之矣誠復見我我知之矣衛鞅復見孝公公與語不自知膝之前於席也語數日不厭景監曰子何以中吾君吾君之驩甚也鞅曰吾說君以帝王之道比三代而君曰乆逺不能待且賢君者各及其身顯名天下安能邑邑待十數年而成帝王乎故吾以強國之術說君大說之耳然亦難以比德於殷周矣孝公既用衛鞅以衛鞅為左庶長卒定變法之令孟子傳曰騶衍睹有國者益淫侈不能尚德若大雅整之於身施及黎庻矣乃深觀隂陽消息而作恠迂之變終始大聖之篇十餘萬言其語閎大不經必先驗小物推而大之至於無垠王公大人初見其術懼然顧化是以騶子重於齊適梁惠王郊迎執賓主之禮適趙平原君側行襒席如燕昭王擁彗先驅請列弟子之座而受業築碣石宮身親往師之作主運其游諸侯見尊禮如此鮑焦曰世不已知而行之不已者爽行也上不已用而干之不止者是毁亷也行爽㢘毁然且不舍惑於利者也故馬効千里不必胡代士貴成功不貴文辭呂氏春秋曰良劔期乎能斷不期乎鏌鎁良馬期乎千里不期乎驥驁孟軻守舊術不知世務故困於梁宋孔子能方不能圓故饑于黎丘孟子傳曰仲尼菜色陳蔡孟軻困於齊梁晉文公曰直而不枉不可與長往方而不圎不可與長存今晩世之儒勤徳時有乏匱言以為非因此不行自周室以來千有餘歳獨有文武成康如言必參一焉取所不能及而稱之猶躄音壁者能言逺不能行也聖人異塗同歸或行或止其趣一也商君雖革法改教志存於強國利民鄒子之作變化之術亦歸於仁義祭仲自貶損以行權時也春秋曰宋人執鄭祭仲公羊傳曰祭仲者何鄭相也何以不名賢也何賢乎祭仲以為知權也其為知權奈何古者鄭國處於留先鄭伯有善乎鄶公者通乎夫人以取其國而遷鄭焉而野留莊公死已葬祭仲將往省于留塗出於宋宋人執之謂之曰為我出忽而立突祭仲不從其言則君必死國必亡從其言則君可以生易死國可以存易亡少遼緩之則突可故出而忽可故反是不可得則病然後有鄭國古人之有權者祭仲之權是也權者何權者反於經然後有善者也權之所設舎死亡無所設行權有道自貶損以行權不害人以行權殺人以自生亡人以自存君子不為也故小枉大直君子為之繆稱訓曰行險者不得履䋲出林者不得直道汜論曰誳寸而伸尺聖人為之小枉而大直君子行之今硜硜然守一道引尾生之意即晉文之譎諸侯以尊周室不足道而管仲䝉耻辱以存亡不足稱也文學曰伊尹之於湯知聖主也百里之歸秦知明君也許慎曰伊尹處於有莘之野執鼎爼和五味以干湯欲其調隂陽行其道詩云實維阿衡實左右商王是也孟子曰百里奚時舉於秦知繆公之可與有行也而相之可謂不智乎二君之能知伯音霸王其册通作䇿素形於已非暗而以㝠㝠决事也孔子曰名不正則言不順言不順則事不成如何其茍合而以成伯音霸王也君子執徳秉義而行故造次必於是顛沛必於是孟子曰居今之朝音潮不易其俗而成千乗去聲之勢不能一朝居也寧窮饑居於陋巷安能變已而從俗也齊桓公曰萬乗之君不好仁義不輕身於布衣之士布衣之士不欲富貴不輕身於萬乗之君叢談曰君子雖窮不處亡國之勢雖貧不受亂君之禄尊乎亂世同乎暴君君子之恥也闔廬殺僚公子札去而之延陵終身不入吳國魯公殺子赤叔肸退而隠處不食其禄節士傳曰延陵季子者吳王之子也嫡同母昆弟四人長曰遏次曰餘祭次曰夷昩次曰札札即季子最小而賢兄弟皆愛之既除䘮將立季子季子辭曰曹宣公之卒也諸侯與曹人不義曹君將立子臧子臧去之遂不為也以成曹君君子曰能守節矣君義嗣也誰敢干君有國非吾節也札雖不才願附子臧以無失節固立之棄其室而耕乃舍之遏曰今若是作而與季子季子必不受請無與子而與弟弟兄迭為君而致諸侯于季子皆曰諾故諸其為君者皆輕死為勇飲食必祝曰天若有吾國必疾有禍予身故遏也死餘祭立餘祭死夷昧立夷昧死而國宜之季子也季子使而未還僚者長兄之庶子也自立為吳王季子使而還至則君事之遏之子曰王子光號曰闔閭不恱曰先君之所為不與子而與弟者凡為季子也將從先君之命則國宜之季子也如不從先君之命而與子我宜當立者也僚惡得為君於是使專諸刺僚而致國乎季子季子曰爾殺吾君吾受爾國是吾與爾為亂也爾殺吾兄吾又殺爾是父子兄弟相殺終身無已也去而之延陵終身不入吳國故號曰延陵季子君子以其不受國為義以其不殺為仁是以春秋賢季子而尊貴之也左傳曰冬十月仲殺惡及視而立宣公書曰子卒諱之也仲以君命召惠伯其宰人公冉務人曰若君命可使非君命何聼弗聼乃入殺而埋之馬矢之中公冉務人奉其帑以奔蔡既而復叔仲氏公羊傳曰子卒者孰謂謂子赤也何以不日𨼆之也何𨼆耳殺也殺則何以不日不忍言也榖梁傳曰公弟叔肸賢之也其賢之何也宣弑而非之也非之則胡為不去也曰兄弟也何去而之與之財則曰我足矣織屨而食終身不食宣公之食君子以是為通恩也以取貴乎春秋節士傳曰魯宣公者魯文公之弟也文公薨文公之子子赤立為魯侯宣公殺子赤而奪之國立為魯侯公子肸者宣公之同母弟也宣公殺子赤而肸非之宣公與之禄則曰我足矣何以兄之食為哉織屨而食終身不食宣公之食其仁恩厚矣其守節固矣故春秋美而貴之孔子曰刳胎焚夭則麒麟不至乾澤而漁則蛟龍不遊覆巢毁卵則鳳鳥不翔君子重傷其類者也虧義得尊枉道取容效死不為也聞正道而行釋事而退未聞枉道以求容也子貢曰非其世者不生其利汚其君者不履其土鮑焦曰賢者重進而輕退廉者易愧而輕死石買曰衒女不貞衒士不信御史曰論語云親於其身為不善者君子不入也鄒陽曰盛飾入朝者不以私行義砥礪名號者不以利傷行故里名勝母曽子不入邑號朝歌墨子回車有是言而行不足從也季氏為無道逐其君奪其政而冉求仲由臣焉禮男女不授受不交爵孔子適衛因嬖臣彌子瑕以見衛夫人子路不說音恱子瑕佞臣也夫子因之非正也男女不交孔子見南子非禮也禮義由孔氏出且貶道以求容惡音烏在其釋事而退也泰族訓曰夫聖人之屈者以求伸也枉者以求直也故雖出邪僻之道行幽昧之塗將欲以直大道成大功猶出林之中不得直道拯溺之人不得不濡足也孔子欲行王道東西南非七十說而無所偶故因衛夫人彌子瑕而欲通其道由𡨕𡨕至昭昭動於權而統於善者也文學曰天下不平庶國不寧明王之憂也上無天子下無方伯天下煩亂賢聖之憂也是以堯憂洪水伊尹憂民管仲束縛孔子周流孟子曰當堯之時天下猶未平洪水横流氾濫于天下堯獨憂之舉舜而敷治焉泰族訓曰伊尹憂天下之不治調和五味負鼎爼而行五就桀五就湯將欲以濁為清以危為安也許慎曰管仲相齊公子紏不死子紏之難而奔魯束縛以歸齊桓公用之而霸也劉向曰孔子生於亂世莫之能容也故言行於君澤加於民然後仕言不行於君澤不加於民則處孔子懐天覆之心挾仁聖之徳憫時俗之汚泥傷紀綱之廢壊服重歴逺周流應聘乃俟幸施道以子百姓而當世諸侯莫能任用是以徳積而不肆大道屈而不伸海内不蒙其化羣生不被其恩故喟然歎曰如有用我者則吾其為東周乎故孔子行說非欲私身運德於一城將欲舒之於天下而建之於羣生者耳憂百姓之禍而欲安其危也是以負鼎爼囚拘匍匐以救之故追亡者趨拯溺者濡今民陥溝壑雖欲無濡豈得已哉御史黙不對憂邊第十二大夫曰文學言天下不平庶國不寧明王之憂也故王者之於天下猶一室之中也有一人不得其所則謂之不樂音洛貴德篇曰聖人之於天下也譬猶一堂之上也今有滿堂飲酒者有一人獨索然向隅而泣則一堂之人皆不樂矣聖人之於天下也譬猶一堂之上也有一人不得其所者則孝子不敢以其物薦進主術訓曰髙臺層榭接屋連閣非不麗也然民無掘穴狹廬所以托身者明主弗樂肥醲甘脆非不美也然民有糟糠菽粟不接於口者則明主弗甘也匡牀蒻席非不寜也然民有處邉城犯危難澤死暴骸者明主弗安也故古之君人其慘怛於民也國有飢者食不重味民有寒者而冬不被裘嵗登民豐乃始縣鐘鼓陳于戚君臣上下同心而樂之國無哀人故民流沈溺而不救非恵君也國家有難去聲而不憂非忠臣也夫音扶守節死難去聲者人臣之職也申鳴曰始吾父之孝子也今吾君之忠臣也食其食者死其事受其禄者畢其能衣食饑寒者慈父之道也河間獻王曰堯存心於天下加志於窮民痛萬姓之罹罪憂衆生之不遂也有一民饑則曰此我饑之也有一人寒則曰此我寒之也一民有罪則曰此我䧟之也仁昭而義立德博而化廣故不賞而民勸不罸而民治先恕而後教是堯德也貴德篇曰聖人之於天下百姓也其猶赤子乎飢者則食之寒者則衣之將之養之育之長之惟恐其不至於大也今子弟逺勞於外人主為之夙夜不寜群臣盡力畢議册通䇿作兹國用故少府丞令請建酒𣙜音較以澹古贍字邊給戰士拯救民於難去聲也為人父兄者豈可以已乎内省衣食以恤在外者猶未足今又欲罷諸用减奉邊之費未可為慈父賢兄也文學曰周之季末天子㣲弱諸侯力政故國君不安謀臣奔馳何者敵國衆而社稷危也賈生曰周室卑㣲五霸既滅令不行於天下是以諸侯力勁強凌弱衆暴寡兵革不休士民罷弊今九州同域天下一統陛下優游巖廊覽群臣極言至内論雅頌外鳴和鸞純徳粲然並於唐虞功烈流於子孫夫音扶蠻貊之人不食之地何足以煩慮而有戰國之憂哉若陛下不棄加之以德施之以恵北夷必内向欵塞音賽自至然後以為胡制於外臣即匈奴没齒不食其所用矣大夫曰聖主思念中國之未寧北邊之未安故使廷尉評古本作平等問人間所疾苦極恤貧賤周澹古贍字不足漢武紀曰始元二年閏九月遣故廷尉王平等五人持節行郡國舉賢良問民所疾苦寃失職者顔師古曰前為此官今不居者皆謂之故也君臣所宣明王之德安宇内者未得其紀故問諸生諸生議不干天則入淵修務訓曰所為言者齊於衆而同於俗今不稱九天之頂則言黃泉之底是兩末之端議何可以公論乎乃欲以閭里之治而况國家之大事亦不幾矣發於畎畆出於窮巷不知氷水之寒若醉而新寐殊不足與言也文學曰夫音扶欲安民富國之道在於反本本立而道生順天之理因地之利即不勞而功成原道訓曰禹之決瀆也因水以為師神農之播榖也因苗以為教夫音扶不修其源而事其流無本以統之雖竭精神盡思慮無益於治欲安之適足以危之欲救之適足以敗之夫音扶治亂之端在於本末而已不至勞其心而道可得也建本篇曰孔子曰君子務本本立而道生本不正者末必倚始不盛者終必衰詩云原隰既平泉流既清本立而道生春秋之義有正春者無亂秋有正君者無危國易曰建其本而萬物理失之毫釐差以千里是故君子貴建本而重立始孔子曰不通於論者難於言治道不同者不相與謀今公卿意有所倚文學之言不可用也大夫種曰有髙世之材者必有負俗之累有至智之明者必破衆庻之議成大功者不拘於俗論大道者不合於衆雜言曰鍾子期死而伯牙絶絃破琴知世莫可為鼔也恵施卒而莊子深瞑不言見世莫可與語也大夫曰吾聞為人臣者盡忠以順職為人子者致孝以承業君有非則臣覆盖之父有非則子匿逃之故君薨臣不變君之政父沒則子不改父之道也春秋譏毁泉臺為其隳音灰先祖之所為而揚君父之惡也春秋曰夫人姜氏薨毁泉臺公羊傳曰泉臺者何郎臺也郎臺則曷為謂之泉臺未成為郎臺既成為泉臺毁泉臺何以書譏也何譏爾築之譏毁之譏先祖為之已毁之不如勿居而已矣今鹽鐵均輸所從來乆矣而欲罷之得無害先帝之功而妨聖主之德乎有司倚於忠孝之路是道殊而不同於文學之謀也文學曰明者因時而變知去聲者隨世而制趙武靈王曰古今異利逺近異用隂陽不同道四時不一宜鄉異而用變事異而禮易是以聖人觀其鄉而順宜因其事而制禮苟可以利其民不一其用果可以便其事不同其禮漢武帝曰五帝之教不相復而治禹湯之法不同道而王孔子曰麻冕禮也今也純儉吾從衆故聖人上賢不離古順俗而不偏宜汜論曰治國有常而利民為本政教有經而令行為上苟利於民不必法古苟周於事不必循舊夫夏商之衰也不變法而亡三代之起也不相襲而王故聖人法與時變禮與俗化衣服器械各便其用法度制令各因其宜故變古未可非而循俗未足多也百川異源而皆歸於海百家殊業而皆務於治魯定公序昭穆順祖禰音米昭公廢卿士以省事節用不可謂變祖之所為而改父之道也二世充大阿房以崇緒趙髙累秦法以廣威而未可謂忠臣孝子也秦紀曰二世東行郡縣還至咸陽曰先帝為咸陽朝廷小故營阿房宫為室堂未就㑹上崩罷其作者復上驪山驪山事大畢今釋阿房宫弗就則是章先帝舉事過也復作阿房宫外撫四夷如始皇計盡徴其材士五萬人為屯衛咸陽令教射狗馬禽獸當食者多度不足下調郡縣轉輸菽粟芻槀皆令自齎糧食咸陽三百里内不得食其榖用法益刻深鹽鐵論卷三
