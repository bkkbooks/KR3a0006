  - {type: variant, offset: 1278, length: 45, content: 為虐不征備則暴害不息故先帝興義兵以征厥罪遂破祁連天山散其聚黨北略至龍城大圍匈奴單于失魂僅以, SBCK: 政政亂反之}
  - {type: variant, offset: 1278, length: 0, content: '', WYG: 難去聲鄰境之患强臣變節而忠順故季桓隳音灰其都城大國畏義而合好齊人來歸鄆音運讙音歡龜隂之田孔子世家曰定公以孔子}
  - {type: variant, offset: 1278, length: 0, content: '', krp: 難去聲鄰境之患强臣變節而忠順故季桓隳音灰其都城大國畏義而合好齊人來歸鄆音運讙音歡龜隂之田孔子世家曰定公以孔子}
  - {type: variant, offset: 1279, length: 1, content: 虐, WYG: 中都宰一年四方皆則之由中都宰為司空由司空為司冦定公十年春及齊平夏齊大夫黎鉏言於景公曰魯用孔丘其勢危齊乃使使告魯為好㑹會於夾谷魯定公且以乗車好徃孔子攝相事曰臣聞有文事者必有武備有武事者必有文備古者諸侯出疆必具官以從請具左右司馬定公曰諾具左右司馬㑹齊侯夾谷為壇位土階三等以會遇之禮相見揖讓而登獻酬之禮畢齊有司趨而進曰請奏四方之樂景公曰諾於是旍旄羽祓矛㦸劔撥鼓噪而至孔子趨而進歴階而登不盡一等舉􅃑而言曰吾兩君為好㑹夷狄之樂何為於此請命有司有司却之不去則左右視晏子與景公景公心怍麾而去之有頃齊有司趨而進曰請奏宫中之樂景公曰諾優倡侏儒為戲而前孔子趨而進歴階而登不盡一䓁曰匹夫而熒惑諸侯者罪當誅請命有司有司加法焉手足異處景公懼而動知義不若歸而恐告其羣臣曰魯以君子之道輔其君而子獨以夷狄之道教寡人使得罪於魯君為之奈何有司進對曰君子有過則謝以質小人有過則謝以文君若悼之則謝以實於是齊侯乃歸所侵魯之鄆汶陽龜隂之田以謝過定公十三年夏孔子言於定公曰臣無藏甲大夫毋百雉之城使仲由為季氏宰將堕三都於是叔孫氏先墮郈季氏將墮費公山不狃叔孫輙率費人襲魯公與三子入于季氏之宫登武子之臺費人攻之弗克入及公側孔子命申句須樂頎下伐之費人北國人追之敗諸姑蔑二子奔齊遂墮費將墮成公歛處父謂孟孫曰墮成齊人必至於北門且成孟氏之保鄣無成是無孟氏也我將弗墮十二月公圍成弗克故為政而以徳非獨辟害折衝也所欲不求而自得今百姓所以囂囂中外不寧者咎在匈奴内無室宇之守外無田疇之積随美草甘水而驅牧匈奴不變業而中國以騷動矣風合而雲解就之則亡擊之則散未可一世而舉也韓安國曰利不什不易業功不百不變常是故古之人君謀事必就聖發政必擇語重作事也自三代之盛逺方夷狄不與正朔服色非威不能制非強不能服也以為逺方絶域不收之民不足以煩中國也且匈奴者輕疾悍亟之兵也畜牧為業弧弓射獵逐獸随草居處無常難得而制也至不及圖去不可追聚若風雨解若收電今使邊鄙久廢耕織之業以支匈奴常事其勢不權臣故曰勿撃為便大夫曰古者明王討暴衛弱定傾扶危衛弱扶危則小國之君説音悦討暴定傾則無罪之人附今}
