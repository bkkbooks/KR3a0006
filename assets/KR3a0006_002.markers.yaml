  - {type: variant, offset: 5240, length: 201, content: 未寧北邊之未安使故廷尉評等問人間所疾苦拯䘏貧賤周贍不足群臣所宣明王之德安宇內者未得其紀故問諸生諸生議不干天則入淵乃欲以閭里之治而況國家之大事亦不幾矣發於畎畝出於窮巷不知冰水之寒若醉而新寐殊不足與言也文學曰夫欲安民富國之道在於反本本立而道生順天之理因地之利即不勞而功成夫不修其源而事其流無本以統之雖竭精神盡思慮無益於治欲安之適足以危之欲救之適足以敗之夫治亂之端在於本末而已不至勞其心而道可得也孔子曰不通於, WYG: 佐哉鹽鐡}
