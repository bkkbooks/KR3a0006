  - {type: variant, offset: 811, length: 0, content: '', WYG: 晨昏孜孜思其力故君子不素飡小人不空食世俗飾偽行詐為去聲民巫祝以取釐謝堅頟音額徤舌或以成業致富故憚事之人釋夲相學是以街巷有巫閭里有祝古者無杠樠音䐽之寢牀栘音移之案及其後世庶人即采木之杠葉華之樠士不斤成大夫葦莞而已今富者黼繡幃幄塗屏錯跗音夫中者錦綈音提高張采畫音壊丹漆古者皮毛草蓐無茵席之加旃音氊蒻音弱之美及其後大夫士復薦草縁蒲平單莞庶人即草蓐索經單藺音吝蘧音瞿蒢音除而已今富者繡茵翟柔蒲子露林中者􅱽皮代旃音氊闒音逹坐平莞古者不粥絍不市食及其後則有屠沽沽酒市脯魚鹽而已今熟食徧列殽施成市作業墮怠食必趣時楊豚韭卵狗䐲音摺馬朘音唆煎魚切肝羊淹雞寒蜩馬駱日蹇音簡捕庸脯胹音而羔豆賜􅑹音谷膹音憤鴈羮自鮑丼瓠熱梁和炙古者土皷凷音塊枹音浮擊木拊音府石以盡其歡明堂篇曰土鼔蕢桴葦籥伊耆氏之樂也齊俗訓曰古者}
