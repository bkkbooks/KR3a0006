  - {type: variant, offset: 813, length: 0, content: '', krp: 職古今之通義也王符曰王者以四海為家兆民為子一夫不耕天下受其飢一婦不織天下受其寒一夫耕百人食之一婦桑百人衣之以一奉百孰能供之是故明主之養民憂之勞之教之誨之慎㣲防萌以㫁其邪故易美節以制度不傷財不害民七月之詩大小敎之終而復始由此觀之人固不可恣也今縣官多畜奴婢坐禀衣食私作産業為姦利力作不盡縣官失實百姓或無斗筲之儲官奴累百金黎民昏晨不釋事奴婢垂拱遨遊也垂拱言晏安無事垂衣拱手而已古者親近而疏逺貴所同而賤非類不賞無功不養無用今蠻貊無功縣官居肆廣屋大第坐禀衣食百姓或旦暮不澹古贍字蠻夷或厭酒肉黎民泮汗力作令蠻夷交脛肆踞古者庶人鹿菲草芰音技縮絲尚韋而已及其後則綦音其下不借鞔音漫鞮音低革舄今富者革中名工輕靡使容紈音丸裏紃音廵下越端縱縁中者鄧里間作蒯音快苴音蛆秦堅婢妾韋沓絲履走者茸音戎芰音技狗官古聖人勞躬養神節欲適情尊天敬地履徳行仁是以上天歆焉永其世而豐其年故堯秀眉髙彩享國百載修務解曰堯母慶都葢天帝之女寄伊長孺家年二十無夫出觀於河有赤龍負圖而至曰赤龍受天下之圖有人赤衣光面八彩鬢鬚長赤帝起成元寳奄然隂雲赤龍與慶都合而生堯帝如圖故眉有八彩之色及秦始皇覽怪迂信禨音幾祥使盧生求羡門高徐市等入海求不死之藥當此之時燕齊之士釋鋤耒爭言神仙方士於是趣咸陽者以千數言仙人食金飲珠然後夀與天地相保於是數音朔廵狩五嶽濵海之館以求神仙蓬莱之屬數音朔幸之郡縣富人以貲音兹佐貧者築道旁其後小者亡逃大者藏匿吏捕索掣音徹頓釋名曰掣制也制頓之使順已也不以道理名宫之旁廬舍丘落無生苗立樹百姓離心怨思者十有半半一作九封禪書曰自齊威宣之時騶子之徒論著終始五徳之運及秦帝而齊人奏之故始皇采用之而宋母忌正伯僑充尚羡門子高最後皆燕人為方僊道形解銷化依於鬼神之事騶衍以隂陽主運顯於諸}
  - {type: variant, offset: 814, length: 0, content: '', WYG: 而燕齊海上之方士傳其術不能通然則怪迂阿䛕苟合之徒自此興不可勝數也自威宣燕昭使人入海求蓬莱方丈瀛洲此三神山者其傳在渤海中去人不逺患且至則船風引而去葢嘗有至者諸僊人及不死之藥皆在焉其物禽獸盡白而黄金銀為宫闕未至望之如雲及到三神山反居水下臨之風輙引去終莫能至云世主莫不丼心焉及至秦始皇并天下至海上則方士言之不可勝數始皇自以為至海上而恐不及矣使人乃齎童男女入海求之船交海中皆以風為解曰未能至望見之焉其明年始皇復游海上至琅邪過恒山從上黨歸後三年逰碣石考入海方士從上郡歸後五年始皇南至湘山遂登㑹稽並海上冀遇海中三神山之竒藥不得還至沙丘崩反質篇曰秦始皇既兼天下大侈靡即位三十五年猶不息治大馳道從九原抵雲陽塹山堙谷直通之厭先王宫室之小乃於豐鎬之間文武之處營作朝宫渭南山林苑中作前殿阿房東西五百步南北五十丈上可以坐萬人下可建五丈旗周為閣道自殿直抵南山之嶺以為闕為複道由阿房度渭水屬咸陽以象天極閤道絶漢抵營室也又興驪山之役錮三泉之底闗中離宫三百所闗外四百所皆有鐘磬帷帳婦女倡優立石闕東海上朐山界中以為秦東門於是有方士韓客侯生齊客盧生相與謀曰當今時不可以居上樂以刑殺為威天下畏罪持禄莫敢盡忠上不聞過而日驕下懾伏以漫欺而取容諫者不用而失道滋甚吾黨乆居且為所害乃相與亡去始皇聞之大怒曰吾異日厚盧生尊爵而事之今乃誹謗我吾聞諸生多為妖言以亂黔首乃使御史悉上諸生諸生轉相告犯法者四百六十餘人皆坑之盧生不得而侯生後得始皇聞之召而見之升阿東之臺臨四通之街將數而車裂之始皇望見侯生大怒曰老虜不良誹謗而主廼敢復見我侯生至仰臺而言曰臣聞知死必勇陛下肯聼臣一言乎始皇曰若欲何言言之侯生曰臣聞禹立誹謗之木欲以知過也今陛下奢侈失本淫泆趨末宫室臺閣連屬増累珠玉重寳積襲成山錦繡文綵滿府有餘婦女倡優數巨萬人鐘鼔之樂流漫無窮酒食珎味盤錯於前衣服輕煖輿馬文飾所以自奉麗靡爛漫不可勝極黔首匱竭民力單盡尚不自知又急誹謗嚴威克下下喑上聾臣等故去臣等不惜臣之身惜陛下國之亡耳聞古之明王食足以飽衣足以暖宫室足以處輿馬足以行故上不見棄於天下不見棄於黔首堯茅茨不剪采椽不斵土階三等而樂終身者以其文采之少而質素之多也丹朱傲虐好慢淫不修理化遂不以升今陛下之淫萬丹朱而千昆吾桀紂臣恐陛下之十亡也而曾不一存始皇黙黙乆之曰如何不早言侯生曰陛下之意方乘青雲飄揺於文章之觀自賢自徤上侮五帝下凌三王棄素樸就末技陛下亡徵見乆矣臣等恐言之無益也而自取死故逃而不敢言今臣必死故為陛下陳之雖不能使陛下不亡欲使陛下自知也始皇曰吾可以變乎侯生曰形已成矣陛下坐而待亡耳若陛下欲更之能若堯與禹乎不然無異也陛下之佐又非也臣恐變之不能存也始皇喟然而嘆遂釋不誅後三年始皇崩二世即位三年而秦亡書曰享多儀儀不及物曰不享故聖人非仁義不載於已非正道不禦於前是以先帝誅文成五利等谷永曰明天地之性者不可惑以神怪知萬物之情者不可罔以非類諸背仁義之正道不遵五經之法言而盛稱竒怪鬼神廣崇祭祀之方求報無福之祠及言世有僊人服食不終之藥遙興輕舉覽觀縣圃浮游蓬莱耕耘五徳朝種暮獲與山石無極黄冶變化堅氷淖溺化色五倉之術者皆姦人惑衆挟左道懷詐偽以欺罔世主聼其言洋洋滿耳若將可遇求之盪盪如係風捕景終不可得是以明主拒而不聽聖人絶而不言封禪書曰齊人少翁以鬼神方見上上有所幸王夫人夫人卒少翁以方葢夜致王夫人及竈鬼之貌云天子自帷中望見焉於是乃拜少翁為文成將軍賞賜甚多以客禮禮之居嵗餘其方益衰神不至乃為帛書以飯牛佯不知言曰此牛}
