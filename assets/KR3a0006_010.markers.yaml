  - {type: variant, offset: 4389, length: 0, content: '', krp: 然後踐華為城因河為池據億丈之城臨不測之谿以為固良將勁弩守要害之處信臣精卒陳利兵}
  - {type: variant, offset: 4390, length: 3, content: 欲廢法, WYG: 誰何天下已定始皇之心自}
  - {type: variant, offset: 4390, length: 3, content: 欲廢法, krp: 誰何天下已定始皇之心自}
  - {type: variant, offset: 4394, length: 0, content: '', WYG: 為闗中之固金城千里子孫帝王萬世之業也始皇旣沒餘威振于殊俗然而陳涉甕牗䋲樞之子氓𨽻之人而遷徙之徒也材能不及非有仲弓墨翟之賢陶朱猗頓之富躡足行伍之間俛起阡陌之中卒疲散之卒轉而攻秦斬木為兵揭竿為旗天下雲合而響應褁糧而景從山東豪傑遂並起而亡秦族矣故在徳不在固誠以行去聲義為阻道徳為塞賢人為兵聖人為守則莫能入如此則中國無狗吠之警而邊境無鹿駭狼顧之憂矣夫音扶何妄行之有乎魏武侯浮西河而下中流顧謂呉起曰美哉乎河山之固也此魏國之寳也呉起對曰在徳不在險昔三苗氏左洞庭右彭蠡徳義不修而舜滅之夏桀之居左河濟右太華伊闕在其南羊腸在其北修政不仁湯放之殷紂之國左孟門而右太行常山在其北大河經其南修政不徳武王伐之由此觀之在徳不在險若君不修徳船中之人盡敵國也武侯曰善左思曰劒閣雖嶛憑之者蹶非所以深根固蔕也洞庭雖濬負之者北非所以愛人}
