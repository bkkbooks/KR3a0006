  - {type: variant, offset: 10778, length: 571, content: 孔子世家曰定公以孔子為中都宰一年四方皆則之由中都宰為司空由司空為司冦定公十年春及齊平夏齊大夫黎鉏言於景公曰魯用孔丘其勢危齊乃使使告魯為好㑹會於夾谷魯定公且以乗車好徃孔子攝相事曰臣聞有文事者必有武備有武事者必有文備古者諸侯出疆必具官以從請具左右司馬定公曰諾具左右司馬㑹齊侯夾谷為壇位土階三等以會遇之禮相見揖讓而登獻酬之禮畢齊有司趨而進曰請奏四方之樂景公曰諾於是旍旄羽祓矛㦸劔撥鼓噪而至孔子趨而進歴階而登不盡一等舉𬒮而言曰吾兩君為好㑹夷狄之樂何為於此請命有司有司却之不去則左右視晏子與景公景公心怍麾而去之有頃齊有司趨而進曰請奏宫中之樂景公曰諾優倡侏儒為戲而前孔子趨而進歴階而登不盡一䓁曰匹夫而熒惑諸侯者罪當誅請命有司有司加法焉手足異處景公懼而動知義不若歸而恐告其羣臣曰魯以君子之道輔其君而子獨以夷狄之道教寡人使得罪於魯君為之奈何有司進對曰君子有過則謝以質小人有過則謝以文君若悼之則謝以實於是齊侯乃歸所侵魯之鄆汶陽龜隂之田以謝過定公十三年夏孔子言於定公曰臣無藏甲大夫毋百雉之城使仲由為季氏宰將堕三都於是叔孫氏先墮郈季氏將墮費公山不狃叔孫輙率費人襲魯公與三子入于季氏之宫登武子之臺費人攻之弗克入及公側孔子命申句須樂頎下伐之費人北國人追之敗諸姑蔑二子奔齊遂墮費將墮成公歛處父謂孟孫曰墮成齊人必至於北門且成孟氏之保鄣無成是無孟氏也我將弗墮十二月公圍成弗克, SBCK: ''}
