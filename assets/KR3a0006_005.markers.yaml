  - {type: variant, offset: 1066, length: 0, content: '', WYG: 雜事篇曰秦趙髙者生而隠宫始皇聞其強力通扵獄法拜申車府令使教胡亥决獄胡亥幸之髙有罪始皇使䝉毅治之毅當髙法當死始皇以髙敏扵事赦之復其官二世即位趙髙說以嚴法刻刑令有罪者相坐誅滅大臣及宗室更為法律務益刻深易曰負且乘致㓂至貞吝大傳曰負也者小人之事也乘也者君子之器也小人而乘君子之器盗思奪之矣上慢下暴盗思伐之矣泰族訓曰位髙而道大者從事大而道小者凶人間訓曰天下有三危少徳而多寵一危也才下而位髙二危也身無大功而有厚禄三危也}
