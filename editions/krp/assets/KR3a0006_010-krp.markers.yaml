  - {type: variant, offset: 13047, length: 668, content: 姚賈説秦王曰太公望齊之逐夫朝歌之廢屠子良之逐臣棘津之售不庸文王用之而王管仲其鄙人之賈人也南陽之敝幽魯之免囚桓公用之而霸百里奚虞之乞人傳賣以五羊之皮穆公相之而朝西戎孔子曰賢不肖者材也遇不遇者時也今無有時賢安所用哉伊尹故有莘氏僮也負鼎操爼調五味而立為相其遇湯也呂望行年五十賣食棘津年七十屠於朝歌九十乃為天子師則遇文王也管夷吾束縛自檻車以為仲父則遇齊桓公也百里奚自賣五羊之皮為秦伯牧羊舉為大夫則遇秦繆公也冉有曰夫百里奚齊之乞者也逐於齊西無以進自賣五羊皮為一軛車見秦穆公立為相遂霸西戎太公望少為人壻老而見去屠牛朝歌賃於棘津釣於磻溪文王舉而用之封於齊管仲親射桓公遂除報讐之心立以為相存亡繼絶九合諸侯一匡天下鄒子説梁王曰伊尹故有莘氏之媵臣也湯立以三公天下之治太平太公望故老婦之出夫也朝歌之屠佐也棘津迎客之舍人也年七十而相周九十而封齊管仲故成隂之狗盗也天下之庸夫也齊桓公得之為仲父百里奚道之於路傳賣五羊之皮秦穆公委之以政寗戚故將車人也叩轅行歌於康之衢桓公任以國故詩曰緜緜之葛在於曠野良工得之以為絺紵良工不得枯死於野此七士者不遇明君聖主㡬行乞丐枯死於中野譬猶緜緜之葛矣李康曰伊尹有莘氏之媵臣也而阿衡於商太公渭濵之賤老也而尚父於周吕氏春秋曰百里奚處乎虞而虞亡處乎秦而秦霸百里奚之處乎虞知非遇也其處於秦非加益也秦紀曰戎王使由余於秦秦後歸由余繆公又使人間要由余遂去降秦繆公以客禮禮之秦用由余謀伐戎王益國十二開地千里遂霸西戎尊賢篇曰國不務大而務得民心佐不務多而務得賢俊得民心者民往之有賢佐者士歸之語曰得十良馬不若得一伯樂得十良劒不若得一歐冶得地千里不若得一聖人, SBCK: ''}
