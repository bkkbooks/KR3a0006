  - {type: variant, offset: 12261, length: 383, content: 谷永曰明天地之性者不可惑以神怪知萬物之情者不可罔以非類諸背仁義之正道不遵五經之法言而盛稱竒怪鬼神廣崇祭祀之方求報無福之祠及言世有僊人服食不終之藥遙興輕舉覽觀縣圃浮游蓬莱耕耘五徳朝種暮獲與山石無極黄冶變化堅氷淖溺化色五倉之術者皆姦人惑衆挟左道懷詐偽以欺罔世主聼其言洋洋滿耳若將可遇求之盪盪如係風捕景終不可得是以明主拒而不聽聖人絶而不言封禪書曰齊人少翁以鬼神方見上上有所幸王夫人夫人卒少翁以方葢夜致王夫人及竈鬼之貌云天子自帷中望見焉於是乃拜少翁為文成將軍賞賜甚多以客禮禮之居嵗餘其方益衰神不至乃為帛書以飯牛佯不知言曰此牛腹中有竒殺視得書書言甚怪天子識其手書問其人果是偽書於是誅文成將軍隐之欒大因樂成侯見求言方天子既誅文成後悔其蚤死惜其方不盡及見欒大大説大為人長美言多方畧而敢為大言處之不疑是時上方憂河决有黄金不就乃拜大為五利將軍其後五利妄言見其師其方多不讐上乃誅五利陛下, SBCK: 宣帝}
