社稷也故聖人為政必先誅之為巧言以輔非而傾覆國家也今子安取亡國之語而來乎夫公卿處其位不正其道而以意阿邑順風疾小人淺淺面從以成人之過也故知言之死不忍從苟合之徒是以不免於縲絏悲夫丞相史曰檀柘而有鄉萑葦而有藂言物類之相從也孔子曰德不孤必有鄰故湯興而伊尹至不仁者遠矣未有明君在上而亂臣在下也今先帝躬行仁聖之道以臨海內招舉俊才賢良之士唯仁是用誅逐亂臣不避所親務以求賢而簡退不肖猶堯之舉舜禹之族殛鯀放驩兜也而曰苟合之徒是則主非而臣阿是也文學曰皋陶對舜在知人惟帝其難之洪水之災堯獨愁悴而不能治得舜禹而九州寧故雖有堯明之君而無舜禹之佐則純德不流春秋刺有君而無臣先帝之時良臣未備故邪臣得間堯得舜禹而鯀殛驩兜誅趙簡子得叔向而盛青肩詘語曰未見君子不知偽臣詩云未見君子憂心忡忡既見君子我心則降此之謂也丞相史曰堯任鯀驩兜得舜禹而放殛之以其罪而天下咸服誅不仁也人君用之齊民而顏異濟南亭長也先帝舉而加之高位官至上卿狄山起布衣為漢議臣處舜禹之位執天下之中不能以治而反坐訕上故驩兜之誅加而刑戮至焉賢者受賞而不肖者被刑固其然也文學又何怪焉文學曰論者相扶以義相喻以道從善不求勝服義不恥窮若相迷以偽相亂以辭相矜於後息期於苟勝非其貴者也夫蘇秦張儀熒惑諸侯傾覆萬乘使人主失其所持非不辯然亂之道也君子疾鄙夫之不可與事君患其聽從而無所不至也今子不聽正義以輔卿相又從而順之好須臾之說不計其後若子之為人吏宜受上戮子姑默矣丞相史曰蓋聞士之居世也衣服足以勝身食飲足以供親內足以相䘏外不求於人故身修然後可以理家家理然後可以治官故飯蔬糲者不可以言孝妻子饑寒者不可以言慈緒業不脩者不可以言理居斯世行斯身而有此三累者斯亦足以默矣孝養第二十五文學曰善養者不必芻豢也善供服者不必錦繡也以己之所有盡事其親孝之至也故匹夫勤勞猶足以順禮歠菽飲水足以致其敬孔子曰今之孝者是為能養不敬何以別乎故上孝養志其次養色其次養體貴其禮不貪其養禮順心和養雖不備可也易曰東鄰殺牛不如西鄰之禴祭也故富貴而無禮不如貧賤之孝悌閨門之內盡孝焉閨門之外盡悌焉朋友之道盡信焉三者孝之至也居家理者非謂積財也事親孝者非謂鮮肴也亦和顏色承意盡禮義而已矣丞相史曰八十曰耋七十曰耄耄食非肉不飽衣非帛不暖故孝子曰甘毳以養口輕暖以養體曾子養曾晳必有酒肉無端絻雖公西赤不能以為容無肴膳雖閔曾不能以卒養禮無虛加故必有其實然後為之文與其禮有餘而養不足寧養有餘而禮不足夫洗爵以盛水升降而進糲禮雖備然非其貴者也文學曰周襄王之母非無酒肉也衣食非不如曾晳也然而被不孝之名以其不能事其父母也君子重其禮小人貪其養夫嗟來而招之投而與之乞者猶不取也君子苟無其禮雖美不食焉故禮主人不親饋則客不祭是饋輕而禮重也丞相史曰孝莫大以天下一國養次祿養下以力故王公人君上也卿大夫次也夫以家人言之有賢子當路於世者高堂邃宇安車大馬衣輕暖食甘毳無者褐衣皮冠窮居陋巷有旦無暮食蔬糲葷茹膢臘而後見肉老親之腹非唐園唯菜是盛夫蔬糲乞者所不取而子以養親雖欲以禮非其貴也文學曰無其能而竊其位無其功而有其祿雖有富貴由蹠蹻之養也高臺極望食案方丈而不可謂孝老親之腹非盜囊也何故常盛不道之物夫取非有非職財入而患從之身且死禍殃安得膢臘而食肉曾參閔子無卿相之養而有孝子之名周襄王富有天下而有不能事父母之累故禮菲而養豐非孝也掠囷而以養非孝也丞相史曰上孝養色其次安親其次全身往者陳餘背漢斬於泜水五被邪逆而夷三族近世主父偃行不軌而誅滅呂步舒弄口而見戮行身不謹誅及無罪之親由此觀之虛禮無益於己也文實配行禮養俱施然後可以言孝孝在於質實不在於飾貌全身在於謹慎不在於馳語也文學曰言而不誠期而不信臨難不勇事君不忠不孝之大者也孟子曰今之士今之大夫皆罪人也皆逢其意以順其惡今子不忠不信巧言以亂政導諛以求合若此者不容於世春秋曰士守一不移循理不外援共其職而已故卑位而言高者罪也言不及而言者傲也有詔公卿與斯議而空戰口也刺議第二十六丞相史曰山陵不讓椒跬以成其崇君子不辭負薪之言以廣其名故多見者博多聞者知距諫者塞專己者孤故謀及下者無失策舉及眾者無頓功詩云詢于芻蕘故布衣皆得風議何況公卿之史乎春秋士不載文而書咺者以為宰士也孔子曰雖不吾以吾其與聞諸僕雖不敏亦嘗傾耳下風攝齊句指受業徑於君子之塗矣使文學言之而是僕之言有何害使文學言之而非雖微丞相史孰不非也文學曰以正輔人謂之忠以邪導人謂之佞夫怫過納善者君之忠臣大夫之直士也孔子曰大夫有爭臣三人雖無道不失其家今子處宰士之列無忠正之心枉不能正邪不能匡順流以容身從風以說上上所言則苟聽上所行則曲從若影之隨形響之於聲終無所是非衣儒衣冠儒冠而不能行其道非其儒也譬若土龍文章首目具而非龍也葶歷似菜而味殊玉石相似而異類子非孔氏執經守道之儒乃公卿面從之儒非吾徒也冉有為季氏宰而附益之孔子曰小子鳴鼓而攻之可也故輔桀者不為智為桀斂者不為仁丞相史默然不對利議第二十七大夫曰作世明主憂勞萬民思念北邊之未安故使使者舉賢良文學高弟詳延有道之士將欲觀殊議異策虛心傾耳以聽庶幾云得諸生無能出奇計遠圖伐匈奴安邊境之策抱枯竹守空言不知趨舍之宜時世之變議論無所依如膝癢而搔背辯訟公門之下訩訩不可勝聽如品即口以成事此豈明主所欲聞哉文學曰諸生對冊殊路同歸指在於崇禮義退財利復往古之道匡當世之失莫不云太平雖未盡可亶用宜略有可行者焉執事闇於明禮而喻於利末沮事隳議計慮籌策以故至今未決非儒無成事公卿欲成利也大夫曰色厲而內荏亂真者也文表而枲裏亂實者也文學裒衣博帶竊周公之服鞠躬踧踖竊仲尼之容議論稱誦竊商賜之辭刺譏言治竊管晏之才心卑卿相志小萬乘及授之政昏亂不治故以言舉人若以毛相馬此其所以多不稱舉詔策曰朕嘉宇內之士故詳延四方豪俊文學博習之士超遷官祿言者不必有德何者言之易而行之難有舍其車而識其牛貴其不言而多成事也吳鐸以其舌自破主父偃以其舌自殺鶡鴠夜鳴無益於明主父鳴鴟無益於死非有司欲成利文學桎梏於舊術牽於間言者也文學曰能言之能行之者湯武也能言不能行者有司也文學竊周公之服有司竊周公之位文學桎梏於舊術有司桎梏於財利主父偃以舌自殺有司以利自困夫驥之才千里非造父不能使禹之知萬人非舜為相不能用故季桓子聽政柳下惠忽然不見孔子為司寇然後悖熾驥舉之在伯樂其功在造父造父攝轡馬無駑良皆可取道周公之時士無賢不肖皆可與言至治故御之良者善調馬相之賢者善使士今舉異才而使臧騶御之是猶扼驥鹽車而責之使疾此賢良文學多不稱舉也大夫曰嘻諸生闒茸無行多言而不用情貌不相副若穿踰之盜自古而患之是孔丘斥逐於魯君曾不用於世也何者以其首攝多端迂時而不要也故秦王燔去其術而不行坑之渭中而不用乃安得鼓口舌申顏眉預前論議是非國家之事也國疾第二十八文學曰國有賢士而不用非士之過有國者之恥孔子大聖也諸侯莫能用當小位於魯三月不令而行不禁而止沛若時雨之灌萬物莫不興起也況乎位天下之本朝而施聖主之德音教澤乎今公卿處尊位執天下之要十有餘年功德不施於天下而勤勞於百姓百姓貧陋困窮而私家累萬金此君子所恥而伐檀所刺也昔者商鞅相秦後禮讓先貪鄙尚首功務進取無德厚於民而嚴刑罰於國俗日壞而民滋怨故惠王烹菹其身以謝天下當此之時亦不能論事矣今執政患儒貧賤而多言儒亦憂執事富貴而多患也大夫視文學悒悒而不言也丞相史曰夫辯國家之政事論執政之得失何不徐徐道理相喻何至切切如此乎大夫難罷鹽鐵者非有私也憂國家之用邊境之費也諸生誾誾爭鹽鐵亦非為己也欲反之於古而輔成仁義也二者各有所宗時世異務又安可堅任古術而非今之理也且夫小雅非人必有以易之諸生若有能安集國中懷來遠方使邊境無寇虜之災租稅盡為諸生除之何況鹽鐵均輸乎所以貴術儒者貴其處謙推讓以道盡人今辯訟愕愕然無赤賜之辭而見鄙倍之色非所聞也大夫言過而諸生亦如之諸生不直謝大夫耳賢良文學皆離席曰鄙人固陋希涉大庭狂言多不稱以逆執事夫藥酒苦於口而利於病忠言逆於耳而利於行故愕愕者福也諓諓者賊也林中多疾風富貴多諛言萬里之朝日聞唯唯而後聞諸生之愕愕此乃公卿之良藥鍼石大夫色少寬面文學而蘇賢良曰窮巷多曲辯而寡見者難喻文學守死溟涬之語而終不移夫往古之事昔有之語已可覩矣今以近世觀之自以目有所見耳有所聞世殊而事異文景之際建元之始民朴而歸本吏廉而自重殷殷屯屯人衍而家富今政非改而教非易也何世之彌薄而俗之滋衰也吏即少廉民即寡恥刑非誅惡而姦猶不止世人有言鄙儒不如都士文學皆出山東希涉大論子大夫論京師之日久願分明政治得失之事故所以然者也賢良曰夫山東天下之腹心賢士之戰場也高皇帝龍飛鳳舉於宋楚之間山東子弟蕭曹樊酈滕灌之屬為輔雖即異世亦既閎夭太顛而已禹出西羗文王生北夷然聖德高世有萬人之才負迭群之任出入都市一旦不知返數然後終於廝役而已僕雖不生長京師才駑下愚不足與大議竊以所聞閭里長老之言往者常民衣服溫暖而不靡器質朴牢而致用衣足以蔽體器足以便事馬足以易步車足以自載酒足以合歡而不湛樂足以理心而不淫入無宴樂之聞出無佚游之觀行即負嬴止作鋤耘用約而財饒本修而民富送死哀而不華養生適而不奢大臣正而無欲執政寬而不苛故黎民寧其性百吏保其官建元之始崇文修德天下乂安其後邪臣各以伎藝虧亂至治外障山海內興諸利楊可告緡江充禁服張大夫革令杜周治獄罰贖科適微細並行不可勝載夏蘭之屬妄搏王溫舒之徒妄殺殘吏萌起擾亂良民當此之時百姓不保其首領豪富莫必其族姓聖主覺焉乃刑戮充等誅滅殘賊以殺死罪之怨塞天下之責故居民肆然復安然其禍累世不復瘡痍至今未息故百官尚有殘賊之政而強宰尚有強奪之心大臣擅權而擊斷豪猾多黨而侵陵富貴奢侈貧賤篡殺女工難成而易弊車器難就而易敗車不累朞器不終歲一車千石一衣十鍾常民文杯畫案几席緝𨄌婢妾衣紈履絲匹庶粺飯肉食里有俗黨有場康莊馳逐窮巷蹋鞠秉耒抱臿躬耕身織者寡聚要歛容傅白黛青者眾無而為有貧而強夸文表無裏紈袴枲裝生不養死厚送葬死殫家遣女滿車富者欲過貧者欲及富者空藏貧者稱貸是以民年急而歲促貧即寡恥乏即少廉此所以刑非誅惡而姦猶不止也故國有嚴急之徵即生散不足之疾矣, krp: ''}
