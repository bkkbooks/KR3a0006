  - {type: variant, offset: 815, length: 0, content: '', krp: 中有竒殺視得書書言甚怪天子識其手書問其人果是偽書於是誅文成將軍隐之欒大因樂成侯見求言方天子既誅文成後悔其蚤死惜其方不盡及見欒大大説大為人長美言多方畧而敢為大言處之不疑是時上方憂河决有黄金不就乃拜大為五利將軍其後五利妄言見其師其方多不讐上乃誅五利陛下建學官親近忠良欲以絶怪惡之端而昭至徳之塗也宫室奢侈林木之蠧音妬也器械雕琢財用之蠧音妬也衣服靡麗布帛之蠧音妬也狗馬食人之食五榖之蠧音妬也口腹縱恣魚肉之蠧音妬也用費不節府庫之蠧音妬也漏積不禁田野之蠧音妬也䘮祭無度傷生之蠧音妬也諺曰蠧衆而木折隙大而墻壊墮成變故傷功工商上通傷農故一杯棬用百人之力一屏風就萬人之功其為害亦多矣目修於五色耳營於五音體極輕薄口極甘脆音翠功積於無用財盡於不急口腹不可為多故國病聚不足即政怠人病聚不足則身危傳曰福生於無為而患生於多欲知足然後富從之徳宜君人然後貴從之故貴爵而賤徳者雖為天子不尊矣貪物而不知止者雖有天下不富矣夫土地之生不益山澤之出有盡懐不富之}
  - {type: variant, offset: 816, length: 2, content: 干城, WYG: 而求不益之物挟百倍之欲而求有盡之財是桀紂之所以失其位也救匱第三十丞相去聲史曰治聚不足奈何賢良曰蓋橈音閙枉者過直橈通作撓屈也救文者以質昔者晏子相去聲齊一狐裘三十載故民奢示之以儉民儉示之以禮曽子曰晏子可謂知禮也已恭敬之有焉有若曰晏子一狐裘三十年遣車一乗及墓而反國君七个遣車七乘大夫五个遣車五乗晏子焉知禮曾子曰國無道君子耻盈禮焉國奢則示之以儉國儉則示之以禮方今公卿大夫子孫誠能節車輿適衣服躬親節儉率以敦朴罷園池損田宅内無事乎市列外無事乎山澤農夫有所施其功女紅音工有所粥其業如是則氣脉和平無聚不足之病矣反質篇曰齊桓公謂管仲曰吾國甚小而財用甚少而羣臣衣服輿馬甚汰吾欲禁之可乎管仲曰臣聞之君嘗之臣食之君好之臣服之今君之食也必桂之漿衣練紫之衣狐白之裘此羣臣之所奢大也詩云不躬不親庻民不信君欲禁之胡不自親乎桓公曰善於是更制練帛之衣大帛之冠朝一年而齊國儉}
