  - {type: variant, offset: 1331, length: 0, content: '', SBCK: 論子大夫論京師之日乆顧分明政治識之事故所以然者也賢良曰夫山東天下之腹心賢士之戰塲也高皇帝龍飛鳳舉於宋楚之間山東子弟蕭曹樊酈􅅬灌之屬爲輔雖即異世亦旣閎夭太顚}
