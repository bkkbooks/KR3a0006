  - {type: variant, offset: 2152, length: 0, content: '', WYG: 韓嬰曰古者八家而井田方里為一井廣三百歩長三百歩為一里其田九百畆廣一歩長一歩為一畆廣百歩長百歩為百畆八家為鄰家得百畆餘夫各得二十五畆家為公田十畆餘二十畆共為廬舍各得二畆半八家相保出入更守疾病相憂患難相救有無相貸飲食相召嫁娶相謀漁獵分得仁恩施行是以其民和親而相好詩曰中田有廬疆場有𤓰今或不然令民相伍有罪相伺有刑相舉使搆造怨仇而民相殘傷和睦之心賊仁恩害士化所和者寡欲敗者多於仁道泯焉詩曰其何能淑載胥及溺}
