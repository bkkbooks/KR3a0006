  - {type: variant, offset: 5647, length: 526, content: 汜論曰昔者曹子為魯将兵三戰不勝亡地千里使曹子計不顧後足不旋踵刎頸於陣中則終身為破軍擒将矣然而曹子不羞其敗耻死而無功柯之盟揄三尺之刃造桓公之胷三戰所亡一朝而反之勇聞於天下功立於魯國管仲輔公子糾而不能遂不可謂智遁逃奔走不死其難不可謂勇束縳桎梏不諱其耻不可謂貞當此三行者布衣弗友人君弗臣然而管仲免於縲絏之中立齊國之政九合諸侯一匡天下使管仲出死捐軀不顧後圖豈有此霸功哉今人君論其臣也不計其大功總其畧行而求小善則失賢之數也魯仲連曰效小節者不能行大威惡小耻者不能立榮名昔管仲射桓公中鈎簒也遺公子糾而不能死怯也束縳桎梏辱身也此三行者鄉里不通也世主不臣也使管仲終窮抑幽囚而不出慙耻而不見窮年沒夀不免為辱人賤行矣然管子并三行之過據齊國之政一匡天下九合諸侯為五伯首名高天下光照鄰國曹沫為魯君三戰三北而䘮地千里使曹子之足不離陳計不顧後出必死而不生則不免為敗軍擒將曹子以敗軍擒將非勇也功廢名滅後世無稱非智也故去三北之耻退而與魯君計也齊桓公有天下朝諸侯曹子以一劔之任刼桓公於壇位之上顧色不變而辭氣不悖三戰之所䘮一朝而反之天下震動驚駭威信呉楚傳名後世若此二公者非不能行小節忍小耻也以為殺身絶世功名不立非智也故去忿恚之心而成終身之名除感忿之耻而立累世之功故業與三王爭流名與天壤相敝也, SBCK: ''}
