front:
  text: 八大夫曰夫懷枉而言正自託於無欲而實不從非此士之情也昔李斯與包丘子俱事荀卿旣而李斯入秦遂取三公據萬乗之權以制海内功侔伊望名巨太山而包丘子不免於甕牗高廬如潦歲之鼃口非不衆也然卒死於溝壑而巳今内無以養外無以稱貧賤而好義雖言仁義亦不足貴者也文學曰方李斯之相秦也始皇任之人臣無二然而荀卿爲之不食覩其罹不測之禍也包丘子飯麻蓬藜修道白屋之下樂其志安之於廣廈芻豢無赫赫之􅀔亦無戚戚之憂夫晉獻垂􅁄非不美也宫之竒見之而嘆知荀息之圖之也智伯富有三晉非不盛也然不知襄子之謀之也季孫之􅈢貉非不麗也而不知魯君之患之也故晉獻以寳馬釣虞虢襄子以城壞誘智伯故智伯身禽於趙而虞虢卒并於晉以其務得不顧其後貪土地而利寳馬也孔子曰人無遠慮必有近憂今之在位者見利不虞害貪得不顧耻以利易身以財易死無仁義之德而有富貴之禄􅀂蹈坎穽食於懸門之下此李斯之所以伏五刑也􅀯方有鳥名鵷鶵非竹實不食非醴泉不飮飛過太山太山之鴟俛啄腐䑕仰見鵷鶵而嚇今公卿以其富貴笑儒者爲之常行得無􅀂太山鴟嚇鵷鶵乎大夫曰學者所以防固辭禮者所以文鄙行也故學以輔德禮以文質言思可道行思可樂惡言不出於口邪行不及於巳動作應禮從容中道故禮以行之孫以出之是以終日言無口過終身行無􅁈尤今人主張官立朝以治民䟽爵分禄以襃賢而曰懸門腐䑕何辭之鄙背而悖於所聞也文學曰聖主設官以授任能者處之分禄以任賢能者受之義貴無高義取無多故舜受尭之天下太公不避周之三公苟非其人簞食豆􅅅猶爲頼民也故德薄而位高力小而任重鮮不及矣夫泰山鴟啄腐䑕於窮澤幽谷之中非有害於人也今之有司盜主財而食之於刑法之旁不知機之是發又以嚇人其患惡得若泰山之鴟乎大夫曰司馬子言天下穰穰皆爲利往趙女不擇醜好鄭嫗不擇遠近商人不媿耻辱戎士不愛死力士不在親事君不避其難皆爲利禄也儒墨内貪外矜往來㳺說栖栖然亦未爲得也故尊榮者士之願也富貴者士之期也方李期在荀卿之門闒茸與之齊軫及其􅁬翼高舉龍昇驥騖過九軼二翺翔萬仞鴻鵠華騮且同侣况跛牂燕雀之屬乎席天下之權御宇内之衆後車百乗食禄萬鍾而拘儒布􅄄不完糟糠不飽非甘菽藿而卑廣廈亦不能得巳雖欲嚇人其何巳乎文學曰君子懷德小人懷土賢士徇名貪夫死利李斯貪其所欲致其所惡孫叔敖早見於未萌三去相而不悔非樂卑賤而惡重禄也慮遠而避害謹也夫郊􅀕之牛養食朞年衣之文繡以入廟堂太宰執其鸞刀以啓其毛方此之時願任重而止峻坂不可得也商鞅困於彭池吳起之伏王尸願被布􅄄而處窮鄙之蒿廬李斯相秦席天下之􅀔志小萬乗及其囚於囹圄車制於雲陽之市亦願􅀒薪入鴻門行上蔡曲街徑不可得也蘇秦吳起以權􅀔自殺商鞅李斯以尊重自滅皆貪禄慕榮以没其身從車百乗曾不足以載其禍也
