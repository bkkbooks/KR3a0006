  - {type: variant, offset: 4471, length: 0, content: '', WYG: 歌為變徵之聲士皆垂淚涕泣又前而為歌曰風蕭蕭兮易水寒壯士一去兮不復還復為羽聲慨慷士皆瞋目髪盡上衝冠於是荆軻遂就車而去終已不顧既至秦秦王聞之大喜}
