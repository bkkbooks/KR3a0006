  - {type: variant, offset: 1698, length: 236, content: 呉鄧錢布天下食貨志曰孝文五年為錢益多而輕乃更鑄四銖錢其文為半兩除盗鑄錢令使民放鑄呉王傳曰呉王濞者高帝兄劉仲之子也上患呉會稽輕悍無壯王以塡之諸子少乃立濞於沛為呉王孝惠高后時天下初定郡國諸侯各務自拊循其民呉有豫章郡銅山濞則招致天下亡命者益鑄錢煮海水為鹽以故無賦國用益饒佞幸傳曰鄧通者蜀郡南安人也以擢船為黃頭郎文帝悦焉上使善相者相通曰當貧餓死文帝曰能富通者在我也何謂貧乎於是睗通蜀嚴道以鑄錢鄧氏錢布天下其富如此食貨志曰呉以諸侯即山鑄錢富埒天子後卒叛逆鄧通大夫也以鑄錢財過王者故呉, SBCK: 吳}
