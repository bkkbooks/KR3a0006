  - {type: variant, offset: 4175, length: 238, content: 汜論曰聖人之道寛而栗嚴而温柔而直猛而和太剛則折太柔則巻聖人正在剛柔之間乃得道之本積隂則沈積陽則飛隂陽相接乃能成和故恩推則懦懦則不威嚴推則猛猛則不和愛推則縦縦則不令刑推則虐虐則無親昔者齊簡公釋其國家之柄而專任其大臣將相攝威擅勢私門成黨而公道不行故使陳成田常鴟夷子皮得成其難使吕氏絶嗣而陳氏有國者此柔懦所生也鄭子陽剛毅而好罰其於罰也執而無赦舍人有折弓者畏罪而恐誅則因猘狗之驚以殺子陽此剛猛之所致也今不知道者見柔懦者侵則矜於為剛毅見剛毅者亡則矜於為柔懦此本無主於中而見聞舛馳於外者也, SBCK: ''}
