  - {type: variant, offset: 3007, length: 511, content: 規矩而鑿枘調師曠之諧五音也正其六律而宮商調當世之工匠不能調其鑿枘則改規矩不能恊聲音則變舊律是以鑿枘剌戾而不合聲音泛越而不和夫舉規矩而知宜吹律而知變上也因循而不作以俟其人次也是以曹丞相日飲醇酒倪大夫閉口不言故治大者不可以煩煩則亂治小者不可以怠怠則廢春秋曰其政恢卓恢卓可以為卿相其政察察察察可以為匹夫夫維綱不張禮義不行公卿之憂也案上之文期會之事丞史之任也尚書曰俊乂在官百僚師師百工惟時庶尹允諧言官得其人人任其事故官治而不亂事起而不廢士守其職大夫理其位公卿總要執凡而已故任能者責成而不勞任己者事廢而無功桓公之於管仲耳而目之故君子勞於求賢逸於用之豈云殆哉昔周公之相也謙卑而不鄰以勞天下之士是以俊乂滿朝賢智充門孔子無爵位以布衣從才士七十有餘人皆諸侯卿相之人也況處三公之尊以養天下之士哉今以公卿之上位爵祿之美而不能致士則未有進賢之道堯之舉舜也賓而妻之桓公舉管仲也賓而師之以天子而妻匹夫可謂親賢矣以諸侯而師匹夫可謂敬賓矣是以賢者從之若流歸之不疑今當世在位者既無燕昭之下士鹿鳴之樂賢而行臧文子椒之意蔽賢妬能自高其智訾人之才足己而不問卑士而不友以位尚賢以祿驕士而求士之用亦難矣大夫繆然不言蓋賢良長嘆息焉御史進曰太公相文武以王天下管仲相桓公以, WYG: 去}
