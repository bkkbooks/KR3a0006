body:
  text: 鹽鐵論卷四地廣第十六大夫曰王者包含并覆普愛無私不為近重施不為遠遺恩今俱是民也俱是臣也安危勞佚不齊獨不當調邪不念彼而獨計此斯亦好議矣緣邊之民處寒苦之地距強胡之難烽燧一動有沒身之纍故邊民百戰而中國恬臥者以邊郡為蔽扞也詩云莫非王事而我獨勞刺不均也是以聖王懷四方獨苦興師推卻胡越遠寇安災散中國肥饒之餘以調邊境邊境強則中國安中國安則晏然無事何求而不默也文學曰古者天子之立於天下之中縣內方不過千里諸侯列國不及不食之地禹貢至于五千里民各供其君諸侯各保其國是以百姓均調而繇役不勞也今推胡越數千里道路回避士卒勞罷故邊民有刎頸之禍而中國有死亡之患此百姓之所以囂囂而不默也夫治國之道由中及外自近者始近者親附然後來遠百姓內足然後恤外故群臣論或欲田輪臺明主不許以為先救近務及時本業也故下詔曰當今之務在於禁苛暴止擅賦力本農公卿宜承意請減除不任以佐百姓之急今中國弊落不憂務在邊境意者地廣而不耕多種而不耨費力而無功詩云無田甫田維莠驕驕其斯之謂歟大夫曰湯武之伐非好用兵也周宣王辟國千里非貪侵也所以除寇賊而安百姓也故無功之師君子不行無用之地聖王不貪先帝舉湯武之師定三垂之難一面而制敵胸奴遁逃因河山以為防故去沙石鹹鹵不食之地故割斗辟之縣棄造陽之地以與胡省曲塞據河險守要害以寬徭役保士民由此觀之聖主用心非務廣地以勞衆而已矣文學曰秦之用兵可謂極矣蒙恬斥境可謂遠矣今踰蒙恬之塞立郡縣寇虜之地地彌遠而民滋勞朔方以西長安以北新郡之功外城之費不可勝計非徒是也司馬唐蒙鑿西南夷之塗巴蜀弊於卭筰橫海征南夷樓船戍東越荊楚罷於甌駱左將伐朝鮮開臨屯燕齊困於穢貉張騫通殊遠納無用府庫之藏流於外國非特斗辟之費造陽之役也由此觀之非人主用心好事之臣為縣官計過也大夫曰挾管仲之智者非為厮役之使也懷陶朱之慮者不居貧困之處文學能言而不能行居下而訕上處貧而非富大言而不從高厲而行卑誹譽訾議以要名采善於當世夫祿不過秉握者不足以言治家不滿檐石者不足以計事儒皆貧羸衣冠不完安知國家之政縣官之事乎何斗辟造陽也文學曰夫賤不害智貧不妨行顏淵屢空不為不賢孔子不容不為不聖必將以貌舉人以才進士則太公終身鼓刀寧戚不離飯牛矣古之君子守道以立名修身以俟時不為窮變節不為賤易志惟仁之處惟義之行臨財苟得見利反義不義而富無名而貴仁者不為也故曾參閔子不以其仁易晉楚之富伯夷不以其行易諸侯之位是以齊景公有馬千駟而不能與之爭名孔子曰賢哉回也一簞食一瓢飲在於陋巷人不堪其憂回也不改其樂故惟仁者能處約樂貧小人富斯暴貧斯濫矣楊子曰為仁不富為富不仁苟先利而後義取奪不厭公卿積億萬大夫積千金士積百金利己并財以聚百姓寒苦流離於路儒獨何以完其衣冠也貧富第十七大夫曰余結髮束修年十三幸得宿衛給事輦轂之下以至卿大夫之位獲祿受賜六十有餘年矣車馬衣服之用妻子僕養之費量入為出儉節以居之奉祿賞賜一二籌策之積浸以致富成業故分土若一賢者能守之分財若一智者能籌之夫白圭之廢著子貢之三至千金豈必賴之民哉運之六寸轉之息耗取之貴賤之間耳文學曰古者事業不二利祿不兼然後諸業不相遠而貧富不相懸也夫乘爵祿以謙讓者名不可勝舉也因權勢以求利者入不可勝數也食湖池管山海芻蕘者不能與之爭澤商賈不能與之爭利子貢以布衣致之而孔子非之況以勢位求之者乎故古者大夫思其仁義以充其位不為權利以充其私也大夫曰山嶽有饒然後百姓贍焉河海有潤然後民取足焉夫尋常之污不能溉陂澤丘阜之木不能成宮室小不能苞大少不能贍多未有不能自足而能足人者也未有不能自治而能治人者也故善為人者能自為者也善治人者能自治者也文學不能治內安能理外乎文學曰行遠道者假於車濟江海者因於舟故賢士之立功成名因於資而假物者也公輸子能因人主之材木以構宮室臺榭而不能自為專屋狹廬材不足也歐冶能因國君之銅鐵以為金爐大鍾而不能自為壺鼎盤杅無其用也君子能因人主之正朝以和百姓潤衆庶而不能自饒其家勢不便也故舜耕於歷山恩不及州里太公屠牛於朝歌利不及妻子及其見用恩流八荒德溢四海故舜假之堯太公因之周君子能修身以假道者不能枉道而假財也大夫曰道懸於天物布於地智者以衍愚者以困子貢以著積顯於諸侯陶朱公以貨殖尊於當世富者交焉貧者贍焉故上自人君下及布衣之士莫不載其德稱其仁原憲孔伋當世被饑寒之患顏回屢空於窮巷當此之時迫於窟穴拘於縕袍雖欲假財信姦佞亦不能也文學曰孔子云富而可求雖執鞭之事吾亦為之如不可求從吾所好君子求義非苟富也故刺子貢不受命而貨殖焉君子遭時則富且貴不遇退而樂道不以利纍己故不違義而妄取隱居修節不欲妨行故不毀名而趨勢雖付之以韓魏之家非其志則不居也富貴不能榮謗毀不能傷也故原憲之縕袍賢於季孫之狐貉趙宣孟之魚飧甘於智伯之芻豢子思之銀珮美於虞公之垂棘魏文侯軾段干木之閭非以其有勢也晉文公見韓慶下車而趨非以其多財以其富於仁充於德也故貴何必財亦仁義而已矣毀學第十八大夫曰夫懷枉而言正自託於無欲而實不從此非士之情也昔李斯與包丘子俱事荀卿既而李斯入秦遂取三公據萬乘之權以制海內功侔伊望名巨太山而包丘子不免於甕牖高廬如潦歲之蛙口非不衆也然卒死於溝壑而已今內無以養外無以稱貧賤而好義雖言仁義亦不足貴者也文學曰方李斯之相秦也始皇任之人臣無二然而荀卿為之不食覩其罹不測之禍也包丘子飯麻蓬藜修道白屋之下樂其志安之於廣廈芻豢無赫赫之勢亦無戚戚之憂夫晉獻垂棘非不美也宮之奇見之而嘆知荀息之圖之也智伯富有三晉非不盛也然不知襄子之謀之也季孫之狐貉非不麗也而不知魯君之患之也故晉獻以寶馬釣虞虢襄子以城壞誘智伯故智伯身禽於趙而虞虢卒并於晉以其務得不顧其後貪土地而利寶馬也孔子曰人無遠慮必有近憂今之在位者見利不虞害貪得不顧恥以利易身以財易死無仁義之德而有富貴之祿若蹈坎穽食於懸門之下此李斯之所以伏五刑也南方有鳥名鵷雛非竹實不食非醴泉不飲飛過太山太山之鴟俯啄腐鼠仰見鵷雛而嚇今公卿以其富貴笑儒者為之常行得無若太山鴟嚇鵷雛乎大夫曰學者所以防固辭禮者所以文鄙行也故學以輔德禮以文質言思可道行思可樂惡言不出於口邪行不及於己動作應禮從容中道故禮以行之孫以出之是以終日言無口過終身行無冤尤今人主張官立朝以治民疏爵分祿以褒賢而曰懸門腐鼠何辭之鄙背而悖於所聞也文學曰聖主設官以授任能者處之分祿以任賢能者受之義貴無高義取無多故舜受堯之天下太公不避周之三公苟非其人簞食豆羹猶為賴民也故德薄而位高力少而任重鮮不及矣夫泰山鴟啄腐鼠於窮澤幽谷之中非有害於人也今之有司盜主財而食之於刑法之旁不知機之是發又以嚇人其患惡得若泰山之鴟乎大夫曰司馬子言天下穰穰皆為利往趙女不擇醜好鄭嫗不擇遠近商人不愧恥辱戎士不愛死力士不在親事君不避其難皆為利祿也儒墨內貪外矜往來游說栖栖然亦未為得也故尊榮者士之願也富貴者士之期也方李斯在荀卿之門闒茸與之齊軫及其奮翼高舉龍升驥騖過九軼二翱翔萬仞鴻鵠華騮且同侶況跛牂燕雀之屬乎席天下之權御宇內之衆後車百乘食祿萬鍾而拘儒布褐不完糟糠不飽非甘菽藿而卑廣廈亦不能得已雖欲嚇人其何已乎文學曰君子懷德小人懷土賢士徇名貪夫死利李斯貪其所欲致其所惡孫叔敖早見於未萌三去相而不悔非樂卑賤而惡重祿也慮患遠而避害謹也夫郊祭之牛養食朞年衣之文繡以入廟堂太宰執其鸞刀以啓其毛方此之時願任重而上峻坂不可得也商鞅困於彭池吳起之伏王尸願被布褐而處窮鄙之蒿廬不可得也李斯相秦席天下之勢志小萬乘及其囚於囹圄車裂於雲陽之市亦願負薪入東門行上蔡曲街徑不可得也蘇秦吳起以權勢自殺商鞅李斯以尊重自滅皆貪祿慕榮以沒其身從車百乘曾不足以載其禍也褒賢第十九大夫曰伯夷以廉饑尾生以信死由小器而虧大體匹夫匹婦之為諒也經於溝瀆而莫之知也何功名之有蘇秦張儀智足以強國勇足以威敵一怒而諸侯懼安居而天下息萬乘之主莫不屈體卑辭重幣請交此所謂天下名士也夫智不足與謀而權不能舉當世民斯為下也今舉亡而為有虛而為盈布衣穿履深念徐行若有遺亡非立功成名之士而亦未免於世俗也文學曰蘇秦以從顯於趙張儀以橫任於秦方此之時非不尊貴也然智士隨而憂之知夫不以道進者必不以道退不以義得者必不以義亡季孟之權三桓之富不可及也孔子為之曰微為人臣權均於君富侔於國者亡故其位彌高而罪彌重祿滋厚而罪滋多夫行者先全己而後求名仕者先辟害而後求祿故香餌非不美也龜龍聞而深藏鸞鳳見而高逝者知其害身也夫為烏鵲魚鱉食香餌而後狂飛奔走遜頭屈遰無益於死今有司盜秉國法進不顧罪卒然有急然後車馳人趨無益於死所盜不足償於臧獲妻子奔亡無處所身在深牢莫知恤視方此之時何暇得以笑乎大夫曰文學高行矯然若不可卷盛節潔言皎然若不可涅然戍卒陳勝釋挽輅首為叛逆自立張楚素非有回由處士之行宰相列臣之位也奮於大澤不過旬月而齊魯儒墨縉紳之徒肆其長衣長衣容衣也負孔氏之禮器詩書委質為臣孔甲為涉博士卒俱死陳為天下大笑深藏高逝者固若是也文學曰周室衰禮義壞不能統理天下諸侯交爭相滅亡并為六國兵革不休民不得寧息秦以虎狼之心蠶食諸侯并吞戰國以為郡縣伐能矜功自以為過堯舜而羞與之同棄仁義而尚刑罰以為今時不師於文而決於武趙高治獄於內蒙恬用兵於外百姓愁苦同心而患秦陳王赫然奮爪牙為天下首事道雖凶而儒墨或干之者以為無王久矣道擁遏不得行自孔子以至于茲而秦復重禁之故發憤於陳王也孔子曰如有用我者吾其為東周乎庶幾成湯文武之功為百姓除殘去賊豈貪祿樂位哉大夫曰文學言行雖有伯夷之廉不及柳下惠之貞不過高瞻下視潔言污行觴酒豆肉遷延相讓辭小取大雞廉狼吞趙綰王臧之等以儒術擢為上卿而有姦利殘忍之心主父偃以口舌取大官竊權重欺紿宗室受諸侯之賂卒皆誅死東方朔自稱辨略消堅釋石當世無雙然省其私行狂夫不忍為況無東方朔之口其餘無可觀者也文學曰志善者忘惡謹小者致大俎豆之間足以觀禮閨門之內足以論行夫服古之服誦古之道舍此而為非者鮮矣故君子時然後言義然後取不以道得之不居也滿而不溢泰而不驕故袁盎親於景帝秣馬不過一駟公孫弘即三公之位家不過十乘東方先生說聽言行於武帝而不驕溢主父見困厄之日久矣疾在位者不好道而富且貴莫知恤士也於是取饒衍之餘以周窮士之急非為私家之業也當世囂囂非患儒之雞廉患在位者之虎飽鴟咽於求覽無所孑遺耳
