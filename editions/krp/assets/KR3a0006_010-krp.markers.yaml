  - {type: variant, offset: 11340, length: 333, content: 呉世家曰伍子胥之初奔呉說呉王僚以伐楚之利公子光曰胥之父兄為僇於楚欲自報其仇耳未見其利於是伍員知光有他志乃求勇士專諸見之光喜乃客伍子胥子胥退而耕於野以待專諸之事十二年冬楚平王卒十三年春呉欲因楚䘮而伐之使公子蓋餘燭庸以兵圍楚之六灊使季札於晉以觀諸侯之變楚發兵絶呉兵後呉兵不得還於是呉公子光曰此時不可失也告專諸曰不索何獲我真王嗣當立吾欲求之季子雖至不吾廢也專諸曰王僚可殺也母老子弱而兩公子將兵攻楚楚絶其路方今呉外困於楚而内空無骨鯁之臣是無奈我何光曰我身子之身也四月丙子光伏甲士於窟室而謁王僚飲王僚使兵陳於道自王宫至光之家門階戸席皆王僚之親也人夾持鈹公子光詳為足疾入于窟室使專諸置匕首於炙魚之中以進食手匕首刺王僚鈹交於匈遂殺王僚公子光竟代立為王是為呉王闔廬闔廬乃以專諸子為卿, SBCK: ''}
