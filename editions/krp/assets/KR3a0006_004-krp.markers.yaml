  - {type: variant, offset: 7353, length: 202, content: 也越絶書曰殷湯遭夏桀無道殘賊天下於是湯用伊尹行至聖之心見桀無道虐行故伐夏放桀而王道興躍革亂補弊移風易俗改制作新海内畢貢天下承風湯以文聖此之謂也文王死九年天下八百諸侯皆一旦㑹於孟津之上不言同辭不呼自來盡知武王忠信欲從武王與之伐紂當是時比干箕子㣲子尚在武王賢之未敢伐也還諸侯歸二年紂賊比干囚箕子㣲子去之刳姙婦殘朝渉武王見賢臣已亡乃朝天下興師伐紂殺之武王未下車封比干之墓發太倉之粟以贍天下封㣲子於宋此武王以禮信, SBCK: ''}
