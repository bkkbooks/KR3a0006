  - {type: variant, offset: 1134, length: 2, content: 列於, WYG: 十二乗者十枚奈何以萬乗之國無寳乎齊王曰寡人之所以為寳與王異吾臣有檀子者使之守南城則楚人不敢為冦泗水上有十二}
