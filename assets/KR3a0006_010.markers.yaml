  - {type: variant, offset: 186, length: 292, content: 治之若救爛撲焦不能禁非網䟽而罪漏禮義廢而刑罰任也方今律令百有餘篇文章繁罪名重郡國用之疑惑或淺或深自吏明習者不知所處而況愚民乎律令塵蠹於棧閣吏不能徧覩而況愚民乎此斷獄所以滋眾而民犯禁滋多也宜犴宜獄握粟出卜自何能穀刺刑法繁也親服之屬甚眾上殺下殺而服不過五五刑之屬三千上附下附而罪不過五故治民之道務篤其教而已大夫曰文學言王者立法曠若大路今馳道不小也而民公犯之以其罰罪之輕也千仞之高人不輕凌千鈞之重人不輕舉商君刑棄灰於道而秦民治故盜馬者死盜牛者加所以重本而絕輕疾之資也武兵名食所以佐邊而重武備也盜傷與殺同罪所以累其心而責其意也猶魯以楚師伐齊而春秋惡之故輕之為重淺之為深有緣而然法之微者固非眾人, WYG: ''}
