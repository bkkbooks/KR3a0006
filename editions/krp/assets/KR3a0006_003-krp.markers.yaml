  - {type: variant, offset: 2472, length: 362, content: 齊世家曰田釐子乞事齊景公為大夫其收賦稅於民以小斗受之其粟予民以大斗行隂德於民而景公弗禁由此田氏得齊衆心宗族益強民思田氏晏子數諫景公景公弗聽已而使於晋與叔向私語曰齊國之政其卒歸於田氏矣田乞卒子常代立是為田成子相簡公復修釐子之政以大斗出貸以小斗收齊人歌之曰嫗乎采芭歸乎田成子管子曰權不兩錯政不二門故曰脛大於股者難以歩指大於臂者難以把本小末大不能相使也范睢曰木實繁者披其枝披其枝者傷其心大其都者危其國尊其臣者卑其主韓非子曰愛臣太親必危其身人臣太貴必易主位主妾無等必危嫡子兄弟不服必危社稷千乘之君無備必有百乘之臣在其側以徙其民而傾其國萬乗之君無備必有千乗之家在其側以徙其威而傾其國是以姦臣蕃息主道衰亡是故諸侯之博大天子之害也羣臣之大富君主之敗也故曰腓大於股難以趨走主失其神虎随其後說山訓曰末不可以強於本指不可以大於臂下輕上重其覆必易, SBCK: ''}
