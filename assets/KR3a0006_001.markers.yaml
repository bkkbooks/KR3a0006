  - {type: variant, offset: 2229, length: 0, content: '', WYG: 長沮桀溺二人楚隱者南華經曰柳下惠之弟名曰盗蹠盗蹠從卒九千人橫行天下侵暴諸侯穴室樞戶驅人牛馬取人婦女貪得忘親不顧父母兄弟不祭先祖所過之邑大國守城小國入保萬民苦之史記正義曰按蹠者黄帝時大盗之名以柳下惠弟為天下大盗故世放古號之盗蹠許慎曰莊蹻楚威王之將軍能大為盗也貨殖傳曰猗頓用盬鹽起與王者埒富孔叢子曰猗頓魯之窮士也耕則常飢桑則常寒聞朱公富徃而問術焉朱公告之曰子欲速富當畜五㹀於是乃適兩河大畜牛羊於猗氏之南十年之間其息不可計貲擬王公馳名天下以興富於猗氏故曰猗頓}
