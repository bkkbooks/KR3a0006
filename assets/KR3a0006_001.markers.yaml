  - {type: variant, offset: 2831, length: 1, content: 硎, WYG: 匭啜土鉶雖監門之養不觳於此矣精神訓曰高臺層榭人之所䴡也而堯樸桷不斵素題不枅珍怪竒異人之所美也而堯粢之飯藜藿之羮文繡狐白人之所好也而堯布衣掩形鹿裘禦寒俶真訓曰夫聖人量腹而食度形而衣節於已而已貪汚之心奚由生哉故能有天下者必無以天下為也}
