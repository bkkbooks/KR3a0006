  - {type: variant, offset: 870, length: 0, content: '', SBCK: 文學曰能言之能行之者湯武也能言不能行者有司也文學竊周公之服有司竊周公之位文學桎梏於舊術有司桎梏於財利主父􅅯以舌自殺有司以利自困夫驥之才千里非造父不能使禹之知萬人非舜爲相不能用故季􅁊子􅃪政栁下惠忽然不見孔子爲司冦然後悖熾驥舉之在伯樂其功在造父造父攝轡馬無駑良皆可取道周公之時士無賢不肖皆可與言至治故御之良者善調馬相之賢者善使士}
