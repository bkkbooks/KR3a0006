  - {type: punctuation, offset: 1472, content: 《, id: KR3a0006_tls_005-bkkpn321}
  - {type: variant, offset: 1472, length: 346, content: 殊路第二十一大夫曰七十子躬受聖人之術有名列於孔子之門皆諸侯卿相之才可南面者數人云政事者冉有季路言語宰我子貢宰我秉事有寵於齊田常作難道不行身死庭中簡公殺於檀臺子路仕衛孔悝作亂不能救君出亡身葅於衛子貢子皋遁逃不能死其難食人之重祿不能更處人尊官不能存何其厚於己而薄於君哉同門共業自以為知古今之義明君臣之禮或死或亡二三子殊路何道之悖也文學曰宋殤公知孔父之賢而不早任故身死魯莊知季有之賢授之政晚而國亂衛君近佞遠賢子路居蒲孔悝為政簡公不聽宰我而漏其謀是以二君身被放殺而禍及忠臣二子者有事而不與其謀故可以死可以生去止其義一也晏嬰不死崔慶之難不可謂不義微子去殷之亂可謂不仁乎大夫曰至美素璞物莫能飾也至賢保真偽文莫能增也故金玉不琢美珠不畫今仲由冉求無檀柘之材隋和之璞而強文之譬若彫朽木而礪鈆刀飾嫫母畫土人也被以, WYG: 鹽鐡論卷}
