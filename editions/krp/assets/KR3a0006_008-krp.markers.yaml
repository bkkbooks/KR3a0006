  - {type: variant, offset: 8249, length: 324, content: 髙誘曰衝車所以衝突敵之軍能陷破之也有道之國不可攻伐使欲攻已者折還其衝車於千里之外不敢來也晏子春秋曰晉平公欲伐齊使范昭徃觀焉景公賜之酒酒酣范昭曰願請君之樽酌公曰酌寡人之樽進之於客范昭已飲晏子曰徹樽更之罇觶具矣范昭佯醉不悦而起舞謂太師曰能為我調成周之樂乎吾為子舞之太師曰冥臣不習范昭趨而出景公謂晏子曰晉大國也使人來將觀吾政也今子怒大國之使者將奈何晏子曰夫范昭之為人非陋而不識禮也且欲試吾君臣故絶之也景公謂太師曰子何以不為客調成周之樂乎太師對曰夫成周之樂天子之樂也若調之必人主舞之今范昭人臣也而欲舞天子之樂臣故不為也范昭歸以告平公曰齊未可伐也臣欲試其君而晏子識之臣欲犯其禮而太師知之仲尼聞之曰夫不出於樽爼之間而知千里之外其晏子之謂也可謂折衝矣而太師其與焉, SBCK: ''}
