  - {type: variant, offset: 5336, length: 289, content: 周紀曰武王修文王業東觀兵孟津為文王木主載以居中軍自稱太子發言奉文王以伐紂不敢自專遂興師渡于河時諸侯不期而會孟津者八百諸侯皆曰紂可伐武王曰未可也乃還師居二年聞紂昏亂滋甚殺比干囚箕子太師疵少師彊㣲子抱其祭器而犇周於是武王乃渡孟津伐紂紂師皆倒干戈以戰紂軍潰畔紂死周書曰周車三百五十乗陳于牧野帝辛從武王使尚父與伯夫致師王既以虎賁戎車馳商師商師大敗商辛奔内登于廩臺之上屏遮而自燔于火武王乃手太白以麾諸侯諸侯畢拜蓫揖之商庶百姓咸俟于郊羣賔僉進曰上天降休再拜稽首武王答拜先入適王所乃克射之三發而後下車而擊之以輕吕斬之以黄鉞折懸諸太白適二女之所乃既縊王又射之三發乃右擊之以輕吕斬之以𤣥鉞懸諸小白, SBCK: ''}
