  - {type: variant, offset: 6671, length: 373, content: 泰族訓曰良匠不能斵金巧冶不能鑠木金之勢不可斵而木之性不可鑠也埏埴而為器窬木而為舟鑠鐵而為月鑄金而為鐘因其可也駕馬服牛令雞司夜令狗守門因其然也民有好色之性故有大婚之禮有飲食之性故有大饗之誼有喜樂之性故有鐘鼓筦絃之音有悲哀之性故有衰絰哭踊之節故先王之制法也因民之所好而為之節文者也因其好色而制婚姻之禮故男女有别因其喜音而正雅頌之聲故風俗不流因其寧家室樂妻子敎之以順故父子有親因其喜朋友而教之以悌故長㓜有序然後修朝聘以明貴賤鄉飲習射以明長㓜時搜振旅以習用兵也入學庠序以修人倫此皆人之所有於性而聖人之所匠成也傳曰人有六情目欲視好色耳欲聼宫商鼻欲嗅芬香口欲嗜丼㫖其身體四肢欲安而不作衣欲被文繡而輕煖此六者民之六情也失之則亂從之則穆故聖王之敎其民也必因其情而節之以禮必從其欲而制之以義義簡而備禮易而法去情不逺故民之從命也速孔子知道之易行曰詩云牖民孔易非虚辭也, SBCK: ''}
