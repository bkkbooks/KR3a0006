  - {type: variant, offset: 211, length: 0, content: '', krp: 商鞅法行而亡商鞅有獨智之慮世不獨見之證文學不足與權當世亦無負累之殃也論誹第二十四丞相去聲史曰晏子有言儒者華於言而寡於實繁於樂音洛而舒於民久䘮以害生厚葬以傷業禮煩而難行道迂而難遵稱徃古而言訾音紫當世賤所見而貴所聞比人本狂以已為拭此顔異所以誅黜而狄山死於匈奴也平凖書曰初異為濟南亭長以㢘直稍遷至九卿上與張湯既造白鹿皮幣問異異曰今王侯朝賀以蒼璧直數千而其皮薦反四十萬本末不相稱天子不說張湯乂與異有郤及人有告異以他議事下張湯治異異與客語客語初令下有不便者異不應㣲反脣湯奏當九卿見令不便不入言而腹誹論死自是之後有腹誹之法以此而公卿大夫多諂䛕取容矣張湯傳曰匈奴来請和親羣臣議上前博士狄山曰和親便上問其便山曰兵者㓙器未易數動髙帝欲伐匈奴大困平城乃遂結和親孝恵髙后時天下安樂及孝文帝欲事匈奴北邉蕭然苦兵矣孝景時吳楚七國反景帝往来東宫間寒心者數月吴楚已破竟景帝不言兵天下富實今自陛下舉兵擊匈奴中國以空虗邉民大困貧由此觀之不如和親上問湯湯曰此愚儒無知狄山曰臣固愚忠若御史大夫湯乃詐忠若湯之治淮南江都以深文痛詆諸侯别䟽骨肉使蕃臣不自安臣固知湯之為詐忠於是上作}
  - {type: variant, offset: 212, length: 4, content: 玩好人情, WYG: 曰吾使生居一郡能無使虜入盗乎曰不能曰居一縣對曰不能復曰居一障間山自度辯窮且下吏曰䏻于是上遣山乗鄣至月餘匈奴斬山頭而去自是以後羣臣震慴䖏其位而非其朝音潮生乎世而訕其上終以被戮而䘮其軀此獨誰為負其累而蒙其殃乎文學曰禮所以坊古防字滛樂所以移風禮興樂正則刑罰中故堤古隄字坊古防字成而民無水菑禮義立民無亂患故禮義壞堤古隄字坊古防字决所以治者未之有也防古本作坊坊以畜水亦以障水者也坊記曰子言之君子之道譬則坊與坊民}
