  - {type: variant, offset: 1138, length: 0, content: '', WYG: 皆來朝吾臣有盼子者使之守髙唐則趙人不敢東漁于河吾臣有黔夫者使之守徐州則燕人祭北門趙人祭西門從而歸之者十千餘家吾臣有種首者使之備盗賊而道不拾遺吾將以照千里之外豈特十二乗哉魏王慙不懌而去詩曰辭之懌矣民之莫矣反質篇曰經侯徃適魏太子左帯羽玊具劔右帯環珮左光照右右光照左坐有頃太子不視也又不問也經侯曰魏國亦有寳乎太子曰有經侯曰其寳何如太子曰主信臣忠百姓上戴此魏之寳也經侯曰吾所問者非是之謂也乃問其器而已太子曰有徒師沼治魏而市無預賈郄辛治陽而道不拾遺芒卯在朝而四鄰賢士無不相因而見此三大夫乃魏國之大寳於是經侯黙然不應左觧玉具右觧環佩委之坐愆然而起黙然不謝趨而出上車驅去魏太子使騎操劔佩逐與經侯使告經侯曰吾無徳所寳不能為珠玉所守此寒不可衣飢不可食無為遺我賊於是經侯杜門不出傳死雜事篇曰秦欲伐楚使使者徃觀楚之寳器楚王聞之召令尹子西而問焉曰秦欲觀楚之寳器吾和氏之璧随侯之珠可以示諸令尹子西對曰不知也召昭奚恤而問焉昭奚恤對曰此欲觀吾國得失而圖之不在寳器在賢臣珠玉玩好之物非寳重者王遂使昭奚恤應之昭奚恤發精兵三百人陳於西門之内為東面之壇一為南面之壇四為西面之壇一秦使者}
