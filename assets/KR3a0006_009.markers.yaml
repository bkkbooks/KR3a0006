  - {type: variant, offset: 709, length: 1, content: 金, WYG: 大小之執輕重之權其與一家之富一夫之彊胡可勝計也然而兵破於陳渉地奪於劉氏者何也秦王貪狼暴虐殘賊天下窮困萬民以適其欲也詩云雍雍鳴􅀈旭日始旦登得前利不念後咎故呉王知伐齊之便而不知干遂之患秦知進取之利而不知鴻門之難去聲是以知一而不知十也黄歇曰易曰狐濡其尾此言始之易終之難也何以知其然也智氏見伐趙之利而不知榆次之禍也呉見伐齊之便而不知干隧之散也此二國者非無大功也沒利於前而易患於後也呉之信越也從而伐齊人於艾陵還為越王禽於三江之浦智氏信韓魏從而伐趙攻晉陽之}
