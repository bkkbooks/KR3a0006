  - {type: variant, offset: 1, length: 1, content: 鐵, SBCK: 鐡通山川之利而萬物殖是以縣官用饒足民不困乏本末並利上下俱足此籌計之所致非獨耕桑農業也文學曰禮義者國之基也而權利者政之殘也孔子曰能以禮讓爲國乎何有伊尹太公以百里興其君管仲專於􅁊公以千乗之齊而不能至於王其所務非也故功名隳壞而道不濟當此之時諸侯莫能以德而争於公􅀻故以權相傾今天下合爲一家利末惡欲行淫巧惡欲施大夫君以心計䇿國用構諸侯叅以酒􅅦咸陽孔僅增以鹽鐡江充耕谷之等各以鋒銳言利末之事析秋毫可謂無間矣非特管仲設九府徼山海也然而國家衰耗城郭空虚故非崇仁義無以化民非力本農無以富􅀖也御史曰水有猵獺而池魚勞國有强禦而齊民消故茂林之下無豐草大塊之間無美苗夫理國之道除穢鋤豪然後百姓均平各安其宇張廷尉論定律令明法以䋲天下誅姦猾絕并兼之徒而強不凌弱衆不􅁀寡大夫各運籌䇿建國用籠天下鹽鐡諸利以排富商大賈買官贖罪損有餘􅀘不足以齊􅀺民是以兵革東西征伐賦歛不增而用足夫損益之事賢者所覩非衆人之所知也文學曰扁鵲撫息脉而知疾所由生陽氣盛則損乏而調隂寒氣盛則損之而調陽是以氣脉調和而邪氣無所留矣夫拙醫不知脉理之腠血氣之分妄刺而無益於疾傷肌膚而已矣今欲損有餘􅀘不足富者愈富貧者愈貧矣嚴法任刑欲以禁􅁀止姦而姦猶不止意者非扁鵲之用鐡石故衆人未得其職也御史曰周之建國也盖千八百諸侯其後彊吞弱大兼小并爲六國六國連兵結難數百年内拒敵國外攘四夷由此觀之兵甲不休戰伐不乏軍旅外奉倉庫内實今以天下之富海内之財百郡之貢非特齊楚之畜趙魏之庫也計委量入雖急用之冝無乏絕之時顧大農等以術體躬稼則后稷之烈軍四岀而用不􅁇非天之財少也用鐡石調均有無補不足亦非也上大夫君與治粟都尉管領大農事灸刺稽滯開利百脉是以萬物流通而縣官富實當此之時四方征􅁀亂車甲之費克􅀗之賞以億萬計皆贍大司農此皆扁鵲之力而鹽鐡之福也文學曰邊郡山居谷處隂陽不和寒凍裂地衝風飄鹵沙石凝積地勢無所宜中國天地之中隂陽之際也日月經其􅀯斗極出其北含衆和之氣産育庻物今去而侵邉多斥不毛寒苦之地是猶棄江臯河濵而田於嶺坂菹澤也轉倉廩之委飛府庫之財以給邉民中國困於繇賦邉民苦於戍禦力耕不便種糴無桑麻之利仰中國絲絮而後衣之皮裘䝉毛曾不足盖形夏不失複冬不離窟父子夫婦内藏於專室士圜之中中外空虚扁鵲何力而鹽鐡何福也未通第十五御史曰内郡人衆水泉薦草不能相贍地勢温濕不宜牛馬民蹠耒而耕􅀒檐而行勞罷而寡功是以百姓貧苦而衣食不足老弱􅀒輅於路而列卿大夫或乗牛車孝武皇帝平百越以爲囿圃却羗胡以爲苑囿是以珍恠異物充於後宫騊駼駃騠實於外廐匹夫莫不乗堅良而民間厭橘柚由此觀之邉郡之利亦饒矣而曰何福之有未通於計也文學曰禹平水土定九州四方各以土地所生貢獻足以充宫室供人主之欲膏壤萬里山川之利足以富百姓不待蠻貊之地遠方之物而用足聞往者未伐胡越之時繇賦省而民富足温衣飽食藏新食陳布帛充用牛馬成群農夫以馬耕載而民莫不􅀐乗當此之時却走馬以糞其後師旅數發戎馬不足牸牝入陣故駒犢生於戰地六畜不育於家五榖不殖於野民不足於糟糠何橘柚之所厭傳曰大軍之後累世不復方今郡國田野有隴而不墾城郭有宇而不實邉郡何饒之有乎御史曰古者制田百歩爲畒民井田而耕什而藉一義先公而後巳民臣之職也先帝哀憐百姓之愁苦衣食不足制田二百四十歩而一畒率三十而稅一惰民不務田作饑寒及巳固其理也其不耕而欲播不種而欲􅀗鹽鐡又何過乎文學曰什一而藉民之力也豐耗美惡與民共之民勤已不獨􅄛民􅄛已不獨勤故曰什一者天下之中正也田雖三十而以頃畝出稅樂歲粒米狼戾而寡取之凶年饑饉而必求足加之以口賦更繇之役率一人之作中分其功農夫悉其所得或假貸而益之是以百姓疾耕力作而饑寒遂及已也築城者先厚其基而求其高畜民者先厚其業而後求其贍論語曰百姓足君孰與不足乎御史曰古者諸侯争强戰國並起甲兵不休民曠於田疇什一而藉不違其職今頼陛下神靈甲兵不動乆矣然則民不齊出於􅀯畝以口率被墾田而不足空倉廩而賑貧乏侵益日甚是以愈惰而仰利縣官也爲斯君者亦病矣反以身勞民民猶背恩棄義而逺流亡避匿上公之事民相倣傚田地日無租賦不入抵扞縣官君雖欲足誰與之足乎文學曰樹木數徙則􅖖蟲獸徙居則壞故代馬依北風飛鳥翔故巢莫不哀其生由此觀之民非利避上公之事而樂流亡也往者軍陣數起用度不足以訾徴賦常取給見民田家又被其勞故不齊出於􅀯畝也大抵逋流皆在大家吏正畏惮不敢篤責刻急細民細民不堪流亡逺去中家爲之色出後亡者爲先亡者服事録民數創於惡吏故相倣傚去尤甚而就少愈多傳曰政寛者民死之政急者父子離是以田地日荒城郭空虚夫牧民之道除其所疾適其所安安而不擾使而不勞是以百姓勸業而樂公賦􅀂此則君無賑於民民無利於上上下交議而頌聲作故取而民不厭役而民不苦靈䑓之詩非或使之民自爲之􅀂斯則君何不足之有乎御史曰古者十五入太學與小役二十冠而成人與戎事五十以上血脉溢剛曰艾壯詩曰方叔元老克壯其猶故商師􅀂烏周師􅀂荼今陛下哀憐百姓寛力役之政二十三始賦五十六而免所以輔􅂄壯而息老艾也丁者治其田里老者修其塘園儉力趣時無饑寒之患不治其家而訟縣官亦悖矣文學曰十九年巳下爲塲未成人也二十而冠三十而娶可以從戎事五十巳上曰艾老杖於家不從力役所以扶不足而息高年也鄕飮酒之禮耆老異饌所以優耆耄而明飬老也故老者非肉不飽非帛不暖非杖不行今五十巳上至六十與子孫服輓輸並給繇役非養老之意也古有大䘮者居三年不呼其門通其孝道遂其哀戚之心也君子之所重而自盡者其惟親之䘮乎今或僵尸棄衰絰而從戎事非所以子百姓順孝悌之心也周公抱成王聽天下恩塞海内澤被四表矧惟􅀯靣含仁保德靡不得其所詩云夙夜基命宥宻陛下富於春秋委任大臣公卿輔政政敎未均故庻人議也御史默不荅也鹽鐡}
