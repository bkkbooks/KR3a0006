body:
  text: 論功第五十二大夫曰匈奴無城廓之守溝池之固脩㦸强弩之用倉廩府庫之積上無義法下無文理君臣嫚易上下無禮織栁爲室旃廗爲盖素弧骨鏃馬不粟食内則備不足畏外則禮不足稱夫中國天下腹心賢士之所總禮義之所集財用之所殖也夫以智謀愚以義伐不義􅀂因秋霜而振落葉春秋曰􅁊公之興戎狐驅之爾况以天下之力乎文學曰匈奴車噐無銀黃絲􅃮之飾素成而務堅􅁝無文采裙褘曲襟之制都成而務完男無刻鏤竒巧之事宫室城郭之功女無綺繡淫巧之貢纎綺羅紈之作事省而致用易成而難弊雖無脩㦸强弩戎馬良弓家有其備人有其用一旦有急貫􅃓上馬而已資糧不見案首而支數十日之食因山谷爲城郭因水草爲倉廩法約而易辯求寡而易供是以刑省而不犯指麾而令從嫚於禮而篤於信略於文而敏於事故雖無禮義之書刻骨卷衣百官有以相記而君臣上下有以相使群臣爲縣官計者皆言其易而實難是以秦欲驅之而反更亡也故兵者凶器不可輕用也其以强爲弱以存爲亡一朝爾也大夫曰魯連有言秦權使其士虐使其民故政急而不長高皇帝受命平􅁀亂功德巍巍惟天同大焉而文景承緒潤色之及先帝征不義攘無德以昭仁聖之路純至德之基聖王累年仁義之積也今文學引亡國失政之治而况之於今其謂匈奴難圖宜矣文學曰有虞氏之時三苗不服禹欲伐之舜曰是吾德未喻也退而脩政而三苗服不牧之地不覊之民聖王不加兵不事力焉以爲不足煩百姓而勞中國也今明王脩聖緒宣德化而朝有權使之謀尚首功之事臣固怪之夫人臣席天下之勢􅁬國家之用身享其利而不顧其主此尉佗章邯所以成王秦失其政也孫子曰今夫國家之事一日更百變然而不亡者可得而革也逮出兵乎平原廣牧皷鳴矢流雖有尭舜之知不能更也戰而勝之退脩禮義繼三代之迹仁義附矣戰勝而不休身死國亡者吳王是也大夫曰順風而呼者易爲氣因時而行者易爲力文武懷餘力不爲後嗣計故三世而德衰昭王􅀯征死而不還凢伯囚執而使不通晉取郊沛王師敗於茅戎今西􅀯諸夷楚莊之後朝鮮之王燕之亡民也􅀯越尉佗起中國自立爲王德至薄然皆亡天下之大各自以爲一州倔强倨敖自稱老夫先帝爲萬世度恐有冀州之累􅀯荆之患於是遣左將軍樓舩平之兵不血刃咸爲縣官也七國之時皆據萬乗􅀯靣稱王提珩爲敵國累世然終不免首係虜於秦今匈奴不當漢家之臣郡非有六國之用賢士之謀由此觀難易察然可見也文學曰秦滅六國虜七王沛然有餘力自以爲蚩尤不能害黃帝不能斥及二世弑死望夷子嬰係頸降楚曾不得七王之俛首使六國並存秦尚爲戰固未亡也何以明之自孝公以至于始皇世世爲諸侯雄百有餘年及兼天下十四歳而亡何則外無敵國之憂而内自縱恣也自非聖人得志而不驕佚者未之有也論鄒第五十三大夫曰鄒子疾晩世之儒墨不知天地之弘昭曠之道將一曲而欲道九折守一隅而欲知萬方欲無凖平而欲知高下無䂓矩而欲知方圓也於是推大聖終始之運以喻王公列士中國名山通谷以至海外所謂中國者天下八十分之一名曰赤縣神州而分爲九川絕陵陸不通乃爲一州有八瀛海圜其外此所謂八極而天下際焉禹貢亦著山川高下原隰而不知大道之遙故秦欲逹九州而方瀛海牧胡而朝萬國諸生守畦畝之慮閭巷之固未知天下之義也文學曰尭使禹爲司空平水土隨山刋木定高下而序九州鄒􅄛非聖人作怪誤惑六國之君以納其說此春秋所謂匹夫熒惑諸侯者也孔子曰未能事人焉能事􅀑神近者不逹焉能知瀛海故無􅀘於用者君子不爲無益於治者君子不由三王信經道而德光於四海戰國信嘉言破亡而泥山昔秦始皇巳吞天下欲并萬國亡其三十六郡欲逹瀛海而失其州縣知大義如斯不如守小計也論菑第五十四大夫曰巫祝不可與並祀諸生不可與逐語信往疑今非人自是夫道古者稽之今言遠者合之近日月在天其徴在人菑異之變夭壽之期隂陽之化四時之叙水火金木妖祥之應􅀑神之靈􅀕祀之福日月之行星辰之紀曲言之故何所本始不知則默無苟亂耳文學曰始江都相董生推言隂陽四時相繼父生之子養之母成之子藏之故春生仁夏長德秋成義冬藏禮此四時之序聖人之所則也刑不可任以成化故廣德敎言遠必考之邇故内恕以行是以刑罰若加於已勤勞若施於身又安能􅃘殺其赤子以事無用罷弊所恃而逹瀛海乎蓋越人美蠃蚌而簡太牢鄙夫樂咋唶而怪韶濩故不知味者以芬香爲臭不知道者以美言爲亂耳人無夭壽各以其好惡爲命羿奡以功力不得其死智伯以貪狼亡其身天菑之證禎祥之應猶施與之望報各以其􅀋及故好行善者天助以福符瑞是也易曰自天祐之吉無不利好行惡者天報以禍妖菑是也春秋曰應是而有天菑周文武尊賢受諫敬戒不殆純德上休神祇相况詩云降福攘攘降福簡簡日者陽陽道明月者隂隂道㝠君尊臣卑之義故陽先盛於上衆隂之􅀋消於下月望於天蚌蛤盛於淵故臣不臣則隂陽不調日月有變政敎不均則水旱不時螟螣生此災異之應也四時代叙而人則其功星列於天而人􅁚其行常星猶公卿也衆星猶萬民也列星正則衆星齊常星亂則衆星墜矣大夫曰文學言剛柔之􅀋互勝相代生易明於隂陽書長於五行春生夏長故火生於寅木陽􅀋也秋生冬死故水生於申金隂物也四時五行迭廢迭興隂陽異􅀋水火不同器金得土而成得火而死金生於巳何說何言然乎文學曰兵者凶器也甲堅兵利爲天下殃以母制子故能乆長聖人法之厭而不陽詩云載戢干戈載櫜􅃓矢我求懿德肆于時夏衰世不然逆天道以快􅁀心僵尸血流以争壤土牢人之君滅人之祀殺人之子若絕草木刑者肩靡於道以已之所惡而施於人是以國家破滅身受其殃秦王是也大夫曰金生於已刑罰小加故薺麥夏死易曰􅂂霜堅氷至秋始降霜草木隕零合冬行誅萬物畢藏春夏生長利以行仁秋冬殺藏利以施刑故非其時而樹雖生不成秋冬行德是謂逆天道月令凉風至殺氣動蜻蛚鳴衣裘成天子行㣲刑始貙蔞以順天令文學曰同四時合隂陽尚德而除刑如此則鷹隼不鷙猛獸不攫秋不蒐獮冬不田狩者也文學曰天道好生惡殺好賞惡罰故使陽居於實而宣德施隂藏於虚而爲陽佐輔陽剛隂柔季不能加孟此天賤冬而貴春申陽屈隂故王者􅀯靣而聽天下背隂向陽前德而後刑也霜雪晩至五榖猶成雹霧夏隕萬物皆傷由此觀之嚴刑以治國猶任秋冬以成榖也故法令者治惡之具也而非至治之風也是以古者明王茂其德敎而緩其刑罰也網漏吞舟之魚而刑審於䋲墨之外反臻其末而民莫犯禁也鹽鐡論卷第九鹽鐡論卷第十刑德第五十五申韓第五十六周秦第五十七詔聖第五十八大論第五十九雜論第六十刑德第五十五大夫曰令者所以敎民也法者所以督姦也令嚴而民慎法設而姦禁罔䟽則獸失法䟽則罪漏罪漏則民放佚而輕犯禁故禁下必法夫徼倖誅誡蹠蹻不犯是以古者作五刑刻肌膚而民不踰矩文學曰道德衆人不知所由法令衆民不知所避故王者之制法昭乎如日月故民不迷曠乎若大路故民不惑幽􅀮遠方折手知足室女童婦咸知所避是以法令不犯而獄犴不用也昔秦法繁於秋荼而網宻於凝脂然而上下相遁姦僞萌生有司法之􅀂救爛撲焦不能禁非網䟽而罪漏禮義廢而刑罰任也方今律令百有餘篇文章繁罪名重郡國用之疑惑或淺或深自吏明習者不知所處而况愚民乎此斷獄所以滋衆而民犯禁也宜犴宜獄握粟出卜自何能榖刺刑法繁也親服之屬甚衆上附下附而服不過五五刑之屬三千上殺下殺而罪不過五故治民道務篤其敎而巳大夫曰文學言王者立法曠􅀂大路今馳道不小也而民公犯之以其罰罪之輕也千仞之高人不輕凌千鈞之重人不輕舉商君刑棄􅁅於道而秦民治故盜馬者死盜牛者加所以重本而絶輕疾之資也武兵名食所以佐邉而重武備也盜傷與殺同罪所以累其心而責其意也猶魯以楚師伐齊而春秋惡之故輕之爲重淺之爲深有縁而然法之徴者固非衆人之所知也文學曰詩云周道如砥其直如矢言其易也君子所􅂂小人所視言其明也故德明而易從法約而易行今馳道經營陵陸紆周天下是以萬里爲民穽也罻羅張而縣其谷辟䧟設而當其蹊蹻弋飾而加其上能勿離乎聚其所欲開其所利仁義陵遲能勿踰乎故其末途至於攻城入邑損府庫之金盜宗廟之器豈特千仞之高千鈞之重哉管千曰四維不張雖臯陶不能爲士故德敎廢而詐僞行禮義壞而姦邪興言無仁義也仁者愛之効也義者事之宜也故君子愛仁以及物治近以及遠傳曰凢生之物莫貴於人人主之所貴莫重於人故天之生萬物以奉人也主愛人以順天也聞以六畜禽獸養人未聞以所養害人者也魯廐焚孔子罷朝問人不問馬賤畜而重人也今盗馬者罪死盗牛者加乗􅀐車馬馳行道中吏舉苛而不止以爲盗馬而罪亦死今傷人持其刀劍而亡亦可謂盜武庫兵而殺之乎人主立法而民犯之亦可以爲逆靣輕主約乎深之可以死輕之可以免非法禁之意也法者縁人情而制非設罪以䧟人也故春秋之治獄論心定罪志善而違於法者免志惡而合於法者誅念傷民未有所害志不甚惡而合於法者謂盜而傷人者耶將執法者過耶何於人心不厭也古者傷人有創者刑盜有贓者罰殺人者死今取人兵刃以傷人罪與殺人同得無非其至意與大夫俛仰未應對御史大夫曰執法者國之轡銜刑罰者國之維檝也故轡衘不􅅚雖王良不能以致遠維檝不設雖良工不能以絶水韓子曰疾有固者不能明其法􅀔御其臣下富國强兵以制敵禦難惑於愚儒之文詞以疑賢士之謀舉浮淫之蠧加之功實之上而欲國之治猶釋階而欲登高無衘橛而禦捍馬也今刑法設備而民猶犯之况無法乎其亂必也文學曰轡衘者御之具也得良工而調法勢者治之具也得賢人而化執轡非其人則馬奔馳執軸非其人則舩覆傷昔吳使宰嚭持軸而破其舩秦使趙高執轡而覆其車今廢仁義之術而任刑名之徒則復吳秦之事也夫爲君者法三王爲相者法周公爲術者法孔子此百世不易之道也韓非非先王而不遵舍正令而不從卒蹈䧟穽身幽囚客死於秦本夫不通大道而小辯斯足以害其身而巳
