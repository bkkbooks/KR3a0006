body:
  text: 襃賢第十九大夫曰伯夷以㢘饑尾生以信死由小器而􅉛大體匹夫匹婦之爲諒也經於溝瀆而莫之知也何功名之有蘇秦張儀智足以强國勇足以威敵一怒而諸侯懼安居而天下息萬乗之主莫不屈體卑辭幣請交此所謂天下名士也夫智不足與謀而權不能舉當世民斯爲下也今舉亡而爲有虚而爲盈布衣穿􅂂深念徐行若有遺亡非立功成名之士而亦未免於世俗也文學曰蘇秦以從顯於趙張儀以橫任於秦方此之時非不尊貴也然智士隨而憂之知天不以道進必不以道退不以義得者必不以義亡季孟之權三􅁊之富不可及也孔子爲之曰㣲爲人臣權均於君富侔於國者亡故其位彌高而罪彌重禄滋厚而罪滋多夫行者先全已而後求名仕者先辟害而後求禄故香餌非不美也龜龍聞而深藏鸞鳳見而高逝者知其害身也夫爲烏鵲魚鱉食香餌而後狂飛奔走遜頭屈遰無益於死今有司盜秉國法進不顧罪卒然有急然後車馳人趨無益於死所盜不足償於臧􅀗妻子奔亡無處所身在深牢莫知恤視方此之時何暇得以笑乎大夫曰文學節高行矯然若不可卷盛節潔言皦然若不可􅄺然戍卒陳勝釋輓輅首爲叛逆自立張楚素非有回由處士之行宰相列臣之位也􅁬於大澤不過旬月而齊魯儒墨縉紳之徒肆其長衣長衣官之也􅀒孔氏之禮器詩書委質爲臣孔甲爲渉􅀶士卒俱死陳爲天下大笑深藏高逝者固若是也文學曰周室衰禮義壞不能統理天下諸侯交争相滅亡并爲六國兵革不休民不得寜息秦以虎狼之心􅁞食諸侯并吞戰國以爲郡縣伐能矜功自以爲過尭舜而羞與之同棄仁義而尚刑罰以爲今時不師於文而決於武趙高治獄於内蒙恬用兵於外百姓愁苦同心而患秦陳王赫然􅁬爪牙爲天下首事道雖凶而儒墨或干之者以爲無王乆矣道擁遏不得行自孔子以至于兹而秦復重禁之故發憤於陳王也孔子曰如有用我者吾其爲東周乎庻幾成湯文武之功爲百姓除殘去賊豈貪禄樂位哉大夫曰文學言行雖有伯夷之廉不及栁下惠之貞不過高瞻下視潔言汚行觴酒豆肉遷延相讓辭小取大雞廉狼吞趙綰王臧之等以儒術擢爲上卿而有姦利殘􅃘之心主父偃以口舌取大官竊權重欺紿宗室受諸侯之賂卒皆誅死東方朔自稱辯略消堅釋石當世無􅀟然省其私行狂夫不􅃘爲况無東方朔之口其餘無可觀者也文學曰志善者忘惡謹小者致大爼豆之間足以觀禮閨門之内足以論行夫服古之服誦古之道舎而爲非者鮮矣故君子時然後言義然後取不以道得之不居也滿而不溢泰而不驕故袁盎親於景帝秣馬不過一駟公孫弘即三公之位家不過十乗東方先生說聽言行於武帝而不驕溢主父見困厄之日乆此疾在位者不好道而富且貴莫知䘏士也於是取饒􅄛之餘以周窮士之急非爲私家之業也當世􅅝􅅝非患儒之雞廉患在位者之虎飽鷁咽於求覽無所孑遺耳鹽鐡論卷第四鹽鐡論卷第五相刺第二十殊路第二十一頌賢第二士一遵道第二十三論誹第二十四孝養第二十五刺議第二十六利議第二十七國疾第二十八相刺第二十大夫曰古者經井田制􅌀里丈夫治其田疇女子治其􅏘枲無曠地無遊人故非商工不得食於利末非良農不得食於收穫非執政不得食於官爵今儒者釋耒耜而學不驗之語曠日彌乆而無益於理往來浮游不耕而食不􅁞而衣巧僞良民以奪農妨政此亦當世之所患也文學曰禹蹙洪水身親其勞澤行路宿過門不入當此之時簮堕不掇冠挂不顧而暇耕乎孔子曰詩人疾之不能黙丘疾之不能伏是以東西􅀯北七十說而不用然後退而修王道作春秋垂之萬載之後天下折中焉豈與匹夫匹婦耕織同哉傳曰君子當時不動而民無觀也故非君子莫治小人非小人無以養君子當不耕織爲匹夫匹婦也君子耕而不學則亂之道也大夫曰文學言治尚於唐虞言義高於秋天有華言矣未見其實也昔魯穆公之時公儀爲相子思子原爲之卿然北削於齊以泗爲境􅀯畏楚人西賔秦國孟軻居梁兵折於齊上將軍死而太子虜西敗於秦地奪壤削亡河内河外夫仲尼之門七十子之徒去父母捐室家􅀒荷而隨孔子不耕而學亂乃愈滋故玉屑滿篋不爲有寶誦詩書􅀒笈不爲有道要在安國家利人民不茍文繁衆辭而巳文學曰虞不用百里奚之謀而滅秦穆用之以至霸焉夫不用賢則亡而不削何可得乎孟子適梁惠王問利荅以仁義趣舎不合是以不用而去夫懷寳而無語故有粟不食無益於饑覩賢不用無益於削紂之時内有微箕二子外有膠鬲􅁄子故其不能存夫言而不用諫而不聽雖賢惡得有益於治也大夫曰橘柚生於江􅀯而民皆甘之於口味同也好音生於鄭衞而人皆樂之於耳聲同也越人夷吾戎人由余待譯而後通而並顯齊秦人之心於善惡同也故曾子􅀝山而吟山鳥下翔師曠鼓琴百獸率舞未有善而不合誠而不應者也意未誠與何故言而不見從行而不合也文學曰扁鵲不能治不受鍼藥之疾賢聖不能正不食諫諍之君故桀有關龍逢而亡夏殷有三人而商滅不患無由余夷吾之倫患無􅁊穆之聽耳是以孔子東西無所適遇屈原放逐於楚國故曰􅀡道而事人焉往而不三黜枉道而事人終非以此言而不見從行而不合者也大夫曰歌者不期於利聲而貴在中節論者不期於麗辭而務在事實善聲而不知轉未可爲能歌也善言而不知變未可謂能說也持䂓而非矩執凖而非䋲通一孔曉一理而不知權衡以所不覩不信人􅀂蟬之不知雪堅據古文以應當世猶辰參之錯膠柱而調瑟固而難合矣孔子所以不用於世而孟軻見賤於諸侯也文學曰日月之光而盲者不能見雷電之聲而聾人不能聞夫爲不知丘者言􅀂語於瘖聾何特蟬之不知重雪耶夫以伊尹之智太公之賢而不能開辭於桀紂非說也非聽者過也是以荆和抱璞而泣血曰安得良工而剖之屈原行吟澤畔曰安得臯陶而察之夫人君莫不欲求賢以自輔任能以治國然牽於流說惑於道䛕是以賢聖蔽掩而讒佞用事以此亡國破家而賢士饑於巖穴也昔趙高無過人之志而居萬人之位是以傾覆秦國而禍殃其宗盡失其瑟何膠柱之調也大夫曰所謂文學高第者智略能明先王之術而資質足以履行其道故居則爲人師用則爲世法今文學言治則稱尭舜道行則言孔墨授之政則不逹懷古道而不能行言􅀡而行之枉道是而情非衣冠有以殊於鄉曲而實無以異於凢人諸生所謂中􅀡者遭時蒙率備數適然耳殆非明舉所謂固未可與論治也文學曰天設三光以照記天子立公卿以明治故曰公卿者四海之表儀神化之丹靑也上有輔明主之任下有遂聖化之事和隂陽調四時安衆庻育群生使百姓輯睦無怨思之色四夷順德無叛逆之憂此公卿之職而賢者之所務也􅀂伊尹周召三公之才太顛閎夭九卿之人文學不中聖主之明舉今之執政亦未能稱盛德也大夫不說作色不應也文學曰朝無忠臣者政闇大夫無􅀡士者位危任座正言君之過文侯改言行稱爲賢君袁盎靣刺絳侯之驕矜卒得其慶故觸死亡以干主之過者忠臣也犯嚴顔以匡公卿之失者􅀡士也鄙人不能巷言靣違方今人主榖之敎令張而不施食禄多非其人以妨農商工市井之利未歸於民民望不塞也且夫帝王之道多墮壞而不修詩云濟濟多士意者誠任用其計非苟陳虚言而巳殊路第二十一大夫曰七十子躬受聖人之術有名列於孔子之門皆諸侯卿相之才可􅀯靣者數人可政事者冉有季路言語宰我子貢宰我秉事有寵於齊田常作難道不行身死庭中簡公殺於檀䑓子路仕衞孔悝作亂不能救君岀亡身􅉁於衞子貢子臯遁逃不能死其難食人之重禄不能更處人尊官不能存何其厚於巳而薄於君哉同門共業自以爲知古今之義明君臣之禮或死或亡二三子殊路何道之悖也文學曰宋襄公知孔父之賢而不早任故身死魯莊知季有之賢授之政晩而國亂衞君近佞逺賢子路居蒲孔悝爲政簡公不聽宰我而漏其謀是以二君身􅀍放殺而禍及忠臣二子者有事而不與其謀故可以死可以生去止其義一也晏嬰不死崔慶之難不可謂不義㣲子去殷之亂可謂不仁乎大夫曰至羙素璞物莫能飾也至賢保真僞文莫能増也故金玉不琢羙珠不畫今仲由冉求無檀柘之材隋和之璞而强文之譬􅀂彫朽木而礪鈆刀飾嫫母畫土人也􅀍以五色斐然成章及遭行潦流波則沮矣夫重懷古道枕籍詩書危不能安亂不能治郵里逐鷄難亦無黨也文學曰非學無以治身非禮無以輔徳和氏之璞天下之美寶也待鑑識之工而後明毛嬙天下之姣人也待香澤脂粉而後容周公天下之至聖人也待賢師學問而後通今齊世庸士之人不好學問專以已之愚而荷􅀒巨任􅀂無檝舳濟江海而遭大風漂没於百仭之淵東流無崖之川安得沮而止乎大夫曰性有剛柔形有好惡聖人能因而不能改孔子外變二三子之服而不能革其心故子路解長劒去危冠屈節於夫子之門然攝齊師友行行爾鄙心猶存宰予晝寢欲損三年之喪孔子曰糞土之墻不可杇也􅀂由不得其死然故内無其質而外學其文雖有賢師良友􅀂畫脂鏤冰費日損功故良師不能飾戚施香澤不能化嫫母也文學曰蒙以不潔鄙夫掩鼻惡人盛飾可以宗祀上帝使二人不渉聖人之門不免爲窮夫安得卿大夫之名故砥所以致於刃學所以盡其才也孔子曰觚不觚觚哉觚哉故事人加則爲宗廟器否則斯養之舋才干越之鋌不厲匹夫賤之工人施巧人主服而朝也夫醜者自以爲姣故飾愚者自以爲知故不學觀笑在巳而不自知不好用人自是之過也訟賢第二十二大夫曰剛者折柔者卷故季由以强梁死宰我以柔弱殺使二子不學未必不得其死何者矜已而伐能小知而巨收欲人之從已不能以巳之從人莫視而自見莫賈而自貴此其所以身殺死而終􅉁􅊽也未見其爲宗廟器覩其爲世戮也當此之時東流亦安之乎文學曰騏驎之輓鹽車垂頭於太行屠者持刀而睨之太公之窮困􅀒販於朝歌也蓬頭相聚而笑之當此之時非無逺䈥駿才也非文王伯樂莫知之賈也子路宰我生不逢伯樂之舉而遇狂屠故君子傷之若由不得其死然天其祝予矣孔父累華督之難不可謂不義仇牧渉宋萬之禍不可謂不賢也大夫曰今之學者無太公之能騏驥之才有以蜂蠆介毒而自害也東海成顒河東胡建是也二子者以術􅂪舉起卒伍爲縣令獨非自是無與合同引之不來推之不徃狂狷不遜忮害不恭刻轢公主侵陵大臣知其不可而强行之欲以干名所由不􅁤果没其身未覩功業所至而見東觀之殃身得重罪不得以壽終狡而以爲知訐而以爲􅀡不遜以爲勇其遭難故亦宜也文學曰二公懷精白之心行忠正之道􅀡已以事上竭力以徇公奉法推理不避强禦不阿所親不貴妻子之養不顧私家之業然卒不能免於嫉妬之人爲衆枉所排也其所以累不測之刑而功不遂也夫公族不正則法令不行股肱不正則姦邪興起趙奢行之平原范睢行之穰侯二國治而兩家全故君過而臣正上非而下譏大臣正縣令何肯不及諸巳而行非於人執政之大失也夫屈原之沉淵遭子栁之譛也管子得行其道鮑叔之力也今不覩鮑叔之力而見汨羅之禍雖欲以壽終惡其能得乎遵道第二十三大夫曰御史御史未應謂丞相史曰文學結髮學語服膺不舍辭􅀂循環轉􅀂陶鈞文繁於春華無効於抱風飾虚言以亂實道古以害今從之則縣官用廢虚言不可實而行之不從文學以爲非也衆口􅅝􅅝不可勝聽諸卿都大府曰乆矣通先古明當世今將何從而可矣丞相史進曰晉文公譎而不正齊桓公正而不譎所由不同俱歸於覇而必隨古不革襲故不改是文質不變而椎事尚在也故或作之或述之然後法令調於民而器械便於用也孔對三君殊意晏子相三君異道非苟相反所務之時異也公卿旣定大業之路建不竭之本願無顧細故之語牽儒墨論也文學曰師曠之調五音不失宫商聖王之治世不離仁義故有改制之名無變通之實上自黃帝下及三王莫不明德敎謹庠序崇仁義立敎化此百世不易之道也殷周因修而昌秦王變法而亡詩云雖無老成人尚有典刑言法敎故没而存之舉而貫之貫而行之何更爲哉丞相史曰說西施之美無益於容道尭舜之德無益於治今文學不言所爲治而言以治之無功猶不言耕田之方美冨人之囷倉也夫欲粟者務時欲治者因世故商君昭然獨見存亡不可與世俗同者爲其沮功而多近也庸人安其故而愚者果所聞故舟車之治使民三年而後安之商君之法立然後民信之孔子曰可與共學未可與權文學可令扶䋲循刻非所與論道術之外也文學曰君子多聞闕疑述而不作聖逹而謀大㪫智而事寡是以功成而不隳名立而不頓小人智淺而謀大羸弱而任重故中道而廢蘇秦商鞅是也無先王之法非聖人之道而因於已故亡易曰小人處盛位雖高必崩不盈其道不􅁪其德而能以善終身未之有也是以􅀄登于天後入于地禹之治水也民知其利莫不勸其功商鞅之立法民知其害莫不畏其刑故夏后功立而王商鞅法行而亡商鞅有獨智之慮世不獨見之證文學不足與權當世亦無累􅀒之殃也論誹第二十四丞相史曰晏子有言儒者華於言而寡於實繁於樂而舒於民乆喪以害生厚葬以傷業禮煩而難行道迂而難遵稱往古而言訾當世賤所見而貴所聞比人本狂以已爲拭此顔異所以誅黜而狄山死於匈奴也處其位而非其朝生乎世而訕其上終以􅀍戮而喪其軀此獨誰爲􅀒其累而蒙其殃乎文學曰禮所以防淫樂所以移風禮興樂正則刑罰中故隄防成而民無水菑禮義立民無亂患故禮義壞隄防决所以治者未之有也孔子曰禮與其奢也寜儉喪與其易也寜戚故禮之所爲作非以害生傷業也威儀節文非以亂化傷俗也治國謹其禮危國謹其法昔秦以武力吞天下而斯高以妖孽累其禍廢古術隳舊禮專任刑法而儒墨旣喪焉塞士之塗壅人之口道䛕日進而上不聞其過此秦所以失天下而殞社稷也故聖人爲政必先誅之爲巧言以輔非而傾覆國家也今子安取亡國之語而來乎夫公卿處其位不正其道而以意阿色順風疾小人淺淺靣從以成人之過也故知言之死不􅃘從苟合之徒是以不免於縲絏悲夫丞相史曰檀柘而有鄕萑葦而有藂言物􅀋之相從也孔子曰德不􅀌必有鄰故湯興而伊尹至不仁者遠矣未有明君在上而亂臣在下也今先帝躬行仁聖之道以臨海内招舉俊才賢良之士唯仁是用誅逐亂臣不避所親務以求賢而簡退不肖猶尭之舉舜禹之族殛鯀放驩兠也而曰茍合之徒是則主非而臣阿是也文學曰臯陶對舜在知人惟帝其難之洪水之災尭獨愁悴而不能治得舜禹而九州寜故雖有尭明之君而無舜禹之佐則純德不流春秋刺有君而無臣先帝之時良臣未備故邪臣得間尭得舜禹而鯀殛驩兠誅趙簡子得叔向而盛靑肩詘語曰未見君子不知僞臣詩云未見君子憂心忡忡旣見君子我心則降此之謂也丞相史曰尭任鯀驩兠得舜禹而放殛之以其罪而天下咸服誅不仁也人君用之齊民而顔異濟􅀯亭長也先帝舉而加之高位官至上卿狄山起布衣爲漢議臣處舜禹之位執天下之中不能以治而反坐訕上故驩兠之誅加而刑戮至焉賢者受賞而不肖者􅀍刑固其然也文學何恠焉文學曰論者相扶以義相喻以道從善不求勝服義不耻窮若相迷以僞相亂以辭相矜於後息期於茍勝非其貴者也夫蘇秦張儀熒惑諸侯傾覆萬乗使人主失其所持非不辯然亂之道也君子疾鄙夫之不可與事君患其􅃪從而無所不至也今子不聽正義以輔卿相又從而順之好須􅁷之說不計其後若子之爲人吏宜受上戮子姑默矣丞相史曰盖聞士之居世也衣服足以勝身食飲足以供親内足以相䘏外不求於人故身修然後可以理家家治然後可以治官故飯䓸糲者不可以言孝妻子饑寒者不可以言慈緒業不備者不可以言理居斯世行斯身而有此三累者斯亦足以默矣孝養第二十五文學曰善養者不必芻豢也善供服者不必錦繡也以己之所有盡事其親孝之至也故匹夫勤勞猶足以順禮歠菽飮水足以致其敬孔子曰今之孝者是爲能養不敬何以别乎故上孝養志其次養色其次養體貴禮不貪其養禮順心和養雖不備可也易曰東鄰殺牛不知西鄰之禴􅀕也故富貴而無禮不如貧賤之孝悌閨門之内盡孝焉閨門之外盡悌焉朋友之道盡信焉三者孝之至也居家理者非謂積財也事親孝者非謂鮮肴也亦和顔色承意盡禮義而巳矣丞相史曰八十曰耋七十曰耄耄食非肉不飽衣非帛不暖故孝子曰甘毳以養口輕暖以養體曾子養曾晳必有酒肉無端絻雖公西赤不能以養爲容無肴膳雖閔曽不能以養卒禮無虚加故必有其實然後爲之父子與其禮有餘而養不足寜養有餘而禮不足夫洗爵以盛水升降而進糲禮雖備然非其貴者也文學曰周襄王之母非無酒肉也衣食非不如曾晳也然而􅀍不孝之名以其不能事其父母也君子重其禮小人貪其養夫嗟來而招之投而與之乞者猶不取也君子苟無其禮雖羙不食焉故禮主人不親饋則客不􅀕是饋輕而禮重也丞相史曰孝莫大以天下一國養次禄養下以力故王公人君上也卿大夫次也夫以家人言之有賢子者當路於世者高堂䆳宇安車大馬衣輕暖食甘毳無厭者􅄄衣皮冠窮居陋巷有旦無暮食䓸糲者葷茹膢臘而後見肉審老親之腹非唐園唯菜是盛夫䓸糲乞者所不取而子以飬親雖欲以禮非其貴也文學曰無其能而竊其位無其功而有其禄雖有富貴由蹠蹻之養也高䑓極望食案方丈而不可謂孝老親之腹非盜嚢也何故常盛不道之物夫取非有非職財入而患從之身且死禍殃安得膢臘而食肉曾參閔子無卿相之養而有孝子之名周襄王富有天下而有不能事父母之累故禮菲而養豐非孝也凉囷而以養非孝也丞相曰上孝養色其次安親其次全身往者陳餘背漢斬於汦水五􅀍邪逆而夷三族近世主父偃行不􅁤而誅滅吕歩舒弄口而見戮行身不謹誅及無罪之親由此觀之虚禮無益於已也文實配行禮養俱施然後可以言孝孝在於質實不在於飾貌全身在於謹慎不在於馳語也文學曰言而不誠期而不信臨難不勇事君不忠不孝之大者也孟子曰今之士今之大夫皆罪人也皆逹其意以順其惡今子不忠不信巧言以亂政􅋚䛕以求合􅀂此者不容於世春秋曰士守一不移循理不外援共其職而巳故卑位而言高者罪也言不及而言者傲也有詔公卿與斯議而空戰口也
