  - {type: variant, offset: 4113, length: 0, content: '', SBCK: 改是文質不變而椎事尚在也故或作之或述之然後法令調於民而器械便於用也孔對三君殊意晏子相三君異道非苟相反所務之時異也公卿旣定大業之路建不竭之本願無顧細故之語牽儒墨論也文學曰師曠之調五音不失宫商聖王之治世不離仁義故有改制之名無變通之實上自黃帝下及三王莫不明德敎謹庠序崇仁義立敎化此百世不易之道也殷周因修而昌秦王變法而亡詩云雖無老成人尚有典刑言法敎故没而存之舉而貫之貫而行之何更爲哉丞相史曰說西施之美無益於容道尭舜之德無益於治今文學不言所爲治而言以治之無功猶不言耕田之方美冨人之囷倉也夫欲粟者務時欲治者因世故商君昭然獨見存亡不可與世俗同者爲其沮功而多近也庸人安其故而愚者果所聞故舟車之治使民三年而後安之商君之法立然後民信之孔子曰可與共學未可與權文學可令扶䋲循刻非所與論道術之外也文學曰君子多聞闕疑述而不作聖逹而謀大㪫智而事寡是以功成而不隳名立而不頓小人智淺而謀大羸弱而任重故中道而廢蘇秦商鞅是也無先王之法非聖人之道而因於已故亡易曰小人處盛位雖高必崩不盈其道不􅁪其德而能以善終身未之有也是以􅀄登于天後入于地禹之治水也民知其利莫不勸其功商鞅之立法民知其害莫不畏其刑故夏后功立而王商鞅法行而亡商鞅有獨智之慮世不獨見之證文學不足與權當世亦無累􅀒之殃也論誹第二十四丞相史曰晏子有言儒者華於言而寡於實繁於樂而舒於民乆喪以害生厚葬以傷業禮煩而難行道迂而難遵稱往古而言訾當世賤所見而貴所聞比人本狂以已爲拭此顔異所以誅黜而狄山死於匈奴也處其位而非其朝生乎世而訕其上終以􅀍戮而喪其軀此獨誰爲􅀒其累而蒙其殃乎文學曰禮所以防淫樂所以移風禮興樂正則刑罰中故隄防成而民無水菑禮義立民無亂}
