  - {type: variant, offset: 3160, length: 0, content: '', WYG: 音注呉越春秋曰越王允常聘歐冶子作名劔五枚一曰純鈎二曰湛盧三曰豪曹四曰魚腸五曰巨闕秦客薛燭善相劔越王取豪曹巨闕魚腸等示之薛燭皆曰非寳劔也取純鈎示之薛燭曰光乎如屈陽之華沉沉如芙蓉始生於湖觀其文如列星之行觀其光如水之溢塘其文色渙渙如氷將釋見日之光此純鈎也取湛盧示之薛燭曰銜金鐵之英吐銀錫之精寄氣託靈有逰出之神服此劔可以折衝伐敵人君有逆謀則去之他日允常乃以湛盧獻呉呉公子光弑呉王僚湛盧去如楚}
