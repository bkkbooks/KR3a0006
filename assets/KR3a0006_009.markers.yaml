  - {type: 'tls:seg', offset: 4073, content: '', id: KR3a0006_tls_009-33a.2}
  - {type: variant, offset: 4073, length: 0, content: '', WYG: 兵略曰殺無罪之民而養無義之君害莫大焉殫天下之財而贍一人之欲禍莫深焉故至於攘天下害百姓肆一人之邪而長海内之禍此天之所以誅也民之所以仇也孟子曰君不鄉音向道不由仁義而為之强戰雖克必亡此中國所以擾亂非䝉恬死而諸侯叛秦律書曰秦二世宿軍無用之地連兵於邊陲力非弱也結怨匈奴絓禍於越勢非寡也及其威盡勢極閭巷之人為敵國咎生窮武之不知足甘得之心不息也昔周室盛也越裳氏來獻百蠻致貢其後周衰諸侯力征蠻貊分散各有聚黨莫能相一是以燕趙能得意焉匈奴傳曰諸戎分散谿谷自有君長往往而聚者百有餘戎然莫能相壹其後燕有賢將秦開為質於胡胡甚信之歸而襲破東胡東胡却千餘里燕乃築長城自造陽至襄平置上谷漁陽右北平遼西遼東郡以距胡於是趙武靈王亦變俗胡服習騎射北破林胡樓煩自代並隂山下至髙闕為塞而置雲中鴈門代郡及李牧為將匈奴不敢近趙邊其後匈奴稍强蠶食諸侯故破走月支氏因兵威徙小國引弓之民并為一家一意同力故難制也前君為先帝畫匈奴之册通作䇿兵據西域奪之便勢之地以候其變以漢之强攻於匈奴之衆若以强弩潰癰疽越之禽吴豈足道哉王恢曰夫匈奴可以力服也不可以仁畜也今以中國之大萬倍之資遣百分之一以攻匈奴譬如以千石之弩射癰潰疽必不留行也上以為然用君之義聽君之計雖越王之任種蠡音禮不過以搜粟都尉為御史大夫持政十有餘年未見種蠡音禮之功而見靡弊之効匈奴不為加俛音免而百姓黎民以敝矣是君之册通作䇿不能弱匈奴而反衰中國也善為計者固若此乎蔡邕曰夫邊陲之患手足之疥掻中國之困胷背之瘭疽也西域第四十六}
