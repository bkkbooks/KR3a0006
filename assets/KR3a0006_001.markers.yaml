  - {type: variant, offset: 184, length: 0, content: '', WYG: 匈奴傳曰匈奴其先祖夏后氏之苗裔也曰淳維樂彥括地譜云夏桀無道湯放之鳴條三年而死其子獯鬻妻桀之衆妾避居北野隨畜移徙中國謂之匈奴晉灼云殷時曰獯鬻周曰玁狁秦曰匈奴匈奴傳又曰元朔二年夏匈奴數萬騎入殺代郡太守恭及畧千餘人其秋匈奴又入鴈門殺畧千餘人其明年匈奴又復入代郡定襄上郡各三萬騎殺畧數千人匈奴右賢王怨漢奪之河南地而築朔方數為冦盗邊及入河南侵擾朔方殺畧吏民甚衆}
