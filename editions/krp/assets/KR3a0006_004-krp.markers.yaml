  - {type: variant, offset: 1988, length: 271, content: 扁鵲傳曰扁鵲過虢虢太子死扁鵲至虢宫門下問中庻子喜方者曰太子何病國中治穰過於衆事中庻子曰太子病血氣不時交錯而不得泄暴發於外則為中害精神不能止邪氣畜積而不得泄是以陽緩而隂急故暴蹷而死扁鵲曰其死何如時曰雞鳴至今曰收乎曰未也其死未能半日也言臣齊勃海越人也家在於鄭未嘗得望精光侍謁於前也聞太子不幸而死臣得生之中庶子曰先生得無誕之乎何以言太子可生也臣聞上古之時醫有俞跗治病不以湯液醴灑鑱石橋引案杌毒熨一撥見病之應因五臟之輸乃割皮解肌訣脉結筋搦髓腦揲荒𤓰幕前浣腸胃潄滌五藏練精易形先生之方能若是則太子可生也不能若是而欲生之曾不可以告咳嬰之兒終日扁鵲仰天歎曰, SBCK: ''}
