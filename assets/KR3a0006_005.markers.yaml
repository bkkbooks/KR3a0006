  - {type: punctuation, offset: 211, content: 《, id: KR3a0006_tls_005-bkkpn48}
  - {type: variant, offset: 211, length: 0, content: '', WYG: 貴徳篇曰聖人見天下強凌弱衆暴寡幼孤羸露死傷係虜不忍其然是以孔子厯七十二君兾道之一行而得施其徳使民全扵生育烝庶安土萬物熈熈各樂其終卒不遇故睹麟而泣哀道不行徳澤不洽扵是退作春秋明素王之道以示後人思施其恵未嘗輟忘是以百王尊之志士法焉誦其文章}
  - {type: variant, offset: 211, length: 0, content: '', krp: 貴徳篇曰聖人見天下強凌弱衆暴寡幼孤羸露死傷係虜不忍其然是以孔子厯七十二君兾道之一行而得施其徳使民全扵生育烝庶安土萬物熈熈各樂其終卒不遇故睹麟而泣哀道不行徳澤不洽扵是退作春秋明素王之道以示後人思施其恵未嘗輟忘是以百王尊之志士法焉誦其文章}
  - {type: punctuation, offset: 212, content: 》, id: KR3a0006_tls_005-bkkpn49}
  - {type: variant, offset: 212, length: 0, content: '', WYG: 今不絶徳及之也詩曰載馳載驅周爰咨謀此之謂也至公篇曰夫子行說七十諸侯無定處意欲使天下之民各得其所而道不行退而修春秋采毫毛之善貶纎介之惡人事浃王道備精和聖制上通扵天而麟至此天之知夫子也扵是喟然而歎曰天以至明為不可蔽乎日何為而食地以至安為不可危乎地何為而動天地而尚有動蔽是故聖賢說扵世而不得行其道故災異並作也夫子曰不怨天不尤人下學而上達知我者其天乎傳去聲}
