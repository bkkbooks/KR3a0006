  - {type: variant, offset: 7995, length: 239, content: 詩傳曰堅甲利兵不足以為武髙城深池不足以為固嚴令繁刑不足以為威由其道則行不由其道則廢昔楚人蛟革犀兕以為甲堅如金石宛如鉅蛇慘若蜂蠆輕利剛疾卒如飄風然兵殆於垂沙唐子死莊蹻走楚分為三四者此豈無堅甲利兵也哉所以統之非其道故也汝淮以為險江漢以為池縁之以方城限之以鄧林然秦師至于鄔郢舉若振槁然是豈無固塞限險也哉其所以統之者非其道故也紂殺比干而囚箕子為炮烙之刑殺戮無時羣下愁怨皆莫兾其命然周師至令不行乎左右而豈其無嚴令繁刑也哉其所以統之者非其道故也若夫明道而均分之誠愛而時使之則下之應上如影響矣, SBCK: ''}
