body:
  text: 鹽鐵論卷七崇禮第三十七大夫曰飾几杖修樽俎為賓非為主也炫耀奇怪所以陳四夷非為民也夫家人有客尚有倡優奇變之樂而況縣官乎故列羽旄陳戎馬所以示威武奇蟲珍怪所以示懷廣遠明盛德遠國莫不至也賢良曰王者崇禮施德上仁義而賤怪力故聖人絶而不言孔子曰言忠信行篤敬雖蠻貊之邦不可棄也今萬方絶國之君奉贄獻者懷天子之盛德而欲觀中國之禮儀故設明堂辟雍以示之揚干戚昭雅頌以風之今乃以玩好不用之器奇蟲不畜之獸角抵諸戲炫耀之物陳夸之殆與周公之待遠方殊也昔周公處謙讓以交卑士執禮德以下天下故辭越裳之贄見恭讓之禮也既與入文王之廟是見大孝之禮也目覩威儀干戚之容耳聽清歌雅頌之聲心充至德欣然以歸此四夷所以慕義內附非重譯狄鞮來觀猛獸熊羆也夫犀象兕虎南夷之所多也騾驢馲駝北狄之常畜也中國所鮮外國賤之南越以孔雀珥門戶崑山之旁以玉璞抵烏鵲今貴人之所賤珍人之所饒非所以厚中國而明盛德也隋和世之名寶也而不能安危存亡故喻德示威惟賢臣良相不在犬馬珍怪也是以聖王以賢為寶不以珠玉為寶昔晏子修之樽俎之間而折衝乎千里不能者雖隋和滿篋無益於存亡矣大夫曰晏子相齊三君崔慶無道劫其君亂其國靈公國圍莊公弒死景公之時晉人來攻取垂都舉臨菑邊邑削城郭焚宮室隳寶器盡何衝之所能折乎由此觀之賢良所言賢人為寶則損益無輕重也賢良曰管仲去魯入齊齊霸魯削非持其衆而歸齊也伍子胥挾弓干闔閭破楚入郢非負其兵而適吳也故賢者所在國重所去國輕楚有子玉得臣文公側席虞有宮之奇晉獻不寐夫賢臣所在辟除開塞者亦遠矣故春秋曰山有虎豹葵藿為之不採國有賢士邊境為之不害也備胡第三十八大夫曰鄙語曰賢者容不辱以世俗言之鄉曲有桀人尚辟之今明天子在上胸奴公為寇侵擾邊境是仁義犯而藜藿採昔狄人侵太王匡人畏孔子故不仁者仁之賊也是以縣官厲武以討不義設機械以備不仁賢良曰胸奴處沙漠之中生不食之地天所賤而棄之無壇宇之居男女之別以廣野為閭里以穹廬為家室衣皮蒙毛食肉飲血會市行牧豎居如中國之麋鹿耳好事之臣求其義責之禮使中國干戈至今未息萬里設備此兔罝之所刺故小人非公侯腹心干城也大夫曰天子者天下之父母也四方之衆其義莫不願為臣妾然猶修城郭設關梁厲武士備衛於宮室所以遠折難而備萬方者也今胸奴未臣雖無事欲釋備如之何賢良曰吳王所以見禽於越者以其越近而陵遠也秦所以亡者以外備胡越而內亡其政也夫用軍於外政敗於內備為所患增主所憂故人主得其道則遐邇偕行而歸之文王是也不得其道則臣妾為寇秦王是也夫文衰則武勝德盛則備寡大夫曰往者四夷俱強並為寇虐朝鮮踰徼劫燕之東地東越越東海略浙江之南南越內侵滑服令氐僰冉駹嶲唐昆明之屬擾隴西巴蜀今三垂已平唯北邊未定夫一舉則胸奴震懼中外釋備而何寡也賢良曰古者君子立仁修義以綏其民故邇者習善遠者順之是以孔子仕於魯前仕三月及齊平後仕三月及鄭平務以德安近而綏遠當此之時魯無敵國之難鄰境之患強臣變節而忠順故季桓隳其都城大國畏義而合好齊人來歸鄆歡龜陰之田故為政而以德非獨辟害折衝也所欲不求而自得今百姓所以囂囂中外不寧者咎在胸奴內無室宇之守外無田疇之積隨美草甘水而驅牧胸奴不變業而中國以搔動矣風合而雲解就之則亡擊之則散未可一世而舉也大夫曰古者明王討暴衛弱定傾扶危衛弱扶危則小國之君悅討暴定傾則無罪之人附今不征伐則暴害不息不備則是以黎民委敵也春秋貶諸侯之後刺不卒戍行役戍備自古有之非獨今也賢良曰胸奴之地廣大而戎馬之足輕利其勢易搔動也利則虎曳病則鳥折辟鋒鋭而取罷極少發則不足以更適多發則民不堪其役役煩則力罷用多則財乏二者不息則民遺怨此秦之所以失民心隕社稷也古者天子封畿千里繇役五百里勝聲相聞疾病相恤無過時之師無踰時之役內節於民心而事適其力是以行者勸務而止者安業今山東之戎馬甲士戍邊郡者絶殊遼遠身在胡越心懷老母老母垂泣室婦悲恨推其饑渴念其寒苦詩云昔我往矣楊柳依依今我來思雨雪霏霏行道遲遲載渴載饑我心傷悲莫之我哀故聖人憐其如此閔其久去父母妻子暴露中野居寒苦之地故春使使者勞賜舉失職者所以哀遠民而慰撫老母也德惠甚厚而吏未稱奉職承詔以存恤或侵侮士卒與之為市并力兼作使之不以理故士卒失職而老母妻子感恨也宋伯姬愁思而宋國火魯妾不得意而魯寢災今天下不得其意者非獨西宮之女宋之老母也春秋動衆則書重民也宋人圍長葛譏久役也君子之用心必若是大夫默然不對執務第三十九丞相曰先王之道軼久而難復賢良文學之言深遠而難行夫稱上聖之高行道至德之美言非當世之所能及也願聞方今之急務可復行於政使百姓咸足於衣食無乏困之憂風雨時五穀熟螟螣不生天下安樂盜賊不起流人還歸各反其田里吏皆廉正敬以奉職元元各得其理也賢良曰孟子曰堯舜之道非遠人也而人不思之耳詩云求之不得寤寐思服有求如關雎好德如河廣何不濟不得之有故高山仰止景行行止雖不能及離道不遠也顏淵曰舜獨何人也回何人也夫思賢慕能從善不休則成康之俗可致而唐虞之道可及公卿未思也先王之道何遠之有齊桓公以諸侯思王政憂周室匡諸夏之難平夷狄之亂存亡接絶信義大行著于天下邵陵之會豫之為主傳曰豫積也故土積而成山阜水積而成江海行積而成君子孔子曰吾於河廣知德之至也而欲得之各反其本復諸古而已古者行役不踰時春行秋反秋行春來寒暑未變衣服不易固已還矣夫婦不失時人安和如適獄訟平刑罰得則陰陽調風雨時上不苛擾下不煩勞各修其業安其性則螟螣不生而水旱不起賦斂省而農不失時則百姓足而流人歸其田里上清靜而不欲則下廉而不貪若今則繇役極遠盡寒苦之地危難之處涉胡越之域今茲往而來歲旋父母延頸而西望男女怨曠而相思身在東楚志在西河故一人行而鄉曲恨一人死而萬人悲詩云王事靡盬不能藝稷黍父母何怙念彼恭人涕零如雨豈不懷歸畏此罪罟吏不奉法以存撫倍公任私各以其權充其嗜欲人愁苦而怨思上不恤理則惡政行而邪氣作邪氣作則蟲螟生而水旱起若此雖禱祀雩祝用事百神無時豈能調陰陽而息盜賊矣能言第四十大夫曰盲者口能言白黑而無目以別之儒者口能言治亂無能以行之夫坐言不行則牧童兼烏獲之力蓬頭苞堯舜之德故使言而近則儒者何患於治亂而盲人何患於白黑哉言之不出恥躬之不逮故卑而言高能言而不能行者君子恥之矣賢良曰能言而不能行者國之寶也能行而不能言者國之用也兼此二者君子也無一者牧童蓬頭也言滿天下德覆四海周公是也口言之躬行之豈若默然載施其行而已則執事亦何患何恥之有今道不舉而務小利慕於不急以亂群意君子雖貧勿為可也藥酒病之利也正言治之藥也公卿誠能自強自忍食文學之至言去權詭罷利官一歸之於民親以周公之道則天下治而頌聲作儒者安得治亂而患之乎取下第四十一大夫曰不軌之民困橈公利而欲擅山澤從文學賢良之意則利歸於下而縣官無可為者上之所行則非之上之所言則譏之專欲損上徇下虧主而適臣尚安得上下之義君臣之禮而何頌聲能作也賢良曰古者上取有量自養有度樂歲不盜年饑則肆用民之力不過歲三日籍斂不過十一君篤愛臣盡力上下交讓天下平浚發爾私上讓下也遂及我私先公職也孟子曰未有仁而遺其親義而後其君也君君臣臣何為其無禮義乎及周之末塗德惠塞而嗜欲衆君奢侈而上求多民困於下怠於上公是以有履畝之稅碩鼠之詩作也衛靈公當隆冬興衆穿池海春諫曰天寒百姓凍餒願公之罷役也公曰天寒哉我何不寒哉海春曰人之言曰安者不能恤危飽者不能食饑故餘粱肉者難為言隱約處佚樂者難為言勤苦夫高堂邃宇廣廈洞房者不知專屋狹廬上漏下濕者之㿊也繫馬百駟貨財充內儲陳納新者不知有旦無暮稱貸者之急也廣第唐園良田連比者不知無運踵之業竄頭宅者之役也原馬被山牛羊滿谷者不知無孤豚瘠犢者之窶也高枕談臥無叫號者不知憂私責與吏正戚者之愁也被紈躡韋搏粱齧肥者不知短褐之寒糠之苦也從容房闈之間垂拱持案食者不知跖耒躬耕者之勤也乘堅驅良列騎成行者不知負擔步行者之勞也匡床旃席侍御滿側者不知負輅挽船登高絶流者之難也衣輕暖被美裘處溫室戴安車者不知乘邊城飄胡代鄉清風者之危寒也妻子好合子孫保之者不知老母之憔悴匹婦之悲恨也耳聽五音目視弄優者不知蒙流矢距敵方外者之死亡也東嚮伏几振筆如調文者不知木索之急箠楚者之痛也坐旃茵之上安圖籍之言若易然亦不知步涉者之難也昔商鞅之任秦也刑人若刈菅茅用師若彈丸從軍旅者暴骨長城戍漕者輦車相望生而往死而旋彼獨非人子耶故君子仁以恕義以度所好惡與天下共之所不施不仁者公劉好貨居者有積行者有囊大王好色內無怨女外無曠夫文王作刑國無怨獄武王行師士樂為之死民樂為之用若斯則民何苦而怨何求而譏公卿愀然寂若無人於是遂罷議止詞奏曰賢良文學不明縣官事猥以鹽鐵為不便請且罷郡國榷沽關內鐵官奏可擊之第四十二賢良文學既拜咸取列大夫辭丞相御史大夫曰前議公事賢良文學稱引往古頗乖世務論者不必相反期於可行往者縣官未事胡越之時邊城四面受敵北邊尤被其苦先帝絶三方之難撫從方國以為蕃蔽窮極郡國以討胸奴胸奴壤界獸圈孤弱無與此困亡之時也遼遠不遂使得復喘息休養士馬負紿西域西域迫近胡寇沮心內解必為臣患是以主上欲掃除煩倉廩之費也終日逐禽罷而釋之則非計也蓋舜紹緒禹成功今欲以軍興擊之何如文學曰異時縣官修輕賦公用饒人富給其後保胡越通四夷費用不足於是興利害算車船以訾助邊贖罪告緡與人以患矣甲士死於軍旅中士罷於轉漕仍之以科適吏徵發極矣夫勞而息之極而反本古之道也雖舜禹興不能易也大夫曰昔夏后底洪水之災百姓孔勤罷於籠臿及至其後咸享其功先帝之時郡國頗煩於戎事然亦寬三陲之役語曰見機不遂者隕功一日違敵纍世為患休勞用供因弊乘時帝王之道聖賢之所不能失也功業有緒惡勞而不卒猶耕者倦休而困止也夫事輟者無功耕怠者無獲也文學曰地廣而不得者國危兵強而凌敵者身亡虎兕相據而螻蟻得志兩敵相抗而匹夫乘間是以聖王見利慮害見遠存近方今為縣官計者莫若偃兵休士厚幣結和親修文德而已若不恤人之急不計其難弊所恃以窮無用之地亡十獲一非文學之所知也
