  - {type: variant, offset: 893, length: 0, content: '', WYG: 貨殖傳曰夫山西饒材竹穀纑旄玉石山東多魚鹽漆絲聲色江南出柟梓薑桂金錫連丹沙犀瑇瑁珠璣齒革龍門碣石北多馬牛羊旃裘筋角銅鐡則千里徃徃山出綦置皆中國人民所喜好謡俗被服飲食奉生送死之具也故待農而食之虞而出之工而成之商而通之此寕有政教發徴期會哉人各任其能竭其力以得所欲故物賤之徴貴貴之徵賤各勸其業樂其事若水之趨下日夜無休時不召而自來不求而民出之豈非道之所符而自然之驗耶}
