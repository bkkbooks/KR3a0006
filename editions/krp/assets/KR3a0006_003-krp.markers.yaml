  - {type: variant, offset: 15066, length: 738, content: 節士傳曰延陵季子者吳王之子也嫡同母昆弟四人長曰遏次曰餘祭次曰夷昩次曰札札即季子最小而賢兄弟皆愛之既除䘮將立季子季子辭曰曹宣公之卒也諸侯與曹人不義曹君將立子臧子臧去之遂不為也以成曹君君子曰能守節矣君義嗣也誰敢干君有國非吾節也札雖不才願附子臧以無失節固立之棄其室而耕乃舍之遏曰今若是作而與季子季子必不受請無與子而與弟弟兄迭為君而致諸侯于季子皆曰諾故諸其為君者皆輕死為勇飲食必祝曰天若有吾國必疾有禍予身故遏也死餘祭立餘祭死夷昧立夷昧死而國宜之季子也季子使而未還僚者長兄之庶子也自立為吳王季子使而還至則君事之遏之子曰王子光號曰闔閭不恱曰先君之所為不與子而與弟者凡為季子也將從先君之命則國宜之季子也如不從先君之命而與子我宜當立者也僚惡得為君於是使專諸刺僚而致國乎季子季子曰爾殺吾君吾受爾國是吾與爾為亂也爾殺吾兄吾又殺爾是父子兄弟相殺終身無已也去而之延陵終身不入吳國故號曰延陵季子君子以其不受國為義以其不殺為仁是以春秋賢季子而尊貴之也左傳曰冬十月仲殺惡及視而立宣公書曰子卒諱之也仲以君命召惠伯其宰人公冉務人曰若君命可使非君命何聼弗聼乃入殺而埋之馬矢之中公冉務人奉其帑以奔蔡既而復叔仲氏公羊傳曰子卒者孰謂謂子赤也何以不日𨼆之也何𨼆耳殺也殺則何以不日不忍言也榖梁傳曰公弟叔肸賢之也其賢之何也宣弑而非之也非之則胡為不去也曰兄弟也何去而之與之財則曰我足矣織屨而食終身不食宣公之食君子以是為通恩也以取貴乎春秋節士傳曰魯宣公者魯文公之弟也文公薨文公之子子赤立為魯侯宣公殺子赤而奪之國立為魯侯公子肸者宣公之同母弟也宣公殺子赤而肸非之宣公與之禄則曰我足矣何以兄之食為哉織屨而食終身不食宣公之食其仁恩厚矣其守節固矣故春秋美而貴之孔子曰刳胎焚夭則麒麟不至乾澤而漁則蛟龍不遊覆巢毁卵則鳳鳥不翔君子重傷其類者也虧, SBCK: 􅉛}
