  - {type: variant, offset: 1062, length: 2, content: 古者, WYG: 賈生有言曰懇言則辭淺而不入深言則逆耳而失指故曰談何容易談且不易而况行之乎此胡建所以不得其死而吳得㡬不免於患也胡建傳曰胡建為渭城令治甚有聲值昭帝㓜皇后父上官將軍安與帝姊蓋主私夫丁外人相善外人驕恣怨故京兆尹樊福使客射殺之客藏公主廬吏不敢捕渭城令建將吏卒圍捕蓋主聞之與外人上官將軍多從奴客往犇射追吏吏散走主使僕射劾渭城令游徼傷主家奴建報亡它坐蓋主怒使人上書告建侵辱長公主射甲舍門知吏賊傷奴辟報故不窮審大將軍霍光寢其奏後光病上官氏代聼事下吏捕建建自殺吏民稱寃至今渭城立其祠語曰五盗執一良人枉木惡直繩説山訓曰衆曲不容直衆枉不容正故人衆則食狼狼衆則食人也今欲下鍼音針石通闗鬲則恐有盛胡之累懐鍼音針槖音托艾則被不工之名狼䟦其胡載􅠶其尾}
