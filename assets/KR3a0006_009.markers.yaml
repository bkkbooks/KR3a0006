  - {type: variant, offset: 732, length: 0, content: '', WYG: 秦既并天下東絶沛水并滅朝鮮南取陸梁北却胡狄西畧氏羌立帝號朝音潮四夷舟車所通足迹所及靡不畢至非服其德畏其威也力多則人朝音潮力寡則朝音潮於人矣文學曰禹舜堯之佐也湯文夏商之臣也其所以從八極而朝音潮海内者非以陸梁之地兵革之威也秦紀曰始皇三十三年發諸亡人贅壻賈人略取陸梁地為桂林司馬貞曰南方之人其性陸梁故曰陸梁晉灼曰走者陸梁而跳也秦楚三晉號萬乗去聲不務積徳而負相侵搆兵爭强而卒俱亡雖以進壤廣地如食萴之充腸也廣雅曰附子一嵗曰萴子二嵗烏喙三嵗附子四嵗烏頭五嵗天雄蘇秦為燕說齊王曰人之飢所以不食烏喙者}
