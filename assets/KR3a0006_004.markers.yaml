  - {type: variant, offset: 1572, length: 0, content: '', WYG: 雜言曰舜耕之時不能利其都人及為天子天下戴之故君子窮則善其身逹則利於天下俶真訓曰舜之耕陶也不能利其里南靣王則徳施乎四海仁非能益也處便而勢利也是故烏號之弓谿子之弩不能無弦而射越舲蜀艇不能無水而浮}
