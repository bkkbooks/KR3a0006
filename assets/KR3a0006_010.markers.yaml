  - {type: variant, offset: 4312, length: 4, content: 聽訟吾猶, WYG: 移風易俗莫善於樂安上治民莫善於禮是故聖王修禮文設庠序陳鐘鼓天子辟雍諸侯泮官所以行徳化詩云鎬京辟雍自西自東自南自北無思不服此之謂也普天之下惟人面之倫莫不引領而歸其義故畫地為境人莫之犯子曰白刃可冐中庸不可入至徳之謂也故善攻不待堅甲而克善守不待渠梁而固兵略訓曰善守者無與御善戰者無與闘泰族訓曰守不待渠壍而固攻不待衝隆而㧞武王之伐殷也執黄鉞誓牧之野天下之士莫不願為之用既以義取之以徳守之帝王世紀曰武王見暍人王自左擁而右扇之紂政彌亂殷太史向摯載其圖書而歸周王以告于諸侯四年起師而東至商郊牧野乃作木檐王韈係解五人御於前莫肯為王係韈皆曰臣所以事君王非為係韈也王乃釋旄鉞而係之與紂戰紂師敗績禽費仲惡來紂赴于京自燔于宣室而死二嬖妾與妲己亦自殺乃以大白髦麾諸侯入殷商都百姓咸待于郊王使告曰上天降休商人皆拜王亦答拜以兵入造紂及妲己尸王親射之三發然後下車以劒擊之周公為司徒使以黄鉞斬紂頭懸于大白之旗召公為司空又使以𤣥鉞斬妲己頸懸之小白旗置旌於商容之廬命召公釋箕子之囚賜貝千朋命原公釋百姓之囚歸璇臺之珠玉命南宫括散鹿臺之財發巨橋之粟以賑貧民命南宫伯逹史逸遷九鼎于洛邑命閎天封比干之墓命宗祝饗祀于軍㣲子膠鬲皆委質為臣殷人咸喜曰王之於}
