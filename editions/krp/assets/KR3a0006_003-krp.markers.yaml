  - {type: variant, offset: 7554, length: 345, content: 詩傳曰楚莊王聽朝罷宴樊姬下堂而迎之曰何罷之晏也得無飢倦乎莊王曰今日聽忠賢之言不知飢倦也樊姬曰王之所謂忠賢者諸侯之客歟中國之士歟莊王曰則沈令尹也樊姬掩口而笑王曰姬之所笑何也姬曰妾得於王尚湯沐執巾櫛振袵席十有一年矣然妾未嘗不遣人之梁鄭之間求美人而進之於王也與妾同列者十人賢於妾者二人妾豈不欲擅王之寵哉不敢私願蔽衆美欲王之多見則娛今沈令尹相楚數年矣未嘗見進賢而退不肖也又焉得為忠賢乎莊王旦朝以樊姬之言告沈令尹令尹避席而進孫叔敖叔敖治楚三年而楚國霸楚史援筆而書之於䇿曰楚之霸樊姬之力也詩曰百爾所思不如我所之樊姬之謂也傳曰傷善者國之殘也䔩善者國之讒也列子曰以賢臨人未有得人者也以賢下人未有不得人者也主術訓曰文王智而好問故聖武王勇而好問故勝說林訓曰一目之羅不可以得鳥無餌之釣不可以得魚遇士無禮不可以得賢, SBCK: ''}
