  - {type: variant, offset: 345, length: 0, content: '', WYG: 韓嬰曰天子不言多少諸侯不言利害大夫不言得䘮士不言通財貨不賈於道故駟馬之家不恃鷄豚之息伐氷之家不圖牛羊之入千乗之君不通貨財冡郷不修幣大夫不為場圃委積之臣不貪市井之利是以貧窮有所歡而孤寡有所措其手足也詩曰彼有遺秉此有滯穗伊寡婦之利}
