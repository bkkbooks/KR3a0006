  - {type: variant, offset: 8, length: 0, content: '', SBCK: 四十四大夫曰秦楚燕齊周之封國也三晉之君齊之田氏諸侯家臣也内守其國外伐不義地廣壤進故立號萬乗而爲諸侯宗周室脩禮長文然國翦弱不能自存東攝六國西畏於秦身以放遷宗廟絕祀頼先帝大惠紹興其後封嘉頴川號周子男君秦旣并天下東絶沛水并滅朝鮮􅀯取陸梁北却胡狄西略氐羗立帝號朝四夷舟車所通足迹所及靡不畢至非服其德畏其威也力多則人朝力寡則朝於人矣文學曰禹舜尭之佐也湯文夏商之臣也其所以從八極而朝海内者非以陸梁之地兵革之威也秦楚三晉號萬乗不務積德而務相侵搆兵爭强而卒俱亡雖以進壤廣地如食萴之充腸也欲其安存何可得也夫禮讓爲國者􅀂江海流彌乆不竭其本美也苟爲無本􅀂蒿火􅁀怒而無繼其亡可立而待戰國是也周德衰然後列於諸侯至今不絕秦力盡而滅其族安得朝人也大夫曰中國與邉境猶支體與腹心也夫肌膚寒於外腹腸疾於内内外之相勞非相爲助也唇亡則齒寒支體傷而心􅉃怛故無手足則支體廢無邉境則内國害昔者戎狄攻太王於邠踰岐梁而與秦界於涇渭東至晉之陸渾侵􅁀中國中國疾之今匈奴􅁞食内侵遠者不離其苦獨邉境蒙其敗詩云憂心􅃤􅃤念國之爲虐不征備則􅁀害不息故先帝興義兵以征􅍏罪遂破祁連天山散其聚黨北略至龍城大圍匈奴單于失魂僅以身免乗奔逐北斬首捕虜十餘萬控弦之民旃裘之長莫不沮膽挫折遠遁遂乃振旅渾耶率其衆以降置}
