  - {type: variant, offset: 3056, length: 760, content: 帝王世紀曰武王見暍人王自左擁而右扇之紂政彌亂殷太史向摯載其圖書而歸周王以告于諸侯四年起師而東至商郊牧野乃作木檐王韈係解五人御於前莫肯為王係韈皆曰臣所以事君王非為係韈也王乃釋旄鉞而係之與紂戰紂師敗績禽費仲惡來紂赴于京自燔于宣室而死二嬖妾與妲己亦自殺乃以大白髦麾諸侯入殷商都百姓咸待于郊王使告曰上天降休商人皆拜王亦答拜以兵入造紂及妲己尸王親射之三發然後下車以劒擊之周公為司徒使以黄鉞斬紂頭懸于大白之旗召公為司空又使以𤣥鉞斬妲己頸懸之小白旗置旌於商容之廬命召公釋箕子之囚賜貝千朋命原公釋百姓之囚歸璇臺之珠玉命南宫括散鹿臺之財發巨橋之粟以賑貧民命南宫伯逹史逸遷九鼎于洛邑命閎天封比干之墓命宗祝饗祀于軍㣲子膠鬲皆委質為臣殷人咸喜曰王之於人也死猶封其墓况其生者乎王之於賢仁也亡者猶表其廬况其存者乎王之於財也聚者猶散之况其復藉者乎王之於色也在者猶歸其父母况復徵之乎貴徳篇曰武王克殷召太公而問曰將奈其士衆何太公對曰臣聞愛其人者兼屋上之烏憎其人者惡其餘胥咸劉厥敵使靡有餘何如王曰不可太公出邵公入王曰為之奈何邵公對曰有罪者殺之無罪者活之何如王曰不可邵公出周公入王曰為之奈何周公曰使各居其宅田其田無變舊新唯仁是親百姓有過在於一人武王曰廣大乎平天下矣凡所以貴士君子者以其仁而有徳也道應篇曰武王問太公曰寡人伐紂天下是臣殺其主而下伐其上也吾恐後世之用兵不休闘爭不已為之奈何太公曰甚善王之問也夫未得獸者唯恐其創之小也已得之惟恐傷肉之多也王若欲乆持之則塞民於兊道全為無用之事順擾之教彼皆樂其業供其事情昭昭而道冥冥於是乃去其瞀而載之木解其劒而帶之笏為三年之䘮令類不蕃髙辭卑讓使民不爭酒肉以通之竽瑟以娱之鬼神以畏之繁文滋禮以弇其質厚葬乆䘮以亶其家含珠鱗施綸組以貧其財深鑿髙壟以盡其力家貧族少慮患者寡以此移風可以持天下弗失故老子曰化而欲作吾將鎮之以無名之樸也, SBCK: ''}
