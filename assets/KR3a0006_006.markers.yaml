  - {type: variant, offset: 76, length: 4, content: 讀史記喟, SBCK: 以至于兹而秦復重禁之故發憤於陳王也孔子曰如有用我者吾其爲東周乎庻幾成湯文武之功爲百姓除殘去賊豈貪禄樂位哉大夫曰文學言行雖有伯夷之廉不及栁下惠之貞不過高瞻下視潔言汚行觴酒豆肉遷延相讓辭小取大雞廉狼吞趙綰王臧之等以儒術擢爲上卿而有姦利殘􅃘之心主父偃以口舌取大官竊權重欺紿宗室受諸侯之賂卒皆誅死東方朔自稱辯略消堅釋石當世無􅀟}
  - {type: variant, offset: 76, length: 4, content: 讀史記喟, WYG: 哭子路於中庭有人弔者而夫子拜之既哭進使者而問故使者曰醢之矣遂命覆醢盗跖曰子以甘言說子路而使􅀙之使子路去其危冠解其長劔而受教於子天下皆曰孔丘能止暴禁非其卒之也子路欲殺衞君而事不成是子教之不至也至公萹曰子羔為衞政刖人之足衞之君臣亂子羔走郭門郭門閉刖者守門曰於彼有缺子羔曰君子不踰曰於彼有竇子羔曰君子不遂曰於此有室子羔入追者罷子羔將去謂刖者曰吾不能虧損主之法令而親刖子之足吾在難中此乃子之報怨時也何故逃我刖者曰㫁足固我罪也無可奈何君之治臣也傾側法令先後臣以法欲臣之免於法也臣知之獄决罪定臨當論刑君愀}
