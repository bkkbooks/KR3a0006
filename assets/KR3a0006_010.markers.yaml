  - {type: variant, offset: 1222, length: 106, content: 小辯斯足以害其身而已申韓第五十六御史曰待周公而為相則世無列國待孔子而後學則世無儒墨夫衣小缺㡜裂可以補而必待全匹而易之政小缺法令可以防而必待雅頌乃治之是猶舍鄰之醫而求俞跗而後治病廢汙池之水待江海而後救火也迂而不徑闕, SBCK: 止度功業}
