  - {type: variant, offset: 1157, length: 0, content: '', WYG: 晏子相去聲齊三君崔慶無道刼其君亂其國靈公同圍莊公弑死景公之時晉人來攻取垂都舉臨淄邊邑削城郭焚宫室隳寳器盡何衝之所能折乎由此觀之賢良所言賢人為寳則損益無輕重也賢良曰管仲去魯入齊齊伯音覇魯削非恃其衆而歸齊也伍子胥挾弓干闔閭破楚入郢音影非負其兵而適吳也故賢者所在國重所去國輕雜事篇曰管仲傅齊公子糾鮑叔傅公子小白齊公孫無知殺襄公公子糾奔魯小白奔莒齊人誅無知迎公子糾於魯公子糾與小白争入管仲射小白中其帯鈎小白佯死遂先入是為齊桓公公子糾死管仲奔魯桓公立國定使人迎管仲於魯遂立以為仲父委國而聼之九合諸侯一匡天下為五伯長越絶書曰伍子胥父誅於楚子胥挾弓身干闔廬闔廬曰士之甚勇之甚將為之報仇子胥曰不可諸侯不為匹夫報仇臣聞事君猶事父也􅃜君之行報父之仇不可於是止楚客説春申君曰昔伊尹去夏之殷殷王而夏亡管仲去魯而入齊魯弱而齊強由是觀之夫賢者之所在其君未嘗不善其國未嘗不安也楚有子玊得臣文公側席虞有宫之竒晉獻不寐尊賢篇曰晉荆戰於邲晉師敗績荀林父將歸請死景公將許之士貞伯曰不可城濮之役晉勝于荆文公猶有憂色曰子玉猶存憂未歇也困獸猶鬪况國相乎及荆殺子玉乃喜曰莫予毒也今天或者大警晉也林父之事君進思盡忠退思補過社稷之衛也今殺之是重荆勝也景公曰善乃使復將泰族訓曰晉獻公欲伐虞宫之竒存焉為之寢不安席食不甘味而不敢加兵焉賂以寶玉駿馬宫之竒諫而不聼言而不用越疆而去荀息伐之兵不血刃抱寳牽馬而去尊賢篇曰虞有宫之竒晉獻公為之終夜不寐楚有子玉得臣文公為之側席而坐逺乎賢者之厭難折衝也夫音扶臣所在辟除開塞者亦逺矣陳琳曰古之用兵敵國雖亂尚有賢人則不伐也是故三仁未去武王還師宮竒在虞晉不加戎季梁猶在强楚挫謀暨至衆賢奔絀三國為墟明其無道有人猶可救也故春秋曰山有虎豹葵藿為之不採國有賢士邊境為之不害也説山訓曰山有猛獸林木為之不斬園有螫虫藜藿為之不採鄭昌傳曰山有猛獸藜藿為之不採國有忠臣姦邪為之不起備胡第三十八大夫曰鄙語曰賢者容不辱以世俗言之鄉曲有桀人尚辟音避之今明天子在上匈奴公為冦侵擾邊境是仁義犯而藜藿不採昔狄人侵太王至公篇曰太王有至仁之恩不忍戰百姓故事勲育戎氏以犬馬珎幣而伐不止問其所欲者土地也於是屬其羣臣耆老而告之曰土地者所以養人也不以所以養而害其養也吾將去之遂居岐山之下邠人負幼扶老從之如歸父母三遷而民五倍其初者皆興仁義趨上之事君子守國安民非特鬪兵罷殺士衆而已不私其身惟民是用保民盖所以去國之義也匡人畏孔子孔子世家曰孔子去衛將適陳過匡顔刻為僕以其䇿指之曰昔吾入此由彼缺也匡人聞之以為魯之陽虎陽虎嘗暴匡人匡人於是遂止孔子孔子狀類陽虎拘焉五日顔淵後子曰吾以汝為死矣顔淵曰子在回何敢死匡人拘孔子益急弟子懼孔子曰文王既沒文不在兹乎天之將喪斯文也後死者不得與于斯文也天之未喪斯文也匡人其如予何孔子使從者為寗武子臣於衛然後得去故不仁者仁之賊也是以縣官厲武以討不義設機械以備不仁賢良曰匈奴處沙漠之中生不食之地天所賤而棄之無壇宇之居男女之別以廣野為閭里以穹廬為家室衣去聲皮䝉毛食肉飲血會市行音杭牧豎音樹居如}
