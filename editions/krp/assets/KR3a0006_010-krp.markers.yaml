  - {type: variant, offset: 10956, length: 364, content: 刺客傳曰燕太子質于秦亡歸見秦且滅六國兵已臨易水恐其禍至丹患之因田光以交荆軻於是尊荆軻為上卿令秦武陽為副俱入秦刺秦王臨發太子及賔客知其事者皆白衣冠以送之至易水上既祖取道髙漸離擊筑荆軻和而歌為變徵之聲士皆垂淚涕泣又前而為歌曰風蕭蕭兮易水寒壯士一去兮不復還復為羽聲慨慷士皆瞋目髪盡上衝冠於是荆軻遂就車而去終已不顧既至秦秦王聞之大喜乃朝服設九賔見燕使者咸陽宫荆卿進樊於期之頭函而秦武陽奉地圖匣以次進至陛軻取圖奉之秦王發圖圖窮而匕首見因左手把秦王之袖而右手持匕首揕之未至身秦王驚自引而起袖絶環柱而走羣臣驚焉乃以手共摶之是時侍醫夏無且以其所奉藥囊提荆軻秦王方環柱走卒惶急不知所為左右乃曰王負劒王負劒遂㧞以撃荆軻斷其左股荆軻廢乃引其匕首以提秦王不中中柱秦王復擊軻軻被八創軻自知事不就倚柱而笑箕踞以罵曰事所以不成者乃欲以生刼之必得約契以報太子也, SBCK: ''}
