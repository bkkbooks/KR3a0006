  - {type: variant, offset: 8429, length: 735, content: 刺客傳曰伍子胥知公子光之欲殺呉王僚乃曰彼光將有内志未可說以外事乃進專諸於公子光光既得專諸善客待之九年而楚平王死春呉王僚欲因楚䘮使其二弟公子盖餘屬庸將兵圍楚之潜使延陵季子於晉以觀諸侯之變楚發兵絶呉將盖餘屬庸路呉兵不得還於是公子光謂專諸曰此時不可失不求何獲且光真王嗣當立季子雖來不吾廢也專諸曰王僚可殺也母老子弱而兩弟將兵伐楚楚絶其後方今呉外困於楚而内空無骨鯁之臣是無如我何公子光頓首曰光之身子之身也四月丙子光伏甲士於窟室中而具酒請王僚王僚使兵陳自宫至光之家門戸階陛左右皆王僚之親戚也夾立侍皆持長鈹酒既酣公子光為足疾入窟室中使專諸置匕首魚炙之腹中而進之既至王前專諸擘魚因以匕首刺王僚王僚立死左右亦殺專諸王人擾亂公子光出其伏甲以攻王僚之徒盡滅之遂自立為王是為闔閭乃封專諸之子以為上卿呉越春秋曰呉王欲殺王子慶忌而莫之能殺呉王患之要離曰臣能之呉王曰汝惡能乎吾嘗以六馬逐之江上矣而不能及射之矢左右滿把而不能中今汝㧞劒則不能舉臂上車則不能登軾汝惡能要離曰士患不勇耳奚患而不能王誠能助臣請必能呉王曰諾明旦加要離罪焉摯執妻子焚之而揚其灰要離走往見王子慶忌於衞王子慶忌喜曰呉王之無道也子之所見也諸侯之所知也今子得免而去之亦善矣要離與王子慶忌居有間謂王子慶忌曰呉之無道也愈甚請與王子往奪之國王子慶忌曰善乃與要離俱渉於江中江㧞劒以刺王子慶忌捽之投之於江浮則又取而投之如此者三其卒曰汝天下之國士也幸汝以成而名要離得不死歸於呉呉王大說請與分國要離曰不可臣請必死呉王止之要離曰夫殺妻子焚之而揚其灰以便事也臣以為不仁夫為故主殺新主臣以為不義夫捽而浮乎江三入三出特王子慶忌為之賜而不殺耳臣已為辱矣夫不仁不義又且已辱不可以生呉王不能止果仗劒而死要離可謂不為賞動矣故臨大利而不易其義可謂廉矣亷故不以富貴而忘其辱, SBCK: ''}
