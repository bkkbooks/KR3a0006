  - {type: variant, offset: 3801, length: 416, content: 騶衍傳曰騶衍睹有國者益淫侈不能尚徳若大雅整之於身施及黎庶矣乃深觀隂陽消息而作怪迂之變終始大聖之篇十餘萬言其語閎大不經必先騐小物推而大之至於無垠先序今以上至黄帝學者所共術大並世盛衰因載其禨祥度制推而逺之至天地未生窈㝠不可考而原也先列中國名山大川通谷禽獸水土所殖物類所珍因而推之及海外人之所不能睹稱引天地剖判以来五徳轉移治各有宜而符應若兹以為儒者所謂中國者於天下乃八十一分居其一分耳中國名曰赤縣神州赤縣神州内自有九州禹之序九州是也不得為州數中國外如赤縣神州者九乃所謂九州也於是有禆海環之人民禽獸莫得相通者如一區中者乃為一州如此者九乃有大瀛海環其外天地之際焉其術皆此類也然要其歸必止乎仁義節儉君臣上下六親之施始也濫耳封禪書曰自齊威宣之時騶子之徒論著終始五徳之運及秦帝而齊人奏之故始皇采用之而宋毋忌正伯僑充尚羡門子髙最後皆燕人為方僊道形解銷化依於鬼神之事騶衍以隂陽主運顯於諸侯而燕齊海上之方士傳其術不能通然則怪迂阿諛苟合之徒自此興不可勝數也, SBCK: ''}
