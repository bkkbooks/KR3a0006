  - {type: variant, offset: 0, length: 2, content: 欽定, SBCK: 執務第三十九丞相曰先王之道軼人而難復賢良文學之言深遠而難行夫稱上聖之高行道至德之美言非當世之所能及也願聞方今之急務可復行於政使百姓咸足於衣食無乏困之憂風􅀨時五榖熟螟螣不生天下安樂盜賊不起流人還歸各反其田里吏皆廉正故以奉職元元各得其理也賢良曰孟子曰尭舜之道非遠人也而人不思之耳詩云求之不得寤寐思服有求如關雎好德如河廣何不濟不得之有故高山仰止景行行止雖不能及離道不遠也顔淵曰舜獨何人也回何人也夫思賢慕能從善不休則成康之俗可致而唐虞之道可及公卿未思也先王之道何遠之有齊􅁊公以諸侯思王政憂周室匡諸夏之難平夷狄之亂存亡接絕信義大行著于天下邵陵之會予之爲主傳曰予積也故土積而成山阜水積而成江海行積而成君子孔子曰吾於河廣知德之至也而欲得之各反其本復諸古而已古者行役不踰時春行秋反秋行春來寒暑未變衣服不易固巳還矣夫婦不失時人安和如適獄訟平刑罰得則隂陽調風雨時上不苛擾下不煩勞各修其業安其性則螟螣不生而水旱不起賦歛省而農不失時則百姓足而流人歸其田里上淸靜而不欲則下廉而不貪􅀂今則繇役極遠盡寒苦之地危難之處渉胡越之域今兹往而來歲旋父母延頸而西望男女怨曠而相思身在東楚志在西河故一人行而郷曲恨一人死而萬人悲詩云王事靡盬不能藝稷􅁰父母何怙念彼恭人涕零如雨豈不懷歸畏此罪罟吏不奉法以存撫倍公任私各以其權充其􅄝欲人愁苦而怨思上不恤理則惡政行而邪氣作邪氣作則蟲螟生而水旱起􅀂此雖禱祀雩祝用事百神無時豈能調隂陽而息盜賊矣能言第}
