  - {type: 'tls:seg', offset: 1640, content: '', id: KR3a0006_tls_001-16a.10}
  - {type: variant, offset: 1640, length: 0, content: '', WYG: 王制曰國無九年之蓄曰不足無六年之蓄曰急無三年之蓄曰國非其國也三年耕必有一年之食九年耕必有三年之食以三十年之通雖有凶旱水溢民無菜色然後天子食日舉以樂周書曰有十年之積者王有五年之積者霸無一年之積者亡主術訓曰夫天地之大計三年耕而餘一年之食率九年而有三年之蓄十八年而有六年之積二十七年而有九年之儲雖汵旱災害之殃民莫困窮流亡也故國無九年之儲謂之不足無六年之積謂之閏急無三年之蓄謂之窮乏故有仁君明王其取下有節自養有度則得承受於天地而不離饑寒之患矣若彼貪主暴君撓於其下侵漁其民以適無窮之欲則百姓無以被天和而履地徳矣}
