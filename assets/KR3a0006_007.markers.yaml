  - {type: variant, offset: 640, length: 0, content: '', WYG: 良文學皆離席曰鄙人固陋希涉大庭狂言多不稱去聲以逆執事夫藥酒苦於口而利於病忠言逆於耳而利於行去聲湯曰藥食先嘗於卑然後至於貴藥言先獻於貴然後聞于卑道也故使人味食然後食}
  - {type: variant, offset: 640, length: 0, content: '', krp: 良文學皆離席曰鄙人固陋希涉大庭狂言多不稱去聲以逆執事夫藥酒苦於口而利於病忠言逆於耳而利於行去聲湯曰藥食先嘗於卑然後至於貴藥言先獻於貴然後聞于卑道也故使人味食然後食}
  - {type: variant, offset: 641, length: 1, content: 容, WYG: 其得味也多使人味言然後聞言者其得言也少是故求道者}
  - {type: variant, offset: 641, length: 1, content: 容, krp: 其得味也多使人味言然後聞言者其得言也少是故求道者}
  - {type: variant, offset: 643, length: 0, content: '', WYG: 以目而以心取道者不以手而以耳孔子曰良藥苦於口利於病忠言逆於耳利於行故武王諤諤而昌紂嘿嘿而亡君無諤諤之臣父無諤諤之子兄無諤諤之弟夫無諤諤之婦士無諤諤之友其亡可立而待故曰君失之臣得之父失之子得之兄失之弟得之夫失之婦得之士失之友得之故無亡國敗家悖父亂子放兄棄弟狂夫滛婦絶交敗友韓非子曰夫良藥苦於口而智者勤而飲之知其入而已已疾也忠言拂於耳而明主聼之知其可以致功也故愕愕音鄂者福也諓諓音淺者賤也林中多疾風富貴多䛕言萬里之朝音潮日聞唯唯而後聞諸生之愕愕音鄂此乃公卿之良藥鍼音針石正諫篇曰趙簡子有臣曰周舍立於門下三日三夜簡子使問之曰子欲見寡人何事周舍對曰願為諤諤之臣墨筆操牘從君之過而日有記也月有成也嵗有效也簡子居則與之居出則與之出居無幾何而周舍死簡子如䘮子後與諸大夫飲於洪波之臺酒酣簡子涕泣諸大夫皆出走曰臣有罪而不自知簡子曰大夫皆無罪昔者吾有周舍有言曰千羊之皮不若一狐之腋衆人諾諾不若一士之諤諤昔者商紂黙黙而亡武王諤諤而昌今自周舍之死吾未嘗聞吾過也吾亡無日矣是以寡人泣也諸葛恪曰良藥苦口惟病者能甘之忠言逆耳惟逹者能受之大夫色少寛面文學而蘇也蘇氣索貌不安也丞相去聲史曰窮巷多曲辯而寡見者難喻公孫鞅曰窮巷多恡曲學多辯文學守死渣滓之語而終不移夫音扶往古之事昔有之語已可覩矣今以近世觀之自以目有所見耳有所聞世殊而事異文景之際建元之始民朴而歸本吏亷而自重殷殷屯屯人衍而家富今政非改而敎非易也何世之彌薄而俗之滋衰也吏即少亷民即寡耻刑非誅惡而姦猶不止食貨志曰文景之時屢敕有司以農為務民遂樂業至武帝之初七十年間國家亡事非遇水旱則民人給家足都鄙廩庾盡滿而府庫餘財京師之錢累百鉅萬貫朽而不可校大倉之粟陳陳相因充溢露積於外腐敗不可食衆庻街巷有馬阡陌之間成羣乗牸牝者擯而不得會聚守閭閻者食梁肉為吏者長子孫居官者以為姓號人人自愛而重犯法先行誼而黜媿}
