  - {type: variant, offset: 1248, length: 0, content: '', WYG: 賢者處大林遭風雷而不迷舜典曰納于大麓烈風雷雨弗迷愚者雖處平敞音昶大路猶暗惑焉今守相去聲親剖符贊拜蒞一郡之衆古方伯之位也受命專制宰割千里不御於内善惡在於己已不能故耳道何狹之有哉賢良曰古之進士也鄉擇而里選論其才能然後官之勝音升職任然後爵而禄之王制曰大樂正論造士之秀者以告于王而升諸司馬曰進士司馬辨論官材論進士之賢者以告於王而定其論論定然後官之任官然後爵之位定然後祿之故士修之鄉曲升諸朝音潮廷行之幽隱明足顯著疏逺無失士小大無遺功是以賢者進用不肖者簡黜傳曰王者之論徳也而不尊無功不官無徳不誅無罪朝無幸位民無幸生故上賢使能而等級不踰折暴禁悍而刑罰不過百姓曉然皆知夫為善於家取賞於朝也為不善於幽而䝉刑於顯夫是之謂定論是王者之徳詩云明昭有周式序在位今吏道壅而不選古作通富者以財賈音古官勇者以死射功戱車鼎躍咸出補吏衛綰傳曰以戯車為郎顔師古曰若今之弄車之技也累功積日或至卿相去聲垂青繩擐音灌銀龜擅殺生之柄專萬民之命弱者猶使羊將狼也其亂必矣强者則是予狂夫利劒也必妄殺生也酷吏傳曰寧成家居上欲以為郡守御史大夫𢎞曰臣居山東為小吏時寧成為濟南都尉其治如狼牧羊成不可使治民上乃拜成為闗都尉主術訓曰不仁而有勇力果敢則狂而操利劒不知而辨慧懐給則棄􅂹而不式雖有材能其施之不當其處之不宜適足以轉偽餙非伎藝之衆不如其寡也故有野心者不可借便勢有愚質者不可與利器是以往者郡國黎民相乗而不能理或至鋸頸殺不辜而不能正執綱紀非其道蓋博亂愈甚}
