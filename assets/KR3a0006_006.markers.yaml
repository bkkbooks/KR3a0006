  - {type: variant, offset: 0, length: 6, content: 鹽鐵論卷六散, SBCK: 八大夫曰夫懷枉而言正自託於無欲而實不從非此士之情也昔李斯與包丘子俱事荀卿旣而李斯入秦遂取三公據萬乗之權以制海内功侔伊望名巨太山而包丘子不免於甕牗高廬如潦歲之鼃口非不衆也然卒死於溝壑而巳今内無以養外無以稱貧賤而好義雖言仁義亦}
