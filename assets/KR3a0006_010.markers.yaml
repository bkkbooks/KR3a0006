  - {type: variant, offset: 4376, length: 1, content: 俗, SBCK: 詩云獫狁孔熾我是用戒武夫潢潢經營四方故守禦征伐所由來乆矣春秋譏戎驪未至豫禦之故四支强而躬體固華葉茂而本根據故􅅚四境所以安中國也發戌漕所以審勞佚也主憂者臣勞上危者下死先帝憂百姓不贍出禁錢解乗輿驂貶樂損膳以賑窮備邉費未見報施之義而見沮成之理}
  - {type: variant, offset: 4376, length: 1, content: 俗, WYG: 詩云獫狁孔熾我是用戒武夫潢潢經營四方故守禦征伐所由來乆矣汜論曰夫神農伏犧不施賞罰而民不為}
  - {type: variant, offset: 4376, length: 1, content: 俗, krp: 詩云獫狁孔熾我是用戒武夫潢潢經營四方故守禦征伐所由來乆矣汜論曰夫神農伏犧不施賞罰而民不為}
  - {type: variant, offset: 4378, length: 116, content: 唐虞之時而世非許由之民而欲廢法以治是猶不用隱括斧斤欲撓曲直枉也故為治者不待自善之民為輪者不待自曲之木往者應少伯正之屬潰梁楚昆盧徐穀之徒亂齊趙山東關內暴徒保人阻險當此之時不任斤斧折之以武而乃始設禮脩文有似窮毉欲以短鍼而攻疽孔丘以禮說跖, SBCK: 所聞}
  - {type: page-break, offset: 4378, content: '', id: KR3a0006_SBCK_009-2b}
  - {type: variant, offset: 4378, length: 2, content: 唐虞, WYG: 然而立政者不能廢法而治民舜干戚而服有苗然而征伐者不能釋甲兵而制强暴春秋譏戎驪未至預禦之春秋曰公追戎於濟西公羊傳曰此未有言伐者其言追何大其為中國追也此未有伐中國者則言其為中國追何大其未至而豫禦之也其言于濟西何大之也故四支强而躬體固華葉茂而本根據故飭四境所以安中國也發戍音絮漕所以審勞佚音逸也主憂者臣勞上危者下死先帝憂百姓不澹古贍字出禁錢解乗輿驂貶樂損膳以賑窮備邊費食貨志曰縣官不給天子乃損膳解乗輿駟出御府禁藏以澹之其明年山東被水災民多飢乏於是天子遣使虚郡國倉廪以賑貧未見報施之義而見沮成之理非所聞也文學曰周道衰王迹熄諸侯爭强大小相凌是以强國務侵弱國設備甲士勞戰陳古陣字役於兵革故君勞而民困苦也覽㝠訓曰晩世}
