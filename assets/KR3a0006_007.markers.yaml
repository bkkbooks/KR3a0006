  - {type: variant, offset: 147, length: 0, content: '', WYG: 無數者也若堙之所觀者天機也得其精而忘其粗得其在内而忘其外見其所見而不見其所不見視其所視而遺其所不視若彼之所相者乃有貴乎馬者馬至而果千里之馬此其所以多不稱去聲舉詔册通作䇿曰朕嘉宇内之士故詳延四方豪俊文學博習之士超遷官祿言者不必有徳何者言之易而行之難有舍其車而識其牛貴其不言而多成事也漢書曰劉寛嘗行有人失牛者乃於路就寛車中認之寛無所言下駕步歸有頃認者得牛而送還叩頭謝曰蹔負長者寛曰物有相類事容脱誤幸勞見歸何為謝也吳鐸以其舌自破主父偃以其舌自殺繆稱訓曰吳鐸以聲自毁膏燭以明自爍許慎曰鏎大鈴出於吳也叢談曰口者闗也舌者機也出言不當四馬不能追也口者關也舌者兵也出言不當反自傷也言出於已不可止於人行發於邇不可止於逺夫言行者君子之樞機樞機之發榮辱之本也可不慎乎故蒯子羽曰言猶射也括既離弦雖有所悔焉不可從而追已詩曰白珪之玷尚可磨也斯言之玷不可為也鶡音押鴠音旦夜鳴無益於明主父鳴鴟無益於死鶡鴠渇鴠也詩云相彼鳱鴠尚或惡之鳴急旦也增韻曰鳱鴠求旦之鳥形似雞晝夜常鳴陸佃曰怪鴟其鳴即雨為繇可以聚衆鳥一名隻狐晝無所見夜即飛也非有司}
