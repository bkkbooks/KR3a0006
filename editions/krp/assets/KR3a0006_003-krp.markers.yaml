  - {type: variant, offset: 13048, length: 540, content: 齊策曰始皇嘗遣使者遺君王后玉連環曰齊多智而觧此環否君王后以示羣臣羣臣不知解君王后引錐椎破之謂秦使曰謹以解矣及君王后病且卒誡建曰羣臣之可用者某建曰請書之君王后曰善取筆牘受書君王后曰老婦已忘矣君王后死後后勝相齊多受秦間金玉使賓客入秦皆為變辭勸王朝秦不修攻戰之備齊王建入朝於秦雍門司馬前曰所為立王者為社稷耶為王立王耶王曰為社稷司馬曰為社稷王何以去社稷而入秦齊王還車而反即墨大夫聞雍門司馬諌而聼之則以為可即入見齊王曰齊地方數千里帶甲數百萬夫三晋大夫皆不便秦而在阿鄄之間者百數王收而與之百萬之衆使收三晋之故地即臨晋之闗可以入矣鄢郢大夫不欲為秦而在城南下者百數王收而與之百萬之師使收楚故地即武闗可以入矣如此則齊威可立秦國可亡矣舍南面之稱制乃西面而事秦竊為大王不取也齊王不聼秦使陳馳誘齊王内之約與五百里之地齊王不聼即墨大夫而聼陳馳遂入秦處之共松栢之間餓而死齊世家曰始君王后事秦謹與諸侯信齊亦東邊海上秦日夜攻三晉燕楚五國各自救於秦以故王建立四十餘年不受兵君王后死后勝相齊多受秦間金多使賓客入秦秦又多予金客皆為反間勸王去從朝秦不修攻戰之備不助五國攻秦秦以故得滅五國五國已亡秦兵卒入臨淄民莫敢格者王建遂降遷於共故齊人怨王建不蚤與諸侯合從攻秦聼姦臣賓客以亡其國歌之曰松耶栢耶住建共者客耶疾建用客之不詳也, SBCK: ''}
