  - {type: variant, offset: 2476, length: 1671, content: 天歆焉永其世而豐其年故堯秀眉高彩享國百載及秦始皇覽怪迂信禨祥使盧生求羡門高徐市等入海求不死之藥當此之時燕齊之士釋鋤耒爭言神仙方士於是趣咸陽者以千數言仙人食金飲珠然後壽與天地相保於是數巡狩五嶽濱海之館以求神仙蓬萊之屬數幸之郡縣富人以貲佐貧者築道旁其後小者亡逃大者藏匿吏捕索掣頓不以道理名宮之旁廬舍丘落無生苗立樹百姓離心怨思者十有半書曰享多儀儀不及物曰不享故聖人非仁義不載於己非正道不御於前是以先帝誅文成五利等宣帝建學官親近忠良欲以絕怪惡之端而昭至德之塗也宮室奢侈林木之蠹也器械雕琢財用之蠹也衣服靡麗布帛之蠹也狗馬食人之食五穀之蠹也口腹從恣魚肉之蠹也用費不節府庫之蠹也漏積不禁田野之蠹也喪祭無度傷生之蠹也墮成變故傷功工商上通傷農故一杯棬用百人之力一屏風就萬人之功其為害亦多矣目脩於五色耳營於五音體極輕薄口極甘脆功積於無用財盡於不急口腹不可為多故國病聚不足即政怠人病聚不足則身危丞相曰治聚不足奈何救匱第三十賢良曰蓋橈枉者過直救文者以質昔者晏子相齊一狐裘三十載故民奢示之以儉民儉示之以禮方今公卿大夫子孫誠能節車輿適衣服躬親節儉率以敦朴罷園池損田宅內無事乎市列外無事乎山澤農夫有所施其功女工有所粥其業如是則氣脈和平無聚不足之病矣大夫曰孤子語孝躄者語杖貧者語仁賤者語治議不在己者易稱從旁議者易是其當局則亂故公孫弘布被倪寬練袍衣若僕妾食若庸夫淮南逆於內蠻夷暴於外盜賊不為禁奢侈不為節若疫歲之巫徒能鼓口耳何散不足之能治乎賢良曰高皇帝之時蕭曹為公滕灌之屬為卿濟濟然斯則賢矣文景之際建元之始大臣尚有爭引守正之義自此之後多承意從欲少敢直言面議而正刺因公而徇私故武安丞相訟園田爭曲直人主之前夫九層之臺一傾公輸子不能正本朝一邪伊望不能復故公孫丞相倪大夫側身行道分祿以養賢卑己以下士功業顯立日力不足無行人子產之繼而葛繹彭侯之等隳壞其緒紕亂其紀毀其客館議堂以為馬廄婦舍無養士之禮而尚驕矜之色廉恥陵遲而爭於利矣故良田廣宅民無所之不恥為利者滿朝市列田畜者彌郡國橫暴掣頓大第巨舍之旁道路且不通此固難醫而不可為工大夫勃然作色默而不應箴石第三十一丞相曰吾聞諸鄭長者曰君子正顏色則遠暴嫚出辭氣則遠鄙倍矣故言可述行可則此有司夙昔所願覩也若夫劍客論博奕辯盛色而相蘇立權以不相假使有司不能取賢良之議而賢良文學被不遜之名竊為諸生不取也公孫龍有言曰論之為道辯故不可以不屬意屬意相寬相寬其歸爭爭而不讓則入於鄙今有司以不仁又蒙素飡無以更責雪恥矣縣官所招舉賢良文學而及親民偉仕亦未見其能用箴石而醫百姓之疾也賢良曰賈生有言曰懇言則辭淺而不入深言則逆耳而失指故曰談何容易談且不易而況行之乎此胡建所以不得其死而吳得幾不免於患也語曰五盜執一良人枉木惡直繩今欲下箴石通關鬲則恐有盛胡之累懷箴橐艾則被不工之名狼跋其胡載踕其尾君子之路行止之道固狹耳此子石所以歎息也除狹第三十二大夫曰賢者處大林遭風雷而不迷愚者雖處平敞大路猶暗惑焉今守相親剖符贊拜蒞一郡之眾古方伯之位也受命專制宰割千里不御於內善惡在於己己不能故耳道何狹之有哉賢良曰古之進士也鄉擇而里選論其才能然後官之勝職任然後爵而祿之故士修之鄉曲升諸朝廷行之幽隱明足顯著䟽遠無失士小大無遺功是以賢者進用不肖者簡黜今吏道雜而不選富者以財賈官勇者以死射功戲車鼎躍咸出補吏累功積日或至卿相垂青繩擐銀龜擅殺生之柄專萬民之命弱者猶使羊將狼也其亂必矣強者則是予狂夫利劍也必妄殺生也是以往者郡國黎民相乘而不能理或至鋸頸殺不辜而不能正執綱紀非其道蓋博亂愈甚古者封賢祿能不過百里百里之中而為都疆垂不過五十猶以為一人之身明不能照聰不得達故立卿大夫士以佐之而政治乃備今守相或無古諸侯之賢而蒞千里之政主一郡之眾施聖主之德擅生殺之法至重也非仁人不能任非其人不能行一人之身治亂在己千里與之轉化不可不熟擇也故人主有私人以財不私人以官縣賞以待功序爵以俟賢舉善若不足黜惡若仇讎固為其非功而殘百姓也夫輔主德開臣途在於選賢而器使之擇練守相然後任之疾貪第三十三大夫曰然為醫以拙矣又多求謝為吏既多不良矣又侵漁百姓長吏厲諸小吏小吏厲諸百姓故不患擇之不熟而患求之與得異也不患其不足也患其貪而無厭也賢良曰古之制爵祿, WYG: ''}
