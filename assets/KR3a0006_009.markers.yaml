  - {type: variant, offset: 4076, length: 2, content: 金生, WYG: 往者匈奴據河山之險擅田牧之利民富兵强行入為冦則句注之内驚動而上郡以南咸城文帝時虜入蕭關烽火通甘泉羣臣懼不知所出乃請屯京師以備胡匈奴傳曰孝文十四年匈奴單于十四萬騎入朝那蕭關殺北地都尉卬虜人民畜産甚多遂至彭陽使騎兵入燒回中宫候騎至雍甘泉}
