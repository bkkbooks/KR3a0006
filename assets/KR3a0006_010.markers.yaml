  - {type: variant, offset: 4439, length: 1, content: 昆, WYG: 丘以歸故得道則以百里之地令於諸侯失道則以天下之大畏於兾州故曰無恃其不吾奪也恃吾不可奪行可奪之道而非簒殺之行無益於恃天下矣汜論曰堯無百戸之郭舜無置錐之地以有天下禹無十人之衆湯無七里之分以王諸侯文王處岐周之間也地方不過百里而立為天子者有王道也夏桀殷紂之盛也人跡所至舟車所通莫不為郡縣然而身死人手而為天下笑者有亡形也故得王道者雖小必大有亡形者雖成必敗趙襄子以晉陽之城霸智伯以三晉之地擒湣王以大齊亡田單以即墨有功故國之亡也雖大不足恃道之行也雖小不可輕由此觀之存在得道而不在於大也亡在失道而不在於小也使關梁足恃六國不兼於秦河山足保秦不亡於楚漢由此觀之衝隆不足為强髙城不足為固行善則昌行惡則亡詩傳曰堅甲利兵不足以為武髙城深池不足以為固嚴令繁刑不足以為威由其道則行不由其道則廢昔楚人蛟革犀兕以為甲堅如金石宛如鉅蛇慘若蜂蠆輕利剛疾卒如飄風然兵殆於垂沙唐子死莊蹻走楚分為三四者此豈無堅甲利兵也哉所以統之非其道故也汝淮以為險江漢以為池縁之以方城限之以鄧林然秦師至于鄔郢舉若振槁然是豈無固塞限險也哉其所以統之者非其道故也紂殺比干而囚箕子為炮烙之刑殺戮無時羣下愁怨皆莫兾其命然周師至令不行乎左右而豈其無嚴令繁刑也哉其所以統之者非其道故也若夫明道而均分之誠愛而時使之則下之應上如影響矣王者博愛逺施外内合同四海各以其職來祭何擊柝而待傳去聲曰諸侯之有關梁庶人之有爵祿非升平之興蓋自戰國始也論勇第五十一大夫曰荆軻懐數年之謀而事不就者三尺匕音比首不足恃也秦王憚於不意列斷賁育介七尺之利也燕丹子曰荆軻刺秦王右手執匕首左手把其袖秦王曰乞聼琴聲而死琴女奏曲云羅縠單衣可掣而絶三尺屏風可超而越鹿}
