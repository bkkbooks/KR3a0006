body:
  text: 鹽鐵論卷一漢桓寛撰明張之象註夲議第一惟始元六年有詔書使丞相去聲御史與所舉賢良文學語問民間所疾苦漢書食貨志曰昭帝即位六年詔郡國舉賢良文學之士問以民所疾苦教化之要車千秋傳曰武帝疾立皇子鉤弋夫人男為太子拜大将軍霍光車騎将軍金日磾御史大夫桑𢎞羊及丞相千秋並受遺詔輔道少主武帝崩昭帝初即位未任聼政政事壹決大将軍光千秋居丞相位謹厚有重徳始元六年昭帝詔郡國舉賢良文學之士問以民所疾苦於是鹽鐵之議起焉文學對曰竊聞治人之道坊古防字淫佚音逸之原廣道徳之端抑末利而開仁義毋音無示以利然後教化可興而風俗可移也今郡國有鹽鐡酒𣙜音較均輸與民争利食貨志曰大農上鹽鐵丞孔僅咸陽言山海天地之崴也皆宜屬少府陛下不私以屬大農佐賦願募民自給費因官器作煮鹽官與牢盆浮食竒名欲擅管山海之貨以致富羡役利細民其沮事之議不可勝聼敢私鑄鐵器煮鹽者鈇左趾沒入其器物郡不出鐵者置小鐵官便屬在所縣使孔僅東郭咸陽乗傳舉行天下鹽鐵作官府除故鹽鐵家富者為吏武帝紀曰天漢三年春二月初𣙜酒酤是時桑𢎞羊為大司農蓋其所建也應劭曰縣官自酤𣙜賣酒小民不得復酤也韋昭曰𣙜謂禁民酤釀獨官開置如道路設木為𣙜獨取利也爾雅謂之石杠今之畧彴是也禁閉其事揔利入官而下無由以得有若渡水之𣙜因立名焉史記平凖書曰元封元年桑𢎞羊為治粟都尉領大農代孔僅筦天下鹽鐵𢎞羊以諸官各自市相與争物故騰躍而天下賦輸或不償其僦費乃請置大農部丞數十人分部主郡國各徃徃縣置均輸令逺方各以其物貴時商賈所轉販者為賦而相􅈅輸置平凖于京師都受天下委輸各工官治車諸器皆仰給大農大農之諸官盡籠天下之貨物貴即賣之賤則買之如此富商大賈無所牟大利則反本而萬物不得騰踊故抑天下物名曰平凖天子以為然許之於是天子北至朔方東到太山廵海上並北邊以歸所過賞賜用帛百餘萬匹錢金以巨萬計皆取足大農散敦厚之樸成貪鄙之化是以百姓就本者寡趨末者衆夫音扶文繁則質衰末盛則本虧末修則民淫本修則民慤音卻善也誠也民慤則財用足民侈則饑寒生願罷鹽鐡酒𣙜音較均輸所以進本退末廣利農業便也大夫曰匈奴背叛不臣數音朔頻也為暴於邊鄙匈奴傳曰匈奴其先祖夏后氏之苗裔也曰淳維樂彥括地譜云夏桀無道湯放之鳴條三年而死其子獯鬻妻桀之衆妾避居北野隨畜移徙中國謂之匈奴晉灼云殷時曰獯鬻周曰玁狁秦曰匈奴匈奴傳又曰元朔二年夏匈奴數萬騎入殺代郡太守恭及畧千餘人其秋匈奴又入鴈門殺畧千餘人其明年匈奴又復入代郡定襄上郡各三萬騎殺畧數千人匈奴右賢王怨漢奪之河南地而築朔方數為冦盗邊及入河南侵擾朔方殺畧吏民甚衆備之則勞中國之士不備則侵盗不止先帝哀邊人之久患苦為虜所係獲也故修障音瘴塞音賽飭烽燧屯戍音絮以備之先帝漢武帝也漢大行王恢曰今匈奴縱意日久矣侵盗無已係虜人民戍卒死傷中國道路櫘車相望此仁人之所哀也障保障也謂塞上要險處築城以為蔽障也塞邊塞也烽候表也燧塞上亭守烽火者文頴曰邊方避冦作高土櫓櫓上作桔臯桔臯頭兠零以薪草置其中常低之有冦即火燃舉之以相告曰烽又多積薪冦至則即燃之望其煙曰燧顔師古曰晝則燔燧夜則舉烽戍守邊也從人持戈為意邊用度不足故興鹽鐵設酒𣙜音較置均輸蕃貨長音掌財以佐助邊費今議者欲罷之内空府庫之藏外乏執備之用使備塞音賽乗城之士乗城謂登城而守之也饑寒於邊將何以澹古贍字之罷之不便也文學曰孔子曰有國有家者不患寡而患不均不患貧而患不安故天子不言多少諸侯不言利害大夫不言得喪去聲畜仁義以風之廣徳行去聲以懷之韓嬰曰天子不言多少諸侯不言利害大夫不言得䘮士不言通財貨不賈於道故駟馬之家不恃鷄豚之息伐氷之家不圖牛羊之入千乗之君不通貨財冡郷不修幣大夫不為場圃委積之臣不貪市井之利是以貧窮有所歡而孤寡有所措其手足也詩曰彼有遺秉此有滯穗伊寡婦之利是以近者親附而逺者説音悦服故善克者不戰善戰者不師善師者不陳古陣字榖梁傳曰善為國者不師善師者不陳善陳者不戰善戰者不死善死者不亡班固曰齊之技擊不可以遇魏之武卒魏之武卒不可以直秦之鋭士秦之鋭士不可以當桓文之節制桓文之節制不可以敵湯武之仁義故曰善師者不陳善陳者不戰善戰者不敗善敗者不亡若夫舜修百僚咎繇作士命以蠻夷猾夏冦賊姦軌而刑無所用所謂善師不陳者也湯武征伐陳師誓衆而放禽桀紂所謂善陳不戰者也齊桓南服强楚使貢周室北伐山戎為燕開路存亡繼絶功為伯首所謂善戰不敗者也楚昭王遭闔廬之禍國滅出亡父老送之王曰父老反矣何患無君父老曰有君如是其賢也相與從之或奔走赴秦號哭請救秦人憐之為之出兵昭王返國所謂善敗不亡者也修之於廟堂而折衝還音旋師王者行仁政無敵於天下惡音烏用費哉大夫曰匈奴桀黠音舝諡法云賊人多殺曰桀古人謂桀黠者謂其凶暴若桀也擅恣入塞音賽犯厲中國殺伐郡縣朔方都尉甚悖不軌法也宜誅討之日久矣陛下垂大惠哀元元之未澹古贍字蔡邕獨斷曰漢天子正號曰皇帝自稱曰朕臣民稱之曰陛下陛階也所由升堂也天子必有近臣執兵陳於陛側以戒不虞謂之陛下者羣臣與天子言不敢指斥天子故呼在陛下者而告之因卑逹尊之意也上書亦如之及羣臣士庻相與言曰殿下閤下執事之屬皆此類也元元庻民也不忍暴士大夫於原野縱然被音披堅執鋭有北面復匈奴之志又欲罷鹽鐵均輸憂邊用損武畧無憂邊之心於其義未便也文學曰古者貴以徳而賤用兵祭公謀父曰先王耀徳不觀兵是故周文公之頌曰載戢干戈載櫜弓矢我求懿徳肆于時夏允王保之先王之於民也茂正其徳而厚其性阜其財而利其器用明利害之鄉以文修之使之務利而辟害懷徳而畏威故能保世以滋大兵畧訓曰湯之七十里而王者修徳也智伯有千里之地而亡者窮武也故千里之國行文徳者王萬乗之國好用兵者亡孔子曰逺人不服則修文徳以來之旣來之則安之今廢道徳而任兵革興師而伐之屯戍音絮而備之暴兵露師以支久長轉輸糧食無已使邊境之士饑寒於外百姓勞苦於内立鹽鐵始張利官以給之非長䇿也故以罷之為便也大夫曰古之立國家者開本末之途通有無之用市朝以一其求致士民聚萬貨農商工師各得所欲交易而退易曰通其變使民不倦食貨志曰自神農之世斵木為耜揉木為耒耒耜之利以教天下而食足日中為市致天下之民聚天下之貨交易而退各得其所而貨通食足貨通然後國實民富而教化成黄帝以下通其變使民不倦李奇曰器幣有不便於時則變更通利之使民樂其業而不倦也故工不出則農用乖商不出則寳貨絶農不出則穀不殖寳貨絶則財用匱吕氏春秋曰農攻粟工攻器賈攻貨時事不共是謂大凶周書曰農不出則乏其食工不出則乏其事商不出則三寳絕虞不出則財匱少財匱少而山澤不辟矣此四者民所衣食之原也原大則饒原小則鮮上則富國下則富家故鹽鐡均輸所以通委財而調緩急罷之不便也文學曰夫道民以徳則民歸厚示民以利則民俗薄俗薄則背義而趨利趨利則百姓交於道而接於市老子曰貧國若有餘非多財也嗜欲衆而民躁也釋名曰躁燥也如物燥則飛揚賈逵曰躁擾也淮南齊俗訓曰亂國若盛治國若虚亡國若不足存國若有餘虚者非無人也皆守其職也盛者非多人也皆徼於末也有餘者非多財也欲節事寡也不足者非無貨也民躁而費多也是以王者崇本退末以禮義坊古防字民欲實菽粟貨財市商不通無用之物工不作無用之器故商所以通鬱滯工所以備器械非治國之本務也大夫曰管子云國有沃野之饒而民不足於食者器械不備也有山海之貨而民不足於財者商工不備也隴蜀之丹漆旄羽荆揚之皮革骨象江南之柟音南梓竹箭燕齊之魚鹽旃裘兖豫之漆絲絺紵養生送死之具也待商而通待工而成貨殖傳曰夫山西饒材竹穀纑旄玉石山東多魚鹽漆絲聲色江南出柟梓薑桂金錫連丹沙犀瑇瑁珠璣齒革龍門碣石北多馬牛羊旃裘筋角銅鐡則千里徃徃山出綦置皆中國人民所喜好謡俗被服飲食奉生送死之具也故待農而食之虞而出之工而成之商而通之此寕有政教發徴期會哉人各任其能竭其力以得所欲故物賤之徴貴貴之徵賤各勸其業樂其事若水之趨下日夜無休時不召而自來不求而民出之豈非道之所符而自然之驗耶故聖人作為舟楫以通川谷服牛駕馬以達陵陸致逺窮深所以交庻物而便百姓易曰黄帝堯舜垂衣裳而天下治蓋取諸乾坤刳木為舟剡木為楫舟楫之利以濟不通盖取諸渙服牛乗馬引重致逺以利天下盖取諸隨是以先帝建鐵官以澹古瞻字農用開均輸以足民財鹽鐡均輸萬民所戴仰而取給者罷之不便也文學曰國有沃野之饒而民不足於食者工商盛而本業荒也有山海之貨而民不足於財者不務民用而淫巧衆也管子曰國有十年之畜而民不足於食是皆以其技能望君之禄也君有山海之金而民不足於用是皆以其事業交接於其上也故川源不能實漏巵山海不能澹古贍字溪壑汜論曰􅋼水足以溢壺榼江河不能實漏巵王符曰山林不能給野火江海不能實漏巵是以盤庚萃居舜藏黄金殷紀曰帝盤庚之時殷已都河北盤庚渡河南復居成湯之故居乃五遷無定處殷民咨胥皆怨不欲徙盤庚乃告諭諸侯大臣曰昔髙后成湯與爾之先祖俱定天下法則可修舍而弗勉何以成徳乃遂渉河南治亳行湯之政然後百姓由寧殷道復興諸侯來朝以其遵成湯之徳也泰族訓曰夫水出於山而入於海稼生於田而藏於倉聖人見其所生則知其所歸矣故舜深藏黄金於蔪巖之山所以塞貪鄙之心也高帝禁商賈音古不得仕宦所以遏貪鄙之俗而醇至誠之風也食貨志曰秦兼天下幣為二等黄金以鎰為名上幣銅錢質如周錢文曰半兩重如其文而珠玉龜貝銀錫之屬為器飾寳藏不為幣然各隨時而輕重漢興以為秦錢重難用更令民鑄筴錢黄金一斤而不軌逐利之民畜積餘贏以稽市物痛騰躍米至石萬錢馬至四百金天下已平高祖乃令賈人不得衣絲乗車重稅租以困辱之孝惠高后時為天下初定復弛商賈之律然市井子孫亦不得官為吏顔師古曰欲令務農也排困市井排斥也坊古防字塞利門而民猶為非也況上之為利乎傳去聲曰諸侯好去聲利則大夫鄙大夫鄙則士貪士貪則庻人盗劉向曰周天子使家父毛伯求金於諸侯春秋譏之故天子好利則諸侯貪諸侯貪則大夫鄙大夫鄙則庻人盗上之變下猶風之靡草也故為人君者明貴徳而賤利以道下下之為惡尚不可止今隐公貪利而身自漁濟上而行八佾以此化於國人國人安得不解於義解於義而縱其欲則災害起而臣下僻矣故其元年始書􅑺言災害將起國家將亂云爾司馬遷曰余讀孟子書至梁惠王問何以利吾國未嘗不廢書而歎也曰嗟乎利誠亂之始也夫子罕言利者常防其原也故曰放於利而行多怨自天子至於庶人好利之弊何以異哉是開利孔為民罪梯者也管子曰利出於一孔者其國無敵出二孔者其兵不詘出三孔者不可以舉兵出四孔者其國必亡先王知其然故塞民之養隘其利途故予之在君介之在君貧之在君富之在君故民之戴上如日月親君若父母梯階也詩曰無拳無勇職為亂階大夫曰徃者郡國諸侯各以其物貢輸徃來煩雜物多苦惡或不償其費故郡置輸官以相給運而便逺方之貢故曰均輸開委府于京以籠貨物籠包舉也賤即買貴即賣是以縣官不失實如淳曰縣官天子也張晏曰不敢斥言天子謂之縣官也商賈音古無所牟利如淳曰牟取也故曰平凖平凖則民不失職均輸則民齊勞逸故平凖均輸所以平萬物而便百姓非開利孔為民罪梯者也文學曰古者之賦稅於民也因其所工不求所拙農人納其獲女紅音工効其力食貨志曰古者民受田有賦有稅賦供車馬兵甲士徒之役充實府庫賜予之用稅給郊社宗廟百神之祀天子奉養百官禄食庶事之費周禮曰司稼掌廵邦野之稼而辨穜稑之種周知其民與其所宜地以為法而縣于邑閭廵野觀稼以年之上下出歛法掌均萬民之食而賙其急而平其興典婦功掌婦式之法以授嬪婦及内人女功之事齎凡授嬪婦功及秋獻功辨其苦良比其小大而賈之物書而揭之以供王及后之用頒之于内府今釋其所有責其所無百姓賤賣貨物以便上求閒音諫者郡國或令平聲使令也民作布絮吏留難與之為市吏之所入非獨齊陶之縑蜀漢之布也亦民間之所為耳而行姦賣乎農民重平聲苦女紅音工再稅未見輸之均也縣官猥音委發闔門擅市則萬物並收萬物並收則物騰躍司馬貞曰騰躍者謂物踊貴而價起有如物之騰躍而起也騰躍則商賈音古侔利自市行貨曰商坐販曰賈侔利自市則吏容姦豪而富商積貨儲物以待其急輕賈音古姦吏收賤以取貴未見凖之平也蓋古之均輸所以齊勞逸而便貢輸非以為去聲利而賈音古萬物也力耕第二大夫曰王者塞天財禁關市執凖守時以輕重御民豐年嵗登則儲積以備乏絶凶年惡嵗則行幣物流有餘而調不足也昔禹水湯旱百姓匱乏或相假以接衣食禹以歷山之金湯以嚴山之銅鑄音注幣以贈其民而天下稱仁徃者財用不足戰士或不得禄而山東被災齊趙大饑穀梁傳曰五榖不升為大饑頼均輸之蓄倉廩之積戰士以奉饑民以賑故均輸之物府庫之財非所以賈音古萬民而専奉兵師之用亦所以賑困乏而備水旱之災也文學曰古者十一而税澤梁以時入而無禁黎民咸被南畆而不失其務韓嬰曰王者之等賦正事田野什一關市譏而不征山林澤梁以時入而不禁相地而正壤理道而致貢萬物羣來無有流滯以相通移近者不隐其能逺者不疾其勞雖幽閒僻陋之國莫不趨使而安樂之夫是之謂王者之等賦正事詩曰敷政優優百禄是遒故三年耕而餘一年之蓄九年耕有三年之蓄此禹湯所以備水旱而安百姓也王制曰國無九年之蓄曰不足無六年之蓄曰急無三年之蓄曰國非其國也三年耕必有一年之食九年耕必有三年之食以三十年之通雖有凶旱水溢民無菜色然後天子食日舉以樂周書曰有十年之積者王有五年之積者霸無一年之積者亡主術訓曰夫天地之大計三年耕而餘一年之食率九年而有三年之蓄十八年而有六年之積二十七年而有九年之儲雖汵旱災害之殃民莫困窮流亡也故國無九年之儲謂之不足無六年之積謂之閏急無三年之蓄謂之窮乏故有仁君明王其取下有節自養有度則得承受於天地而不離饑寒之患矣若彼貪主暴君撓於其下侵漁其民以適無窮之欲則百姓無以被天和而履地徳矣草萊不闢田疇不治雖擅山海之財通百味之利猶不能澹古贍字也是以古者尚力務本而種樹繁躬耕趣時而衣食足雖累凶年而人不病也梁簡文帝曰九年之水不傷堯政七載之旱無累湯朝故衣食者民之本稼穡者民之務也二者修則國富而民安也晁錯曰聖王在上而民不凍饑者非能耕而食之織而衣之也為開其資財之道也民貧則姦邪生貧生於不足不足生於不農方今之務莫若使民務農而已矣詩云百室盈止婦子寧止也大夫曰賢聖治家非一室富國非一道昔管仲以權譎伯音霸而范氏以强大亡管仲傳曰管仲夷吾者潁上人也少時常與鮑叔牙游鮑叔知其賢管仲貧困常欺鮑叔鮑叔終善遇之不以為言已而鮑叔事齊公子小白管仲事公子糾及小白立為桓公公子糾死管仲囚焉鮑叔遂進管仲管仲既用任政於齊齊桓公以霸九合諸侯一匡天下管仲之謀也晉世家曰定公十五年趙鞅使邯郸大夫午不信欲殺午午中行寅范吉射親攻趙鞅鞅走保晉陽定公圍晉陽荀櫟韓不信魏侈與范中行為仇乃移兵伐范中行范中行反晉君擊之敗范中行范中行走朝歌保之韓魏為趙鞅謝晉君乃赦趙鞅復位二十二年晉敗范中行氏二子奔齊出公十七年知伯與趙韓魏共分范中行地以為邑使治家養生必於農則舜不甄陶而伊尹不為庖韓非子曰歴山農者侵畔舜徃耕朞年而耕者讓畔河濵漁者爭壇舜徃漁朞年而漁者讓長東夷之陶者苦窳舜徃陶朞年而器以牢殷紀曰伊尹名阿衡阿衡欲干湯而無由乃為有莘氏媵臣負鼎爼以滋味説湯致于王道故善為國者天下之下我高天下之輕我重以末易其本以虛蕩其實今山澤之財均輸之藏所以御輕重而役諸侯也汝漢之金纎微之貢所以誘外國而釣羌胡之寳也夫音扶中國一端之縵音漫繒之無文者也得匈奴累金之物而損敵國之用是以驘音騾驢音離馲音托駞音佗衘尾入塞音賽驘驢種而馬生也馲駞古本作槖佗言能負橐囊而佗物也驒音䭾騱音奚騵音元馬盡為我畜驒騱古本作驒奚駏驉類也鼲音渾鼦音貂狐貉采旃音氊文罽音計充於内府而璧玉珊瑚瑠璃咸為國之寳是則外國之物内流而利不外泄也異物内流則國用饒利不外泄則民用給矣詩曰百室盈止婦子寧止文學曰古者商通物而不豫工致牢而不偽故君子耕稼佃漁其實一也商則長音掌詐工則致罵内懐闚音窺􅎿音于而心不怍闚􅎿私視也是以薄夫欺而敦夫薄昔桀女樂充宫室文繡衣裳故伊尹高逝遊亳音薄而女樂終廢其國管子曰昔者桀之時女樂三萬人端譟晨樂聞於三衢是無不服文繡衣裳者伊尹以亳之遊女工文繡纂組一純得粟百鍾於桀之國夫桀之國天子之國也桀無天下憂飾婦女鐘鼓之樂故伊尹得其粟而奪之流此之謂來天下之財桀霸有天下而用不足湯有七十里之亳而用有餘天非獨為湯雨菽粟而地非獨為湯出財物也伊尹善通移輕重開闔决塞通於高下徐疾之筴坐起之費時也今驘音騾驢音離之用不中夫聲牛馬之功鼲音渾鼦音貂旃音氊罽音計不益錦綈音提之實綈厚繒也美玉珊瑚出於昆山珠璣犀象出於桂林此距違也漢萬有餘里計耕桑之功資財之費是一物而售音受百倍其價一也一挹而中去聲萬鍾之粟也中當也夫上好去聲珍怪則淫服下流貴逺方之物則貨財外充是以王者不珍無用以節其民不愛竒貨以富其國故理民之道在於節用尚本分土井田而已韓嬰曰古者八家而井田方里為一井廣三百歩長三百歩為一里其田九百畆廣一歩長一歩為一畆廣百歩長百歩為百畆八家為鄰家得百畆餘夫各得二十五畆家為公田十畆餘二十畆共為廬舍各得二畆半八家相保出入更守疾病相憂患難相救有無相貸飲食相召嫁娶相謀漁獵分得仁恩施行是以其民和親而相好詩曰中田有廬疆場有𤓰今或不然令民相伍有罪相伺有刑相舉使搆造怨仇而民相殘傷和睦之心賊仁恩害士化所和者寡欲敗者多於仁道泯焉詩曰其何能淑載胥及溺大夫曰自京師東西南北歴山川經郡國諸殷富大都無非街衢五通商賈音古之所臻萬物之所殖者故聖人因天時知去聲者因地財上士取諸人中士勞其形長沮桀溺無百金之積蹠音隻蹻音脚之徒無猗頓之富長沮桀溺二人楚隱者南華經曰柳下惠之弟名曰盗蹠盗蹠從卒九千人橫行天下侵暴諸侯穴室樞戶驅人牛馬取人婦女貪得忘親不顧父母兄弟不祭先祖所過之邑大國守城小國入保萬民苦之史記正義曰按蹠者黄帝時大盗之名以柳下惠弟為天下大盗故世放古號之盗蹠許慎曰莊蹻楚威王之將軍能大為盗也貨殖傳曰猗頓用盬鹽起與王者埒富孔叢子曰猗頓魯之窮士也耕則常飢桑則常寒聞朱公富徃而問術焉朱公告之曰子欲速富當畜五㹀於是乃適兩河大畜牛羊於猗氏之南十年之間其息不可計貲擬王公馳名天下以興富於猗氏故曰猗頓宛周齊魯商徧天下故乃賈音古之富或累萬金追利乗羡之所致也羡饒也富國何必用本農足民何必井田也文學曰洪水滔天而有禹之績本經訓曰舜之時共工振滔鴻水以薄空桑龍門未開吕梁未發江淮通流四海溟涬民皆上丘陵赴樹木舜乃使禹䟽三江五湖開伊闕導瀍澗平通溝陸流注東海鴻水漏九州乾萬民皆寜其性千金書曰古龍門未開吕梁未發河出孟門大溢逆流名曰洪水禹乃决流䟽河為彭澧之漳所活者千八百國此禹之功也河水泛溢而有宣房之功河渠書曰漢武元光中河决瓠子後二十餘嵗嵗因以數不登而梁楚之地尤甚天子既封禪廵祭山川其明年旱乾封少雨天子乃使汲仁郭昌發卒數萬人塞瓠子决於是天子已用事萬里沙則還自臨决河況白馬玉璧于河令羣臣從官自將軍以下皆負薪致决河是時東流郡燒草以故薪柴少而下淇園之竹以為楗天子既臨河决悼功之不成乃作瓠子之歌於是卒塞瓠子築宫其上名曰宣房宫而導河北行二渠復禹舊跡而梁楚之地復寕無水災商紂暴虐而有孟津古作盟津之謀覽冥訓曰武王伐紂渡于孟津陽侯之波逆流而擊疾風晦𡨕人馬不相見於是武王左操黃鉞右秉白旄瞋目而撝之曰余任天下誰敢害吾意者於是風濟而波罷樂稽耀嘉曰武王承命興師誅于商萬國咸喜軍渡孟津前歌後舞克殷之後民乃大安家給人足酌酒鬱摇天下煩擾而有乗羡之富夫音扶上古至治民樸而貴本安愉而寡求愉樂也當此之時道路罕行市朝音潮生草本經訓曰振困窮補不足則名生興利除害伐亂禁暴則功成世無災害雖神無所施其徳上下和輯雖賢無所立其功故耕不强者無以充虚織不强者無以掩形雖以湊音輳會之要陶室之術無所施其巧齊俗訓曰神農之法曰丈夫丁壯而不耕天下有受其飢者婦人當年而不織天下有受其寒者故身自耕妻親織以為天下先其導民也不貴難得之貨不器無用之物是故其耕不强者無以養生其織不强者無以揜形有餘不足各歸其身衣食饒溢姦邪不生安樂無事而天下均平故孔丘曽參無所施其善孟賁成荆無所行其威公孫鞅曰神農之世公耕而食婦織而衣刑政不用而治甲兵不起而王韓嬰曰四體不掩則鮮仁人五藏空虚則無立士故先王之法天子親耕后妃親蠶先天下憂衣與食也自古及今不施而得報不勞而有功者未之有也主術訓曰耕之為事也勞織之為事也擾擾勞之事而民不舍者知其可以衣食也人之情不能無衣食衣食之道必始於耕織萬民之所能見也物之若耕織者始初甚勞終必利也通有第三大夫曰燕之涿音卓薊音計趙之邯音寒鄲音單魏之温軹音止韓之滎音螢陽齊之臨淄音緇楚之宛丘鄭之陽翟二周之三川富冠去聲海内皆為天下名都非有助之耕其野而田去聲其地者也居五諸侯之衢跨街衝之路也故物豐者民衍宅近市者家富富在術數不在勞身利在勢居不在力耕也貨殖傳曰夫用貧求富農不如工工不如商刺繡文不如倚市門此言末業貧者之資也文學曰荆揚南有桂林之饒内有江湖之利左陵陽之金右蜀漢之材伐木而樹榖燔萊而播粟火耕而水耨地廣而饒材然後呰音紫窳音庾偷生徐廣曰呰窳苟且墮賴之謂也應劭曰呰弜也晉灼曰窳病也好衣甘食雖白屋草廬歌謳皷琴日給月單通作殫盡也竭也朝歌暮戚趙中山帶連屬也大河纂集也四通神衢當天下之蹊商賈音古錯於路諸侯交於道然民淫好去聲末侈靡而不務本田疇不修男女矜飾家無斗筲鳴琴在室是以楚趙之民均貧而寡富宋衞韓梁好去聲本稼穡編戶齊民無不家衍人給顔師古曰編列次也編户列名籍為庶人也如淳曰齊等也無有貴賤謂之齊民若今言平民也故利在自惜不在勢居街衢富在儉力趣時不在嵗司羽鳩也左傳曰魯昭公十七年秋郯子來朝公與之宴昭子問焉曰少皥氏鳥名官何故也郯子曰吾祖也我知之昔者黄帝氏以雲紀故為雲師而雲名炎帝氏以火紀故為火師而火名共工氏以水紀故為水師而水名大皡氏以龍紀故為龍師而龍名我高祖少皡摯之立也鳯鳥適至故紀於鳥而鳥名鳯鳥氏歴正也𤣥鳥氏司分者也伯趙氏司至者也青鳥氏司啓者也丹鳥氏司閉者也祝鳩氏司徒也鵬鳩氏司馬也鳲鳩氏司空也爽鳩氏司寇也鶻鳩氏司事也五鳩鳩民者也五雉為五工正利器用正度量夷民者也九扈為九農正扈民無淫者也自顓頊以來不能紀逺乃紀於近為民師而命以民事則不能故也大夫曰五行東方木而丹章有金銅之山南方火而交趾有大海之川西方金而蜀隴有名材之林北方水而幽都有積沙之地此天地所以均有無而通萬物也今呉越之竹隋唐之材不可勝音升用而曹衞梁宋采棺轉尸江湖之魚萊黃之鮐音台不可勝音升食而鄒魯周韓藜藿蔬食天下之利無不澹古膽字而山海之貨無不富也然百姓匱乏財用不足多寡不調調和也而天下財不散也文學曰古者采椽不斵音卓茅屋不翦衣去聲布褐飯上聲土鉶音刑韓非子曰堯之有天下也堂高三尺采椽不斵茅茨不翦雖逆旅之宿不勤於此矣冬日鹿裘夏日葛裘粢糲之食藜藿之羹飯土匭啜土鉶雖監門之養不觳於此矣精神訓曰高臺層榭人之所䴡也而堯樸桷不斵素題不枅珍怪竒異人之所美也而堯粢之飯藜藿之羮文繡狐白人之所好也而堯布衣掩形鹿裘禦寒俶真訓曰夫聖人量腹而食度形而衣節於已而已貪汚之心奚由生哉故能有天下者必無以天下為也鑄音注金為鉏音鋤埏音言埴音植為器工不造竒巧世不寳不可衣食之物晁錯曰夫珠玉金銀飢不可食寒不可衣是故明君貴五穀而賤金玉各安其居樂音洛其俗甘其食便其器是以逺方之物不交而昆山之玉不至今世俗壞而競於淫靡女極纎微工極技巧雕素樸而尚珍恠鑽山石而求金銀没深淵求珠璣設機䧟求犀象張網羅求翡翠求蠻貊之物以眩中國目無常主曰眩亂也徙卭渠容切筰音作之貨致之東海交萬里之財曠日費功無益於用是以褐衣匹婦勞罷音疲力屈而衣食不足也故王者禁溢利節漏費溢利禁則反本漏費節則民用給是以生無乏資死無轉尸也轉棄也詮言訓曰為治之本務在於安民安民之本在於足用足用之本在於勿奪時勿奪時之本在於省事省事之本在於節欲節欲之本在於反性反性之本在於去載主術訓曰食者民之本也民者國之本也國者君之本也是故人君者上因天時下盡地財中用人力是以羣生遂長五穀蕃殖教民養育六畜以時種樹務修田疇滋殖桑麻肥墝高下各因其宜丘陵阪險不生五穀者以樹竹木春伐枯槁夏取果蓏秋畜䟽食冬伐薪以為民資是故生無乏用死無轉尸大夫曰古者宫室有度輿服以庸采椽茅茨非先王之制也君子節奢刺儉儉則固昔季文子相去聲魯妻不衣去聲帛馬不秣粟魯世家曰季文子卒家無衣帛之妾廐無食粟之馬府無金玉以相三君君子曰季文子廉忠矣説苑反質篇曰季文子相魯妾不衣帛馬不食粟仲孫他諫曰子為魯上郷妾不衣帛馬不食粟人其以子為愛且不華國也文子曰然乎吾觀國人之父母衣麄食蔬吾是以不敢且吾聞君子以徳華國不聞以妾與馬夫徳者得於我又得於彼故可行若淫於奢侈沉於文章不能自反何以守國仲孫他慙而退孔子曰不可大儉極下此蟋蟀所為作也蟋蟀刺晉僖公也儉不中禮故作是詩以閔之欲其及時以禮自娛樂也管子曰不飾公室則材木不可勝音升用不充庖㕑則禽獸不損其夀無味利則本業所出無黼音甫黻音弗則女紅音工不施故工商梓匠邦國之用器械之備也自古有之非獨於此弦高飯上聲牛於周人間訓曰秦穆公使孟明舉兵襲鄭過周以東鄭之賈人弦高蹇他相與謀曰師行數千里數絶諸侯之地其勢必襲鄭凡襲國者以為無備也今示以知其情必不敢進乃矯鄭伯之命以十二牛勞之三率相與謀曰凡襲人者以為弗知也今已知之矣守備必固進必無功乃還師而反晉先軫舉兵擊之大破之殽鄭伯乃以存國之功賞弦高弦高辭之曰誕而得賞則鄭國之信廢矣為國而無信是俗敗也賞一人敗國俗仁者弗為也以不信得厚賞義者弗為也遂以其屬徙東夷終身不反五羖賃車入秦臣術篇曰秦穆公使賈人載鹽徵諸賈人賈人買百里奚以五羖羊之皮使將車之秦秦穆公觀鹽見百里奚牛肥曰任重道逺以險而牛何以肥也對曰臣飲食以時使之不以暴有險先後之以身是以肥也穆公知其君子也令有司具沐浴焉衣冠與坐公大悦異日與公孫支論政公孫支大不寧曰君耳目聰明思慮審察君其得聖人乎公曰然吾悦夫奚之言彼類聖人公孫支遂歸取鴈以賀曰君得社稷之聖臣敢賀社稷之福公不辭再拜而受明日公孫支乃致上卿以讓百里奚曰秦國處僻民陋以愚無知危亡之本也臣自知不足以處其上請以讓之公不許公孫支曰君不用賔相而得社稷之聖臣君之禄也臣見賢而讓之臣之禄也今君既得其禄矣而使臣失禄可乎請終致之公不許公孫支曰臣不肖而處上位是君失倫也不肖失倫臣之過進賢而退不肖君之明也今臣處位廢君之徳而逆臣之行也臣將逃公乃受之故百里奚為上卿以制之公孫支為次卿以佐之也公輸子以䂓矩公輸子名班魯之巧人作雲梯之械以攻宋者䂓者所以圓萬物者也矩者所以方萬物者也歐冶以鎔鑄音注呉越春秋曰越王允常聘歐冶子作名劔五枚一曰純鈎二曰湛盧三曰豪曹四曰魚腸五曰巨闕秦客薛燭善相劔越王取豪曹巨闕魚腸等示之薛燭皆曰非寳劔也取純鈎示之薛燭曰光乎如屈陽之華沉沉如芙蓉始生於湖觀其文如列星之行觀其光如水之溢塘其文色渙渙如氷將釋見日之光此純鈎也取湛盧示之薛燭曰銜金鐵之英吐銀錫之精寄氣託靈有逰出之神服此劔可以折衝伐敵人君有逆謀則去之他日允常乃以湛盧獻呉呉公子光弑呉王僚湛盧去如楚語曰百工居肆以成其事農商交易以利本末山居澤處蓬蒿墝音敲埆音慤財物流通有以均之是以多者不獨衍少者不獨饉韓嬰曰聖人刳木為舟剡木為楫以通四方之物使澤人足乎木山人足乎魚餘衍之財有所流故豐膏不獨樂磽确不獨苦雖遭凶年飢嵗禹湯之水旱而民無凍餓之色故生不乏用死不轉尸若各居其處食其食則是橘柚不鬻音祝􅃷鬻賣也朐音劬鹵音魯之鹽不出旃音氊罽音計不市而呉唐之材不用也文學曰孟子云不違農時榖不可勝音升食􅁞麻以時布帛不可勝音升衣也斧斤以時入材木不可勝音升用佃漁以時魚肉不可勝音升食周書曰文王受命之九年時緋暮春在鄗謂太子發曰吾語汝所保所守守之哉厚徳廣惠忠信愛人君子之行不為驕侈不為靡泰不淫於美括拄茅茨為愛費山林非時不升斤斧以成草木之長川凙非時不入網罟以成魚鼈之長不麛不卵以成鳥獸之長畋漁以時童不夭胎馬不馳騖土不失宜土可犯材可蓄潤濕不穀樹之竹葦莞蒲礫石不可穀樹之葛木以為絺綌以為材用故凡天地之間聖人裁之並為民利是魚鼈歸其泉鳥歸其林孤寡辛苦咸賴其生山以遂其材工匠以為其器百物以平其利商賈以通其貨工不失其務農不失其時是謂和徳主術訓曰先王之法畋不掩羣不取麛夭不蒸澤而漁不焚林而獵豺未祭獸􅆯罦不得布於野獺未祭魚網罟不得入於水鷹隼未摰羅網不得張於谿谷草木未落斧斤不得入山林昆蟲未蟄不得以火燒田孕育不得殺􅙿卵不得探魚不長尺不得取彘不期年不得食是故草木之發若蒸氣禽獸歸之若流泉飛鳥歸之若煙雲有所以致之也雍季曰焚林而田得獸雖多而明年無復也乾澤而漁得魚雖多而明年無復也若其飾宫室增臺榭梓匠斵音卓巨為小以圓為方上成雲氣下成山林則材木不足用也男子去本為末雖雕文刻鏤音陋以象禽獸窮物究變則榖不足食也婦女飾微治細以成文章極技盡巧則絲布不足衣也庖宰烹殺胎卵􅋩炙齊去聲和去聲窮極五味則魚肉不足食也當今世非患禽獸不損材木不勝患僣侈之無窮也非患無旃音氊罽音計橘柚患無狹廬糟糠也鹽鐡論卷一
