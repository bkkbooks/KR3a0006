  - {type: variant, offset: 45, length: 1, content: 化, WYG: 適臣尚安得上下之義君臣之禮而何頌聲能作也賢良曰古者上取有量自養有度樂音洛嵗不盗年饑則肆用民之力不過嵗三日藉歛不過十一王制曰古者公田藉而不稅市㕓而不稅關譏而不征林麓川澤以時入而不禁夫圭田無征用民之力嵗不過三日田里不粥墓地不請司空執度度地居民山川沮澤時四時量地逺近興事任力凡使民任老者之事食壯者之食也君篤愛臣盡力上下交讓而天下平駿發爾私上讓下也遂及我私先公職也孟子曰未有仁而遺其親義而後其君也君君臣臣何為其無禮義乎主術訓曰夫風疾而波興木茂而鳥集相生之勢也是故臣不得其所欲於君者君亦不能得其所求於臣也君臣之施者相報之勢也是故臣盡力死節以與君計君垂爵以與臣是故君不能賞無功之臣臣亦不能死無德之君君德不下流而欲用之如鞭蹏馬矣是猶不待雨而求熟稼必不可之數也及周之末塗德惠塞而嗜欲衆君奢侈而上求多民困於下怠於公事是以有履畆之稅碩鼠之詩作也春秋曰初稅畆公羊傳曰初者何始也稅畆者何履畆而稅也初稅畆何以書譏也何譏爾譏始履畆而稅也何譏乎始履畆而稅古者什一而藉古者曷為什一而藉什一者天下之中正也多乎什一大桀小桀寡乎什一大貉小貉什一者天下之中正也什一行而頌聲作矣穀梁傳曰初者始也古者什一藉而不税初稅畆非正也古者三百歩為里名曰井田井田九百畆公田居一私田稼不善則非吏公田稼不善則非力初税畆者非公之去公田而履畆十取一也以公之與民為已悉矣古者公田為居井竈葱韭盡取焉詩序曰碩鼠刺重斂也國人刺其君重斂蠶食於民不修其政貪而畏人若大鼠也衞靈公當隆冬興衆穿池宛春諫曰天寒百姓凍餒願公之罷役也公曰天寒哉我何不寒哉雜事篇曰衞靈公以天寒鑿池宛春諌曰天寒起役恐傷民公曰天寒乎宛春曰君衣狐裘坐熊席隩虞有竈是以不寒今民衣弊不補履决不苴君則不寒民誠寒矣公曰善令罷役左右諫曰君鑿池不知天寒以宛春知而罷役是徳歸宛春怨歸於君公曰不然宛春魯國之匹夫吾舉之民未有見馬今將令民以此見之且春也有善寡人有春之善非寡人之善與靈公論宛春可謂知君之道矣王褒曰服絺綌之凉者不苦盛夏之鬱燠襲貂狐之煗者不憂至寒之悽愴人之言曰安者不能恤危飽者不能食饑故餘梁肉者難為言隱約處佚樂者難為言勤苦夫音扶髙堂邃音遂宇廣厦洞房者不知專屋狹廬上漏下濕者之廇音溜也繋馬百駟貨財充内儲陳納新者不知有旦無暮稱貸者之急廣第唐園良田連比者不知無運踵之業竄頭宅者之役也原馬被山牛羊滿谷者不知無孤豚瘠音脊犢音讀者之窶也髙枕談卧無呌號者不知憂私責音債與吏正戚者之愁也被紈躡韋摶梁囓肥者不知短褐之寒糠􅹞之苦也從容房闈之間垂拱持案食者不知蹠音卒耒躬耕者之勤也乗堅驅良列騎成行音杭者不知負擔歩行者之難也同床旃音氊席侍御滿側者不知負輅輓舩音船登髙絶流者之難也衣去聲輕暖被音披英裘處溫室戴安車者不知乗邊城飄胡代鄉音向清風者之危寒也妻子好合子孫保之不知老母之顦音憔顇音悴匹婦之悲恨也耳聽五音目視弄優者不知䝉流矢距敵方外之死者也東嚮伏几振筆如文調者不知求索之急箠推上聲楚之痛者也坐旃音氊茵之上按圖籍之言若易易然亦不知步涉者之難也昔商鞅之任秦也刑人若刈菅音間芳用師若彈丸從軍旅者暴骨長城戍音絮漕者輦車相望生而往死而還音旋彼獨非人子耶公孫鞅曰以戰去戰雖戰可也以殺去殺雖殺可也故君子仁以恕義以度音鐸所好去聲惡音汚與天下共之所不施不仁者公劉好貨居者有積行者有嚢大王好色内無怨女外無曠夫文王作刑國無怨獄武王行師士樂為之死民樂為之用若斯則民何苦而怨何求而譏公卿愀音秋然寂若無人於是遂罷議止詞奏曰賢良文學不明縣官事猥音委以鹽鐵而為不便請且罷郡國𣙜音角酤關内鐵官奏可賢良曰文學既拜咸取列大夫辭丞相去聲御史擊之第四十二大夫曰前議公事賢良文學稱引往古頗乖世務論者不必相反期於可行往者縣官未事胡越之時邊城四面受敵北邊尤被其苦先帝絶三方之難去聲撫從方國以為蕃蔽窮極郡國以討匈奴匈奴壤界獸圏孤弱無與此困亡之時也遼逺不遂使得復喘息休養士馬負紿音怠西域西域迫近胡㓂沮心内解必為巨患是以主上欲掃除煩倉廩之費也終日逐禽罷而釋之則非計也蓋舜紹緒禹成功今欲以小舉擊之何如文學曰異時縣官修輕賦公用饒人富給其後保胡越通四夷費用不足於是興利害算車船以訾音紫助邊漢武紀曰元光六年冬初算商車李竒曰始稅商賈車船令出算也贖罪吿緡音民與人以患矣甲士死於軍旅中士罷音疲於轉漕仍之以科適吏徵發極矣漢武紀曰天漢四年春正月朝諸侯王于甘泉宮發天下七科讁及勇敢士張晏曰吏有罪一亡命二贅壻三賈人四故有市籍五父母有市籍六大父母有市籍七凡七科也夫音扶勞而息之極而反本古之道也雖舜禹興不能易也蔡邕曰書戒猾夏易伐鬼方周有獫狁蠻荆之師漢有闐顔瀚海之事征討殊類所由尚矣然而時有同異勢有可否故謀有得失事有成敗不可齊也武帝情存逺畧志闢四方南誅百越北討强胡西伐大宛東并朝鮮因文景之蓄藉天下之饒數十年間官民俱匱乃具鹽鐵酒𣙜之利設告緡重稅之令民不堪命起為盗賊關東紛擾道路不通繡衣直指之使奮鈇鉞而並出既而覺悟乃息兵罷役封丞相為富民侯故主父偃曰夫務戰勝窮武事未}
