  - {type: variant, offset: 1673, length: 283, content: 也然匈奴久未服者群臣不并力上下未諧故也文學曰古之用師非貪壤土之利救民之患也民思之者若旱之望雨簞食壺漿以逆王師故憂人之患者民一心而歸之湯武是也不愛民之死力盡而潰叛者秦王是也孟子曰君不鄉道不由仁義而為之強戰雖克必亡此中國所以擾亂非蒙恬死而諸侯叛秦昔周室之盛也越裳氏來獻百蠻致貢其後周衰諸侯力征蠻貊分散各有聚黨莫能相一是以燕趙能得意焉其後匈奴稍強蠶食諸侯故破走月氏因兵威徙小國引弓之民并為一家一意同力故難制也前君為先帝畫匈奴之策兵據西域奪之便勢之地以候其變以漢之強攻於匈奴之眾若以強弩潰癰疽越之禽吳豈足道哉上以為然用君之義聽君之計雖越王之任種蠡不過以搜粟都尉為御史大夫持政, WYG: ''}
