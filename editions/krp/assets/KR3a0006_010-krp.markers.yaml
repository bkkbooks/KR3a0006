  - {type: variant, offset: 9304, length: 443, content: 衞鞅傳曰孝公二十二年使衞鞅將而伐魏魏使公子卬將而擊之軍既相距衞鞅遺魏將公子卬書曰吾始與公子驩今俱為兩國將不忍相攻可與公子曲相見盟樂飲而罷兵以安秦魏魏公子卬以為然㑹盟已飲而衞鞅伏甲士而襲虜魏公子卬因攻其軍盡破之以歸秦魏惠王兵數破於齊秦國内空日以削恐乃使使割西河之地獻於秦以和而魏遂去安邑徙都大梁孫臏傳曰宣王二年魏與趙攻韓韓告急於齊齊使田忌將而往直走大梁魏將龎涓聞之去韓而歸齊軍既已過而西矣孫子謂田忌曰彼三晋之兵素悍勇而輕齊齊號為怯善戰者因其勢而利導之兵法百里而趨利者蹶上將三十里而趨利者軍半至使齊軍入魏地為十萬竈明日為五萬竈龎涓行三日大喜曰我固知齊軍怯入吾地三日士卒亡者過半矣乃棄其歩軍與其輕銳倍日并行逐之孫子度其行暮當至馬陵馬陵道狹而旁多阻隘可伏兵乃斫大樹白而書之曰龎涓死於此樹之下於是令齊軍善射者萬弩夾道而伏期日暮見火舉而俱發龎涓果夜至斫木下見白書乃鑚火燭之讀其書未畢齊軍萬弩俱發魏軍大亂相失龎涓自知智窮兵敗乃自剄曰遂成豎子之名齊因乗勝盡破其軍虜魏太子申以歸孫臏以此名顯天下世傳其兵法, SBCK: ''}
