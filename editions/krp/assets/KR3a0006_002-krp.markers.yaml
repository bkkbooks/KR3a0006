  - {type: variant, offset: 10186, length: 235, content: 要畧曰晩世之時六國諸侯谿異谷别水絕山隔各自治其境内守其分地握其權柄擅其政令下無方伯上無天子力征争權勝者為右恃連與國約重致剖信符結逺援以守其國家持其社稷故縱横修短生焉韓嬰曰君子行不貴苟難説不貴苟察名不貴苟傳惟其當之為貴夫負石而赴河行之難為者也而申屠狄能之君子不貴者非禮義之中也山淵平天地比齊楚襲入乎耳出乎口鈎有鬚卵有毛此説之難持者也而鄧析惠施能之君子不貴者非禮義之中也盗蹠吟口名聲若日月與舜禹俱傳而不息君子不貴者非禮義之中也故君子行不貴苟難説不貴苟察名不貴苟傳惟其當之為貴, SBCK: ''}
