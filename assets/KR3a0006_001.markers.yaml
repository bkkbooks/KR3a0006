  - {type: variant, offset: 501, length: 0, content: '', WYG: 祭公謀父曰先王耀徳不觀兵是故周文公之頌曰載戢干戈載櫜弓矢我求懿徳肆于時夏允王保之先王之於民也茂正其徳而厚其性阜其財而利其器用明利害之鄉以文修之使之務利而辟害懷徳而畏威故能保世以滋大兵畧訓曰湯之七十里而王者修徳也智伯有千里之地而亡者窮武也故千里之國行文徳者王萬乗之國好用兵者亡}
