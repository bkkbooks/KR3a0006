  - {type: variant, offset: 981, length: 0, content: '', WYG: 雜事篇曰荆人卞和得玉璞而獻之荆厲王使玉尹相之曰石也王以和為謾而斷其左足厲王薨武王即位和復奉玉璞而獻之武王武王使玉尹相之曰石也又以為謾而㫁其右足武王薨共王即位和乃奉玉璞而哭扵荆山中三日三夜泣盡而繼之以血共王聞之使人問之曰天下刑之者衆矣子獨何哭之悲也對曰寳玉而名之曰石貞士而戮之以謾此臣之所以悲也共王曰惜矣吾先王之聴難剖石而易斬人之足}
