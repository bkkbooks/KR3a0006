  - {type: variant, offset: 4480, length: 1, content: 毉, WYG: 而匕首見因左手把秦王之袖而右手持匕首揕之未至身秦王驚自引而起袖絶環柱而走羣臣驚焉乃以手共摶之是時侍醫夏無且以其所奉藥囊提荆軻秦王方環柱走卒惶急不知所為左右乃曰王負劒王負劒遂㧞以撃荆軻斷其左股荆軻廢乃引其匕首以提秦王不中中柱秦王復擊軻軻被八創軻自知事不就倚柱而笑箕踞以罵曰事所以不成者乃}
