  - {type: variant, offset: 9724, length: 345, content: 臣術篇曰秦穆公使賈人載鹽徵諸賈人賈人買百里奚以五羖羊之皮使將車之秦秦穆公觀鹽見百里奚牛肥曰任重道逺以險而牛何以肥也對曰臣飲食以時使之不以暴有險先後之以身是以肥也穆公知其君子也令有司具沐浴焉衣冠與坐公大悦異日與公孫支論政公孫支大不寧曰君耳目聰明思慮審察君其得聖人乎公曰然吾悦夫奚之言彼類聖人公孫支遂歸取鴈以賀曰君得社稷之聖臣敢賀社稷之福公不辭再拜而受明日公孫支乃致上卿以讓百里奚曰秦國處僻民陋以愚無知危亡之本也臣自知不足以處其上請以讓之公不許公孫支曰君不用賔相而得社稷之聖臣君之禄也臣見賢而讓之臣之禄也今君既得其禄矣而使臣失禄可乎請終致之公不許公孫支曰臣不肖而處上位是君失倫也不肖失倫臣之過進賢而退不肖君之明也今臣處位廢君之徳而逆臣之行也臣將逃公乃受之故百里奚為上卿以制之公孫支為次卿以佐之也, SBCK: ''}
