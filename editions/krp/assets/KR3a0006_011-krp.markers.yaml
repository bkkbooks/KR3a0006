  - {type: variant, offset: 8977, length: 192, content: 孔子曰治國有二機刑徳是也徳者養善而進闕者也刑者懲惡而禁後者也夫刑徳者化之所由興也王者尚其徳而希其刑霸者刑徳並凑強國先其刑而後徳淮南記曰急轡利錣非千里之御也嚴刑峻法非百王之治也政理篇曰政有三品王者之政化之霸者之政威之彊者之政脅之夫此三者各有所施而化之為貴矣夫化之不變而後威之威之不變而後脅之脅之不變而後刑之夫至於刑者則非王者之所得已也是以聖王先徳教而後刑罰則莫不慕義理之榮而惡貪亂之耻矣, SBCK: ''}
