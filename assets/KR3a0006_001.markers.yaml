  - {type: variant, offset: 2291, length: 0, content: '', WYG: 河渠書曰漢武元光中河决瓠子後二十餘嵗嵗因以數不登而梁楚之地尤甚天子既封禪廵祭山川其明年旱乾封少雨天子乃使汲仁郭昌發卒數萬人塞瓠子决於是天子已用事萬里沙則還自臨决河況白馬玉璧于河令羣臣從官自將軍以下皆負薪致决河是時東流郡燒草以故薪柴少而下淇園之竹以為楗天子既臨河决悼功之不成乃作瓠子之歌於是卒塞瓠子築宫其上名曰宣房宫而導河北行二渠復禹舊跡而梁楚之地復寕無水災}
