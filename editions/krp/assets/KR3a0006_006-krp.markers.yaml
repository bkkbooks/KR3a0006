  - {type: variant, offset: 10, length: 0, content: '', SBCK: 先王之術而資質足以履行其道故居則爲人師用則爲世法今文學言治則稱尭舜道行則言孔墨授之政則不逹懷古道而不能行言􅀡而行之枉道是而情非衣冠有以殊於鄉曲而實無以異於凢人諸生所謂中􅀡者遭時蒙率備數適然耳殆非明舉所謂固未可與論治也文學曰天設三光以照記天子立公卿以明治故曰公卿者四海之表儀神化之丹靑也上有輔明主之任下有遂聖化之事和隂陽調四時安衆庻育群生使百姓輯睦無怨思之色四夷順德無叛逆之憂此公卿之職而賢者之所務也􅀂伊尹周召三公之才太顛閎夭九卿之人文學不中聖主之明舉今之執政亦未能稱盛德也大夫不說作色不應也文學曰朝無忠臣者政闇大夫無􅀡士者位危任座正言君之過文侯改言行稱爲賢君袁盎靣刺絳侯之驕矜卒得其慶故觸死亡以干主之過者忠臣也犯嚴顔以匡公卿之失者􅀡士也鄙人不能巷言靣違方今人主榖之敎令}
