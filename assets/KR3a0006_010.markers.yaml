  - {type: variant, offset: 1250, length: 615, content: 列國待孔子而後學則世無儒墨夫衣小缺㡜裂可以補而必待全匹而易之政小缺法令可以防而必待雅頌乃治之是猶舍鄰之醫而求俞跗而後治病廢汙池之水待江海而後救火也迂而不徑闕而無務是以教令不從而治煩亂夫善為政者弊則補之決則塞之故吳子以法治楚魏申商以法彊秦韓也文學曰有國者選眾而任賢學者博覽而就善何必是周公孔子故曰法之而已今商鞅反聖人之道變亂秦俗其後政耗亂而不能治流失而不可復愚人縱火於沛澤不能復振蜂蠆螫人放死不能息其毒也煩而止之躁而靜之上下勞擾而亂益滋故聖人教化上與日月俱照下與天地同流豈曰小補之哉御史曰衣缺不補則日以甚防漏不塞則日以滋大河之始決於瓠子也涓涓爾及其卒氾濫為中國害菑梁楚破曹衛城郭壞沮蓄積漂流百姓木棲千里無廬令孤寡無所依老弱無所歸故先帝閔悼其菑親省河堤舉禹之功河流以復曹衛以寧百姓戴其功詠其德歌宣房塞萬福來焉亦猶是也如何勿小補哉文學曰河決若甕口而破千里況禮決乎其所害亦多矣今斷獄歲以萬計犯法滋多其為菑豈特曹衛哉夫知塞宣房而福來不知塞亂原而天下治也周國用之刑錯不用黎民若四時各終其序而天下不孤頌曰綏我眉壽介以繁祉此夫為福亦不小矣誠信禮義如宣房功業已立垂拱無為有司何補法令何塞也御史曰犀銚利鉏五穀之利而間草之害也明理正法姦邪之所惡而良民之福也故曲木惡直繩姦邪惡正法是以聖人審於是非察於治亂故設明法陳嚴刑防非矯邪若隱括輔檠之正𠇗剌也故水者火之備法者止姦之禁也無法勢雖賢人不能以為治無甲兵雖孫吳不能以制敵是以孔子倡以仁義而民從風伯夷遁首陽而民, WYG: ''}
