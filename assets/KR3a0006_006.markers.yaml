  - {type: variant, offset: 190, length: 3, content: 願聞散, WYG: 說西施之美無益於容道堯舜之徳無益於治寰宇紀曰西施施其姓也㑹稽諸暨縣有東施家西施家越王於苧蘿山得採薪之女西施飾以羅縠教以行步習於土城臨於都巷三年學服而獻吴王吴得西施為築姑蘓臺說山訓曰畫西施之面美而}
