  - {type: variant, offset: 942, length: 42, content: 男君秦既并天下東絕沛水并滅朝鮮南取陸梁北卻胡狄西略氐羗立帝號朝四夷舟車所通足跡所及靡, WYG: 曰無豐年旁入之利而獨以完給者非力則儉也無饑饉疾疚禍罪之殃獨以貧窮者非侈則惰也侈而惰者貧而力而儉者富今徴斂于富人以布施於貧家是奪力儉而與侈惰也而欲民之力作而節用}
