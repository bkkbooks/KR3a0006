  - {type: variant, offset: 273, length: 0, content: '', WYG: 吕氏春秋曰冬與夏不能兩刑草與稼不能兩成新榖熟而陳穀虧果實繁者木必痺天之數也叢談曰天地之道極則反滿則損五采曜眼有時而渝茂木豐草有時而落物有盛衰安得自若意不並鋭事不兩隆盛於彼者必衰於此長於左者必短於右憙夜卧者不能蚤起也}
