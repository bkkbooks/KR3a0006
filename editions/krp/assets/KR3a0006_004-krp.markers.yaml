  - {type: variant, offset: 9487, length: 356, content: 王逸曰太公避紂居東海之濱聞文王作興盍往歸之至朝歌益窮困自鼓刀而屠遂西釣於渭濱文王夢得聖人於是出獵而見之遂載以歸用以為師言吾先公望子乆矣因號為太公望或言周文王夢立令狐之津太公在後帝曰昌賜汝名師文王再拜太公夢亦如此文王出田見識所夢載與俱歸以為太公也雜事篇曰寗戚欲干齊桓公窮困無以自進於是為商旅賃車以適齊暮宿於郭門之外桓公郊迎客夜開門辟賃車者執火甚盛從者甚衆寗戚飯牛於車下望桓公而悲擊牛角疾商歌桓公聞之撫其僕之手曰異哉此歌者非常人也命後車載之桓公反至從者以請桓公曰賜之衣冠将見之寗戚見說桓公以合境内明日復見說桓公以為天下桓公大說將任之羣臣爭之曰客衛人去齊五百里不逺不若使人問之固賢人也任之未晚也桓公曰不然問之恐其有小悪忘人之大美此人主所以失天下之士也且人固難全權用其長者遂舉大用之而授之以為卿當此舉也桓公得之矣所以覇也, SBCK: ''}
