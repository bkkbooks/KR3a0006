body:
  text: 申韓第五十六御史曰待周公而爲相則世無列國待孔子而後學則世無儒墨夫衣小缺襟裂可以􅀘而必待全匹而易之政小缺法令可以防而必待雅頌乃治之是猶舎鄰之醫而求俞跗而後治病廢汙池之水待江海而後救火也迂而不徑􅆣而無務是以敎令不從而治煩亂夫善爲政者弊則􅀘之決則塞之故吳子以法治楚魏申商以法彊秦韓也文學曰有國者選衆而任賢學者􅀶覽而就善何必是周公孔子故曰法之而巳今商鞅吳起反聖人之道變亂秦俗其後政耗亂而不能理流失而不可復愚人縱火於沛澤不能復振􅉕蠆螫人放死不能息其毒也煩而止之躁而靜之上下勞擾而亂益滋故聖人敎化上與日月俱照下與天地同流豈曰小􅀘之哉御史曰衣缺不􅀘則日以甚防漏不塞則日以滋大河之始決於􅉚子也涓涓爾及其卒汜濫爲中國害菑梁楚破曹衞城郭壞沮稸積漂流百姓木棲千里無廬令􅀌寡無所依老弱無所歸故先帝閔悼其菑親省河堤舉禹之功河流以復曹衞以寜百姓戴其功詠其德歌宣房塞萬福來焉亦猶是也如何勿小􅀘哉文學曰河決􅀂甕口而破千里况禮決乎其所害亦多矣今斷獄歳以萬計犯法滋多其爲菑豈特曹衞哉夫知塞宣房而福來不知塞亂原而天下治也周國用之刑錯不用􅀺民􅀂四時各終其序而天下不􅀌頌曰綏我眉壽介以繁祉此天爲福亦不小矣誠信禮義如宣房功業巳立垂拱無爲有司何􅀘法令何塞也御史曰犀銚利鉏五榖之利而間草之害也明理正法姦邪之所惡而良民之福也故曲木惡􅀡䋲姦邪惡正法是以聖人審於是非察於治亂故設明法陳嚴刑防非矯邪􅀂􅀮括輔檠之正弧刺也故水者火之備法者止姦之禁也無法勢雖賢人不能以爲治無甲兵雖孫吳不能以制敵是以孔子倡以仁義而民從風伯夷遁首陽而民不可化文學曰法能刑人而不能使人廉能殺人而不能使人仁所貴良醫者貴其審消息而退邪氣也非貴其下鍼石而鑚肌膚也所貴良吏者貴其絕惡於未萌使之不爲非非貴其拘之囹圄而刑殺之也今之所謂良吏者文察則以禍其民强力則以厲其下不本法之所由生而專巳之殘心文誅假法以䧟不辜累無罪以子及父以弟及兄一人有罪州里驚駭十家奔亡􅀂癰疽之相濘色淫之相連一節動而百枝搖詩云舍彼有罪既伏其辜􅀂此無罪淪骨以輔痛傷無罪而累也非患銚耨之不利患其舍草而去苗也非患無凖平患其舎枉而䋲直也故親近爲過不必誅是鋤不用也䟽遠有功不必賞是苗不養也故世不患無法而患無必行之法也周秦第五十七御史曰春秋罪人無名號謂之云盜所以賤刑人而絕之人倫也故君不臣士不友於閭里無所容故民始犯之命不軌之民犯公法以相寵舉棄其親不能伏節死理遁逃相連自䧟於罪其􅀍刑戮不亦宜乎一室之中父兄之際􅀂身體相屬一節動而知於心故今自􅀜内侯以下比地於伍居家相察出入相司父不教子兄不正弟舍是誰責乎文學曰古者周其禮而明其敎禮周教明不從者然後等之以刑刑罰中民不怨故舜施四罪而天下咸服誅不仁也輕重各服其誅刑必加而無赦赦惟疑者若此則世安得不􅁤之人而罪之今殺人者生剽攻􅀼盗者富故良民内解怠輟耕而隕心古者君子不近刑人刑人非人也身放殛而辱後世故無賢不肖莫不耻也今無行之人貪利以䧟其身蒙戮辱而捐禮義􅁪於苟生何者一日下􅁞室創未瘳宿衛人主出入宮殿得由受奉禄食太官享賜身以尊榮妻子􅀗其饒故或載卿相之列就刀鋸而不見閔况衆庻乎夫何耻之有廢其徳教而責之以禮義是虐民也春秋曰子有罪執其父臣有罪執其君聽失之大者也今以子誅父以弟誅兄親戚小坐什伍相連􅀂引根本之及華葉傷小􅃌之累四體也如此則以有罪誅及無罪無罪者寡矣􅆇文仲治魯勝其盜而自矜子貢曰民將欺而况民盜乎故吏不以多斷爲良毉不以多刺爲工子産刑二人殺一人道不拾遺而民無誣心故爲民父母以養疾子長恩厚而巳自首匿相坐之法立骨􅁏之恩廢而刑罪多聞父母之於子雖有罪猶匿之豈不欲服罪爾子爲父􅀮父爲子􅀮未聞父子之相坐也聞兄弟緩追以免賊未聞兄弟之相坐也聞惡惡止其人疾始而誅首惡未聞什伍之相坐老子曰上無欲而民樸上無事而民自富君君臣臣父父子子比地何伍而執政何責也御史曰夫􅀒千鈞之重以登無極之高垂峻崖之峭谷下臨不測之淵雖有慶忌之徤賁育之勇莫不震慴悼慄者知墜則身首肝腦塗山石也故未嘗灼而不敢握火者見其有灼也未嘗傷而不敢握刃者見其有傷也彼以知爲非罪之必加而戮及父兄必懼而爲善故立法制辟􅀂臨百仞之壑握火䧟刃則民畏忌而無敢犯禁矣慈毋有敗子小不􅃘也嚴家無悍虜篤責急也今不立嚴家之所以制下而修慈母之所以敗子則惑矣文學曰紂爲炮烙之刑而秦有收帑之法趙高以峻文決罪於内百官以峭法斷割於外死者相枕席刑者相望百姓側目重足不寒而慄詩云謂天盖髙不敢不局謂地盖厚不敢不􅐲哀今之人胡爲虺蜥方此之時豈特冒火蹈刃哉然父子相背兄弟相慢至於骨肉相殘上下相殺非刑輕而罰不必令大嚴而仁恩不施故政寛則下親上政嚴則民謀主晉厲以幽二世見殺惡在峻法之不犯嚴家之無悍虜也聖人知之是以務知而不務威故高皇帝約秦苛法慰怨毒之民而長和睦之心唯恐刑之重而徳之薄也是以施恩無窮澤流後世商鞅吳起以秦楚之法爲輕而累之上危其主下没其身或非特慈母乎詔聖第五十八御史曰夏后氏不信言殷誓周盟德信彌衰無文武之人欲修其法此殷周之所以失􅀔而見奪於諸侯也故衣弊而革才法弊而更制高皇帝時天下初定􅀤德音行三章之令權也非撥亂反正之常也其後法稍犯不正於理故姦萌而甫刑作王道衰而詩刺彰諸侯􅁀而春秋譏夫少目之罔不可以得魚三章之法不可以爲治故令不得不加法不得不多唐虞􅀞衣冠非阿湯武刻肌膚非故時世不同輕重之務異也文學曰民之仰法猶魚之仰水水清則靜濁則擾擾則不安其居靜則樂其業樂其業則冨冨則仁生澹則爭止是以成康之世賞無所施法無所加非可刑而不刑民莫犯禁也非可賞而不賞民莫不仁也􅀂斯則吏何事而理今之治民者􅀂拙御馬行則頓之止則擊之身創於箠吻傷於銜求其無失何可得乎乾谿之役土崩梁氏内潰不能禁峻法不止故罷馬不畏鞭箠罷民不畏刑法雖曾而累之其亡益乎御史曰嚴􅘘三刃樓季難之山高干雲牧豎登之故峻則樓季三刃陵夷則牧豎易山巔夫鑠金在鑪莊蹻不顧錢刀在路匹婦掇之非匹婦貪而莊蹻廉也輕重之制異而利害之分明也故法令可仰而不可踰可臨而不可入詩云不敢􅁀虎不敢馮河爲其無益也魯好禮而有季孟之難燕噲好譲而有子之之亂禮譲不足禁邪而刑法可以止􅁀明君據法故能長制群下而乆守其國也文學曰古者明其仁義之誓使民不踰上乎刑之不教而殺是以虐也與其刑不可踰不􅀂義之不可踰也聞禮義行而刑罰中未聞刑罰行而孝悌興也高􅘘狹基不可立矣嚴法峻刑不可乆也二世信趙高之計渫篤責而任誅斷刑者半道死者日積殺民多者爲忠厲民悉者爲能百姓不勝其求黔首不勝其刑海内同憂而俱不􅂓生故過徃之事父不得於子無巳之求君不得於臣死不再生窮䑕齧貍匹夫奔萬乗舍人折􅃓陳勝吳廣是也當此之時天下期俱起方靣而攻秦聞不一期而社稷爲􅇕惡在其能制群下而乆守其國也御史黙然不對大夫曰瞽師不知白黒而善聞言儒者不知治世而善訾議夫善言天者合之人善言古者考之今令何爲施法何爲加湯武全肌骨而殷周治秦國用之法弊而犯二尺四寸之律古今一也或以治或以亂春秋原罪甫刑制獄今願聞治亂之本周秦所以然乎文學曰春夏生長聖人􅁚而爲令秋冬殺藏聖人則而爲法故令者敎也所以導民人法者刑罰也所以禁强􅁀也二者治亂之具存亡之効也在上所任湯武經禮義明好惡以道其民刑罪未有所加而民自行義殷周所以治也上無德敎下無法則任刑必誅劓鼻盈蔂斷足盈車舉河以西不足以受天下之徒終而以亡者秦王也非二尺四寸之律異所行反古而悖民心也大論第五十九大夫曰呻吟槁簡誦死人之語則有司不似文學文學知獄之在廷後而不知其事聞其事而不知其務夫治民者􅀂大匠之斵斧斤而行之中繩則止杜大夫王中尉之等繩之以法斷之以刑然後冦止姦禁故射者因􅀔治者因法虞夏以文殷周以武異時各有所施今欲以敦朴之時治抗弊之民是猶遷延而拯溺揖讓而救火也文學曰文王興而民好善幽厲興而民好􅁀非性之殊風俗使然也故商周之所以昌桀紂之所以亡也湯武非得伯夷之民以治桀紂非得蹠蹻之民以亂也故治亂不在於民孔子曰聽訟吾猶人也必也使無訟乎訟者難訟而聽之易夫不治其本而事其末古之所謂愚今之所謂智以箠楚正亂以刀筆正文古之所謂賊今之所謂賢也大夫曰俗非唐虞之時而世非許由之民而欲廢法以治是猶不用􅀮括斧斤欲撓曲直枉也故爲治者不待自善之民爲輪者不待自曲之木往者應少伯正之屬潰梁楚昆盧徐榖之徒亂齊趙山東􅀜内􅁀徒保人阻險當此之時不任斤斧折之以武而乃始設禮􅁱文有似窮毉欲以短鍼而攻疽孔丘以禮說跖也文學曰殘材木以成室屋者非良匠也殘賤民人而欲治者非良吏也故公輸子因木之冝聖人不費民之性是以斧斤簡用刑罰不任政立而化成扁鵲攻於腠理絶邪氣故癰疽不得成形聖人從事於未然故亂原無由生是以砭石藏而不施法令設而不用斷巳然鑿巳發者凢人也治未形覩未萌者君子也大夫曰文學所稱聖知者孔子也治魯不遂見逐於齊不用於衛遇圍於匡困於陳蔡夫知時不用猶說强也知困而不能巳貪也不知見欺而徃愚也困辱不能死耻也􅀂此四者庸民之所不爲也何况君子乎商君以景􅁥見應侯以王稽進故士因士女因媒至其親顯非媒士之力孔子曰進見而不以能往者非賢士才女也文學曰孔子生於亂世思尭舜之道東西南北灼頭濡足庻幾世主之悟悠悠者皆是君闇大夫妬孰合有媒是以嫫母飾姿而夸矜西子彷徨而無家非不知窮厄而不見用悼痛天下之禍猶慈毋之伏死子也知其不可如何然惡已故適齊景公欺之適衛靈公圍陽虎謗之桓魋害之夫欺害聖人者愚惑也傷毀聖人者狂狡也惑之人非人也夫何耻之有孟子曰觀近臣者以所爲主觀逺臣者以其所主使聖人僞容苟合不論行擇友則何以爲孔子也大夫憮然内慙四據而不言當此之時順風承意之士如編口張而不歙舉舌而不下闇然而懷重􅀒而見責大夫曰諾膠車􅁱逢雨請與諸生解雜論第六十客曰余覩鹽鐡之義觀乎公卿文學賢良之論意􅃌殊路各有所出或上仁義或務權利異哉吾所聞周秦粲然皆有天下而􅀯靣焉然安危長乆殊世始汝􅀯朱子伯爲予言當此之時豪俊並進四方輻輳賢良茂陵唐生文學魯萬生之倫六十餘人咸聚闕庭舒六藝之諷論太平之原智者賛其慮仁者明其施勇者見其斷辯者陳其詞誾誾焉侃侃焉雖未能詳備斯可略觀矣然蔽於雲霧終廢而不行悲夫公卿知任武可以辟地而不知德廣可以附逺知權利可以廣用而不知稼穯可以富國也近者親附遠者說德則何爲而不成何求而不得不出於斯路而附畜利長威豈不謬哉中山劉子雍言王道矯當世復諸正務在乎反本直而不徼切而不斌斌然斯可謂弘􅀶君子矣九江祝生􅁬由路之意推史魚之節發憤懣刺譏公卿介然直而不撓可謂不畏强禦矣桑大夫據當世合時變推道術尚權利辟略小辯雖非正法然巨儒宿學惡然大能自解可謂􅀶物通士矣然攝卿相之位不引凖䋲以道化下放於利末不師始古易曰焚如棄如處非其位行非其道果隕其姓以及厥宗車丞相即周魯之列當軸處中括􅌩不言容身而去彼哉彼哉􅀂夫群丞相御史不能正議以輔宰相成同􅀋長同行阿意苟合以說其上斗筲之人道䛕之徒何足筭哉鹽鐡論卷第十終
