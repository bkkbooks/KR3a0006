  - {type: variant, offset: 141, length: 2, content: 胥遺, WYG: 為魯司㓂攝行相事七日而誅亂政大夫少正卯戮之於两觀之下崔豹古今注曰古者帝居毎門樹两觀于前所以標表宫門登之可以徧觀故謂之觀懸法象處也}
