  - {type: variant, offset: 6828, length: 311, content: 刑法志曰春秋之後滅弱吞小並為戰國稍增講武之禮以為戯樂用相夸視而秦更名角抵先王之禮沒於滛樂中矣應劭曰角者角技也抵者相抵觸也文頴曰抵當也名此樂為角抵者兩兩相當角力角技藝御射故名角抵盖雜技樂也巴俞戲魚龍蔓延之屬也顔師古曰炫耀之物眩人也眩相詐惑也讀與幻同其術本從西域來即今吞刀吐火植𤓰種樹屠人戮馬之術皆是也漢紀曰元封三年春作角抵戲以享外國朝獻者三百餘里内人皆觀張騫傳曰是時上方數廵狩海上廼悉從外國客大都多人過之則散財帛賞賜厚具饒給之以覽視漢富厚焉大角抵出竒戯諸恠物多聚觀者行賞賜酒池肉林令外國客徧觀名倉庫府藏之積欲以見漢廣大傾駭之及加其眩者之工而角抵竒戯嵗增變其益興自此始而外國使更來更去大宛以西皆自恃逺尚驕恣未可詘以禮羈縻而使也, SBCK: ''}
