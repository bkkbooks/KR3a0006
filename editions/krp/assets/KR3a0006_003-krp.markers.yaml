  - {type: variant, offset: 11371, length: 820, content: 詩傳曰孟子說齊宣王而不說淳于髠侍孟子曰今日說公之君公之君不說意者其未知善之為善乎淳于髠曰夫子亦誠無善耳昔者瓠巴鼓瑟而潜魚出聼伯牙鼓琴而六馬仰秣魚馬猶知善之為善而况君人者也孟子曰夫震雷之起也破竹折木震驚天下而不能使聾者卒有聞日月之明徧照天下而不能使盲者卒有見今公之君若此也淳于髠曰不然昔者揖封生髙商齊人好歌杞梁之妻悲哭而人稱詠夫聲無細而不聞行無隠而不形夫子苟賢居魯而魯國之削何也孟子曰不用賢削何有也吞舟之魚不居潜澤度量之士不居汙世夫蓺冬至必彫吾亦時矣詩曰不自我先不自我後非遭凋世者歟尊賢篇曰齊宣王坐淳于髠侍宣王曰先生論寡人何好淳于髠曰古者所好四而王所好三焉宣王曰古者所好何與寡人所好淳于髠曰古者好馬王亦好馬古者好味王亦好味古者好色王亦好色古者好士王獨不好士宣王曰國無士耳有則寡人亦說之矣淳于髠曰古者驊騮騏驥今無有王選於衆王好馬矣古者有豹象之胎今無有王選於衆王好味矣古者有毛嬙西施今無有王選於衆王好色矣王必將待堯舜禹湯之士而後好之則堯舜禹湯之士亦不好王矣宣王嘿然無以應齊䇿曰先生王斗造門而欲見齊宣王宣王使謁者延入王斗曰斗趨見王為好勢王趨見斗為好士於王何如使者復還報王曰先生徐之寡人請從宣王因趨而迎之於門與入曰寡人奉先君之宗廟守社稷聞先生直言正諌不諱王斗對曰王聞之過斗生於亂世事亂君焉敢直言正諫宣王忿然作色不說有間王斗曰昔先君桓公所好者五九合諸侯一匡天下天子授籍立為太伯今王有四焉宣王說曰寡人愚陋守齊國唯恐夫抎之焉能有四焉王斗曰先君好馬王亦好馬先君好狗王亦好狗先君好酒王亦好酒先君好色王亦好色先君好士而王不好士宣王曰當今之世無士寡人何好王斗曰世無騏驥騄駬王之駟已備矣世無東郭俊盧氏之狗王之走狗已具矣世無毛嬙西施王宫已充矣王亦不好士也何患無士王曰寡人憂國愛民固願得士以治之王斗曰君之憂國愛民不若王愛尺穀也王曰何謂也王斗曰王使人為冠不使左右便辟而使工者何也為能之也今王治齊非左右便辟無使也臣故曰不如愛尺糓也宣王謝曰寡人有罪國家於是舉士五人任官齊國大治, SBCK: ''}
