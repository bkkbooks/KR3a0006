  - {type: variant, offset: 25, length: 0, content: '', WYG: 憂勞萬人思念北邉之未安故使使去聲者舉賢良文學髙第詳延有道之士將欲觀殊議異冊虚心傾耳以聽庶幾云得諸生無能出竒計逺圖匃奴安邊境之冊通作䇿明枯竹守空言不知趨舍之宜時世之變議論無所依如膝癢而搔背辯訟公門之下訩訩音凶不可勝音升聽訩訩衆言}
