  - {type: variant, offset: 2380, length: 517, content: 姓冰釋而懈怠何者己為之而彼取之僣侈相效上升而不息此百姓所以滋偽而罕歸本也大夫曰官尊者祿厚本美者枝茂故文王德而子孫封周公相而伯禽富水廣者魚大父尊者子貴傳曰河海潤千里盛德及四海況之妻子乎故夫貴於朝妻貴於室富曰苟美古之道也孟子曰王子與人同而如彼者居使然也居編戶之列而望卿相之子孫是以跛夫之欲及樓季也無錢而欲千金之寶不亦虛望哉文學曰禹稷自布衣思天下有不得其所者若己推而納之溝中故起而佐堯平治水土教民稼穡其自任天下如此其重也豈云食祿以養妻子而已乎夫食萬人之力者蒙其憂任其勞一人失職一官不治皆公卿之累也故君子之仕行其義非樂其勢也受祿以潤賢非私其利見賢不隱食祿不專此公叔之所以為文魏成子所以為賢也故文王德成而後封子孫天下不以為黨周公功成而後受封天下不以為貪今則不然親戚相推朋黨相舉父尊於位子溢於內夫貴於朝妻謁行於外無周公之德而有其富無管仲之功而有其侈故編戶跛夫而望疾步也刺復第十大夫為色矜而心不懌曰但居者不知負載之勞從旁議者與當局者異憂方今為天下腹居郡諸侯並臻中外未然心憧憧若涉大川遭風而未薄是以夙夜思念國家之用寢而忘寐饑而忘食計數不離於前萬事簡閱於心丞史器小不足與謀獨鬱大道思覩文學若俟周邵而望高子御史案事郡國察廉舉賢才歲不乏也今賢良文學臻者六十, WYG: ''}
