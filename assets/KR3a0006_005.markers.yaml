  - {type: variant, offset: 679, length: 0, content: '', krp: 莭士篇曰桀為酒池足以運舟糟丘足以望三里一鼓而牛飲者三千人闗龍逄進諫曰為人君身行禮義愛民節財}
  - {type: variant, offset: 680, length: 0, content: '', WYG: 國安而身夀也今君用財若無盡用人若恐不䏻死不革天禍必降而誅必至矣君其革之立而不去朝桀因囚拘之君子聞之曰末之命矣夫論語隂嬉䜟曰庾子之旦金版刻書出地庭中曰臣族虐王禽宋均曰謂殺龍逄之後庾子旦庭中有此版異也龍同姓稱族王虐殺我必見禽也論語曰微子去之箕子為之奴比干諫而死孔子曰殷有三仁焉}
