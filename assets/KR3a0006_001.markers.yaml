  - {type: variant, offset: 3011, length: 0, content: '', WYG: 轉棄也詮言訓曰為治之本務在於安民安民之本在於足用足用之本在於勿奪時勿奪時之本在於省事省事之本在於節欲節欲之本在於反性反性之本在於去載主術訓曰食者民之本也民者國之本也國者君之本也是故人君者上因天時下盡地財中用人力是以羣生遂長五穀蕃殖教民養育六畜以時種樹務修田疇滋殖桑麻肥墝高下各因其宜丘陵阪險不生五穀者以樹竹木春伐枯槁夏取果蓏秋畜䟽食冬伐薪以為民資是故生無乏用死無轉尸}
