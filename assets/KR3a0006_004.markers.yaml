  - {type: variant, offset: 1911, length: 2058, content: 大夫曰夫懷枉而言正自託於無欲而實不從此非士之情也昔李斯與包丘子俱事荀卿既而李斯入秦遂取三公據萬乘之權以制海內功侔伊望名巨太山而包丘子不免於甕牖高廬如潦歲之鼃口非不眾也然卒死於溝壑而已今內無以養外無以稱貧賤而好義雖言仁義亦不足貴者也文學曰方李斯之相秦也始皇任之人臣無二然而荀卿為之不食覩其罹不測之禍也包丘子飯麻蓬藜修道白屋之下樂其志安之於廣廈芻豢無赫赫之勢亦無戚戚之憂夫晉獻垂棘非不美也宮之奇見之而嘆知荀息之圖之也智伯富有三晉非不盛也然不知襄子之謀之也季孫之狐貉非不麗也而不知魯君之患之也故晉獻以寶馬釣虞虢襄子以城壞誘智伯故智伯身禽於趙而虞虢卒并於晉以其務得不顧其後貪土地而利寶馬也孔子曰人無遠慮必有近憂今之在位者見利不虞害貪得不顧恥以利易身以財易死無仁義之德而有富貴之祿若蹈坎穽食於懸門之下此李斯之所以伏五刑也南方有鳥名鵷鶵非竹實不食非醴泉不飲飛過太山太山之鴟俛啄腐鼠仰見鵷雛而嚇今公卿以其富貴笑儒者為之常行得無若太山鴟嚇鵷鶵乎大夫曰學者所以防固辭禮者所以文鄙行也故學以輔德禮以文質言思可道行思可樂惡言不出於口邪行不及於己動作應禮從容中道故禮以行之孫以出之是以終日言無口過終身行無冤尤今人主張官立朝以治民䟽爵分祿以褒賢而曰懸門腐鼠何辭之鄙背而悖於所聞也文學曰聖主設官以授任能者處之分祿以任賢能者受之義貴無高義取無多故舜受堯之天下太公不避周之三公苟非其人簞食豆羹猶為賴民也故德薄而位高力少而任重鮮不及矣夫泰山鴟啄腐鼠於窮澤幽谷之中非有害於人也今之有司盜主財而食之於刑法之旁不知機之是發又以嚇人其患惡得若泰山之鴟乎大夫曰司馬子言天下穰穰皆為利往趙女不擇醜好鄭嫗不擇遠近商人不媿恥辱戎士不愛死力士不在親事君不避其難皆為利祿也儒墨內貪外矜往來游說栖栖然亦未為得也故尊榮者士之願也富貴者士之期也方李斯在荀卿之門闒茸與之齊軫及其奮翼高舉龍昇驥騖過九軼二翱翔萬仞鴻鵠華騮且同侶況跛牂燕雀之屬乎席天下之權御宇內之眾後車百乘食祿萬鍾而拘儒布褐不完糟糠不飽非甘菽藿而卑廣廈亦不能得已雖欲嚇人其何已乎文學曰君子懷德小人懷土賢士徇名貪夫死利李斯貪其所欲致其所惡孫叔敖早見於未萌三去相而不悔非樂卑賤而惡重祿也慮患遠而避害謹也夫郊祭之牛養食朞年衣之文繡以入廟堂太宰執其鸞刀以啟其毛方此之時願任重而上峻坂不可得也商鞅困於彭池吳起之伏王尸願被布褐而處窮鄙之蒿廬不可得也李斯相秦席天下之勢志小萬乘及其囚於囹圄車裂於雲陽之市亦願負薪入東門行上蔡曲街徑不可得也蘇秦吳起以權勢自殺商鞅李斯以尊重自滅皆貪祿慕榮以沒其身從車百乘曾不足以載其禍也襃賢第十九大夫曰伯夷以廉饑尾生以信死由小器而虧大體匹夫匹婦之為諒也經於溝瀆而莫之知也何功名之有蘇秦張儀智足以強國勇足以威敵一怒而諸侯懼安居而天下息萬乘之主莫不屈體卑辭重幣請交此所謂天下名士也夫智不足與謀而權不能舉當世民斯為下也今舉亡而為有虛而為盈布衣穿履深念徐行若有遺亡非立功成名之士而亦未免於世俗也文學曰蘇秦以從顯於趙張儀以橫任於秦方此之時非不尊貴也然智士隨而憂之知夫不以道進者必不以道退不以義得者必不以義亡季孟之權三桓之富不可及也孔子為之曰微為人臣權均於君富侔於國者亡故其位彌高而罪彌重祿滋厚而罪滋多夫行者先全己而後求名仕者先辟害而後求祿故香餌非不美也龜龍聞而深藏鸞鳳見而高逝者知其害身也夫為烏鵲魚鱉食香餌而後狂飛奔走遜頭屈遰無益於死今有司盜秉國法進不顧罪卒然有急然後車馳人趨無益於死所盜不足償於臧獲妻子奔亡無處所身在深牢莫知恤視方此之時何暇得以笑乎大夫曰文學高行矯然若不可卷盛節潔言皦然若不可涅然戍卒陳勝釋輓輅首為叛逆自立張楚素非有回由處士之行宰相列臣之位也奮於大澤不過旬月而齊魯儒墨縉紳之徒肆其長衣長衣容衣也負孔氏之禮器詩書委質為臣孔甲為涉博士卒俱死陳為天下大笑深藏高逝者固若是也文學曰周室衰禮義壞不能統理天下諸侯交爭相滅亡并為六國兵革不休民不得寧息秦以虎狼之心蠶食諸侯并吞戰國以為郡縣伐能矜功自以為過堯舜而羞與之同棄仁義而尚刑罰以為今時不師於文而決於武趙高治獄於內蒙恬用兵於外百姓愁苦同心而患秦陳王赫然奮爪牙為天下首事道雖凶而儒墨或干之者以為無王久矣道擁遏不得行自孔子以至于茲而秦復重禁之故發憤於陳王也孔子曰如有用我者吾其為東周乎庶幾成湯文武之功為百姓除殘去賊豈貪祿樂位哉大夫曰文學言行雖有伯夷之廉不及柳下惠之貞不過高瞻下視潔言污行觴酒豆肉遷延相讓辭小取大雞廉狼吞趙綰王臧之等以儒術擢為上卿而有姦利殘忍之心主父偃以口舌取大官竊權重欺紿宗室受諸侯之賂卒皆誅死東方朔自稱辯略消堅釋石當世無雙然省其私行狂夫不忍為況無東方朔之口其餘無可觀者也文學曰志善者忘惡謹小者致大俎豆之間足以觀禮閨門之內足以論行夫服古之服誦古之道舍此而為非者鮮矣故君子時然後言義然後取不以道得之不居也滿而不溢泰而不驕故袁盎親於景帝秣馬不過一駟公孫弘即三公之位家不過十乘東方先生說聽言行於武帝而不驕溢主父見困厄之日久矣疾在位者不好道而富且貴莫知䘏士也於是取饒衍之餘以周窮士之急非為私家之業也當世囂囂非患儒之雞廉患在位者之虎飽鴟咽於求覽無所孑遺耳, SBCK: ''}
