  - {type: 'tls:seg', offset: 4318, content: '', id: KR3a0006_tls_010-31a.16}
  - {type: variant, offset: 4318, length: 0, content: '', WYG: 死猶封其墓况其生者乎王之於賢仁也亡者猶表其廬况其存者乎王之於財也聚者猶散之况其復藉者乎王之於色也在者猶歸其父母况復徵之乎貴徳篇曰武王克殷召太公而問曰將奈其士衆何太公對曰臣聞愛其人者兼屋上之烏憎其人者惡其餘胥咸劉厥敵使靡有餘何如王曰不可太公出邵公入王曰為之奈何邵公對曰有罪者殺之無罪者活之何如王曰不可邵公出周公入王曰為之奈何周公曰使各居其宅田其田無變舊新唯仁是親百姓有過在於一人武王曰廣大乎平天下矣凡所以貴士君子者以其仁而有徳也道應篇曰武王問太公曰寡人伐紂天下是臣殺其主而下伐其上也吾恐後世之用兵不休闘爭不已為之奈何太公曰甚善王之問也夫未得獸者唯恐其創之小也已得之惟恐傷肉之多也王若欲乆持之則塞民於兊道全為無用之事順擾之教彼皆樂其業供其事情昭昭而道冥冥於是乃去其瞀而載之木解其劒而帶之笏為三年之䘮令類不蕃髙辭卑讓使民不爭酒肉以通之竽瑟以娱之鬼神以畏之繁文滋禮以弇其質厚葬乆䘮以亶其家含珠鱗施綸組以貧其財深鑿髙壟以盡其力家貧族少慮患者寡以此移風可以持天下弗失故老子曰化而欲作吾將鎮之以無名之樸也秦以力取之以法守之本末不得故亡夫音扶文猶可長用而武難乆行也賈誼曰陳渉之位不尊於齊楚趙韓魏宋衞中山之君也鉏耰棘矜不銛於鉤㦸長鎩也謫戍之衆非抗九國之師也深謀逺慮行軍用兵之道非及曩時之士也然而成敗異變功業相反試使山東之國與陳渉度長絜大比權量力則不可同年而語矣然秦以區區之地致萬乗之權招八州而朝同列百有餘年矣然後以六合為家崤函為宫一夫作難而七廟墮身死人手為天下笑者何也仁義不施而攻守之勢異也又曰秦王懐貪鄙之心行自奮之智不信功臣不親士民廢王道而立私愛焚文書而酷刑法先詐力而後仁義以暴虐為天下始夫兼并者髙詐力安危者貴順權以此言之取予攻守不同術也秦雖離戰國而王天下其道不易其政不改是以其所以取之也孤獨而有之故其亡可立而待也班固曰古人有言天生五材民並用之廢一不可誰能去兵鞭朴不可弛於家刑罰不可廢於國征伐不可偃於天下用之有本末行之有逆順者耳孔子曰工欲善其事}
