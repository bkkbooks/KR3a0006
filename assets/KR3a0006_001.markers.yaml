  - {type: variant, offset: 2281, length: 0, content: '', WYG: 本經訓曰舜之時共工振滔鴻水以薄空桑龍門未開吕梁未發江淮通流四海溟涬民皆上丘陵赴樹木舜乃使禹䟽三江五湖開伊闕導瀍澗平通溝陸流注東海鴻水漏九州乾萬民皆寜其性千金書曰古龍門未開吕梁未發河出孟門大溢逆流名曰洪水禹乃决流䟽河為彭澧之漳所活者千八百國此禹之功也}
