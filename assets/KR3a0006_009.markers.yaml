  - {type: variant, offset: 726, length: 3, content: 守雲梯, WYG: 男君古本作周子南君漢武紀曰元鼎四年十一月甲子立后土祠于汾隂脽上禮畢行幸滎陽還至洛陽詔曰祭地兾州瞻望河洛廵省豫州觀於周室邈而無祀詢問耆老乃得孽子嘉其封嘉為周子南君以奉周祀顔師古曰子南其封邑}
