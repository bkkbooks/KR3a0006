  - {type: variant, offset: 1015, length: 257, content: 齊世家曰武王已平商而王天下封師尚父於齊營丘東就國萊侯來伐與之争營丘營丘邉萊萊人夷也㑹紂之亂而周初定未能集逺方是以與太公爭國太公至國修政因其俗簡其禮通商工之業便魚塩之利而人民多歸齊齊為大國桓公之時管仲為大夫修齊國政連五家之兵設輕重魚塩之利以贍貧窮禄賢能齊人皆説七年諸侯㑹桓公於甄而桓公於是始覇焉貨殖傳曰太公望封於營丘人民寡於是太公勸其女功極技巧通魚鹽則人物歸之繦至而輻凑故齊冠帯衣履天下海岱之間歛袵而往朝焉其後齊中衰管子修之設輕重九府則桓公以霸九合諸侯一匡天下而管子氏亦有三歸位在陪臣富於列國之君是以齊富強至於威宣也, SBCK: ''}
