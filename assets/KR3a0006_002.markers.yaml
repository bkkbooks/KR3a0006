  - {type: variant, offset: 5442, length: 232, content: 者難於言治道不同者不相與謀今公卿意有所倚故文學之言不可用也大夫曰吾聞為人臣者盡忠以順職為人子者致孝以承業君有非則臣覆蓋之父有非則子匿逃之故君薨臣不變君之政父沒則子不改父之道也春秋譏毀泉臺為其隳先祖之所為而揚君父之惡也今鹽鐵均輸所從來久矣而欲罷之得無害先帝之功而妨聖主之德乎有司倚於忠孝之路是道殊而不同於文學之謀也文學曰明者因時而變知者隨世而制孔子曰麻冕禮也今也純儉吾從眾故聖人上賢不離古順俗而不偏宜魯定公序昭穆順祖禰昭公廢卿士以省事節用不可謂變祖之所為而改父之道也, WYG: 卷}
