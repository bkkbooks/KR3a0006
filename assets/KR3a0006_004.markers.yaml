  - {type: variant, offset: 1705, length: 0, content: '', WYG: 詩傳曰原憲居魯環堵之室茨以生蒿蓬戸甕牖揉桑以為樞上漏下濕匡坐而弦歌子貢聞之乘肥馬衣輕裘中紺而表素軒車不容巷往見原憲原憲冠桑葉冠杖藜杖而應門正冠則纓絶捉襟則肘見納履則踵决子貢曰噫先生何病也原憲仰而應之曰憲聞之無財之謂貧學而不能行之謂病憲貧也非病也若夫希世而行比周而交學以為人敎以為己仁義之慝輿馬之餙憲不忍為也子貢逡廵面有愧色不辭而去原憲曵杖拖屨行歌商頌而反聲滿天地如出金石天子不得而臣也諸侯不得而友也故養志者忘身身且不愛孰能累之詩曰我心匪石不可轉也我心匪席不可卷也此之謂也立節篇曰子思居於衛緼袍無表二旬而九食田子方聞之使人遺狐白之裘恐其不受因謂之曰吾假人遂忘之吾與人也如棄之子思辭而不受子方曰我有子無何故不受子思曰伋聞之妄與不如遺棄物於溝壑伋雖貧也不忍以身為溝壑是以不敢當也}
