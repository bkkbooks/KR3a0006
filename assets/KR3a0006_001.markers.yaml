  - {type: variant, offset: 2370, length: 0, content: '', WYG: 齊俗訓曰神農之法曰丈夫丁壯而不耕天下有受其飢者婦人當年而不織天下有受其寒者故身自耕妻親織以為天下先其導民也不貴難得之貨不器無用之物是故其耕不强者無以養生其織不强者無以揜形有餘不足各歸其身衣食饒溢姦邪不生安樂無事而天下均平故孔丘曽參無所施其善孟賁成荆無所行其威公孫鞅曰神農之世公耕而食婦織而衣刑政不用而治甲兵不起而王韓嬰曰四體不掩則鮮仁人五藏空虚則無立士故先王之法天子親耕后妃親蠶先天下憂衣與食也}
