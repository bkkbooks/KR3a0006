  - {type: variant, offset: 96, length: 0, content: '', WYG: 主急於所用甚可疾痛也夫智不足以見賢無可奈何矣若智能見之而強不能决猶豫不用而大者死亡小者亂傾此甚可悲哀也以宋殤公而不知孔父之賢乎安知孔父死已必死趨而救之趨而救之者是知其賢也以魯荘公不知季子之賢乎安知疾將死召季子而授之國政授之國政者是知其賢也此二君知能見賢而皆不能用故宋殤公以殺死魯荘公以賊嗣使宋殤蚤任孔父将靖鄰國而况自存乎衞君近佞逺去聲賢子路居蒲孔悝音恢為政簡公不聽宰我而漏其謀是以二君身被放殺而禍及忠臣仲由傳曰子路為蒲大夫方孔悝作亂子路在外聞之而馳往遇子羔出衞城門謂子路曰出公去矣而門已閉子可還矣毋空受其禍子路曰食其食者不避其難子羔卒去有使者入城城門開子路隨而入造蕢瞶蕢瞶與孔悝登臺子路曰君焉用孔悝請得而殺之蕢聵弗聴扵是子路欲燔臺蕢瞶懼乃下石乞壺黶攻子路撃㫁子路之纓子路曰君子死而冠不免遂結纓而死正諫萹曰齊簡公有臣曰諸御鞅諌簡公曰田常與宰予此二人者甚相憎也臣恐其相攻相攻雖叛而危之不可願君去一人簡公曰非細人之所敢議也居無㡬何田常果攻宰予於庭賊簡公於朝簡公喟焉太息曰余不用鞅之言以至此患也故忠臣之言不可不察也二子者有事而不與音預其謀故可以死可以生去止其義一也泰族訓曰舜許由異行而皆聖伊尹伯夷異道而皆仁箕子比干異趨而皆賢范縝曰丘旦殊姿湯文異狀聖同於心器形不必同也猶馬殊色而齊逸玉異色而均美是以晋棘荆和等價連城驊騮駃驪俱致千里晏嬰不死崔慶之難去聲不可謂不義㣲子去殷之亂可謂不仁乎雜事萹曰齊侯問於晏子曰忠臣之事君也何若對曰有難不死出亡不送君曰列地而與之疏爵而貴之君有難不死出亡不送可謂忠乎對曰言而見用終身無難臣奚死焉諌而見従終身不亡臣奚送焉若言不見用有難而死是妄死也諫不見􅀙出亡而送是詐為也故忠臣也者能盡善與君而不能與䧟於難義勇萹曰崔杼弑莊公令士大夫盟者皆脫劒而入言不疾指不至血者死所殺十人次及晏子晏子奉桮血仰天歎曰惡乎崔子将為無道殺其君盟者皆視之崔杼謂晏子曰子與我我與子分國子不吾與吾将殺子直兵將推之曲兵将勾之唯子圖之晏子曰嬰聞囘以利而背其君者非仁也刼以刄而失其志者非勇也詩云愷悌君子求福不囘嬰可謂不囘矣直兵推之曲兵鈎之嬰不之囘也崔子舍之晏子趍出授綏而垂其僕将馳晏子拊其手曰虎豹在山林其命在庖厨馳不益生緩不益死按之成節然後去之詩云彼其之子舎命不渝晏子之謂也宋世家曰紂殺王子比干刳視其心㣲子曰父子有骨肉而臣主以義屬故父有過子三諌不聽則隨而號之人臣三諫不聽則其義可以去矣於是太師少師乃勸㣲子去遂行周武王伐紂克殷㣲子乃持其祭器造於軍門肉袒面縛左牽羊右把茅膝行而前以告於是武王乃釋㣲子復其位如故論語比考䜟曰殷惑妲己玉馬走宋均曰女妲己有美色也王馬喻賢臣奔去也劉毅曰三仁殊途而同歸四子異行而均義風俗通曰易記出處語黙書美九徳咸事同歸殊途一致百慮不期相反各有云尚而已是故伯夷譲國以採薇展禽不去於所生孔丘周流以應聘長沮隐居而耦耕墨翟摩頂以放踵楊朱一毛而不為干木息偃以藩魏包胥重璽而存郢夷吾朱紘以三歸平仲辭邑而濯纓惠施􅀙車以百乘于扈徒步而裸形寗戚商歌以干祿顔闔踰墻而遁榮髙柴趣門以避難季路求入而隕零端木結駟以貨殖顔囘屢空而弗營孟獻髙宇以美室原憲蓬門而株楹傳曰人心不同有如其面古今行事是則然矣大夫曰至美素璞物莫能飾也至賢保眞偽文莫能增也故金玉不琢美珠不畫音與壞同反質萹曰孔子卦得賁喟然仰而嘆息意不平子張進舉手而問曰師聞賁者吉卦而嘆之乎孔子曰賁非正色也是以歎之吾思也質素白當正白黑當正黑文質又何也吾亦聞之丹漆不文白玉不雕寶珠不飾何也質有餘者不受飾也今仲由冉求無檀柘之材隋和之璞而强文之譬若彫朽木而礪鈆音沿刀飾嫫音模母畫音壞土人也被以五色斐然成章及遭行潦流波則沮矣皇甫謐曰嫫母黄帝次妃許慎曰古之醜女班固曰詠雲門者難為音觀隋和者難為珍王褒曰毛嬙西施善毁者不能蔽其好嫫姆倭傀善譽者不䏻掩其醜孟嘗君客曰臣之来也過於淄水上見一土偶人方與木梗人語木梗謂土偶人曰子先土也持子以為耦人遇天大雨水潦並至子必沮壞土偶人應曰我沮乃反吾眞耳今子東園之桃也刻子以為梗遇天大雨水潦並至必浮子泛泛乎不知所止夫音扶重懷古道枕籍詩書危不䏻安亂不能治郵里逐雞難亦無黨也文學曰非學無以治身非禮無以輔徳冉有曰雖有美玉不刻鏤不成器雖有美質不學則不成君子傳曰玉不琢不成器人不學不成行家有千金之玉不知治猶之貧也良工宰之則富及子孫君子謀之則為國用故動則安百姓議則延民命又曰水淵深廣則龍魚生之山林茂盛則禽獸歸之禮義修明則君子懷之故禮及身而行修禮及國而政明䏻以禮持身則貴名自揚天下順焉令行禁止而王者之事畢矣詩曰有覺徳行四國順之夫此之謂矣和氏之璞天下之美寶也待鑑識之工而後明毛嬙音墻天下之姣音交人也待香澤脂粉而後容周公天下之至聖人也待賢師學問而後通莊子曰毛嬙西施人之所美也魚見之深入鳥見之髙飛莊小疏曰毛嬙越王嬖妾姣美也香澤者人髮恒枯悴以此濡澤之也韓非子曰善毛嬙西施之美無益吾面用脂澤粉黛則倍其初子夏曰黄帝學乎大墳顓頊學乎祿圖帝嚳學乎赤松子堯學乎務成子附舜學乎尹夀禹學乎西王國湯學乎貸子相文王學乎錫疇子斯武王學乎太公周公學乎虢叔仲尼學乎老􅆅此十一聖人未遭此師則功業不䏻著乎天下名號不䏻傳乎後世者也詩曰不愆不忘率由舊章今齊世庸士之人不好去聲學問專以巳之愚而負荷音賀巨任若無檝音接舳音逐濟江海而遭大風漂沒於百仞之淵東流無崖之川安得沮而止乎大夫曰性有剛柔形有好惡聖人能因而不能改孔子外變二三子之服而不能革其心故子路解長劍去危冠屈節於夫子之門然攝齊音咨師友行行音沆爾鄙心猶存行行剛健貎仲尼弟子列傳曰子路性鄙好勇力志伉直冠雄雞佩猳豚陵暴孔子孔子設禮稍誘子路子路後儒服委質因門人請為弟子建本萹曰孔子謂子路曰汝何好子路曰好長劔孔子曰非此之問也請以汝之所能加之以學豈可及哉子路曰學亦有益乎孔子曰夫人君無諫臣則失政士無教交則失徳狂馬不釋其䇿操弓不返於檠木受䋲則直人受諌則聖受學重問孰不順成毁仁惡士且近於刑君子不可以不學子路曰南山有竹弗揉自直斬而射之通於犀革又何學為乎孔子曰括而羽之鏃而砥礪之其入不益深乎子路拜曰敬受教哉貴徳萹曰子路持劎孔子問曰由安用此子路曰善古者固以善之不善古者固以自衞孔子曰}
