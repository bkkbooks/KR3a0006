  - {type: variant, offset: 47, length: 155, content: 管子曰今為國有地以牧民者務在四時守在倉廩國多財則逺者來地辟舉則民留䖏倉廩實則知禮節衣食足則知榮辱今君鑄錢立幣民通移人有百十之數而民有賣子者何也財有所并也今君躬犂墾田耕發草土得其榖矣民人之食有人若干歩畆之數然而有餓餒於衢閭者何也穀有所藏也故為人君不能散積聚調髙下分并則君雖强本趣耕發草立幣而無止民猶若不足也知去聲, SBCK: 智}
