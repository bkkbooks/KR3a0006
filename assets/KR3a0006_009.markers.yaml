  - {type: variant, offset: 2160, length: 0, content: '', krp: 二十三年山戎伐燕燕告急於齊齊桓公救燕遂伐山戎至於孤竹而還燕莊公遂送桓公入齊境桓公曰非天子諸侯相送不出境吾不可以無禮於燕於是分溝割燕君所至與燕命燕君復修召公}
  - {type: variant, offset: 2161, length: 0, content: '', WYG: 政納貢於周如成康之時諸侯聞之皆從齊齊語曰桓公遂北伐山戎刜令支斬孤竹而南歸海濵諸侯莫不來服趙世家曰武靈王二十年王略中山地至寜葭西略胡地至榆中林胡王獻馬歸使樓緩之秦仇液之韓王賁之楚富丁之魏趙爵之齊代相趙固主胡致其兵二十一年攻中山趙祒為右軍許鈞為左軍公子章為中軍王并將之牛翦將車騎趙希并將胡代趙}
  - {type: variant, offset: 2161, length: 0, content: '', krp: 政納貢於周如成康之時諸侯聞之皆從齊齊語曰桓公遂北伐山戎刜令支斬孤竹而南歸海濵諸侯莫不來服趙世家曰武靈王二十年王略中山地至寜葭西略胡地至榆中林胡王獻馬歸使樓緩之秦仇液之韓王賁之楚富丁之魏趙爵之齊代相趙固主胡致其兵二十一年攻中山趙祒為右軍許鈞為左軍公子章為中軍王并將之牛翦將車騎趙希并將胡代趙}
  - {type: variant, offset: 2162, length: 0, content: '', WYG: 之陘合軍曲陽攻取丹丘華陽鴟之塞王軍取鄗石邑封龍東垣中山獻四邑和王許之罷兵二十三年攻中山二十六年復攻中山攘地北至燕代西至雲中九原惠文王二年主父行新北遂出代西遇樓煩王於西河而致其兵朝鮮傳曰朝鮮王滿者故燕人也自始全燕時嘗畧屬真番朝鮮為置吏築鄣塞䝉公為秦擊走匈奴若鷙音至鳥之追羣雀匈奴勢慴音疊不敢南面而望十餘年慴懼也秦紀曰始皇三十三年䝉恬於西北斥遂匈奴單于不勝秦北徙盡收河南地並河以東屬之隂山因河為塞築長城因邊山險塹谿谷可繕者治之起臨洮至遼東萬餘里始皇又使䝉恬渡河取髙闕陶山北假中築亭鄣以逐}
