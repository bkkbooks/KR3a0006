  - {type: variant, offset: 7057, length: 455, content: 雜事篇曰燕易王時國大亂齊閔王興師伐燕屠燕國載其寳噐而歸易王死及燕國復太子立為燕王是為燕昭王昭王賢即位卑身厚幣以招賢者謂郭隗曰齊因孤國之亂而襲破燕孤極知燕小力少不足以報然得賢士與共國以雪先生之醜孤之願也先生視可者得身事之隗曰臣聞古之人君有以千金求千里馬者三年不能得㳙人言於君曰請求之君遣之三月得千里馬買其骨五百金反以報君君大怒曰所求者生馬安用死馬捐五百金涓人對曰死馬且市之五百金况生馬乎天下必以王為能市馬馬今至矣於是不朞年千里馬至者二今王誠欲必致士請從隗始隗且見事况賢於隗者乎豈逺千里哉於是昭王為隗築宫而師之樂毅自魏往鄒衍自齊往劇辛自趙往士爭走燕燕王弔死問孤與百姓同甘苦二十八年燕國殷富士卒樂軼輕戰於是遂以樂毅為上將軍與秦楚三晉合謀以伐齊樂毅之筴得賢之功也詩序曰小雅鹿鳴燕羣臣嘉賓也既飯食又實幣帛筐篚以將其厚意然後忠臣嘉賓得盡其心矣孔子曰臧文仲其竊位者與知栁下恵之賢而不與立也王逸曰子椒為楚大夫處蘭芷之位而行淫慢佞諛之志又欲援引面從不賢之類使居親近無有憂國之心苟欲自進求入於君身得爵禄而已復何能敬愛賢人而舉用之也, SBCK: ''}
