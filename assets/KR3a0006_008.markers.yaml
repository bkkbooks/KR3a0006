  - {type: variant, offset: 909, length: 4, content: 存東攝六, WYG: 取之末世凌遲風化壊亂政撓其俗法害其人故曰上失其道民散久矣而欲繩之以古刑投之以殘棄非所謂與時消息者也今天下之被誅者不必有管蔡之邪鄧晳之偽恐苖盡而不别民欺而不治也孔子曰人而不仁疾之已甚亂也故民亂反之政政亂反之身身正而天下定道應訓曰楚莊王問􅉟何曰治}
