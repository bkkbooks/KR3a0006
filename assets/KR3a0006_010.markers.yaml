  - {type: variant, offset: 4483, length: 2, content: 短鍼, WYG: 生刼之必得約契以報太子也專諸手劒歴萬乗去聲刺呉王尸孽立正鎬冠千里呉世家曰伍子胥之初奔呉說呉王僚以伐楚之利公子光曰胥之父兄為僇於楚欲自報其仇耳未見其利於是伍員知光有他志乃求勇士專諸見之光喜乃客伍子胥子胥退}
