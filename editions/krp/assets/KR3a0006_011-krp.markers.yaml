  - {type: variant, offset: 5474, length: 436, content: 論語解曰羿有窮之君善射滅夏后相簒其位其臣寒浞又殺羿而代之奡春秋傳作澆浞之子也力能陸地行舟後為夏后少康所誅權謀篇曰智伯請地於魏宣子宣子不予任増曰何為不予宣子曰彼無故而請地吾是以不予任増曰彼無故而請地者無故而與之是重欲無厭也彼喜必又請地於諸侯諸侯不與必怒而伐之宣子曰善遂與地智伯喜又請地於趙趙不與智伯怒圍晉陽韓魏合趙而反智氏智氏遂滅魏策曰智伯索地於魏桓子魏桓子弗予任章曰何故弗予彼其無故索地鄰國必敵恐重欲無厭天下必懼君予之地智伯必憍憍而輕鄰國懼而相親以相親之兵待輕敵之國智氏之命不長矣周書曰将欲敗之必姑輔之将欲取之必姑與之君不如與之以驕智伯君何釋以天下圖智氏而獨以吾國為智氏質乎君曰善乃與之萬家之邑一智伯大說因索蔡臯梁於趙趙弗與因圍晉陽韓魏反於外趙氏應之於内智氏遂亡顔師古曰狼性皆貪故謂貪為貪狼也老聃曰柔弱者生之徒也剛強者死之徒也夫生者毁而必復死者破而愈亡吾是以知柔之堅於剛也叔向曰兩軍相加而柔者克之兩仇爭利而弱者得焉桓公曰金剛則折革剛則裂金人銘曰強梁者不得其死好勝者必遇其敵, SBCK: ''}
