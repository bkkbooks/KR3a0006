  - {type: variant, offset: 3144, length: 133, content: 分為九州絕陵陸不通乃為一州有大瀛海圜其外此所謂八極而天地際焉禹貢亦著山川高下原隰而不知大道之遙故秦欲達九州而方瀛海牧胡而朝萬國諸生守畦畝之慮閭巷之固未知天下之義也文學曰堯使禹為司空平水土隨山刊木定高下而序九州鄒衍非聖人作怪誤熒惑六國之君以納其說此春秋所謂匹夫熒惑諸侯, WYG: 潰叛}
