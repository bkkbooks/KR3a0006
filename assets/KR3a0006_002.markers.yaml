  - {type: variant, offset: 5, length: 0, content: '', WYG: 漢桓寛撰明張之象註錯幣第四大夫曰交幣通施民事不及物有所并也計夲量委民有饑者榖有所藏也管子曰今為國有地以牧民者務在四時守在倉廩國多財則逺者來地辟舉則民留䖏倉廩實則知禮節衣食足則知榮辱今君鑄錢立幣民通移人有百十之數而民有賣子者何也財有所并也今君躬犂墾田耕發草土得其榖矣民人之食有人若干歩畆之􅁆然而有餓餒於衢閭者何也穀有所藏也故為人君不能散積聚調髙下分并則君雖强本趣耕發草立幣而無止民猶若不足也知去聲者有百人之功愚者不更夲之事人君不調民有相妨之富也此其所以或儲百年之餘或不厭糟糠也民大富則不可以禄使也大强則不可以威罰也非散聚均利者不齊故人主積其食守其用調其不足禁溢羡厄利塗説文曰厄塞也然後百姓可家給人足也文學曰古者貴徳而賤利重義而輕財三王之時迭盛迭衰衰則扶之傾則定之是以夏忠殷敬周文庠序之教恭讓之禮粲然可得而觀也及其後禮義弛崩風俗滅息故自食禄之君子違於義而競於財大小相吞激轉相傾此所以或儲百年之餘或無以充虚蔽形也貨殖傳曰占之在上者道之以徳齊之以禮故民有耻而且敬貴誼而賤利欲寡而事節財足而不争此三代之所以直道而行也及周室衰禮法墮諸侯刻桷丹楹大夫山節藻棁八佾舞於庭雍徹於堂其流至乎士庶人莫不離制而棄本稼穡之民少商旅之民多榖不足而貨有餘陵夷至於桓文之後禮誼大壊上下相冐國異政家殊俗耆欲不制僣差亡極於是商通難得之貨工作亡用之器士設反道之行以追時好而取世資偽民背實而要名姦夫犯害而求利篡弑取國者為王公圉奪成家者為雄桀禮誼不足以拘君子刑戮不足以威小人富者木土被文錦犬馬餘肉粟而貧者裋褐不完唅菽飲水其為編戸齊民同列而以財力相君雖為僕虜猶亡慍色故夫飾變詐為姦軌者自足乎一世之間守道循理者不免於飢寒之患其教自上興繇法度之無限也古之仕者不穡田者不漁抱關擊柝皆有常秩不得兼利盡物如此則愚知去聲同功不相傾也詩云彼有遺秉此有滯穗伊寡婦之利言不盡物也荀子曰義與利者人之所兩有也雖堯舜不能去民之欲利然而能使其欲利不克其好義也雖桀紂亦不能去民之好義然而能使其好義不勝其欲利也故義勝利者為治世利克義者為亂世上重義則義克利上重利則利克義故天子不言多少諸侯不言利害大夫不言得䘮士不通財貨有國之君不息牛羊錯質之臣不息鷄豚冢卿不修幣大夫不為場園從士以上皆羞利而不與民争業樂分施而耻積藏坊記曰子云君子不盡利以遺民詩云彼有遺秉此有不歛穧伊寡婦之利故君子仕則不稼田則不漁食時不力珍大夫不坐羊士不坐犬大夫曰湯文繼衰漢興乗弊一質一文非苟易常也俗弊家法非務變古也亦所以救失扶衰也故教與俗改弊與世易夏侯𤣥曰文質之更用猶四時之迭興也王者體天理物必因弊而濟通之時彌質則文之以禮時泰侈則敕之以質董仲舒曰繼治世者其道同繼亂世者其道變夏后以𤣥貝周人以紫石後世或金錢刀布物極而衰終始之運也司馬遷曰物盛則衰時極而轉一質一文終始之運也故山澤無征則君臣同利刀幣無禁則姦貞並行夫音扶臣富相侈下専利則相傾也文學曰古者市朝音潮而無刀幣各以其所有易無抱布貿音茂絲而已貿易財也交互之義後世即有龜貝金錢刀布之幣交施之也幣數音朔變而民滋偽司馬貞曰古者寳龜貨貝食貨志有十朋五貝皆用為貨貝各有多少兩貝為朋故直二百一十六元龜十朋故直二千一百六十已下各有差也錢本名泉言貨之流如泉也故周有泉府之官及景王乃鑄大錢刀者錢也食貨志有契刀錯刀契刀長二寸直五百錯刀以黄金錯直五千其形如刀故曰刀以其利於人也布泉者言貨流布故周禮有三夫之布食貨志貨布長二寸五分首長八分足枝長八分布者布於民間也夫音扶救偽以質坊古防字失以禮湯文繼衰革法易化而殷周道興漢初乗弊而不改易畜利變幣欲以反本是猶以煎止燔以火止沸也精神訓曰以湯止沸沸乃不止誠知其本則去火而已矣上好去聲禮則民闇飾上好去聲貨則下死利也孔子曰下之事上也不從其所令從其所行上好是物下必有甚者矣故上之所好惡不可不慎也是民之表也詩云赫赫師尹民具爾贍管子曰一人之治亂在其心一國之存亡在其主天下治亂道一人出主好本則民好墾草萊主好貨則人賈市主好宫室則工匠巧主好文采則女工靡夫楚王好小腰而美人省食呉王好劔而國士輕死死與不食者天下之所共惡也然而為之者何也從主之所欲也而況愉樂音聲之化乎大夫曰文帝之時縱民得鑄音注錢冶鐡煮鹽呉王擅鄣音嶂海澤鄧通専西山山東奸猾咸聚呉國秦雍漢蜀因鄧氏呉鄧錢布天下食貨志曰孝文五年為錢益多而輕乃更鑄四銖錢其文為半兩除盗鑄錢令使民放鑄呉王傳曰呉王濞者高帝兄劉仲之子也上患呉會稽輕悍無壯王以塡之諸子少乃立濞於沛為呉王孝惠高后時天下初定郡國諸侯各務自拊循其民呉有豫章郡銅山濞則招致天下亡命者益鑄錢煮海水為鹽以故無賦國用益饒佞幸傳曰鄧通者蜀郡南安人也以擢船為黃頭郎文帝悦焉上使善相者相通曰當貧餓死文帝曰能富通者在我也何謂貧乎於是睗通蜀嚴道以鑄錢鄧氏錢布天下其富如此食貨志曰呉以諸侯即山鑄錢富埒天子後卒叛逆鄧通大夫也以鑄錢財過王者故呉鄧錢布天下故有鑄音注錢之禁禁禦之法立而奸偽息奸偽息則民不期於妄得而各務其職不反本何為故統一則民不二也幣由上則下不疑也文學曰徃古幣衆財通而民樂音洛其後稍去舊幣更行白金龜龍民多巧新幣幣數音朔易而民益疑食貨志曰從建元以來用少縣官徃徃即多銅山而鑄錢民益盗鑄不可勝數錢益多而輕物益少而貴因有司言又造銀錫白金以為天用莫如龍地用莫如馬人用莫如龜故白金三品其一龍文直三千其二馬文直五百其三龜文直三百令縣官銷半兩錢更鑄三銖錢重如其文盗鑄諸金錢罪皆死而吏民之犯者不可勝數於是廢天下諸錢而専命水衡二官作吏近侵利或不中式故有薄厚輕重農人不習物類比之信故疑新不知姦眞商賈音古以美貿音茂惡以半易倍買則失實賣則失理其疑惑滋益甚夫音扶鑄音注偽金錢以有法而錢之善惡無增損於政擇錢則物稽滯而用人尤被其苦春秋曰算不及蠻夷則不行故王者外不鄣海澤以便民用内不禁刀幣以通民施叢談曰天道布順人事取予多藏不用是謂怨府故物不可聚也禁耕第五大夫曰家人有寳器尚函匣一作匱而藏之况人主之山海乎夫音扶權利之處必在深山窮澤之中非豪民不能通其利異時鹽鐡未籠布衣有朐音劬邴音丙人君有呉王皆鹽鐡初議也呉王専山澤之饒薄賦其民賑澹古贍字窮小以成私威私威積而逆節之心作貨殖傳曰魯人俗儉嗇而曹邴氏尤甚以鐡冶起富至巨萬然家自父兄子孫約俛有拾仰有取貰貸行賈徧郡國鄒魯以其故多去文學而趨利者以曹邴氏也或曰以興富於臨朐故曰朐邴呉王傳曰呉有豫章郡銅山濞則招致天下亡命者益鑄錢煑海水為鹽以故無賦國用益饒漢紀曰孝景三年春呉王濞反初上為太子時呉王太子入朝與上博争道無禮於上上以博局擲之而死送䘮至呉呉王怒曰天下一家何必來葬復遣還長安後稱疾不朝隂懐逆謀時齊人鄒陽淮隂人枚乗皆逰呉數諫不聽於是楚趙有罪見削呉王恐禍及身已為使者自見膠西王合謀發使約諸侯七國同謀南使南越北連匈奴伍被曰呉王賜號為劉氏祭酒受几杖而不朝王四郡之衆地方數千里采山銅以為錢煑海水以為鹽伐江陵之木以為船國富民衆行珍寶賂諸侯與七國合謀舉兵而西破大梁敗狐父奔走而還為越所禽死於丹徒頭足異處身㓕祀絶為天下戮夫音扶不蚤絕其源而憂其末若决吕梁沛然其所傷必多矣太公曰一家害百家百家害諸侯諸侯害天下王法禁之令放民於權利罷鹽鐵以資暴强遂其貪心衆邪羣聚私門成黨則强禦日以不制而并兼之徒姦形成也文學曰民人藏於家諸侯藏於國天子藏於海内故民人以垣墻為藏閉天子以四海為匣匱反質篇曰魏文侯御廩焚文侯素服辟正殿五日羣臣皆素服而弔公子成父獨不弔文侯復殿公子成父趨而入賀曰甚大善矣夫御廩之災也文侯作色不悦曰夫御廩者寡人寳之所藏也今火災寡人素服辟正殿羣臣皆素服而弔至於子大夫而不弔今已復辟矣猶入賀何為公子成父曰臣聞之天子藏於四海之内諸侯藏於境内大夫藏於其家士庻人藏於篋櫝非其所藏者不有天災必有人患今幸無人患乃有天災不亦善乎文侯喟然歎曰善天子適諸侯升自阼階諸侯納管鍵音健户鑰曰鍵執䇿而聽命示莫為主也坊記曰天子四海之内無客禮莫敢為主焉故君適其臣升自阼階即位於堂示民不敢有其室也夷維子曰天子廵狩諸侯辟舍納管籥攝袵袍机視膳於堂下天子已食乃退而聽朝也是以王者不畜聚下藏於民政理篇曰文王問於吕望曰為天下若何對曰王國富民覇國富士僅存之國富大夫亡道之國富倉府是謂上溢而下漏文王曰善對曰宿善不祥是日也發其倉府以振鰥寡孤獨詩傳曰晉平公之時藏寳之臺燒士大夫聞皆趨車馳馬救火三日三夜乃勝之公子晏子獨束帛而賀曰甚善矣平公勃然作色曰珠玉之所藏也國之重寳也而天火之士大夫皆趨車走馬而救之子獨束帛而賀何也有説則生無説則死公子晏子曰何敢無説臣聞之王者藏於天下諸侯藏於百姓商賈藏於篋匱今百姓乏於外裋褐不蔽形糟糠不充口而賦斂無已收太半而藏之臺是以天火之且臣聞之昔者桀殘賊海内賦斂無度萬民甚苦是故湯誅之為天下戮􅀏今皇天降災於藏臺是君之福也而不自知變悟亦恐君之為鄰國笑矣公曰善自今以徃請藏於百姓之間逺去聲浮利務民之義義禮立則民化上若是雖湯武生存於世無所容其慮工商之事歐冶之任何姦之能成三桓専魯六卿分晉聖賢羣輔録曰仲孫穀文伯叔孫得臣莊叔季孫行父文子皆魯桓公之曽孫世秉魯政號曰三桓趙無恤襄子范吉射昭子智瑶襄子荀寅文子魏侈襄子韓不信簡子此六族世為晉卿並有功名實弱晉國號曰六卿不以鹽鐡故權利深者不在山海在朝音潮廷一家害百家在蕭墻而不在朐音劬邴音丙也大夫曰山海有禁而民不傾貴賤有平而民不疑縣官設衡立凖人從所欲雖使五尺童子適市莫之能欺今罷去之則豪民擅其用而専其利决市閭巷高下在口吻音刎貴賤無常端坐而民豪是以養强抑弱而藏於蹠音隻也强養弱抑則齊民消若衆􅁾之盛而害五榖一家害百家不在朐音劬邴音丙如何也文學曰山海者財用之寳也鐡器者農夫之死生也死生用則仇讐滅仇讐滅則田野闢田野闢則五榖熟而寳路開寳路開則百姓澹古贍字而民用給民用給則國富國富而教之以禮則行道有讓而工商不相豫人懐敦樸以自相接而莫相利夫秦楚燕齊土力不同剛柔異勢巨小之用居局之宜黨殊俗易各有所便王制曰几居民財必因天地寒暖燥濕廣谷大川異制民生其間者異俗剛柔輕重遲速異齊五味異和器械異制衣服異宜修其教不易其俗齊其政不易其宜縣官籠而一之則鐡器失其宜而農民失其便器用不便則農夫罷音疲於野而草萊不辟草萊不辟則民困乏故鹽冶之處大校皆依山川近鐡炭其勢咸逺而作劇郡中踐更者多不勘責如淳曰更有三品有卒更有踐更有過更古有正卒無常人皆當迭為之一月一更是為卒更貧者欲得顧更踐者次直者出錢顧之月二千是為踐更也律説卒更踐更者居縣中五月乃更也後從尉律卒踐更一月休十一日也取庸代縣邑或以户口賦鐡而賤乎其凖良家以道次發僦音就賃也運鹽鐡煩費邑或以户百姓病苦之愚竊見一官之傷千里未覩其在朐音劬邴音丙也復古第六大夫曰故扇水都尉彭祖寜歸言鹽鐡令品令品甚明卒徒衣食縣官作鑄鐡器給用甚衆無妨於民而吏或不良禁令不行故民煩苦之今意總一鹽錢非獨為去聲利入也將以建本抑末離去聲朋黨禁淫侈絶并兼之路也古者名山大澤不以封為去聲下之専利也山海之利廣澤之畜天下之藏去聲也皆宜屬少府陛下不私以屬大司農以佐助百姓浮食豪民好去聲欲擅山海之貨以致富業役利細民故沮事議者衆鐡器兵刃天下之大用也非衆庻所宜事也徃者豪强大家得管山海之利採鐵石鼓鑄音注煑鹽一家聚衆或至千餘人大抵盡收放流人民也逺去鄉里棄墳墓依倚大家聚深山窮澤之中成姦偽之業遂朋黨之權其輕為非亦大矣今自廣進賢之途揀擇守尉不待去鹽鐡而安民也文學曰扇水都尉所言當時之利權一切音砌之術也不可以久行而傳世此非明王所以君國子民之道也詩云哀哉為猶匪先民是程匪大猶是經維邇言是聽此詩人刺不通於王道而善為權利者孝武皇帝攘九夷平百越師旅數音朔起糧食不足故立田官置錢入榖射官救急澹古贍字不給食貨志曰元狩二年天子為伐胡故盛養馬馬之徃來食長安者數萬匹率掌者闗中不足廼調旁近郡而胡降者數萬人皆得厚賞衣食仰給縣官縣官不給天子乃損膳解乘輿駟出御府禁藏以贍之其明年山東被水災民多飢乏於是天子遣使空郡國倉廩以賑貧今陛下繼大功之勤養勞勌音倦之民此用麋鬻之時釋名曰麋煑米使糜爛粥淖於糜粥粥然也公卿宜思所以安集百姓致利除害輔明主以仁義修潤洪業之道明主即位以來六年于兹公卿無請減除不急之官省罷機利之人人權縣音懸太久民良望於上陛下宣聖徳昭明光令郡國賢良文學之士乗傳去聲詣公車議五帝三王之道六藝之風册通作䇿陳安危利害之分指意粲然如淳曰律四馬高足為置傳四馬中足為馳傳四馬下足為乗傳一馬二馬為軺傳急者乗一乗傳顔師古曰傳者若今之驛古者以車謂之傳車其後又單置馬謂之驛騎今公卿辯議未有所定此所謂守小節而遺大體抱小利而忘大利者也雜言曰太公田不足以償種漁不足以償網治天下有餘智文公種米曾子駕羊孫叔敖相楚三年不知軌在衡後務大者固忘小智伯㕑人亡炙􅳢而知之韓魏反而不知邯鄲子陽園人亡桃而知之其亡也不知務小者亦忘大也泰族訓曰夫徹於一事審於一枝可以曲説而未可以廣應也秤薪而㸑數米而炊可以治小而未可以治大也大夫曰宇宙之内鷰雀不知天地之高也坎井之鼃音蛙不知江海之大窮夫否披上聲婦不知國家之慮負荷音賀之商不知猗頓之富先帝計外國之利料胡越之兵兵敵弱而易制用力少而功大故因勢變以主四夷地濵通作瀕近也山海以屬長城北畧河外開路匈奴之鄉功未卒善文王受命伐崇作邑于豐指武篇曰文王欲伐崇先宣言曰余聞崇侯虎蔑侮父兄不敬長老聼獄不中分財不均百姓力盡不得衣食余将來征之唯為民乃伐崇令毋殺人毋壊室毋填井毋伐樹木毋動六畜有不如令者死無赦崇人聞之因請降周紀曰崇侯虎謵西伯於紂紂囚西伯於羑里其後赦西伯賜之弓矢鉄鉞得専征伐曰譛西伯者崇侯虎也西伯歸三年伐崇侯虎而作豐邑武王繼之載尸以行破商擒紂遂成王業周紀曰武王修文王業東觀兵孟津為文王木主載以居中軍自􅁛太子發言奉文王以伐紂不敢自專遂興師渡于河時諸侯不期而會孟津者八百諸侯皆曰紂可伐武王曰未可也乃還師居二年聞紂昏亂滋甚殺比干囚箕子太師疵少師彊㣲子抱其祭器而犇周於是武王乃渡孟津伐紂紂師皆倒干戈以戰紂軍潰畔紂死周書曰周車三百五十乗陳于牧野帝辛從武王使尚父與伯夫致師王既以虎賁戎車馳商師商師大敗商辛奔内登于廩臺之上屏遮而自燔于火武王乃手太白以麾諸侯諸侯畢拜蓫揖之商庶百姓咸俟于郊羣賔僉進曰上天降休再拜稽首武王答拜先入適王所乃克射之三發而後下車而擊之以輕吕斬之以黄鉞折懸諸太白適二女之所乃既縊王又射之三發乃右擊之以輕吕斬之以𤣥鉞懸諸小白曹沫棄三北之耻而復侵地管仲負當世之累而立霸功汜論曰昔者曹子為魯将兵三戰不勝亡地千里使曹子計不顧後足不旋踵刎頸於陣中則終身為破軍擒将矣然而曹子不羞其敗耻死而無功柯之盟揄三尺之刃造桓公之胷三戰所亡一朝而反之勇聞於天下功立於魯國管仲輔公子糾而不能遂不可謂智遁逃奔走不死其難不可謂勇束縳桎梏不諱其耻不可謂貞當此三行者布衣弗友人君弗臣然而管仲免於縲絏之中立齊國之政九合諸侯一匡天下使管仲出死捐軀不顧後圖豈有此霸功哉今人君論其臣也不計其大功總其畧行而求小善則失賢之數也魯仲連曰效小節者不能行大威惡小耻者不能立榮名昔管仲射桓公中鈎簒也遺公子糾而不能死怯也束縳桎梏辱身也此三行者鄉里不通也世主不臣也使管仲終窮抑幽囚而不出慙耻而不見窮年沒夀不免為辱人賤行矣然管子并三行之過據齊國之政一匡天下九合諸侯為五伯首名高天下光照鄰國曹沫為魯君三戰三北而䘮地千里使曹子之足不離陳計不顧後出必死而不生則不免為敗軍擒將曹子以敗軍擒將非勇也功廢名滅後世無稱非智也故去三北之耻退而與魯君計也齊桓公有天下朝諸侯曹子以一劔之任刼桓公於壇位之上顧色不變而辭氣不悖三戰之所䘮一朝而反之天下震動驚駭威信呉楚傳名後世若此二公者非不能行小節忍小耻也以為殺身絶世功名不立非智也故去忿恚之心而成終身之名除感忿之耻而立累世之功故業與三王爭流名與天壤相敝也故志大者遺小用權者離俗有司思師望之計師望師尚父太公吕望也遂先帝之業志在絶胡貉擒單音蟬于匈奴酋長曰單于單于廣大貎言象天單于然也故未遑扣扃之義而録拘儒之論劉向曰論大功者不錄小過舉大美者不疵細瑕文學曰鷰雀離巢宇而有鷹隼音笋之憂坎井之鼃音蛙離其居而有蛇䑕之患况翺翔千仞而游四海乎其禍必大矣此李斯之所以折翼而趙高沒淵也張子曰李斯族誅卒擊於鷹隼趙高車裂終斃於䑕蛇聞文武受命伐不義以安諸侯大夫未聞弊諸夏以役夷狄也昔秦常舉天下之力以事胡越竭天下之財以奉其用然衆不能畢而以百萬之師為一夫之任此天下共聞也且數音朔戰則民勞久師則兵弊此百姓所疾苦而拘儒之所憂也伍被曰徃者秦為無道殘賊天下殺術士燔詩書滅聖棄禮義任刑法轉海濵之栗致於西河當是之時男子疾耕不足於糧餽女子紡績不足以葢形遣䝉恬築長城東西數千里暴兵露師常數十萬死者不可勝數僵尸滿野流血千里又使尉佗踰五嶺攻百越尉佗知中國勞極止土南越行者不還徃者莫返於是百姓離心瓦解欲為亂者十室而七韓成曰夫秦嘗積衆暴兵數十萬人雖有覆軍殺將係虜單于之功亦適足以結怨深讐不足以償天下之費夫上虚府庫下敝百姓甘心於外國非完事也}
