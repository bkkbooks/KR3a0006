  - {type: variant, offset: 1757, length: 0, content: '', WYG: 管仲傳曰管仲夷吾者潁上人也少時常與鮑叔牙游鮑叔知其賢管仲貧困常欺鮑叔鮑叔終善遇之不以為言已而鮑叔事齊公子小白管仲事公子糾及小白立為桓公公子糾死管仲囚焉鮑叔遂進管仲管仲既用任政於齊齊桓公以霸九合諸侯一匡天下管仲之謀也晉世家曰定公十五年趙鞅使邯郸大夫午不信欲殺午午中行寅范吉射親攻趙鞅鞅走保晉陽定公圍晉陽荀櫟韓不信魏侈與范中行為仇乃移兵伐范中行范中行反晉君擊之敗范中行范中行走朝歌保之韓魏為趙鞅謝晉君乃赦趙鞅復位二十二年晉敗范中行氏二子奔齊出公十七年知伯與趙韓魏共分范中行地以為邑}
