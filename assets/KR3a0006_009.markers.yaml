  - {type: variant, offset: 617, length: 1, content: 忌, WYG: 以天下為度者也不以已之私怒傷天下之公義故遣劉敬結為和親至今為世利孝文皇帝甞一屯天下之精兵於甞谿廣武無尺寸之功天下黔首約要之民無不憂者孝文皇帝悟兵之不可宿也乃為和親之約至今為後世利兩主之迹足以為效自是之後退文任武苦師勞衆以略無用之地立郡沙石之間民不能自守發屯乗城輓音挽輦而澹古贍字之愚竊見其亡不覩其成大夫曰匈奴以虛名市於漢而實不從數音朔為蠻貊所紿音怠不痛之何故也髙皇帝仗劒定九州今以九州}
