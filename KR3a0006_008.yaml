body:
  text: 鹽鐵論卷八結和第四十三大夫曰漢興以來修好結和親所聘遺單于者甚厚然不紀重質厚賂之故改節而暴害滋甚先帝覩其可以武折而不可以德懷故廣將帥招奮擊以誅厥罪功勳粲然著於海內藏於記府何命亡十獲一乎夫偷安者後危慮近者憂邇賢者離俗智士權行君子所慮衆庶疑焉故民可以觀成不可與圖始此有司所獨見而文學所不覩文學曰往者胸奴結和親諸夷納貢即君臣外內相信無胡越之患當此之時上求寡而易贍民安樂而無事耕田而食桑麻而衣家有數年之蓄縣官餘貨財閭里耆老咸及其澤自是之後退文任武苦師勞衆以略無用之地立郡沙石之間民不能自守發屯乘城挽輦而贍之愚竊見其亡不覩其成大夫曰胸奴以虛名市於漢而實不從數為蠻貊所紿不痛之何故也高皇帝仗劍定九州今以九州而不行於胸奴閭里常民尚有梟散況萬里之主與小國之胸奴乎夫以天下之力勤何不摧以天下之士民何不服今有帝名而威不信於長城之外反賂遺而尚踞敖此五帝所不忍三王所畢怒也文學曰湯事夏而卒服之周事殷而卒滅之故以大御小者王以強凌弱者亡聖人不困其衆以兼國良御不困其馬以兼道故造父之御不失和聖人之治不倍德秦攝利銜以御宇內執修箠以笞八極驂服以罷而鞭策愈加故有傾銜遺箠之變士民非不衆力勤非不多也皆內倍外附而莫為用此高皇帝所以仗劍而取天下也夫兩主好合內外交通天下安寧世世無患士民何事三王何怒焉大夫曰伯翳之始封秦地為七十里穆公開霸孝公廣業自卑至上自小至大故先祖基之子孫成之軒轅戰涿鹿殺兩皞蚩尤而為帝湯武伐夏商誅桀紂而為王黃帝以戰成功湯武以伐成孝故手足之勤腹腸之養也當世之務後世之利也今四夷內侵不攘萬世必有此長患先帝興義兵以誅暴強東滅朝鮮西定冉駹南擒百越北挫強胡追胸奴以廣北州湯武之舉蚩尤之兵也故聖主斥地非私其利用兵非徒奮怒也所以匡難辟害以為黎民遠慮文學曰秦南禽徑越北卻強胡竭中國以役四夷人罷極而主不恤國內潰而上不知是以一夫倡而天下和兵破陳涉地奪諸侯何嗣之所利詩云雍雍鳴鳱旭日始旦登得前利不念後咎故吳王知伐齊之便而不知干遂之患秦知進取之利而不知鴻門之難是以知一而不知十也周謹小而得大秦欲大而亡小語曰前車覆後車戒殷監不遠在夏后之世矣誅秦第四十四大夫曰秦楚燕齊周之封國也三晉之君齊之田氏諸侯家臣也內守其國外伐不義地廣壤進故立號萬乘而為諸侯宗周修禮長文然國翦弱不能自存東攝六國西畏於秦身以放遷宗廟絶祀賴先帝大惠紹興其後封嘉潁川號周子男君秦既并天下東絶沛水并滅朝鮮南取陸梁北卻胡狄西略氐羌立帝號朝四夷舟車所通足跡所及靡不畢至非服其德畏其威也力多則人朝力寡則朝於人矣文學曰禹舜堯之佐也湯文夏商之臣也其所以從八極而朝海內者非以陸梁之地兵革之威也秦楚三晉號萬乘不務積德而務相侵搆兵爭強而卒俱亡雖以進壤廣地如食萴之充腸也欲其安存何可得也夫禮讓為國者若江海流彌久不竭其本美也苟為無本若蒿火暴怒而無繼其亡可立而待戰國是也周德衰然後列於諸侯至今不絶秦力盡而滅其族安得朝人也大夫曰中國與邊境猶支體與腹心也夫肌膚寒於外腹心疾於內內外之相勞非相為賜也唇亡則齒寒支體傷而心憯怛故無手足則支體廢無邊境則內國害昔者戎狄攻太王於邠踰岐梁而與秦界於涇渭東至晉之陸渾侵暴中國中國疾之今胸奴蠶食內侵遠者不離其苦獨邊境蒙其敗詩云憂心慘慘念國之為虐不征備則暴害不息故先帝興義兵以征厥罪遂破祁連天山散其聚黨北略至龍城大圍胸奴單于失魂僅以身免乘奔逐北斬首捕虜十餘萬控弦之民旃裘之長莫不沮膽挫折遠遁遂乃振旅渾耶率其衆以降置五屬國以距胡則長城之內河山之外罕被寇𦸜於是下詔令減戍漕寬徭役初雖勞苦卒獲其慶文學曰周纍世積德天下莫不願以為君故不勞而王恩施由近及遠而蠻貊自至秦任戰勝以并天下小海內而貪胡越之地使蒙恬擊胡取河南以為新秦而亡其故秦築長城以守胡而亡其所守往者兵革亟動師旅數起長城之北旋車遺鏃相望及李廣利等輕計計還馬足莫不寒心雖得渾耶不能更所亡此非社稷之至計也伐功第四十五大夫曰齊桓公越燕伐山戎破孤竹殘令支趙武靈王踰句注過代谷略滅林胡樓煩燕襲走東胡辟地千里度遼東而攻朝鮮蒙公為秦擊走胸奴若鷙鳥之追群雀胸奴勢懾不敢南面而望十餘年及其後蒙公死而諸侯叛秦中國擾亂胸奴紛紛乃敢復為邊寇夫以小國燕趙尚猶卻寇虜以廣地今以漢國之大士民之力非特齊桓之衆燕趙之師也然胸奴久未服者群臣不并力上下未諧故也文學曰古之用師非貪壤土之利救民之患也民思之者若旱之望雨簞食壺漿以逆王師故憂人之患者民一心而歸之湯武是也不愛民之死力盡而潰叛者秦王是也孟子曰君不鄉道不由仁義而為之強戰雖克必亡此中國所以擾亂非蒙恬死而諸侯叛秦昔周室之盛也越裳氏來獻百蠻致貢其後周衰諸侯力征蠻貊分散各有聚黨莫能相一是以燕趙能得意焉其後胸奴稍強蠶食諸侯故破走月氏因兵威徙小國引弓之民并為一家一意同力故難制也前君為先帝畫胸奴之策兵據西域奪之便勢之地以候其變以漢之強攻於胸奴之衆若以強弩潰癰疽越之禽吳豈足道哉上以為然用君之義聽君之計雖越王之任種蠡不過以搜粟都尉為御史大夫持政十有餘年未見種蠡之功而見靡弊之效胸奴不為加俯而百姓黎民以敝矣是君之策不能弱胸奴而反衰中國也善為計者固若此乎西域第四十六大夫曰往者胸奴據河山之險擅田牧之利民富兵強行入為寇則句注之內驚動而上郡以南咸城文帝時虜入蕭關烽火通甘泉群臣懼不知所出乃請屯京師以備胡胡西役大宛康居之屬南與群羌通先帝推讓斥奪廣饒之地建張掖以西隔絶羌胡瓜分其援是以西域之國皆內拒胸奴斷其右臂曳劍而走故募人田畜以廣用長城以南濱塞之郡馬牛放縱蓄積布野未覩其計之所過也夫以弱越而遂意強吳才地計衆非鈞也主思臣謀其往必矣文學曰吳越迫於江海三川循環之處於五湖之間地相迫壤相次其勢易以相禽也金鼓未聞旌旗未舒行陳未定兵以接矣師無輜重之費士無乏絶之勞此所謂食於廚倉而戰於門郊者也今胸奴牧於無窮之澤東西南北不可窮極雖輕車利馬不能得也況負重嬴兵以求之乎其勢不相及也茫茫乎若行九皋未知所止皓皓乎若無網羅而漁江海雖及之三軍罷弊適遺之餌也故明王知其無所利以為役不可數行而權不可久張也故詔公卿大夫賢良文學所以復枉興微之路公卿宜思百姓之急胸奴之害緣聖主之心定安平之業今乃留心於末計摧本議不順上意未為盡於忠也大夫曰初二師不克宛而還也議者欲使人主不遂忿則西域皆瓦解而附於胡胡得衆國而益強先帝絶奇聽行武威還襲宛宛舉國以降效其器物致其寶馬烏孫之屬駭膽請為臣妾胸奴失魄奔走遁逃雖未盡服遠處寒苦墝埆之地壯者死於祁連天山其孤未復故群臣議以為胸奴困於漢兵折翅傷翼可遂擊服會先帝棄群臣以故胸奴不革譬如為山未成一簣而止度功業而無繼成之理是棄與胡而資強敵也輟幾沮成為主計若斯亦未可謂盡忠也文學曰有司言外國之事議者皆徼一時之權不慮其後張騫言大宛之天馬汗血安息之真玉大鳥縣官既聞如甘心焉乃大興師伐宛歷數期而後克之夫萬里而攻人之國兵不戰而物故過半雖破宛得寶馬非計也當此之時將卒方赤面而事四夷師旅相望郡國並發黎人困苦姦僞萌生盜賊並起守尉不能禁城邑不能止然後遣上大夫衣繡衣以興擊之當此時百姓元元莫必其命故山東豪傑頗有異心賴先帝聖靈斐然其咎皆在於欲畢胸奴而遠幾也為主計若此可謂忠乎世務第四十七大夫曰諸生妄言議者令可詳用無徒守椎車之語滑稽而不可循夫漢之有胸奴譬若木之有蠹如人有疾不治則寖以深故謀臣以為擊奪以困極之諸生言以德懷之此有其語而不可行也諸生上無以似三王下無以似近秦令有司可舉而行當世安蒸庶而寧邊境者乎文學曰昔齊桓公內附百姓外綏諸侯存亡接絶而天下從風其後德虧行衰葵丘之會振而矜之叛者九國春秋刺其不崇德而崇力也故任德則強楚告服遠國不召而自至任力則近者不親小國不附此其效也誠上觀三王之所以昌下論秦之所以亡中述齊桓所以興去武行文廢力尚德罷關梁除障塞以仁義導之則北垂無寇虜之憂中國無干戈之事矣大夫曰事不豫辨不可以應卒內無備不可以禦敵詩云誥爾民人謹爾侯度用戒不虞故有文事必有武備昔宋襄公信楚而不備以取大辱焉身執囚而國幾亡故雖有誠信之心不知權變危亡之道也春秋不與夷狄之執中國為其無信也胸奴貪狼因時而動乘可而發颷舉電至而欲以誠信之心金帛之寶而信無義之詐是猶親跖蹻而扶猛虎也文學曰春秋王者無敵言其仁厚其德美天下賓服莫敢交也德行延及方外舟車所臻足迹所及莫不被澤蠻貊異國重譯自至方此之時天下和同君臣一德外內相信上下輯睦兵設而不試干戈閉藏而不用老子曰兕無所用其角螫蟲無所輸其毒故君仁莫不仁君義莫不義世安得跖蹻而親之乎大夫曰布心腹質情素信誠內感義形乎色宋華元楚司馬子反之相覩也符契內合誠有以相信也今胸奴挾不信之心懷不測之詐見利如前乘便而起潛進市側以襲無備是猶措重寶於道路而莫之守也求其不亡何可得乎文學曰誠信著乎天下醇德流乎四海則近者歌謳而樂之遠者執禽而朝之故正近者不以威來遠者不以武德義修而任賢良也故民之於事也辭佚而就勞於財也辭多而就寡上下交讓道路鴈行方此之時賤貨而貴德重義而輕利賞之不竊何寶之守也和親第四十八大夫曰昔徐偃王行義而滅魯哀公好儒而削知文而不知武知一而不知二故君子篤仁以行然必築城以自守設械以自備為不仁者之害己也是以古者搜獮振旅而數軍實焉恐民之愈佚而亡戒難故兵革者國之用城壘者國之固也而欲罷之是去表見裏示胸奴心腹也胸奴輕舉潛進以襲空虛是猶不介而當矢石之蹊禍必不振此邊境之所懼而有司之所憂也文學曰往者通關梁交有無自單于以下皆親漢內附往來長城之下其後王恢誤謀馬邑胸奴絶和親攻當路塞禍紛拏而不解兵連而不息邊民不解甲弛弩行數十年介胄而耕耘鉏耰而候望燧燔烽舉丁壯弧弦而出鬭老者超越而入葆言之足以流涕寒心則仁者不忍也詩云投我以桃報之以李未聞善往而有惡來者故君子敬而無失與人恭而有禮四海之內皆為兄弟也故內省不疚夫何憂何懼大夫曰自春秋諸夏之君會聚相結三會之後乖離相疑伐戰不止六國從親冠帶相接然未嘗有堅約況禽獸之國乎春秋存君在楚誥鼬之會書公紿夷狄也胸奴數和親而常先犯約貪侵盜驅長詐謀之國也反復無信百約百叛若朱象之不移商均之不化而欲信其用兵之備親之以德亦難矣文學曰王者中立而聽乎天下德施方外絶國殊俗臻於闕庭鳳皇在列樹麒麟在郊藪群生庶物莫不被澤非足行而仁辦之也推其仁恩而皇之誠也范蠡出於越由余長於胡皆為霸王賢佐故政有不從之教而世無不可化之民詩云酌彼行潦挹彼注茲故公劉處戎狄戎狄化之大王去豳豳民隨之周公修德而越裳氏來其從善如影響為政務以德親近何憂於彼之不改
