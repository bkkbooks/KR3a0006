  - {type: variant, offset: 7635, length: 314, content: 音汙也泰族訓曰天子得道守在四夷天子失道守在諸侯諸侯得道守在四鄰諸侯失道守在四境故湯處亳七十里文王處鄷百里皆令行禁止於天下周之衰也戎伐凡伯于楚丘以歸故得道則以百里之地令於諸侯失道則以天下之大畏於兾州故曰無恃其不吾奪也恃吾不可奪行可奪之道而非簒殺之行無益於恃天下矣汜論曰堯無百戸之郭舜無置錐之地以有天下禹無十人之衆湯無七里之分以王諸侯文王處岐周之間也地方不過百里而立為天子者有王道也夏桀殷紂之盛也人跡所至舟車所通莫不為郡縣然而身死人手而為天下笑者有亡形也故得王道者雖小必大有亡形者雖成必敗趙襄子以晉陽之城霸智伯以三晉之地擒湣王以大齊亡田單以即墨有功故國之亡也雖大不足恃道之行也雖小不可輕由此觀之存在得道而不在於大也亡在失道而不在於小, SBCK: ''}
