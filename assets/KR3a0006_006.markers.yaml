  - {type: variant, offset: 155, length: 18, content: 安能默乎詩云憂心如惔不敢戲談孔子栖栖, SBCK: 非爲私家之業也當世􅅝􅅝非患儒之雞廉患在位者之虎飽鷁咽於求覽無所孑遺耳鹽鐡論卷第四鹽鐡論卷第五相刺第二十殊路第二十一頌賢第二士一遵道第二十三論誹第二十四孝養第二十五刺議第二十六利議第二十七國}
  - {type: page-break, offset: 155, content: '', id: KR3a0006_SBCK_005-1a}
  - {type: variant, offset: 155, length: 3, content: 安能默, WYG: 異務也臣瓉曰論語及韓子皆言葉公問政於孔子孔子答以恱近来逺今云定公與二書異晏嬰傳曰晏平仲嬰者莱之夷維人也事齊靈公莊公景公以節儉力行重於齊既相齊食不重肉妾不衣帛其在朝君語及之即危言語不及之即危行國有道即順命無道即衡命以此三世顕名于諸侯晏子春秋曰梁丘據問晏子曰子事三君君不同心子俱従焉仁人固多心}
