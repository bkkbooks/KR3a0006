  - {type: variant, offset: 4877, length: 362, content: 董仲舒傳曰武帝即位舉賢良文學之士前後百數而仲舒以賢良對䇿焉對既畢天子以仲舒為江都相事易王易王帝兄素驕好勇仲舒以禮誼匡正王敬重焉仲舒治國以春秋災異之變推隂陽所以錯行故求雨閉諸陽縱諸隂其止雨反是行之一國未嘗不得所欲中廢為中大夫先是遼東髙廟長陵髙園殿災仲舒家居推説其意草藁未上主父偃候仲舒私見嫉之竊其書而奏焉上召視諸儒仲舒弟子吕歩舒不知其師書以為大愚於是下仲舒吏當死詔赦之仲舒遂不敢復言災異董仲舒曰天者羣物之祖也故徧覆包涵而無所殊建日月風雨以和之經隂陽寒暑以成之故聖人法天而立道亦溥愛而亡私布徳施仁以厚之設誼立禮以道之春者天之所以生也仁者君之所以愛也夏者天之所以長也徳者君之所以養也霜者天之所以殺也刑者君之所以罰也繇此言之天人之徴古今之道也是故王者上謹於承天意以順命也下務明教化民以成性也正法度之宜别上下之序以防欲也修此而大本舉矣, SBCK: ''}
