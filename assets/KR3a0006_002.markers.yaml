  - {type: variant, offset: 1321, length: 0, content: '', WYG: 節士篇曰箕子者紂親戚也紂始為象箸箕子諫不聼囚箕子以為奴王子比干者亦紂之親戚也紂作炮烙之刑王子比干曰主暴不諫非忠臣也畏死不言非勇士也見過則諫不用則死忠之至也遂進諫三日不去朝紂因而殺之}
