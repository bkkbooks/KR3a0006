body:
  text: 鹽鐵論卷八漢桓寛撰明張之象註疾貪第三十三大夫曰然為醫以拙矣又多求謝為吏既多不良矣又侵漁百姓顔師古曰侵漁言侵奪百姓若漁者之取魚也長吏厲諸小吏厲病也小吏厲諸百姓故不患擇之不熟而患求之與得異也不患其不足也患其貪而無厭也賢良曰古之制爵禄也卿大夫足以潤賢厚士足以優身及黨庻人為官者足以代其耕而食其禄管子曰爵不尊禄不重者不與圖難犯危以其道為未可以求之也是故先王制軒冕足以著貴賤不求其美設爵禄足以守其服不求其親使君子食於道小人食於力今小吏禄薄郡國繇音遥役逺至三輔粟米貴不足相澹古聸字常居則匱於衣食有故則賣畜粥業非徒是也繇吏相遣官庭攝追小計權吏行施乞貸長吏侵漁上府下求之縣縣求之鄉鄉安取之哉荀悦曰先王之制禄也下足以代耕上足以充祀故食禄之家不與下民爭利所以厲其公義塞其私心其或犯逾之者則繩以政法是以君子慕義小人無怨若位苟禄薄外而不充憂匱是䘏所求不贍則私利之制萌矣放而聼之則貪利之心濫矣以法繩之則下情怨矣故位必稱徳禄必稱爵故一物而不稱亂之道也今漢之賦禄薄而吏非員者衆在位者貪於財産規奪官民之利則殖貨無厭奪民之利不以為耻是以清節毁傷公義損缺富者比公室貧者匱朝夕非所為濟俗也語曰貨賂音路下流猶水之赴下不竭不止今大川江河飲巨海巨海受之而欲谿谷之讓流潦百官之廉不可得也夫音扶欲影正者端其表欲下廉者先之身曾子曰響不辭聲鑑不辭形君子正一而萬物皆成夫行非為影也而影随之呼非為響也而響和之故君子功先成而名随之主術訓曰君人者其猶射者乎於此毫末於彼尋丈矣故慎所以感之也夫榮啓期一彈而孔子三日樂感于和鄒忌一徽而威王終夕悲感于憂動諸琴瑟形諸聲音而能使人為之哀樂縣法設賞而不能移風易俗其誠心弗施也故貪鄙在率不在下教訓在政不在民也主術訓曰通於本者不亂於末覩於要者不惑于詳是故有諸已不非諸人無諸已不求諸人所立於下者不廢於上所禁於民者不行於身孔子曰其身正不令而行其身不正雖令不從故禁勝於身則令行於民矣劉峻曰神非舜禹心異朱均才絓中庸在於所習是以素絲無恒𤣥黃代起鮑魚芳蘭入而自變大夫曰賢不肖有質而貪鄙有性君子内潔已而不能純教於彼故周公非不正管蔡之邪子産非不正鄧晳之偽也韓嬰曰客有見周公者應之於門曰何以道旦也客曰在外即言外在内即言内入乎將母周公曰請入客曰立即言義坐即言仁坐乎將母周公曰請坐客曰疾言則翕翕徐言則不聞言乎將母周公唯唯旦也踰明日興師而誅管蔡故客善以不言之説周公善聼不言之説若周公可謂能聼微言矣故君子之告人也微其救人之急也婉詩曰豈敢憚行畏不能趨鴻烈解曰鄧晳教鄭人以訟訟不俱囬子産誅之也許慎曰鄧晳詭辯姦人之雄也子産誅之故姦止也傳曰鄭駟遄殺鄧晳而用其竹刑鄧晳制刑書之於竹鄭國用之不以人廢言也夫音扶内不從父兄之教外不畏刑法之罪周公子産不能化必也今一二則責之有司有司豈能縛房入聲其手足而使之無為非哉賢良曰駟馬不馴音廵御者之過也百姓不治有司之罪也主術訓曰人主之立法先自為檢式儀故令行於天下孔子曰其身正不令而行其身不正雖令不從故禁勝於身則令行於民矣今夫御者馬體調於車御心和于馬則歴險致逺進退周游莫不如志雖有騏驥騄駬之良臧獲御之則馬反自恣而人弗能制矣故治者不貴其自是而貴其不得為非也故曰勿使可欲母曰弗求勿使可奪母曰不争如此則人材釋而公道行矣聖主之治也其猶造父之御乎齊輯之于轡銜之際而急緩之于脣吻之和正度于胷臆之中而執節於掌握之間内得于心中外合于馬志是故能進退履繩而旋曲中規取道致逺而氣力有餘誠得其術也體離車輿之安而手失駟馬之心而能不危者古今未有也春秋刺譏不及庻人責其率也故古者大夫將臨刑聲色不御刑以當矣猶三廵而嗟嘆之其耻不能以化而傷其不全也王制曰刑者侀也侀者成也一成而不可變故君子盡心焉曽子曰上失其道民散久矣如得其情則哀矜而勿喜政教闇而不著百姓顛蹶音决而不扶猶赤子臨井焉聽其入也若此則何以為民父母康誥曰若保赤子孟子曰彼有取爾也赤子匍匐將入并非赤子之罪也又曰人皆有不忍人之心所以謂人皆有不忍人之心者今人乍見孺子將入於并皆有怵愓惻隐之心無惻隐之心非人也故君子急於教緩於刑刑一而正百殺一而慎萬是以周公誅管蔡而子産誅鄧晳也指武篇曰齊人王滿生見周公周公出見之曰先生逺辱何以教之王滿生曰言内事者於内言外事者於外今言内事乎言外事乎周公導入王滿生曰敬從布席周公不導坐王滿生曰言大事者坐言小事者倚今言大事乎言小事乎周公導坐王滿生坐周公曰先生何以教之王滿生曰臣聞聖人不言而知非聖人者雖言不知今欲言乎無言乎周公俛念有頃不對王滿生籍筆牘書之曰社稷且危傳之於膺周公仰視見書曰唯唯謹聞命矣明日誅管蔡吕氏春秋曰子産治鄭鄧晳務難之與民之有獄者約大獄一衣小獄襦袴民之獻衣襦袴而學訟者不可勝數以非為是以是為非是非無度而可與不可日變所欲勝因勝所欲罪因罪鄭國大亂民口讙譁子産患之於是殺鄧晳而戮之民心乃服是非乃定法令乃行汜論曰善賞者費少而勸衆善罰者刑省而姦禁故聖人因民之所喜而勸善因民之所惡以禁姦故賞一人而天下譽之罰一人而天下畏之故至賞不費至刑不濫孔子誅少正夘而魯國之邪塞子産誅鄧晳而鄭國之姦禁以近諭逺以小知大也刑誅一施民遵禮義矣夫音扶上之化下若風之靡草無不從教何一一而縛之也泄冶曰夫上之化下猶風靡草東風則草靡而西西風則草靡而東在風所由而草為之靡是故人君之動不可不慎也後刑第三十四大夫曰古之君子善善而惡音汙惡人君不畜惡民農夫不畜無用之苖叢談曰父不能愛無益之子君不能愛不軌之民曹植曰唐堯至仁不能容無益之子湯武至聖不能養無益之臣無用之苖苖之害也無用之民民之賊也鉏音鋤一害而衆苖成刑一惡而萬民説音悦王符曰養稂莠者傷禾稼惠姦軌者賊良民管子曰先王者為民興利除害故天下之民歸之所謂興利者利農事者也所謂除害者禁害農者也兵略訓曰治國者若耨田去害苖者而已今沐者堕髪而猶為之不已以其所去者少所利者多也雖周公孔子不能釋刑而用惡家之有鉏音鋤子器皿不居况鉏音鋤民乎指武篇曰昔堯誅四㓙以懲惡周公殺管蔡以弭亂子産殺鄧晳以威侈孔子斬少正卯以變衆佞賊之人而不誅亂之道也易曰不威小不懲大此小人之福也民者教於愛而聼刑故刑所以正民鉏音鋤所以别苖也韓非子曰夫惜草茅者害禾穗惠盗賊者傷良民今緩刑罰行寛惠是利姦邪而害善人也此非所以為治也賢良曰古者篤教以導民明辟以正刑刑之於治猶策之於御也良工不能無策而御有策而勿用聖人假法以成教教成而刑不施故威厲而不殺刑設而不犯白虎通曰刑罰者五帝之鞭䇿也覽㝠訓曰鉗且大丙不施轡銜而以善御聞於天下伏戯女媧不設法度而以至徳遺於後世仲尼曰至刑無所用政至政無所用刑今廢其紀綱而不能張壊其禮義而不能坊古防字民陷於罔從而獵之以刑是猶開其闌牢發以毒矢也不盡不止詩傳曰孔子曰詩曰俾民不迷昔之君子道其百姓不使迷是以威厲而刑措不用也故形其仁義謹其教道使民目晰焉而見之使民耳晰焉而聞之使民心晰焉而知之則道不迷而民志不惑矣詩曰示我顯徳行故道義不易民不由也禮樂不明民不見也詩曰周道如砥其直如矢言其易也君子所履小人所視言其明也睠言顧之澘焉出涕哀其不聞禮教而就刑誅也夫散其本教而待之刑辟猶决其牢而發以毒矢也亦不哀乎故曰未可殺也昔者先王使民以禮譬之如御也刑者鞭䇿也今猶無轡銜而鞭䇿以御也欲馬之進則䇿其後欲馬之退則䇿其前御者以勞而馬亦多傷矣今猶此也上憂勞而民多罹刑詩曰人而無禮胡不遄死為上無禮則不免乎患為下無禮則不免乎刑上下無禮胡不遄死曾子曰上失其道民散久矣如得其情則哀矜而勿喜夫音扶不傷民之不治而伐已之能得姦猶弋者覩鳥獸挂音卦罻音尉羅而喜也孔融曰古者敦厖善否不别吏端刑清政無過失百姓有罪皆自取之末世凌遲風化壊亂政撓其俗法害其人故曰上失其道民散久矣而欲繩之以古刑投之以殘棄非所謂與時消息者也今天下之被誅者不必有管蔡之邪鄧晳之偽恐苖盡而不别民欺而不治也孔子曰人而不仁疾之已甚亂也故民亂反之政政亂反之身身正而天下定道應訓曰楚莊王問詹何曰治國奈何對曰何明於治身而不明於治國楚王曰寡人得立宗廟社稷願學所以守之詹何對曰臣未嘗聞身治而國亂者也未嘗聞身亂而國治者也故本任於身不敢對以末楚王曰善故老子曰修之身其徳乃真也是以君子嘉善而矜不能恩及刑人徳潤窮夫施惠説音悦爾行刑不樂音洛也授時第三十五大夫曰共其地居是世也非有災害疾疫獨以貧窮非惰則奢也無竒業旁入而猶以富給非儉則力也今曰施惠説音悦爾行刑不樂音洛則是閔無行去聲之人而養惰奢之民也故妄予不為惠惠惡者不為仁韓非子曰無豐年旁入之利而獨以完給者非力則儉也無饑饉疾疚禍罪之殃獨以貧窮者非侈則惰也侈而惰者貧而力而儉者富今徴斂于富人以布施於貧家是奪力儉而與侈惰也而欲民之力作而節用不可得也賢良曰三代之盛無亂萌教也夏商之季世無順民俗也韓非子曰夫堯生在上位雖十桀紂不能亂者勢治也桀紂亦生在上雖有十堯舜而不能治者勢亂也朱穆曰時敦俗美則小人守正利不可誘也時否俗薄雖君子為邪義不能止也楊恪曰堯舜之民可比屋而封桀紂之民可比屋而誅是以王者設庠序明教化以坊古防字道其民及政教之洽性仁而喻善詩曰皎皎練絲在所染之上智下愚謂之不移中庸之流要在教化儒林傳曰三代之道鄉里有教夏曰校殷曰庠周曰序勸學行禮崇化厲賢以風四方太平之原也故禮義立則耕者讓於野禮義壊則君子争於朝音潮人争則亂亂則天下不均故或貧或富富則仁生澹古贍字則民爭止昏暮叩人門户求水火貪夫不恡音吝何則所饒也夫音扶為政而使菽粟如水火民安有不仁者乎韓非子曰夫山居而谷汲者膢臘而相遺以水澤居苦水者買庸而決竇故饑嵗之春幼弟不饟穰嵗之秋疏客必食非疏骨肉愛過客也多少之實異也是以古人易財也非仁也財多也今之争奪非鄙也財寡也齊俗訓曰夫民有餘即讓不足則争讓則禮義生争則暴亂起扣門求水火莫弗與者所饒足也林中不賣薪湖上不鬻魚所有餘也故物豐則欲省求贍則争止秦王之時或人葅子利不足也劉氏持政獨夫收孤財有餘也故世治則小人守政而利不能誘也世亂則君子為姦而法弗能禁也大夫曰博戯馳逐之徒皆富人子弟非不足者也故民饒則僭侈富則驕奢坐而委音逶蛇音迤起而為非未見其仁也夫音扶居事不力用財不節雖有財如水火窮乏可立而待也有民不畜有司雖助之耕織其能足之乎賢良曰周公之相去聲成王也百姓饒樂音洛國無乏人非代之耕織也易其田疇薄其税斂則民富矣上以奉君親下無饑寒之憂則教可成也傳曰夫百姓内不乏食外不患寒則可教御以禮義矣語曰既富矣又何加焉曰教之以徳齊之以禮則民從義而從善莫不入孝出悌夫音扶何奢侈暴慢之有孔子曰夫民教之以徳齊之以禮則民有格心教之以政齊之以刑則民有遯心故君民者子以愛之則民親之信以結之則民不倍㳟以涖之則民有孫心甫刑曰苖民匪用命制以刑惟作五虐之刑曰法是以民有惡徳而遂絶其世也管子曰倉廪實而知禮節百姓足而知榮辱故民易與適禮難與適道大夫曰縣官之於百姓若慈父之於子也忠焉能勿誨乎愛之能勿勞乎故春親耕以勸農賑貸以澹古贍字不足通滀音畜水出輕繫使民務時也䝉恩被澤而至今猶以貧困其難與適道若是夫音扶賢良曰古者春省耕以補不足秋省歛以助不給民勤於財則貢賦省民勤於力則功業牢為去聲民愛力不奪須臾故召伯聼斷於甘棠之下為妨農業之務也傳曰昔者周道之盛召伯在朝有司請營邵以居召伯曰嗟以吾一身而勞百姓此非吾先君文王之志也於是出而就蒸庻於阡陌隴畆之間而聼斷焉召伯暴處逺野廬於樹下百姓大悦耕桑者倍力以勸於是嵗大稔民給家足其後在位者驕奢不恤元元税賦繁數百姓困乏耕桑失時於是詩人見召伯之所休息樹下美而歌之詩曰蔽茀甘棠勿剪勿伐召伯所苃此之謂也貴徳篇曰聖人之於天下百姓也其猶赤子乎飢者則食之寒者則衣之將之養之育之長之唯恐其不至於大也詩曰蔽芾甘棠勿剪勿伐召伯所苃傳曰自陜以東者周公主之自陜以西者召公主之召公述職當桑蠶之時不欲變民事故不入邑中舍於甘棠之下而聼斷焉陕間之人皆得其所是故後世思而歌詠之善之故言之言之不足故嗟嘆之嗟嘆之不足故歌詠之夫詩思然後積積然後滿滿然後發發由其道而致其位焉百姓嘆其美而致其敬甘棠之不伐也政教惡乎不行孔子曰吾於甘棠見宗廟之敬也甚尊其人必敬其位順安萬物古聖之道幾哉仁人之徳教也誠惻隐於中悃愊於内不能已於其心故其治天下也如救溺人今時雨澍音樹澤澍時雨生萬物也種懸而不得播秋稼零落乎野而不得收田疇赤地而停落成市發春而後懸青幡音番而䇿土牛殆非明主勸耕稼之意而春令之所謂也水旱第三十六大夫曰禹湯聖主后稷伊尹賢相去聲也而有水旱之災水旱天之所為饑穰隂陽之運也非人力故太嵗之數在陽為旱在隂為水天文訓曰八尺之景修徑尺五寸景脩則隂氣勝景短則陽氣勝隂氣勝則為水陽氣勝則為旱六嵗一饑十二嵗一荒天道固然殆非獨有司之罪也賢良曰古者政有徳則隂陽調星辰理風雨時故循行於内聲聞於外為善於下福應於天亢倉子楚曰水隂沴也隂於國政類刑人事類私旱陽過也陽於國政類徳人事類盈楚以為凡遭水旱天子宜正刑修徳百官宜去私戒盈則以類而消百福日至矣周公載紀而天下太平國無夭傷嵗無荒年當此之時雨不破塊風不鳴條旬而一雨雨必以夜無丘陵髙下皆熟傳曰國無道則飄風厲疾暴雨折木隂陽錯氛夏寒冬温春熱秋榮日月無光星辰錯行民多疾病國多不祥羣生不夀而五榖不登當成周之時隂陽調寒暑平羣生遂萬物寧故曰其風治其樂連其驅馬舒其民依依其行遲遲其意好好董仲舒曰太平之世則風不鳴條開甲散萌而已雨不破塊潤葉津莖而已雷不驚人號令啓發而已電不眩目宣示光耀而已霧不寒望浸滛被泊而已雪不封條凌殄毒害而已雲則五色而為慶三色而成矞露則結味而成甘結潤而成膏此聖人之在上則隂陽和風雨時也論衡曰太平瑞應山出車澤出馬男女異路市無二價耕者讓畔斑白不提挈關梁不閉道不擄掠風不鳴條雨不破塊五日一風十日一雨尚書大傳曰成王時越裳重譯而来朝曰久矣天之無烈風迅雨意中國有聖人乎詩曰有渰音掩萋萋興雨祁祁今不省具所然而曰隂陽之運也非所聞也孟子曰野有餓殍不知收也狗豕食人食不知檢也為民父母民饑而死則曰非我也嵗也何異乎以刃殺之則曰非我也兵也方今之務在除饑寒之患罷鹽鐡退權利分土地趣本業養桑麻盡地力也寡功節用則民自富如是則水旱不能憂凶年不能累也周書曰天有四殃水旱飢荒其至無時非務積聚何以脩之夏箴曰小人無兼年之食遇天飢妻子非其有也大夫無兼年之食遇天飢臣妾輿馬非其有也戒之哉弗思弗行至無日矣不明開塞禁舍者其如天下何人各修其學而尊其名聖人制之故諸横生盡以養從生從生盡以養一文夫無殺夭胎無伐不成材無堕四時大夫曰議者貴其辭約而指明可於衆人之聼不至繁文稠辭多言害有司化俗之計而家人語陶朱為生本末異徑一家數事而治生之道乃備今縣官鑄音注農器使民務本不營於末則無饑寒之累鹽鐵何害而罷賢良曰農天下之大業也鐵器民之大用也器用便利則用力少而得作多農夫樂音洛事勸功用不具則田疇荒榖不殖用力鮮功自半器便與不便其功相什而倍也縣官鼔鑄音注鐵器大抵多為大器務應員程不給民用民用鈍弊割草不痛是以農夫作劇音極得獲者少百姓苦之矣大夫曰卒徒工匠以縣官日作公事財用饒器用備家人合會褊於日而勤於用鐵力不銷鍊堅柔不和故有司請總鹽鐵一其用平其賈通作價以便百姓公私雖虞夏之為治不易於此吏明其教工致其事則剛柔和器用便此則百姓何苦而農夫何疾賢良曰卒徒工匠故民得占去聲租鼓鑄音注煮鹽之時鹽與五榖同賈通作價器和利而中用今縣官作鐡器多苦惡臣瓉曰謂作鐵器民患苦其不好也顔師古曰鹽既味苦器又脆惡故總云苦惡也用費不省卒徒煩而力作不盡家人相一父子戮力各務為善器器不善者不集農事急輓音挽運衍之阡陌之間民相與市買得以財貨五榖新弊易貨或貰音世民不棄作業置田器各得所欲更繇音遥省約縣官以徒復作繕音善治道橋諸發民便之今總其原一其賈通作價器多堅䃘音坑善惡無所擇吏數不在器難得家人不能多儲多儲則鎮生棄膏腴音于之日逺市田器則後良時鹽鐡賈通作價貴百姓不便貧民或木耕手耨土耰啖音談食鐵官賣器不售音夀或頗賦於民卒徒作不中去聲程時命助之發徴無限更繇以均劇故百姓疾苦之古者千室之邑百乗去聲之家陶冶工商四民之求足以相更故農民不離畦畆而足乎田器工人不斬伐而足乎陶冶不耕田而足乎粟米百姓各得其便而上無事焉司馬遷曰古者四民因其土宜各在智力夙興夜寐以治其業相與通功易事交利而俱贍非有徴發期會而逺近咸足故易曰后以財成天地之道輔相天地之宜以左右民備物致用立成器以為天下利莫大乎聖人此之謂也是以王者務本不作末去炫音縣燿音耀除雕琢湛民以禮示民以檏是以百姓務本不營於末管子曰凡民從上也不從口之所言從情之所好者也故上之所好民必甚焉是故明君知民之必以上為心也故置法以自治立儀以自正也傳曰聖人不滛佚侈靡者非鄙夫色而愛財用也夏不數浴非愛水也冬不頻湯非愛火也不髙臺榭非無土木也不大鐘鼎非無金錫也直行情性之所安而制度可以為天下法矣昔者舜甑盆無膻而下不以餘獲罪飯乎土簋啜乎土型而農不以力獲罪麑衣而䀈領而女不以巧獲罪傳曰易簡而天下之理得也韓非子曰君無見其所欲見其所欲臣將自雕琢君無見其意君見其意臣將自表異故曰去好去惡臣乃見素去舊去智臣乃自備崇禮第三十七大夫曰飾几杖修樽俎為去聲賔非為去聲主也炫音縣燿音耀竒怪所以陳四夷非為去聲民也夫音扶家人有客尚有倡優竒變之樂而况縣官乎故列羽旄陳戎馬以示威武竒蟲珍怪所以示懐廣逺明徳逺國莫不至也賢良曰王者崇禮施徳上通作尚仁義而賤怪力故聖人絶而不言孔子曰言忠信行去聲篤敬雖蠻貊之邦不可棄也今萬方絶國之君奉贄音至獻者懐天子之盛徳而欲觀中國之禮儀故設明堂辟雍以示之揚干戚昭雅頌以風去聲之今乃玩好去聲不用之器竒蟲不畜之獸角抵諸戲炫音縣燿音耀之物陳夸通作誇之殆與周公待逺方殊刑法志曰春秋之後滅弱吞小並為戰國稍增講武之禮以為戯樂用相夸視而秦更名角抵先王之禮沒於滛樂中矣應劭曰角者角技也抵者相抵觸也文頴曰抵當也名此樂為角抵者兩兩相當角力角技藝御射故名角抵盖雜技樂也巴俞戲魚龍蔓延之屬也顔師古曰炫耀之物眩人也眩相詐惑也讀與幻同其術本從西域來即今吞刀吐火植𤓰種樹屠人戮馬之術皆是也漢紀曰元封三年春作角抵戲以享外國朝獻者三百餘里内人皆觀張騫傳曰是時上方數廵狩海上廼悉從外國客大都多人過之則散財帛賞賜厚具饒給之以覽視漢富厚焉大角抵出竒戯諸恠物多聚觀者行賞賜酒池肉林令外國客徧觀名倉庫府藏之積欲以見漢廣大傾駭之及加其眩者之工而角抵竒戯嵗增變其益興自此始而外國使更來更去大宛以西皆自恃逺尚驕恣未可詘以禮羈縻而使也昔周公處謙以卑士執禮以治下天下辭越裳之贄音至見恭讓之禮既與入文王之廟是見大孝之禮也風俗通曰越裳重九譯獻白雉周公薦陳祖廟曰先人之徳有天下尊歸於父此人道之極也目覩威儀干戚之容耳聼清歌雅頌之聲心充至徳欣然以歸此四夷所以慕義内附非重譯音亦狄鞮音低來觀猛獸熊羆也狄鞮西方之民也夫音扶犀象兕虎南夷之所多也騾音蘆驢音离馲音托駞音跎北狄之常畜也中國所鮮上聲外國賤之南越以孔雀珥音二門户崐山之旁以玉璞抵烏鵲今貴人之所賤珍人之所饒非所以厚中國明盛德也隋和之名寳也而不能安危存亡故喻徳示威惟賢臣良相去聲不在犬馬珍怪是以聖王以賢為寳不以珠玊為寳雜事篇曰齊宣王與魏惠王㑹田於郊魏王曰亦有寳乎齊王曰無有魏王曰若寡人之小國也尚有徑寸之珠照車前後十二乗者十枚奈何以萬乗之國無寳乎齊王曰寡人之所以為寳與王異吾臣有檀子者使之守南城則楚人不敢為冦泗水上有十二諸侯皆來朝吾臣有盼子者使之守髙唐則趙人不敢東漁于河吾臣有黔夫者使之守徐州則燕人祭北門趙人祭西門從而歸之者十千餘家吾臣有種首者使之備盗賊而道不拾遺吾將以照千里之外豈特十二乗哉魏王慙不懌而去詩曰辭之懌矣民之莫矣反質篇曰經侯徃適魏太子左帯羽玊具劔右帯環珮左光照右右光照左坐有頃太子不視也又不問也經侯曰魏國亦有寳乎太子曰有經侯曰其寳何如太子曰主信臣忠百姓上戴此魏之寳也經侯曰吾所問者非是之謂也乃問其器而已太子曰有徒師沼治魏而市無預賈郄辛治陽而道不拾遺芒卯在朝而四鄰賢士無不相因而見此三大夫乃魏國之大寳於是經侯黙然不應左觧玉具右觧環佩委之坐愆然而起黙然不謝趨而出上車驅去魏太子使騎操劔佩逐與經侯使告經侯曰吾無徳所寳不能為珠玉所守此寒不可衣飢不可食無為遺我賊於是經侯杜門不出傳死雜事篇曰秦欲伐楚使使者徃觀楚之寳器楚王聞之召令尹子西而問焉曰秦欲觀楚之寳器吾和氏之璧随侯之珠可以示諸令尹子西對曰不知也召昭奚恤而問焉昭奚恤對曰此欲觀吾國得失而圖之不在寳器在賢臣珠玉玩好之物非寳重者王遂使昭奚恤應之昭奚恤發精兵三百人陳於西門之内為東面之壇一為南面之壇四為西面之壇一秦使者至昭奚恤曰君客也請就上位東面令尹子西南面太宗子敖次之葉公子髙次之司馬子反次之昭奚恤自居西面之壇稱曰客欲觀楚國之寳器楚國之所寳者賢臣也理百姓實倉廩使民各得其所令尹子西在此奉珪璧使諸侯觧忿悁之難交兩國之歡使無兵革之憂太宗子敖在此守封疆謹境界不侵鄰國鄰國亦不見侵葉公子髙在此理師旅整兵戎以當疆敵提抱鼓以動百萬之衆所使皆趨湯火蹈白刃出萬死不顧一生之難司馬子反在此懐覇王之餘議攝治亂之遺風昭奚恤在此唯大國之所觀秦使者戄然無以對昭奚恤遂揖而去秦使者反言於秦君曰楚多賢臣未可謀也遂不伐楚詩云濟濟多士文王以寧斯之謂也語曰黄金累千不如一賢昔晏子修之罇爼之間而折衝乎千里髙誘曰衝車所以衝突敵之軍能陷破之也有道之國不可攻伐使欲攻已者折還其衝車於千里之外不敢來也晏子春秋曰晉平公欲伐齊使范昭徃觀焉景公賜之酒酒酣范昭曰願請君之樽酌公曰酌寡人之樽進之於客范昭已飲晏子曰徹樽更之罇觶具矣范昭佯醉不悦而起舞謂太師曰能為我調成周之樂乎吾為子舞之太師曰冥臣不習范昭趨而出景公謂晏子曰晉大國也使人來將觀吾政也今子怒大國之使者將奈何晏子曰夫范昭之為人非陋而不識禮也且欲試吾君臣故絶之也景公謂太師曰子何以不為客調成周之樂乎太師對曰夫成周之樂天子之樂也若調之必人主舞之今范昭人臣也而欲舞天子之樂臣故不為也范昭歸以告平公曰齊未可伐也臣欲試其君而晏子識之臣欲犯其禮而太師知之仲尼聞之曰夫不出於樽爼之間而知千里之外其晏子之謂也可謂折衝矣而太師其與焉不能者雖隋和滿篋音怯無益於存亡隋和謂隋侯之珠和氏之璧也大夫曰晏子相去聲齊三君崔慶無道刼其君亂其國靈公同圍莊公弑死景公之時晉人來攻取垂都舉臨淄邊邑削城郭焚宫室隳寳器盡何衝之所能折乎由此觀之賢良所言賢人為寳則損益無輕重也賢良曰管仲去魯入齊齊伯音覇魯削非恃其衆而歸齊也伍子胥挾弓干闔閭破楚入郢音影非負其兵而適吳也故賢者所在國重所去國輕雜事篇曰管仲傅齊公子糾鮑叔傅公子小白齊公孫無知殺襄公公子糾奔魯小白奔莒齊人誅無知迎公子糾於魯公子糾與小白争入管仲射小白中其帯鈎小白佯死遂先入是為齊桓公公子糾死管仲奔魯桓公立國定使人迎管仲於魯遂立以為仲父委國而聼之九合諸侯一匡天下為五伯長越絶書曰伍子胥父誅於楚子胥挾弓身干闔廬闔廬曰士之甚勇之甚將為之報仇子胥曰不可諸侯不為匹夫報仇臣聞事君猶事父也虧君之行報父之仇不可於是止楚客説春申君曰昔伊尹去夏之殷殷王而夏亡管仲去魯而入齊魯弱而齊強由是觀之夫賢者之所在其君未嘗不善其國未嘗不安也楚有子玊得臣文公側席虞有宫之竒晉獻不寐尊賢篇曰晉荆戰於邲晉師敗績荀林父將歸請死景公將許之士貞伯曰不可城濮之役晉勝于荆文公猶有憂色曰子玉猶存憂未歇也困獸猶鬪况國相乎及荆殺子玉乃喜曰莫予毒也今天或者大警晉也林父之事君進思盡忠退思補過社稷之衛也今殺之是重荆勝也景公曰善乃使復將泰族訓曰晉獻公欲伐虞宫之竒存焉為之寢不安席食不甘味而不敢加兵焉賂以寶玉駿馬宫之竒諫而不聼言而不用越疆而去荀息伐之兵不血刃抱寳牽馬而去尊賢篇曰虞有宫之竒晉獻公為之終夜不寐楚有子玉得臣文公為之側席而坐逺乎賢者之厭難折衝也夫音扶臣所在辟除開塞者亦逺矣陳琳曰古之用兵敵國雖亂尚有賢人則不伐也是故三仁未去武王還師宮竒在虞晉不加戎季梁猶在强楚挫謀暨至衆賢奔絀三國為墟明其無道有人猶可救也故春秋曰山有虎豹葵藿為之不採國有賢士邊境為之不害也説山訓曰山有猛獸林木為之不斬園有螫虫藜藿為之不採鄭昌傳曰山有猛獸藜藿為之不採國有忠臣姦邪為之不起備胡第三十八大夫曰鄙語曰賢者容不辱以世俗言之鄉曲有桀人尚辟音避之今明天子在上匈奴公為冦侵擾邊境是仁義犯而藜藿不採昔狄人侵太王至公篇曰太王有至仁之恩不忍戰百姓故事勲育戎氏以犬馬珎幣而伐不止問其所欲者土地也於是屬其羣臣耆老而告之曰土地者所以養人也不以所以養而害其養也吾將去之遂居岐山之下邠人負幼扶老從之如歸父母三遷而民五倍其初者皆興仁義趨上之事君子守國安民非特鬪兵罷殺士衆而已不私其身惟民是用保民盖所以去國之義也匡人畏孔子孔子世家曰孔子去衛將適陳過匡顔刻為僕以其䇿指之曰昔吾入此由彼缺也匡人聞之以為魯之陽虎陽虎嘗暴匡人匡人於是遂止孔子孔子狀類陽虎拘焉五日顔淵後子曰吾以汝為死矣顔淵曰子在回何敢死匡人拘孔子益急弟子懼孔子曰文王既沒文不在兹乎天之將喪斯文也後死者不得與于斯文也天之未喪斯文也匡人其如予何孔子使從者為寗武子臣於衛然後得去故不仁者仁之賊也是以縣官厲武以討不義設機械以備不仁賢良曰匈奴處沙漠之中生不食之地天所賤而棄之無壇宇之居男女之別以廣野為閭里以穹廬為家室衣去聲皮䝉毛食肉飲血會市行音杭牧豎音樹居如中國之麋鹿耳好去聲事之臣求其義責之禮使中國干戈至今未息萬里設備此兎罝之所刺故小人非公侯腹心干城也大夫曰天子者天下之父母也四方之衆其義莫不願為臣妾然猶修城郭設闗梁厲武士備衛於宫室所以逺折難去聲而備萬方者也今匈奴未臣雖無事欲釋備如之何賢良曰吳王所以見禽於越者以其越近而陵逺也秦所以亡者以外備胡越而内亡其政也夫音扶用軍於外政敗於内備為所患增主所憂詩序曰文武以天保以上治内采薇以下治外始於憂勤終于逸樂指武篇曰内治未得不可以正外本惠未襲不可以制末是以春秋先京師而後諸夏先諸茟而後夷狄及周惠王以遭亂世繼先王之體而強楚稱王諸侯背叛欲申先王之命一統天下不先廣養京師以及諸夏諸夏以及夷狄内治未得忿則不料力權得失興兵而征強楚師大敗樽辱不行大為天下戮笑幸逢齊桓公以得安尊故内治未得不可以正外本惠未襲不可以制末故人主得其道則遐邇潜行而歸之文王是也不得其道則臣妾為冦秦王是也詮言曰用兵者先為不可勝以待敵之可勝也治國者先為不可奪以待敵之可奪也舜修之歴山而海内從化文王修之岐周而天下從風兵略曰兵之勝敗本在於政政勝其民下附其上則兵强矣民勝其政下畔其上則兵弱矣故徳義足以懐天下之民事業足以當天下之急選舉足以得賢士之心謀慮足以知強弱之勢此必勝之本也地廣人衆不足以為強堅甲利兵不足以為勝髙城深池不足以為固嚴令繁刑不足以為威為存政者雖小必存為亡政者雖大必亡叢談曰所伐而當其福五之所伐不當其禍十之夫音扶文衰則武勝徳盛則備寡汜論曰一世之間而文武代為雌雄有時而用也今世之為武者則非文也為文者則非武也文武更相非而不知時世之用也此見隅曲之一指而不知八極之廣大也故東面而望不見西牆南面而視不覩北方唯無所嚮者則無所不通大夫曰徃者四夷俱强並為冦虐朝鮮踰徼刼燕之東地東越東海略浙江之南南越内侵滑服令氐棘人冉駹音尨嶲音髓唐昆明之屬擾隴西巴蜀今三垂已平唯北邊未定夫音扶一舉則匈奴中外震懼釋備而何寡也賢良曰古者君子立仁修義以綏其民故邇者習善逺者順之傳曰水淵深廣則龍魚生之山林茂盛則禽獸歸之禮義修明則君子懐之故禮及身而行修禮及國而政明能以禮扶身則貴名自揚天下順焉令行禁止而王者之事畢矣詩曰有覺徳行四國順之夫此之謂矣是以孔子仕於魯前仕三月及齊平後仕三月及鄭平務以徳安近而綏逺當此之時魯無敵國之難去聲鄰境之患强臣變節而忠順故季桓隳音灰其都城大國畏義而合好齊人來歸鄆音運讙音歡龜隂之田孔子世家曰定公以孔子為中都宰一年四方皆則之由中都宰為司空由司空為司冦定公十年春及齊平夏齊大夫黎鉏言於景公曰魯用孔丘其勢危齊乃使使告魯為好㑹會於夾谷魯定公且以乗車好徃孔子攝相事曰臣聞有文事者必有武備有武事者必有文備古者諸侯出疆必具官以從請具左右司馬定公曰諾具左右司馬㑹齊侯夾谷為壇位土階三等以會遇之禮相見揖讓而登獻酬之禮畢齊有司趨而進曰請奏四方之樂景公曰諾於是旍旄羽祓矛㦸劔撥鼓噪而至孔子趨而進歴階而登不盡一等舉𬒮而言曰吾兩君為好㑹夷狄之樂何為於此請命有司有司却之不去則左右視晏子與景公景公心怍麾而去之有頃齊有司趨而進曰請奏宫中之樂景公曰諾優倡侏儒為戲而前孔子趨而進歴階而登不盡一䓁曰匹夫而熒惑諸侯者罪當誅請命有司有司加法焉手足異處景公懼而動知義不若歸而恐告其羣臣曰魯以君子之道輔其君而子獨以夷狄之道教寡人使得罪於魯君為之奈何有司進對曰君子有過則謝以質小人有過則謝以文君若悼之則謝以實於是齊侯乃歸所侵魯之鄆汶陽龜隂之田以謝過定公十三年夏孔子言於定公曰臣無藏甲大夫毋百雉之城使仲由為季氏宰將堕三都於是叔孫氏先墮郈季氏將墮費公山不狃叔孫輙率費人襲魯公與三子入于季氏之宫登武子之臺費人攻之弗克入及公側孔子命申句須樂頎下伐之費人北國人追之敗諸姑蔑二子奔齊遂墮費將墮成公歛處父謂孟孫曰墮成齊人必至於北門且成孟氏之保鄣無成是無孟氏也我將弗墮十二月公圍成弗克故為政而以徳非獨辟害折衝也所欲不求而自得今百姓所以囂囂中外不寧者咎在匈奴内無室宇之守外無田疇之積随美草甘水而驅牧匈奴不變業而中國以騷動矣風合而雲解就之則亡擊之則散未可一世而舉也韓安國曰利不什不易業功不百不變常是故古之人君謀事必就聖發政必擇語重作事也自三代之盛逺方夷狄不與正朔服色非威不能制非強不能服也以為逺方絶域不收之民不足以煩中國也且匈奴者輕疾悍亟之兵也畜牧為業弧弓射獵逐獸随草居處無常難得而制也至不及圖去不可追聚若風雨解若收電今使邊鄙久廢耕織之業以支匈奴常事其勢不權臣故曰勿撃為便大夫曰古者明王討暴衛弱定傾扶危衛弱扶危則小國之君説音悦討暴定傾則無罪之人附今不征伐則暴害不息不備則是以黎民委敵也春秋貶諸侯之後刺不卒戍音絮行役戍音絮備自古有之非獨今也賢良曰匈奴之地廣大而戎馬之足輕利其勢易騷動也利則虎曳音異病則鳥折辟音避鋒鋭而牧罷音疲極少發則不足以更適多發則民不堪其役役煩則力罷音疲用多則財乏二者不息則民遺怨此秦之所失民心隕音允社稷也榖梁傳曰財盡則怨力盡則懟主父偃曰怒者逆徳也兵者凶器也争者末節也古之人君一怒必伏尸流血故聖王重行之夫務戰勝窮武事者未有不悔者也昔秦皇帝任戰勝之威蠶食天下并吞戰國海内為一功齊三代務勝不休欲攻匈奴李斯諫曰不可夫匈奴無城郭之居委積之守遷徙易舉難得而制也輕兵深入糧食必絶踵糧以行重不及事得其地不足以為利也遇其民不可役而守也勝必殺之非民父母也靡敝中國快心匈奴非長䇿也秦皇帝不聼遂使䝉恬將兵攻胡辟地千里以河為境地固澤鹹鹵不生五榖然後發天下丁男以守北河暴兵露師十有餘年死者不可勝數終不能踰河而北是豈人衆不足兵革不備哉其勢不可也又使天下蜚芻輓粟起於東腄琅琊負海之郡轉輸河北率三十鍾而致一石男子疾耕不足於糧饟女子紡績不足於帷幕百姓靡敝孤寡老弱不能相養道路死者相望盖天下始畔秦也故兵法曰興師十萬日費千金夫秦嘗積衆暴兵數十萬人雖有覆軍殺將係虜單于之功亦適足以結怨深讐不足以償天下之費夫上虚府庫下敝百姓甘心于外國非完事也古者天子封畿千里繇音遥役五百里勝聲相聞疾病相恤無過時之師無踰時之役内節於民心而事適其力是以行者勸務而止者安業今山東之戎馬甲士戍音絮邊郡者絶殊遼逺身在胡越心懐老母老母垂泣室婦悲恨推其饑渴念其寒苦詩云昔我徃矣楊栁依依今我來思雨雪霏霏行道遲遲載渴載饑我心傷悲莫知我哀故聖人憐其如此閔其久去父母妻子暴露中野居寒苦之地故春使使去聲者勞賜舉失職者所以哀逺民而慰撫老母也漢昭紀曰始元元年赦天下賜民百户牛酒遣故廷尉王平等五人持節行郡國舉賢良問民所疾苦寃失職者徳惠甚厚而吏未稱去聲奉職承詔以存恤或侵侮士卒與之為市并力兼作使之不以理故也士卒失職而老母妻子感恨也宋伯姬愁思而宋國火魯妾不得意而魯寢災春秋曰宋災宋伯姬卒左傳曰或呌于宋太廟曰嘻嘻出出鳥鳴于亳社如曰嘻嘻甲午宋大災宋伯姬卒待姆也君子謂宋共姬女而不婦女待人婦義事也榖梁傳曰取卒之日加之災上者見以災卒也其見以災卒奈何伯姬之舍失火左右曰夫人少辟火乎伯姬曰婦人之義傅母不在宵不下堂左右又曰夫人少辟火乎伯姬曰婦人之義保母不在宵不下堂遂逮乎火而死婦人以貞為行者也伯姬之婦道盡矣詳其事賢伯姬也公羊傳曰宋災伯姬卒焉其稱諡何賢也何賢爾宋災伯姬存焉有司復曰火至矣請出伯姬曰不可吾聞之也婦人夜出不見傳母不下堂傳至矣母未至也逮乎火而死傳曰魯監門之女嬰相從績中夜而泣涕其偶曰何為而泣也嬰曰吾聞衛世子不肖所以泣也其偶曰衛世子不肖諸侯之憂也子曷為泣也嬰曰吾聞之異乎子之言也昔者宋之桓司馬得罪於宋君出於魯其馬佚而𩥇吾園而食吾園之葵是嵗吾聞園人亡利之半越王勾踐起兵而攻呉諸侯畏其威魯徃獻女吾姊與焉兄徃視之道畏而死越兵威者吳也兄死者我也由是觀之禍與福相反也今衛世子甚不肖好兵吾男弟三人能無憂乎詩曰大夫跋渉我心則憂是非類與乎列女傳曰魯漆室邑之女過時未適人倚柱而嘯傍人聞之心莫不為之慘者鄰婦從之遊曰何嘯之悲也子欲嫁乎吾為子求偶漆室女曰吾豈為不嫁之故而悲哉憂吾君老太子少也今天下不得其意者非獨西宫之女宋之老母也春秋動衆則書重民也宋人圍長葛譏久役也春秋曰宋人伐鄭圍長葛榖梁傳曰伐國不言圍邑此其言圍何也久之也伐不踰時戰不逐奔誅不填服苞人民敺牛馬曰侵斬樹木壊宫室曰伐君子之用心必若是大夫黙然不對鹽鐵論卷八
