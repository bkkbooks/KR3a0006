  - {type: variant, offset: 2465, length: 169, content: 今道不舉而務小利慕於不急以亂群意君子雖貧勿為可也藥酒病之利也正言治之藥也公卿誠能自強自忍食文學之至言去權詭罷利官一歸之於民親以周公之道則天下治而頌聲作儒者安得治亂而患之乎取下第四十一大夫曰不軌之民困橈公利而欲擅山澤從文學賢良之意則利歸於下而縣官無可為者上之所行則非之上之所言則譏之專欲損上徇下虧主而適臣尚安得上下之義君臣之禮而何頌聲能作也, SBCK: 哉}
