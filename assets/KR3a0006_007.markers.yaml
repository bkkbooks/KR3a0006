  - {type: variant, offset: 2537, length: 1265, content: 頌聲作儒者安得治亂而患之乎取下第四十一大夫曰不軌之民困橈公利而欲擅山澤從文學賢良之意則利歸於下而縣官無可為者上之所行則非之上之所言則譏之專欲損上徇下虧主而適臣尚安得上下之義君臣之禮而何頌聲能作也賢良曰古者上取有量自養有度樂歲不盜年饑則肆用民之力不過歲三日籍斂不過十一君篤愛臣盡力上下交讓天下平浚發爾私上讓下也遂及我私先公職也孟子曰未有仁而遺其親義而後其君也君君臣臣何為其無禮義乎及周之末塗德惠塞而嗜欲眾君奢侈而上求多民困於下怠於上公是以有履畝之稅碩鼠之詩作也衛靈公當隆冬興眾穿池海春諫曰天寒百姓凍餒願公之罷役也公曰天寒哉我何不寒哉海春曰人之言曰安者不能恤危飽者不能食饑故餘粱肉者難為言隱約處佚樂者難為言勤苦夫高堂邃宇廣廈洞房者不知專屋狹廬上漏下濕者之㿊也繫馬百駟貨財充內儲陳納新者不知有旦無暮稱貸者之急也廣第唐園良田連比者不知無運踵之業竄頭宅者之役也原馬被山牛羊滿谷者不知無孤豚瘠犢者之窶也高枕談臥無叫號者不知憂私責與吏正戚者之愁也被紈躡韋搏粱齧肥者不知短褐之寒糠之苦也從容房闈之間垂拱持案食者不知蹠耒躬耕者之勤也乘堅驅良列騎成行者不知負擔步行者之勞也匡床旃席侍御滿側者不知負輅輓舩登高絕流者之難也衣輕暖被美裘處溫室戴安車者不知乘邊城飄胡代鄉清風者之危寒也妻子好合子孫保之者不知老母之顦顇匹婦之悲恨也耳聽五音目視弄優者不知蒙流矢距敵方外者之死亡也東嚮伏几振筆如調文者不知木索之急箠楚者之痛也坐旃茵之上安圖籍之言若易然亦不知步涉者之難也昔商鞅之任秦也刑人若刈菅茅用師若彈丸從軍旅者暴骨長城戍漕者輦車相望生而往死而旋彼獨非人子耶故君子仁以恕義以度所好惡與天下共之所不施不仁者公劉好貨居者有積行者有囊大王好色內無怨女外無曠夫文王作刑國無怨獄武王行師士樂為之死民樂為之用若斯則民何苦而怨何求而譏公卿愀然寂若無人於是遂罷議止詞奏曰賢良文學不明縣官事猥以鹽鐵為不便請且罷郡國榷沽關內鐵官奏可擊之第四十二賢良文學既拜咸取列大夫辭丞相御史大夫曰前議公事賢良文學稱引往古頗乖世務論者不必相反期於可行往者縣官未事胡越之時邊城四面受敵北邊尤被其苦先帝絕三方之難撫從方國以為蕃蔽窮極郡國以討匈奴匈奴壤界獸圈孤弱無與此困亡之時也遼遠不遂使得復喘息休養士馬負紿西域西域迫近胡寇沮心內解必為臣患是以主上欲掃除煩倉廩之費也終日逐禽罷而釋之則非計也蓋舜紹緒禹成功今欲以軍興擊之何如文學曰異時縣官修輕賦公用饒人富給其後保胡越通四夷費用不足於是興利害筭車舡以訾助邊贖罪告緡與人以患矣甲士死於軍旅中士罷於轉漕仍之以科適吏徵發極矣夫勞而息之極而反本古之道也雖舜禹興不能易也大夫曰昔夏后底洪水之災百姓孔勤罷於籠臿及至其後咸享其功先帝之時郡國頗煩於戎事然亦寬三陲之役語曰見機不遂者隕功一日違敵累世為患休勞用供因弊乘時帝王之道聖賢之所不能失也功業有緒惡勞而不卒猶耕者勌休而困止也夫事輟者無功耕怠者無獲也文學曰地廣而不得者國危兵強而凌敵者身亡虎兕相據而螻蟻得志兩敵相抗而匹夫乘間是以聖王見利慮害見遠存近方今為縣官計者莫若偃兵休士厚幣結和親修文德而已若不恤人之急不計其難弊所恃以窮無, WYG: ''}
