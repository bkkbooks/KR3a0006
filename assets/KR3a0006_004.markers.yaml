  - {type: variant, offset: 2883, length: 307, content: 席天下之勢志小萬乘及其囚於囹圄車裂於雲陽之市亦願負薪入東門行上蔡曲街徑不可得也蘇秦吳起以權勢自殺商鞅李斯以尊重自滅皆貪祿慕榮以沒其身從車百乘曾不足以載其禍也襃賢第十九大夫曰伯夷以廉饑尾生以信死由小器而虧大體匹夫匹婦之為諒也經於溝瀆而莫之知也何功名之有蘇秦張儀智足以強國勇足以威敵一怒而諸侯懼安居而天下息萬乘之主莫不屈體卑辭重幣請交此所謂天下名士也夫智不足與謀而權不能舉當世民斯為下也今舉亡而為有虛而為盈布衣穿履深念徐行若有遺亡非立功成名之士而亦未免於世俗也文學曰蘇秦以從顯於趙張儀以橫任於秦方此之時非不尊貴也然智士隨而憂之知夫不以道進者必不以道退不以義得者必不以義亡季孟之權三桓之富不可及也孔子為之曰微為人臣權均於, WYG: ''}
