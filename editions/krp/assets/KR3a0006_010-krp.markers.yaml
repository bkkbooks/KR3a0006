  - {type: variant, offset: 5655, length: 322, content: 賈誼曰始皇奮六世之餘烈振長䇿而御宇内吞二周而亡諸侯履至尊而制六合執敲朴以鞭笞天下威振四海南取百粤之地以為桂林象郡百粤之君俛首係頸委命下吏乃使䝉恬北築長城而守藩籬却匈奴七百餘里胡人不敢南下而牧馬士不敢彎弓而報怨於是廢先王之道燔百家之言以愚黔首墮名城殺豪俊收天下之兵聚之咸陽銷鋒鍉鑄以為金人十二以弱天下之民然後踐華為城因河為池據億丈之城臨不測之谿以為固良將勁弩守要害之處信臣精卒陳利兵而誰何天下已定始皇之心自以為闗中之固金城千里子孫帝王萬世之業也始皇旣沒餘威振于殊俗然而陳涉甕牗䋲樞之子氓𨽻之人而遷徙之徒也材能不及非有仲弓墨翟之賢陶朱猗頓之富躡足行伍之間俛起阡陌之中卒疲散之卒轉而攻秦斬木為兵揭竿為旗天下雲合而響應褁糧而景從山東豪傑遂並起而亡秦族矣, SBCK: ''}
