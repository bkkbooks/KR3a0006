  - {type: variant, offset: 741, length: 0, content: '', WYG: 詩傳曰扁鵲過趙趙王太子暴疾而死鵲造宫門曰吾聞國中卒有壤土之事得無有急乎中庶子之好方者應之曰然王太子暴疾而死扁鵲日入言鄭醫秦越人能活太子中庶子難之曰吾聞上古之為醫曰苗父苗父之為醫也以菅為席以芻為狗北面而祝發十言耳諸扶而來者舉而來者皆平復如故子之方能如此乎扁鵲曰不能乂曰吾聞中古之為醫者曰俞柎俞柎之為醫也搦腦髓來肓莫炊灼九竅而定經絡死人復為生人故曰俞柎子之方能若是乎扁鵲曰不能中庶子曰子之方如此譬若以管窺天以錐刺地所窺者甚天所見者甚少鈞若子之方豈足以變駭童子哉扁鵲曰不然物故有昧揥而中蛟頭掩目而别白黒者太子之疾所謂尸厥者也以為不然入􅐷之太子股隂當温耳中焦焦如有嘯者聲然者皆可治也中庶子入報趙王趙王跣而趨出門曰先生逺辱幸臨寡人先生幸而有之則糞土之息得䝉天履地而長為人矣先生不有之則先犬馬填溝壑矣言未巳涕泣沾襟扁鵲遂為􅐷之先造軒光之竈八成之湯砥針礪石取三陽五輸子容禱藥子明吹耳陽儀反神子越扶形子游矯摩太子遂得復生天下聞之皆曰扁鵲能生死人鵲辭曰子非能生死人也特使夫當生者活耳夫死者猶不可藥而生也悲夫亂君之治不可藥而息也詩曰多將熇熇不可救藥甚之之辭也下蔡威公曰病之將死也不可為良醫國之將亡也不可為計謀}
