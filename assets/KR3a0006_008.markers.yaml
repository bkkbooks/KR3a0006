  - {type: variant, offset: 1139, length: 0, content: '', WYG: 昭奚恤曰君客也請就上位東面令尹子西南面太宗子敖次之葉公子髙次之司馬子反次之昭奚恤自居西面之壇稱曰客欲觀楚國之寳器楚國之所寳者賢臣也理百姓實倉廩使民各得其所令尹子西在此奉珪璧使諸侯觧忿悁之難交兩國之歡使無兵革之憂太宗子敖在此守封疆謹境界不侵鄰國鄰國亦不見侵葉公子髙在此理師旅整兵戎以當疆敵提抱鼓以動百萬之衆所使皆趨湯火蹈白刃出萬死不顧一生之難司馬子反在此懐覇王之餘議攝治亂之遺風昭奚恤在此唯大國之所觀秦使者戄然無以對昭奚恤遂揖而去秦使者反言於秦君曰楚多賢臣未可謀也遂不伐楚詩云濟濟多士文王以寧斯之謂也語曰黄金累千不如一賢昔晏子修之罇爼之間而折衝乎千里髙誘曰衝車所以衝突敵之軍能陷破之也有道之國不可攻伐使欲攻已者折還其衝車於千里之外不敢來也晏子春秋曰晉平公欲伐齊使范昭徃觀焉景公賜之酒酒酣范昭曰願請君之樽酌公曰酌寡人之樽進之於客范昭已飲晏子曰徹樽更之罇觶具矣范昭佯醉不悦而起舞謂太師曰能為我調成周之樂乎吾為子舞之太師曰冥臣不習范昭趨而出景公謂晏子曰晉大國也使人來將觀吾政也}
