  - {type: variant, offset: 11698, length: 943, content: 韓䇿曰韓傀相韓嚴遂重於君二人相害也嚴遂政議直指舉韓傀之過韓傀以之叱之於朝嚴遂㧞劒趨之以救解於是嚴遂懼誅亡去游求人可以報韓傀者至齊齊人或言軹深井里聶政勇敢士也避仇隠於屠者之間嚴遂隂交於聶政以意厚之聶政問之曰子欲安用我乎嚴遂曰吾得為役之日淺事今薄奚敢有請於是嚴遂乃具酒自觴聶政母前仲子奉黄金百鎰前為聶政母夀聶政驚愈恠其厚固謝嚴仲子仲子固進而聶政謝曰臣有老母家貧客游以為狗屠可旦夕得甘脆以養親親供養備義不敢當仲子之賜嚴仲子辟人因為聶政語曰臣有仇而行游諸侯衆矣然至齊聞足下義甚髙故直進百金者特以大人麤糲之費以交足下之讙豈敢以有求邪聶政曰臣所以降志辱身居市井屠者幸以養老母老母在前政身未敢以許人也嚴仲子固讓聶政竟不肯受然仲子卒備賔主之禮而去乆之聶政母死既葬除服聶政曰嗟乎政乃市井之人鼓刀以屠而嚴仲子乃諸侯之卿相也不逺千里枉車騎而交臣臣之所以待之者至淺矣未有大功可以稱者而嚴仲子舉百金為親壽我義不受然是深知政也夫賢者以感忿睚眦之意而親信窮僻之人而政獨安可嘿然而止乎且前日要政政徒以老母老母今以天年終政將為知己者用遂西至濮陽見嚴仲子曰前日所以不許仲子者徒以親在今親不幸而死仲子所欲報仇者請得從事焉嚴仲子具告曰臣之仇韓相韓傀傀又韓君之季父也宗族盛多居處兵衞甚設臣使人刺之終莫能就今足下幸而不棄請益具車騎壯士以為羽翼政曰韓與衞相去中間不逺今殺人之相相乂國君之親此其勢不可以多人多人不能無生得失生得失則語泄語泄則韓舉國而與仲子為讐也豈不殆哉遂謝車騎人徒辭獨行仗劒至韓韓適有東孟之㑹韓王及相皆在焉持兵㦸而衛侍者甚衆聶政直入階刺殺韓傀韓傀走而就列侯聶政刺之兼中列侯左右大亂聶政大呼所擊殺者數十人因自面皮抉眼屠腸遂以死韓取聶政屍暴於市縣購之千金乆之莫知誰政姊嫈聞之曰吾弟至賢不可愛妾之軀滅吾弟之名非弟意也乃之韓視之曰勇哉氣矜之隆是其軼賁育髙成荆矣今死而無名父母既殁矣兄弟無有此為我故也夫愛身不揚弟之名吾不忍也乃抱屍而哭之曰此吾弟軹深井里聶政也亦自殺於屍下晉楚齊衞聞之曰非獨聶政之能乃其姊者列女也聶政之所以名施於後世者其姊不避葅酢之誅以揚其名也唐睢曰専諸之要刺王僚也彗星襲月聶政之刺韓傀也白虹貫日離之刺慶忌也倉鷹擊於殿上此三子皆布衣之士也懐怒未發休䘲降於天吕氏春秋曰豫讓必死於襄子而趙氏皆恐成荆致死於韓王而周人皆畏, SBCK: ''}
