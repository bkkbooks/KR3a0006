  - {type: variant, offset: 105, length: 0, content: '', WYG: 鋌箭足入槀中者也匹夫賤之工人施巧人主服而朝音潮也夫音扶醜者自以為姣音交故不飾愚者自以為知去聲故不學觀笑在已而不自知不好去聲用人自是之過也訟賢第二十二大夫曰剛者折柔者卷故季由以强梁死宰我以柔弱殺汜論曰聖人之道寛而栗嚴而温柔而直猛而和太剛則折太柔則巻聖人正在剛柔之間乃得道之本積隂則沈積陽則飛隂陽相接乃能成和故恩推則懦懦則不威嚴推則猛猛則不和愛推則縦縦則不令刑推則虐虐則無親昔者齊簡公釋其國家之柄而專}
