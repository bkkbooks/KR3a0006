  - {type: variant, offset: 956, length: 287, content: 得其道則臣妾為寇秦王是也夫文衰則武勝德盛則備寡大夫曰往者四夷俱強並為寇虐朝鮮踰徼劫燕之東地東越越東海略浙江之南南越內侵滑服令氐僰冉駹嶲唐昆明之屬擾隴西巴蜀今三垂已平唯北邊未定夫一舉則匈奴震懼中外釋備而何寡也賢良曰古者君子立仁修義以綏其民故邇者習善遠者順之是以孔子仕於魯前仕三月及齊平後仕三月及鄭平務以德安近而綏遠當此之時魯無敵國之難鄰境之患強臣變節而忠順故季桓隳其都城大國畏義而合好齊人來歸鄆讙龜陰之田故為政而以德非獨辟害折衝也所欲不求而自得今百姓所以囂囂中外不寧者咎在匈奴內無室宇之守外無田疇之積隨美草甘水而驅牧匈奴不變業而中國以搔動矣風合而雲解就之則亡擊之則散未可一世而, SBCK: 稱}
