  - {type: variant, offset: 426, length: 0, content: '', krp: 乎齊輯之于轡銜之際而急緩之于脣吻之和正度于胷臆之中而執節於掌握之間内得于心中外合于馬志是故能進退履繩而旋曲中規取道致逺而氣力有餘誠得其術也體離車輿之安而手失駟馬之心而能}
  - {type: variant, offset: 427, length: 0, content: '', WYG: 危者古今未有也春秋刺譏不及庻人責其率也故古者大夫將臨刑聲色不御刑以當矣猶三廵而嗟嘆之其耻不能以化而傷其不全也王制曰刑者侀也侀者成也一成而不可變故君子盡心焉曽子曰上}
  - {type: variant, offset: 427, length: 0, content: '', krp: 危者古今未有也春秋刺譏不及庻人責其率也故古者大夫將臨刑聲色不御刑以當矣猶三廵而嗟嘆之其耻不能以化而傷其不全也王制曰刑者侀也侀者成也一成而不可變故君子盡心焉曽子曰上}
  - {type: variant, offset: 428, length: 1, content: 和, WYG: 其道民散久矣如得其情則哀矜而勿喜政教闇而不著百姓顛蹶音决而不扶猶赤子臨井焉聽其入也若此則何以為民父母康誥曰若保赤子孟子曰彼有取爾也赤子匍匐將入并非赤子之罪也又曰人皆有不忍人之心所以謂人皆有不忍人之心者今人乍見孺子將入於并皆有怵愓惻隐之心無惻隐之心非人也故君子急於教緩於刑刑一而正百殺一而慎萬是以周公誅管蔡而子産誅鄧晳也指武篇曰齊人王滿生見周公周公出見之曰先生逺辱何以教之王滿生曰言内事者於内言外事者於外今言内事乎言外事乎周公導入王滿生曰敬從布席周公不導坐王滿生曰言大事者坐言小事者倚今言大事乎言小事乎周公導坐王滿生坐周公曰先生何以教之王滿生曰臣聞}
