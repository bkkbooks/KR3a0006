  - {type: variant, offset: 52, length: 1, content: 聲, SBCK: 高逝者知其害身也夫爲烏鵲魚鱉食香餌而後狂飛奔走遜頭屈遰}
  - {type: page-break, offset: 52, content: '', id: KR3a0006_SBCK_004-11b}
