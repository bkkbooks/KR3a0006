  - {type: variant, offset: 15620, length: 405, content: 樂毅曰賢聖之君不以禄私親其功多者賞之其能當者處之故察能而授官者成功之君也論行而結交者立名之士也韓非子曰夫物者有所宜材者有所施各處其宜故上下無為使雞司夜狸執䑕皆用其能上乃無事泰族訓曰或輕或重或貪或亷此四者相反而不可一無也輕者欲發重者欲止貪者欲取亷者不利非其有故勇者可令進鬭而不可令持牢重者可令埴固而不可令凌敵貪者可令進取而不可令守職亷者可令守分而不可令進取信者可令持約而不可令應變五者相反聖人兼用而財使之夫天地不包一物隂陽不生一類海不讓水潦以成其大山不讓土石以成其高夫守一隅而遺萬方取一物而棄其餘則所得者鮮而所治者淺矣道應訓曰聖人之處世不遺有技能之士老子曰人無棄人物無棄物主術訓曰積力之所舉無不勝也衆智之所為無不成也聾者可令嗺筋而不可使有聞也喑者可令守圉而不可使有言也是故有一形者處一位有一能者服一事力勝其任則舉之者不重也能稱其事則為之者不難也無大小修短各得其宜則天下一齊無以相過也聖人兼而用之故無棄才鹽鐡論卷七, SBCK: ''}
