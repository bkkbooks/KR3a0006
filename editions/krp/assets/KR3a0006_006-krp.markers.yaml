  - {type: variant, offset: 6367, length: 490, content: 侯范睢傳曰范睢日益親復說用數年矣因請間說曰臣居山東時聞齊之有田文不聞其有王也聞秦之有太后穰侯華陽髙陵涇陽不聞其有王也夫擅國之謂王能利害之謂王制殺生之威之謂王今太后多擅行不顧穰侯出使不報華陽涇陽等撃㫁無諱髙陵進退不請四貴備而國不危者未之有也為此四貴者下乃所謂無王也然則權安得不傾令安得従王出乎臣聞善治國者乃内固其威而外重其權穰侯使者操王之重决制於諸侯剖符於天下政適伐國莫敢不聼戰勝攻取則利歸於陶國弊御於諸侯戰敗則結怨於百姓而禍歸於社稷詩曰木實繁者披其枝披其枝者傷其心大其都者危其國尊其臣者卑其主崔杼淖齒管齊射王股擢王筋縣之於廟梁宿昔而死李兌管趙囚主父於沙丘百日而餓死今臣聞秦太后穰侯用事髙陵華陽涇陽佐之卒無秦王此亦淖齒李兌之類也且夫三代所以亡國者君專授政縦酒馳騁弋獵不聼政事其所授者妬賢嫉能御下蔽上以成其私不為主計而主不覺悟故失其國今自有秩以上至諸大吏下及王左右無非相國之人者是王獨立於朝臣竊為王恐萬世之後有秦國者非王子孫也昭王聞之大懼曰善於是廢太后逐穰侯髙陵華陽涇陽君於闗外秦王乃拜范睢為相収穰侯之印使歸陶因使縣官給車牛以徙千乘有餘到闗闗閱其寶器寶器珍怪多於王室秦封范睢以應號為應, SBCK: ''}
