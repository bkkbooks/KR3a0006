  - {type: variant, offset: 1243, length: 0, content: '', WYG: 秦䇿曰衞鞅亡魏入秦孝公以為相封之於商號曰商君商君治秦法令至行公平無私罰不諱强大賞不私親近法及太子黥劓其傅朞年之後道不拾遺民不妄取兵革大强諸侯畏懼然刻深寡恩特以强行之耳孝公行之八年疾且不起欲傳商君辭不受孝公已死惠王代後蒞政有頃商君告歸人説惠王曰大臣太重者國危左右太親者身危今秦婦人嬰兒皆言商君之法莫言大王之法是商君反為主大王更為臣也且夫商君固大王之仇讐也願大王圖之商君歸還惠王車裂之而秦人不憐}
