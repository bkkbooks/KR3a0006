  - {type: variant, offset: 722, length: 3, content: 陘隧墨, WYG: 之然陳渉率散亂之衆數百奮臂大呼不用弓㦸之兵鉏耰白挺望屋而食横行天下秦人阻嶮不守闗梁不閉長㦸不刺彊弩不射楚沛深入戰於鴻門曾無藩籬之難也周謹小而得大秦欲大而亡小語曰前車覆後車戒殷監不逺在夏后之世矣傳曰昔者禹以夏王桀以夏亡湯以殷王紂以殷亡故無常安之國宜治之民得賢則昌不肖則亡自古及今未有不然者也夫明鏡者所以照形也徃古者所以知今也夫知惡往古之所以危亡而不襲蹈其所以安存者則無以異乎却行而求逮於前人鄙語曰不知為吏視已成事或曰前車覆而後車不誡是以後車覆也故夏之所以亡者而殷為之殷之所以亡者而周為之故殷可以鑒於夏而周可以鑒於殷詩曰殷鑒不逺在夏后之世蔡澤曰鑒於水者見面之容鑒於人者知吉與凶誅秦第四十四大夫曰秦楚燕齊周之封國也三晉之君齊之田氏諸侯家臣也内守其國外伐不義地廣壤進故立號萬乗去聲而為諸侯宗周室修禮長音掌文然國翦弱不能自存東攝六國西畏於秦身以放遷宗廟絶祀頼先帝大惠紹興其後封嘉潁川號周}
