  - {type: variant, offset: 6528, length: 289, content: 仲尼弟子列傳孔子曰受業身通者七十有二人皆異能之士也孔子世家曰楚昭王將以書社地七百里封孔子楚令尹子西曰王之使使諸侯有如子貢者乎曰無有王之輔相有如顔回者乎曰無有王之將率有如子路者乎曰無有王之官尹有如宰予者乎曰無有且楚之祖封於周號為子五十里今孔丘述三王之法明周召之業王若用之則楚安得世世堂堂方數千里乎夫文王在豐武王在鎬百里之君卒王天下今孔丘得據土壤賢弟子為佐非楚之福也昭王乃止吕氏春秋曰孔墨布衣之士也萬乗之主千乗之君不能與之爭士也劉向曰春秋之後衆賢輔國者既没而禮義衰矣孔子雖論詩書定禮樂王道燦然分明以匹夫無勢化之者七十二人而已皆天下之俊也時君莫尚之是以王道遂用不興故曰非威不立非勢不行, SBCK: ''}
