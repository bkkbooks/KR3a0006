  - {type: variant, offset: 2667, length: 1, content: 歲, krp: 嵗}
  - {type: variant, offset: 2671, length: 0, content: '', WYG: 也左傳曰魯昭公十七年秋郯子來朝公與之宴昭子問焉曰少皥氏鳥名官何故也郯子曰吾祖也我知之昔者黄帝氏以雲紀故為雲師而雲名炎帝氏以火紀故為火師而火名共工氏以水紀故為水師而水名大皡氏以龍紀故為龍師而龍名我高祖少皡摯之立也鳯鳥適至故紀於鳥而鳥名鳯鳥氏歴正也𤣥鳥氏司分者也伯趙氏司至者也青鳥氏司啓者也丹鳥氏司閉者也祝鳩氏司徒也鵬鳩氏司馬也鳲鳩氏司空也爽鳩氏司寇也鶻鳩氏司事也五鳩鳩民者也五雉為五工正利器用正度量夷民者也九扈為九農正扈民無淫者也自顓頊以來不能紀逺乃紀於近為民師而命以民事則不能故}
