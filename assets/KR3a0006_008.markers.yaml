  - {type: variant, offset: 1540, length: 0, content: '', SBCK: 共其地居是世也非有災害疾疫獨以貧窮非惰則奢也無竒業旁入而猶以冨給非儉則力也今日施惠悅爾行刑不樂則是閔無行之人而養惰奢之民也故妄予不爲惠惠惡者不爲仁賢良曰三代之盛無亂萌敎也夏商之季世無順民俗也是以王者設庠序明教化以防道其民及政教之洽性仁而喻善故禮義立則耕者讓於野禮義壞則君子爭於朝人爭則亂亂則天下不均故或貧或富富則仁生贍則民爭止昏暮叩人門戸求水火貪夫不恡何則所饒也夫爲政而使菽粟如水火民安有不仁者乎大夫曰􅀶戯馳逐之徒皆富人子弟非不足者也故民饒則僣侈冨則驕奢坐而委蛇起而爲非未見其仁也夫居事不力用財不節雖有財如水火窮乏可立而待也有民不畜有司雖助之耕織其能足之乎賢良曰周公之相成王也百姓饒樂國無窮乏人非代之耕織也易其田疇薄其税歛則民冨矣上以奉君親下無饑寒之憂則敎可成也語曰既富矣又何加焉曰教之以德}
