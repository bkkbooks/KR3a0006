  - {type: variant, offset: 1095, length: 1, content: 庶, SBCK: 庻}
  - {type: variant, offset: 1095, length: 0, content: '', WYG: 庻人盗劉向曰周天子使家父毛伯求金於諸侯春秋譏之故天子好利則諸侯貪諸侯貪則大夫鄙大夫鄙則庻人盗上之變下猶風之靡草也故為人君者明貴徳而賤利以道下下之為惡尚不可止今隐公貪利而身自漁濟上而行八佾以此化於國人國人安得不解於義解於義而縱其欲則災害起而臣下僻矣故其元年始書􅑺言災害將起國家將亂云爾司馬遷曰余讀孟子書至梁惠王問何以利吾國未嘗不廢書而歎也曰嗟乎利誠亂之始也夫子罕言利者常防其原也故曰放於利而行多怨自天子至於}
