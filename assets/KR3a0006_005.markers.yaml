  - {type: variant, offset: 925, length: 0, content: '', WYG: 言者所以通己扵人也聞者所以通人扵己也瘖者不言聾者不聞既瘖且聾人道不通故有瘖聾之病者雖破家求醫不顧其費豈獨形骸有瘖聾哉心志亦有之夫指之拘者莫不事申也心之塞也莫之務通也不眀扵類也齊俗訓曰其見不逺者不可與語大其智不閎者不足與論至繆稱訓曰察一曲者不可與言化審一時者不可與言大南華經曰井蛙不可以語扵海者拘扵隘也夏蟲不可以語扵寒者篤扵時也曲士不可以語扵道者束扵教也夫音扶}
