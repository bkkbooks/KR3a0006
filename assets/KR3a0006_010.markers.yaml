  - {type: 'tls:seg', offset: 4441, content: '', id: KR3a0006_tls_010-32a.15}
  - {type: variant, offset: 4441, length: 2, content: 徐穀, WYG: 之劒可負而㧞王從其計軻不解琴故及於難使專諸空拳不免於為禽左傳作鱄設諸禽通作擒要離無水不能遂其功刺客傳曰伍子胥知公子光之欲殺呉王僚乃曰彼光將有内志未可說以外事乃進專諸於公子光光既得專諸善客待之九年而楚平王死春呉王僚欲因楚䘮使其二弟公子盖餘屬庸將兵圍楚之潜使延陵季子於晉以觀諸侯之變楚發兵絶呉將盖餘屬庸路呉兵不得還於是公子光謂專諸曰此時不可失不求何獲且光真王嗣當立季子雖來不吾廢也專諸曰王僚可殺也母老子弱而兩弟將兵伐楚楚絶其後方今呉外困於楚而内空無骨鯁之臣是無如我何公子光頓首曰光之身子之身也四月丙子光伏甲士於窟室中而具酒請王僚王僚使兵陳自宫至光之家門戸階陛左右皆王僚之親戚也夾立侍皆持長鈹酒既酣公子光為足疾入窟室中使專諸置匕首魚炙之腹中而進之既至王前專諸擘魚因以匕首刺王僚王僚立死左右亦殺專諸王人擾亂公子光出其伏甲以攻王僚}
