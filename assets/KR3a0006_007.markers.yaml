  - {type: variant, offset: 809, length: 0, content: '', WYG: 聖人為之制度以坊古防字之泰族訓曰良匠不能斵金巧冶不能鑠木金之勢不可斵而木之性不可鑠也埏埴而為器窬木而為舟鑠鐵而為月鑄金而為鐘因其可也駕馬服牛令雞司夜令狗守門因其然也民有好色之性故有大婚之禮有飲食之性故有大饗之誼有喜樂之性故有鐘鼓筦絃之音有悲哀之性故有衰絰哭踊之節故先王之制法也因民之所好而為之節文者也因其好色而制婚姻之禮故男女有别因其喜音而正雅頌之聲故風俗不流因其寧家室樂妻子敎之以順故父子有親因其喜朋友而教之以悌故長㓜有序然後修朝聘以明貴賤鄉飲習射以明長㓜時搜振旅以習用兵也入學庠序以修人倫此皆人之所有於性而聖人之所匠成也傳曰人有六情目欲視好色耳欲聼宫商鼻欲嗅芬香口欲嗜丼㫖其身體四肢欲安而不作衣欲被文繡而輕煖此六者民之六情也失之則亂從之則穆故聖王之敎其民也必因其情而節之以禮必從其欲而制之以義義簡而備禮易而法去情不逺故民之從命也速孔子知道之易行曰詩云牖民孔易非虚辭也間音諫者士大夫務於權利怠於禮義故百姓倣傚頗踰制度今故陳之曰古者榖物菜果不時不食鳥獸魚鱉不中去聲殺不食故繳網不入於澤雜毛不取王制曰五榖不時果實未熟不粥於市木不中伐不粥於市禽獸魚鼈不中殺不粥於市今富者遂驅殱音尖網罝掩捕麑鷇音冦躭音耽湎沉猶鋪百川鮮羔䍮音兆􅶢音幾胎扁皮黄口春鵝秋雛冬葵温韭浚芘音疪蓼蘇豐奕耳菜毛果蟲貉古者采椽茅茨陶桴復穴足禦寒暑蔽風雨而已及其後世采椽不斵音卓茅茨不剪無斵音卓削之事磨礱之功大夫達棱楹士頴音影首庶人斧成木構而已今富者井幹增梁井幹復屋熒井刻花置其中也雕文檻修雕文雕鏤文章也􅀢音珎憂壁飾古者衣服不中去聲制器械不中去聲用不粥於市王制曰用器不中度不粥於市兵車不中度不粥於市布帛精麤不中數幅廣狭不中量不粥於市姦色亂正色不粥於市今民間雕琢不中去聲之物刻畫音壊無用之器玩好𤣥黄雜青五色繡衣戲弄蒲人雜婦百獸馬戲鬬虎唐銻音提追人竒蟲胡妲古者諸侯不秣馬天子有命以車就牧庶人之乗者馬足以代其勞而已故行則服扼止則就犁今富者連車列騎驂貳輜音之軿音駢中者微輿短轂煩尾掌蹄夫音扶一馬伏􅇫當去聲中家六口之食亡丁男一人之事古者庶人耋老而後衣去聲絲其餘則麻枲音徙而已故命曰布衣及其後則絲裏枲表直領無禕音揮袍合不縁夫音扶羅紈文繡者人君后妃之服也繭紬縑練者婚姻之嘉飾也是以文繒音曾薄織不粥於市今富者縟繡羅紈中者素綈音啼錦氷常民而被后妃之服褻人而居婚姻之飾夫音扶紈素之賈倍縑縑之用倍紈也古者椎車無柔棧音湛輿無植及其後木軨音零不衣長轂數幅蒲薦苙音立蓋蓋無染絲之飾大夫士則單椱木具盤韋柔革常民染輿大軨蜀輪今庶人富者銀黄華左搔結綏韜杠中者錯鏕音鹿塗采珥音二靳飛鈴古者鹿裘皮冐蹄足不去及其後大夫士狐貉縫腋羔麑豹祛庶人則毛絝音庫衳音鍾彤音同樸羝皮傳今富者鼲音渾鼯音吾狐白鳬翥音註中者罽音計衣金縷燕䶅音喝代黄古者庶人賤騎繩控革鞮音低皮廌而已及其後革鞍氂音茅成鐡鑣不飾今富者􅀈音劇耳銀鑷音聶䪉音列黄金琅勒罽音計繡弇音掩汙垂珥音二胡鮮中者染緯紹系采畫音壊暴乾古者汙尊坏飲葢無爵觴樽爼及其後庶人器用即行桞陶瓠而已唯瑚璉觴豆而後彫文彤漆今富者銀口黄耳金罍玉鍾中者舒玉紵器金錯蜀杯夫音扶一文杯得銅杯十賈通作價賤而用不殊箕子之譏始在天子今在匹夫宋世家曰紂始為象箸箕子歎曰彼為象箸必為玉杯為杯則必思逺方珍怪之物而御之輿馬宫室之漸自此始不可振也韓非子曰昔者紂為象箸而箕子怖以為象箸必不加於土鉶必將犀玉之杯象箸玉杯必不羮菽藿則必旄象豹胎必不衣短褐而食於茅屋之下則錦衣九重廣室廣室高臺吾畏其卒故怖其始故箕子見象箸以知天下之禍故曰見小曰明古者燔黍食稗而熚音畢豚以相饗其後鄉人飲酒老者重豆少者立食一醬一肉旅飲而已及其後賔婚相召則豆羮白飯綦膾熟肉今民間酒食殽旅重疊燔炙滿案臑音如鼈膾腥麑卵鶉音純鷃音晏撜抅鮐音台鱧音禮醢音海醯音希衆物雜味古者庶人春夏耕耘秋冬收藏昏晨力作夜以繼日詩云晝爾于茅宵爾索綯亟其乗屋其始播百榖非膢音婁臘不休息非祭祀無酒肉今賔昏酒食接連相因折醒什半棄事相隨慮無之日古者庶人糲食藜藿非鄉飲酒膢臘祭祀無酒肉故諸侯無故不殺牛羊大夫士無故不殺犬豕王制曰諸侯無故不殺牛大夫無故不殺羊士無故不殺犬豕庶人無故不食珎今閭巷縣伯阡陌屠沽無故烹殺相聚野外負粟而往挈肉而歸夫音扶一豕之肉得中年之收十五斗粟當去聲丁男半月之食古者庶人魚菽之祭春秋修其祖祠士一廟大夫三以時有事于五祀月令曰孟春之月其祀户孟夏祀竈中央祀中霤孟秋祀門孟冬祀行謂之五祀葢無出門之祭今富者祈名嶽望山川椎牛擊鼓戯倡舞像中者南居當路水上雲臺屠羊殺狗皷瑟吹笙貧者雞豕五芳衛保散臘傾葢社塲古者徳行去聲求福故祭祀而寛仁義求吉故卜筮而希今世俗寛於行去聲而求於鬼怠於禮而篤於祭嫚音慢親而貴勢至妄而信日聼馳音移言而幸得出實物而享虗福古者君子夙夜孳孳思其徳}
