  - {type: variant, offset: 2432, length: 337, content: 貨殖傳曰魯人俗儉嗇而曹邴氏尤甚以鐡冶起富至巨萬然家自父兄子孫約俛有拾仰有取貰貸行賈徧郡國鄒魯以其故多去文學而趨利者以曹邴氏也或曰以興富於臨朐故曰朐邴呉王傳曰呉有豫章郡銅山濞則招致天下亡命者益鑄錢煑海水為鹽以故無賦國用益饒漢紀曰孝景三年春呉王濞反初上為太子時呉王太子入朝與上博争道無禮於上上以博局擲之而死送䘮至呉呉王怒曰天下一家何必來葬復遣還長安後稱疾不朝隂懐逆謀時齊人鄒陽淮隂人枚乗皆逰呉數諫不聽於是楚趙有罪見削呉王恐禍及身已為使者自見膠西王合謀發使約諸侯七國同謀南使南越北連匈奴伍被曰呉王賜號為劉氏祭酒受几杖而不朝王四郡之衆地方數千里采山銅以為錢煑海水以為鹽伐江陵之木以為船國富民衆行珍寶賂諸侯與七國合謀舉兵而西破大梁敗狐父奔走而還為越所禽死於丹徒頭足異處身㓕祀絶為天下戮, SBCK: ''}
