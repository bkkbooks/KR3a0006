  - {type: variant, offset: 719, length: 0, content: '', WYG: 夫音扶山東天下之腹心賢士之戰塲也高皇帝龍飛鳯舉於宋楚之間山東子弟蕭曹樊酈滕灌之屬為輔雖既異世亦即閎夭太顛而已班固曰高祖起於布衣之中奮劒而取天下不由唐虞之禪不階湯武之王龍行虎變卒從風雲征亂伐暴廓清帝宇八載之間海内克定遂荷天之衢登建皇極上古以来書籍所載未嘗有也非雄俊之材寛明之畧歴數所授神祇所相安能致功如此夫帝王之作必有神人之助非徳無以建業非命無以定衆或以文昭或以武興或以聖立或以人崇焚魚斬蛇異功同符豈非精靈之感哉書曰天工人其代之易曰湯武革命順乎天而應乎人其斯之謂乎蕭曹樊酈滕灌之屬謂鄼侯蕭何平陽侯曹參舞陽侯樊噲曲周侯酈商汝隂侯滕公頴隂侯灌嬰也禹出西羌文王生北夷戴叔鸞傳云大禹生西羌帝王世紀曰伯禹生於石坳水經注云禹生于蜀之廣柔縣石紐村今之石泉縣也石紐村今之石鼓山其山朝暮二時有五色霞氣孟子曰文王生於岐周余氏解云周自古公遷於岐山之下周原故號岐周即今鳯翔府岐山縣也地與畎夷近故曰北夷然聖徳髙世有萬人之才負迭羣之任迭通作軼相過也出入都市一旦不知返數然後終於厮音斯役而已僕雖不生長音掌京師才駑音奴下愚不足以大議竊者以聞閭里長音掌老之言往者常民衣服温暖而不靡器質朴牢而致用衣足以蔽體噐足以便事馬足以易步車足以自載酒足以合歡而不湛音酖樂足以理心而不滛入無宴樂音洛之聞出無佚音逸遊之觀行即負羸音縲止作鋤耘用約而財饒夲修而民富送死哀而不華養生適而不奢大臣正而無欲執政寛而不苛故黎民寧其性百吏保其官建元始崇文修徳天下乂安其後邪臣各以伎藝虧亂至治外障音瘴山海内興諸利楊可勝告緡江充禁服張大夫革令杜周治獄罰贖科適微細並行不可勝音升載夏蘭之屬妄搏音博王溫舒之徒妄殺殘吏萌起擾亂良民平凖書曰縣官悉禁郡國無鑄錢専令上林三官鑄錢既多而令天下非三官錢不得行諸郡國所前鑄錢皆廢銷之輸其銅三官而民之鑄錢益少計其費不能相當唯真工大姦乃盗為之楊可告緡徧天下中家以上大抵皆遇告杜周治之獄少反者江充傳曰上拜充為直指繡衣使者督三輔盗賊禁察踰侈貴戚近臣多奢僣充皆舉劾奏請沒入車馬令身待北軍擊}
