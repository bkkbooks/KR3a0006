  - {type: variant, offset: 91, length: 1, content: 危, WYG: 禮或死或亡二三子殊路何道之悖也文學曰宋襄公知孔父音甫之賢而不早任故身死魯莊知季友之賢授之政晚而亂尊賢篇曰國家之任賢而吉任不肖而凶案往世而視已事其必然也如合符此為人君者不可以不慎也國公惛亂而良臣見魯國大亂季友之賢見僖公即位而任季子魯國安寕外内無憂行政二十一年季子之卒後邾擊其南齊伐其北魯不勝其患將乞師於楚以取全耳故傳曰患之起必自此始也公子買不可使成衞公遂不聽君命而擅之晋内侵於臣下外困於兵亂弱之患也僖公之性非前二十一年常賢而後乃漸變為不肖也此季子存之所益亡之所損}
