  - {type: variant, offset: 1387, length: 0, content: '', SBCK: 生無易由言}
  - {type: variant, offset: 1388, length: 3, content: 息則民, SBCK: 顧其患患至而後黙晩矣賢良曰孔子讀史記喟然而歎傷正德之廢君臣之危也夫賢人君子以天下爲任者也任大者思逺思逺者忘近誠心閔悼惻􅀮加爾故忠心獨而無累此詩人所以傷而作比干子胥}
