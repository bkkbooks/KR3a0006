  - {type: variant, offset: 33, length: 4, content: 紀重質厚, SBCK: 足相贍常居則匱於衣食有故則賣畜粥業非徒是也繇吏相遣官庭攝追小計權吏行施乞貸長吏侵漁上府下求之縣縣求之鄕鄕安取之哉語曰貨}
