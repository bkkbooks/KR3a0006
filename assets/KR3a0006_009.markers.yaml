  - {type: variant, offset: 562, length: 2, content: 虎兕, WYG: 漢興以來修好結和親所聘遺單音蟬于者甚厚然不紀重質厚賂之故改節而暴害滋甚先帝覩其可以武折而不可以德懐故廣將帥招奮擊以誅厥罪功勲粲然著於海内藏於紀府何命亡十獲一乎漢武紀曰元光二年春詔問公卿曰朕飾子女以配單于金幣文繡賂之甚厚單于待命加嫚侵盗亡已邊境被害朕甚閔之今欲舉兵攻之何如大行王恢建議宜擊夏六月御史大夫韓安國為䕶軍將軍衞尉李廣為驍騎將軍太僕公孫賀為輕車將軍大行王恢為將屯將軍大夫李息為材官將軍將三十萬衆屯馬邑谷中誘致單于欲襲擊之單于入塞覺之走出嚴尤曰漢武選將練兵約齎輕糧深入逺戍匈奴創艾而天下稱武夫音扶偷安者後危慮近者憂邇賢者離俗知士權行君子所慮衆庶疑焉故民可以觀成不可以圖始此有司所獨見而文學所不覩公孫鞅曰有髙世之行者必見非於世有獨知之慮者固見敖於民故曰愚者暗於成事智者見於未萌民不可與慮始可與樂成功班固曰和親之論發於劉敬是時天下初定新遭平城之難故從其言約結和親賂遺單于以救安邊境孝惠髙后時遵而不違匈奴冦盗不為衰止而單于反以加驕倨逮至孝文與通關市妻以漢女増厚其賂嵗以千金而匈奴數背約束邊境屢被其害是以文帝中年赫然發憤遂躬戍服親御鞍馬從六郡良家材力之士馳射上林講習戰陳聚天下精兵積於廣武顧問馮唐與論將帥喟然嘆息思古臣此則和親無益已然之明效也仲舒親見四世之事猶欲復守舊文頗増其約以為義動君子利動貪人如匈奴者非可以仁義説也獨可以厚利結之於天耳故與之厚利以沒其意與盟於天以堅其約質其愛子以累其心匈奴雖欲展轉奈失重利何奈欺上天何奈殺愛子何夫賦斂行賂不足以當三軍之費城郭之固無以異於貞士之約而使邊城守境之民父母緩帶稚子咽哺胡馬不窺於長城而羽檄不行於中國不亦便於天下乎察仲舒之論考諸行事廼知其未合於當時而有闕於後世也當孝武時雖征伐克復而士馬物故亦略相當雖開河南之野建朔方之郡亦棄造陽之北九百餘里匈奴人民每來降漢單于亦輒拘留漢使以相報復其桀驁尚如斯安肯以憂子而為質哉此不合當時之言也若不置質空約和親是襲孝文既往之悔而長匈奴無已之詐也夫邊境不選守境武畧之臣修障隧備塞之具厲長㦸勁弩之械恃吾}
