  - {type: variant, offset: 4222, length: 1, content: 陽, WYG: 人主不遂忿則西域皆瓦解而附於胡胡得衆國而益强先帝絶竒聽行武威還襲音集宛宛舉國以降効其器物致其寳馬烏孫之屬駭膽請為臣妾匈奴失魄奔走遁逃雖未盡服逺處寒苦墝音敲埆音殼之地壯者死於祁巨夷反連天山其孤未復漢武帝紀曰太初元年秋八月行幸安定遣貳師將軍李廣利發天下讁民西征大宛四年春貳師斬大宛王首獲汗血馬作西極天馬之歌匈奴傳曰漢既誅大宛威震外國天子意欲遂困胡乃下詔曰髙皇帝遺朕平城之憂髙后時單于書極悖逆昔齊襄公復九世之讎春秋大之是嵗太初四年也其明年漢使貳師將軍將三萬騎出酒泉撃右賢王於天山得首虜萬餘級而還顔師古曰天山即祁連山也匈奴謂天為祁連今鮮卑語尚然也故羣臣議以為匈奴困於漢兵折翅傷翼可遂擊服會先帝棄羣臣以故匈奴不革譬如為山未成一簣而止度音鐸功業而無斷成之理是棄與胡而資强敵也輟㡬沮成為主計若斯亦未可謂盡忠也文學曰有司言外國之事議者皆激一時之權不慮其後張騫言大宛之天馬汗血安息之真玉大鳥縣官既聞如甘水焉張騫傳曰張騫言大宛及大夏安息之屬皆大國多竒物土著頗與中國同俗而兵弱貴漢財物其北則大月氏康}
