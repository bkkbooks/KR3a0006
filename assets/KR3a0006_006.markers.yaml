  - {type: variant, offset: 4114, length: 1, content: 擇, SBCK: 故禮義壞隄防决所以治者未之有也孔子曰禮與其奢也寜儉喪與其易也寜戚故禮之所爲作非以害生傷業也威儀節文非以亂化傷俗也治國謹其禮危國謹其法昔秦以武力吞天下而斯高以妖孽累其禍廢古術隳舊禮專任刑法而儒墨旣喪焉塞士之塗壅人之口道䛕日進而上不聞其過此秦所以失天下而殞社稷也故聖人爲政必先誅之爲巧言以輔非而傾覆國家也今子安取亡國之語而來乎夫公卿處其位不正其道而以意阿色順風疾小人淺淺靣從以成人之過也故知言之死不􅃘從苟合之徒是以不免於縲絏悲夫丞相史曰檀柘而有鄕萑葦而有藂言物􅀋之相從也孔子曰德不􅀌必有鄰故湯興而伊尹至不仁者遠矣未有明君在上而亂臣在下也今先帝躬行仁聖之道以臨海内招舉俊才賢良之士唯仁是用誅逐亂臣不避所親務以求賢而簡退不肖猶尭之舉舜禹之族殛鯀放驩兠也而曰茍合之徒是則主非而臣阿是也文學曰臯陶對舜在知人惟帝其難之洪水之災尭獨愁悴而不能治得舜禹而九州寜故雖有尭明之君而無舜禹之佐則純德不流春秋刺有君而無臣先帝之時良臣未備故邪臣得間尭得舜禹而鯀殛驩兠誅趙簡子得叔向而盛靑肩詘語曰未見君子不知僞臣詩云未見君子憂心忡忡旣見君子我心則降此之謂也丞相史曰尭任鯀驩兠得舜禹而放殛之以其罪而天下咸服誅不仁也人君用之齊民而顔異濟􅀯亭長也先帝舉而加之高位官至上卿狄山起布衣爲漢議臣處舜禹之位執天下之中不能以治而反坐訕上故驩兠之誅加而刑戮至焉賢者受賞而不肖者􅀍刑固其然也文學何恠焉文學曰論者相扶以義相喻以道從善不求勝服義不耻窮若相迷以僞相亂以辭相矜於後息期於茍勝非其貴者也夫蘇秦張儀熒惑諸侯傾覆萬乗使人主失其所持非不辯然亂之道也君子疾鄙夫}
