  - {type: variant, offset: 12393, length: 620, content: 齊䇿曰齊負郭之民有孤狐咺者正議閔王斮之檀衢百姓不附齊孫室子陳舉直言殺之東閭宗室離心司馬穰苴為政者也殺之大臣不親以故燕舉兵使昌國君將而撃之齊使向子將而應之齊軍破向子輿一乗亡逹子收餘卒復振與燕戰求所以賞者閔王不肯與軍破走王奔莒淖齒數之曰夫千乗博昌之間方數百里雨血霑衣王知之乎王曰不知嬴博之間地坼至泉王知之乎王曰不知人有當闕而哭者求之則不得去之則聞其聲王知之乎王曰不知淖齒曰天雨血霑衣者天以告也地坼至泉者地以告也人有當闕而哭者人以告也天地人皆以告矣而王不知戒焉何得無誅乎於是殺閔王於鼔里雜事篇曰齊閔王亡居衛晝日歩走謂公玉丹曰我已亡矣而不知其故吾所以亡者其何哉公玉丹對曰臣以王為已知之矣王故尚未之知耶王之所以亡者以賢也以天下之主皆不肖而惡王之賢也因與合兵而攻王此王之所以亡也閔王慨然歎息曰賢固若是其苦耶丹又謂閔王曰古人有辭天下無憂色者臣聞其聲於王見其實王名稱東帝實有天下去國居衛容貎充盈顔色發揚無重國之意王曰甚善丹知寡人自去國而居衛也帶三益矣遂以自賢驕盈不止閔王亡走衛衛君避宫舍之稱臣而供具閔王不遜衛人侵之閔王去走鄒魯有驕色鄒魯不納遂走莒楚使淖齒將兵救齊因相閔王淖齒擢閔王之筋而懸之廟梁宿昔而殺之而與燕共分齊地悲夫閔王臨大齊之國地方數千里然而兵敗於諸侯地奪於燕昭宗廟䘮亡社稷不祀宫室空虗身亡逃竄甚於徒𨽻尚不知所以亡甚可痛也猶自以為賢豈不哀哉公玉丹徒𨽻之中而道之謟佞甚矣閔王不覺追而善之以辱為榮以憂為樂其亡晩矣而卒見殺故齊閔王雖至死亡終身不諭者也悲夫, SBCK: ''}
