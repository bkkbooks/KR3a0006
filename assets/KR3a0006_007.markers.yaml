  - {type: variant, offset: 828, length: 3, content: 父母也, SBCK: 服鞠躬踧踖竊仲尼之容議論稱誦竊商賜之辭刺譏言治過管晏之才心卑卿相志小萬乗及授之政昏亂不治故以言舉人􅀂以毛相馬此其所以多不稱舉詔䇿曰朕嘉宇内之士故詳延}
