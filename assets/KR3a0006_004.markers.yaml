  - {type: variant, offset: 560, length: 0, content: '', WYG: 人間訓曰秦皇挾錄圖見其傳曰亡秦者胡也因發卒五十萬使蒙公楊翁將築修城西屬流沙北撃遼水東結朝鮮中國内郡輓車而餉之又利越之犀角象齒翡翠珠璣乃使尉屠雎發卒五十萬為五軍一軍塞鐔城之嶺一軍守九疑之塞一軍處番禺之都一軍守南野之界一軍結餘千之水三年不解甲弛弩使監禄無以轉餉又以卒鑿渠而通糧道以與越人戰殺西嘔君譯吁宋而越人皆入叢薄中與禽獸處莫肯為秦虜相置桀駿以為將而夜攻秦人大破之殺尉屠雎伏尸流血數十萬乃發適戍以備之當此之時男子不得修農畆婦人不得剡麻考縷羸弱服格於道大夫箕㑹於衢病者不得養死者不得塟於是陳勝起於大澤奮臂大呼天下席卷而至於戲劉項興義兵隨而定若折槁振落遂失天下禍在備胡而利越也}
