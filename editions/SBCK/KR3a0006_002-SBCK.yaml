body:
  text: 錯幣第四大夫曰交幣通施民事不及物有所并也計本量委民有饑者榖有所藏也智者有百人之功愚者不更本之事人君不調民有相妨之富也此其所以或儲百年之餘或不厭糟糠也民大富則不可以禄使也大疆則不可以威罰也非散聚均利者不齊故人主積其食守其用制其有餘調其不足禁溢羨厄利塗然後百姓可家給人足也文學曰古者貴德而賤利重義而輕財三王之時迭盛迭衰衰則扶之傾則定之是以夏忠殷敬周文庠序之敎恭讓之禮粲然可得而觀也及其後禮義弛崩風俗㓕息故自食禄之君子違於義而競於財大小相吞激轉相傾此所以或儲百年之餘或無以充虚蔽形也古之仕者不穡田者不漁抱關擊柝皆有常秩不得兼利盡物如此則愚智同功不相傾也詩云彼有遺秉此有滯穗伊寡婦之利言不盡物也大夫曰湯文繼衰漢興乗弊一質一文非苟易常也俗弊家法非務變古也亦所以救失扶衰也故敎與俗改弊與世易夏后以玄貝周人以紫石後世或金錢刀布物極而衰終始之運也故山澤無征則君臣同利刀幣無禁則姦貞並行夫臣冨相侈下專利則相傾也文學曰古者市朝而無刀幣各以其所有易無抱布貿絲而巳後世即有龜貝金錢交施之也幣數變而民滋僞夫救僞以質防失以禮湯文􅁇衰革法易化而殷周道興漢初乗弊而不改易畜利變幣欲以反本是猶以煎止燔以火止沸也上好禮則民闇飾上好貨則下死利也大夫曰文帝之時縱民得鑄錢冶鐡煑鹽吳王擅鄣海澤鄧通專西山山東姧猾咸聚吳國秦雍漢蜀因鄧氏吳鄧錢布天下故有鑄錢之禁禁禦之法立而姧僞息姧僞息則民不期於妄得而各務其職不反本何爲故統一則民不二也幣由上則下不疑也文學曰往古幣衆財通而民樂其後稍去舊幣更行白金龜龍民多巧新幣幣數易而民益疑於是廢天下諸錢而專命水衝二官作吏近侵利或不中式故有薄厚輕重農人不習物􅀋比之信故疑新不知姦真商賈以美貿惡以半易倍買則失實賣則失理其疑或滋益甚夫鑄僞金錢以有法而錢之善惡無增損於政擇錢則物稽滯而用人尤被其苦春秋曰算不及蠻夷則不行故王者外不鄣海澤以便民用内不禁刀幣以通民施禁耕第五大夫曰家人有寶器尚凾匣而藏之况人主之山海乎夫權利之處必在深山窮澤之中非豪民不能通其利異時鹽鐡未籠布衣有朐邴朐邴人吳王皆鹽鐡初議也君有吳王專山澤之饒薄賦其民賑贍窮小以成私威私威積而逆節之心作夫不蚤絶其源而憂其末􅀂決吕梁沛然其所傷必多矣太公曰一家害百家百家害諸侯諸侯害天下王法禁之今放民於權利罷鹽鐡以資􅁀彊遂其貪心衆邪羣聚私門成黨則强禦日以不制而并兼之徒姦形成也文學曰民人藏於家諸侯藏於國天子藏於海内故民人以垣墻爲藏閉天子以四海爲匣匱天子適諸侯升自阼階諸侯納管鍵執䇿而聽命示莫爲主也是以王者不畜聚下藏於民遠浮利務民之義義禮立則民化上若是雖湯武生存於世無所容其慮工商之事歐冶之任何姦之能成三栢專魯六卿分晉不以鹽鐡故權利深者不在山海在朝廷一家害百家在蕭墻而不在朐邴也大夫曰山海有禁而民不傾貴賤有平而民不疑縣官設衡立凖人從所欲雖使五尺童子適市莫之能欺今罷去之則豪民擅其用而專其利決市閭巷高下在口吻貴賤無常端坐而民豪是以養强抑弱而藏於跖也疆養弱抑則齊民消若衆穢之盛而害五榖一家害百家不在朐邴如何也文學曰山海者財用之寳也鐡器者農夫之死生也死生用則仇讐滅仇讐滅則田野闢田野闢而五榖熟寳路開則百姓贍而民用給民用給則國富國富而敎之以禮則行道有讓而工商不相豫人懷敦樸以自相接而莫相利夫秦楚燕齊士力不同剛柔異􅀔巨小之用居局之宜黨殊俗易各有所便縣官籠而一之則鐡器失其宜而農民失其便器用不便則農夫罷於壄而草萊不辟草萊不辟則民困乏故鹽冶之處大傲皆依山川近鐡炭其􅀔咸遠而作劇郡中卒踐更者多不勘責取庸代縣邑或以戸口賦鐡而賤平其凖良家以道次發僦運鹽鐡煩費邑或以戸百姓病苦之愚竊見一官之傷千里未覩其在朐邴也復古第六大夫曰故扇水都尉彭祖寜歸言鹽鐡令品令品甚明卒徒衣食縣官作鑄鐡器給用甚衆無妨於民而吏或不良禁令不行故民煩苦之今意總一鹽錢非獨爲利入也將以建本抑末離朋黨禁淫侈絶并兼之路也古者名山大澤不以封爲下之專利也山海之利廣澤之畜天下之藏也皆宜屬少府陛下不私以屬大司農以佐助百姓浮食豪民好欲擅山海之貨以致富業役利細民故沮事議者衆鐡器兵刃天下之大用也非衆庻所宜事也往者豪强大家得管山海之利采鐡石鼔鑄煑鹽一家聚衆或至千餘人大抵盡收放流人民也遠去鄕里棄墳墓依􅀝大家聚深山窮澤之中成姦僞之業遂朋黨之權其輕爲非亦大矣今自廣進賢之途練擇守尉不待去鹽鐡而安民也文學曰扇水都尉所言當時之利權一切之術也不可以乆行而傳世此非明王所以君國子民之道也詩云哀哉爲猶匪先民是程匪大猶是經雜邇言是聽此詩人刺不通於王道而善爲權利者孝武皇帝攘九夷平百越師旅數起糧食不足故立田官置錢入榖射官救急贍不給今陛下繼大功之勤養勞勌之民此用麋鬻之時公卿冝思所以安集百姓致利除害輔明主以仁義修潤洪業之道明主卽位以來六年于兹公卿無請減除不急之官省罷機利之人人權縣太乆民良望於上陛下宣聖德昭明光令郡國賢良文學之士乗傳詣公車議五帝三王之道六藝之風􅁽陳安危利害之分指意粲然今公卿辯議未有所定此所謂守小節而遺大體抱小利而忘大利者也大夫曰宇宙之内鷰雀不知天地之高也坎井之鼃不知江海之大窮夫否婦不知國家之慮􅀒荷之商不知猗頓之富先帝計外國之利料胡越之兵兵敵弱而易制用力少而功大故因􅀔變以主四夷地濱山海以屬長城北略河外開路匈奴之鄕功未卒善文王受命伐崇作邑于豐武王繼之載尸以行破商擒紂遂成王業曹沫棄三北之耻而復侵地管仲􅀒當世之累而立霸功故志大者遺小用權者離俗有司思師望之計遂先帝之業志在絕胡貉擒單于故未遑扣扄之義而録拘儒之論文學曰鷰雀離巢宇而有鷹隼之憂坎井之鼃離其居而有蛇䑕之患况翺翔千仞而㳺四海乎其禍必大矣此李斯之所以折翼而趙高没淵也聞文武受命伐不義以安諸侯大夫未聞弊諸夏以役夷狄也昔秦常舉天下之力以事胡越竭天下之財以奉其用然衆不能畢而以百萬之師爲一夫之任此天下共聞也且數戰則民勞乆師則兵弊此百姓所疾苦而拘儒之所憂也鹽鐡論卷第一鹽鐡論卷第二非鞅第七晁錯第八刺權第九刺復第十論儒第十一憂邉第十二非鞅第七大夫曰昔商君相秦也内立法度嚴刑罰􅅚政敎姦僞無所容外設百倍之利收山澤之稅國富民强器械完飾蓄積有餘是以征敵伐國攘地斥境不賦百姓而師以贍故用不竭而民不知地盡西河而民不苦鹽鐡之利所以佐百姓之急足軍旅之費務蓄積以備乏絕所給甚衆有益於國無害於人百姓何苦爾而文學何憂也文學曰盖文帝之時無鹽鐡之利而民富今有之而百姓困乏未見利之所利也而見其害也且利不從天來不從地岀一取之民間謂之百倍此計之失者也無異於愚人反裘而􅀒薪愛其毛不知其皮盡也夫李梅實多者來年爲之衰新榖熟者舊榖爲之􅉛自天地不能兩盈而况於人事乎故利於彼者必耗於此猶隂陽之不並曜晝夜之有長短也商鞅峭法長利秦人不􅂓生相與哭孝公吳起長兵攻取楚人搔動相與泣悼王其後楚日以危秦日以弱故利蓄而怨積地廣而禍搆惡在利用不竭而民不知地盡西河而人不苦也今商鞅之􅁽任於内吳起之兵用於外行者勤於路居者匱於室老母號泣怨女歎息文學雖欲無憂其可得也大夫曰秦任商君國以富强其後卒并六國而成帝業及二世之時邪臣擅斷公道不行諸侯叛弛宗廟隳亡春秋曰未言介􅀕仲亡也夫善歌者使人續其聲善作者使人紹其功推車之蟬攫􅀒子之敎也周道之成周公之力也雖有禆諶之草創無子産之潤色有文武之䂓矩而無周吕之鑿枘則功業不成今以趙高之亡秦而非商鞅猶以崇虎亂殷而非伊尹也文學曰善鑿者建周而不疲善基者致高而不蹷伊尹以尭舜之道爲殷國基子孫紹位百代不絕商鞅以重刑峭法爲秦國基故二世而奪刑旣嚴峻矣又作爲相坐之法造誹謗增肉刑百姓齋栗不知所措手足也賦㰸旣煩數矣又外禁山澤之原内設百倍之利民無所開說容言崇利而簡義高力而尚功非不廣壤進地也然猶人之病水益水而疾深知其爲秦開帝業不知其爲秦致亡道也狐刺之鑿雖公輸子不能善其枘畚土之基雖良匠不能成其高譬若秋蓬被霜遭風則零落雖有十子産如之何故扁鵲不能肉白骨微箕不能存亡國也大夫曰言之非難行之爲難故賢者處實而効功亦非徒陳空文而巳昔商君明於開塞之術假當世之權爲秦致利成業是以戰勝攻取并近滅遠乗燕趙陵齊楚諸侯歛袵西靣而向風其後蒙恬征胡斥地千里踰之河北􅀂壞朽折腐何者商君之遺謀備飾素循也故舉而有利動而有功夫蓄積籌䇿國家之所以强也故弛廢而歸之民未覩巨計而渉大道也文學曰商鞅之開塞非不行也䝉恬却胡千里非無功也威震天下非不强也諸侯隨風西靣非不從也然而皆秦之所以亡也商鞅以權數危秦國䝉恬以得千里亡秦社稷此二子者知利而不知害知進而不知退故果身死而衆敗此所謂戀朐之智而愚人之計也夫何大道之有故曰小人先合而後忤􅀄雖乗馬卒必泣血此之謂也大夫曰淑好之人戚施之所妬也賢知之士闟茸之所惡也是以上官大夫短屈原於頃襄公伯寮愬子路於季孫夫商君起布衣自魏入秦期年而相之革法明敎而秦人大治故兵動而割地兵休而國富孝公大說封之於商安之地方五百里功如丘山名傳後世世人不能爲是以相與嫉其能而疵其功也文學曰君子進必以道退不失義高而勿矜勞而不伐位尊而行恭功大而理順故俗不疾其能而世不妬其業今商鞅棄道而用權廢德而任力峭法盛刑以虐戾爲俗欺舊交以爲功刑公族以立威無恩於百姓無信於諸侯人與之爲怨家與之爲讐雖以􅀗功見封猶食毒肉愉飽而罹其咎也蘇秦合縱連橫統理六國業非不大也桀紂與堯舜並稱至今不亡名非不長也然非者不足貴故事不苟多名不苟傳也大夫曰縞素不能自分於緇墨聖賢不能自理於亂世是以箕子執囚比干被刑伍員相闔閭以霸夫差不道流而殺之樂毅信功於燕昭而見疑於惠王人臣盡節以徇名遭世主之不用大夫種輔翼越王爲之深謀卒擒强吳據有東夷終賜屬鏤而死驕主背恩德聽流說不計其功故也豈身之罪哉文學曰比干剖心子胥鴟夷非輕犯君以危身强諌以干名也􅉃怛之忠誠心動於内忘患之禍發於外志在匡君救民故身死而不怨君子能行是不能禦非雖在刑戮之中非其罪也是以比干死而殷人怨子胥死而吳人恨今秦怨毒商鞅之法甚於私仇故孝公卒之日舉國而攻之東西􅀯北莫可奔走仰天而嘆曰嗟乎爲政之弊至於斯極也卒車裂族夷爲天下笑斯人自殺非人殺之也
