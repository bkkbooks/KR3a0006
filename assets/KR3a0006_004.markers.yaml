  - {type: variant, offset: 1366, length: 0, content: '', WYG: 泰族訓曰髙山深林非為虎豹也大木茂枝非為飛鳥也流源千里淵深百仭非為蛟龍也致其崇髙成其廣大山居木棲巢枝穴藏水潜陸行各得其所寧焉夫大生小多生少天之道也故丘阜不能生雲雨滎水不能生魚鼈者小也牛馬之氣蒸生蟣虱蟣蝨之氣蒸不能生牛馬故化生於外非生於内也傳曰坎井無黿鼍者隘也園中無修林者小也}
