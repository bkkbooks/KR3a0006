  - {type: variant, offset: 237, length: 146, content: 務於權利怠於禮義故百姓倣傚頗踰制度今故陳之曰古者穀物菜果不時不食鳥獸魚鱉不中殺不食故徼罔不入於澤雜毛不取今富者逐驅殲罔罝掩捕麑鷇躭湎沉酒鋪百川鮮羔䍮幾胎肩皮黃口春鵝秋雛冬葵溫韭浚茈蓼蘇蕈䓴耳菜毛果蟲貉古者采椽茅茨陶桴復冗穴足禦寒暑蔽風雨而已及其後世采椽不斲茅茨不剪無斲削之事磨礱之功大夫達棱楹, WYG: 祭五祀}
