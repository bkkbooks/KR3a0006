  - {type: variant, offset: 4491, length: 0, content: '', WYG: 進食手匕首刺王僚鈹交於匈遂殺王僚公子光竟代立為王是為呉王闔廬闔廬乃以專諸子為卿聶政自衞由韓廷刺其主功成求得退自刑於朝音潮暴尸於市韓䇿曰韓傀相韓嚴遂重於君二人相害也嚴遂政議直指舉韓傀之過韓傀以之叱之於朝嚴遂㧞劒趨之以救解於是嚴遂懼誅亡去游求人可以報韓傀者至齊齊人或言軹深井里聶政勇敢士也避仇隠於屠者之間嚴遂隂交於聶政以意厚之聶政問之曰子欲安用我乎嚴遂曰吾得為役之日淺事今薄奚敢有請於是嚴遂乃具酒自觴聶政母前仲子奉黄金百鎰前為聶政母夀聶政驚愈恠其厚固謝嚴仲子仲子固進而聶政謝曰臣有老母家貧客游以為狗屠可旦夕得甘脆以養親親供養備義不敢當仲子之賜嚴仲子辟人因為聶政語曰臣有仇而行游諸侯衆矣然至齊聞足下義甚髙故直進百金者特以大人麤糲之費以交足下之讙豈敢以有求邪聶政曰臣所以降志辱身居市井屠者幸以養老母老母在前政身未敢以許人也嚴仲子固讓聶政竟不肯受然仲子卒備賔主之}
  - {type: page-break, offset: 4491, content: '', id: KR3a0006_WYG_010-23b, image: WYG0695/WYG0695-0631d.png}
  - {type: variant, offset: 4491, length: 0, content: '', krp: 進食手匕首刺王僚鈹交於匈遂殺王僚公子光竟代立為王是為呉王闔廬闔廬乃以專諸子為卿聶政自衞由韓廷刺其主功成求得退自刑於朝音潮暴尸於市韓䇿曰韓傀相韓嚴遂重於君二人相害也嚴遂政議直指舉韓傀之過韓傀以之叱之於朝嚴遂㧞劒趨之以救解於是嚴遂懼誅亡去游求人可以報韓傀者至齊齊人或言軹深井里聶政勇敢士也避仇隠於屠者之間嚴遂隂交於聶政以意厚之聶政問之曰子欲安用我乎嚴遂曰吾得為役之日淺事今薄奚敢有請於是嚴遂乃具酒自觴聶政母前仲子奉黄金百鎰前為聶政母夀聶政驚愈恠其厚固謝嚴仲子仲子固進而聶政謝曰臣有老母家貧客游以為狗屠可旦夕得甘脆以養親親供養備義不敢當仲子之賜嚴仲子辟人因為聶政語曰臣有仇而行游諸侯衆矣然至齊聞足下義甚髙故直進百金者特以大人麤糲之費以交足下之讙豈敢以有求邪聶政曰臣所以降志辱身居市井屠者幸以養老母老母在前政身未敢以許人也嚴仲子固讓聶政竟不肯受然仲子卒備賔主之}
  - {type: variant, offset: 4492, length: 2, content: 說跖, WYG: 而去乆之聶政母死既葬除服聶政曰嗟乎政乃市井之人鼓刀以屠而嚴仲子乃諸侯之卿相也不逺千里枉車騎而交臣臣之所以待之者至淺矣未有大功可以稱者而嚴仲子舉百金為親壽我義不受然是深知政也夫賢者以感忿睚眦之意而親信窮僻之人而政獨安可嘿然而止乎且前日要政政徒以老母老母今以天年終政將為知己者用遂西至濮陽見嚴仲子曰前日所以不許仲子者徒以親在今親不幸而死仲子所欲報仇者請得從事焉嚴仲子具告曰臣之仇韓相韓傀傀又韓君之季父也宗族盛多居處兵衞甚設臣使人刺之終莫能就今足下幸而不棄請益具車騎壯士以為羽翼政曰韓與衞相去中間不逺今殺人之相相乂國君之親此其勢不可以多人多人不能無生得失生得失則語泄語泄則韓舉國而與仲子為讐也豈不殆哉遂謝車騎人徒辭獨行仗劒至韓韓適有東孟之㑹韓王及相皆在焉持兵㦸而衛侍者甚衆聶政直入階刺殺韓傀韓傀走而就列侯聶政刺之兼中列侯左右大亂聶政大呼所擊殺者數十人因自面皮抉眼屠腸遂以死韓取聶政屍暴於市縣購之千金乆之莫知誰政姊嫈聞之曰吾弟至賢不可愛妾之軀滅吾弟之名非弟意也乃之韓視之曰勇哉氣矜之隆是其軼賁育髙成荆矣今死而無名父母既殁矣兄弟無有此為我故也夫愛身不揚弟之名吾不忍也乃抱屍而哭之曰此吾弟軹深井里聶政也亦自殺於屍下晉楚齊衞聞之曰非獨聶政之能乃其姊者列女也聶政之所以名施於後世者其姊不避葅酢之誅以揚其名也唐睢曰専諸之要刺王僚也彗星襲月聶政之刺韓傀也白虹貫日離之刺慶忌也倉鷹擊於殿上此三子皆布衣之士也懐怒未發休䘲降於天吕氏春秋曰豫讓必死於襄子而趙氏皆恐成荆致死於韓王而周人皆畏今誠得勇士乗强漢之威凌無義之匈奴制其死命責以其過若曹劌音貴之負齊桓公遂其求雜事篇曰昔者齊桓公與魯莊公為柯之盟魯大夫曹劌謂莊公曰齊之侵魯至於城下城壞壓境君不圖與莊公曰嘻寡人之生不若死曹劌曰然則君請當其君臣請當其臣及㑹兩君就壇兩相相揖曹劌手劍㧞刃而進廹桓公於壇上曰城壞壓境君不圖與管仲曰然則君何求曹劌曰願請汶陽田管仲謂桓公曰君其許之桓公許之曹劌請盟桓公遂與之盟已盟標劒而去左右曰要盟可倍曹劌可讐請倍盟而討曹劌管仲曰要盟可負而君不負曹劌可讐而君不讐著君天下矣遂不倍天下諸侯翕然而歸之為鄄之㑹幽之盟諸侯莫不至焉為陽榖之㑹貫澤之盟逺國皆來南伐强楚以致菁茅之貢北伐山戎為燕開路三存亡國一繼絶世尊事周室九合諸侯一匡天下功次三王為五伯長本信起乎柯之盟也推鋒拊音府銳穹廬擾亂上下相遁因以輕銳隨其後匈奴必交臂不敢格}
