  - {type: variant, offset: 1419, length: 2358, content: 不能治流失而不可復愚人縱火於沛澤不能復振蜂蠆螫人放死不能息其毒也煩而止之躁而靜之上下勞擾而亂益滋故聖人教化上與日月俱照下與天地同流豈曰小補之哉御史曰衣缺不補則日以甚防漏不塞則日以滋大河之始決於瓠子也涓涓爾及其卒氾濫為中國害菑梁楚破曹衛城郭壞沮蓄積漂流百姓木棲千里無廬令孤寡無所依老弱無所歸故先帝閔悼其菑親省河堤舉禹之功河流以復曹衛以寧百姓戴其功詠其德歌宣房塞萬福來焉亦猶是也如何勿小補哉文學曰河決若甕口而破千里況禮決乎其所害亦多矣今斷獄歲以萬計犯法滋多其為菑豈特曹衛哉夫知塞宣房而福來不知塞亂原而天下治也周國用之刑錯不用黎民若四時各終其序而天下不孤頌曰綏我眉壽介以繁祉此夫為福亦不小矣誠信禮義如宣房功業已立垂拱無為有司何補法令何塞也御史曰犀銚利鉏五穀之利而間草之害也明理正法姦邪之所惡而良民之福也故曲木惡直繩姦邪惡正法是以聖人審於是非察於治亂故設明法陳嚴刑防非矯邪若隱括輔檠之正𠇗剌也故水者火之備法者止姦之禁也無法勢雖賢人不能以為治無甲兵雖孫吳不能以制敵是以孔子倡以仁義而民從風伯夷遁首陽而民不可化文學曰法能刑人而不能使人廉能殺人而不能使人仁所貴良醫者貴其審消息而退邪氣也非貴其下鍼石而鑽肌膚也所貴良吏者貴其絕惡於未萌使之不為非非貴其拘之囹圄而刑殺之也今之所謂良吏者文察則以禍其民強力則以厲其下不本法之所由生而專己之殘心文誅假法以陷不辜累無罪以子及父以弟及兄一人有罪州里驚駭十家奔亡若癰疽之相濘色淫之相連一節動而百枝搖詩云舍彼有罪既伏其辜若此無罪淪胥以鋪痛傷無罪而累也非患銚耨之不利患其舍草而芸苗也非患無準平患其舍枉而繩直也故親近為過不必誅是鋤不用也䟽遠有功不必賞是苗不養也故世不患無法而患無必行之法也周秦第五十七御史曰春秋罪人無名號謂之云盜所以賤刑人而絕之人倫也故君不臣士不友於閭里無所容故民恥犯之今不軌之民犯公法以相寵舉棄其親不能伏節死理遁逃相連自陷於罪其被刑戮不亦宜乎一室之中父兄之際若身體相屬一節動而知於心故今自關內侯以下比地於伍居家相察出入相司父不教子兄不正弟舍是誰責乎文學曰古者周其禮而明其教禮周教明不從者然後等之以刑刑罰中民不怨矣故舜施四罪而天下咸服誅不仁也輕重各服其誅刑必加而無赦赦惟疑者若此則世安得不軌之人而罪之乎今殺人者生剽攻竊盜者富故良民內解怠輟耕而隕心古者君子不近刑人刑人非人也身放殛而辱後世故無賢不肖莫不恥也今無行之人貪利以陷其身蒙戮辱而捐禮義恒於苟生何者一日下蠶室創未瘳宿衛人主出入宮殿由得受奉祿食太官享賜身以尊榮妻子獲其饒故或載卿相之列就刀鋸而不見閔況眾庶乎夫何恥之有廢其德教而責之以禮義是虐民也春秋傳曰子有罪執其父臣有罪執其君聽失之大者也今以子誅父以弟誅兄親戚相坐什伍相連若引根本之及華葉傷小指之累四體也如此則以有罪反誅無罪反誅無罪則天下之無罪者寡矣臧文仲治魯勝其盜而自矜子貢曰民將欺而況盜乎故吏不以多斷為良毉不以多刺為工子產刑二人殺一人道不拾遺而民無誣心故為民父母以養疾子長恩厚而已自首匿相坐之法立骨肉之恩廢而刑罪多矣聞父母之於子雖有罪猶匿之其不欲服罪爾子為父隱父為子隱未聞父子之相坐也聞兄弟能緩追以免賊未聞兄弟之相坐也聞惡惡止其人疾始而誅首惡未聞什伍而相坐也老子曰上無欲而民樸上無事而民自富君君臣臣父父子子比地何伍而執政何責也御史曰夫負千鈞之重以登無極之高垂峻崖之峭谷下臨不測之淵雖有慶忌之捷賁育之勇莫不震慴悼慄者知墜則身首肝腦塗山石也故未嘗灼而不敢握火者見其有灼也未嘗傷而不敢握刃者見其有傷也彼以知為非罪之必加而戮及父兄必懼而為善故立法制辟若臨百仞之壑握火蹈刃則民畏忌而無敢犯禁矣慈母有敗子小不忍也嚴家無悍虜篤責急也今不立嚴家之所以制下而修慈母之所以敗子則惑矣文學曰紂為炮格之刑而秦有收帑之法趙高以峻文決罪於內百官以峭法斷割於外死者相枕席刑者相望百姓側目重足不寒而慄詩云謂天蓋高不敢不局謂地蓋厚不敢不蹐哀今之人胡為虺蜥方此之時豈特冒火蹈刃哉然父子相背兄弟相慢至於骨肉相殘上下相殺非刑輕而罰不必令太嚴而仁恩不施也故政寬則下親其上政嚴則民謀其主晉厲以幽二世見殺惡在峻法之不犯嚴家之無悍虜也聖人知之是以務和而不務威故高皇帝約秦苛法以慰怨毒之民而長和睦之心唯恐刑之重而德之薄也是以恩施無窮澤流後世商鞅吳起以秦楚之法為輕而累之上危其主下沒其身或非特慈母乎詔聖第五十八御史曰夏后氏不倍言殷誓周盟德信彌衰無文武之人欲修其法此殷周之所以失勢而見奪於諸侯也故衣弊而革才法弊而更制高皇帝時天下初定發德音行一切之令權也非撥亂反正之常也其後法稍犯不正於理故姦萌而甫刑作王道衰而詩刺彰諸侯暴而春秋譏夫少目之罔不可以得魚三章之法不可以為治故令不得不加法不得不多唐虞畫衣冠非阿湯武刻肌膚非故時世不同輕重之務異也文學曰民之仰法猶魚之仰水水清則靜濁則擾擾則不安其居靜則樂其業樂其業則富富則仁生贍則爭止是以成康之世賞無所施法無所加非可刑而不刑民莫犯禁也非可賞而不賞民莫不仁也若斯則吏何事而可理乎今之治民者若拙御之御馬也行則頓之止則擊之身創於箠吻傷於銜而求其無失何可得乎乾谿之役土崩梁氏內潰嚴刑不能禁峻法不能止故罷馬不畏鞭箠罷民不畏刑法雖增而累之其亡益乎御史曰嚴牆三刃樓季難之山高干雲牧豎登之故峻則樓季難三刃陵夷則牧豎易山巔夫鑠金在鑪莊蹻不顧錢刀在路匹婦掇之非匹婦貪而莊蹻廉也輕重之制異而利害之分明也故法令可仰而不可踰可臨而不可入詩云不敢暴虎不敢馮河為其無益也魯好禮而有季孟之難燕噲好讓而有子之之亂禮讓不足禁邪而刑法可以止暴明君據法故能長制群下而久守其國也文學曰古者明其仁義之誓使民不踰上乎刑之不教而殺是以虐也與其刑不可踰不若義之不可踰也聞禮義行而刑罰中未聞刑罰行而孝悌興也高牆狹基不可立矣嚴刑峻法不可久也二世信趙高之計渫篤責而任誅斷刑者半道死者日積殺民多者為忠厲民悉者為能百姓不勝其求黔首不勝其刑海內同憂而俱不聊生, SBCK: 物}
