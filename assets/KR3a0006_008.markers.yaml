  - {type: variant, offset: 2020, length: 0, content: '', SBCK: 政有德則隂陽調星辰理風雨時故循行於内聲聞於外爲善於下福應於天周公載紀而天下太平國無夭傷歲無荒年當此之時雨不破塊風不鳴條旬而一雨雨必以夜無丘陵高下皆熟詩曰有渰萋萋興雨祁祁今不省其所然而曰隂陽之運也非所聞也孟子曰野有餓殍不知收也狗豕食人食不知檢也爲民父母民饑而死則曰非我也歲也何異乎以刃殺之則曰非我也兵也方今之務在除饑寒之患罷鹽鐡退權利分土地趣本業養桑麻盡地力也寡功節用則民自富如是則水旱不能憂凶年不能累也大夫曰議者貴其辭約而指明可於衆人之聽不至繁文稠辭多言害有司化俗之計而家人語陶朱爲生本末異徑一家數事而治生之道乃備今縣官鑄農器使民務本不營於末則無饑寒之累鹽鐡何害而罷賢良曰農天下之大業也鐡器民之大用也器用便利則用力少而得作多農夫樂事勸功用不具則田疇荒榖不殖用力鮮功自半器便與不便其功相什而倍也縣官鼓鑄鐡器大抵多爲大器務應員程不給民用民用鈍弊割草不痛是以農夫作劇得􅀗者少百姓苦之矣大夫曰卒徒工匠以縣官日作公事財用饒器用備家人合㑹􅄶於日而勤於用鐡力不銷鍊堅柔不和故有司請􅄣鹽鐡一其用平其賈以便百姓公私雖虞夏之爲治不易於此吏明其敎工致其事則剛柔和器用便此則百姓何苦而農夫何疾賢良曰卒徒工匠故民得占租鼓鑄煮鹽之時鹽與五榖同賈器和利而中用今縣官作鐡器多苦惡用費不省卒徒煩而力作不盡家人相一父子戮力各務爲善器器不善者不集農事急輓運􅄛之阡陌之間民相與市買得以財貨五榖新弊易貨或時貰民不棄作業置田器各得所欲更繇省約縣官以徒復作繕治道橋諸發民便之今總其原一其賈器多堅䃘善惡無所擇吏數不在器難得家人不能多儲多儲則鎮生棄膏􅃾之日遠市田器則後良時鹽鐡賈貴百姓不便貧民或木耕手耨土耰啖食鐡官賣器不售或頗賦與民卒徒作不中呈時命助之發徵無限更繇以均劇故百姓疾苦之古者千室之邑百乗之家陶冶工商四民之求足以相更故農民不離畦畝而足乎田器工人不斬伐而足乎陶冶不耕田而足乎粟米百姓各得其便而上無事焉是以王者務本不作末去炫燿除雕琢湛民以禮示民以樸是以百姓務本不營於末鹽鐡論卷第六鹽鐡論卷第七崇禮第三十七備胡第三十八執務第三十九能言第四十鹽鐡取下四十一擊之第四十二崇禮第三十七大夫曰飾几杖脩樽爼爲賔非爲主也炫燿竒怪所以陳四夷非爲民也夫家人有客尚有倡優竒變之樂而况縣官乎故列羽旄陳戎馬以示威武竒蟲珍怪所以示懷廣遠明德遠國莫不至也賢良曰王者崇禮施德上仁義而賤怪力故聖人絕而不言孔子曰言忠信行篤敬雖蠻貊之􅀖不可棄也今萬方絕國之君奉䞇獻者懷天子之盛德而欲觀中國之禮儀故設明堂辟雍以示之揚于戚昭雅頌以風之今乃玩好不用之器竒蟲不畜之獸角抵諸戯炫燿之物陳夸之殆與周公之待遠方殊昔周公處謙以卑士執禮以治下天下辭越裳之贄見恭讓之禮旣與入文王之廟是見大孝之禮也目覩威儀干戚之容耳聽清歌雅頌之聲心充至德欣然以歸此四夷所以慕義内附非重譯狄鞮來觀猛獸熊羆也夫犀􅁚兕虎􅀯夷之所多也騾驢馲駞北狄之常畜也中國所鮮外國賤之南越以孔雀珥門户崐山之旁以玉璞抵烏鵲今貴人之所賤珍人之所饒非所以厚中國明盛德也隋和之名寶也而不能安危存亡故喻德示威惟賢臣良相不在犬馬珍怪是以聖王以賢爲寶不以珠玉爲寶昔晏子修之罇爼之間而折衝乎千里不能者雖隋和滿篋無益於存亡大夫曰晏子相齊三君崔慶無道刼其君亂其國靈公同圍莊公弑死景公之時晉人來攻取埀都舉臨菑邉邑削城郭焚宫室隳寶器盡何衝之所能折乎由此觀之賢良所言賢人爲寶則損益無輕重也賢良曰管仲去魯入齊齊覇魯削非恃其衆而歸齊也伍子胥挾􅃓干闔閭破楚入郢非􅀒其兵而適吳也故賢者所在國重所去國輕楚有子玉得臣文公側席虞有宫之竒晉獻不􅄰夫臣所在辟除開塞者亦遠矣故春秋曰山有虎豹葵藿爲之不採國有賢士邉境爲之不害也備胡第三十八大夫曰鄙語曰賢者容不辱以世俗言之鄕曲有桀人尚辟之今明天子在上}
