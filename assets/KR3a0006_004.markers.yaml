  - {type: variant, offset: 1732, length: 0, content: '', WYG: 立節篇曰卑賤貧窮非士之恥也夫士之所恥者天下舉忠而士不與焉舉信而士不與焉舉㢘而士不與焉三者在乎身名傳於後世與日月並而不息雖無道之世不能汚焉然則非好死而惡生也非􅁖富貴而樂貧賤也由其道遵其理尊貴及已士不辭也孔子曰富而可求雖執鞭之士吾亦為之富而不可求從吾所好也大聖之操也詩云我心匪石不可轉也我心匪席不可卷也言不失己也能不失己然後可與濟難矣此士君子之所以越衆也}
