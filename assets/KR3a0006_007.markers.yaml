  - {type: variant, offset: 798, length: 0, content: '', WYG: 故百官尚有殘疾之政而強宰尚有強奪之心大臣擅權而斷擊豪猾多黨而侵陵富貴奢侈貧賤簒殺女紅音工難成而易弊車器難就而易敗車不累朞噐不終嵗一車千石一衣十鍾常民文杯畫音壊案几席緝􅗿音牒婢妾衣紈履絲匹庶粺音稗飯肉食里有俗黨有塲康莊馳逐窮巷蹋音逹鞠秉耒抱挿躬耕身織者寡娶要古腰字歛古本作臉從容傅白黛青者衆無而為有貧而强巨両切夸文表無裏紈袴音褲枲音徙裝生不養去聲死厚𦵏送死殫音丹家遣女滿車富者欲過貧者欲及富者空藏去聲貧者稱貸是以民年急而嵗促貧即寡耻乏即少亷此所以刑非誅惡而姦猶不止也反質篇曰魏文侯問李克曰刑罰之源安生李克曰生於奸邪淫佚之行凡奸邪之心飢寒而起淫佚者乆飢之詭也彫文刻鏤害農事者也錦繡纂組傷女工者也農事害則飢之夲也女工傷則寒之原也飢寒並至而能不為奸邪者未之有也男女飾羙以相矜而能無淫佚者未甞有也故上不禁伎巧則國貧民侈國貧窮者為奸邪而富足者為淫佚則驅民而為邪也民以為邪因以法隨誅之不赦其罪則是為民設陷也刑罰之起有原人主不塞其夲而替其末傷國之道乎文侯曰善以為法服也故國有嚴不急之徵即生前不足疾矣散不足第二十九大夫曰吾以賢良為少愈乃反其幽明若胡車相隨而鳴諸生獨不見季夏之螇音奚乎方言曰􅀈􅀈齊謂之螇螰蟬之别名也音聲入耳秋風至而聲無者生無易音異由言不顧其患患至而後黙晩矣賢良曰孔子讀史記喟然而歎傷正徳之廢君臣之危也孔子世家曰孔子云弗乎弗乎君子病沒世而名不稱焉吾道不行矣吾何以自見於後世乃因史記作春秋上至隱公下訖哀公十四年十二公據魯親周故殷運之三代其文辭而指博故吳楚之君自稱王而春秋貶之曰子踐土之㑹實召周天子而春秋諱之曰天王狩於河陽推此類以䋲當世貶損之義後有王者舉而開之春秋之義行則天下亂臣賊子懼焉孔子在位聼訟文辭有可與人共者弗獨有也至於為春秋筆則筆削則削子夏之徒不能贊一辭弟子受春秋孔子曰後世知丘者以春秋而罪丘者亦以春秋夫音扶賢人君子以天下為任者也任大者思逺思逺者忘近誠心閔悼惻𨼆加爾故忠心獨而無累此詩人所以傷而作比干子胥遺身忘禍也其惡音汚勞人若斯之急安能黙乎子路曰夫士欲立身行道無顧難易然後能行之欲行義白召無顧利害然後能行之令狐茂曰子胥盡忠而忘其號比干盡仁而遺其身忠臣竭誠不顧鈇鉞之誅以陳其愚志在匡君安社稷也詩云憂心如惔不敢戲談孔子栖栖疾固也墨子遑遑閔世也文子曰墨子無黔突孔子無煖席非以貪禄慕位起天下之利除}
