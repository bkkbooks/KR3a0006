  - {type: variant, offset: 815, length: 0, content: '', WYG: 中有竒殺視得書書言甚怪天子識其手書問其人果是偽書於是誅文成將軍隐之欒大因樂成侯見求言方天子既誅文成後悔其蚤死惜其方不盡及見欒大大説大為人長美言多方畧而敢為大言處之不疑是時上方憂河决有黄金不就乃拜大為五利將軍其後五利妄言見其師其方多不讐上乃誅五利陛下建學官親近忠良欲以絶怪惡之端而昭至徳之塗也宫室奢侈林木之蠧音妬也器械雕琢財用之蠧音妬也衣服靡麗布帛之蠧音妬也狗馬食人之食五榖之蠧音妬也口腹縱恣魚肉之蠧音妬也用費不節府庫之蠧音妬也漏積不禁田野之蠧音妬也䘮祭無度傷生之蠧音妬也諺曰蠧衆而木折隙大而墻壊墮成變故傷功工商上通傷農故一杯棬用百人之力一屏風就萬人之功其為害亦多矣目修於五色耳營於五音體極輕薄口極甘脆音翠功積於無用財盡於不急口腹不可為多故國病聚不足即政怠人病聚不足則身危傳曰福生於無為而患生於多欲知足然後富從之徳宜君人然後貴從之故貴爵而賤徳者雖為天子不尊矣貪物而不知止者雖有天下不富矣夫土地之生不益山澤之出有盡懐不富之}
