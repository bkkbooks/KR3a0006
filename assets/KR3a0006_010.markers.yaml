  - {type: variant, offset: 3163, length: 665, content: 五十八御史曰夏后氏不倍言殷誓周盟德信彌衰無文武之人欲修其法此殷周之所以失勢而見奪於諸侯也故衣弊而革才法弊而更制高皇帝時天下初定發德音行一切之令權也非撥亂反正之常也其後法稍犯不正於理故姦萌而甫刑作王道衰而詩刺彰諸侯暴而春秋譏夫少目之罔不可以得魚三章之法不可以為治故令不得不加法不得不多唐虞畫衣冠非阿湯武刻肌膚非故時世不同輕重之務異也文學曰民之仰法猶魚之仰水水清則靜濁則擾擾則不安其居靜則樂其業樂其業則富富則仁生贍則爭止是以成康之世賞無所施法無所加非可刑而不刑民莫犯禁也非可賞而不賞民莫不仁也若斯則吏何事而可理乎今之治民者若拙御之御馬也行則頓之止則擊之身創於箠吻傷於銜而求其無失何可得乎乾谿之役土崩梁氏內潰嚴刑不能禁峻法不能止故罷馬不畏鞭箠罷民不畏刑法雖增而累之其亡益乎御史曰嚴牆三刃樓季難之山高干雲牧豎登之故峻則樓季難三刃陵夷則牧豎易山巔夫鑠金在鑪莊蹻不顧錢刀在路匹婦掇之非匹婦貪而莊蹻廉也輕重之制異而利害之分明也故法令可仰而不可踰可臨而不可入詩云不敢暴虎不敢馮河為其無益也魯好禮而有季孟之難燕噲好讓而有子之之亂禮讓不足禁邪而刑法可以止暴明君據法故能長制群下而久守其國也文學曰古者明其仁義之誓使民不踰上乎刑之不教而殺是以虐也與其刑不可踰不若義之不可踰也聞禮義行而刑罰中未聞刑罰行而孝悌興也高牆狹基不可立矣嚴刑峻法不可久也二世信趙高之計渫篤責而任誅斷刑者半道死者日積殺民多者為忠厲民悉者為能百姓不勝其求黔首不勝其刑海內同憂而俱不聊生故過任之事父不得於子無已之求君不得於臣知死不再生窮鼠齧貍匹夫奔萬乘舍人折弓陳勝吳廣是也當此之時天下俱起, WYG: ''}
