  - {type: variant, offset: 5765, length: 652, content: 退權利分土地趣本業養桑麻盡地力也寡功節用則民自富如是則水旱不能憂凶年不能累也大夫曰議者貴其辭約而指明可於眾人之聽不至繁文稠辭多言害有司化俗之計而家人語陶朱為生本末異徑一家數事而治生之道乃備今縣官鑄農器使民務本不營於末則無饑寒之累鹽鐵何害而罷賢良曰農天下之大業也鐵器民之大用也器用便利則用力少而得作多農夫樂事勸功用不具則田疇荒穀不殖用力鮮功自半器便與不便其功相什而倍也縣官鼓鑄鐵器大抵多為大器務應員程不給民用民用鈍弊割草不痛是以農夫作劇得獲者少百姓苦之矣大夫曰卒徒工匠以縣官日作公事財用饒器用備家人合會褊於日而勤於用鐵力不銷鍊堅柔不和故有司請總鹽鐵一其用平其賈以便百姓公私雖虞夏之為治不易於此吏明其教工致其事則剛柔和器用便此則百姓何苦而農夫何疾賢良曰卒徒工匠故民得占租鼓鑄煮鹽之時鹽與五穀同賈器和利而中用今縣官作鐵器多苦惡用費不省卒徒煩而力作不盡家人相一父子戮力各務為善器器不善者不集農事急輓運衍之阡陌之間民相與市買得以財貨五穀新幣易貨或時貰民不棄作業置田器各得所欲更繇省約縣官以徒復作繕治道橋諸發民便之今總其原一其賈器多堅䃘善惡無所擇吏數不在器難得家人不能多儲多儲則鎮生棄膏腴之日遠市田器則後良時鹽鐵賈貴百姓不便貧民或木耕手耨土耰淡食鐵官賣器不售或頗賦與民卒徒作不中呈時命助之發徵無限更繇以均劇故百姓疾苦之古者千室之邑百乘之家陶冶工商四民之求足以相更故農民不離畦畝而足乎田器工人不斬伐而足乎材木陶冶不耕田而足乎粟米百姓各得其便而上無事焉是以王者務本不作末去炫燿除雕琢湛民以禮示民以樸是以百姓務本而不營於末, WYG: 論卷六}
