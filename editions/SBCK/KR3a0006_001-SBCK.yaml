  text: 論卷第一
  hash: sha256:2a6cc6af811870f8155f087a77d92558ee32092fc786bf81a37f9750689ff9b7
body:
  text: 漢􅁊寛撰本議第一力耕第二通有第三錯幣第四禁耕第五復古第六本議第一惟始元六年有詔書使丞相御史與所舉賢良文學語問民間所疾苦文學對曰竊聞治人之道防淫佚之原廣道德之端抑末利而開仁義毋示以利然後敎化可興而風俗可移也今郡國有鹽鐡酒􅅦均輸與民争利散敦厚之樸成貪鄙之化是以百姓就本者寡趨末者衆夫文繁則質衰末盛則本􅉛末修則民淫本修則民慤民慤則財用足民侈則饑寒生願罷鹽鐡酒􅅦均輸所以進本退末廣利農業便也大夫曰匈奴背叛不臣數爲冦􅁀於邉鄙備之則勞中國之士不備則侵盜不止先帝哀邉人之乆患苦爲虜所係􅀗也故修障塞飭烽燧屯戍以備之邉用度不足故興鹽鐡設酒􅅦置均輸蕃貨長財以佐助邉費今議者欲罷之内空府庫之藏外乏執備之用使備塞乗城之士饑寒於邉將何以贍之罷之不便也文學曰孔子曰有國有家者不患寡而患不均不患貧而患不安故天子不言多少諸侯不言利害大夫不言得喪畜仁義以風之廣德行以懷之是以近者親附而遠者悅服故善克者不戰善戰者不師善師者不陣修之於廟堂而折衝還師王者行仁政無敵於天下惡用費哉大夫曰匈奴桀􅃛擅恣入塞犯厲中國殺伐郡縣朔方都尉甚悖逆不􅁤冝誅討之日乆矣陛下埀大惠哀元元之未贍不􅃘􅁀士大夫於原野縱然被堅執銳有北靣復匈奴之志又欲罷鹽鐡均輸憂邉用損武略無憂邉之心於其義未便也文學曰古者貴以德而賤用兵孔子曰逺人不服則修文德以來之旣來之則安之今廢道德而任兵革興師而伐之屯戍而備之􅁀兵露師以支乆長轉輸糧食無巳使邉境之士饑寒於外百姓勞苦於内立鹽鐡始張利官以給之非長䇿也故以罷之爲便也大夫曰古之立國家者開本末之途通有無之用市朝以一其求致士民聚萬貨農商工師各得所欲交易而退易曰通其變使民不倦故工不出則農用乖商不出則寶貨絕農用乏則榖不殖寶貨絕則財用匱故鹽鐡均輸所以通委財而調緩急罷之不便也文學曰夫􅋚民以德則民歸厚示民以利則民俗薄俗薄則背義而趨利趨利則百姓交於道而接於市老子曰貧國若有餘非多財也嗜慾衆而民躁也是以王者崇本退末以禮義防民欲實菽粟貨財市商不通無用之物工不作無用之器故商所以通鬱滯工所以備器械非治國之本務也大夫曰管子云國有沃野之饒而民不足於食者器械不備也有山海之貨而民不足於財者商工不備也隴蜀之丹漆旄羽荆􅀭之皮革骨􅁚江􅀯之柟梓竹箭燕齊之魚鹽􅏧裘兖豫之漆絲絺紵養生送終之具也待商而通待工而成故聖人作爲舟檝之用以通川谷服牛駕馬以逹陵陸致逺窮深所以交庻物而便百姓是以先帝建鐡官以贍農用開均輸以足民財鹽鐡均輸萬民所戴仰而取給者罷之不便也文學曰國有沃野之饒而民不足於食者工商盛而本業荒也有山海之貨而民不足於財者不務民用而淫巧衆也故川源不能實漏巵山海不能贍溪壑是以盤庚萃居舜藏黃金高帝禁商賈不得仕宦所以遏貪鄙之俗而醇至誠之風也排困市井防塞利門而民猶爲非也况上之爲利乎傳曰諸侯好利則大夫鄙大夫鄙則士貪士貪則庻人盜是開利孔爲民罪梯也大夫曰往者郡國諸侯各以其物貢輸往來煩雜物多苦惡或不償其費故郡置輸官以相給運而便遠方之貢故曰均輸開委府于京以籠貨物賤即買貴即賣是以縣官不失實商賈無所貿利故曰平凖平凖則民不失職均輸則民齊勞逸故平凖均輸所以平萬物而便百姓非開利孔爲民罪梯者也文學曰古者之賦稅於民也因其所工不求所拙農人納其􅀗女工効其功今釋其所有責其所無百姓賤賣貨物以便上求間者郡國或令民作布絮吏留難與之爲市吏之所入非獨齊陶之縑蜀漢之布也亦民間之所爲耳行姦賣乎農民重苦女工再稅未見輸之均也縣官猥發闔門擅市則萬物並收萬物並收則物騰躍騰躍則商賈侔利自市則吏容姦豪而富商積貨儲物以待其急輕賈姦吏收賤以取貴未見凖之平也盖古之均輸所以齊勞逸而便貢輸非以爲利而賈萬物也力耕第二大夫曰王者塞天財禁關市執凖守時以輕重御民豐年歲登則儲積以備乏絕凶年惡歲則行幣物流有餘而調不足也昔禹水湯旱百姓匱乏或相假以接衣食禹以歴山之金湯以嚴山之銅鑄幣以贈其民而天下稱仁往者財用不足戰士或不得禄而山東被災齊趙大饑頼均輸之蓄倉廩之積戰士以奉饑民以賑故均輸之物府庫之財非所以賈萬民而專奉兵師之用亦所以賑困乏而備水旱之災也文學曰古者十一而稅澤梁以時入而無禁􅀺民咸被􅀯畝而不失其務故三年耕而餘一年之蓄九年耕有三年之蓄此禹湯所以備水旱而安百姓也草萊不闢田疇不治雖擅山海之財通百味之利猶不能贍也是以古者尚力務本而種樹繁躬耕趣時而衣食足雖累凶年而人不病也故衣食者民之本稼穡者民之務也二者修則國富而民安也詩云百室盈止婦子寜止也大夫曰賢聖治家非一室富國非一道昔管仲以權譎霸而范氏以强大亡使治家養生必於農則舜不甄陶而伊尹不爲庖故善爲國者天下之下我高天下之輕我重以末易其本以虚蕩其實今山澤之財均輸之藏所以御輕重而役諸侯也汝漢之金纎微之貢所以誘外國而釣羗胡之寶也夫中國一端之縵得匈奴累金之物而損敵國之用是以驘驢馲駞衘尾入塞驒騱騵馬盡爲我畜鼲鼦狐貉采旃文罽充於内府而璧玉珊瑚瑠璃咸爲國之寶是則外國之物内流而利不外泄也異物内流則國用饒利不外泄則民用給矣詩曰百室盈止婦子寜止文學曰古者商通物而不豫工致牢而不僞故君子耕稼田魚其實一也商則長詐工則飾罵内懷闚􅎿而心不怍是以薄夫欺而敦夫薄昔桀女樂充宫室文繡衣裳故伊尹高逝遊薄而女樂終廢其國今驘驢之用不中牛馬之功鼲鼦旃罽不益錦綈之實美玉􅃢瑚出於昆山珠璣犀􅁚出於桂林此距漢萬有餘里計耕桑之功資財之費是一物而售百倍其價一也一揖而中萬鍾之粟也夫上好珍怪則淫服下流貴遠方之物則貨財外充是以王者不珍無用以節其民不愛其貨以富其國故理民之道在於節用尚本分土井田而巳大夫曰自京師東西􅀯北歴山川經郡國諸殷富大都無非街衢五通商賈之所臻萬物之所殖者故聖人因天時智者因地財上士取諸人中士勞其形長沮桀溺無百金之積蹠蹻之徒無猗頓之富宛周齊魯商偏天下故乃賈之富或累萬金追利乗羡之所致也富國何必用本農足民何必井田也文學曰洪水滔天而有禹之績河水泛濫而有宣房之功商紂􅁀虐而有孟津之謀天下煩擾而有乗羨之富夫上古至治民樸而貴本安愉而寡求當此之時道路罕行市朝生草故耕不强者無以充虚織不强者無以掩形雖有湊會之要陶室之術無所施其巧自古及今不施而得報不勞而有功者未之有也通有第三大夫曰燕之涿薊趙之邯鄲魏之温軹韓之滎陽齊之臨淄楚之宛丘鄭之陽翟三川之二周富冠海内皆爲天下名都非有助之耕其野而田其地者也居五諸侯之衢跨街衝之路也故物豐者民􅄛宅近市者家富富在術數不在勞身利在勢居不在力耕也文學曰荆陽􅀯有桂林之饒内有江湖之利左陵陽之金右蜀漢之材伐木而樹榖燔萊而播粟火耕而水耨地廣而饒財然後啙啙舊作鮆窳偷生好衣甘食雖白屋草廬歌謳鼓琴日給月单朝歌暮戚趙中山帶大河纂四通神衢當天下之蹊商賈錯於路諸侯交於道然民淫好末侈靡而不務本田疇不修男女矜飾家無斗筲鳴琴在室是以楚趙之民均貧而寡冨宋衞韓梁好本稼穡編戸齊民無不家􅄛人給故利在自惜不在勢居街衢富在儉力趣時不在歲司羽鳩也大夫曰五行東方木而丹章有金銅之山􅀯方火而交址有大海之川西方金而蜀隴有名材之林北方水而幽都有積沙之地此天地所以均有無而通萬物也今吳越之竹隋唐之材不可勝用而曹衞梁宋采棺轉尸江湖之魚萊黃之鮐不可勝食而鄒魯周韓藜藿􅂼食天地之利無不贍而山海之貨無不富也然百姓匱乏財用不足多寡不調而天下財不散也文學曰古者采椽不斵茅屋不翦衣布褐飯土硎鑄金爲鉏埏埴爲器工不造竒巧世不寶不可衣食之物各安其居樂其俗甘其食便其器是以遠方之物不交而昆山之玉不至今世俗壞而競於淫靡女極纎㣲工極技巧雕素樸而尚珍怪鑚山石而求金銀没深淵求珠璣設機䧟求犀􅁚張網羅求翡翠求蠻貉之物以眩中國徙卭筰之貨致之東海交萬里之財曠日費功無益於用是以褐夫匹婦勞罷力屈而衣食不足也故王者禁溢利節漏費溢利禁則反本漏費節則民用給是以生無乏資死無轉尸也大夫曰古者宫室有度輿服以庸采椽茅茨非先王之制也君子節奢刺儉儉則固昔孫叔敖相楚妻不衣帛馬不秣粟孔子曰不可大儉極下此蟋蟀所爲作也管子曰不飾宫室則材木不可勝用不充庖厨則禽獸不損其壽無味利則本業所出無黼黻則女工不施故工商梓匠􅀖國之用器械之備也自古有之非獨於此弦高飯牛於周五羖賃車入秦公輸子以䂓矩歐冶以鎔鑄語曰百工居肆以成其事農商交易以利本末山居澤處蓬蒿墝埆財物流通有以均之是以多者不獨􅄛少者不獨饉􅀂各居其處食其食則是橘柚不鬻朐鹵之鹽不出旃罽不市而吳唐之財不用也文學曰孟子云不違農時榖不可勝食􅁞麻以時布帛不可勝衣也斧斤以時入材木不可勝用田漁以時魚肉不可勝食􅀂則飾宫室增臺榭梓匠斵巨爲小以圓爲方上成雲氣下成山林則材木不足用也男子去本爲末雖雕文刻鏤以􅁚禽獸窮物究變則榖不足食也婦女飾微治細以成文章極技盡巧則絲布不足衣也庖宰烹殺胎􅆑􅋩炙齊和窮極五味則魚肉不足食也當今世非患禽獸不損材木不勝患􅆫侈之無窮也非患無旃罽橘柚患無狹廬糠糟也
