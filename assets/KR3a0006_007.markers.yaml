  - {type: variant, offset: 1418, length: 179, content: 勝聲相聞疾病相恤無過時之師無踰時之役內節於民心而事適其力是以行者勸務而止者安業今山東之戎馬甲士戍邊郡者絕殊遼遠身在胡越心懷老母老母垂泣室婦悲恨推其饑渴念其寒苦詩云昔我往矣楊柳依依今我來思雨雪霏霏行道遲遲載渴載饑我心傷悲莫之我哀故聖人憐其如此閔其久去父母妻子暴露中野居寒苦之地故春使使者勞賜舉失職者所以哀遠民而慰撫老母也德惠甚厚而吏未稱奉職承詔以存恤或侵侮士卒, WYG: ''}
