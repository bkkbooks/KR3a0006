body:
  text: 晁錯第八大夫曰春秋之法君親無將將而必誅故臣罪莫重於弑君子罪莫重於弑父日者淮􅀯衡山修文學招四方逰士山東儒墨咸聚於江淮之間講議集論著書數十篇然卒於背義不臣謀叛逆誅及宗族使􅄯錯變法易常不用制度迫蹙宗族侵削諸侯蕃臣不附骨肉不親吳楚積怨斬錯東市以慰三軍之士而謝諸侯斯亦誰殺之乎文學曰孔子不飲盜泉之流曽子不入勝母之閭名且惡之而况爲不臣不子乎是以孔子沐浴而朝告之哀公陳文子有馬十乗棄而違之傳曰君子可貴可賤可刑可殺而不可使爲亂􅀂夫外飾其貌而内無其實口誦其文而行不由其道是盜固與盜而不容於君子之域春秋不以寡犯衆誅絕之義有所止不兼怨惡也故舜之誅誅鯀其舉舉禹夫以璵璠之玼而棄其璞以一人之罪而兼其衆則天下無美寶信士也􅄯生言諸侯之地大富則驕奢急即合從故因吳之過而削之會稽因楚之罪而奪之東海所以均輕重分其權而爲萬世慮也弦高誕於秦而信於鄭晁生忠於漢而讎於諸侯人臣各死其主爲其國用此解揚之所以厚於晉而薄於荆也刺權第九大夫曰今夫越之具區楚之雲夣宋之鉅野齊之孟諸有國之富而霸王之資也人君統而守之則强不禁則亡齊以其腸胃予人家强而不制枝大而折榦以專巨海之富而擅魚鹽之利也􅀔足以使衆恩足以䘏下是以齊國内倍而外附權移於臣政墜於家公室卑而田宗强轉轂游海者盖三千乗失之於本而末不可救今山川海澤之原非獨雲夣孟諸也鼓金煮鹽其􅀔必深居幽谷而人民所罕至姦猾交通山海之際恐生大姦乗利驕溢敦樸滋僞則人之貴本者寡大農鹽鐡丞咸陽孔僅等上請願募民自給費因縣官器煮鹽予用以杜浮僞之路由此觀之令意所禁微有司之慮亦遠矣文學曰有司之慮遠而權家之利近令意所禁微而僣奢之道著自利害之設三業之起貴人之家雲行於塗轂擊於道攘公法申私利跨山澤擅官市非特巨海魚鹽也執國家之柄以行海内非特田常之􅀔陪臣之權也威重於六卿富累於陶衞輿服僣於王公宫室溢於制度并兼列宅隔絕閭巷閣道錯連足以㳺觀鑿池曲道足以騁騖臨淵釣魚放犬走兎隆豺鼎力蹋鞠鬬鷄中山素女撫流徴於堂上鳴鼓巴兪作於堂下婦女被羅紈婢妾曵絺紵子孫連車列􅀐田獵出入畢弋捷徤是以耕者釋耒而不勤百姓冰釋而懈怠何者巳爲之而彼取之僣侈相効上升而不息此百姓所以滋僞而罕歸本也大夫曰官尊者禄厚本美者枝荗故文王德而子孫封周公相而伯禽富水廣者魚大父尊者子貴傳曰河海􅃳千里盛德及四海况之妻子乎故夫貴於朝妻貴於室富曰苟美古之道也孟子曰王子與人同而如彼者居使然也居編戸之列而望卿相之子孫是以跛夫之欲及樓季也無錢而欲千金之寶不亦虚望哉文學曰禹稷自布衣思天下有不得其所者􅀂巳推而納之溝中故起禹佐尭平治水土敎民稼穡其自任天下如此其重也豈云食禄以養妻子而巳乎夫食萬人之力者蒙其憂任其勞一人失職一官不治皆公卿之累也故君子之仕行其義非樂其􅀔也受禄以􅃳賢非私其利見賢不􅀮食禄不專此公叔之所以爲文魏成子所以爲賢也故周德成而後封子孫不以爲黨周公功成而後受封天下不以爲貪今則不然親戚相推朋黨相舉父尊於位子溢於内夫貴於朝妻謁行於外無周公之德而有其富無管仲之功而有其侈故編户跛夫而望疾歩也刺復第十大夫曰爲色矜而心不懌曰但居者不知􅀒載之勞從旁議者與當局者異憂方今爲天下腹居郡諸侯並臻中外未然心憧憧􅀂渉大川遭風而未薄是以夙夜思念國家之用寢而忘寐饑而忘食計數不離於前萬事簡閱於心丞史器小不足與謀獨鬱大道思覩文學􅀂俟周邵而望子高御史案事郡國察廉舉賢才歲不乏也今賢良文學臻者六十餘人懷六藝之術騁意極論宜􅀂開光發蒙信往而乖於今道古而不合於世務意者不足以知士也將多飾文誣能以亂實邪何賢士之難覩也自千乗倪寛以治尚書位冠九卿及所聞覩選舉之士擢升賛憲甚顯然未見絕倫比而爲縣官興滯立功也文學曰輸子之制材木也正其䂓矩而鑿枘調師曠之諧五音也正其六律而宫商調當世之工匠不能調其鑿枘則改䂓矩不能恊聲音則變舊律是以鑿枘刺戾而不合聲音泛越而不和夫舉䂓矩而知宜吹律而知變上也因循而不作以俟其人次也是以曹丞相日飮醇酒倪大夫閉口不言故治大者不可以煩煩則亂治小者不可怠怠則廢春秋曰其政恢卓恢卓可以爲卿相其政察察察察可以爲匹夫夫維綱不張禮義不行公卿之憂也案上之文期會之事丞史之任也尚書曰俊乂在官百僚師師百工惟時庻尹􅁢諧言官得其人人任其事故官治而不亂事起而不廢士守其職大夫理其位公卿總要執凢而巳故任能者責成而不勞任巳者事廢而無功􅁊公之於管仲耳而目之故君子勞於求賢逸於用之豈云殆哉昔周公之相也謙卑而不鄰以勞天下之士是以俊乂滿朝賢智充門孔子無爵位以布衣從才士七十有餘人皆諸侯卿相之人也况處三公之尊以養天下之士哉今以公卿之上位爵禄之美而不能致士則未有進賢之道尭之舉舜也賓而妻之􅁊公舉管仲也賓而師之以天子而妻匹夫可謂親賢矣以諸侯而師匹夫可謂敬賔矣是以賢者從之􅀂流歸之不疑今當世在位者旣無燕昭之下士鹿鳴之樂賢而行臧文子叔之意蔽賢妬能自高其智訾人之才足巳而不問卑士而不友以位尚賢以禄驕士而求士之用亦難矣大夫繆然不言盖賢良長嘆息焉御史進曰太公相文武以王天下管仲相􅁊公以霸諸侯故賢者得位猶龍得水騰虵游霧也公孫丞相以春秋說先帝據即三公處周召之列據萬里之􅀔爲天下凖繩衣不重彩食不兼味以先天下而無益於治􅀶士禇泰徐偃等承明詔建節馳傳巡省郡國舉孝廉勸元元而流俗不改招舉賢良方正文學之士超遷官爵或至卿大夫非燕昭之薦士文王之廣賢也然而未覩功業所成殆非龍蛇之才而鹿鳴之所樂賢也文學曰氷炭不同器日月不竝明當公孫弘之時人主方設謀垂意於四夷故權譎之謀進荆楚之士用將帥或至封侯食邑而勉􅀗者咸蒙厚賞是以􅁬擊之士由此興其後干戈不休軍旅相望甲士麋弊縣官用不足故設險興利之臣起磻溪熊羆之士􅀮涇淮造渠以通漕運東郭偃孔僅建鹽鐡䇿諸利富者買爵敗官免刑除罪公用彌多而爲者徇私上下無求百姓不堪抗弊而從法故􅉃急之臣進而見知廢格之法起杜周咸宣之屬以峻文決理貴而王温舒之徒以鷹隼擊殺顯其欲據仁義以道事君者寡偷合取容者衆獨以一公孫弘如之何論儒第十一御史曰文學祖述仲尼稱誦其德以爲自古及今未之有也然孔子修道魯衞之間敎化洙泗之上弟子不爲變當世不爲治魯國之削滋甚齊宣王襃儒尊學孟軻淳于髠之徒受上大夫之禄不任職而論國事蓋齊稷下先生千有餘人當此之時非一公孫弘也弱燕攻齊長驅至臨淄湣王遁逃死於莒而不能救王建禽於秦與之俱虜而不能存􅀂此儒者之安國尊君未始有効也文學曰無鞭䇿雖造父不能調駟馬無世位雖舜禹不能治萬民孔子曰鳳鳥不至河不岀圖吾巳矣夫故軺車良馬無以馳之聖德仁義無所施之齊宣之時不顯賢進士國家富强威行敵國及湣王奮二世之餘烈􅀯舉楚淮北并巨宋苞十二國西摧三晉郤彊秦五國賔從鄒魯之君泗上諸侯皆入臣矜功不休百姓不堪諸侯諫不從各分散慎到捷子亡去田駢如薛而孫卿適楚内無良臣故諸侯合謀而伐之王建聽流說信反間用后勝之計不與諸侯從親以亡國爲秦所禽不亦宜乎御史曰伊尹以割烹事湯百里以飯牛要穆公始爲苟合信然與之霸王如此何言不從何道不行故商君以王道說孝公不用即以彊國之道卒以就功鄒子以儒術干世主不用即以變化始終之論卒以顯名故馬効千里不必胡代士貴成功不必文辭孟軻守舊術不知世務故困於梁宋孔子能方不能圓故饑于􅀺丘今晚世之儒勤德時有乏匱言以爲非因此不行自周室以來千有餘歲獨有文武成康如言必叅一焉取所不能及而稱之猶躄者能言遠不能行也聖人異塗同歸或行或止其趣一也商君雖革法改敎志存於彊國利民鄒子之作變化之術亦歸於仁義􅀕仲自貶損以行權時也故小枉大􅀡君子爲之今硜硜然守一道引尾生之意即晉文之譎諸侯以尊周室不足道而管仲蒙耻辱以存亡不足稱也文學曰伊尹之于湯知聖主也百里之歸秦知明君也二君之能知霸王其􅁽素形於巳非暗而以冥冥決事也孔子曰名不正則言不順言不順則事不成如何其苟合而以成霸王也君子執德秉義而行故造次必於是顚沛必於是孟子曰居今之朝不易其俗而成千乗之􅀔不能一朝居也寜窮饑居於陋巷安能變巳而從俗化闔廬殺僚公子札去而之延陵終身不入吳國魯公殺子赤叔眄退而􅀮處不食其禄􅉛義得尊枉道取容効死不爲也聞正道不行釋事而退未聞枉道以求容也御史曰論語親於其身爲不善者君子不入也有是言而行不足從也季氏爲無道逐其君奪其政而冉求仲由臣焉禮男女不授不交爵孔子適衞因嬖臣彌子瑕以見衞夫人子路不說子瑕佞臣也夫子因之非正也男女不交孔子見􅀯子非禮也禮義由孔氏且貶道以求容惡在其釋事而退也文學曰天下不平庻國不寜明王之憂也上無天子下無方伯天下煩亂賢聖之憂也是以尭憂洪水伊尹憂民管仲束縳孔子周流憂百姓之禍而欲安其危也是以􅀒􅂦爼囚拘匍匐以救之故追亡者趨拯溺者濡今民䧟溝壑雖欲無濡豈得巳哉御史默不對憂邉第十二大夫曰文學言天下不平庻國不寧明王之憂也故王者之於天下猶一室之中也有一人不得其所則謂之不樂故民流沉溺而弗救非惠君也國家有難而不憂非忠臣也夫守節死難者人臣之職也衣食饑寒者慈父之道也今子弟遠於勞外人主爲之夙夜不寜群臣盡力畢議􅁽滋國用故少府丞令請建酒􅅦以贍邉給戰士拯救民於難也爲人父兄者豈可以巳乎内省衣食以䘏在外者猶未足今又欲罷諸用減奉邉之費未可爲慈父賢兄也文學曰周之季末天子㣲弱諸侯力政故國君不安謀臣奔馳何者敵國衆而社稷危也今九州同域天下一統陛下優游巖廊覽群臣極言至内論雅頌外鳴和鑾純德粲然並於唐虞功烈流於子孫夫蠻貊之人不食之地何足以煩慮而有戰國之憂哉若陛下不棄加之以德施之以惠北夷必内向欵塞自至然後以爲胡制於外臣即匈奴没齒不食其所用矣大夫曰聖主思念中國之未寜北邉之未安故使廷尉評等問人間所疾苦拯䘏貧賤周贍不足君臣所宣明王之德安宇内者未得其紀故問諸生諸生議不干天則入淵乃欲以閭里之治而况國家之大事亦不幾矣發於􅅵畝岀於窮巷不知冰水之寒􅀂醉而新寐殊不足與言也文學曰夫欲安民富國之道在於反本本立而道生順天之理因地之利即不勞而功成夫不修其源而事其流無本以統之雖竭精神盡思慮無益於治欲安之適足以危之欲救之適足以敗之夫治亂之端在於本末而巳不至勞其心而道可得也孔子曰不通於論者難於言治道不同者不相與謀今公卿意有所􅀝故文學之言不可用也大夫曰吾聞爲人臣者盡忠以順職爲人子者致孝以承業君有非則臣覆盖之父有非則子匿逃之故君薨臣不變君之政父没則子不改父之道也春秋譏毀泉䑓爲其隳先祖之所爲而揚君父之惡也今鹽鐡均輸所從來乆矣而欲罷之得無害先帝之功而妨聖主之德乎有司􅀝於忠孝之路是道殊而不同於文學之謀也文學曰明者因時而變知者隨世而制孔子曰麻冕禮也今也純儉吾從衆故聖人上賢不離古順俗而不偏冝魯定公序昭穆順祖禰昭公廢卿士以省事節用不可謂變祖之所爲而改父之道也二世充大阿房以崇緒趙高增累秦法以廣威而未可謂忠臣孝子也鹽鐡論卷第二鹽鐡論卷第三
