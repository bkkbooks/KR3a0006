  - {type: variant, offset: 258, length: 464, content: 食貨志曰大農上鹽鐵丞孔僅咸陽言山海天地之崴也皆宜屬少府陛下不私以屬大農佐賦願募民自給費因官器作煮鹽官與牢盆浮食竒名欲擅管山海之貨以致富羡役利細民其沮事之議不可勝聼敢私鑄鐵器煮鹽者鈇左趾沒入其器物郡不出鐵者置小鐵官便屬在所縣使孔僅東郭咸陽乗傳舉行天下鹽鐵作官府除故鹽鐵家富者為吏武帝紀曰天漢三年春二月初𣙜酒酤是時桑𢎞羊為大司農蓋其所建也應劭曰縣官自酤𣙜賣酒小民不得復酤也韋昭曰𣙜謂禁民酤釀獨官開置如道路設木為𣙜獨取利也爾雅謂之石杠今之畧彴是也禁閉其事揔利入官而下無由以得有若渡水之𣙜因立名焉史記平凖書曰元封元年桑𢎞羊為治粟都尉領大農代孔僅筦天下鹽鐵𢎞羊以諸官各自市相與争物故騰躍而天下賦輸或不償其僦費乃請置大農部丞數十人分部主郡國各徃徃縣置均輸令逺方各以其物貴時商賈所轉販者為賦而相灌輸置平凖于京師都受天下委輸各工官治車諸器皆仰給大農大農之諸官盡籠天下之貨物貴即賣之賤則買之如此富商大賈無所牟大利則反本而萬物不得騰踊故抑天下物名曰平凖天子以為然許之於是天子北至朔方東到太山廵海上並北邊以歸所過賞賜用帛百餘萬匹錢金以巨萬計皆取足大農, SBCK: ''}
