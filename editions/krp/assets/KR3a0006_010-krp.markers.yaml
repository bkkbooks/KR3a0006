  - {type: indent, offset: 5, content: 　　　　　　　　　　　　, id: KR3a0006_krp_010-bkkind2}
  - {type: variant, offset: 5, length: 0, content: '', SBCK: 三誅秦第四十四伐功第四十五西域第四十六世務第四十七和親第四十八結和第四十三大夫曰}
  - {type: indent, offset: 6, content: 　, id: KR3a0006_krp_010-bkkind3}
  - {type: variant, offset: 6, length: 1, content: 桓, SBCK: 興以來修好結和親所聘遺單于者甚厚然不紀重質厚賂之故改節而􅁀害滋甚先帝覩其可以武折而不可以德懷故廣將帥招􅁬擊以誅􅍏罪功勲粲然著於海内藏於記府何命亡十􅀗一乎夫偷安者後危慮近者憂邇賢者離俗智士權行君子所慮衆庻疑焉故民可以觀成不可與圖始此有司所獨見而文學所不覩文學曰往者匈奴結和親諸夷納貢即君臣外内相信無胡越之患當此之時上求寡而易贍民安樂而無事耕田而食桑麻而衣家有數年之稸縣官餘貨財閭里耆老或及其澤自是之後退文任武苦師勞衆以略無用之地立郡沙石之間民不能自守發屯乗城輓輦而贍之愚竊見其亡不覩其成大夫曰匈奴以虚名市於漢而實不從數爲蠻貊所紿不痛之何故也高皇帝仗劍定九州今以九州而不行於匈奴閭里常民尚有梟散况萬里之主與小國之匈奴乎夫以天下之力勤何不權以天下之士民何不服今有帝名而威不信長城反賂遺而尚踞敖此五帝所不􅃘三王所畢怒也文學曰湯事夏而卒服之周事殷而卒滅之故以大御小者王以强凌弱者亡聖人不困其衆以兼國良御不困其馬以兼道故造父之御不失和聖人之治不倍德秦攝利衡以御宇内執修箠以笞八極驂服以罷而鞭䇿愈加故有傾衡遺箠之變士民非不衆力勤非不多也皆内倍外附而莫爲用此高皇帝所以仗劍而取天下也夫兩主好合内外交通天下安寜世世無患士民何事三王何愁焉大夫曰伯翳之始封秦地爲七十里穆公開霸孝公廣業自卑至上自小至大故先祖基之子孫成之軒轅戰涿鹿殺兩曎蚩尤而爲帝湯武伐夏商誅桀紂而爲王黃帝以戰成功湯武以伐成孝故手足之勤腹腸之養也當世之務後世之利也今四夷内侵不攘萬世必有此長患先帝興義兵以誅􅁀强東滅朝鮮西定冉駹􅀯擒百越北挫强胡李牧追匈奴以廣北州湯武之舉蚩尤之兵也故聖主斥地非私其利用兵非徒􅁬怒也所以匡難辟害以爲􅀺民遠慮文學曰秦􅀯禽勁越北却强胡竭中國以役四夷人罷極而主不恤國内潰而上不知是以一夫倡而天下和兵破陳渉地奪諸侯何嗣之所利詩云雍雍鳴旭日始旦登得前利不念後咎故吳王知伐齊之便而不知干遂之患秦知進取之利而不知鴻門之難是以知一而不知十也周謹小而得大秦欲大而亡小語曰前車覆後車戒殷􅁥不遠在夏后之世矣誅秦第四十四大夫曰秦楚燕齊周之封國也三晉之君齊之田氏諸侯家臣也内守其國外伐不義地廣壤進故立號萬乗而爲諸侯宗周室脩禮長文然國翦弱不能自存東攝六國西畏於秦身以放遷宗廟絕祀頼先帝大惠紹興其後封嘉頴川號周子男君秦旣并天下東絶沛水并滅朝鮮􅀯取陸梁北却胡狄西略氐羗立帝號朝四夷舟車所通足迹所及靡不畢至非服其德畏其威也力多則人朝力寡則朝於人矣文學曰禹舜尭之佐也湯文夏商之臣也其所以從八極而朝海内者非以陸梁之地兵革之威也秦楚三晉號萬乗不務積德而務相侵搆兵爭强而卒俱亡雖以進壤廣地如食萴之充腸也欲其安存何可得也夫禮讓爲國者􅀂江海流彌乆不竭其本美也苟爲無本􅀂蒿火􅁀怒而無繼其亡可立而待戰國是也周德衰然後列於諸侯至今不絕秦力盡而滅其族安得朝人也大夫曰中國與邉境猶支體與腹心也夫肌膚寒於外腹腸疾於内内外之相勞非相爲助也唇亡則齒寒支體傷而心􅉃怛故無手足則支體廢無邉境則内國害昔者戎狄攻太王於邠踰岐梁而與秦界於涇渭東至晉之陸渾侵􅁀中國中國疾之今匈奴􅁞食内侵遠者不離其苦獨邉境蒙其敗詩云憂心􅃤􅃤念國之爲虐不征備則􅁀害不息故先帝興義兵以征􅍏罪遂破祁連天山散其聚黨北略至龍城大圍匈奴單于失魂僅以身免乗奔逐北斬首捕虜十餘萬控弦之民旃裘之長莫不沮膽挫折遠遁遂乃振旅渾耶率其衆以降置五屬國以治胡則長城之内河山之外罕􅀍冦􅫱於是下詔令減戍漕}
