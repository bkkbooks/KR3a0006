  - {type: variant, offset: 2406, length: 522, content: 乃留心於末計摧本議不順上意未為盡於忠也大夫曰初貳師不克宛而還也議者欲使人主不遂忿則西域皆瓦解而附於胡胡得眾國而益強先帝絕奇聽行武威還襲宛宛舉國以降效其器物致其寶馬烏孫之屬駭膽請為臣妾匈奴失魄奔走遁逃雖未盡服遠處寒苦墝埆之地壯者死於祁連天山其孤未復故群臣議以為匈奴困於漢兵折翅傷翼可遂擊服會先帝棄群臣以故匈奴不革譬如為山未成一簣而止度功業而無繼成之理是棄與胡而資強敵也輟幾沮成為主計若斯亦未可謂盡忠也文學曰有司言外國之事議者皆徼一時之權不慮其後張騫言大宛之天馬汗血安息之真玉大鳥縣官既聞如甘心焉乃大興師伐宛歷數期而後克之夫萬里而攻人之國兵不戰而物故過半雖破宛得寶馬非計也當此之時將卒方赤面而事四夷師旅相望郡國並發黎人困苦姦偽萌生盜賊並起守尉不能禁城邑不能止然後遣上大夫衣繡衣以興擊之當此時百姓元元莫必其命故山東豪傑頗有異心賴先帝聖靈斐然其咎皆在於欲畢匈奴而遠幾也為主計若此可謂忠乎世務第四十七大夫曰諸生妄言議者令可詳用無徒守椎車之語滑稽而不可循夫漢之有匈奴譬若木之有蠹如人有疾不治則寖以深故謀臣以為擊奪以困極之諸生言以德懷之此有其語而不可行也諸生上無以似三王下無以似近秦令有司可舉而行當世安蒸庶而寧邊境者乎文學曰昔齊桓公內附百姓外綏諸侯存亡接絕而, WYG: ''}
