  - {type: variant, offset: 1033, length: 0, content: '', WYG: 音汙也詩解曰戚施不能仰隗疾也李善曰闒茸猥賤也茸細毛也張栮訓話以為關獰劣也吕忱字林曰闒茸不肖也鄒陽曰女無美惡入宫見妬士無賢不肖入朝見嫉説林訓曰駿馬以材死直士以正窮賢者擯於朝美女擯於宫尊賢篇曰陽因見趙簡主曰臣居鄉三逐事君五去聞君好士故走來見簡主聞之絶食而歎跽而行左右進諫曰居鄉三逐是不容衆也事君五去是不忠上也今君有士不為少矣簡主曰子不知也夫美女者醜婦之仇也盛徳之士亂世所疏也正直之行邪枉所憎也遂出見之因投以為相而國大治由是觀之逺近之人不可以不察}
