  - {type: variant, offset: 1090, length: 0, content: '', WYG: 音扶為政而使菽粟如水火民安有不仁者乎韓非子曰夫山居而谷汲者膢臘而相遺以水澤居苦水者買庸而決竇故饑嵗之春幼弟不饟穰嵗之秋疏客必食非疏骨肉愛過客也多少之實異也是以古人易財也非仁也財多也今之争奪非鄙也財寡也齊俗訓曰夫民有餘即讓不足則争讓則}
  - {type: variant, offset: 1090, length: 0, content: '', krp: 音扶為政而使菽粟如水火民安有不仁者乎韓非子曰夫山居而谷汲者膢臘而相遺以水澤居苦水者買庸而決竇故饑嵗之春幼弟不饟穰嵗之秋疏客必食非疏骨肉愛過客也多少之實異也是以古人易財也非仁也財多也今之争奪非鄙也財寡也齊俗訓曰夫民有餘即讓不足則争讓則}
  - {type: variant, offset: 1091, length: 1, content: 讓, WYG: 義生争則暴亂起扣門求水火莫弗與者所饒足也林中不賣薪湖上不鬻魚所有餘也故物豐則欲省求贍則争止秦王之時或人葅子利不足也劉氏持政獨夫收孤財有餘也故世治則小人守政而利不能誘也世亂則君子}
