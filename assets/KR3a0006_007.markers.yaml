  - {type: variant, offset: 1697, length: 0, content: '', SBCK: 賢良曰蓋橈枉者過直救文者以質昔者晏子相齊一􅈢裘三十載故民奢示之以儉民儉示之以禮方今公卿大夫子孫誠能節車輿適衣服躬親節儉率以敦朴罷園池損田宅内無事乎市列外無事乎山澤農夫有所施其功女工有所粥其業如是則氣脉和平無聚不足之病矣大夫曰孤子語孝躄者語杖貧者語仁賤者語治議不在巳者易稱從旁議者易是其當局則亂故公孫弘布􅀍倪寛練􅂁衣若僕妾食􅀂庸夫淮南逆於内蠻夷􅁀於外盗賊不爲禁奢侈不爲節􅀂疫歲之巫徒能鼓口耳何散不足之能治乎賢良曰高皇帝之時蕭曹為公􅅬灌之屬爲卿濟濟然斯則賢矣文景之際建元之始大臣尚有爭引守正之義自此之後多承意從欲少敢直言靣議而正刺因公而徇私故武安丞相訟園田爭曲直人主之前夫}
