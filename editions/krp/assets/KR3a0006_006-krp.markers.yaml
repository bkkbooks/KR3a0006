  - {type: variant, offset: 15259, length: 160, content: 漢儀注立秋貙膢蘇林曰貙虎屬常以立秋日祭獸王者亦以此日出獵還以祭宗廟故有貙膢之祭也蔡邕獨㫁曰臘者嵗終大祭縦吏民宴飲風俗通曰按韓子書山居谷汲者膢臘而買水楚俗常以十二月祭飲食也又曰嘗新始殺也食新曰膒膢按禮傳夏曰嘉平殷曰清祀周曰大蜡漢改為臘臘者獵也言田獵取獸以祭祀其先祖也或曰臘者接也新故交接故大祭以報功也漢家火行衰於戌故曰臘也, SBCK: ''}
