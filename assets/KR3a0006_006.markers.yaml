  - {type: variant, offset: 81, length: 0, content: '', SBCK: 省其私行狂夫不􅃘爲况無東方朔之口其餘無可觀者也文學曰志善者忘惡謹小者致大爼豆之間足以觀禮閨門之内足以論行夫服古之服誦古之道舎}
  - {type: variant, offset: 81, length: 0, content: '', WYG: 不樂見於顔色臣又知之君豈私臣哉天生仁人之心其固然也此臣之所以脫君也孔子聞之曰善為吏者樹徳不善為吏者怨公行之也其子羔之謂歟食人之重祿不能更處人尊官不能存何其厚於己}
