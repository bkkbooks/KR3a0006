  - {type: variant, offset: 4486, length: 0, content: '', WYG: 耕於野以待專諸之事十二年冬楚平王卒十三年春呉欲因楚䘮而伐之使公子蓋餘燭庸以兵圍楚之六灊使季札於晉以觀諸侯之變楚發兵絶呉兵後呉兵不得還於是呉公子光曰此時不可失也告專諸曰不索何獲我真王嗣當立吾欲求之季子雖至不吾廢也專諸曰王僚可殺也母老子弱而兩公子將兵}
  - {type: variant, offset: 4486, length: 0, content: '', krp: 耕於野以待專諸之事十二年冬楚平王卒十三年春呉欲因楚䘮而伐之使公子蓋餘燭庸以兵圍楚之六灊使季札於晉以觀諸侯之變楚發兵絶呉兵後呉兵不得還於是呉公子光曰此時不可失也告專諸曰不索何獲我真王嗣當立吾欲求之季子雖至不吾廢也專諸曰王僚可殺也母老子弱而兩公子將兵}
  - {type: variant, offset: 4487, length: 3, content: 疽孔丘, WYG: 楚楚絶其路方今呉外困於楚而内空無骨鯁之臣是無奈我何光曰我身子之身也四月丙子光伏甲士於窟室而謁王僚飲王僚使兵陳於道自王宫至光之家門階戸席皆王僚之親也人夾持鈹公子光詳為足疾入于窟室使專諸置匕首於炙魚之中}
