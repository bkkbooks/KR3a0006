  - {type: variant, offset: 10, length: 7675, content: 大夫曰古者經井田制廛里丈夫治其田疇女子治其麻枲無曠地無遊人故非商工不得食於利末非良農不得食於收穫非執政不得食於官爵今儒者釋耒耜而學不驗之語曠日彌久而無益於治往來浮游不耕而食不蠶而衣巧偽良民以奪農妨政此亦當世之所患也文學曰禹慼洪水身親其勞澤行路宿過門不入當此之時簪墮不掇冠挂不顧而暇耕乎孔子曰詩人疾之不能默丘疾之不能伏是以東西南北七十說而不用然後退而修王道作春秋垂之萬載之後天下折中焉豈與匹夫匹婦耕織同哉傳曰君子當時不動而民無觀也故非君子莫治小人非小人無以養君子不當耕織為匹夫匹婦也君子耕而不學則亂之道也大夫曰文學言治尚於唐虞言義高於秋天有華言矣未見其實也昔魯穆公之時公儀為相子思子柳為之卿然北削於齊以泗為境南畏楚人西賓秦國孟軻居梁兵折於齊上將軍死而太子虜西敗於秦地奪壤削亡河內河外夫仲尼之門七十子之徒去父母捐室家負荷而隨孔子不耕而學亂乃愈滋故玉屑滿篋不為有寶誦詩書負笈不為有道要在安國家利人民不苟繁文眾辭而已文學曰虞不用百里奚之謀而滅秦穆用之以至霸焉夫不用賢則亡而不削何可得乎孟子適梁惠王問利荅以仁義趣舍不合是以不用而去懷寶而無語故有粟不食無益於饑覩賢不用無益於削紂之時內有微箕二子外有膠鬲棘子故其不能存夫言而不用諫而不聽雖賢惡得有益於治也大夫曰橘柚生於江南而民皆甘之於口味同也好音生於鄭衛而人皆樂之於耳聲同也越人子臧戎人由余待譯而後通而並顯齊秦人之心於善惡同也故曾子倚山而吟山鳥下翔師曠鼓琴百獸率舞未有善而不合誠而不應者也意未誠與何故言而不見從行而不合也文學曰扁鵲不能治不受鍼藥之疾賢聖不能正不食諫諍之君故桀有關龍逄而夏亡紂有三仁而商滅故不患無由余子臧之論患無桓穆之聽耳是以孔子東西無所適遇屈原放逐於楚國也故曰直道而事人焉往而不三黜枉道而事人何必去父母之邦終非以此言而不見從行而不得合者也大夫曰歌者不期於利聲而貴在中節論者不期於麗辭而務在事實善聲而不知轉未可為能歌也善言而不知變未可謂能說也持規而非矩執準而非繩通一孔曉一理而不知權衡以所不覩不信人若蟬之不知雪堅據古文以應當世猶辰參之錯膠柱而調瑟固而難合矣孔子所以不用於世而孟軻見賤於諸侯也文學曰日月之光而盲者不能見雷電之聲而聾人不能聞夫為不知音者言若語於瘖聾何特蟬之不知重雪耶夫以伊尹之智太公之賢而不能開辭於桀紂非說者非聽者過也是以荊和抱璞而泣血曰安得良工而剖之屈原行吟澤畔曰安得皋陶而察之夫人君莫不欲求賢以自輔任能以治國然牽於流說惑於道諛是以賢聖蔽掩而讒佞用事以此亡國破家而賢士饑於巖穴也昔趙高無過人之志而居萬人之位是以傾覆秦國而禍殃其宗盡失其瑟何膠柱之調也大夫曰所謂文學高第者智略能明先王之術而資質足以履行其道故居則為人師用則為世法今文學言治則稱堯舜道行則言孔墨授之政則不達懷古道而不能行言直而行枉道是而情非衣冠有以殊於鄉曲而實無以異於凡人諸生所謂中直者遭時蒙幸備數適然耳殆非明舉所謂固未可與論治也文學曰天設三光以照記天子立公卿以明治故曰公卿者四海之表儀神化之丹青也上有輔明主之任下有遂聖化之事和陰陽調四時安眾庶育群生使百姓輯睦無怨思之色四夷順德無叛逆之憂此公卿之職而賢者之所務也若伊尹周召三公之才太顛閎夭九卿之人文學不中聖主之明舉今之執政亦未能稱盛德也大夫不說作色不應也文學曰朝無忠臣者政闇大夫無直士者位危任座正言君之過文侯改言行稱為賢君袁盎面刺絳侯之驕矜卒得其慶故觸死亡以干主之過者忠臣也犯嚴顏以匡公卿之失者直士也鄙人不能巷言面違方今入穀之教令張而不施食祿多非其人以妨農商工市井之利未歸於民民望不塞也且夫帝王之道多墮壞而不修詩云濟濟多士意者誠任用其計非苟陳虛言而已殊路第二十一大夫曰七十子躬受聖人之術有名列於孔子之門皆諸侯卿相之才可南面者數人云政事者冉有季路言語宰我子貢宰我秉事有寵於齊田常作難道不行身死庭中簡公殺於檀臺子路仕衛孔悝作亂不能救君出亡身葅於衛子貢子皋遁逃不能死其難食人之重祿不能更處人尊官不能存何其厚於己而薄於君哉同門共業自以為知古今之義明君臣之禮或死或亡二三子殊路何道之悖也文學曰宋殤公知孔父之賢而不早任故身死魯莊知季有之賢授之政晚而國亂衛君近佞遠賢子路居蒲孔悝為政簡公不聽宰我而漏其謀是以二君身被放殺而禍及忠臣二子者有事而不與其謀故可以死可以生去止其義一也晏嬰不死崔慶之難不可謂不義微子去殷之亂可謂不仁乎大夫曰至美素璞物莫能飾也至賢保真偽文莫能增也故金玉不琢美珠不畫今仲由冉求無檀柘之材隋和之璞而強文之譬若彫朽木而礪鈆刀飾嫫母畫土人也被以五色斐然成章及遭行潦流波則沮矣夫重懷古道枕籍詩書危不能安亂不能治郵里逐鷄鷄亦無黨也文學曰非學無以治身非禮無以輔德和氏之璞天下之美寶也待礛諸之工而後明毛嬙天下之姣人也待香澤脂粉而後容周公天下之至聖人也待賢師學問而後通今齊世庸士之人不好學問專以己之愚而荷負巨任若無楫舳濟江海而遭大風漂沒於百仞之淵東流無崖之川安得沮而止乎大夫曰性有剛柔形有好惡聖人能因而不能改孔子外變二三子之服而不能革其心故子路解長劍去危冠屈節於夫子之門然攝齊師友行行爾鄙心猶存宰予晝寢欲損三年之喪孔子曰糞土之墻不可杇也若由不得其死然故內無其質而外學其文雖有賢師良友若畫脂鏤冰費日損功故良師不能飾戚施香澤不能化嫫母也文學曰西子蒙以不潔鄙夫掩鼻惡人盛飾可以宗祀上帝使二人不涉聖人之門不免為窮夫安得卿大夫之名故砥所以致於刃學所以盡其才也孔子曰觚不觚觚哉觚哉故人事加則為宗廟器否則斯養之爨材干越之鋌不厲匹夫賤之工人施巧人主服而朝也夫醜者自以為姣故不飾愚者自以為知故不學觀笑在己而不自知不好用人自是之過也訟賢第二十二大夫曰剛者折柔者卷故季由以強梁死宰我以柔弱殺使二子不學未必不得其死何者矜己而伐能小知而巨牧欲人之從己不能以己從人莫視而自見莫賈而自貴此其所以身殺死而終葅醢也未見其為宗廟器覩其為世戮也當此之時東流亦安之乎文學曰騏驥之輓鹽車垂頭於太行之坂屠者持刀而睨之太公之窮困負販於朝歌也蓬頭相聚而笑之當此之時非無遠䈥駿才也非文王伯樂莫知之賈也子路宰我生不逢伯樂之舉而遇狂屠故君子傷之若由不得其死然天其祝予矣孔父累華督之難不可謂不義仇牧涉宋萬之禍不可謂不賢也大夫曰今之學者無太公之能騏驥之才有以蜂蠆介毒而自害也東海成顒河東胡建是也二子者以術蒙舉起卒伍為縣令獨非自是無與合同引之不來推之不往狂狷不遜忮害不恭刻轢公主侵陵大臣知其不可而強行之欲以干名所由不軌果沒其身未覩功業所至而見東觀之殃身得重罪不得以壽終狡而以為知訐而以為直不遜以為勇其遭難故亦宜也文學曰二公懷精白之心行忠正之道直己以事上竭力以徇公奉法推理不避強禦不阿所親不貴妻子之養不顧私家之業然卒不能免於嫉妬之人為眾枉所排也其所以累不測之刑而功不遂也夫公族不正則法令不行股肱不正則姦邪興起趙奢行之平原范雎行之穰侯二國治而兩家全故君過而臣正上非而下譏大臣正縣令何有不反諸己而行非於人執政之大失也夫屈原之沉淵遭子椒之譖也管子得行其道鮑叔之力也今不覩鮑叔之力而見汨羅之禍雖欲以壽終惡其能得乎遵道第二十三大夫曰御史御史未應謂丞相史曰文學結髮學語服膺不舍辭若循環轉若陶鈞文繁如春華無效如抱風飾虛言以亂實道古以害今從之則縣官用廢虛言不可實而行之不從文學以為非也眾口囂囂不可勝聽諸卿都大府日久矣通先古明當世今將何從而可矣丞相史進曰晉文公譎而不正齊桓公正而不譎所由不同俱歸於霸而必隨古不革襲故不改是文質不變而椎車尚在也故或作之或述之然後法令調於民而器械便於用也孔對三君殊意晏子相三君異道非苟相反所務之時異也公卿既定大業之路建不竭之本願無顧細故之語牽儒墨論也文學曰師曠之調五音不失宮商聖王之治世不離仁義故有改制之名無變道之實上自黃帝下及三王莫不明德教謹庠序崇仁義立教化此百世不易之道也殷周因循而昌秦王變法而亡詩云雖無老成人尚有典刑言法教也故沒而存之舉而貫之貫而行之何更為哉丞相史曰說西施之美無益於容道堯舜之德無益於治今文學不言所為治而言以治之無功猶不言耕田之方美富人之囷倉也夫欲粟者務時欲治者因世故商君昭然獨見存亡不可與世俗同者為其沮功而多近也庸人安其故而愚者果所聞故舟車之治使民三年而後安之商君之法立然後民信之孔子曰可與共學未可與權文學可令扶繩循刻非所與論道術之外也文學曰君子多聞闕疑述而不作聖達而謀大叡智而事寡是以功成而不隳名立而不頓小人智淺而謀大羸弱而任重故中道而廢蘇秦商鞅是也無先王之法非聖人之道而因於己故亡易曰小人處盛位雖高必崩不盈其道不恒其德而能以善終身未之有也是以初登于天後入于地禹之治水也民知其利莫不勸其功商鞅之立法民知其害莫不畏其刑故夏后功立而王商鞅法行而亡商鞅有獨智之慮世乏獨見之證文學不足與權當世亦無負累蒙殃也論誹第二十四丞相史曰晏子有言儒者華於言而寡於實繁於樂而舒於民久喪以害生厚葬以傷業禮煩而難行道迂而難遵稱往古而訾當世賤所見而貴所聞此人本枉以己為式此顏異所以誅黜而狄山死於匈奴也處其位而非其朝生乎世而訕其上終以被戮而喪其軀此獨誰為負其累而蒙其殃乎文學曰禮所以防淫樂所以移風禮興樂正則刑罰中故隄防成而民無水菑禮義立而民無亂患故禮義壞隄防決所以治者未之有也孔子曰禮與其奢也寧儉喪與其易也寧戚故禮之所為作非以害生傷業也威儀節文非以亂化傷俗也治國謹其禮危國謹其法昔秦以武力吞天下而斯高以妖孽累其禍廢古術隳舊禮專任刑法而儒墨既喪焉塞士之塗壅人之口道諛日進而上不聞其過此秦所以失天下而殞社稷也故聖人為政必先誅之為巧言以輔非而傾覆國家也今子安取亡國之語而來乎夫公卿處其位不正其道而以意阿邑順風疾小人淺淺面從以成人之過也故知言之死不忍從苟合之徒是以不免於縲絏悲夫丞相史曰檀柘而有鄉萑葦而有藂言物類之相從也孔子曰德不孤必有鄰故湯興而伊尹至不仁者遠矣未有明君在上而亂臣在下也今先帝躬行仁聖之道以臨海內招舉俊才賢良之士唯仁是用誅逐亂臣不避所親務以求賢而簡退不肖猶堯之舉舜禹之族殛鯀放驩兜也而曰苟合之徒是則主非而臣阿是也文學曰皋陶對舜在知人惟帝其難之洪水之災堯獨愁悴而不能治得舜禹而九州寧故雖有堯明之君而無舜禹之佐則純德不流春秋刺有君而無臣先帝之時良臣未備故邪臣得間堯得舜禹而鯀殛驩兜誅趙簡子得叔向而盛青肩詘語曰未見君子不知偽臣詩云未見君子憂心忡忡既見君子我心則降此之謂也丞相史曰堯任鯀驩兜得舜禹而放殛之以其罪而天下咸服誅不仁也人君用之齊民而顏異濟南亭長也先帝舉而加之高位官至上卿狄山起布衣為漢議臣處舜禹之位執天下之中不能以治而反坐訕上故驩兜之誅加而刑戮至焉賢者受賞而不肖者被刑固其然也文學又何怪焉文學曰論者相扶以義相喻以道從善不求勝服義不恥窮若相迷以偽相亂以辭相矜於後息期於苟勝非其貴者也夫蘇秦張儀熒惑諸侯傾覆萬乘使人主失其所持非不辯然亂之道也君子疾鄙夫之不可與事君患其聽從而無所不至也今子不聽正義以輔卿相又從而順之好須臾之說不計其後若子之為人吏宜受上戮子姑默矣丞相史曰蓋聞士之居世也衣服足以勝身食飲足以供親內足以相䘏外不求於人故身修然後可以理家家理然後可以治官故飯蔬糲者不可以言孝妻子饑寒者不可以言慈緒業不脩者不可以言理居斯世行斯身而有此三累者斯亦足以默矣孝養第二十五文學曰善養者不必芻豢也善供服者不必錦繡也以己之所有盡事其親孝之至也故匹夫勤勞猶足以順禮歠菽飲水足以致其敬孔子曰今之孝者是為能養不敬何以別乎故上孝養志其次養色其次養體貴其禮不貪其養禮順心和養雖不備可也易曰東鄰殺牛不如西鄰之禴祭也故富貴而無禮不如貧賤之孝悌閨門之內盡孝焉閨門之外盡悌焉朋友之道盡信焉三者孝之至也居家理者非謂積財也事親孝者非謂鮮肴也亦和顏色承意盡禮義而已矣丞相史曰八十曰耋七十曰耄耄食非肉不飽衣非帛不暖故孝子曰甘毳以養口輕暖以養體曾子養曾晳必有酒肉無端絻雖公西赤不能以為容無肴膳雖閔曾不能以卒養禮無虛加故必有其實然後為之文與其禮有餘而養不足寧養有餘而禮不足夫洗爵以盛水升降而進糲禮雖備然非其貴者也文學曰周襄王之母非無酒肉也衣食非不如曾晳也然而被不孝之名以其不能事其父母也君子重其禮小人貪其養夫嗟來而招之投而與之乞者猶不取也君子苟無其禮雖美不食焉故禮主人不親饋則客不祭是饋輕而禮重也丞相史曰孝莫大以天下一國養次祿養下以力故王公人君上也卿大夫次也夫以家人言之有賢子當路於世者高堂邃宇安車大馬衣輕暖食甘毳無者褐衣皮冠窮居陋巷有旦無暮食蔬糲葷茹膢臘而後見肉老親之腹非唐園唯菜是盛夫蔬糲乞者所不取而子以養親雖欲以禮非其貴也文學曰無其能而竊其位無其功而有其祿雖有富貴由蹠蹻之養也高臺極望食案方丈而不可謂孝老親之腹非盜囊也何故常盛不道之物夫取非有非職財入而患從之身且死禍殃安得膢臘而食肉曾參閔子無卿相之養而有孝子之名周襄王富有天下而有不能事父母之累故禮菲而養豐非孝也掠囷而以養非孝也丞相史曰上孝養色其次安親其次全身往者陳餘背漢斬於泜水五被邪逆而夷三族近世主父偃行不軌而誅滅呂步舒弄口而見戮行身不謹誅及無罪之親由此觀之虛禮無益於己也文實配行禮養俱施然後可以言孝孝在於質實不在於飾貌全身在於謹慎不在於馳語也文學曰言而不誠期而不信臨難不勇事君不忠不孝之大者也孟子曰今之士今之大夫皆罪人也皆逢其意以順其惡今子不忠不信巧言以亂政導諛以求合若此者不容於世春秋曰士守一不移循理不外援共其職而已故卑位而言高者罪也言不及而言者傲也有詔公卿與斯議而空戰口也刺議第二十六丞相史曰山陵不讓椒跬以成其崇君子不辭負薪之言以廣其名故多見者博多聞者知距諫者塞專己者孤故謀及下者無失策舉及眾者無頓功詩云詢于芻蕘故布衣皆得風議何況公卿之史乎春秋士不載文而書咺者以為宰士也孔子曰雖不吾以吾其與聞諸僕雖不敏亦嘗傾耳下風攝齊句指受業徑於君子之塗矣使文學言之而是僕之言有何害使文學言之而非雖微丞相史孰不非也文學曰以正輔人謂之忠以邪導人謂之佞夫怫過納善者君之忠臣大夫之直士也孔子曰大夫有爭臣三人雖無道不失其家今子處宰士之列無忠正之心枉不能正邪不能匡順流以容身從風以說上上所言則苟聽上所行則曲從若影之隨形響之於聲終無所是非衣儒衣冠儒冠而不能行其道非其儒也譬若土龍文章首目具而非龍也葶歷似菜而味殊玉石相似而異類子非孔氏執經守道之儒乃公卿面從之儒非吾徒也冉有為季氏宰而附益之孔子曰小子鳴鼓而攻之可也故輔桀者不為智為桀斂者不為仁丞相史默然不對利議第二十七大夫曰作世明主憂勞萬民思念北邊之未安故使使者舉賢良文學高弟詳延有道之士將欲觀殊議異策虛心傾耳以聽庶幾云得諸生無能出奇計遠圖伐匈奴安邊境之策抱枯竹守空言不知趨舍之宜時世之變議論無所依如膝癢而搔背辯訟公門之下訩訩不可勝聽如品即口以成事此豈明主所欲聞哉文學曰諸生對冊殊路同歸指在於崇禮義退財利復往古之道匡當世之失莫不云太平雖未盡可亶用宜略有可行者焉執事闇於明禮而喻於利末沮事隳議計慮籌策以故至今未決非儒無成事公卿欲成利也大夫曰色厲而內荏亂真者也文表而枲裏亂實者也文學裒衣博帶竊周公之服鞠躬踧踖竊仲尼之容議論稱誦竊商賜之辭刺譏言治竊管晏之才心卑卿相志小萬乘及授之政昏亂不治故以言舉人若以毛相馬此其所以多不稱舉詔策曰朕嘉宇內之士故詳延四方豪俊文學博習之士超遷官祿言者不必有德何者言之易而行之難有舍其車而識其牛貴其不言而多成事也吳鐸以其舌自破主父偃以其舌自殺鶡鴠夜鳴無益於明主父鳴鴟無益於死非有司欲成利文學桎梏於舊術牽於間言者也文學曰能言之能行之者湯武也能言不能行者有司也文學竊周公之服有司竊周公之位文學桎梏於舊術有司桎梏於財利主父偃以舌自殺有司以利自困夫驥之才千里非造父不能使禹之知萬人非舜為相不能用故季桓子聽政柳下惠忽然不見孔子為司寇然後悖熾驥舉之在伯樂其功在造父造父攝轡馬無駑良皆可取道周公之時士無賢不肖皆可與言至治故御之良者善調馬相之賢者善使士今舉異才而使臧騶御之是猶扼驥鹽車而責之使疾此賢良文學多不稱舉也大夫曰嘻諸生闒茸無行多言而不用情貌不相副若穿踰之盜自古而患之是孔丘斥逐於魯君曾不用於世也何者以其首攝多端迂時而不要也故秦王燔去其術而不行坑之渭中而不用乃安得鼓口舌申顏眉預前論議是非國家之事也國疾第二十八文學曰國有賢士而不用非士之過有國者之恥孔子大聖也諸侯莫能用當小位於魯三月不令而行不禁而止沛若時雨之灌萬物莫不興起也況乎位天下之本朝而施聖主之德音教澤乎今公卿處尊位執天下之要十有餘年功德不施於天下而勤勞於百姓百姓貧陋困窮而私家累萬金此君子所恥而伐檀所刺也昔者商鞅相秦後禮讓先貪鄙尚首功務進取無德厚於民而嚴刑罰於國俗日壞而民滋怨故惠王烹菹其身以謝天下當此之時亦不能論事矣今執政患儒貧賤而多言儒亦憂執事富貴而多患也大夫視文學悒悒而不言也丞相史曰夫辯國家之政事論執政之得失何不徐徐道理相喻何至切切如此乎大夫難罷鹽鐵者非有私也憂國家之用邊境之費也諸生誾誾爭鹽鐵亦非為己也欲反之於古而輔成仁義也二者各有所宗時世異務又安可堅任古術而非今之理也且夫小雅非人必有以易之諸生若有能安集國中懷來遠方使邊境無寇虜之災租稅盡為諸生除之何況鹽鐵均輸乎所以貴術儒者貴其處謙推讓以道盡人今辯訟愕愕然無赤賜之辭而見鄙倍之色非所聞也大夫言過而諸生亦如之諸生不直謝大夫耳賢良文學皆離席曰鄙人固陋希涉大庭狂言多不稱以逆執事夫藥酒苦於口而利於病忠言逆於耳而利於行故愕愕者福也諓諓者賊也林中多疾風富貴多諛言萬里之朝日聞唯唯而後聞諸生之愕愕此乃公卿之良藥鍼石大夫色少寬面文學而蘇賢良曰窮巷多曲辯而寡見者難喻文學守死溟涬之語而終不移夫往古之事昔有之語已可覩矣今以近世觀之自以目有所見耳有所聞世殊而事異文景之際建元之始民朴而歸本吏廉而自重殷殷屯屯人衍而家富今政非改而教非易也何世之彌薄而俗之滋衰也吏即少廉民即寡恥刑非誅惡而姦猶不止世人有言鄙儒不如都士文學皆出山東希涉大論子大夫論京師之日久願分明政治得失之事故所以然者也賢良曰夫山東天下之腹心賢士之戰場也高皇帝龍飛鳳舉於宋楚之間山東子弟蕭曹樊酈滕灌之屬為輔雖即異世亦既閎夭太顛而已禹出西羗文王生北夷然聖德高世有萬人之才負迭群之任出入都市一旦不知返數然後終於廝役而已僕雖不生長京師才駑下愚不足與大議竊以所聞閭里長老之言往者常民衣服溫暖而不靡器質朴牢而致用衣足以蔽體器足以便事馬足以易步車足以自載酒足以合歡而不湛樂足以理心而不淫入無宴樂之聞出無佚游之觀行即負嬴止作鋤耘用約而財饒本修而民富送死哀而不華養生適而不奢大臣正而無欲執政寬而不苛故黎民寧其性百吏保其官建元之始崇文修德天下乂安其後邪臣各以伎藝虧亂至治外障山海內興諸利楊可告緡江充禁服張大夫革令杜周治獄罰贖科適微細並行不可勝載夏蘭之屬妄搏王溫舒之徒妄殺殘吏萌起擾亂良民當此之時百姓不保其首領豪富莫必其族姓聖主覺焉乃刑戮充等誅滅殘賊以殺死罪之怨塞天下之責故居民肆然復安然其禍累世不復瘡痍至今未息故百官尚有殘賊之政而強宰尚有強奪之心大臣擅權而擊斷豪猾多黨而侵陵富貴奢侈貧賤篡殺女工難成而易弊車器難就而易敗車不累朞器不終歲一車千石一衣十鍾常民文杯畫案几席緝𨄌婢妾衣紈履絲匹庶粺飯肉食里有俗黨有場康莊馳逐窮巷蹋鞠秉耒抱臿躬耕身織者寡聚要歛容傅白黛青者眾無而為有貧而強夸文表無裏紈袴枲裝生不養死厚送葬死殫家遣女滿車富者欲過貧者欲及富者空藏貧者稱貸是以民年急而歲促貧即寡恥乏即少廉此所以刑非誅惡而姦猶不止也故國有嚴急之徵即生散不足之疾矣, SBCK: ''}
