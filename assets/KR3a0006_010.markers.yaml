  - {type: variant, offset: 4532, length: 0, content: '', SBCK: 爲守則莫能入如此則中國無狗吠之警而邉境無鹿駭狼顧之憂矣夫何妄行之有乎大夫曰古者爲國必察土地山陵阻險天時地利然後可以王覇故制地城郭􅅚溝壘以禦冦固國春秋曰冬浚洙脩地利也三軍順天時以實擊虚然固於阻險敵於金城楚莊之圍宋秦師敗崤嶔崟是也故曰天時地利羗胡固近於邉今}
