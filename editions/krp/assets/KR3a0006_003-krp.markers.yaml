  - {type: variant, offset: 13709, length: 517, content: 衛鞅傳曰公孫鞅聞秦孝公下令國中求賢者將修繆公之業東復侵地廼遂西入秦因孝公寵臣景監以求見孝公孝公既見衛鞅語事良乆孝公時時睡弗聼罷而孝公怒景監曰子之客妄人耳安足用耶景監以讓衛鞅衛鞅曰吾說公以帝道其志不開悟矣後五日復求見鞅鞅復見孝公益愈然而未中㫖罷而孝公復讓景監景監亦讓鞅鞅曰吾說公以王道而未入也請復見鞅鞅復見孝公孝公善之而未用也罷而去孝公謂景監曰汝客善可與語矣鞅曰吾說公以霸道其意欲用之矣誠復見我我知之矣衛鞅復見孝公公與語不自知膝之前於席也語數日不厭景監曰子何以中吾君吾君之驩甚也鞅曰吾說君以帝王之道比三代而君曰乆逺不能待且賢君者各及其身顯名天下安能邑邑待十數年而成帝王乎故吾以強國之術說君大說之耳然亦難以比德於殷周矣孝公既用衛鞅以衛鞅為左庶長卒定變法之令孟子傳曰騶衍睹有國者益淫侈不能尚德若大雅整之於身施及黎庻矣乃深觀隂陽消息而作恠迂之變終始大聖之篇十餘萬言其語閎大不經必先驗小物推而大之至於無垠王公大人初見其術懼然顧化是以騶子重於齊適梁惠王郊迎執賓主之禮適趙平原君側行襒席如燕昭王擁彗先驅請列弟子之座而受業築碣石宮身親往師之作主運其游諸侯見尊禮如此鮑焦曰世不已知而行之不已者爽行也上不已用而干之不止者是毁亷也行爽㢘毁然且不舍惑於利者也, SBCK: ''}
