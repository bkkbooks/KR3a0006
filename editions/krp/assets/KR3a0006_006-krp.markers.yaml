  - {type: punctuation, offset: 1567, content: (, id: KR3a0006_krp_006-bkkpn136}
  - {type: variant, offset: 1567, length: 696, content: 雜事萹曰齊侯問於晏子曰忠臣之事君也何若對曰有難不死出亡不送君曰列地而與之疏爵而貴之君有難不死出亡不送可謂忠乎對曰言而見用終身無難臣奚死焉諌而見従終身不亡臣奚送焉若言不見用有難而死是妄死也諫不見從出亡而送是詐為也故忠臣也者能盡善與君而不能與䧟於難義勇萹曰崔杼弑莊公令士大夫盟者皆脫劒而入言不疾指不至血者死所殺十人次及晏子晏子奉桮血仰天歎曰惡乎崔子将為無道殺其君盟者皆視之崔杼謂晏子曰子與我我與子分國子不吾與吾将殺子直兵將推之曲兵将勾之唯子圖之晏子曰嬰聞囘以利而背其君者非仁也刼以刄而失其志者非勇也詩云愷悌君子求福不囘嬰可謂不囘矣直兵推之曲兵鈎之嬰不之囘也崔子舍之晏子趍出授綏而垂其僕将馳晏子拊其手曰虎豹在山林其命在庖厨馳不益生緩不益死按之成節然後去之詩云彼其之子舎命不渝晏子之謂也宋世家曰紂殺王子比干刳視其心㣲子曰父子有骨肉而臣主以義屬故父有過子三諌不聽則隨而號之人臣三諫不聽則其義可以去矣於是太師少師乃勸㣲子去遂行周武王伐紂克殷㣲子乃持其祭器造於軍門肉袒面縛左牽羊右把茅膝行而前以告於是武王乃釋㣲子復其位如故論語比考䜟曰殷惑妲己玉馬走宋均曰女妲己有美色也王馬喻賢臣奔去也劉毅曰三仁殊途而同歸四子異行而均義風俗通曰易記出處語黙書美九徳咸事同歸殊途一致百慮不期相反各有云尚而已是故伯夷譲國以採薇展禽不去於所生孔丘周流以應聘長沮隐居而耦耕墨翟摩頂以放踵楊朱一毛而不為干木息偃以藩魏包胥重璽而存郢夷吾朱紘以三歸平仲辭邑而濯纓惠施從車以百乘于扈徒步而裸形寗戚商歌以干祿顔闔踰墻而遁榮髙柴趣門以避難季路求入而隕零端木結駟以貨殖顔囘屢空而弗營孟獻髙宇以美室原憲蓬門而株楹傳曰人心不同有如其面古今行事是則然矣, SBCK: ''}
