  - {type: variant, offset: 2390, length: 162, content: 人貪利以陷其身蒙戮辱而捐禮義恒於苟生何者一日下蠶室創未瘳宿衛人主出入宮殿由得受奉祿食太官享賜身以尊榮妻子獲其饒故或載卿相之列就刀鋸而不見閔況眾庶乎夫何恥之有廢其德教而責之以禮義是虐民也春秋傳曰子有罪執其父臣有罪執其君聽失之大者也今以子誅父以弟誅兄親戚相坐什伍相連若引根本之及華葉傷小指之累四體也如此則以有罪反誅無罪反誅無罪則, WYG: 黄髪乆矣}
