  - {type: variant, offset: 3278, length: 791, content: 也孔子曰未能事人焉能事鬼神近者不達焉能知瀛海故無補於用者君子不為無益於治者君子不由三王信經道而德光於四海戰國信嘉言而破亡如丘山昔秦始皇已吞天下欲并萬國亡其三十六郡欲達瀛海而失其州縣知大義如斯不如守小計也論菑第五十四大夫曰巫祝不可與並祀諸生不可與逐語信往疑今非人自是夫道古者稽之今言遠者合之近日月在天其徵在人菑異之變夭壽之期陰陽之化四時之敘水火金木妖祥之應鬼神之靈祭祀之福日月之行星辰之紀曲言之故何所本始不知則默無苟亂耳文學曰始江都相董生推言陰陽四時相繼父生之子養之母成之子藏之故春生仁夏長德秋成義冬藏禮此四時之序聖人之所則也刑不可任以成化故廣德教言遠必考之邇故內恕以行是以刑罰若加於己勤勞若施於身又安能忍殺其赤子以事無用罷弊所恃而達瀛海乎蓋越人美蠃蚌而簡太牢鄙夫樂咋唶而怪韶濩故不知味者以芬香為臭不知道者以美言為亂耳人無夭壽各以其好惡為命羿奡以巧力不得其死智伯以貪狠亡其身天菑之證禎祥之應猶施與之望報各以其類及故好行善者天助以福符瑞是也易曰自天祐之吉無不利好行惡者天報以禍妖菑是也春秋曰應是而有天菑周文武尊賢受諫敬戒不殆純德上休神祇相況詩云降福穰穰降福簡簡日者陽陽道明月者陰陰道冥君尊臣卑之義故陽光盛於上眾陰之類消於下月望於天蚌蛤盛於淵故臣不臣則陰陽不調日月有變政教不均則水旱不時螟螣生此災異之應也四時代敘而人則其功星列於天而人象其行常星猶公卿也眾星猶萬民也列星正則眾星齊常星亂則眾星墜矣大夫曰文學言剛柔之類五勝相代生易明於陰陽書長於五行春生夏長故火生於寅木陽類也秋生冬死故水生於申金陰物也四時五行迭廢迭興陰陽異類水火不同器金得土而成得火而死金生於巳何說何言然乎文學曰兵者凶器也甲堅兵利為天下殃以母制子故能久長聖人法之厭而不陽詩云載戢干戈載櫜弓矢我求懿德肆于時夏衰世不然逆天道以快暴心僵尸血流以爭壤土牢人之君滅人之祀殺人之子若絕草木刑者肩靡於道以己之所惡而施於人是以國家破滅身受其殃, WYG: ''}
