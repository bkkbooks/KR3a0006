  - {type: variant, offset: 1818, length: 0, content: '', WYG: 民非生而治桀紂之民非生而亂故治亂在上商君曰善治者使盗跖可信不能治者使伯夷可疑故人主有私人以財不私人以官韓嬰曰明主有私人以百金名珠玉而無私以官職事業者何也曰本不利所私也彼不能而主使之是闇主也臣不能而為之是詐臣也主闇於上臣詐於下滅亡無日矣俱害之}
