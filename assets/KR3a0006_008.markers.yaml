  - {type: variant, offset: 1023, length: 0, content: '', WYG: 韓非子曰夫堯生在上位雖十桀紂不能亂者勢治也桀紂亦生在上雖有十堯舜而不能治者勢亂也朱穆曰時敦俗美則小人守正利不可誘也時否俗薄雖君子為邪義不能止也楊恪曰堯舜之民可比屋而封桀紂之民可比屋而誅是以王者設庠序明教化以坊古防字道}
