  - {type: variant, offset: 661, length: 0, content: '', WYG: 所居輦轂之下聲名文物之所聚故其士女雍容閑雅之態生故謂之都相如傳云車從甚都是也邉氓所居蕞爾之邑狐狸豺狼之所嚎故其閭閻吝嗇村陋之狀出故謂之鄙老子云衆人皆有以而我獨頑似鄙是也文學皆出山東希涉大論子大夫論京師之日乆顧分明政治識之事故所以然者也顔師古曰子者人之嘉稱大夫學官之稱也志}
