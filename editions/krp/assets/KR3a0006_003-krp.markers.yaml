  - {type: variant, offset: 6074, length: 413, content: 傳曰周公踐天子之位七年布衣之士所贄而師者十二人所友見者十二人窮巷白屋先見者四十九人時進善百人教士千人宫朝者萬人成王封伯禽於魯周公誡之曰往矣子無以魯國驕士吾文王之子武王之弟成王之叔父也又相天下吾於天下亦不輕矣然一沐三握髪一飯三吐哺猶恐失天下之士吾聞徳行寛裕守之以恭者榮土地廣大守之以儉者安禄位尊盛守之以卑者貴人衆兵強守之以畏者勝聪明睿智守之以愚者善博文強記守之以淺者智夫此六者皆謙德也夫貴為天子富有天下由此徳也不謙而失天下亡其身者桀紂是也可不慎歟故易有一道大足以守天下中足以守其國家近足以守其身謙之謂也夫天道虧盈而益謙地道變盈而流謙鬼神害盈而福謙人道惡盈而好謙是以衣成則必缺袵宫成則必缺隅屋成則必加拙示不成者天道然也易曰謙亨君子有終吉詩曰湯降不遲聖敬日躋誡之哉其無以魯國驕士也語林曰賢者國之紀人之望自古帝王皆以之安危故書曰惟后非賢不乂惟賢非后不食昔者周公體大聖之德而勤於吐握由是天下之士爭歸之向使周公驕而且吝亦當髙翔逺去所至寡矣, SBCK: ''}
