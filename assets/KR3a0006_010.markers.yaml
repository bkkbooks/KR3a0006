  - {type: variant, offset: 4469, length: 0, content: '', WYG: 説勝寡人也故老子曰勇於不敢則活由此觀之大勇反為不勇耳揚雄曰六經之治貴於未亂兵家之勝貴於未戰大夫曰荆軻提七音比首入不測之强秦秦王惶恐失守衞者皆懼刺客傳曰燕太子質于秦亡歸見秦且滅六國兵已臨易水恐其禍至丹患之因田光以交荆軻於是尊荆軻為上卿令秦}
