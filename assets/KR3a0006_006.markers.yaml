  - {type: variant, offset: 227, length: 1, content: 制, WYG: 為巧言以輔非而傾覆國家也今子安取亡國之語而来乎夫音扶公卿處其位不正其道而以意阿色順風疾小人諓諓音淺面従以成人之過也諓諓善言也又乃巧也故知言之死不忍従苟合之徒是以不免於縲力追反絏息列反悲夫音扶縲黒索也絏攣也古者獄中以黑索拘攣罪人也丞相去聲史曰檀柘而有鄉萑音丸葦音委而有藂通作叢言物類之相従也說林訓曰橘柚有鄉萑葦有叢獸同足者相従㳺鳥同翼者相従翔齊䇿曰淳于髠一日而見七人於宣王王曰子來寡人聞之千里而一士是比肩而立百世而一聖若随踵而至也今子一朝而見七士則士不亦衆乎淳于髠曰不然夫鳥同翼者而聚居獸同足者而俱行今求柴胡桔梗於沮澤則累世不得一焉及之睪黍梁父之隂則郄車而載耳夫物各有疇今髠賢者之儔也王求士於髠若挹水於河而取火于燧也髠将復見之豈特七士也孔子曰徳不孤必有鄰故湯興而伊尹至不仁者逺矣未有明君在上而亂臣在下也鶡冠子曰伊尹酒保立為世師尊賢篇曰聲聞則處異而相應徳合則未見而相親李康曰運之所隆必生聖明之君聖明之君必有忠賢之臣其所以相遇也不求而自合其所以相親也不介而自親唱之而必和謀之而必従道徳𤣥同曲折合符得失不能疑其志䜛搆不能離其交然後得成功也今先帝躬行仁聖之道以臨海内招舉俊才賢良之士唯仁是用誅逐亂臣不避所親務以求賢而簡退不肖猶堯之舉舜禹之族殛鯀放驩兠也而曰苟合之徒是則主非而臣阿是也班固曰漢承百王之弊髙祖撥亂反正文景務在養民至于稽古禮文之事猶多闕焉孝武之初立卓然罷黜百家表章六藝遂疇咨海内舉其俊乂與之立功興大學修郊祀改正朔定厯數協音律作禮樂建封禪禮百神紹國典號令文章煥焉可述尊賢篇曰人君之欲平治天下而垂榮名者必尊賢而下士易曰自上下下其道大光又曰以貴下賤大得民也夫明王之施徳而下下也將懐逺而致近也夫朝無賢人猶鴻鵠之無羽翼也雖有千里之望猶不能致其意之所欲至矣是故㳺江海者託于船致逺道者託于乗欲覇王者託于賢子路問於孔子曰治國何如孔子曰在於尊賢而賤不肖子路曰范中行氏尊賢而賤不肖其亡何也曰范中行氏尊賢而不能用也賤不肖而不能去也賢者知其不已用而怨之不肖者知其賤已而讐之賢者怨之不肖者讐之怨讐並前中行氏雖欲無亡得乎文學曰臯陶對舜在知人惟帝其難之洪水之災堯獨愁悴而不能治得舜禹而九州寧故雖有堯之明君而無舜禹之佐則純徳不流班固曰公輸愛其斧故能妙其巧明主貴其士故能成其治良匠}
