  - {type: variant, offset: 148, length: 0, content: '', WYG: 所以累不測之刑而功不遂也張儀曰積羽沉舟群􅁿折軸衆口鑠金積毁銷骨莊生曰三人成虎十夫揉椎衆口所移毋翼而飛雜言曰百人操觽不可為固結千人謗獄不可為直辭萬人比非不可為􅂋士中山靖王曰夫衆喣漂山聚蚊成雷朋黨執虎十夫撓椎是以文王拘於羑里孔子阨於陳蔡此乃烝庶之成風増積之生害也夫音扶公族不正則法令不行股肱不正則姦邪興起趙奢行之平原趙奢傳曰趙奢者趙之田部吏也收租稅而平原君家不肯出租奢以法治之殺平原君用事者九人平原君怒將殺奢奢因說曰君於趙為貴公子今縦君家而不奉公則法削法削則國弱國弱則諸侯加兵諸侯加兵是無趙也君安得有此富乎以君之貴奉公如法則上下平上下平則國彊國彊則趙固而君為貴戚豈􅁿於天下邪平原君以為賢言之於王王用之治國賦國賦大平民富而府庫實范睢行之穰侯范睢傳曰范睢日益親復說用數年矣因請間說曰臣居山東時聞齊之有田文不聞其有王也聞秦之有太后穰侯華陽髙陵涇陽不聞其有王也夫擅國之謂王能利害之謂王制殺生之威之謂王今太后多擅行不顧穰侯出使不報華陽涇陽等撃㫁無諱髙陵進退不請四貴備而國不危者未之有也為此四貴者下乃所謂無王也然則權安得不傾令安得従王出乎臣聞善治國者乃内固其威而外重其權穰侯使者操王之重决制於諸侯剖符於天下政適伐國莫敢不聼戰勝攻取則利歸於陶國弊御於諸侯戰敗則結怨於百姓而禍歸於社稷詩曰木實繁者披其枝披其枝者傷其心大其都者危其國尊其臣者卑其主崔杼淖齒管齊射王股擢王筋縣之於廟梁宿昔而死李兌管趙囚主父於沙丘百日而餓死今臣聞秦太后穰侯用事髙陵華陽涇陽佐之卒無秦王此亦淖齒李兌之類也且夫三代所以亡國者君專授政縦酒馳騁弋獵不聼政事其所授者妬賢嫉能御下蔽上以成其私不為主計而主不覺悟故失其國今自有秩以上至諸大吏下及王左右無非相國之人者是王獨立於朝臣竊為王恐萬世之後有秦國者非王子孫也昭王聞之大懼曰善於是廢太后逐穰侯髙陵華陽涇陽君於闗外秦王乃拜范睢為相収穰侯之印使歸陶因使縣官給車牛以徙千乘有餘到闗闗閱其寶器寶器珍怪多於王室秦封范睢以應號為應侯二國治而兩家全故君過而臣正上非而下譏大臣正縣令何肯不反諸已而行去聲非於人執政之大失也夫音扶屈原之沉淵遭子椒之譛也雜事萹曰屈原者名平楚之同姓大夫有博通之知清㓗之行懐王用之秦欲吞滅諸侯并兼天下屈原為楚東使於齊以結强黨秦國患之使張儀之楚貨楚貴臣上官大夫靳尚之屬上及令尹子蘭司馬子椒内賂夫人鄭袖共譛屈原屈原逐於外乃作離騷張儀因使楚絶齊許謝地六百里懐王信左右之姦謀聽張儀之邪說遂絶强齊之大輔楚既絶齊而秦欺以六里懐王大怒舉兵伐秦大戰者數秦兵大敗楚師斬首數萬級秦使人願以漢中地謝懐王不聽願得張儀而甘心焉張儀曰以一儀而易漢中地何愛儀請行遂至楚楚囚之上官大夫之屬共言之王王歸之是時懐王悔不用屈原之策以至於此於是復用屈原屈原使齊還聞張儀已去大為王言張儀之罪懐王使人追之不及後秦嫁女于楚與懐王歡為藍田之㑹屈原以為秦不可信願勿㑹羣臣皆以為可㑹懐王遂㑹果見囚拘客死於秦為天下笑懐王子頃襄王亦知羣臣諂誤懐王不察其罪反聼羣讒之口復放屈原屈原疾闇王亂俗㳊㳊嘿嘿以是為非以清為濁不忍見于世將自投于淵漁父止之屈原曰世皆酔我獨醒世皆濁吾獨清吾獨聞之新浴者必振衣新沐者必彈冠又}
