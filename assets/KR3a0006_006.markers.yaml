  - {type: variant, offset: 233, length: 0, content: '', WYG: 音諫堯得舜禹而鯀殛驩兠誅趙簡子得叔向而盛青肩詘語曰未見君子不知偽臣詩云未見君子憂心忡忡既見君子我心則降胡公切此之謂也丞相去聲史曰堯任鯀驩兠得舜禹而放殛之以其罪而天下咸服誅不仁也人君用之齊民而顔異濟南亭長也先帝舉而加之髙位官至上卿狄山起布衣為漢議臣處舜禹之位執天下之中不能以治而反坐訕上故驩兠之誅加而刑戮至焉賢}
