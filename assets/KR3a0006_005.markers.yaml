  - {type: 'tls:seg', offset: 1031, content: '', id: KR3a0006_tls_005-9a.29}
  - {type: variant, offset: 1031, length: 0, content: '', WYG: 君道篇曰武王問太公曰舉賢而以危亡者何也太公曰舉賢而不用是有舉賢之名而不得真賢之實也武王曰其失安在太公曰其失在君好用小善而已不得真賢也武王曰好用小善者何如太公曰君好聴譽而不惡䜛也以非賢為賢以非善為善以非忠為忠以非信為信其君以譽為功以毁為罪有功者不賞有罪者不罰多黨者進少黨者退是以羣臣比周而蔽賢百吏羣黨而多姦忠臣以誹死扵無罪邪臣以譽賞扵無功其國見扵危亡武王曰善吾今日聞誹譽之情矣尊賢篇曰桓公問扵管仲曰吾欲使酒腐扵爵肉腐扵俎得無害扵覇乎管仲對曰此極非其貴者耳然亦無害扵覇也桓公曰何如而害覇管仲對曰不知賢害覇知而不用害覇用而不任害覇任而不信害覇信而復使小人参之害覇桓公曰善雜事篇曰闔廬用子胥以興夫差殺之而以亡昭王用樂毅以勝恵王逐之而敗此的的然若黒白秦不用叔孫通項王不用陳平韓信而皆滅漢用之而大興此未遂也夫失賢者其禍如彼用賢者其福如此人君莫不求賢以自輔然而國以亂亡者所謂賢者不賢也㦯使賢者為之與不肖者議之使智者圖之與愚者謀之不肖嫉賢愚者嫉智是賢者之所以隔蔽也所以千載不合者也劉峻曰薫蕕不同器梟鸞不接翼渾敦檮杌踵武扵雲臺之上仲容庭堅耕耘扵巖石之下}
