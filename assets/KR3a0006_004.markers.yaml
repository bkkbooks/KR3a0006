  - {type: variant, offset: 1618, length: 0, content: '', WYG: 孫卿曰仁義之於人也譬之若貨財粟米之於家也多有之者富少有之者貧至無有者窮覽㝠訓曰夫道者無私就也無私去也能者有餘拙者不足順之者利逆之者凶譬如隋侯之珠和氏之璧得之者富失之者貧貨殖傳曰農工虞商此四者民所衣食之原也原大則饒原小則鮮上則富國下則富家貧富之道莫之奪予而巧者有餘拙者不足}
