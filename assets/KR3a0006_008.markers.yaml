  - {type: variant, offset: 426, length: 0, content: '', WYG: 乎齊輯之于轡銜之際而急緩之于脣吻之和正度于胷臆之中而執節於掌握之間内得于心中外合于馬志是故能進退履繩而旋曲中規取道致逺而氣力有餘誠得其術也體離車輿之安而手失駟馬之心而能}
