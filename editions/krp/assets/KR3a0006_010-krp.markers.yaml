  - {type: variant, offset: 10514, length: 416, content: 道應篇曰齊楚呉越皆嘗勝矣然而卒取亡焉不通乎持勝也唯有道之主能持勝孔子勁杓國門之關而不肯以力聞墨子為守攻公輸般服而不肯以兵知善持勝者以强為弱故老子曰道冲而用之又弗盈也惠孟見宋康王蹀足謦欬疾言曰寡人所說者勇有功也不説為仁義者也客將何以教寡人惠孟對曰臣有道於此人雖勇刺之不入雖巧有力擊之不中大王獨無意邪宋王曰善此寡人之所欲聞也惠孟曰夫刺之而不入擊之而不中此猶辱也臣有道於此使人雖有勇弗敢刺雖有力不敢擊夫不敢刺不敢擊非無其意也臣有道於此使人本無其意也夫無其意未有愛利之心也臣有道於此使天下丈夫女子莫不歡然皆欲愛利之心此其賢於勇有力也四累之上也大王獨無意耶宋王曰此寡人所欲得也惠孟對曰孔墨是已孔丘墨翟無地而為君無官而為長天下丈夫女子莫不延頸舉踵而願安利之者今大王萬乗之主也誠有其志則四境之内皆得其利矣賢於孔墨也逺矣宋王無以應惠孟出宋王謂左右曰辯矣客之以説勝寡人也故老子曰勇於不敢則活由此觀之大勇反為不勇耳揚雄曰六經之治貴於未亂兵家之勝貴於未戰, SBCK: ''}
