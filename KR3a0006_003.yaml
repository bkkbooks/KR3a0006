body:
  text: 鹽鐵論卷三園池第十三大夫曰諸侯以國為家其憂在內天子以八極為境其慮在外故宇小者用菲功巨者用大是以縣官開園池總山海致利以助貢賦脩溝渠立諸農廣田牧盛苑囿太僕水衡少府大農歲課諸入田牧之利池籞之假及北邊置任田官以贍諸用而猶未足今欲罷之絕其原杜其流上下俱殫困乏之應也雖好省事節用如之何其可也文學曰古者制地足以養民民足以承其上千乘之國百里之地公侯伯子男各充其求贍其欲秦兼萬國之地有四海之富而意不贍非宇小而用菲嗜欲多而下不堪其求也語曰廚有腐肉國有饑民廄有肥馬路有餧人今狗馬之養蟲獸之食豈特腐肉肥馬之費哉無用之官不急之作服淫侈之變無功而衣食縣官者眾是以上不足而下困乏也今不減除其本而欲贍其末設機利造田畜與百姓爭薦草與商賈爭市利非所以明主德而相國家也夫男耕女績天下之大業也故古者分地而處之制田畝而事之是以業無不食之地國無乏作之民今縣官之多張苑囿公田池澤公家有鄣假之名而利歸權家三輔迫近於山河地狹人眾四方並臻粟米薪菜不能相贍公田轉假桑榆菜菓不殖地力不盡愚以為非先帝之開苑囿池籞可賦歸之於民縣官租稅而已假稅殊名其實一也夫如是匹夫之力盡於南畝匹婦之力盡於麻枲田野闢麻枲治則上下俱衍何困乏之有矣大夫默然視其丞相御史輕重第十四御史進曰昔太公封於營丘辟草萊而居焉地薄人少於是通利末之道極女工之巧是以鄰國交於齊財畜貨殖世為彊國管仲相桓公襲先君之業行輕重之變南服彊楚而霸諸侯今大夫君修太公桓管之術總一鹽鐵通山川之利而萬物殖是以縣官用饒足民不困乏本末並利上下俱足此籌計之所致非獨耕桑農業也文學曰禮義者國之基也而權利者政之殘也孔子曰能以禮讓為國乎何有伊尹太公以百里興其君管仲專於桓公以千乘之齊而不能至於王其所務非也故功名隳壞而道不濟當此之時諸侯莫能以德而爭於公利故以權相傾今天下合為一家利末惡欲行淫巧惡欲施大夫君以心計策國用構諸侯參以酒榷咸陽孔僅增以鹽鐵江充楊可之等各以鋒銳言利末之事析秋毫可謂無間矣非特管仲設九府徼山海也然而國家衰耗城郭空虛故非崇仁義無以化民非力本農無以富邦也御史曰水有猵獺而池魚勞國有強禦而齊民消故茂林之下無豐草大塊之間無美苗夫理國之道除穢鋤豪然後百姓均平各安其宇張廷尉論定律令明法以繩天下誅姦猾絕并兼之徒而強不凌弱眾不暴寡大夫君運籌策建國用籠天下鹽鐵諸利以排富商大賈買官贖罪損有餘補不足以齊黎民是以兵革東西征伐賦歛不增而用足夫損益之事賢者所覩非眾人之所知也文學曰扁鵲撫息脈而知疾所由生陽氣盛則損之而調陰寒氣盛則損之而調陽是以氣脈調和而邪氣無所留矣夫拙醫不知脈理之腠血氣之分妄刺而無益於疾傷肌膚而已矣今欲損有餘補不足富者愈富貧者愈貧矣嚴法任刑欲以禁暴止姦而姦猶不止意者非扁鵲之用鍼石故眾人未得其職也御史曰周之建國也蓋千八百諸侯其後彊吞弱大兼小并為六國六國連兵結難數百年內拒敵國外攘四夷由此觀之兵甲不休戰伐不乏軍旅外奉倉庫內實今以天下之富海內之財百郡之貢非特齊楚之畜趙魏之庫也計委量入雖急用之宜無乏絕之時顧大農等以術體躬稼則后稷之烈軍四出而用不繼非天之財少也用鍼石調陰陽均有無補不足亦非也上大夫君與治粟都尉管領大農事灸刺稽滯開利百脈是以萬物流通而縣官富實當此之時四方征暴亂車甲之費克獲之賞以億萬計皆贍大司農此皆扁鵲之力而鹽鐵之福也文學曰邊郡山居谷處陰陽不和寒凍裂地衝風飄鹵沙石凝積地勢無所宜中國天地之中陰陽之際也日月經其南斗極出其北含眾和之氣產育庶物今去而侵邊多斥不毛寒苦之地是猶棄江皋河濱而田於嶺坂菹澤也轉倉廩之委飛府庫之財以給邊民中國困於繇賦邊民苦於戍禦力耕不便種糴無桑麻之利仰中國絲絮而後衣之皮裘蒙毛曾不足蓋形夏不失複冬不離窟父子夫婦內藏於專室土圜之中中外空虛扁鵲何力而鹽鐵何福也未通第十五御史曰內郡人眾水泉薦草不能相贍地勢溫濕不宜牛馬民蹠耒而耕負檐而行勞罷而寡功是以百姓貧苦而衣食不足老弱負輅於路而列卿大夫或乘牛車孝武皇帝平百越以為園圃卻羗胡以為苑囿是以珍怪異物充於後宮騊駼駃騠實於外廄匹夫莫不乘堅良而民間厭橘柚由此觀之邊郡之利亦饒矣而曰何福之有未通於計也文學曰禹平水土定九州四方各以土地所生貢獻足以充宮室供人主之欲膏壤萬里山川之利足以富百姓不待蠻貊之地遠方之物而用足聞往者未伐胡越之時繇賦省而民富足溫衣飽食藏新食陳布帛充用牛馬成群農夫以馬耕載而民莫不騎乘當此之時卻走馬以糞其後師旅數發戎馬不足牸牝入陣故駒犢生於戰地六畜不育於家五穀不殖於野民不足於糟糠何橘柚之所厭傳曰大軍之後累世不復方今郡國田野有隴而不墾城郭有宇而不實邊郡何饒之有乎御史曰古者制田百步為畝民井田而耕什而藉一義先公而後己民臣之職也先帝哀憐百姓之愁苦衣食不足制田二百四十步而一畝率三十而稅一惰民不務田作饑寒及己固其理也其不耕而欲播不種而欲獲鹽鐵又何過乎文學曰什一而藉民之力也豐耗美惡與民共之民勤己不獨衍民衍己不獨勤故曰什一者天下之中正也田雖三十而以頃畝出稅樂歲粒米狼戾而寡取之凶年饑饉而必求足加之以口賦更繇之役率一人之作中分其功農夫悉其所得或假貸而益之是以百姓疾耕力作而饑寒遂及己也築城者先厚其基而後求其高畜民者先厚其業而後求其贍論語曰百姓足君孰與不足乎御史曰古者諸侯爭強戰國並起甲兵不休民曠於田疇什一而藉不違其職今賴陛下神靈甲兵不動久矣然則民不齊出於南畝以口率被墾田而不足空倉廩而賑貧乏侵益日甚是以愈惰而仰利縣官也為斯君者亦病矣反以身勞民民猶背恩棄義而遠流亡避匿上公之事民相倣傚田地日蕪租賦不入抵扞縣官君雖欲足誰與之足乎文學曰樹木數徙則𣨙蟲獸徙居則壞故代馬依北風飛鳥翔故巢莫不哀其生由此觀之民非利避上公之事而樂流亡也往者軍陣數起用度不足以訾徵賦常取給見民田家又被其勞故不齊出於南畝也大抵逋流皆在大家吏正畏憚不敢篤責刻急細民細民不堪流亡遠去中家為之絕出後亡者為先亡者服事錄民數創於惡吏故相倣傚去尤甚而就少愈者多傳曰政寬者民死之政急者父子離是以田地日荒城郭空虛夫牧民之道除其所疾適其所安安而不擾使而不勞是以百姓勸業而樂公賦若此則君無賑於民民無利於上上下交議而頌聲作故取而民不厭役而民不苦靈臺之詩非或使之民自為之若斯則君何不足之有乎御史曰古者十五入太學與小役二十冠而成人與戎事五十以上血脈溢剛曰艾壯詩曰方叔元老克壯其猶故商師若烏周師若荼今陛下哀憐百姓寬力役之政二十三始賦五十六而免所以輔耆壯而息老艾也丁者治其田里老者修其塘園儉力趣時無饑寒之患不治其家而訟縣官亦悖矣文學曰十九年已下為殤未成人也二十而冠三十而娶可以從戎事五十已上曰艾老杖於家不從力役所以扶不足而息高年也鄉飲酒之禮耆老異饌所以優耆耄而明養老也故老者非肉不飽非帛不暖非杖不行今五十已上至六十與子孫服輓輸並給繇役非養老之意也古有大喪者君三年不呼其門通其孝道遂其哀戚之心也君子之所重而自盡者其惟親之喪乎今或僵尸棄衰絰而從戎事非所以子百姓順孝悌之心也周公抱成王聽天下恩塞海內澤被四表矧惟人面含仁保德靡不得其所詩云夙夜基命宥密陛下富於春秋委任大臣公卿輔政政教未均故庶人議也御史默不荅也
