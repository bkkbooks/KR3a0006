  - {type: variant, offset: 641, length: 0, content: '', WYG: 食貨志曰自神農之世斵木為耜揉木為耒耒耜之利以教天下而食足日中為市致天下之民聚天下之貨交易而退各得其所而貨通食足貨通然後國實民富而教化成黄帝以下通其變使民不倦李奇曰器幣有不便於時則變更通利之使民樂其業而不倦也}
