  - {type: variant, offset: 660, length: 0, content: '', krp: 主與小國之匈奴乎夫音扶以天下之力勤何不權以天下之士民何不服今有帝名而威不信音伸長城反賂遺而尚踞敖音傲此五帝所不忍三王所畢一作必怒也匈奴傳曰太初四年漢遣中郎將蘇武厚幣賂遺單于單于益驕禮甚倨非漢所望也征和四年單于遣使遺漢書云南有大漢北有强胡胡者天之驕子也不為小禮以自煩今欲與漢闓大關取漢女為妻嵗給遺我蘖酒萬石稷米五十斛雜繒萬匹它如故約則邊不相盗矣文學曰湯事夏而卒服之周事殷而卒滅之本經訓曰晩世之時帝有桀紂為璇室瑶臺象廊玉牀紂為肉圃酒池燎焚天下之財罷苦萬民之力刳諫者剔孕婦攘天下虐百姓於是湯乃以革車三百乗伐桀于南巢放之夏臺武王甲卒三千破紂牧野殺之于宣室天下寜定百姓和集是以稱湯武之賢語曰桀紂不為王湯武不為放故以大御小者王去聲以强凌弱者亡聖人不困其衆以兼國良御不困其馬以兼道故造父之御不失和聖人之治不倍德吕氏春秋曰宋人有取道者其馬不進倒而投之鸂水又復取道其馬不進又倒而投之鸂水如此者三雖造父之所以威馬不過此矣不得造父之道而徒得其威無益於御繆稱訓曰戎狄之馬皆可以馳驅或近或逺唯造父能盡其力三苖之民皆可使忠信或賢或不肖唯唐虞能齊其美秦攝利衡以御宇内執修箠推上聲以笞音痴八極驂服以罷音疲而鞭䇿愈加故有傾衡遺箠推上聲之變士民非不衆力勤非不多也皆内倍}
  - {type: variant, offset: 661, length: 0, content: '', WYG: 附而莫為用此髙皇帝所以仗劒而取天下也司馬遷曰昔詩書述虞夏之際舜禹受禪積徳累功洽於百姓攝位行政考之於天經數十年然後在位殷周之王乃繇卨稷修仁行義歴十餘世至于湯武然後放殺秦起襄公章文繆獻孝昭襄稍嚴蠶食六國百有餘載至始皇廼并天下以徳若彼用力如此其囏難也秦既稱帝患周之敗以為起於處士横議諸侯力爭四夷交侵以弱見奪於是削去五等墮城銷刃箝語燒書内鋤雄俊外攘胡粤用壹威權為萬世安然十餘年間猛敵横發乎不虞適戍强于五伯閭閻偪於戎狄嚮應㿊於謗議奮臂威於甲兵鄉秦之禁適所以資豪傑而速自斃也是以漢亡尺土之階繇一劒之任五載而成帝業書傳所記未嘗有焉何則古世相革皆成聖王之烈今漢獨收孤秦之斃鐫金石者難為功摧枯朽者易為力其勢然也夫音扶兩主好合内外交通天下安寜世世無患士民何事三王何愁焉大夫曰伯翳音意之始封秦地為七十里穆公開伯音覇孝公廣業自卑至上自小至大故先祖基之子孫成之司馬遷曰秦之先伯翳嘗有勲於唐虞之際受土賜姓及殷夏之間㣲散至周之衰秦興邑於西垂自繆公以來稍蠶食諸侯竟成始皇軒轅戰涿音卓鹿殺兩曎音驛蚩音癡尤而為帝湯武伐夏商誅桀紂而為王黄帝以戰成功湯武以伐成孝魚龍河圖云黄帝攝政有蚩尤兄弟八十一人並獸身人語銅鐵額食沙造五兵仗刀㦸大弩威振天下誅殺無道萬民欽命黄帝行天子事黄帝以仁義不能禁止蚩尤乃仰天而歎天遣𤣥女下授黄帝兵符伏蚩尤後天下復擾亂黄帝遂畫蚩尤形像以威天下咸謂蚩尤不死八方皆為殄滅山海經云黄帝令應龍攻蚩尤蚩尤請風伯雨師以從大風雨黄帝乃下天女曰魃以止雨雨止遂殺蚩尤權謀篇曰湯欲伐桀伊尹曰請阻乏貢職以觀其動桀怒起九夷之師以伐之伊尹曰未可彼尚猶能起九夷之師是罪在我也湯乃謝罪請服復入貢職明年又不供其職桀怒起九夷之師九夷之師不起伊尹曰可矣湯乃興師伐而殘之遷桀南巢氏焉武王伐紂過遂斬岸過水折舟過谷發梁過山焚萊示民無返志也至於有戎之隧大風折斾散宜生諫曰此其妖歟武王曰非也天落兵也風霽而乗以大雨水平地而嗇散宜生又諫曰此其妖歟武王曰非也天洒兵也卜而龜􅑒散宜生又諫曰此其妖歟武王曰不利以禱祠利以撃衆是􅑒之已故武王順天地犯三妖而禽紂於牧野其所獨見者精也希寫曰昔者文王拘於羑里而武王羇於王門卒斬紂之頭而懸於太白者是武王之功也故手足之勤腹腸之養去聲也當世之務後世之利}
