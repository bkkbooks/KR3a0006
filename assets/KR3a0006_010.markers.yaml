  - {type: variant, offset: 4447, length: 1, content: 趙, WYG: 因乗勝盡破其軍虜魏太子申以歸孫臏以此名顯天下世傳其兵法文學曰楚鄭之棠谿墨陽非不利也蘇秦曰棠谿墨陽皆陸斷牛馬水截鵠鴈者也許慎曰二者皆利劒名或曰皆地名出美劒者也犀䩜音逐兕甲非不堅也然而不能存者利不足恃也秦兼六國之師據崤音肴函音咸而御宇内金石之固莫耶古本作邪之利也莫邪呉王劒名干將妻之所造也干將妻曰莫邪故名其劒曰莫邪然陳勝無士民之資兵甲之用鉏音鋤耰棘橿音姜以破衝隆武昭音韶不撃烏號不發許慎曰衝臨衝也所以臨敵城衝突壤之者也隆髙也劉熈曰隆隆强也言體隆而强也樂書曰韶蕭韶也舜之樂也武大武也武王之樂也應劭曰烏號弓也楚有柘桑其材堅勁鳥峙其上及其將飛枝必撓下勁能復起巢鳥隨之鳥不得飛欲墮而號伐其枝以為弓因曰烏號之弓也張揖曰黄帝鑄鼎於荆}
