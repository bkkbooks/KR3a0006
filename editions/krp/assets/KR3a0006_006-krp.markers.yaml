  - {type: variant, offset: 381, length: 314, content: 去聲檀弓曰孔子哭子路於中庭有人弔者而夫子拜之既哭進使者而問故使者曰醢之矣遂命覆醢盗跖曰子以甘言說子路而使從之使子路去其危冠解其長劔而受教於子天下皆曰孔丘能止暴禁非其卒之也子路欲殺衞君而事不成是子教之不至也至公萹曰子羔為衞政刖人之足衞之君臣亂子羔走郭門郭門閉刖者守門曰於彼有缺子羔曰君子不踰曰於彼有竇子羔曰君子不遂曰於此有室子羔入追者罷子羔將去謂刖者曰吾不能虧損主之法令而親刖子之足吾在難中此乃子之報怨時也何故逃我刖者曰㫁足固我罪也無可奈何君之治臣也傾側法令先後臣以法欲臣之免於法也臣知之獄决罪定臨當論刑君愀然不樂見於顔色臣又知之君豈私臣哉天生仁人之心其固然也此臣之所以脫君也孔子聞之曰善為吏者樹徳不善為吏者怨公行之也其子羔之謂歟, SBCK: ''}
