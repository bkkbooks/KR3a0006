  - {type: variant, offset: 2346, length: 1, content: 知, WYG: 平等五人持節行郡國舉賢良問民所疾苦寃失職者徳惠甚厚而吏未稱去聲奉職承詔以存恤或侵侮士卒與之為市并力兼作使之不以理故也士卒失職而老母妻子感恨也宋伯姬愁思而宋國火魯妾不得意而魯寢災春秋曰宋災宋伯姬卒左傳曰或呌于宋太廟曰嘻嘻出出鳥鳴于亳社如曰嘻嘻甲午宋大災宋伯姬卒待姆也君子謂宋共姬女而不婦女待人婦義事也榖梁傳曰取卒之日加之災上者見以災卒也}
