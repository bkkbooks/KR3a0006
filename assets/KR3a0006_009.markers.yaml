  - {type: variant, offset: 7, length: 0, content: '', WYG: 極逺盡寒苦之地危難之處渉胡越之域今兹往而來嵗還音旋父母延頸而西望男女怨曠而相思身在東楚志在西河故一人行而鄉曲恨一人死而萬人悲賈捐之曰孝武皇帝探平城之事録冐頓以來數為邉害籍兵厲馬因富民以攘服之西連諸國北卻匈奴當此之時㓂賊並起軍旅數發父戰死於前子鬪傷於後女子乗亭鄣孤兒號於道老母寡婦飲泣巷哭遥設虚祭想魂乎萬里之外是皆廓地泰大征伐不休之故也詩云王事靡盬不能藝稷黍父母何怙念彼恭人涕零如雨豈不懷歸畏此罪罟吏不奉法以存撫倍公任私各以其權充其嗜欲人愁苦而怨思上不恤理則惡政行而邪氣作邪氣作則螟音𡨕音特今文作螣生而水旱起爾雅曰蟲食苖心者曰螟食苖葉者曰京房易傳曰嬖惡生孽蟲食苖心徳無節蟲食葉顓事有知誅罰絶理厥災水人君無施澤惠利於下則致旱若此雖禱祀雩祝用事百神無時豈能調隂陽而息盗賊矣傳曰天地之變隂陽之化物之罕至者也恠之可也畏之非也夫日月之薄蝕怪星之黨見風雨之不時是無世而不甞有也上明政平是雖並至無傷也上闇政險是雖無一無益也能言}
