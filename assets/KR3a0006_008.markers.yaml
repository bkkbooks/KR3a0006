  - {type: variant, offset: 942, length: 5, content: 男君秦既并, SBCK: 曰上失其道民散乆矣如得其情即哀矜而勿喜夫不傷民之不治而伐巳之能得姦猶弋者覩鳥獸挂罻羅而喜也今}
