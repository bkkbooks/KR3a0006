  - {type: variant, offset: 1972, length: 1, content: 聖, WYG: 王人衆男女萬五千人禆小王十餘人其夏驃騎將軍霍去病復與合騎侯數萬騎出隴西北地二千里過居延攻祁連山得胡首虜三萬餘級禆小王以下十餘人衞青傳曰其秋單于怒昆邪王休屠王居西方為漢所殺虜數萬人欲召誅之昆邪休屠王恐謀降漢漢使驃騎將軍迎之昆邪王殺休屠王并將其衆降漢凡四萬餘人號十萬既至長安天子所以賞賜者數十巨萬封昆邪王萬户為漯隂侯封其禆王呼毒尼為下麾侯鷹庇為輝渠侯禽黎為河綦侯大當戸銅離為常樂侯漢已得昆邪則隴西北地河西益少胡冦於是天子嘉驃騎之功曰驃騎將軍去病率師攻匈奴西域昆邪王及厥衆萌咸相犇率以軍糧接食并將控弦萬有餘人誅獟悍獲首虜八千餘級降異國之王三十二人戰士不離傷十萬之衆咸懐集服仍與之勞爰及河塞庶㡬無患幸旣永綏矣以千七百戶益封繇驃騎將軍减隴西北地上郡戍卒之半以寛天下之文學曰周累世積徳天下莫不願以為君故不勞而王去聲恩施由近及逺}
