  - {type: variant, offset: 1349, length: 0, content: '', WYG: 雜事篇曰樂毅為昭王謀必待諸侯兵齊乃可伐也於是乃使樂毅使諸侯遂合連四國之兵以伐齊大破之閔王亡逃僅以身脱莒樂毅追之遂屠七十餘城臨淄盡降唯莒即墨未下盡復取燕寳器而歸復易王之辱樂毅謝罷諸侯之兵而獨圍莒即墨時田單為即墨令患樂毅善用兵田單不能詐也欲去之昭王又賢不肯聼讒會昭王死惠王立田單使人讒之惠王惠王使騎刼代樂毅樂毅去之趙不歸燕騎刼既為將軍田單大喜設詐大破燕軍殺騎刼盡復收七十餘城}
