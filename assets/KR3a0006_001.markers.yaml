  - {type: variant, offset: 1056, length: 0, content: '', WYG: 食貨志曰秦兼天下幣為二等黄金以鎰為名上幣銅錢質如周錢文曰半兩重如其文而珠玉龜貝銀錫之屬為器飾寳藏不為幣然各隨時而輕重漢興以為秦錢重難用更令民鑄筴錢黄金一斤而不軌逐利之民畜積餘贏以稽市物痛騰躍米至石萬錢馬至四百金天下已平高祖乃令賈人不得衣絲乗車重稅租以困辱之孝惠高后時為天下初定復弛商賈之律然市井子孫亦不得官為吏顔師古曰欲令務農也}
