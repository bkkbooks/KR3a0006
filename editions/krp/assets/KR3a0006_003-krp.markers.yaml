  - {type: variant, offset: 9369, length: 471, content: 也君道篇曰燕昭王問於郭隗曰寡人地狹人寡齊人削取八城匈奴驅馳樓煩之下以孤之不肖得承宗廟恐危社稷存之有道乎郭隗曰有然恐王之不能用也昭王避席願請聞之郭隗曰帝者之臣其名臣也其實師也王者之臣其名臣也其實友也霸者之臣其名臣也其實賓也危國之臣其名臣也其實虜也今王將東面目指氣使以求臣則厮役之材至矣南面聼朝不失揖讓之禮以求臣則人臣之材至矣西面等禮相亢下之以色不乗勢以求臣則朋友之材至矣北面拘指逡廵而退以求臣則師傅之材至矣如此則上可以王下可以霸唯王擇焉燕王曰寡人願學而無師郭隗曰王誠欲興道隗請為天下之士開路於是燕王常置郭隗上坐南面居三年蘓子聞之從周歸燕鄒衍聞之從齊歸燕樂毅聞之從趙歸燕屈景聞之從楚歸燕四子畢至果以弱燕并強齊夫燕齊非均權敵戰之國也所以然者四子之力也詩曰濟濟多士文王以寜此之謂也周紀曰西伯曰文王遵后稷公劉之業則古公公季之法篤仁敬老慈幼禮下賢者日中不暇食以待士士以此多歸之伯夷叔齊在孤竹聞西伯善養老盍往歸之太顛閎夭散宜生鬻子辛甲大夫之徒皆往歸之呂氏春秋曰國雖小其食足以食天下之賢者其車足以乗天下之賢者其財足以禮天下之賢者與天下之賢者為徒此文王之所以王, SBCK: ''}
