  - {type: variant, offset: 4340, length: 1177, content: 內潔己而不能純教於彼故周公非不正管蔡之邪子產非不正鄧晳之偽也夫內不從父兄之教外不畏刑法之罪周公子產不能化必也今一一則責之有司有司豈能縛其手足而使之無為非哉賢良曰駟馬不馴御者之過也百姓不治有司之罪也春秋刺譏不及庶人責其率也故古者大夫將臨刑聲色不御刑以當矣猶三巡而嗟嘆之其恥不能以化而傷其不全也政教闇而不著百姓顛蹶而不扶猶赤子臨井焉聽其入也若此則何以為民父母故君子急於教緩於刑刑一而正百殺一而慎萬是以周公誅管蔡而子產誅鄧晳也刑誅一施民遵禮義矣夫上之化下若風之靡草無不從教何一一而縛之也後刑第三十四大夫曰古之君子善善而惡惡人君不畜惡民農夫不畜無用之苗無用之苗苗之害也無用之民民之賊也鉏一害而眾苗成刑一惡而萬民悅雖周公孔子不能釋刑而用惡家之有姐子器皿不居況姐民乎民者敖於愛而聽刑故刑所以正民鉏所以別苗也賢良曰古者篤教以導民明辟以正刑刑之於治猶策之於御也良工不能無策而御有策而勿用聖人假法以成教教成而刑不施故威厲而不殺刑設而不犯今廢其紀綱而不能張壞其禮義而不能防民陷於罔從而獵之以刑是猶開其闌牢發以毒矢也不盡不止曾子曰上失其道民散久矣如得其情即哀矜而勿喜夫不傷民之不治而伐己之能得姦猶弋者覩鳥獸挂罻羅而喜也今天下之被誅者不必有管蔡之邪鄧晳之偽恐苗盡而不別民欺而不治也孔子曰人而不仁疾之已甚亂也故民亂反之政政亂反之身身正而天下定是以君子嘉善而矜不能恩及刑人德潤窮夫施惠悅爾行刑不樂也授時第三十五大夫曰共其地居是世也非有災害疾疫獨以貧窮非惰則奢也無奇業旁入而猶以富給非儉則力也今曰施惠悅爾行刑不樂則是閔無行之人而養惰奢之民也故妄予不為惠惠惡者不為仁賢良曰三代之盛無亂萌教也夏商之季世無順民俗也是以王者設庠序明教化以防道其民及政教之洽性仁而喻善故禮義立則耕者讓於野禮義壞則君子爭於朝人爭則亂亂則天下不均故或貧或富富則仁生贍則爭止昏暮叩人門戶求水火貪夫不恡何則所饒也夫為政而使菽粟如水火民安有不仁者乎大夫曰博戲馳逐之徒皆富人子弟非不足者也故民饒則僣侈富則驕奢坐而委蛇起而為非未見其仁也夫居事不力用財不節雖有財如水火窮乏可立而待也有民不畜有司雖助之耕織其能足之乎賢良曰周公之相成王也百姓饒樂國無窮人非代之耕織也易其田疇薄其稅歛則民富矣上以奉君親下無饑寒之憂則教可成也語曰既富矣又何加焉曰教之教之以德齊之以禮則民徙義而從善莫不入孝出悌夫何奢侈暴慢之有乎管子曰倉廩實而知禮節百姓足而知榮辱故富民易與適禮難與適道大夫曰縣官之於百姓若慈父之於子也忠焉能勿誨乎愛之而勿勞乎故春親耕以勸農賑貸以贍不足通滀水出輕繫使民務時也蒙恩被澤而至今猶以貧困其難與適道若是夫賢良曰古者春省耕以補不足秋省歛以助不給民勤於財則貢賦省民勤於力則功築罕為民愛力不奪須臾故召伯聽斷於甘棠之下為妨農業之務也今時雨澍澤種懸而不得播秋稼零落乎野而不得收田疇赤地而停落成市發春而後懸青幡而策土牛殆非明主勸耕稼之意而春令, WYG: ''}
