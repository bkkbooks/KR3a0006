  - {type: variant, offset: 2365, length: 4, content: 故詔公卿, WYG: 其偶曰衛世子不肖諸侯之憂也子曷為泣也嬰曰吾聞之異乎子之言也昔者宋之桓司馬得罪於宋君出於魯其馬佚而􅕁吾園而食吾園之葵是嵗吾聞園人亡利之半越王勾踐起兵而攻呉諸侯畏其威魯徃獻女吾姊與焉兄徃視之道畏而死越兵威者吳也兄死者我也由是觀之禍與福相反也今衛世子甚不肖好兵吾男弟三人能無憂乎詩曰}
