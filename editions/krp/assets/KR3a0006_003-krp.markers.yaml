  - {type: variant, offset: 3993, length: 453, content: 論語云公叔文子之臣大夫僎與文子同升諸公孔子曰可以為文矣魏世家曰魏文侯謂李克曰先生嘗教寡人曰家貧則思良妻國亂則思良相今所置非成則璜二子何如李克對曰臣聞之卑不謀尊踈不謀戚臣在闕門之外不敢當命文侯曰先生臨事勿讓李克曰君不察故也居視其所親富視其所與逹視其所舉窮視其所不為貧視其所不取五者足以定之矣何待克哉文侯曰先生就舎寡人之相定矣李克趨而出過翟璜之家翟璜曰今者聞君召先生而卜相果誰為之李克曰魏成子為相矣翟璜忿然作色曰以耳目之所覩記臣何負於魏成子西河之守臣之所進也君内以鄴為憂臣進西門豹君謀欲伐中山臣進樂羊中山已拔無使守之臣進先生君之子無傅臣進屈侯鮒臣何以負於魏成子李克曰且子之言克於子之君者豈將比周以求大官哉君問而置相非成則璜二子何如對曰君不察故也居視其所親富視其所與逹視其所舉窮視其所不為貧視其所不取五者足以定之矣何待克哉是以知魏成子之為相也且子安得與魏成子比乎魏成子以食禄千鍾什九在外什一在内是以東得卜子夏田子方段干木此三人者君皆師之子之所進五人者君皆臣之子惡得與魏成子比也翟璜逡廵再拜曰璜鄙人也失對願卒為弟子, SBCK: ''}
