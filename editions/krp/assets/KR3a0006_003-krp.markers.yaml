  - {type: variant, offset: 3376, length: 233, content: 琴操曰文王以紂時為岐侯躬脩道徳執行仁義百姓附親是時紂為無道刳胎斮渉廢壊仁人天統易運諸侯瓦解皆歸文王傳曰文王兼制天下立國七十一姬姓獨居五十二周之子孫苟不狂惑莫不為天下顯諸侯明堂篇曰昔殷紂亂天下脯鬼侯以饗諸侯是以周公相武王以伐紂武王崩成王幼弱周公相天子之位以治天下六年朝諸侯於明堂制禮作樂頒度量而天下大服七年致政於成王成王以周公有大勲勞於天下是以封周公曲阜地方七百里革車千乘命魯公世世祀周公以天子之禮樂是以魯君孟春乘大輅載弧韣旂十有二旒日月之章祀帝於郊配以后稷天子之禮也, SBCK: ''}
