  - {type: variant, offset: 485, length: 2, content: 詩云, SBCK: 古之用師非貪壤􅁟之利救民之患也民思之者旱之望雨簞食壼漿以逆王師故憂人之患者民一心而歸之湯武是也不愛民之死力盡而潰叛者秦王是也孟子曰君不鄕道不由仁義而爲之强戰雖克必亡此中國所以擾亂非蒙恬死而諸侯叛秦昔}
  - {type: page-break, offset: 485, content: '', id: KR3a0006_SBCK_008-6b}
  - {type: variant, offset: 485, length: 0, content: '', WYG: 往者通關梁交有無自單音蟬于以下皆親漢内附往來長城之下其後王恢誤謀馬邑匈奴絶和親故當路結禍紛拏奴加切而不解兵連而不息邊民不解甲弛弩行數十年介胄而耕耘鉏音鋤耰而候望燧音遂燔音煩烽音峯舉丁壯弧音胡弦而出鬬老者超越而入葆音保言之足以流涕寒心則仁者不忍也匈奴傳曰武帝即位明和親約束厚遇關市饒給之匈奴自單于以下皆親漢往來長城下漢使馬邑人聶翁信壹閒闌出物與匈奴交易陽為賣馬邑城以誘單于單于之而貪馬邑財物廼以十萬騎入武州塞伏兵三十餘萬馬邑旁御史大夫韓安國為䕶軍將軍䕶四將軍以伏單于單于既入漢塞未至馬邑百餘里見畜布野而無人牧者怪之乃攻亭時鴈門尉史行徼見冦保此亭單于得欲刺之尉史知漢謀廼下具告單于單于大驚曰吾固疑之乃引兵還出曰吾得尉史天也以尉史為天王漢兵約單于入馬邑而縱兵單于不至以故無所得將軍王恢部出代撃胡輜重聞單于還兵多不敢出漢以恢木建造兵謀而不進誅恢自是後匈奴絶和親攻當路塞往往入盗於邊不可勝數}
