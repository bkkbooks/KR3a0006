  - {type: variant, offset: 12451, length: 495, content: 春秋曰宋災宋伯姬卒左傳曰或呌于宋太廟曰嘻嘻出出鳥鳴于亳社如曰嘻嘻甲午宋大災宋伯姬卒待姆也君子謂宋共姬女而不婦女待人婦義事也榖梁傳曰取卒之日加之災上者見以災卒也其見以災卒奈何伯姬之舍失火左右曰夫人少辟火乎伯姬曰婦人之義傅母不在宵不下堂左右又曰夫人少辟火乎伯姬曰婦人之義保母不在宵不下堂遂逮乎火而死婦人以貞為行者也伯姬之婦道盡矣詳其事賢伯姬也公羊傳曰宋災伯姬卒焉其稱諡何賢也何賢爾宋災伯姬存焉有司復曰火至矣請出伯姬曰不可吾聞之也婦人夜出不見傳母不下堂傳至矣母未至也逮乎火而死傳曰魯監門之女嬰相從績中夜而泣涕其偶曰何為而泣也嬰曰吾聞衛世子不肖所以泣也其偶曰衛世子不肖諸侯之憂也子曷為泣也嬰曰吾聞之異乎子之言也昔者宋之桓司馬得罪於宋君出於魯其馬佚而𩥇吾園而食吾園之葵是嵗吾聞園人亡利之半越王勾踐起兵而攻呉諸侯畏其威魯徃獻女吾姊與焉兄徃視之道畏而死越兵威者吳也兄死者我也由是觀之禍與福相反也今衛世子甚不肖好兵吾男弟三人能無憂乎詩曰大夫跋渉我心則憂是非類與乎列女傳曰魯漆室邑之女過時未適人倚柱而嘯傍人聞之心莫不為之慘者鄰婦從之遊曰何嘯之悲也子欲嫁乎吾為子求偶漆室女曰吾豈為不嫁之故而悲哉憂吾君老太子少也, SBCK: ''}
