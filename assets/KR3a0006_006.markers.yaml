  - {type: variant, offset: 36, length: 1, content: 獨, WYG: 也指武篇曰田成子常與宰我争宰我夜伏卒將以攻田成子令於卒中曰}
  - {type: variant, offset: 36, length: 1, content: 獨, krp: 也指武篇曰田成子常與宰我争宰我夜伏卒將以攻田成子令於卒中曰}
  - {type: variant, offset: 38, length: 0, content: '', SBCK: 以道進必不以道退不以義得者必不以義亡季孟之權三􅁊之富不可及也孔子爲之曰㣲爲人臣權均於君富侔於國者亡故其位彌高而罪彌重禄滋厚而罪滋多夫行者先全已而後求名仕者先辟害而後求禄故香餌非不美也龜龍聞而深藏鸞鳳}
  - {type: variant, offset: 39, length: 12, content: 季夏之螇乎音聲入耳秋風至, SBCK: ''}
  - {type: variant, offset: 39, length: 2, content: 季夏, WYG: 旌節母起䲭夷子皮聞}
