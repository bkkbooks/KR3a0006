  - {type: variant, offset: 4523, length: 0, content: '', SBCK: 龜倡有介狐貉不能禽蝮蛇有螫人忌而不輕故有備則制人無備則制於人故仲山甫􅀘衮職之闕蒙}
  - {type: variant, offset: 4524, length: 1, content: 輸, SBCK: 築長城之固所以備冦難而折衝萬里之外也今不固其外欲安其内猶家人不堅垣牆狗吠夜驚而闇昧妄行也文學曰秦左殽函右隴阺前蜀漢後山河四塞以爲固金城千里良將勇士設利噐而守陘隧墨}
  - {type: page-break, offset: 4524, content: '', id: KR3a0006_SBCK_009-3b}
  - {type: variant, offset: 4526, length: 2, content: 因木, SBCK: 守雲梯}
  - {type: variant, offset: 4529, length: 1, content: 宜, SBCK: 械也以爲雖湯武復生蚩尤復起不輕攻也然戍卒陳勝無將帥之任師旅之衆􅁬空拳而破百萬之師無牆籬之難故在德不在固誠以行義爲阻道德爲塞賢人爲兵}
  - {type: variant, offset: 4529, length: 74, content: 宜聖人不費民之性是以斧斤簡用刑罰不任政立而化成扁鵲攻於腠理絕邪氣故癰疽不得成形聖人從事於未然故亂原無由生是以砭石藏而不施法令設而不用斷已然鑿已發者凡, WYG: 賈}
  - {type: variant, offset: 4529, length: 74, content: 宜聖人不費民之性是以斧斤簡用刑罰不任政立而化成扁鵲攻於腠理絕邪氣故癰疽不得成形聖人從事於未然故亂原無由生是以砭石藏而不施法令設而不用斷已然鑿已發者凡, krp: 賈}
