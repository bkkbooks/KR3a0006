  - {type: variant, offset: 3829, length: 282, content: 面而攻秦聞不一期而社稷為墟惡在其能長制群下而久守其國也御史默然不對大夫曰瞽師不知白黑而善聞言儒者不知治世而善訾議夫善言天者合之人善言古者考之今令何為施法何為加湯武全肌骨而殷周治秦國用之法弊而犯二尺四寸之律古今一也或以治或以亂春秋原罪甫刑制獄今願聞治亂之本周秦所以然乎文學曰春夏生長聖人象而為令秋冬殺藏聖人則而為法故令者教也所以導民人法者刑罰也所以禁強暴也二者治亂之具存亡之效也在上所任湯武經禮義明好惡以道其民刑罪未有所加而民自行義殷周所以治也上無德教下無法則任刑必誅劓鼻盈蔂斷足盈車舉河以西不足以受天下之徒終而以亡者秦王也非二尺四寸之律異所行反古而悖民心也大論第五, WYG: ''}
