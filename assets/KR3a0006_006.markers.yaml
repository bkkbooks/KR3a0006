  - {type: variant, offset: 1409, length: 255, content: 斤成大夫葦莞而已今富者黼繡帷幄塗屏錯跗中者錦綈高張采畫丹漆古者皮毛草蓐無茵席之加旃蒻之美及其後大夫士復薦草緣蒲平單莞庶人即草蓐索經單藺蘧蒢而已今富者繡茵翟柔蒲子露床中者𤡉皮代旃闒坐平莞古者不粥飪不市食及其後則有屠沽沽酒市脯魚鹽而已今熟食徧列殽施成市作業墮怠食必趣時楊豚韭卵狗䐲馬朘煎魚切肝羊淹雞寒挏馬酪酒蹇捕胃脯胹羔豆賜鷇膹鴈羹臭鮑甘瓠熟粱貊炙古者土鼓凷枹擊木拊石以盡其歡及其後卿大夫有管磬士有琴瑟往者民間酒會各以黨俗彈箏鼓缶而已無要妙之音變羽之轉今富者鐘鼓五樂歌兒數曹中者鳴竽調瑟鄭儛趙謳古者瓦棺容尸木板堲周, WYG: ''}
