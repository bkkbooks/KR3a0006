  - {type: variant, offset: 4329, length: 399, content: 傳曰昔者周道之盛召伯在朝有司請營邵以居召伯曰嗟以吾一身而勞百姓此非吾先君文王之志也於是出而就蒸庻於阡陌隴畆之間而聼斷焉召伯暴處逺野廬於樹下百姓大悦耕桑者倍力以勸於是嵗大稔民給家足其後在位者驕奢不恤元元税賦繁數百姓困乏耕桑失時於是詩人見召伯之所休息樹下美而歌之詩曰蔽茀甘棠勿剪勿伐召伯所苃此之謂也貴徳篇曰聖人之於天下百姓也其猶赤子乎飢者則食之寒者則衣之將之養之育之長之唯恐其不至於大也詩曰蔽芾甘棠勿剪勿伐召伯所苃傳曰自陜以東者周公主之自陜以西者召公主之召公述職當桑蠶之時不欲變民事故不入邑中舍於甘棠之下而聼斷焉陕間之人皆得其所是故後世思而歌詠之善之故言之言之不足故嗟嘆之嗟嘆之不足故歌詠之夫詩思然後積積然後滿滿然後發發由其道而致其位焉百姓嘆其美而致其敬甘棠之不伐也政教惡乎不行孔子曰吾於甘棠見宗廟之敬也甚尊其人必敬其位順安萬物古聖之道幾哉仁人之徳教也誠惻隐於中悃愊於内不能已於其心故其治天下也如救溺人, SBCK: ''}
