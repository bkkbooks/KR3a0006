  - {type: variant, offset: 13363, length: 244, content: 已韓非傳曰韓非者韓之諸公子也喜刑名法術之學而其歸本於黄老非為人口吃不能道說而善著書見韓之削弱數以書諫韓王韓王不能用故作孤憤五蠧内外儲說林說難十餘萬言人或傳其書至秦秦王見孤憤五蠧之書曰嗟乎寡人得見此人與之游死不恨矣李斯曰此韓非之所為書也秦因急攻韓韓王始不用非及急廼遣非使秦秦王恱之未信用李斯姚賈害之毁之曰韓非韓之諸公子也今王欲并諸侯非終為韓不為秦此人之情也今王不用乆留而歸之此自遺患也不如以過法誅之秦王以為然下吏治非李斯使人遺非藥使自殺韓非欲自陳不得見秦王後悔之使人赦之非已死矣鹽鐡論卷十一, SBCK: 巳}
