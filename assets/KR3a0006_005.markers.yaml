  - {type: variant, offset: 5, length: 0, content: '', krp: 漢桓寛撰眀張之象註毁學第十八大夫曰夫音扶懐枉而言正自託扵無欲而實不從此非士之情也昔李斯與包丘子俱事荀卿既而李斯入秦遂取三公據萬乘去聲以制海内功侔伊望謂伊尹太公望也名巨太山而包丘子不免扵甕牖蒿廬如潦嵗之鼃音蛙口非不衆也然卒死扵溝壑而已今内無以養外無以稱貧賤而好去聲義雖言好去聲義亦不足貴者也文學曰方李斯之相去聲秦也始皇任之人臣無二然而荀卿為之不食覩其罹不測之禍也李斯傳曰斯長男由為三川守諸男皆尚秦公主女悉嫁秦諸公子三川守李由吿歸咸陽置酒扵家百官長皆前為夀門庭車騎以千數李斯喟然而歎曰嗟乎吾聞之荀卿曰物禁太盛夫斯乃上蔡布衣閭巷之黔首上不知其駑下遂擢至此當今人臣之位無居臣上者可謂富貴極矣物極則衰吾未知所稅駕也申屠剛曰損益之際孔父攸歎持滿之戒老氏所慎蓋功葢天下者不安威震人主者不全包丘子飯麻蓬藜修道白屋之下樂音洛其志安之扵廣厦芻豢無赫赫之勢亦無戚戚之憂陸雲曰富貴者人之所欲也而古之逸民輕天下細萬物而欲專一丘之歡擅一壑之美豈不以身重扵宇宙而恬貴扵芬華哉天地不易其樂萬物不干其志然後可以妙有生之極固無疆之休夫音扶晉獻垂棘非不美也宫之竒見之而歎知荀息之圖之也知去聲伯富有三晉非不盛也然不知襄子之謀之也季孫之狐貉非不麗也然不知魯君之患之也人間訓曰晉獻公欲假道扵虞以伐虢遺虞垂棘之璧與屈産之乘虞公惑扵璧與馬而欲與之道宫之竒諫曰不可夫虞之與虢若車之有輪輪依扵車車亦依輪虞之與虢相恃為勢也若假之道虢朝亡而虞夕從之矣虞公弗聽遂假之道荀息伐虢遂克之還反伐虞又㧞之趙世家曰襄子立四年智伯與趙韓魏盡分其范中行故地智伯益驕請地韓魏韓魏與之請地趙趙不與以其圍鄭之辱智伯怒遂率韓魏攻趙趙襄子懼乃奔保晉陽三國攻晉陽嵗餘引汾灌其城城不浸者三版城中懸釜而炊易子而食襄子懼乃夜使張孟同私於韓魏韓魏與合謀三國反滅智伯共分其地魯世家曰哀公患三桓将欲因諸侯以刼之三桓亦患公作難故君臣多間泰族訓曰晉獻公之伐驪得其女非不善也然而史蘇歎之見其四世之被禍也吴王夫差破齊艾陵勝晉黄池非不捷也而子胥憂之見其必擒扵越也小白奔莒重耳奔曹非不困也而鮑叔咎犯隨而輔之知其可與至扵覇也勾踐棲扵㑹稽修政不殆謨慮不休知禍之為福也襄子再勝而有憂色畏福之為禍也故齊桓亡汶陽之田而覇智伯兼三晉之地而亡聖人見禍福扵重閉之内而慮患扵九拂之外者也故晋獻以寶馬釣虞虢襄子以城壊誘知去聲伯身禽通作擒扵趙而虞虢卒并扵晉以其務得不顧其後貪土地而利寶馬也申旗曰昔者六晉之時智氏最強滅破范中行又帥韓魏以圍趙襄子扵晉陽決晉水以灌晉陽城不沉者三版耳智伯出行水韓康子御魏桓子驂乘智伯曰始吾不知水之可亡人之國也乃今知之汾水利以灌安邑絳水利以灌平陽魏桓子肘韓康子康子履魏桓子躡其踵肘足接扵車上而智氏分矣身死國亡為天下笑繆稱訓曰無勇者非先懾也難至而失其守也貪婪者非先欲也見利而忘其害也虞公見垂棘之璧而不知虢禍之及己也孔子曰人無逺慮必有近憂今之在位者見利不虞害貪得不顧耻以利易身以財易死無仁義之徳而有富貴之祿若䧟坎穽音淨食扵縣音懸門之下此李斯之所以具五刑也傳曰李斯楚上蔡人也從荀卿學帝王之術入秦秦卒用其計二十餘年竟并天下以斯為丞相二世立以郎中趙髙之譖乃具斯五刑腰斬咸陽南方有鳥名鵷雛非竹實不食非醴泉不飲飛過太山太山之鴟俛音免啄腐鼠見鵷鶵而嚇音黒今公卿以其富貴笑儒者為之常行得無若太山鴟嚇音黒鵷鶵乎南華經曰恵子相梁荘子往見之或謂恵子曰荘子来欲代子相扵是恵子恐搜扵國中三日三夜莊子徃見之曰南方有鳥其名鵷鶵子知之乎夫鵷鶵發扵南海而飛扵北海非梧桐不棲非竹實不食非醴泉不飲扵是鴟得腐䑕鵷鶵過之仰而視之曰嚇今子欲以子之梁國而嚇我耶大夫曰學者所以坊古防字固辭禮者所以文鄙行去聲也故學以輔徳禮以文質言思可道行思可樂音洛惡言不出扵口邪行去聲不及扵已動作應禮從容中去聲道故禮以之孫音遜以出之是以終日言無口過終身行無寃尤今人主張官立朝音潮以治民疏爵分禄以褒賢而曰縣音懸門腐䑕何辭之鄙倍而悖扵所聞也人間訓曰虞氏梁之大富人也家充盈殷富金錢無量財貨無貲升髙樓臨大路設樂陳酒積博其上游侠相隨而行樓下博上者射朋張中反兩而笑飛鳶適墮其腐䑕而中㳺侠㳺侠相與言曰虞世審樂之日久矣而常有輕易人之志吾不敢侵犯而乃辱我以腐䑕如此不報無以立務扵天下請與公僇力一志悉率徒属而必以滅其家文學曰聖主設官以授任能者處之分祿以養賢䏻者受之說命曰官不及私昵惟其䏻爵罔及惡徳惟其賢義貴無髙義取無多故舜受堯之天下太公不避周之三公馮忌曰昔者堯見舜扵草茅之中席隴畝而庇桑隂隂移而天下傳尚書中候曰文王至田扵溪水畔吕尚釣扵崖王下拜曰切望公七年乃今見光景于斯尚立變名答曰望釣得玉璜刻曰姬受命吕佐旌徳合昌来提撰爾雒鈴報在齊尊賢篇曰堯舜相見不違桑隂文王舉太公不以日久故賢聖之接也不待久而親䏻者之相見也不待試而知矣苟非其人簞食音嗣豆羮猶為頼民也頼幸也故徳薄而位髙力小而任重鮮上聲不及矣易曰鼎折足覆公餗其形渥凶子曰徳薄而位尊智小而謀大力小而任重鮮不及矣說林訓曰短綆不可以汲深器小不可以盛大非其任也陸子曰任重於力才盡則困用廣其器應博則凶是以物勝權而衡殆形過鏡則照窮故明主程才以効業貞臣底力而辭豐夫音扶太山鴟啄腐鼠扵窮澤幽谷之中非有害於人也今之有司盗主財而食之扵刑法之旁不知機之是發又以嚇音黒人其患惡音烏得若太山之鴟乎大夫曰司馬子言天下穰穰皆為利徃貨殖傳曰天下熈熙皆為利来天下穰穰皆為利徃趙女不擇醜好鄭嫗音預不擇逺近商人不醜耻辱戎士不為死力士不在親事君不避其難去聲皆為利禄也儒墨内貪外矜徃来㳺說音稅栖栖然亦未為得也故尊榮者士之願也富貴者士之期也方李斯在荀卿之門闒音達茸音戎與之齊軫及其奮翼髙舉龍昇驥騖過九軼二翺翔萬仞鴻鵠驊騮且同侣况跛音避牂音戕牝羊也燕雀之属乎席天下之權席猶因也若人之坐扵席也御宇内之衆後車百乘去聲食祿萬鍾而拘儒布褐不完糟糠不飽非甘菽藿而卑廣厦亦不䏻得已雖欲嚇音黒人其何已乎傳曰夫鳳凰之初起也翾翾十歩之雀喔咿而笑之及其升扵髙一屈一伸展而雲間藩木之雀超然自知不及逺矣士褐衣緼著未嘗完也糲藿之食未嘗飽也世俗之士即以為羞耳及其出則安百議用則延民命世俗之士超然自知不及逺矣文學曰君子懐徳小人懐土賢士殉名貪夫死利駢拇篇曰小人則以身殉利士則以身殉名伯夷死名扵首陽之下盗跖死利扵東陵之上野語曰衆人重利廉士重名賢士尚志聖人貴精叢談曰衆人以毁形為耻君子以毁義為辱衆人重利㢘士重名李斯貪其所欲致其所惡音汙范睢曰欲而不知止失其所以欲有而不知足失其所以有孫叔敖早見扵未萌三去相去聲而不悔南華經曰肩吾問扵孫叔敖曰子三為令尹而不榮華三去之而無憂色吾始也疑子今視子之鼻間栩栩然子之用心獨奈何孫叔敖曰吾何以過人哉吾以其来不可却也其去不可止也吾以為得失之非我也而無憂色矣吾何以過人哉且不知其在彼乎其在我乎其在彼耶忘乎我在我耶忘乎彼方将躊躇方将四顧何暇至乎人貴人賤哉非樂音洛卑賤而惡音汙重祿也慮逺而避害謹也傅亮曰昔之君子同名爵扵香餌故傾危不及思憂患而豫防則針石無用洪流壅扵㳙㳙合拱挫扵纖蘖介焉是式色斯而舉悟髙鳥以風逝鑑醴酒而投紱夫豈敝著而後謀通患結而後思復哉故詩曰謹爾侯度用戒不虞言防萌也夫音扶郊祭之牛食養朞年衣去聲之文繡以入廟堂太宰執其鸞刀以啟其毛方此之時願任重而止峻坂不可得也南華經曰楚威王聞荘周賢使使厚幣迎之許以為相荘周笑謂楚使者曰千金重利卿相尊位也子獨不見郊祭之犧牛乎養食之數嵗衣以文繡以入太廟當是之時雖欲為孤豚豈可得乎商鞅困扵彭池吳起之伏王尸願被布褐而處窮鄙之蒿廬李斯相去聲秦席天下之勢志小萬乘去聲及其囚扵囹音零圄音語車制扵雲陽之市亦願負薪入鴻門行上蔡曲街徑不可得也商鞅傳曰商君既入秦走商邑與其徒属發邑兵北出擊鄭秦發兵攻商君殺之扵鄭黽池徐廣曰黽或作彭吳起傳曰諸侯患楚之強故楚之貴戚盡欲害吳起及悼王死宗室大臣作亂而攻吳起吳起走之王尸而伏之擊起之徒因射刺吳起并中悼王李斯傳曰二世二年具斯五刑論腰斬咸陽市斯出獄與其中子俱執顧謂其中子曰吾欲與若牽黄犬俱出上蔡東門逐狡兎豈可得哉蘇秦吳起以權勢自殺商鞅李斯以尊重自滅皆貪禄慕榮以沒其身從去聲車百乘去聲曽不足以載其禍也傳曰夫利為害夲而福為禍先惟不求利者為無害不求福者為無禍詩曰不忮不求何用不臧傅亮曰夫四道好謙三才忌滿祥萃虚室鬼瞰髙屋豐屋有蔀家之災鼎食無百年之貴然而狥欲厚生者忽而不戒知進忘退者曽莫之懲前車已摧後鑾不息乘危以庶安行險以徼幸扵是有顛墜覆亡之禍殘生夭命之釁其故何哉流溺忘反而以身輕扵物也褒賢第十九大夫曰伯夷以㢘饑尾生以信死古史考曰伯夷叔齊殷之末世孤竹君之二子也隠扵首陽山采薇而食之野有婦人謂之曰子義不食周粟此亦周之草木也扵是餓死雜篇曰尾生與女子期扵梁下女子不来水至不去抱梁柱而死由小器而虧大體匹夫匹婦之為諒也絰扵溝瀆而莫之知也何功名之有蘇秦張儀知去聲足以強國勇足以威敵一怒而諸侯懼安居而天下息萬乘去聲之主莫不屈體卑辭幣請交此所謂天下名士也拾遺記曰蘇秦張儀二人同志好學迭翦髪而鬻之以相養㦯傭力寫書非聖人之書不讀遇見墳典行途無所題記以墨書掌及股裏夜還而寫之析竹為簡二人毎假食扵路剥樹皮編以為書帙以盛天下良書嘗息大樹之下假息而寐有一先生問二子何勤苦也儀秦又問之子何國人答曰吾生扵歸谷亦云鬼谷鬼者歸也又云歸者谷名也乃謂其術教以千世出俗之辨即探胸内得二巻說書言輔時之事古史考云鬼谷子也鬼歸相近也論衡曰蘇秦張儀學縦横之術扵鬼谷先生先生曰䏻說我泣出則䏻分天皇之紀秦說鬼谷先生先生泣霑襟夫音扶智不足與謀而權不能舉當世民斯為下也今舉亡音無而為有虗而為盈布衣穿履深念徐行若有遺亡非立功成名之士而亦未免於世俗也文學曰蘇秦以從音縦顯扵趙張儀以衡音横任扵秦司馬貞曰山東地形從長蘇秦相六國合從親而擯秦闗西地形衡長張儀相六國連衡而事秦故蘓為合從張為連衡也方此之時非不尊貴也然知去聲士隨而憂之知夫音扶不以道進必不以道退不以義得者必不以義亡季孟之權三桓之富不可及也孔子為之曰微為人臣權均扵君富侔扵國者亡故其位彌髙而罪彌重禄滋厚而罪滋多文子曰身有榮華心有愁悴夫音扶行者先全已而後求名仕者先辟音避害而後求禄曽子曰飛鳥以山為卑而層巢其巔魚鱉以淵為淺而穿穴其中然所以得者餌也君子苟能無以利害身則辱安從至乎潘尼曰夫榮之所不能動者則辱之所不䏻加也利之所不能勸者則害之所不䏻嬰也譽之所不能益者則毁之所不䏻損也夫音扶香餌音貳非不美也龜龍聞而深藏鸞鳳見而髙逝者知其害身也夫音扶為烏鵲魚鱉食香餌音貳而後狂飛奔走遜身屈遰音逓圍繞也無益扵死吳越春秋曰髙飛之鳥死扵美食深淵之魚死扵芳餌太公家教曰網羅之鳥悔不髙飛吞餌之魚悔不忍饑今有司盗秉國法進不顧罪卒然有急然後車馳人趨無益扵死所盗不足償扵臧獲臧獲奴婢也妻子奔亡無處所身在深牢莫知恤視方此之時何暇得以笑乎蔡澤曰翠鵠犀象其處勢非不逺死也而所以死者惑扵餌也蘇秦智伯之智非不足以辟辱逺死也而所以死者惑扵貪利不止也大夫曰文學髙行去聲矯然若不可卷盛莭潔言皦音皎然若不可湼音乃結反詩云我心匪席不可卷也孔子云不曰白乎涅而不緇皦潔白貌然戍音絮卒陳勝釋輓音挽輅首為叛逆自立張楚陳勝世家曰秦二世二年陳勝自立為将軍吴廣為都尉攻大澤鄉乃入據陳數日號令召三老豪傑與皆来㑹計事三老豪傑皆曰将軍身披堅執銳伐無道誅暴秦復立楚國之社稷功宜為王陳勝乃立為王號為張楚當此時諸郡縣苦秦吏者皆刑其長吏殺之以應陳勝李竒曰欲張大其楚國故稱張楚也素非有囘由處士之行去聲顔囘仲由皆孔子弟子宰相去聲列臣之位也奮扵大澤不過旬月而齊魯儒墨薦紳之徒徐廣曰薦紳即縉紳也古字假借肆其長衣長衣官之也負孔氏之禮器詩書委質音至為臣質即贄也古字假借正義曰贄之為言至也自五玉三帛二生一死皆所以為贄以見其君者也古之欲仕者出其疆必載質而行故謂為臣者曰委贄也孔甲為涉博士陳勝字涉孔鮒字甲孔子之八世孫也為陳王涉博士死扵陳下卒俱死陳為天下大笑深蔵髙逝者固若是也文學曰周室衰禮義壊不能統理天下諸侯交爭相滅亡并為六國兵革不休民不得寧息秦以虎狼之心蠺食諸侯顔師古曰蠶食謂漸吞滅之如蠶之食葉也并吞戰國以為郡縣秦紀曰始皇二十六年分天下以為三十六郡郡置守尉監伐能矜功自以為過堯舜而羞與之同棄仁義而尚刑罰以為今時不師扵文而决扵武趙髙治獄扵内䝉恬治兵扵外百姓愁苦同心而患秦揚雄曰神明所祚兆民所托罔不云道徳仁義禮智獨秦崛起西戎邠荒岐雍之疆因襄文宣靈之僣跡立基孝公茂恵文奮昭荘至政破從擅衡并吞六國遂稱乎始皇盛從鞅儀韋斯之邪政馳騖起翦恬賁之用兵剗滅古文刮語燒書弛禮崇樂塗民耳目遂欲流唐漂虞滌殷蕩周㸐除仲尼之篇籍自勒功業改制度軌量咸稽之扵秦紀是以耆儒碩老抱其書而逺遜禮官博士卷其舌而不談来儀之鳥肉角之獸狙獷而不臻甘露嘉醴景曜浸潭之瑞潜大茀經霣巨狄鬼信之妖發神歇靈繹海水羣飛二世而亡何其劇與帝王之道兢兢乎不可離己陳王赫然奮爪牙為天下首事道雖凶而儒墨或干之者以為無王久矣道擁遏不得行自孔子以至扵兹而秦復重禁之故發憤扵陳王也司馬遷曰嗟乎夫周室衰而闗雎作幽厲微而禮樂壊諸侯恣行政由強國故孔子閔王路廢而邪道興扵是論次詩書修起禮樂適齊聞韶三月不知肉味自衛返魯然後樂正雅頌各得其所世以混濁莫䏻用是以仲尼干七十餘君無所遇曰苟有用我者期月而已矣西狩獲麟曰吾道窮矣故因史記作春秋以寓王法其辭微而指博後世學者多録焉自孔子卒後七十子之徒散㳺諸侯大者為師傅卿相小者友教士大夫㦯隠而不見故子路居衛子張居陳澹䑓子羽居楚子夏居西河子貢終于齊如田子方段干木吴起禽滑釐之属皆受業扵子夏之倫為王者師是時獨魏文侯好學後陵遲以至于始皇天下並争扵戰國儒術既絀焉然齊魯之門學者獨不廢也扵威宣之際孟子荀卿之列咸遵夫子之業而潤色之以學顯扵當世及至秦之季世焚詩書坑術士六藝從此缺焉陳涉之王也而魯諸儒持孔子之禮器徃歸陳王扵是孔甲為陳涉博士卒與涉俱死陳涉起匹夫驅瓦合適戊旬月以王楚不滿半嵗竟滅亡其事至微淺然而薦紳先生之徒負孔子禮器徃委質為臣者何也以秦焚其業積怨而發憤扵陳王也孔子曰如有用我者吾其為東周乎庶㡬成湯文武之功為百姓除殘去賊豈貪禄樂音洛位哉大夫曰文學言行去聲雖有伯夷之亷不及栁下恵之貞不過髙瞻下視潔言汚行去聲觴酒豆肉遷延相讓辭小取大雞㢘狼吞趙綰王臧之等以儒術擢為上卿而有奸利殘忍之心主父偃以口舌取大官竊權重欺紿音怠亦欺也宗室受諸侯之賂卒皆誅死儒林傳曰蘭陵王臧既受詩以事孝景帝為太子太傅免去今上初即位臧廼上書宿衛上累遷一嵗中為郎中令及代趙綰亦嘗受詩申公綰為御史大夫太皇竇太后好老子言不說儒術得趙綰王臧之過以讓上上盡下趙綰王臧吏後皆自殺主父偃傳曰偃上書闕下朝奏暮召入見拜偃為謁者一嵗中四遷偃大臣皆畏其口賂遺累千金元朔二年主父偃言齊王内淫佚行僻上拜偃為齊相至齊乃使人以王與姊奸事動王王以為終不得脫罪乃自殺有司以聞上大怒以為偃刼其王令自殺乃徴下吏治服受諸侯金實不刼王令自殺上欲勿誅是時公孫𢎞為御史大夫乃言曰齊王自殺無後國除為郡入漢主父偃夲首惡陛下不誅主父偃無以謝天下乃遂族主父偃東方朔自稱辯略消堅釋石當世無雙然省其私行去聲狂夫不忍為風俗通曰東方朔平原人也孝武皇帝時招延賢良文學之士待以不次之位故四方多上書言得失自衒鬻者扵是朔詣闕自陳十二失父長養兄嫂年十三學書十四擊劍十六誦詩十九學孫吴兵法又常服子路之言臣朔年二十三長九尺三寸目若懸珠齒若編貝勇若孟賁捷若慶忌亷如鮑叔信若尾生若此可以為天子大臣矣朔文辭不遜髙自稱譽由是見偉稍益親幸詔拜以為郎嘗在側侍中數召至前談語人主未嘗不說也時詔賜之食扵前飯已盡懐其餘肉持去衣盡汚數賜縑帛擔掲而去徒用所賜錢帛取少婦扵長安中好女率取婦一嵗所者即棄去更取婦所賜錢財盡索之扵女子人主左右諸郎半呼之狂人揚雄曰朔恢誕多端不名一行應諧似優不窮似智正諫似直穢徳似隠非夷齊是栁恵其滑稽之雄乎况無東方朔之口其餘無足觀者也文學曰志善者忘惡謹小者致大俎豆之間足以觀禮閨門之内足以論行去聲夫音扶服古之服誦古之道舍而為非者鮮上聲矣故君子時然後言義然後取不以道得之不居也人間訓曰忠臣事君也計功而受賞不為苟得積力而受官不貪爵􅀈其所䏻者受之勿辭也其所不䏻者與之勿喜也滿而不溢泰而不驕故袁盎親扵景帝秣馬不過一駟公孫𢎞即三公之位家不過十乗東方先生說聴言行扵武帝而不驕溢主父見困厄之日久此疾在位者不好去聲道而富且貴莫知䘏士也扵是取饒衍之餘以周窮士之急非為私家之業也主父偃傳曰主父偃者齊臨菑人也學長短縦横之術晚乃學易春秋百家言㳺齊諸生間莫䏻厚遇也齊諸儒生相與排擯不容扵齊家貧假貸無所得廼北逰燕趙中山皆莫䏻厚遇為客甚困孝武元光元年中以為諸侯莫足㳺者乃西入闗見衞将軍衛将軍數言上上不召資用乏留久諸公賓客多厭之乃上書下朝奏暮召詔拜偃為謁者一嵗中四遷偃大臣皆畏其口賂遺累千金人㦯說偃曰大横矣主父曰臣結髪㳺學四十餘年親不以為子昆弟不收賓客棄我我阨日久矣且丈夫生不五鼎食死即五鼎烹耳吾日暮途逺故倒行逆施之上拜主父為齊相至齊遍召昆弟賓客散五百金予之數之曰始吾貧時昆弟不我衣食賓客不我内門今吾相齊諸君迎我㦯千里吾與諸君絶矣毋復入偃之門當世囂囂非患儒之鷄㢘患在位者之虎飽嗌音益咽扵求覽無所孑遺耳嗌咽也爾雅曰江東呼咽曰嗌覽通作攬撮持也詩云周餘黎民靡有孑遺}
