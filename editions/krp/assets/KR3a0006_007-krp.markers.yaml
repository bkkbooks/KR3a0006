  - {type: variant, offset: 13617, length: 252, content: 矣西京雜記曰平津侯自布衣為宰相乃開東閣營客館以招天下之士其一曰欽賢館以待大賢次曰翹材館以待大材次曰接士館以待國士其有徳任毗賛佐理隂陽者處欽賢之館其有才堪九列將軍二千石者居翹材之館其有一介之善一方之藝居接士之館而躬自菲薄所得俸禄以奉待之公孫𢎞傳曰時上方興功業屢舉賢良𢎞自見為舉首起徒步數年至宰相封侯於是起客館開東閣以延賢人與參謀議𢎞身食一肉脱粟飯故人賔客仰衣食奉禄皆以給之家無所餘凡為丞相御史六嵗年八十終丞相位其後李蔡嚴青瞿趙石慶公孫賀劉屈氂繼踵為丞相自蔡至慶丞相館舍丘虚而已至賀屈氂時壊以為馬廐車庫奴婢室, SBCK: ''}
