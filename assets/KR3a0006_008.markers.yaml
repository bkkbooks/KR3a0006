  - {type: variant, offset: 2080, length: 8, content: 胡胡西役大宛康居, SBCK: 不仁賢良曰匈奴處沙漠}
  - {type: variant, offset: 2080, length: 223, content: 胡胡西役大宛康居之屬南與群羗通先帝推讓斥奪廣饒之地建張掖以西隔絕羗胡瓜分其援是以西域之國皆內拒匈奴斷其右臂曳劍而走故募人田畜以廣用長城以南濱塞之郡馬牛放縱蓄積布野未覩其計之所過也夫以弱越而遂意強吳才地計眾非鈞也主思臣謀其往必矣文學曰吳越迫於江海三川循環之處於五湖之間地相迫壤相次其勢易以相禽也金鼓未聞旌旗未舒行陣未定兵以接矣師無輜重之費士無乏絕之勞此所謂食於廚倉而戰於門郊者也今匈奴牧於無窮之澤東西南北不可窮極雖輕車利馬不能得也況負重嬴兵以求之乎, WYG: 哉}
