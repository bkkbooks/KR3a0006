  - {type: variant, offset: 3191, length: 313, content: 富侔於國者亡故其位彌高而罪彌重祿滋厚而罪滋多夫行者先全己而後求名仕者先辟害而後求祿故香餌非不美也龜龍聞而深藏鸞鳳見而高逝者知其害身也夫為烏鵲魚鱉食香餌而後狂飛奔走遜頭屈遰無益於死今有司盜秉國法進不顧罪卒然有急然後車馳人趨無益於死所盜不足償於臧獲妻子奔亡無處所身在深牢莫知恤視方此之時何暇得以笑乎大夫曰文學高行矯然若不可卷盛節潔言皦然若不可涅然戍卒陳勝釋輓輅首為叛逆自立張楚素非有回由處士之行宰相列臣之位也奮於大澤不過旬月而齊魯儒墨縉紳之徒肆其長衣長衣容衣也負孔氏之禮器詩書委質為臣孔甲為涉博士卒俱死陳為天下大笑深藏高逝者固若是也文學曰周室衰禮義壞不能統理天下諸侯交爭相滅亡并為六國兵革不休民不得寧息秦以虎狼之心蠶食諸侯并吞戰國, WYG: ''}
