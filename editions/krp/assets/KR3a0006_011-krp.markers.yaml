  - {type: variant, offset: 12953, length: 317, content: 越絶書曰太宰者官號嚭者名也伯州之孫伯州為楚臣以過誅嚭以困奔於吴是時吴王闔廬伐楚悉召楚仇而近之嚭為人覽聞辯見目達耳通諸事無所不知因其時自納于吴言伐楚之利闔廬用之伐楚令子胥孫武與嚭将師入郢有大功還吴王以嚭為太宰位髙權盛専邦之枋未久闔廬卒嚭見夫差内無柱石之堅外無斷割之勢䛕心自納操獨斷之利夫差終以從焉而忠臣籥口不得一言嚭知徃而不知来夫差至死悔不早誅傳曰見清知濁見曲知直人君選士各象其徳夫差淺短以是與嚭専權伍胥為之惑是之謂也陳琳曰曩者彊秦弱主趙髙執柄専制朝權威福由已時人廹脅莫敢正言終有望夷之敗秦紀曰秦二世夢白虎嚙其左驂馬殺之問占夢涇水為祟二世乃齋望夷宫欲祠涇水使使責讓趙髙以盗事髙懼乃隂與其女壻咸陽令閻樂數二世二世自殺鄒陽曰偏聽生姦獨任成亂, SBCK: ''}
