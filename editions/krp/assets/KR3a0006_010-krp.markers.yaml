  - {type: variant, offset: 1692, length: 333, content: 周紀曰公劉雖在戎狄之間復修后稷之業務耕種行地宜自漆沮渡渭取財用行者有資居者有畜積民頼其慶百姓懐之多徙而保歸焉周道之興自此始故詩人歌樂思其徳道應篇曰大王亶父居邠翟人攻之事之以皮帛珠玉而弗受曰翟人之所求者地無以財物為也大王亶父曰與人之兄居而殺其弟與人之父處而殺其子弗為皆勉處矣為吾臣與翟人奚以異且吾聞之也不以其所養害其養杖䇿而去民相連而從之遂成國於岐山之下辨物篇曰成王時有三苗貫桑而生同為一秀大幾盈車民得而上之成王成王問周公此何也周公曰三苗同秀為一意天下其和而為一乎後三年則越裳氏重譯而朝曰道路悠逺山川阻深恐一使之不通故重三譯而來朝也周公曰徳澤不加則君子不饗其質政令不施則君子不臣其人譯曰吾受命於吾國之黄髪乆矣天之無烈風滛雨意中國有聖人耶有則盍朝之然後周公敬受其所以來矣, SBCK: ''}
