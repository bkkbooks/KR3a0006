  - {type: variant, offset: 18, length: 13520, content: 八大夫曰夫音扶懐枉而言正自託扵無欲而實不從此非士之情也昔李斯與包丘子俱事荀卿既而李斯入秦遂取三公據萬乘去聲以制海内功侔伊望謂伊尹太公望也名巨太山而包丘子不免扵甕牖蒿廬如潦嵗之鼃音蛙口非不衆也然卒死扵溝壑而已今内無以養外無以稱貧賤而好去聲義雖言好去聲義亦不足貴者也文學曰方李斯之相去聲秦也始皇任之人臣無二然而荀卿為之不食覩其罹不測之禍也李斯傳曰斯長男由為三川守諸男皆尚秦公主女悉嫁秦諸公子三川守李由吿歸咸陽置酒扵家百官長皆前為夀門庭車騎以千數李斯喟然而歎曰嗟乎吾聞之荀卿曰物禁太盛夫斯乃上蔡布衣閭巷之黔首上不知其駑下遂擢至此當今人臣之位無居臣上者可謂富貴極矣物極則衰吾未知所稅駕也申屠剛曰損益之際孔父攸歎持滿之戒老氏所慎蓋功葢天下者不安威震人主者不全包丘子飯麻蓬藜修道白屋之下樂音洛其志安之扵廣厦芻豢無赫赫之勢亦無戚戚之憂陸雲曰富貴者人之所欲也而古之逸民輕天下細萬物而欲專一丘之歡擅一壑之美豈不以身重扵宇宙而恬貴扵芬華哉天地不易其樂萬物不干其志然後可以妙有生之極固無疆之休夫音扶晉獻垂棘非不美也宫之竒見之而歎知荀息之圖之也知去聲伯富有三晉非不盛也然不知襄子之謀之也季孫之狐貉非不麗也然不知魯君之患之也人間訓曰晉獻公欲假道扵虞以伐虢遺虞垂棘之璧與屈産之乘虞公惑扵璧與馬而欲與之道宫之竒諫曰不可夫虞之與虢若車之有輪輪依扵車車亦依輪虞之與虢相恃為勢也若假之道虢朝亡而虞夕從之矣虞公弗聽遂假之道荀息伐虢遂克之還反伐虞又㧞之趙世家曰襄子立四年智伯與趙韓魏盡分其范中行故地智伯益驕請地韓魏韓魏與之請地趙趙不與以其圍鄭之辱智伯怒遂率韓魏攻趙趙襄子懼乃奔保晉陽三國攻晉陽嵗餘引汾灌其城城不浸者三版城中懸釜而炊易子而食襄子懼乃夜使張孟同私於韓魏韓魏與合謀三國反滅智伯共分其地魯世家曰哀公患三桓将欲因諸侯以刼之三桓亦患公作難故君臣多間泰族訓曰晉獻公之伐驪得其女非不善也然而史蘇歎之見其四世之被禍也吴王夫差破齊艾陵勝晉黄池非不捷也而子胥憂之見其必擒扵越也小白奔莒重耳奔曹非不困也而鮑叔咎犯隨而輔之知其可與至扵覇也勾踐棲扵㑹稽修政不殆謨慮不休知禍之為福也襄子再勝而有憂色畏福之為禍也故齊桓亡汶陽之田而覇智伯兼三晉之地而亡聖人見禍福扵重閉之内而慮患扵九拂之外者也故晋獻以寶馬釣虞虢襄子以城壊誘知去聲伯身禽通作擒扵趙而虞虢卒并扵晉以其務得不顧其後貪土地而利寶馬也申旗曰昔者六晉之時智氏最強滅破范中行又帥韓魏以圍趙襄子扵晉陽決晉水以灌晉陽城不沉者三版耳智伯出行水韓康子御魏桓子驂乘智伯曰始吾不知水之可亡人之國也乃今知之汾水利以灌安邑絳水利以灌平陽魏桓子肘韓康子康子履魏桓子躡其踵肘足接扵車上而智氏分矣身死國亡為天下笑繆稱訓曰無勇者非先懾也難至而失其守也貪婪者非先欲也見利而忘其害也虞公見垂棘之璧而不知虢禍之及己也孔子曰人無逺慮必有近憂今之在位者見利不虞害貪得不顧耻以利易身以財易死無仁義之徳而有富貴之祿若䧟坎穽音淨食扵縣音懸門之下此李斯之所以具五刑也傳曰李斯楚上蔡人也從荀卿學帝王之術入秦秦卒用其計二十餘年竟并天下以斯為丞相二世立以郎中趙髙之譖乃具斯五刑腰斬咸陽南方有鳥名鵷雛非竹實不食非醴泉不飲飛過太山太山之鴟俛音免啄腐鼠見鵷鶵而嚇音黒今公卿以其富貴笑儒者為之常行得無若太山鴟嚇音黒鵷鶵乎南華經曰恵子相梁荘子往見之或謂恵子曰荘子来欲代子相扵是恵子恐搜扵國中三日三夜莊子徃見之曰南方有鳥其名鵷鶵子知之乎夫鵷鶵發扵南海而飛扵北海非梧桐不棲非竹實不食非醴泉不飲扵是鴟得腐䑕鵷鶵過之仰而視之曰嚇今子欲以子之梁國而嚇我耶大夫曰學者所以坊古防字固辭禮者所以文鄙行去聲也故學以輔徳禮以文質言思可道行思可樂音洛惡言不出扵口邪行去聲不及扵已動作應禮從容中去聲道故禮以之孫音遜以出之是以終日言無口過終身行無寃尤今人主張官立朝音潮以治民疏爵分禄以褒賢而曰縣音懸門腐䑕何辭之鄙倍而悖扵所聞也人間訓曰虞氏梁之大富人也家充盈殷富金錢無量財貨無貲升髙樓臨大路設樂陳酒積博其上游侠相隨而行樓下博上者射朋張中反兩而笑飛鳶適墮其腐䑕而中㳺侠㳺侠相與言曰虞世審樂之日久矣而常有輕易人之志吾不敢侵犯而乃辱我以腐䑕如此不報無以立務扵天下請與公僇力一志悉率徒属而必以滅其家文學曰聖主設官以授任能者處之分祿以養賢䏻者受之說命曰官不及私昵惟其䏻爵罔及惡徳惟其賢義貴無髙義取無多故舜受堯之天下太公不避周之三公馮忌曰昔者堯見舜扵草茅之中席隴畝而庇桑隂隂移而天下傳尚書中候曰文王至田扵溪水畔吕尚釣扵崖王下拜曰切望公七年乃今見光景于斯尚立變名答曰望釣得玉璜刻曰姬受命吕佐旌徳合昌来提撰爾雒鈴報在齊尊賢篇曰堯舜相見不違桑隂文王舉太公不以日久故賢聖之接也不待久而親䏻者之相見也不待試而知矣苟非其人簞食音嗣豆羮猶為頼民也頼幸也故徳薄而位髙力小而任重鮮上聲不及矣易曰鼎折足覆公餗其形渥凶子曰徳薄而位尊智小而謀大力小而任重鮮不及矣說林訓曰短綆不可以汲深器小不可以盛大非其任也陸子曰任重於力才盡則困用廣其器應博則凶是以物勝權而衡殆形過鏡則照窮故明主程才以効業貞臣底力而辭豐夫音扶太山鴟啄腐鼠扵窮澤幽谷之中非有害於人也今之有司盗主財而食之扵刑法之旁不知機之是發又以嚇音黒人其患惡音烏得若太山之鴟乎大夫曰司馬子言天下穰穰皆為利徃貨殖傳曰天下熈熙皆為利来天下穰穰皆為利徃趙女不擇醜好鄭嫗音預不擇逺近商人不醜耻辱戎士不為死力士不在親事君不避其難去聲皆為利禄也儒墨内貪外矜徃来㳺說音稅栖栖然亦未為得也故尊榮者士之願也富貴者士之期也方李斯在荀卿之門闒音達茸音戎與之齊軫及其奮翼髙舉龍昇驥騖過九軼二翺翔萬仞鴻鵠驊騮且同侣况跛音避牂音戕牝羊也燕雀之属乎席天下之權席猶因也若人之坐扵席也御宇内之衆後車百乘去聲食祿萬鍾而拘儒布褐不完糟糠不飽非甘菽藿而卑廣厦亦不䏻得已雖欲嚇音黒人其何已乎傳曰夫鳳凰之初起也翾翾十歩之雀喔咿而笑之及其升扵髙一屈一伸展而雲間藩木之雀超然自知不及逺矣士褐衣緼著未嘗完也糲藿之食未嘗飽也世俗之士即以為羞耳及其出則安百議用則延民命世俗之士超然自知不及逺矣文學曰君子懐徳小人懐土賢士殉名貪夫死利駢拇篇曰小人則以身殉利士則以身殉名伯夷死名扵首陽之下盗跖死利扵東陵之上野語曰衆人重利廉士重名賢士尚志聖人貴精叢談曰衆人以毁形為耻君子以毁義為辱衆人重利㢘士重名李斯貪其所欲致其所惡音汙范睢曰欲而不知止失其所以欲有而不知足失其所以有孫叔敖早見扵未萌三去相去聲而不悔南華經曰肩吾問扵孫叔敖曰子三為令尹而不榮華三去之而無憂色吾始也疑子今視子之鼻間栩栩然子之用心獨奈何孫叔敖曰吾何以過人哉吾以其来不可却也其去不可止也吾以為得失之非我也而無憂色矣吾何以過人哉且不知其在彼乎其在我乎其在彼耶忘乎我在我耶忘乎彼方将躊躇方将四顧何暇至乎人貴人賤哉非樂音洛卑賤而惡音汙重祿也慮逺而避害謹也傅亮曰昔之君子同名爵扵香餌故傾危不及思憂患而豫防則針石無用洪流壅扵㳙㳙合拱挫扵纖蘖介焉是式色斯而舉悟髙鳥以風逝鑑醴酒而投紱夫豈敝著而後謀通患結而後思復哉故詩曰謹爾侯度用戒不虞言防萌也夫音扶郊祭之牛食養朞年衣去聲之文繡以入廟堂太宰執其鸞刀以啟其毛方此之時願任重而止峻坂不可得也南華經曰楚威王聞荘周賢使使厚幣迎之許以為相荘周笑謂楚使者曰千金重利卿相尊位也子獨不見郊祭之犧牛乎養食之數嵗衣以文繡以入太廟當是之時雖欲為孤豚豈可得乎商鞅困扵彭池吳起之伏王尸願被布褐而處窮鄙之蒿廬李斯相去聲秦席天下之勢志小萬乘去聲及其囚扵囹音零圄音語車制扵雲陽之市亦願負薪入鴻門行上蔡曲街徑不可得也商鞅傳曰商君既入秦走商邑與其徒属發邑兵北出擊鄭秦發兵攻商君殺之扵鄭黽池徐廣曰黽或作彭吳起傳曰諸侯患楚之強故楚之貴戚盡欲害吳起及悼王死宗室大臣作亂而攻吳起吳起走之王尸而伏之擊起之徒因射刺吳起并中悼王李斯傳曰二世二年具斯五刑論腰斬咸陽市斯出獄與其中子俱執顧謂其中子曰吾欲與若牽黄犬俱出上蔡東門逐狡兎豈可得哉蘇秦吳起以權勢自殺商鞅李斯以尊重自滅皆貪禄慕榮以沒其身從去聲車百乘去聲曽不足以載其禍也傳曰夫利為害夲而福為禍先惟不求利者為無害不求福者為無禍詩曰不忮不求何用不臧傅亮曰夫四道好謙三才忌滿祥萃虚室鬼瞰髙屋豐屋有蔀家之災鼎食無百年之貴然而狥欲厚生者忽而不戒知進忘退者曽莫之懲前車已摧後鑾不息乘危以庶安行險以徼幸扵是有顛墜覆亡之禍殘生夭命之釁其故何哉流溺忘反而以身輕扵物也褒賢第十九大夫曰伯夷以㢘饑尾生以信死古史考曰伯夷叔齊殷之末世孤竹君之二子也隠扵首陽山采薇而食之野有婦人謂之曰子義不食周粟此亦周之草木也扵是餓死雜篇曰尾生與女子期扵梁下女子不来水至不去抱梁柱而死由小器而虧大體匹夫匹婦之為諒也絰扵溝瀆而莫之知也何功名之有蘇秦張儀知去聲足以強國勇足以威敵一怒而諸侯懼安居而天下息萬乘去聲之主莫不屈體卑辭幣請交此所謂天下名士也拾遺記曰蘇秦張儀二人同志好學迭翦髪而鬻之以相養㦯傭力寫書非聖人之書不讀遇見墳典行途無所題記以墨書掌及股裏夜還而寫之析竹為簡二人毎假食扵路剥樹皮編以為書帙以盛天下良書嘗息大樹之下假息而寐有一先生問二子何勤苦也儀秦又問之子何國人答曰吾生扵歸谷亦云鬼谷鬼者歸也又云歸者谷名也乃謂其術教以千世出俗之辨即探胸内得二巻說書言輔時之事古史考云鬼谷子也鬼歸相近也論衡曰蘇秦張儀學縦横之術扵鬼谷先生先生曰䏻說我泣出則䏻分天皇之紀秦說鬼谷先生先生泣霑襟夫音扶智不足與謀而權不能舉當世民斯為下也今舉亡音無而為有虗而為盈布衣穿履深念徐行若有遺亡非立功成名之士而亦未免於世俗也文學曰蘇秦以從音縦顯扵趙張儀以衡音横任扵秦司馬貞曰山東地形從長蘇秦相六國合從親而擯秦闗西地形衡長張儀相六國連衡而事秦故蘓為合從張為連衡也方此之時非不尊貴也然知去聲士隨而憂之知夫音扶不以道進必不以道退不以義得者必不以義亡季孟之權三桓之富不可及也孔子為之曰微為人臣權均扵君富侔扵國者亡故其位彌髙而罪彌重禄滋厚而罪滋多文子曰身有榮華心有愁悴夫音扶行者先全已而後求名仕者先辟音避害而後求禄曽子曰飛鳥以山為卑而層巢其巔魚鱉以淵為淺而穿穴其中然所以得者餌也君子苟能無以利害身則辱安從至乎潘尼曰夫榮之所不能動者則辱之所不䏻加也利之所不能勸者則害之所不䏻嬰也譽之所不能益者則毁之所不䏻損也夫音扶香餌音貳非不美也龜龍聞而深藏鸞鳳見而髙逝者知其害身也夫音扶為烏鵲魚鱉食香餌音貳而後狂飛奔走遜身屈遰音逓圍繞也無益扵死吳越春秋曰髙飛之鳥死扵美食深淵之魚死扵芳餌太公家教曰網羅之鳥悔不髙飛吞餌之魚悔不忍饑今有司盗秉國法進不顧罪卒然有急然後車馳人趨無益扵死所盗不足償扵臧獲臧獲奴婢也妻子奔亡無處所身在深牢莫知恤視方此之時何暇得以笑乎蔡澤曰翠鵠犀象其處勢非不逺死也而所以死者惑扵餌也蘇秦智伯之智非不足以辟辱逺死也而所以死者惑扵貪利不止也大夫曰文學髙行去聲矯然若不可卷盛莭潔言皦音皎然若不可湼音乃結反詩云我心匪席不可卷也孔子云不曰白乎涅而不緇皦潔白貌然戍音絮卒陳勝釋輓音挽輅首為叛逆自立張楚陳勝世家曰秦二世二年陳勝自立為将軍吴廣為都尉攻大澤鄉乃入據陳數日號令召三老豪傑與皆来㑹計事三老豪傑皆曰将軍身披堅執銳伐無道誅暴秦復立楚國之社稷功宜為王陳勝乃立為王號為張楚當此時諸郡縣苦秦吏者皆刑其長吏殺之以應陳勝李竒曰欲張大其楚國故稱張楚也素非有囘由處士之行去聲顔囘仲由皆孔子弟子宰相去聲列臣之位也奮扵大澤不過旬月而齊魯儒墨薦紳之徒徐廣曰薦紳即縉紳也古字假借肆其長衣長衣官之也負孔氏之禮器詩書委質音至為臣質即贄也古字假借正義曰贄之為言至也自五玉三帛二生一死皆所以為贄以見其君者也古之欲仕者出其疆必載質而行故謂為臣者曰委贄也孔甲為涉博士陳勝字涉孔鮒字甲孔子之八世孫也為陳王涉博士死扵陳下卒俱死陳為天下大笑深蔵髙逝者固若是也文學曰周室衰禮義壊不能統理天下諸侯交爭相滅亡并為六國兵革不休民不得寧息秦以虎狼之心蠺食諸侯顔師古曰蠶食謂漸吞滅之如蠶之食葉也并吞戰國以為郡縣秦紀曰始皇二十六年分天下以為三十六郡郡置守尉監伐能矜功自以為過堯舜而羞與之同棄仁義而尚刑罰以為今時不師扵文而决扵武趙髙治獄扵内䝉恬治兵扵外百姓愁苦同心而患秦揚雄曰神明所祚兆民所托罔不云道徳仁義禮智獨秦崛起西戎邠荒岐雍之疆因襄文宣靈之僣跡立基孝公茂恵文奮昭荘至政破從擅衡并吞六國遂稱乎始皇盛從鞅儀韋斯之邪政馳騖起翦恬賁之用兵剗滅古文刮語燒書弛禮崇樂塗民耳目遂欲流唐漂虞滌殷蕩周㸐除仲尼之篇籍自勒功業改制度軌量咸稽之扵秦紀是以耆儒碩老抱其書而逺遜禮官博士卷其舌而不談来儀之鳥肉角之獸狙獷而不臻甘露嘉醴景曜浸潭之瑞潜大茀經霣巨狄鬼信之妖發神歇靈繹海水羣飛二世而亡何其劇與帝王之道兢兢乎不可離己陳王赫然奮爪牙為天下首事道雖凶而儒墨或干之者以為無王久矣道擁遏不得行自孔子以至扵兹而秦復重禁之故發憤扵陳王也司馬遷曰嗟乎夫周室衰而闗雎作幽厲微而禮樂壊諸侯恣行政由強國故孔子閔王路廢而邪道興扵是論次詩書修起禮樂適齊聞韶三月不知肉味自衛返魯然後樂正雅頌各得其所世以混濁莫䏻用是以仲尼干七十餘君無所遇曰苟有用我者期月而已矣西狩獲麟曰吾道窮矣故因史記作春秋以寓王法其辭微而指博後世學者多録焉自孔子卒後七十子之徒散㳺諸侯大者為師傅卿相小者友教士大夫㦯隠而不見故子路居衛子張居陳澹䑓子羽居楚子夏居西河子貢終于齊如田子方段干木吴起禽滑釐之属皆受業扵子夏之倫為王者師是時獨魏文侯好學後陵遲以至于始皇天下並争扵戰國儒術既絀焉然齊魯之門學者獨不廢也扵威宣之際孟子荀卿之列咸遵夫子之業而潤色之以學顯扵當世及至秦之季世焚詩書坑術士六藝從此缺焉陳涉之王也而魯諸儒持孔子之禮器徃歸陳王扵是孔甲為陳涉博士卒與涉俱死陳涉起匹夫驅瓦合適戊旬月以王楚不滿半嵗竟滅亡其事至微淺然而薦紳先生之徒負孔子禮器徃委質為臣者何也以秦焚其業積怨而發憤扵陳王也孔子曰如有用我者吾其為東周乎庶㡬成湯文武之功為百姓除殘去賊豈貪禄樂音洛位哉大夫曰文學言行去聲雖有伯夷之亷不及栁下恵之貞不過髙瞻下視潔言汚行去聲觴酒豆肉遷延相讓辭小取大雞㢘狼吞趙綰王臧之等以儒術擢為上卿而有奸利殘忍之心主父偃以口舌取大官竊權重欺紿音怠亦欺也宗室受諸侯之賂卒皆誅死儒林傳曰蘭陵王臧既受詩以事孝景帝為太子太傅免去今上初即位臧廼上書宿衛上累遷一嵗中為郎中令及代趙綰亦嘗受詩申公綰為御史大夫太皇竇太后好老子言不說儒術得趙綰王臧之過以讓上上盡下趙綰王臧吏後皆自殺主父偃傳曰偃上書闕下朝奏暮召入見拜偃為謁者一嵗中四遷偃大臣皆畏其口賂遺累千金元朔二年主父偃言齊王内淫佚行僻上拜偃為齊相至齊乃使人以王與姊奸事動王王以為終不得脫罪乃自殺有司以聞上大怒以為偃刼其王令自殺乃徴下吏治服受諸侯金實不刼王令自殺上欲勿誅是時公孫𢎞為御史大夫乃言曰齊王自殺無後國除為郡入漢主父偃夲首惡陛下不誅主父偃無以謝天下乃遂族主父偃東方朔自稱辯略消堅釋石當世無雙然省其私行去聲狂夫不忍為風俗通曰東方朔平原人也孝武皇帝時招延賢良文學之士待以不次之位故四方多上書言得失自衒鬻者扵是朔詣闕自陳十二失父長養兄嫂年十三學書十四擊劍十六誦詩十九學孫吴兵法又常服子路之言臣朔年二十三長九尺三寸目若懸珠齒若編貝勇若孟賁捷若慶忌亷如鮑叔信若尾生若此可以為天子大臣矣朔文辭不遜髙自稱譽由是見偉稍益親幸詔拜以為郎嘗在側侍中數召至前談語人主未嘗不說也時詔賜之食扵前飯已盡懐其餘肉持去衣盡汚數賜縑帛擔掲而去徒用所賜錢帛取少婦扵長安中好女率取婦一嵗所者即棄去更取婦所賜錢財盡索之扵女子人主左右諸郎半呼之狂人揚雄曰朔恢誕多端不名一行應諧似優不窮似智正諫似直穢徳似隠非夷齊是栁恵其滑稽之雄乎况無東方朔之口其餘無足觀者也文學曰志善者忘惡謹小者致大俎豆之間足以觀禮閨門之内足以論行去聲夫音扶服古之服誦古之道舍而為非者鮮上聲矣故君子時然後言義然後取不以道得之不居也人間訓曰忠臣事君也計功而受賞不為苟得積力而受官不貪爵􅀈其所䏻者受之勿辭也其所不䏻者與之勿喜也滿而不溢泰而不驕故袁盎親扵景帝秣馬不過一駟公孫𢎞即三公之位家不過十乗東方先生說聴言行扵武帝而不驕溢主父見困厄之日久此疾在位者不好去聲道而富且貴莫知䘏士也扵是取饒衍之餘以周窮士之急非為私家之業也主父偃傳曰主父偃者齊臨菑人也學長短縦横之術晚乃學易春秋百家言㳺齊諸生間莫䏻厚遇也齊諸儒生相與排擯不容扵齊家貧假貸無所得廼北逰燕趙中山皆莫䏻厚遇為客甚困孝武元光元年中以為諸侯莫足㳺者乃西入闗見衞将軍衛将軍數言上上不召資用乏留久諸公賓客多厭之乃上書下朝奏暮召詔拜偃為謁者一嵗中四遷偃大臣皆畏其口賂遺累千金人㦯說偃曰大横矣主父曰臣結髪㳺學四十餘年親不以為子昆弟不收賓客棄我我阨日久矣且丈夫生不五鼎食死即五鼎烹耳吾日暮途逺故倒行逆施之上拜主父為齊相至齊遍召昆弟賓客散五百金予之數之曰始吾貧時昆弟不我衣食賓客不我内門今吾相齊諸君迎我㦯千里吾與諸君絶矣毋復入偃之門當世囂囂非患儒之鷄㢘患在位者之虎飽嗌音益咽扵求覽無所孑遺耳嗌咽也爾雅曰江東呼咽曰嗌覽通作攬撮持也詩云周餘黎民靡有孑遺相刺第二十大夫曰古者經井田制㕓里丈夫治其田疇女子治其麻枲音徙無曠地無㳺人故非工商不得食扵利末非良農不得食扵收獲非執政不得食扵官爵今儒者釋耒耜而學不驗之語曠日彌久而無益扵理往来浮游不耕而食不蠶而衣巧為良民以奪農妨政此亦當世之所患也傳曰土之美者善養禾君之眀者善養士李尋曰馬不伏櫪不可以趨道士不素養不可以重國文學曰禹蹙洪水身親其勞澤行路宿過門不入當此之時簮墮不掇冠挂音掛不顧而暇耕乎修務訓曰禹沐浴霪雨梳櫛扶風决江疏河鑿龍門闢伊闕修彭蠡之防乘四載隨山刋木平治水土定千八百國聖人不貴尺璧而貴寸隂是故禹之趨時也履遺而弗取冠挂而弗顧孔子曰詩人疾之不能黙丘疾之不䏻伏是以東西南北七十說音稅而不用然後退而修王道作春秋垂之萬世之後天下折中焉豈與匹夫匹婦耕織同哉貴徳篇曰聖人見天下強凌弱衆暴寡幼孤羸露死傷係虜不忍其然是以孔子厯七十二君兾道之一行而得施其徳使民全扵生育烝庶安土萬物熈熈各樂其終卒不遇故睹麟而泣哀道不行徳澤不洽扵是退作春秋明素王之道以示後人思施其恵未嘗輟忘是以百王尊之志士法焉誦其文章傳今不絶徳及之也詩曰載馳載驅周爰咨謀此之謂也至公篇曰夫子行說七十諸侯無定處意欲使天下之民各得其所而道不行退而修春秋采毫毛之善貶纎介之惡人事浃王道備精和聖制上通扵天而麟至此天之知夫子也扵是喟然而歎曰天以至明為不可蔽乎日何為而食地以至安為不可危乎地何為而動天地而尚有動蔽是故聖賢說扵世而不得行其道故災異並作也夫子曰不怨天不尤人下學而上達知我者其天乎傳去聲曰君子當時不動而民無觀也故非君子莫治小人非小人無以養去聲君子當不耕織為匹夫匹婦也君子耕而不學則亂之道也曹劌曰君子務治小人務力繆稱訓曰教夲乎君子小人被其澤利夲乎小人君子享其功昔東户季子之世道路不拾遺耒耜餘粮宿諸畮首使君子小人各得其冝也大夫曰文學言治尚扵唐虞言義髙扵秋天有華言矣未見其實也昔魯穆公之時公儀為相去聲子思子原為之卿然北削扵齊以泗為境南畏楚人西賓秦國孟軻居梁兵折扵齊上将軍死而太子虜西敗扵秦地奪壤削亡河内河外夫音扶仲尼之門七十子之徒去父母捐室家負荷去聲而隨孔子不耕而學亂乃愈滋故玉屑滿箧不為有寶詩書負笈不為有道要在安國家利人民不苟文繁衆辭而已文學曰虞不用百里之謀而滅秦穆用之以至伯音覇焉夫音扶不用賢則亡而不削何可得乎尊賢篇曰齊景公問扵孔子曰秦穆公其國小處僻而覇何也對曰其國小而志大雖處僻而其政中其舉果其謀和其令不偷親舉五羖大夫扵係累之中與之語三日而授之政以此取之雖王可也覇則小矣李康曰百里奚在虞而虞亡在秦而秦覇非不才扵虞而才於秦也孟子適梁恵王問利答以仁義趨舍不合是以不用而去孟子傳曰孟子騶人也受業子思之門人道既通㳺事齊宣王宣王不能用適梁梁恵王不果所言則見以為迂逺而濶扵事情當是之時秦用商君富國強兵楚魏用吴起戰勝弱敵齊威王宣王用孫子田忌之徒而諸侯東面朝齊天下方務扵合從連衡以攻伐為賢而孟軻乃述唐虞三代之徳是以所如者不合退而與萬章之徒序詩書述仲尼之意作孟子七篇夫音扶懐寳而無語故有粟不食無益扵饑覩賢不用無益扵削紂之時内有微箕二子外有膠鬲棘子故其不能存言而不用諫而不聽雖賢惡音烏得有益扵治也大夫曰橘柚生扵江南而民皆甘之於口味同也好音生扵鄭衞而人皆樂音洛之扵耳聲同也越人夷吾戎人由余待譯而後通而並顯齊秦人之心扵善惡同也說林訓曰佳人不同體美人不同而而皆恱扵目棃橘棗栗不同味而皆調扵口故曽子倚山而吟山鳥下翔師曠鼔琴百獸率舞未有善而不合誠而不應者也說山訓曰曽子攀柩車引輴者為之止也老母行歌而動申喜精之至也瓠巴鼓瑟而㳺魚出聽伯牙鼓琴駟馬仰秣介子歌龍蛇而文君垂泣故玉在山而草木潤淵生珠而岸不枯淳于髠曰昔者瓠巴鼓瑟而潜魚出聴伯牙鼓琴而六馬仰秣魚馬猶知善之為善而况君人者也意未誠與平聲何故言而不見從行而不合也文學曰扁鵲不䏻治不受鍼藥之疾賢聖不能正不食諫諍之君傳曰人之将死惡聞酒肉之味邦之将亡惡聞忠臣之氣身死不為醫邦亡不為謀還自遺災也說林訓曰與死者同病難為良醫與亡國同道難與為謀雜言曰比干死紂而不䏻正其行子胥死吴而不䏻存其國二子者強諫而死適足明主之暴耳未始有益如秋毫之端也故桀有闗龍逄而亡夏殷有三仁而商滅莭士篇曰桀為酒池足以運舟糟丘足以望三里一鼓而牛飲者三千人闗龍逄進諫曰為人君身行禮義愛民節財故國安而身夀也今君用財若無盡用人若恐不䏻死不革天禍必降而誅必至矣君其革之立而不去朝桀因囚拘之君子聞之曰末之命矣夫論語隂嬉䜟曰庾子之旦金版刻書出地庭中曰臣族虐王禽宋均曰謂殺龍逄之後庾子旦庭中有此版異也龍同姓稱族王虐殺我必見禽也論語曰微子去之箕子為之奴比干諫而死孔子曰殷有三仁焉不患無由余夷吾之倫患無桓穆之聽耳傳曰昔戎将由余使秦秦穆公問以得失之要對曰古有國者未嘗不以恭儉也失國者未嘗不以驕奢也由余因論五帝三王之所以衰布衣之所以亡繆公然之扵是告内史王繆曰鄰國有聖人敵國之憂也由余聖人也将奈之何王繆曰夫戎王居僻陋之地未嘗見中國之聲色也君其遺之女樂以婬其志亂其政其臣下必疎因為由余請緩期使其君臣有間然後可圖繆公曰善乃使王繆以女樂二列遺戎王為由余請期戎王大恱許之扵是張酒聴樂日夜不休終嵗婬縦卒馬多死由余歸數諫不聴去之秦秦公子逆拜之為上卿遂并國十二辟地千里千金書曰管子束縛在魯桓公欲相鮑叔鮑叔曰吾君欲覇王則管夷吾在彼臣弗若也桓公曰夷吾寡人之賊也射我者也不可鮑叔曰夷吾為其君射人者也君若得而用之則彼亦将為君射人桓公不聽強相鮑叔鮑叔固辭讓弗相桓公果聽之扵是使人告魯曰管夷吾寡人之讐也願得之而親加手焉魯君許諾乃使吏鞹其拳膠其目盛之以䲭夷置之車中至齊境桓公使人以朝車迎之祓以灌火釁以犠猳焉生與之如國命有司除廟筵几而薦之曰自孤之聞夷吾之言也目益明耳益聰孤弗敢専故以吿于先君因顧而命管子曰夷吾佐余管子還走再拜稽首受令而出管子治齊國舉事有功桓公必先賞鮑叔曰使齊國得管子者鮑叔也桓公可謂知行賞矣楚莊王曰世不絶聖國不絶賢晉平公㳺扵河而樂曰安得賢士與之樂此也船人盍胥跪而對曰主君亦不好士耳夫珠出扵江海玉出扵崑山無足而至者葢由主君之好也士有足而不至者葢主君無好士之意耳無患乎無士也王符曰夫十步之澤必有香草十室之邑必有忠信是故亂殷有三仁小衞多君子然衰國危君繼踵不絶者豈時無忠信正直之士哉誠苦其道不得行耳仲長統曰物有不求未有無物之嵗也士有不用未有少士之世也是以孔子東西無所適遇屈原放逐扵楚國泰族訓曰孔子欲行王道東西南北七十說而無所遇離騷經序曰楚襄王用䜛言遷屈原扵江南而屈原放在山野復作九章援天引聖以自證明終不見省故曰直道而事人焉往而不三黜枉道而事人終非以此言而不見從行而不合者也燕恵王曰昔者栁下恵吏扵魯三黜而不去㦯謂之曰可以去栁下恵曰苟與人之異惡徃而不黜乎猶且黜乎寧扵故國爾栁下恵不以三黜自累故前業不忘不以去為心故逺近無議大夫曰歌者不期扵利聲而貴在中去聲莭論者不期扵麗辭而務在事實修務篇曰腹劍者期扵銛利而不期扵墨陽莫邪乘馬者期扵千里而不期扵驊騮綠耳鼓琴者期扵鳴亷修營而不期扵濫脅號鍾誦詩書者期扵通道畧物而不期扵洪範商頌善聲而不知轉未可謂能歌也善言而不知變未可謂䏻說也持䂓而非矩執凖而非繩通一孔曉一理而不知權衡以所不覩不信人若蟬之不知雪堅據古人以應當世猶辰参之錯膠柱而調瑟固而難合矣子産曰髙辛氏有二子長曰閼伯季曰實沈居曠林不相能也日操干戈以相征伐后帝不臧遷閼伯于商丘主辰遷實沈于大夏主参尚書大傳曰書之論事離離若参辰之錯行法言曰吾不睹参辰之相比也宋哀曰辰龍星也参虎星也我不見龍虎俱見也傳曰趙王以趙括為将代㢘頗藺相如曰王以名使括若膠柱而調瑟耳括徒䏻讀父書傳不知合變也孔子所以不用扵世而孟軻見賤扵諸侯也班固曰周道既衰壊扵幽厲禮樂征伐自諸侯出陵夷二百餘年而孔子興以聖徳遭季世知言之不用而道不行廼歎曰鳳鳥不至河不出圖吾已矣夫文王既沒文不在兹乎扵是應聘諸侯以答禮行誼入西周南至楚畏匡戹陳奸七十餘君無所遇趙岐曰孟子生有淑質夙䘮其父㓜被慈母三遷之教長師孔子之孫子思治儒術之道通五經尤長扵詩書周衰之末戰國縦横用兵爭強以相侵奪當世取士務上權謀以為上賢先王大道陵遲隳廢異端並起楊朱墨翟放蕩以干時惑衆者非一孟子憫悼堯舜湯文周孔之業将遂湮微正塗壅底仁義荒怠佞偽馳騁紅紫亂朱扵是則慕仲尼周流憂世遂以儒道干扵諸侯思濟斯民然由不肯枉尺直尋時君咸謂之迂濶扵事終莫能聽納其說文學曰日月之光而盲者不能見雷電之聲而聾人不能聞孟子曰夫震雷之起也破竹折木震驚天下而不能使聾者卒有聞日月之明徧照天下而不能使盲者卒有見泰族訓曰聾者耳形具而無能聞也盲者目形存而無能見也夫音扶為不知音者言若語扵瘖音因聾何特蟬之不知重平聲雪耶泰族訓曰夫言者所以通己扵人也聞者所以通人扵己也瘖者不言聾者不聞既瘖且聾人道不通故有瘖聾之病者雖破家求醫不顧其費豈獨形骸有瘖聾哉心志亦有之夫指之拘者莫不事申也心之塞也莫之務通也不眀扵類也齊俗訓曰其見不逺者不可與語大其智不閎者不足與論至繆稱訓曰察一曲者不可與言化審一時者不可與言大南華經曰井蛙不可以語扵海者拘扵隘也夏蟲不可以語扵寒者篤扵時也曲士不可以語扵道者束扵教也夫音扶以伊尹之知去聲太公之賢而不䏻開辭扵桀紂非說者非聴者過也張子曰桀罪諫者紂焚聖人以徴為羽非絃之罪也以甘為苦非味之過也是以荆和抱璞而泣血曰安得良工而剖之屈原行吟澤畔曰安得臯陶而察之雜事篇曰荆人卞和得玉璞而獻之荆厲王使玉尹相之曰石也王以和為謾而斷其左足厲王薨武王即位和復奉玉璞而獻之武王武王使玉尹相之曰石也又以為謾而㫁其右足武王薨共王即位和乃奉玉璞而哭扵荆山中三日三夜泣盡而繼之以血共王聞之使人問之曰天下刑之者衆矣子獨何哭之悲也對曰寳玉而名之曰石貞士而戮之以謾此臣之所以悲也共王曰惜矣吾先王之聴難剖石而易斬人之足夫死者不可生㫁者不可属何聴之殊也乃使人理其璞而得寶焉故名之曰和氏之璧故曰珠玉者人主之所貴也和雖獻寶而美未為玉尹用也進寳且若彼之難也况進賢人乎賢人與姦臣猶仇讐也扵庸君意不合夫欲使姦臣進其讐扵不合意之君其難萬倍扵和氏之璧又無㫁兩足之臣以推其難猶㧞山也千嵗一合若繼踵然後覇王之君興焉其賢而不用不可勝載故有道者之未戮也冝白玉之璞未獻耳陳元曰至音不合衆聽故伯牙絶絃至寳不同衆好故卞和泣血楚辭曰屈原既放㳺扵江潭行吟澤畔顔色憔悴形容枯槁漁父見而問之曰子非三閭大夫與何故至扵斯屈原曰舉世皆濁而我獨清衆人皆醉而我獨醒是以見放漁父曰聖人者不凝滯扵物而能與世推移舉世皆濁何不淈其泥而揚其波衆人皆醉何不餔其糟而歠其釃何故懐瑾握瑜而自令見放為屈原曰吾聞之新沐者必彈冠新浴者必振衣安能以身之察察受物之汶汶者乎寧赴湘流葬扵江魚之腹中又安䏻以皎皎之白而䝉世俗之塵埃乎漁父莞爾而笑鼓枻而去歌曰滄浪之水清兮可以濯吾纓滄浪之水濁兮可以濯吾足遂去不復與言夫音扶人君莫不欲求賢以自輔任能以治國然牽扵流說惑扵道諛是以賢聖蔽掩而䜛佞用事以此亡國破家而賢士饑扵巖穴也君道篇曰武王問太公曰舉賢而以危亡者何也太公曰舉賢而不用是有舉賢之名而不得真賢之實也武王曰其失安在太公曰其失在君好用小善而已不得真賢也武王曰好用小善者何如太公曰君好聴譽而不惡䜛也以非賢為賢以非善為善以非忠為忠以非信為信其君以譽為功以毁為罪有功者不賞有罪者不罰多黨者進少黨者退是以羣臣比周而蔽賢百吏羣黨而多姦忠臣以誹死扵無罪邪臣以譽賞扵無功其國見扵危亡武王曰善吾今日聞誹譽之情矣尊賢篇曰桓公問扵管仲曰吾欲使酒腐扵爵肉腐扵俎得無害扵覇乎管仲對曰此極非其貴者耳然亦無害扵覇也桓公曰何如而害覇管仲對曰不知賢害覇知而不用害覇用而不任害覇任而不信害覇信而復使小人参之害覇桓公曰善雜事篇曰闔廬用子胥以興夫差殺之而以亡昭王用樂毅以勝恵王逐之而敗此的的然若黒白秦不用叔孫通項王不用陳平韓信而皆滅漢用之而大興此未遂也夫失賢者其禍如彼用賢者其福如此人君莫不求賢以自輔然而國以亂亡者所謂賢者不賢也㦯使賢者為之與不肖者議之使智者圖之與愚者謀之不肖嫉賢愚者嫉智是賢者之所以隔蔽也所以千載不合者也劉峻曰薫蕕不同器梟鸞不接翼渾敦檮杌踵武扵雲臺之上仲容庭堅耕耘扵巖石之下昔趙髙無過人之志而居萬人之位是以傾覆秦國而禍殃其宗盡失其瑟何膠柱之調也雜事篇曰秦趙髙者生而隠宫始皇聞其強力通扵獄法拜申車府令使教胡亥决獄胡亥幸之髙有罪始皇使䝉毅治之毅當髙法當死始皇以髙敏扵事赦之復其官二世即位趙髙說以嚴法刻刑令有罪者相坐誅滅大臣及宗室更為法律務益刻深易曰負且乘致㓂至貞吝大傳曰負也者小人之事也乘也者君子之器也小人而乘君子之器盗思奪之矣上慢下暴盗思伐之矣泰族訓曰位髙而道大者從事大而道小者凶人間訓曰天下有三危少徳而多寵一危也才下而位髙二危也身無大功而有厚禄三危也大夫曰所謂文學髙第者智略能明先王之術而資質足以履行其道故居則為人師用則為世法今文學言治則稱堯舜道行去聲則稱孔墨授之政則不達懐古道而不能行言直而行之枉道是而情非衣冠有以殊扵鄉曲而實無以異扵凡人諸生所謂中直者遭時蒙率備數適然耳殆非眀舉所謂固未可與論治也文學曰天設三光以照記天子立公卿以眀治故曰公卿者四海之表儀神化之丹青也上有輔眀主之事下有遂聖化之事和隂陽調四時安衆庶育羣生使百姓輯睦無怨思之色四夷順徳無叛逆之憂此公卿之職而賢者之所務也泰族訓曰古者法設而不犯刑措而不用非可刑而不刑也百工維時庶績咸熈禮義修而任賢得也故舉天下之髙以為三公一國之髙以為九卿一縣之髙以為二十七大夫一鄉之髙以為八十一元士故知過萬人者謂之英千人者謂之俊百人者謂之豪十人者謂之傑英俊豪傑各以小大之材處其位得其宜由夲流末以重制輕上唱而民和上動而下隨四海之内一心同歸背貪鄙而向義理其扵化民也若風之揺草木無一而不靡今使愚教智使不肖臨賢雖嚴刑罰民弗從也小不能制大弱不能使強也若伊尹周召三公之才太顛閎夭九卿之人伊尹殷湯之臣周公旦召公奭周武王之臣太顛閎夭周文王之臣也文學不中去聲聖主之眀舉今之執政亦未能稱盛徳也大夫不說音恱作色不應也文學曰朝音潮無忠臣者政闇大夫無直士者位危主術訓曰古者天子聽朝公卿正諌博士誦詩瞽箴師誦庶人傳語史書其過宰徹其膳猶以為未足也故堯置敢諫之鼓舜立誹謗之木湯有司直之人武王立戒慎之軺過若豪釐而既已備之也失聖人之扵善也無小而不舉其扵過也無微而不改正諌篇曰晏子復扵景公曰朝居嚴乎公曰朝居嚴則曷害扵治國家哉晏子對曰朝居嚴則下無言下無言則上無聞矣下無言則謂之喑上無聞則謂之聾聾喑則非害治國家如何也且合菽粟之微以滿倉廪合疏縷之緯以成緯幕太山之髙非一石也累卑然後髙也夫治天下者非一士之言固有受而不用惡有距而不入者㢤韓嬰曰天子有爭臣七人雖無道不失其天下昔殷王紂殘賊百姓絶逆天道至斮朝涉刳孕婦脯鬼侯醢海伯然所以不亡者以其有箕子比干之故微子去之執囚為奴比干諫而死然後周加兵而誅絶之諸侯有爭臣五人雖無道不失其國吳王夫差為無道至驅一市之民以葬闔閭然所以不亡者有伍子胥之故胥以死越王勾踐欲伐之范蠡諫曰子胥之計策未忘扵吴王之腹心也子胥死後三年越乃䏻攻之大夫有爭臣三人雖無道不失其家季氏為無道僣天子舞八佾旅泰山以雍徹孔子曰是可忍也孰不可忍也然不亡者以冉有季路為宰臣也故曰有諤諤爭臣者其國昌有黙黙諛臣者其國亡詩曰不明爾徳時無背無側爾徳不明以無陪無卿言文王咨嗟痛殷商無輔弼諌諍之臣而亡天下矣晏子曰下無直辭上有隠君民多諱言君有驕行任座正言君之過文侯改言行去聲稱為賢君魏世家曰魏文侯與士大夫坐問曰寡人何如君也羣臣皆曰君仁君也次至任座曰君非仁君也曰子何以言之對曰君伐中山不以封君之弟而以封君之長子臣以此知君之非仁君文侯怒而逐任座座起而出次至翟璜文侯問寡人何如君也翟璜對曰君仁君也曰子何以言之對曰臣聞之其君仁者其臣直向任座之言直臣是以知君仁君文侯曰善復召任座入拜為上卿袁盎面刺綘侯之驕矜卒得其慶袁盎傳曰袁盎楚人也字絲父故為羣盗徙處安陵髙后時盎嘗為吕禄舍人及孝文帝即位盎兄噲任盎為中郎綘侯為丞相朝罷趨出意得甚上禮之恭嘗目送之盎進曰陛下以丞相何如人上曰社稷臣盎曰絳侯所謂功臣非社稷臣社稷臣主在與在主亡與亡方吕后時諸吕用事擅相王劉氏不絶如帶是時絳侯為太尉主兵柄弗能正吕后崩大臣相與共畔諸吕太尉主兵適㑹其成功所謂功臣非社稷臣丞相如有驕主色陛下謙讓臣主失禮竊為陛下不取也後朝上益莊丞相益畏已而絳侯望袁盎曰吾與而兄善今兒廷毁我盎遂不謝及絳侯免相之國國人上書告以為反徴繫請室宗室諸公莫敢為言唯袁盎明綘侯無罪綘侯得釋盎頗有力綘侯乃大與盎結交故觸死亡以干主之過者忠臣也犯嚴顔以匡公卿之失者直士也孫叔敖曰畏鞭箠之嚴而不敢諌其父非孝子也懼斧鉞之誅而不敢諌其君非忠臣也南華經曰孝子不諛其親忠臣不諂其君正諫篇曰易曰王臣蹇蹇匪躬之故人臣之所以蹇蹇為難而諫其君者非為身也将欲以匡君之過矯君之失也君有過失者危亡之萌也見君之過失而不諌是輕君之危亡也夫輕君之危亡者忠臣不忍為也鄙人不能巷言面違方今人主榖之榖禄也教令張而不施食禄多非其人以妨農商工市井之利未歸扵民民望不塞也且夫音扶帝王之道多墮壊而不修詩云濟濟多士意者誠任用其計非苟陳虚言而已鹽鐡論卷五, SBCK: ''}
