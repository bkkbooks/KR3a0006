  - {type: variant, offset: 1308, length: 2, content: 卒戍, SBCK: 能論事矣今執政患儒貧賤而多言亦憂執事冨貴而多患也大夫視文學悒悒而不言也丞相史曰夫辯國家之政事論執政之得失何不徐徐道理相喻何至切切如此乎大夫難罷鹽鐡者非有利也憂國家之用邉境之費也諸生誾誾争鹽鐡亦非爲巳也欲反之於古而輔成仁義也二者各有所宗時世異務又安可堅任古術而非今之理也且夫小雅非人必有以易之諸生莫有能安集國中懷臧之來遠方使邉境無冦虜之災租稅盡爲諸生除之何况鹽鐡均輸乎所以貴術儒者貴其處謙推譲以道盡人今辯訟愕愕然無赤賜之辭而見鄙倍之色非所聞也大夫言過而諸生亦如之諸生不􅀡謝大夫耳賢良文學皆離席曰鄙人固陋希渉大庭狂言多不稱以逆執事夫藥酒苦於口利於病忠言逆於耳而利於}
