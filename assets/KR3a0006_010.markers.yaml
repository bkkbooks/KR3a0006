  - {type: variant, offset: 9, length: 0, content: '', SBCK: 屬國以治胡則長城之内河山之外罕􅀍冦􅫱於是下詔令減戍漕寛徭役􅀄雖勞苦卒􅀗其慶文學曰周累世積德天下莫不願以爲君故不勞而王恩施由近及遠而蠻貊自至秦任戰勝以并天下小海内而貪胡越之地使蒙恬擊胡取河􅀯以爲新秦而亡其故秦築長城以守胡而亡其所守往者兵革亟動師旅數起長城之北旋車遺鏃相望及李廣利等輕計還馬足莫不寒心雖得渾耶不能更所亡此非社稷之至計也伐功第四}
