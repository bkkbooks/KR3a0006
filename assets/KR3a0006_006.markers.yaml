  - {type: variant, offset: 2558, length: 1, content: 壽, SBCK: 退而修王道作春秋垂之萬載之後天下折中焉豈}
  - {type: variant, offset: 2560, length: 0, content: '', SBCK: 匹夫匹婦耕織同哉傳曰君子當時不動而民無觀也故非君子莫治小人非小人無以養君子當不耕織爲匹夫匹婦也君子耕而不學則亂之道也大夫曰文學言治尚於唐虞言義高於秋}
  - {type: page-break, offset: 2560, content: '', id: KR3a0006_SBCK_005-2a}
  - {type: variant, offset: 2561, length: 0, content: '', SBCK: 有華言矣未見其實也昔魯穆公之時公儀爲相子思子原爲之卿然北削於齊以泗爲境􅀯畏楚人西賔秦國孟軻居梁兵折於齊上將軍死而太子虜西敗於秦}
  - {type: variant, offset: 2562, length: 2, content: 相保, SBCK: 奪壤削亡河内河外夫仲尼之門七十子之徒去父母捐室家􅀒荷而隨孔子不耕而學亂乃愈滋故玉屑滿篋不爲有寶誦詩書􅀒笈不爲有道要在安國家利人民不茍文繁衆辭而巳文學曰虞不用百里奚之謀而滅秦穆用之以至霸焉夫不用賢則亡而不削何可得乎孟子適梁惠王問利荅以仁義趣舎不合是以不用而去夫懷寳而無語故有粟不食無益}
  - {type: page-break, offset: 2562, content: '', id: KR3a0006_SBCK_005-2b}
  - {type: punctuation, offset: 2564, content: 。, id: KR3a0006_tls_006-bkkpn580}
  - {type: 'tls:seg', offset: 2564, content: '', id: KR3a0006_tls_006-38a.21}
  - {type: variant, offset: 2565, length: 0, content: '', SBCK: 饑覩賢不用無益於削紂之時内有微箕二子外有膠鬲􅁄子故其不能存夫言而不用諫而不聽雖賢惡得有益於治也大夫曰橘柚生於江􅀯而民皆甘之於口味同也好音生於鄭衞而人皆樂之於耳聲同也越人夷吾戎人由余待譯而後通而並顯齊秦人之心於善惡同也故曾子􅀝山而吟山鳥下翔師曠鼓琴百獸率舞未有善而不合誠而不應者也意未誠與何故言而不見從行而不合也文學曰扁鵲不能治不受鍼藥之疾賢聖不能正不食諫諍之君故桀有關龍逢而亡夏殷有三人而商滅不患無由余夷吾之倫患無􅁊穆之聽耳}
  - {type: page-break, offset: 2565, content: '', id: KR3a0006_SBCK_005-3a}
  - {type: variant, offset: 2566, length: 0, content: '', SBCK: 以孔子東西無所適遇屈原放逐於楚國故曰􅀡道而事人焉往而不三黜枉道而事人終非以此言而不見從行而不合者也大夫曰歌者不期於利聲而貴在中節論者不期於麗辭而務在事實善聲而不知轉未可爲能歌也善言而不知變未可謂能說也持䂓而非矩執凖而非䋲通一孔曉一理而不知權衡以所不覩不信人􅀂蟬之不知雪堅據古文以應當世猶辰參之錯膠柱而調瑟固而難合矣孔子所以不用於世而孟軻見賤於諸侯也文學曰日月之光而盲者不能見雷電之聲而聾人不能聞夫爲不知丘者言􅀂語於瘖聾何特蟬之不知重雪耶夫以伊尹之智太公之賢而不能開辭於桀紂非說也非聽者過也是以荆和抱璞而泣血曰安得良工而剖之屈原行吟澤畔曰安得臯陶而察之夫人君莫不欲求賢以自輔任能以治國然牽於流說惑於道䛕是以賢聖蔽掩而讒佞用事以此亡國破家而賢士饑於巖穴也昔趙高無過人之志而居萬人之位是以傾覆秦國而禍殃其宗盡失其瑟何膠柱之調也大夫曰所謂文學高第者智略能明先王之術而資質足以履行其道故居則爲人師用則爲世法今文學言治則稱尭舜道行則言孔墨授之政則不逹懷古道而不能行言􅀡而行之枉道是而情非衣冠有以殊於鄉曲而實無以異於凢人諸生所謂中􅀡者遭時蒙率備}
