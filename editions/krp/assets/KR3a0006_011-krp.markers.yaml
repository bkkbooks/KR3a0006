  - {type: variant, offset: 6350, length: 506, content: 覽㝠訓曰夫物類之相應𤣥妙深㣲知不能論辯不能解故東風至而酒湛溢蠶咡絲而商絃絶或感之也畫隨灰而月運闕鯨魚死而彗星出或動之也天文訓曰天道曰圓地道曰方方者主幽圓者主明明者吐氣者也是故火曰外景幽者含氣者也是故水曰内景吐氣者施含氣者化是故陽施隂化天地之偏氣怒者為風天地之含氣和者為雨隂陽相薄感而為雷激而為霆亂而為霧陽氣勝則散而為雨露隂氣勝則凝而為霜雪毛羽者飛行之類也故屬於陽介鱗者蟄伏之類也故屬於隂日者陽之主也是故春夏則羣獸除日至而麋鹿解月者隂之宗也是以月虚而魚腦減月死而蠃蠬膲火上蕁水下流故鳥飛而髙魚動而下物類相動本標相應故陽燧見日則燃而為火方諸見月則津而為水虎嘯而谷風至龍舉而景雲屬麒麟闘而日月食鯨魚死而彗星出蠶咡絲而商弦絶賁星墜而渤海决人主之情上通乎天故誅暴則多飄風枉法令則多蟲螟殺不辜則國赤地令不收則多淫雨四時者天之吏也日月者天之使也星辰者天之期也虹蜺彗星者天之忌也泰族訓曰精神感於内形氣動於天則景星見黄龍下祥鳳至醴泉出嘉榖生河不滿溢海不溶波故詩云懐柔百神及河喬岳逆天暴物則日月薄蝕五星失行四時干乖晝㝠宵明山崩川涸冬雷夏霜詩曰正月繁霜我心憂傷天之與人有以相通也故國危亡而天文變世惑亂而虹蜺見萬物有以相連精祲有以相蕩也, SBCK: ''}
