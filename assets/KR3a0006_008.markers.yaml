  - {type: variant, offset: 1021, length: 123, content: 臣也其所以從八極而朝海內者非以陸梁之地兵革之威也秦楚三晉號萬乘不務積德而務相侵搆兵爭強而卒俱亡雖以進壤廣地如食萴之充腸也欲其安存何可得也夫禮讓為國者若江海流彌久不竭其本美也苟為無本若蒿火暴怒而無繼其亡可立而待戰國是也周德衰然後列於諸侯至今不絕秦力, SBCK: 僞恐苗}
