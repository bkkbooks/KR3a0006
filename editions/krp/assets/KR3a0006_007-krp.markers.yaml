  - {type: variant, offset: 1238, length: 296, content: 去聲馬仲尼弟子傳曰孔子曰吾以言取人失之宰予以貌取人失之子羽道應訓曰秦繆公請伯樂曰子之年長矣子姓有可使求馬者乎對曰良馬者可以形容筋骨相也相天下之馬者若滅若失若亡其一若此馬者絶塵弭轍臣之子皆下材也可告以良馬而不可告以天下之馬臣有所與供儋纒采薪者九方堙此其於馬非臣之下也請見之穆公見之使之求馬三月而反報曰已得馬矣在於沙丘穆公曰何馬也對曰牡而黄使人往取之牝而驪穆公不説召伯樂而問之曰敗矣子之所使求者毛物牝牡弗能知又何馬之能知伯樂喟然太息曰一至此乎是乃其所以千萬臣而無數者也若堙之所觀者天機也得其精而忘其粗得其在内而忘其外見其所見而不見其所不見視其所視而遺其所不視若彼之所相者乃有貴乎馬者馬至而果千里之, SBCK: ''}
