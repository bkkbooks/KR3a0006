  - {type: variant, offset: 803, length: 2, content: 兔罝, WYG: 觀之則聖人之憂勞百姓甚矣故自天子以下至於庻人四胑不動思慮不用事治求贍者未之聞也班固曰太上有立徳其次有立功夫徳不得後身而特盛功不得背時而獨彰是以聖哲之治栖栖遑遑孔席不㬉墨突不黔大夫黙然丞相去聲史曰願聞㪚不足賢良曰宫室輿馬衣服噐械䘮祭食飲聲色玩好去聲人情}
