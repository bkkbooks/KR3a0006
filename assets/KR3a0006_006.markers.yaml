  - {type: variant, offset: 4182, length: 3, content: 薄郡國, WYG: 不及釜尚欣欣而喜者非以為多也樂其逮親也既沒之後吾嘗南逰於楚得尊官焉堂髙九尺車嘗百乗然猶北嚮而泣涕者非為賤也悲不逮吾親也故家貧親老不擇官而仕姚賈曰曽参孝其親天下願以為子子胥忠於君天下願以為臣劉向曰閔子騫兄弟二人母死其父更娶復有二子子騫為其父御車失轡父持其手衣甚單父則歸呼其後母児持其手衣甚厚温即謂其婦曰吾所以娶汝乃為吾子今汝欺我去無留子騫前曰母在一子單母去四子寒其父黙然故曰孝哉閔子騫一言其母還再言三子温周襄王富有天下而有不能事父母之累夏侯勝曰五辟之屬莫大不孝周襄王不能事母春秋曰天王出居于鄭}
