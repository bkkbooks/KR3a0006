body:
  text: 鹽鐡論卷四漢桓寛撰明張之象註園池第十三大夫曰諸侯以國為家其憂在内天子以八極為境其慮在外故宇小者用菲功巨者用大是以縣官開園池總山海致利以助貢賦修溝渠立諸農廣田收盛苑囿太僕水衡少府大農嵗課諸入田收之利池籞音御之假説文曰籞禁苑也顔師古曰池籞謂於水邊作小屋落障魚鳥籞者禁苑之遮衛也本御幸者假與貧民及北邊置任田官以澹古贍字諸用猶不足今欲罷之絶其原杜其流上下俱殫音丹困乏之應也雖好省事節用如之何其可也文學曰古者制地足以養民民足以承其上千乗去聲之國百里之地公侯伯子男各充其求澹古贍字其欲秦兼萬國之地有四海之富而意不澹古贍字非宇小而用菲者欲多而下不堪其求也賈山曰昔者周盖千八百國以九州之民養千八百國之君用民之力嵗不過三日什一而籍君有餘財民有餘力而頌聲作秦始皇以千八百國之民自養力罷不能勝其役財盡不能勝其求一君之身耳所以自養者馳騁弋獵之虞天下弗能供也語曰厨有腐肉國有饑民廐有肥馬路有餧音餒人孟子曰庖有肥肉廐有肥馬民有饑色野有餓莩此率獸而食人也獸相食且人惡之為民父母行政不免於率獸而食人惡在其為民父母也今狗馬之養蟲獸之食豈特腐肉秣馬之費哉無用之官不急之作服淫侈之變無功而衣食縣官者衆是以上不足而下困乏也今不減除其本而欲澹古瞻字其末設機利造田畜與百姓争薦草與商賈音古爭市利非所以明主徳而相去聲國家也夫音扶男耕女織天下之大業也故古者分地而處之利田畆而事之是以業無不食之地國無乏作之民今縣官之多張苑囿公田池澤公家有鄣假之名而利歸權家三輔廹近於山河三輔黄圖曰三輔者謂主爵中尉及左右内史漢武帝改曰京兆尹左馮翊右扶風共治長安城中是為三輔地狹人衆四方並臻粟米薪菜不能相澹古贍字公田轉假桑榆菜菓不植地力不盡愚以為非先帝之開苑囿池籞音御可賦歸之於民縣官租稅而已假稅殊名其實一也夫音扶如是匹夫之力盡於南畆匹婦之力盡於麻枲音徙田野辟音闢麻枲音徙治則上下俱衍何困乏之有矣公孫鞅曰女事盡於内男事盡於外則入多矣吕氏春秋曰丈夫不織而衣婦人不耕而食男女貿功以長生此聖人之制也故敬時愛日非老不休非疾不息非死不舎賈生曰民不足而可治者自古及今未之嘗聞古之人曰一夫不耕或受之飢一女不織或受之寒生之有時而用之無度則物力必屈今驅民而歸之農皆著于本使天下各食其力末議游食之民轉而緣南畆則畜積足而人樂其所矣大夫黙然視其丞相去聲御史輕重第十四御史進曰昔太公封於營丘辟音闢草萊而居焉地薄人少於是通利末之道極女紅音工之巧是以鄰國交於齊財畜貨殖世為彊國管仲相去聲桓公襲先君之業行輕重之變南服彊楚而伯音霸諸侯齊世家曰武王已平商而王天下封師尚父於齊營丘東就國萊侯來伐與之争營丘營丘邉萊萊人夷也㑹紂之亂而周初定未能集逺方是以與太公爭國太公至國修政因其俗簡其禮通商工之業便魚塩之利而人民多歸齊齊為大國桓公之時管仲為大夫修齊國政連五家之兵設輕重魚塩之利以贍貧窮禄賢能齊人皆説七年諸侯㑹桓公於甄而桓公於是始覇焉貨殖傳曰太公望封於營丘人民寡於是太公勸其女功極技巧通魚鹽則人物歸之繦至而輻凑故齊冠帯衣履天下海岱之間歛袵而往朝焉其後齊中衰管子修之設輕重九府則桓公以霸九合諸侯一匡天下而管子氏亦有三歸位在陪臣富於列國之君是以齊富強至於威宣也今大夫各修太公桓管之術總一鹽鐵通山川之利而萬物殖是以縣官用饒足民不困乏本末並利上下俱足此籌計之所致非獨耕桑農業也文學曰禮義者國之基也而權利者政之殘也孔子曰能以禮讓為國乎何有伊尹太公以百里興其君桓公以千乗去聲之齊而不能至於王其所務非也故功名隳音灰壞而道不濟當此之時諸侯莫能以德而爭於公私故以權相傾今天下合為一家利末惡音汚欲行淫巧惡音汚欲施大夫君以心計册通作䇿國用食貨志曰桑𢎞羊以心計顔師古曰心計不用籌算也構諸侯參以酒𣙜音較咸陽孔僅增以鹽鐵江充耕谷之等各以鋒銳言利末之事析秋毫可謂無間音諫矣非特管仲設九府徼音呌山海也平凖書曰東郭咸陽孔僅為大農丞領鹽鐵事而桑𢎞羊貴幸咸陽齊之大鬻鹽孔僅南陽大冶皆致産累千金故鄭當時進言之𢎞羊洛陽賈人之子以心計年十三侍中故三人言利事析秋毫矣食貨志曰太公為周立九府圜法太公退又行之于齊至管仲相桓公通輕重之權桓公遂用區區之齊合諸侯顯霸名顔師古曰周官太府玉府内府外府泉府天府職内職金職幣謂之九府皆掌財幣之官也然而國家衰耗城郭空虗故非崇仁義無以化民非力本農無以富邦也御史曰水有猵音篇獺音塔而池魚勞國有強禦而齊民消兵略訓曰畜池魚者必去猵獺養禽獸者必去豺狼故茂林之下無豐草大塊之間無美苗叢談曰髙山之巔無美木傷於多陽也大樹之下無美草傷於多隂也記曰髙山浚源不出草木松栢之地其土不肥夫音扶理國之道除穢鉏音鋤豪然後百姓均平各安其宇張廷尉論定律令明法以繩天下誅姦猾絶并兼之徒而強不凌弱衆不暴寡大夫各運籌册通作䇿逹國用籠天下鹽鐵諸利以排富商大賈音古買官贖罪損有餘補不足以齊黎民是以兵革東西征伐賦歛不増而用足夫音扶損益之事賢者所覩非衆人之所知也文學曰扁鵲撫息脉而知疾所由生陽氣盛則損乏而調隂寒氣盛則損乏而調陽是以氣脉調和而邪氣無所留矣扁鵲傳曰扁鵲過虢虢太子死扁鵲至虢宫門下問中庻子喜方者曰太子何病國中治穰過於衆事中庻子曰太子病血氣不時交錯而不得泄暴發於外則為中害精神不能止邪氣畜積而不得泄是以陽緩而隂急故暴蹷而死扁鵲曰其死何如時曰雞鳴至今曰收乎曰未也其死未能半日也言臣齊勃海越人也家在於鄭未嘗得望精光侍謁於前也聞太子不幸而死臣得生之中庶子曰先生得無誕之乎何以言太子可生也臣聞上古之時醫有俞跗治病不以湯液醴灑鑱石橋引案杌毒熨一撥見病之應因五臟之輸乃割皮解肌訣脉結筋搦髓腦揲荒𤓰幕前浣腸胃潄滌五藏練精易形先生之方能若是則太子可生也不能若是而欲生之曾不可以告咳嬰之兒終日扁鵲仰天歎曰夫子之為方也若以管窺天以郄視文越人之為方也不待切脉望色聼聲寫形言病之所在聞病之陽論得其隂聞病之隂論得其陽病應見於大表不出千里决者至衆不可曲止也子以吾言為不誠試入診太子當聞其耳鳴而鼻張循其兩股以至於隂當尚温也中庶子聞扁鵲言目眩然而不瞚舌撟然而不下乃以扁鵲言入報虢君虢君聞之大驚出見扁鵲於中闕曰竊聞髙義之日乆矣然未嘗得拜謁於前也先生過小國幸而舉之偏國寡臣幸甚有先生則活無先生則棄捐填溝壑長終而不得反言未卒因噓唏服臆䰟精泄横流涕長􅏰忽忽承䀹悲不能自止容貎變更扁鵲曰若太子病所謂尸蹷者也夫以陽入隂中動胃繵緣中經維絡别下於三焦膀胱是以陽脉下遂隂脉上爭㑹氣閉而不通隂上而陽内行下内鼔而不起上外絶而不為使上有絶陽之絡下有破隂之紐破隂絶陽之色已廢脉亂故形静如死狀太子未死也夫以陽入隂支蘭藏者生以隂入陽支蘭藏者死凡此數事皆五藏蹷中之時暴作也良工取之拙者疑殆扁鵲乃使弟子子陽厲鍼砥石以取外三陽五㑹有間太子蘓乃使子豹為五分之熨以八减之齊和煑之以更熨兩脇下太子起坐更適隂陽但服湯二旬而復故夫音扶拙醫不知脉理之腠血氣之分妄刺而無益於疾傷肌膚而已矣今欲損有餘補不足富者益富貧者益貧矣嚴法任刑欲以禁暴止姦而姦猶不止意者非扁鵲之用鍼音箴石故衆人未得其職也王符曰凡療病者必知脉之虗實氣之所結然後為之方故疾可愈而壽可長也為國者必先知民之所苦禍之所起然後為之禁故姦可塞而國可安也御史曰周之建國也盖千八百諸侯其後強吞弱大兼小并為六國六國連兵結難去聲數百年内拒敵國外攘四夷由此觀之兵甲不休戰伐不乏軍旅外奉倉庫内實今以天下之富海内之財百郡之貢非特齊楚之畜趙魏之庫也計委量入雖急用之宜無乏絶之時顧大農等以術體躬稼則后稷之烈周紀曰周后稷名棄帝嚳之子也棄為兒時屹如巨人之志其游戲好種樹麻菽麻菽美遂好耕農相地之宜宜榖者稼穡焉民皆法則之帝堯聞之舉棄為農師天下得其利有功帝舜曰棄黎民始饑爾后稷播時百榖封棄於邰號曰后稷軍四出而用不繼非天之財少也用鍼音箴石調均有無補不足亦非也上大夫君與治粟都尉管領大農事炙刺稽滯開利百脉是以萬物流通而縣官富實當此之時四方征暴亂車甲之費克獲之賞皆澹古贍字大司農此皆扁鵲之力而鹽鐵之福也文學曰邉郡山居谷處隂陽不和寒凍裂地衝風飄鹵音魯沙石凝積地勢無所宜地形訓曰北方曰大𡨕曰寒澤北方有不釋之氷中國天地之中隂陽之際也地形訓曰中央四逹風氣之所通雨露之所㑹也日月經其南斗極出其北含衆和之氣産育庶物今去而侵邉多斥不毛寒苦之地是猶棄江臯河濱而田於嶺坂音反菹音疽澤也轉倉廩之委飛府庫之財以給邉民中國困於繇音遥役邊民苦於戍音絮禦力耕不便種糴無桑麻之利仰中國絲絮而後衣去聲之皮裘蒙毛曾不足盖形夏不失複音復重衣也冬不離去聲窟苦骨切土室也父子夫婦内藏於專室土圜之中中外空虗扁鵲何力而鹽鐵何福也未通第十五御史曰内郡人衆水泉薦草不能相澹古贍字地勢温濕不宜牛馬民蹠音隻耒而耕負擔而行勞罷音疲而寡功是以百姓貧苦而衣食不足老弱負輅於路而列卿大夫或乗牛車孝武皇帝平百越以為囿圃却羌胡以為苑囿是以珍怪異物充於後宮騊音陶駼音余駃音决騠音蹄實於外廐騊駼馬類也生北海駃騠俊馬也生七日而超其母匹夫莫不乗堅良而民間厭橘柚由此觀之邊郡之利亦饒矣而曰何福之有未通於計也文學曰禹平水土定九州四方各以土地所生貢獻足以充宫室供人主之欲膏壤萬里山川之利足以富百姓不待蠻貊之地逺方之物而用足五帝紀曰禹披九山通九澤决九河定九州各以其職來貢不失厥宜方五千里至於荒服食貨志曰禹平洪水定九州制土田各因所生逺近賦入貢棐楙遷有無萬國作乂徃者未伐胡越之時繇音遥賦省而民富足温衣飽食藏新食陳布帛充用牛馬成羣農夫以馬耕載而民莫不騎乗當此之時却走馬以糞老子德經曰天下有道却走馬以糞韓非子曰凡馬之所以大用者外供甲兵而内給淫奢也今有道之君外希用甲兵而内禁淫奢上不事馬於戰鬪逐北而民不以馬逺滛力唯田疇積力於田疇必且糞灌故曰天下有道却走馬以糞也許慎曰却止也糞田也止馬不以走但以田行至德之效也或曰國君無道則天下多事戎馬生於郊原國君有道則天下無事止走馬以糞田也其後師旅數音朔發戎馬不足牸音字牝入陣牸牝牛也凡獸育子曰牸牝畜母也故駒犢生於戰地六畜不育於家五榖不殖於野民不足於糟糠何橘柚之所厭傳去聲曰大軍之後累世不復老子曰師之所處荆棘生焉大軍之後必有凶年方今郡國田野有壟而不墾城郭有宇而不實邉郡何饒之有乎御史曰古者制田百歩為畆民井田而耕什而籍一義先公而後已民臣之職也詩曰雨我公田遂及我私孟子曰方里而井井九百畆其中為公田八家皆私百畆同養公田公事畢然後敢治私事所以别野人也先帝哀憐百姓之愁苦衣食不足制田二百四十歩而一畆率三十而稅一惰民不務田作饑寒及已固其理也其不耕而欲播不種而欲穫鹽鐵又何過乎文學曰什一而籍民之力也豐耗美惡與民共之民饉已不獨衍民衍已不獨饉故曰什一者天下之中正也田雖三十而以頃畆出稅樂歳粒米狼戾而寡取之凶年饑饉而必求足加之以口賦更繇音遥之役率一人之作中分其功農夫悉其所得或假貸而益之是以百姓疾耕力作而饑寒遂及已也築城者先厚其基而求其髙畜民者先厚其業而後求其澹古贍字老子曰貴必以賤為本髙必以下為基泰族訓曰城有基木有根根深即本固基美則上寧不益其厚而張其廣者毁不廣其基而增其髙者覆潘氏曰髙以下為基民以食為天正其末者端其本善其後者慎其先夫九土之宜弗任四人之務不一野有菜蔬之色民靡代耕之秩無儲畜以虞災徒望歳以自必三季之衰皆此物也論語曰百姓足君孰與不足乎御史曰古者諸侯爭強戰國並起甲兵不休民曠於田疇什一而藉不違其職今賴陛下神靈甲兵不動乆矣然則民不齊出於南畆以口率被墾田而不足空倉廩而賑貧乏寖益日甚是以愈惰而仰利縣官也食貨志曰商賈以幣之變多積貨逐利於是公卿言郡國頗被災害貧民無産業者募徙廣饒之地陛下損膳省用出禁錢以振元元寛貸而民不齊出南畆商賈滋衆貧者畜積無有皆仰縣官異時筭軺車賈人之緡錢皆有差請筭如故為斯君者亦病矣反以身勞民民猶背恩棄義而逺流亡避匿上公之事民相倣傚田地日蕪租賦不入抵扞縣官君雖欲足誰與之足乎文學曰樹木數音朔徙則􅖖音委蟲獸徙居則壊故代馬依北風飛鳥翔故巢莫不哀其生原道訓曰今夫徙樹者失其隂陽之性則莫不枯槁故橘樹之江北則化而為枳鴝鵒不過濟貈渡汶而死形性不易勢居不可移也伍子胥曰胡馬望北風而立越燕向日而熈誰不愛其所近悲其所思者乎韓嬰曰詩云代馬依北風飛鳥棲故巢皆不忘本之謂也由此觀之民非利避上公之事而樂流亡也徃者軍陣數音朔起用度不足以貲音資徵賦常取給見民田家又被其勞故不齊出於南畆也大抵逋流皆在大家吏正畏憚不敢督責刻急細民細民不堪流亡逺去中家為之色出後亡者為先亡者服事録民數創音瘡於惡吏故相去尤甚而就少愈多傳去聲曰政寛者民死之政急者父子離韓嬰曰治國者譬若乎張琴然大絃急則小絃絶矣故急轡䘖者非千里之御也是以田地日荒城郭空虚夫音扶牧民之道除其所疾適其所安安而不擾使而不勞是以百姓勸業而樂公賦若此則君無賑於民民無利於上上下交議而頌聲作故取而民不厭役而民不苦靈臺之詩非或使之民自為之若斯則君何不足之有乎賈生曰文王志之所在意之所欲百姓不愛其死不憚其勞從之如集詩曰經始靈臺庻民攻之不日成之經始勿亟庶民子來文王有志為臺近規之民聞之者麏裹而至問業而作之日日以衆命其臺曰靈臺命其囿曰靈囿謂其沼曰靈沼愛敬之至也詩曰王在靈囿麀鹿攸伏麀鹿濯濯白鳥翯翯王在靈沼於仭魚躍文王之澤下被禽獸洽于魚鱉咸若攸樂而况士民乎修文篇曰積恩為愛積愛為仁積仁為靈靈臺之所以為靈者積仁也神靈著天地之本而為萬物之始也是故文王始接民以仁而天下莫不仁焉文徳之至也御史曰古者十五入太學與去聲小役二十冠去聲而成人與去聲戎事五十以上血脉溢剛曰艾壯詩曰方叔元老克壯其猶故商師若荼周師若烏荼苦茶也烏燕烏也白項而羣飛者也鄒陽曰秦信左右而殺周用烏集而王今陛下哀憐百姓寛力役之政二十三始賦五十六而免所以輔耆壯而息老艾也丁者治其田里老者修其塘園儉力趨時無饑寒之患不治其家而訟縣官亦悖矣文學曰十九年已下為殤音傷未成人也二十而冠去聲三十而娶可以從戎事五十已上曰艾老杖於鄉不從力役所以扶不足而息髙年也曲禮曰人生十年曰幼學二十曰弱冠三十曰壯有室四十曰強而仕五十曰艾服官政七十曰老而傳八十九十曰耄七年曰悼悼與耄雖有罪不加刑百年曰期頥王制曰五十不從力政六十不與服戎七十不與賓客之事八十齊䘮之事弗及也鄉飲酒之禮耆老異饌所以優耆耄而明養老也鄉飲酒義曰鄉飲酒之禮六十者坐五十者立侍以聼政役所以明尊長也六十者三豆七十者四豆八十者五豆九十者六豆所以明養老也民知尊長養老而後乃能入孝弟民入孝弟出尊長養老而後成教成教而後國可安也君子之所謂孝者非家至而日見之也合諸鄉射教之鄉飲酒之禮而孝弟之行立矣故老者非肉不飽非帛不煖非杖不行王制曰五十異粻六十宿肉七十貳膳八十常珍九十飲食不離寝膳飲從於遊可也五十始衰六十非肉不飽七十非帛不煖八十非人不煖九十雖得人不煖矣五十杖於家六十杖於鄉七十杖於國八十杖於朝九十者天子欲有問焉則就其室以珍從今五十已上至六十與子孫服輓輸並給徭音遥役非養老之意也古有大䘮者君三年不呼其門通其孝道遂其哀戚之心也君子之所重而自盡者其惟親之䘮乎王制曰八十者一子不從政九十者其家不從政廢疾非人不養者一人不從政父母之䘮三年不從政齊衰大功之䘮三月不從政將徙於諸侯三月不從政自諸侯來徙家期不從政陳忠曰夫父母於子同氣異息一體而分三年乃免於懐抱先聖縁人情而著其節制服二十五月是以春秋臣有大䘮君三年不呼其門曾子曰吾聞諸夫子人未有自致者也必也親䘮乎周公抱成王聼天下恩塞海内澤被四表矧惟南面含仁保德靡不得其所春秋元命苞曰文王造之而未遂武王遂之而未成周公旦抱少主而成之故曰成王尸子曰昔者武王崩成王幼周公旦踐東宫履乗石假為天子十年蒙恬曰昔周成王初立未離襁褓周公旦負王以朝卒定天下越絶書曰周公以盛德武王封周公使傅相成王成王少周公臣事之當是之時賞賜不加於無功刑罰不加於無罪天下家給人足米麥茂美使人以時說之以禮上順天地澤及夷狄君道篇曰周公踐天子之位布德施恵逺而逾明十三牧方三人出舉逺方之民有饑寒而不得衣食者有獄訟而失職者有賢才而不舉者以入告乎天子天子於其君之朝也揖而進之曰意朕之政教有不得者歟何其所臨之民有飢寒不得衣食者有獄訟而失職者有賢才而不舉者也其君歸也乃召其國大夫告周天子之言百姓聞之皆喜曰此誠天子也何居之深逺而見我之明也豈可欺哉故牧者所以辟四門明四目逹四聪也是以近者親之逺者安之詩曰柔逺能邇以定我王此之謂矣詩云夙夜基命宥宻陛下富於春秋委任大臣公卿輔政政教未均故庶人議也御史黙不答也地廣第十六大夫曰王者包含并覆普愛無私不為近重施不為逺遺恩今俱是民也俱是臣也安危勞佚不齊獨不當調耶不念彼而獨計此斯亦好議矣緣邉之民處寒苦之地距通作拒強胡之難去聲烽燧一動有沒身之累故邉民百戰而中國恬臥者以邊郡為蔽扞也詩云莫非王事而我獨勞刺不均也是以聖王懐四方獨苦興師推却胡越逺冦國安災散中國肥饒之餘以調邊境邊境強則中國安中國安則晏然無事何求而不得也文學曰古者天子之立於天下之中縣内方不過千里諸侯列國不及不食之地禹貢至於五千里民各供其君諸侯各保其國是以百姓均調而繇音遥役不勞也今推胡越數千里道路廻逺士卒勞罷音疲故邉民有刎頸之禍而中國有死亡之患此百姓所以囂囂而不黙也囂囂喧也又衆多貎詩云䜛口囂囂夫音扶治國之道由中及外自近者始近者親附然後來逺百姓内足然後䘏外故羣臣論或欲田輪臺明主不許以為先救近務及時本業也故下詔曰當今之務在於禁苛暴止擅賦力本農公卿宜承意請减除不任以佐百姓之急今中國弊落不憂務在邉境意者地廣而不耕多種而不耨費力而無功漢紀曰征和四年捜粟都尉桑𢎞羊與御史大夫奏言故輪臺以東皆故國處有灌溉田其旁小國少錐刀貴黄鐵綿繒可以易榖臣愚以為可遣屯田詣輪臺置校尉二人通利溝渠田一歳有積穀募民敢徙者詣田所就畜積為産業稍稍築亭連城而西以威西國輔烏孫為便事上上乃下詔深陳既往之悔曰前有司則欲益民賦以助邉用是困老弱孤獨也今又請田輪臺曩者朕之不明興師逺攻遣貳師將軍古者出師卿大夫與謀参以蓍龜不吉不行乃者遍召羣臣又筮之卦得大過爻在九五曰匈奴困敗方士占星氣太卜蓍龜皆為吉匈奴必破時不可失卜諸將貳師最吉朕親發貳師詔之必無深入今計謀卦兆皆反謬貳師軍敗士卒離散略盡悲痛常在朕心今有司請逺田輪臺欲起亭燧是唯益擾天下非所以憂民也朕不忍聞當今務在禁苛暴止擅賦務本勸農無乏武備而已由是不復出軍封丞相為富民侯而勸耕農自是田多墾闢而兵革休息善謀篇曰孝武皇帝自將師伏兵於馬邑誘致單于單于既入塞道覺之奔走而去其後交兵接刄結怨連禍相攻撃十年兵凋民勞百姓空虗道殣相望槥車相屬冦盗滿山天下搖動孝武皇帝後悔之御史大夫桑𢎞羊請佃輪臺詔卻曰當今之務務在禁暴止擅賦今乃逺西佃非所以慰民也朕不忍聞封丞相號曰富民侯遂不復言兵事國家以寧繼嗣以定從韓安國之本謀也詩云無田甫田維莠驕驕其斯之謂歟大夫曰湯武之伐非好去聲用兵也越絶書曰殷湯遭夏桀無道殘賊天下於是湯用伊尹行至聖之心見桀無道虐行故伐夏放桀而王道興躍革亂補弊移風易俗改制作新海内畢貢天下承風湯以文聖此之謂也文王死九年天下八百諸侯皆一旦㑹於孟津之上不言同辭不呼自來盡知武王忠信欲從武王與之伐紂當是時比干箕子㣲子尚在武王賢之未敢伐也還諸侯歸二年紂賊比干囚箕子㣲子去之刳姙婦殘朝渉武王見賢臣已亡乃朝天下興師伐紂殺之武王未下車封比干之墓發太倉之粟以贍天下封㣲子於宋此武王以禮信也周宣王辟音闢國千里非貪侵也詩序曰厲王暴虐周人逐之玁狁内侵逼近京邑宣王承其難命尹吉甫伐之有功而歸嚴尤曰當周宣王時玁狁内侵命將征之盡境而還其視匈奴之侵譬猶蟁蝱之螫驅之而已故天下稱明所以除冦賊而安百姓也故無功之師君子不行無用之地聖王不貪先帝舉湯武之師定三垂之難去聲一面而制敵匈奴遁逃因河山以為防故去沙石鹹音咸鹵音魯不食之地故割什音斗辟音僻之縣棄造陽之地以與胡省曲塞音賽據河險守要害以寛繇音遥役保士民匈奴傳曰漢遂取河南地築朔方復繕故秦時蒙恬所為塞因河為固漢亦棄上谷之什辟縣造陽地以與胡是歳漢之元朔二年也孟康曰縣斗辟曲近胡顔師古曰斗絶也縣之斗曲入匈奴界者其中造陽地也由此觀之聖主用心非務廣地以勞衆而已矣文學曰秦之用兵可謂極矣蒙恬斥境可謂逺矣人間訓曰秦皇挾錄圖見其傳曰亡秦者胡也因發卒五十萬使蒙公楊翁將築修城西屬流沙北撃遼水東結朝鮮中國内郡輓車而餉之又利越之犀角象齒翡翠珠璣乃使尉屠雎發卒五十萬為五軍一軍塞鐔城之嶺一軍守九疑之塞一軍處番禺之都一軍守南野之界一軍結餘千之水三年不解甲弛弩使監禄無以轉餉又以卒鑿渠而通糧道以與越人戰殺西嘔君譯吁宋而越人皆入叢薄中與禽獸處莫肯為秦虜相置桀駿以為將而夜攻秦人大破之殺尉屠雎伏尸流血數十萬乃發適戍以備之當此之時男子不得修農畆婦人不得剡麻考縷羸弱服格於道大夫箕㑹於衢病者不得養死者不得塟於是陳勝起於大澤奮臂大呼天下席卷而至於戲劉項興義兵隨而定若折槁振落遂失天下禍在備胡而利越也今踰䝉恬之塞音賽立郡縣冦虜之地地彌逺而民滋勞朔方以西長安以北新郡之功外城之費不可勝音升計非徒是也司馬唐蒙鑿西南夷之塗巴蜀弊於卭音笻筰音作横海征南夷樓舩戍東越荆楚罷音疲於甌駱左將伐朝鮮開臨洮音姚燕齊困於穢貉張騫通殊逺納無用府庫之藏流於外國非特什音斗辟音僻之費造陽之役也漢紀曰南夷道君長有十數夜郎最大其西靡漠之屬以十數靡漠最大自靡漠以北君長以十數卭都最大自越嶲以東北君長以十數莋都最大自莋都以東北君長以十數冉駹最大自冉駹以東北君長以十數白馬景大此皆巴蜀外西南夷也秦時嘗通伍尺之道於此諸國頗置長吏漢興皆棄之及大行王恢之救越也使鄱陽令唐䝉使於南越越食蒙以枸醬蒙問所從來曰從西北牂牁江江漢廣數千里出番禺城下䝉因上書曰南越地東西皆萬餘里名為外臣實一州土今以長沙豫章往來水道絶難竊聞夜郎精兵可數十萬若從夜郎浮舩下牂牁出其不意此制越一竒也可通夜郎道為置吏上許之乃拜蒙中郎將發巴蜀兵千餘人奉幣帛見夜郎侯喻以徳意為置長吏旁小邑皆貪漢贈帛以為道逺漢中不能有也故皆且聼命司馬相如亦言西南夷卭筰可作都上恱之以相如為中郎將往喻意皆聼命後西南夷數反發兵興徭役費用甚多相如知其難通業已逹之乃假巴蜀之諭以諷上且以宣其使㫖於百姓博望侯張騫者漢中人也初為郎應募使月氏時匈奴殺月氏王遂西徙故漢欲與月氏擊匈奴騫行為匈奴所得留騫十餘歳與妻有子然騫常持節不失後亡到月氏月氏未有報匈奴意騫留一歳餘乃還並南山從羌中来歸復為匈奴所得留之歳餘㑹單于死國内亂騫乃與其胡妻來歸漢拜為大中大夫初騫行百餘人惟騫與唐邑氏奴二人得還騫身所到大宛大月支大夏康居而傳聞其旁國名具為上言之西域本三十六國後分為五十四國皆在匈奴之西本志曰孝武之世圖利制匈奴患其兼從西國結黨南羌乃表河曲列四郡開玉門闗通西域以斷匈奴之右臂隔絶南羌月氏單于失援由是逺遁漠北而漠南無王庭遭值文景𤣥黙養民五世天下殷富財力有餘士馬強盛故能積羣貨覩犀象瑇瑁則開犍為朱崖七郡感䈮醬竹杖則開牂牁越嶲聞天馬葡萄則通大宛安息自是之後明珠文貝犀象翠羽之珍盈於後宫氍毺琪瑠葡萄龍文魚目汗血名馬充於黄門巨象獅兕猛獸大雀之羣實於外囿殊方異物四面而至由此觀之非人主用心好事之臣為縣官計過也大夫曰挾管仲之知去聲者非為厮音斯役之使去聲也懐陶朱之慮者不居貧困之處韓非子曰管仲相齊曰臣貴矣然而臣貧桓公曰使子有三歸之家曰臣富矣然而臣卑桓公使立於髙國之上曰臣尊矣然而臣踈乃立為仲父管仲父出朱盖青衣置鼓而歸庭有陳鼎家有三歸孔子曰良大夫也其侈偪上拾遺記曰范蠡相越日致千金家僮閑筭術者萬人收四方難得之貨盈積於越都以為噐銅鐵之類積如山之阜或藏之井壍謂之寳井竒容麗色溢於閨房歴古以来未之有也文學能言而不能行居下而訕上處貧而非富大言而不從髙厲而行去聲卑誹譽訾音紫議以要平聲名采善於當世夫音扶禄不過秉握者不足以言治家不滿儋石者不足以計事儒皆貧羸衣冠不完安知國家之政縣官之事乎何什音斗辟音僻造陽也文學曰夫音扶賤不周知去聲貧不妨行去聲顔淵屢空不為不賢孔子不容不為不聖孔子曰賢哉囘也一簞食一瓢飲在陋巷人不堪其憂回也不改其樂賢哉回也又曰回也其庶乎屢空孔子厄於陳蔡顔回曰夫子之道至大天下莫能容雖然夫子推而行之世不我用有國之醜也夫子何病焉不容然後見君子孔子欣然嘆曰有是哉及將以貎舉人以才進士則太公終身鼔刀而寗戚不離飯上聲牛矣王逸曰太公避紂居東海之濱聞文王作興盍往歸之至朝歌益窮困自鼓刀而屠遂西釣於渭濱文王夢得聖人於是出獵而見之遂載以歸用以為師言吾先公望子乆矣因號為太公望或言周文王夢立令狐之津太公在後帝曰昌賜汝名師文王再拜太公夢亦如此文王出田見識所夢載與俱歸以為太公也雜事篇曰寗戚欲干齊桓公窮困無以自進於是為商旅賃車以適齊暮宿於郭門之外桓公郊迎客夜開門辟賃車者執火甚盛從者甚衆寗戚飯牛於車下望桓公而悲擊牛角疾商歌桓公聞之撫其僕之手曰異哉此歌者非常人也命後車載之桓公反至從者以請桓公曰賜之衣冠将見之寗戚見說桓公以合境内明日復見說桓公以為天下桓公大說將任之羣臣爭之曰客衛人去齊五百里不逺不若使人問之固賢人也任之未晚也桓公曰不然問之恐其有小悪忘人之大美此人主所以失天下之士也且人固難全權用其長者遂舉大用之而授之以為卿當此舉也桓公得之矣所以覇也古之君子守道以立名修身以俟時不以窮變節不以賤易志詮言曰古之存已者樂德而忘賤故名不動志樂道而忘貧故利不動心繆稱訓曰天下有至貴而非勢位也有至富而非金玉也惟仁之處惟義之行臨財不苟見利反義不義而富無名而貴仁者不為也孫卿曰古之賢人食則餰粥不足衣則短褐不完然而非禮不進非義不受故曾參閔子不以其仁易晉楚之富伯夷不以其行去聲易諸侯之位是以齊景公有馬千駟而不能與之爭名立節篇曰曾子衣弊衣以耕魯君使人往致邑焉曰請以此修衣曽子不受往復反又不受使者曰先生非求於人人則獻之奚為不受曾子曰臣聞之受人者畏人予人者驕人縱子有賜不我驕也我能勿畏乎終不受孔子曰參之言足以全其節也孟子曰曾子曰晉楚之富不可及也彼以其富我以其仁彼以其爵我以其義吾何歉乎哉仲尼弟子傳曰閔損字子騫不仕大夫不食汙君之禄季氏使閔子騫為費宰子騫曰善為我辭焉如有復我者則吾必在汶上矣伯夷傳曰伯夷叔齊孤竹君之二子也父欲立叔齊及父卒叔齊讓伯夷伯夷曰父命也遂逃去叔齊亦不肯立而逃之國人立其中子論語曰伯夷叔齊餓于首陽之下民到于今稱之齊景公有馬千駟民無得而稱焉詩曰誠不以富亦祇以異其此之異與繆稱訓曰伯夷餓死首山之下猶不自悔棄其所賤得其所貴也說山訓曰琬琰之玉在洿泥之中雖廉者弗釋弊箄甑瓾在袇茵之上雖貪者不摶美之所在雖汙辱世不能賤惡之所在雖髙隆世不能貴孔子曰賢哉回也一簞食一瓢飲在於陋巷人不堪其憂回也不改其樂音洛故惟仁者能處約樂音洛貧髙士傳曰孔子謂顔回曰家貧居卑胡不仕乎對曰不願仕回有郭外之田五十畆足以給􅊡鬻郭内十畆足以為絲麻鼓琴足以自娛所學夫子者足以自樂也回不願仕夫子愀然變色曰美哉小人富斯暴貧斯濫矣陽子曰為仁不富為富不仁苟先利而後義取奪不厭公卿積億萬大夫積千金士積百金利己并財以聚百姓寒苦流離於路流離梟鳥闗西謂之流離借以為漂散之義也儒獨何以完其衣冠也貧富第十七大夫曰余結髪束脩年十三幸得宿衛平凖書曰桑𢎞羊賈人子以心計年十三侍中給事輦轂之下以至卿大夫之位獲禄受賜六十有餘年矣車馬衣服之用妻子僕養之費量入為出儉節以居之奉音俸禄賞賜一二籌册通作䇿之積浸以致富成業故分土若一賢者能守之分財若一知去聲者能籌之夫音扶子貢之廢著音貯陶朱公之三至千金豈必賴之民哉運之方寸轉之息耗取之貴賤之間耳貨殖傳曰子貢既學於仲尼退而仕於衛廢著鬻財於曹魯之間七十子之徒賜最為饒益原憲不厭糟糠匿於窮巷子貢結駟連騎束帛之幣以聘享諸侯所至國君無不分庭與之抗禮夫使孔子名布揚於天下者子貢先後之也此所謂得勢而益彰者乎又曰范蠡既雪㑹稽之恥乃喟然作而歎曰計然之䇿七越用其五而得意既已施於國吾欲用之家乃乘扁舟浮於江湖變名易姓適齊為䲭夷子皮之陶為朱公朱公以為陶天下之中諸侯四通貨物所交易也乃治産積居與時逐而不責於人故善治生者能擇人而任時十九年之中三致千金再分散與貧交疏昆弟此所謂富好行其德者後年衰老而聼子孫子孫修業而息之遂至巨萬故言富者皆稱陶朱公文學曰古者事業不二利禄不兼然後諸業不相逺而貧富不相懸也齊俗訓曰治世之體易守也其事易為也其禮易行也其責易償也是以人不兼官官不兼事士農工商鄉别州異是故農與農言力士與士言行工與工言巧商與商言數是以士無遺行農無廢功工無苦事商無折貨各安其性不得相干詮言曰賈多端則貧士多技則窮心不一也夫音扶乗爵禄以謙讓者名不可勝音升舉也因權勢以求利者入不可勝音升數也食湖池管山海芻蕘者不能與之爭澤商賈音古不能與之爭利子貢以布衣致之而孔子非之况以勢位求之者乎孔子曰賜不受命而貨殖焉故古者大夫思其仁義以充其位不為權利以充其私也大夫曰山岳有饒然後百姓澹古贍字焉河海有潤然後民取足焉夫音扶尋常之汚不能溉陂澤丘阜之木不能成宮室小不能苞大少不能澹古贍字多泰族訓曰髙山深林非為虎豹也大木茂枝非為飛鳥也流源千里淵深百仭非為蛟龍也致其崇髙成其廣大山居木棲巢枝穴藏水潜陸行各得其所寧焉夫大生小多生少天之道也故丘阜不能生雲雨滎水不能生魚鼈者小也牛馬之氣蒸生蟣虱蟣蝨之氣蒸不能生牛馬故化生於外非生於内也傳曰坎井無黿鼍者隘也園中無修林者小也未有不能自足而能足人者也未有不能自治而能治人者也故善為去聲人者能自為去聲者也善治人者能自治者也文學不能治内安能理外乎文學曰行逺者假於車濟江海者因於舟荀子曰假輿馬者非利足也而致千里假舟楫者非能水也而絶江河慎子曰行海者坐而致越有舟也行陸者立而至秦有車也公輸子能因人主之材木以搆宮室臺榭而不能自為專室狹廬材不足也歐冶能因國君以為金鑪大鍾而不能自為一鼎盤材無其用也君子因人主之正朝以和百姓潤衆庶而不能自饒其家勢不便也故舜耕於歴山恩不及州里太公屠牛於朝歌利不及妻子及其見用恩流八荒德溢四海雜言曰舜耕之時不能利其都人及為天子天下戴之故君子窮則善其身逹則利於天下俶真訓曰舜之耕陶也不能利其里南靣王則徳施乎四海仁非能益也處便而勢利也是故烏號之弓谿子之弩不能無弦而射越舲蜀艇不能無水而浮故舜假之堯太公因之周君子能修身以假道者不能枉道而假財也大夫曰道懸於天物布於地知去聲者以衍愚者以困孫卿曰仁義之於人也譬之若貨財粟米之於家也多有之者富少有之者貧至無有者窮覽㝠訓曰夫道者無私就也無私去也能者有餘拙者不足順之者利逆之者凶譬如隋侯之珠和氏之璧得之者富失之者貧貨殖傳曰農工虞商此四者民所衣食之原也原大則饒原小則鮮上則富國下則富家貧富之道莫之奪予而巧者有餘拙者不足子貢以著音眝積顯於諸侯陶朱公以貨殖尊於當世富者交焉貧者澹古贍字焉故上自人君下及布衣之士莫不戴其德稱其仁原憲孔伋當世被饑寒之患顔回屢空於窮巷當此之時迫於窟穴拘於緼袍雖欲假財信姦佞亦不能也詩傳曰原憲居魯環堵之室茨以生蒿蓬戸甕牖揉桑以為樞上漏下濕匡坐而弦歌子貢聞之乘肥馬衣輕裘中紺而表素軒車不容巷往見原憲原憲冠桑葉冠杖藜杖而應門正冠則纓絶捉襟則肘見納履則踵决子貢曰噫先生何病也原憲仰而應之曰憲聞之無財之謂貧學而不能行之謂病憲貧也非病也若夫希世而行比周而交學以為人敎以為己仁義之慝輿馬之餙憲不忍為也子貢逡廵面有愧色不辭而去原憲曵杖拖屨行歌商頌而反聲滿天地如出金石天子不得而臣也諸侯不得而友也故養志者忘身身且不愛孰能累之詩曰我心匪石不可轉也我心匪席不可卷也此之謂也立節篇曰子思居於衛緼袍無表二旬而九食田子方聞之使人遺狐白之裘恐其不受因謂之曰吾假人遂忘之吾與人也如棄之子思辭而不受子方曰我有子無何故不受子思曰伋聞之妄與不如遺棄物於溝壑伋雖貧也不忍以身為溝壑是以不敢當也文學曰孔子云富而可求也雖執鞭之事吾亦為之如不可求從吾所好立節篇曰卑賤貧窮非士之恥也夫士之所恥者天下舉忠而士不與焉舉信而士不與焉舉㢘而士不與焉三者在乎身名傳於後世與日月並而不息雖無道之世不能汚焉然則非好死而惡生也非悪富貴而樂貧賤也由其道遵其理尊貴及已士不辭也孔子曰富而可求雖執鞭之士吾亦為之富而不可求從吾所好也大聖之操也詩云我心匪石不可轉也我心匪席不可卷也言不失己也能不失己然後可與濟難矣此士君子之所以越衆也君子求義非苟富也故刺子貢不受命而貨殖焉君子遭時則富且貴不遇退而樂道不以利累已故不違義而妄取隠居修節不欲妨行去聲故不毁名而趨勢雖附之以韓魏之家非其志則不居富貴不能榮謗毁不能傷也故原憲之緼袍賢於季孫之狐貉趙宣孟之魚食甘於知去聲伯之芻豢子思之銀佩美於虞公之垂棘齊俗訓曰釐負羇之壺餐愈於晋獻公之垂棘趙宣孟之束脯賢於智伯之大鍾魏文侯軾段干木之閭非以其有勢也晉文公見韓慶下車而趨非其多財以其富於仁充於徳也故貴何必財亦仁義而已矣修務訓曰段干木辭禄而處家魏文侯過其閭而軾之其僕曰君何為軾文侯曰段干木在是以軾其僕曰段干木布衣之士君軾其閭不已甚乎文侯曰段干木不趨勢利懐君子之道隠居窮巷聲施千里寡人敢勿軾乎段干木光于德寡人光于勢段干木富于義寡人富于財勢不若德尊財不若義髙干木雖以己易寡人不為吾曰悠悠慙于影子何以輕之哉其後秦將起兵伐魏司馬庾諫曰段干木賢者其君禮之天下莫不知諸侯莫不聞舉兵伐之無乃妨於義乎於是秦乃偃兵輟不攻魏雜事篇曰魏文侯過段干木之閭而軾其僕曰君何為軾曰此非段干木之閭乎段干木盖賢者也吾安敢不軾且吾聞段干木未嘗肯以己易寡人也吾安敢髙之段干木光乎德寡人光乎地段干木富乎義寡人富乎財地不如德財不如義寡人當事之遂致禄百萬而時往問之國人皆喜相與誦之曰吾君好正段干木之敬吾君好忠段干木之隆居無幾何秦興兵欲攻司馬唐且諫秦君曰段干木賢者也而魏禮之天下莫不聞無乃不可加兵乎秦君以為然乃按兵而輟不攻鹽鐵論卷四
