  - {type: variant, offset: 206, length: 2, content: 喪祭, WYG: 各便其用故理世不一其道便國不必法古聖人之興也不相襲而王夏殷之衰也不易禮而滅然則反古未可非而循禮未足多也故聖與俗流賢與變俱諺曰以書為御者不盡馬之情以古制今者不逹事之變故循法之功不足以髙世法古之學不足以制今故商君昭然獨見存亡不可與世俗同者為其沮功而多近也庸人安其故而愚者果所聞衛鞅曰聖人苟可以强國不法其故苟可以利民不循其禮常人安於故俗學者溺於所聞以此兩言居官守法可也非所以論於法之外也三代不同禮而王五伯不同法而霸智者作法愚者制焉賢者更禮不肖者拘焉故舟車之始使民三年而後安之商君之法立然後民信之吕氏春秋曰舟車之始見也三世而後安之夫聞善豈易哉故聼無事治衞鞅傳曰孝公既用衞鞅以衞鞅為左庶長卒定變法之令令既具未布恐民之不信也乃立三丈之木於國都市南門募民有能徙置北門者予十金民怪之莫敢徙復曰能徙者予五十金有一人徙之輒予五十金以明不欺卒下令令行于民期年秦民之國都言初令之不便者以千數於是太子犯法衞鞅曰法之不行自上犯之將法太子太子君嗣也不可施刑刑其傅公子䖍黥其師公孫賈明日秦人皆趨令行之十年秦民大說道不拾遺山無盗賊家給人足民勇於公戰怯於私闘鄉邑大治秦民初言令不便者有来言令便者衞鞅曰此皆亂化之民也盡遷之於邉城其後民莫敢議令孔子曰可與共學未可與權文學可令扶䋲循刻非所與論道術之外也文學曰君子多聞闕疑述而不作聖達而謀大叡音銳知去聲而事寡是以功成而不隳名立而不􅉐小人知去聲淺而謀大羸音縲弱而任重故中道而廢蘓秦商鞅是也汜論曰蘓秦匹夫徒步之人也靻蹻羸葢経營萬乘之主服諾諸侯然不自免於車裂之患蔡澤曰商君為孝公平權衡正度量調輕重决裂阡陌教民耕戰是以兵動而地廣兵休而國富故秦無敵於天下立威諸侯功已成矣遂以車裂無先王之法非聖人之道而因於已故亡易曰小人處盛位雖髙必崩不盈其道不恒其徳而能以善終身未之有也是以初登于天後入于地禹之治水也民知其利莫不勸其功商鞅之立法民知其害莫不畏其刑河間獻王曰禹稱民無}
