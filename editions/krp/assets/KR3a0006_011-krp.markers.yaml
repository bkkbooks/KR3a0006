  - {type: variant, offset: 10993, length: 304, content: 韓嬰曰詩云俾民不迷昔之君子道其百姓不使迷是以威厲而刑措不用也故形其仁義謹其教道使民目晰焉而見之使民耳晰焉而聞之使民心晰焉而知之則道不迷而民志不惑矣詩曰示我顯徳行故道義不易民不由也禮樂不明民不見也詩曰周道如砥其直如矢言其易也君子所履小人所視言其明也睠言顧之澘焉出涕哀其不聞禮教而就刑誅也泰族訓曰治大者道不可以小地廣者制不可以狹位髙者事不可以煩民衆者教不可以苟夫事碎難治也法煩難行也求多難贍也寸而度之至丈必差銖而稱之至石必過石秤丈量徑而寡失簡絲數米煩而不察故大較易為智曲辯難為慧故無益於治而有益於煩者聖人不為無益於用而有益於費者智者弗行也故功不猒約事不猒省求不猒寡功約易成也事省易治也求寡易贍也衆易之於以任人易矣, SBCK: ''}
