  - {type: punctuation, offset: 408, content: (, id: KR3a0006_krp_002-bkkpn22}
  - {type: variant, offset: 408, length: 298, content: 貨殖傳曰占之在上者道之以徳齊之以禮故民有耻而且敬貴誼而賤利欲寡而事節財足而不争此三代之所以直道而行也及周室衰禮法墮諸侯刻桷丹楹大夫山節藻棁八佾舞於庭雍徹於堂其流至乎士庶人莫不離制而棄本稼穡之民少商旅之民多榖不足而貨有餘陵夷至於桓文之後禮誼大壊上下相冐國異政家殊俗耆欲不制僣差亡極於是商通難得之貨工作亡用之器士設反道之行以追時好而取世資偽民背實而要名姦夫犯害而求利篡弑取國者為王公圉奪成家者為雄桀禮誼不足以拘君子刑戮不足以威小人富者木土被文錦犬馬餘肉粟而貧者裋褐不完唅菽飲水其為編戸齊民同列而以財力相君雖為僕虜猶亡慍色故夫飾變詐為姦軌者自足乎一世之間守道循理者不免於飢寒之患其教自上興繇法度之無限也, SBCK: ''}
