  - {type: variant, offset: 3827, length: 1366, content: 起杜周咸宣之屬以峻文決理貴而王溫舒之徒以鷹隼擊殺顯其欲據仁義以道事君者寡偷合取容者眾獨以一公孫弘如之何論儒第十一御史曰文學祖述仲尼稱誦其德以為自古及今未之有也然孔子修道魯衛之間教化洙泗之上弟子不為變當世不為治魯國之削滋甚齊宣王襃儒尊學孟軻淳于髡之徒受上大夫之祿不任職而論國事蓋齊稷下先生千有餘人當此之時非一公孫弘也弱燕攻齊長驅至臨淄湣王遁逃死於莒而不能救王建禽於秦與之俱虜而不能存若此儒者之安國尊君未始有效也文學曰無鞭策雖造父不能調駟馬無勢位雖舜禹不能治萬民孔子曰鳳鳥不至河不出圖吾已矣夫故軺車良馬無以馳之聖德仁義無所施之齊威宣之時顯賢進士國家富強威行敵國及湣王奮二世之餘烈南舉楚淮北并巨宋苞十二國西摧三晉卻彊秦五國賓從鄒魯之君泗上諸侯皆入臣矜功不休百姓不堪諸儒諫不從各分散慎到捷子亡去田駢如薛而孫卿適楚內無良臣故諸侯合謀而伐之王建聽流說信反間用后勝之計不與諸侯從親以亡國為秦所禽不亦宜乎御史曰伊尹以割烹事湯百里以飯牛要穆公始為苟合信然與之霸王如此何言不從何道不行故商君以王道說孝公不用即以彊國之道卒以就功鄒子以儒術干世主不用即以變化始終之論卒以顯名故馬效千里不必胡代士貴成功不必文辭孟軻守舊術不知世務故困於梁宋孔子能方不能圓故饑于黎丘今晚世之儒勤德時有乏匱言以為非因此不行自周室以來千有餘歲獨有文武成康如言必參一焉取所不能及而稱之猶躄者能言遠不能行也聖人異塗同歸或行或止其趣一也商君雖革法改教志存於彊國利民鄒子之作變化之術亦歸於仁義祭仲自貶損以行權時也故小枉大直君子為之今硜硜然守一道引尾生之意即晉文之譎諸侯以尊周室不足道而管仲蒙恥辱以存亡不足稱也文學曰伊尹之干湯知聖主也百里之歸秦知明君也二君之能知霸主其冊素形於己非暗而以冥冥決事也孔子曰名不正則言不順言不順則事不成如何其苟合而以成霸王也君子執德秉義而行故造次必於是顛沛必於是孟子曰居今之朝不易其俗而成千乘之勢不能一朝居也寧窮饑居於陋巷安能變己而從俗化闔廬殺僚公子札去而之延陵終身不入吳國魯公殺子赤叔眄退而隱處不食其祿虧義得尊枉道取容效死不為也聞正道不行釋事而退未聞枉道以求容也御史曰論語親於其身為不善者君子不入也有是言而行不足從也季氏為無道逐其君奪其政而冉求仲由臣焉禮男女不授受不交爵孔子適衛因嬖臣彌子瑕以見衛夫人子路不說子瑕佞臣也夫子因之非正也男女不交孔子見南子非禮也禮義由孔氏且貶道以求容惡在其釋事而退也文學曰天下不平庶國不寧明王之憂也上無天子下無方伯天下煩亂賢聖之憂也是以堯憂洪水伊尹憂民管仲束縛孔子周流憂百姓之禍而欲安其危也是以負鼎俎囚拘匍匐以救之故追亡者趨拯溺者濡今民陷溝壑雖欲無濡豈得已哉御史默不對憂邊第十二大夫曰文學言天下不平庶國不寧明王之憂也故王者之於天下猶一室之中也有一人不得其所則謂之不樂故民流溺而弗救非惠君也國家有難而不憂非忠臣也夫守節死難者人臣之職也衣食饑寒者慈父之道也今子弟遠勞於外人主為之夙夜不寧群臣盡力畢議冊滋國用故少府丞令請建酒榷以贍邊給戰士拯救民於難也為人父兄者豈可以已乎內省衣食以䘏在外者猶未足今又欲罷諸用減奉邊之費未可為慈父賢兄也文學曰周之季末天子微弱諸侯力政故國君不安謀臣奔馳何者敵國眾而社稷危也今九州同域天下一統陛下優游巖廊覽群臣極言至論內詠雅頌外鳴和鑾純德粲然並於唐虞功烈流於子孫夫蠻貊之人不食之地何足以煩慮而有戰國之憂哉若陛下不棄, WYG: ''}
