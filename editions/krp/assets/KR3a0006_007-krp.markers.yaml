  - {type: variant, offset: 5740, length: 194, content: 反質篇曰魏文侯問李克曰刑罰之源安生李克曰生於奸邪淫佚之行凡奸邪之心飢寒而起淫佚者乆飢之詭也彫文刻鏤害農事者也錦繡纂組傷女工者也農事害則飢之夲也女工傷則寒之原也飢寒並至而能不為奸邪者未之有也男女飾羙以相矜而能無淫佚者未甞有也故上不禁伎巧則國貧民侈國貧窮者為奸邪而富足者為淫佚則驅民而為邪也民以為邪因以法隨誅之不赦其罪則是為民設陷也刑罰之起有原人主不塞其夲而替其末傷國之道乎文侯曰善以為法服也, SBCK: ''}
