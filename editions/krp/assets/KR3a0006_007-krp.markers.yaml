  - {type: variant, offset: 6056, length: 203, content: 孔子世家曰孔子云弗乎弗乎君子病沒世而名不稱焉吾道不行矣吾何以自見於後世乃因史記作春秋上至隱公下訖哀公十四年十二公據魯親周故殷運之三代其文辭而指博故吳楚之君自稱王而春秋貶之曰子踐土之㑹實召周天子而春秋諱之曰天王狩於河陽推此類以䋲當世貶損之義後有王者舉而開之春秋之義行則天下亂臣賊子懼焉孔子在位聼訟文辭有可與人共者弗獨有也至於為春秋筆則筆削則削子夏之徒不能贊一辭弟子受春秋孔子曰後世知丘者以春秋而罪丘者亦以春秋, SBCK: ''}
