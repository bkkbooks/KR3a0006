  - {type: variant, offset: 1698, length: 0, content: '', SBCK: 層之臺一傾公輸子不能正本朝一邪伊望不能復故公孫丞相倪大夫側身行道分禄以養賢卑巳以下士功業顯立日力不足無行人子産之􅁇而葛繹彭侯之等隳壞其緒紕亂其紀毀其客館議堂以爲馬廐婦舍無養士之禮而尚驕矜之色廉耻陵遲而爭於利矣故良田廣宅民無所之不耻爲利者滿朝市列田畜者彌郡國横􅁀掣頓大第巨舍之旁道路且不通此固難醫而不可爲工大夫勃然作色黙而不應鹽鐡箴石第三十一}
