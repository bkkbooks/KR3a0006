  - {type: variant, offset: 1033, length: 0, content: '', WYG: 殷紀曰帝盤庚之時殷已都河北盤庚渡河南復居成湯之故居乃五遷無定處殷民咨胥皆怨不欲徙盤庚乃告諭諸侯大臣曰昔髙后成湯與爾之先祖俱定天下法則可修舍而弗勉何以成徳乃遂渉河南治亳行湯之政然後百姓由寧殷道復興諸侯來朝以其遵成湯之徳也泰族訓曰夫水出於山而入於海稼生於田而藏於倉聖人見其所生則知其所歸矣故舜深藏黄金於蔪巖之山所以塞貪鄙之心也}
