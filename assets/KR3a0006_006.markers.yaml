  - {type: variant, offset: 136, length: 0, content: '', WYG: 之若由不得其死然天其祝予矣季路死孔子哭之曰噫天祝予天祝予孔父音甫累華督之難去聲不可謂不義仇牧涉宋萬之禍不可謂不賢也左傳曰宋華父督見孔父之妻於路目逆}
  - {type: variant, offset: 136, length: 0, content: '', krp: 之若由不得其死然天其祝予矣季路死孔子哭之曰噫天祝予天祝予孔父音甫累華督之難去聲不可謂不義仇牧涉宋萬之禍不可謂不賢也左傳曰宋華父督見孔父之妻於路目逆}
  - {type: variant, offset: 137, length: 2, content: 作比, WYG: 送之曰美而艷宋督攻孔氏殺孔父而取其妻公怒督懼遂弑殤公君子以督為有無君之心然後動於惡故先書弑其君春秋曰春王正月戊申宋督弑其君與夷及其大夫孔父公羊傳曰及者何累也弑君多矣舍此無累者乎曰有仇收荀息皆累也舍仇收荀息無累者乎曰有有則此何以書賢也何賢乎孔父孔父可謂義形于色矣其義形於色奈何督将弑殤公孔父生而存則殤公不可得而弑也故於是先攻孔父之家殤公知孔父死己必死趨而救之皆死焉孔父正色而立於朝則人莫敢過而致難於其君者孔父可謂義形於色矣義勇篇曰宋閔公臣長萬以勇力聞萬與魯戰師敗為魯所獲囚之宫中數月歸之宋宋閔公搏婦人在側公謂萬曰魯君孰與寡人美萬曰魯君美天下諸侯唯魯君耳宜其為君也閔公矜婦人妬因言曰爾魯之囚虜爾何知萬怒遂搏閔公頰齒落於口絶吭而死仇牧聞君死趨而至遇萬於門擕劍而叱之萬臂擊仇牧而殺之齒著於門闔仇牧可謂不畏强禦矣趨君之難顧不旋踵泰族訓曰君子雖死亡其名不滅小人雖得勢其罪不除大夫曰今之學者無太公之能騏驥之才有以蜂蠆音瘥介毒而自害也蠆螫虫也介大也東海成顒音䧺河東胡建是也二子者以術蒙舉起卒伍為縣令獨非自是無與合同引之不來推之不徃狂狷不遜忮音寘害不㳟刻轢音力公主侵陵大臣知其不可而强音襁行之欲以}
