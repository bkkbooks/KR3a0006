  - {type: variant, offset: 4382, length: 0, content: '', WYG: 七國異族諸侯制法各殊習俗縱横間之舉兵}
  - {type: variant, offset: 4382, length: 0, content: '', krp: 七國異族諸侯制法各殊習俗縱横間之舉兵}
  - {type: variant, offset: 4383, length: 0, content: '', WYG: 相角攻城濫殺覆髙危安掘墳墓揚人骸大衝車髙重京除戰道犯嚴敵殘不義百往一反聲苟盛也是故壯質輕足者為甲卒千里之外家老羸弱悽愴於内厮徒馬圉軵車奉饟道馬遼逺霜雪亟集短褐不完人羸車弊泥塗至膝相携於道奮首於路身枕格而死所謂兼國有地者伏尸數十萬破車以千百數傷弓弩矛㦸矢石之創者扶舉於路故}
  - {type: variant, offset: 4383, length: 0, content: '', krp: 相角攻城濫殺覆髙危安掘墳墓揚人骸大衝車髙重京除戰道犯嚴敵殘不義百往一反聲苟盛也是故壯質輕足者為甲卒千里之外家老羸弱悽愴於内厮徒馬圉軵車奉饟道馬遼逺霜雪亟集短褐不完人羸車弊泥塗至膝相携於道奮首於路身枕格而死所謂兼國有地者伏尸數十萬破車以千百數傷弓弩矛㦸矢石之創者扶舉於路故}
  - {type: variant, offset: 4384, length: 0, content: '', WYG: 至於枕人頭食人肉飲人血廿之芻豢故自三代以後者未嘗得安其情性而樂其習俗保其修命天而不夭於人虐也今中國為一統而方内不安繇音遥役逺而外内煩也古者無過年之繇音遥無踰時之役詩傳曰太平之時民行役者不踰時男女不失時以偶孝子不失時以養外無曠夫内無怨女上無不慈之父下無不孝之子父子相成夫婦相保天下和平國家安寧今近者數千里逺者過萬里歴二期長音掌子不還父母愁憂妻子詠歎憤懣音悶之恨發動於心慕思之積痛於骨髓此枤杜采薇之所為作也詩序曰文王之時西有昆夷之患北有玁狁之難以天子之命命將率遣戍役以守衞中國故歌采薇以遣之出車以勞還枤杜以勤歸也險固第五十大夫曰虎兕所以能執熊羆服羣獸者爪牙利而攫音脚便也秦所以超諸侯吞天下并敵國者險阻固而勢居然也故龜蜯有介狐貉不能禽通作擒蝮蛇有螫音式人忌而不輕故有備則制人無備則制於人韓}
  - {type: page-break, offset: 4384, content: '', id: KR3a0006_WYG_010-10b, image: WYG0695/WYG0695-0625b.png}
  - {type: page-break, offset: 4384, content: '', id: KR3a0006_WYG_010-11a, image: WYG0695/WYG0695-0625c.png}
  - {type: variant, offset: 4384, length: 0, content: '', krp: 至於枕人頭食人肉飲人血廿之芻豢故自三代以後者未嘗得安其情性而樂其習俗保其修命天而不夭於人虐也今中國為一統而方内不安繇音遥役逺而外内煩也古者無過年之繇音遥無踰時之役詩傳曰太平之時民行役者不踰時男女不失時以偶孝子不失時以養外無曠夫内無怨女上無不慈之父下無不孝之子父子相成夫婦相保天下和平國家安寧今近者數千里逺者過萬里歴二期長音掌子不還父母愁憂妻子詠歎憤懣音悶之恨發動於心慕思之積痛於骨髓此枤杜采薇之所為作也詩序曰文王之時西有昆夷之患北有玁狁之難以天子之命命將率遣戍役以守衞中國故歌采薇以遣之出車以勞還枤杜以勤歸也險固第五十大夫曰虎兕所以能執熊羆服羣獸者爪牙利而攫音脚便也秦所以超諸侯吞天下并敵國者險阻固而勢居然也故龜蜯有介狐貉不能禽通作擒蝮蛇有螫音式人忌而不輕故有備則制人無備則制於人韓}
  - {type: variant, offset: 4385, length: 2, content: 許由, WYG: 子曰虎豹之所以能勝人執百獸者以其爪牙也當使虎豹失其爪牙則人必制之矣今勢重者人主之爪牙也君人而失其爪牙虎豹之類也故仲山甫補衮職之闕蒙公築長城之固所以備冦難去聲而折衝萬里之外也詩曰衮職有闕維仲山甫補之匈奴傳曰秦滅六國始皇帝使䝉恬將數十萬之衆北擊胡悉收河南地因河為塞築四十四縣城臨河徙適戎以充之而通直道自九原至雲陽因邊山險塹谿谷可繕者繕之起臨洮至遼東萬餘里又度河據陽山北假中匈奴單于曰頭曼頭曼不勝秦北徙十有餘年今不固其外欲安其内猶家人不堅垣墻狗吠夜驚而闇昧妄行也韓非子曰不謹其閉不固其門虎乃將存不慎其事不掩其情賊乃將生文學曰秦地左肴音殽函音咸右隴阺音低前蜀漢後山河四塞以為固金城千里良將去聲勇士設利器而守陘音形隧音遂墨子守雲梯之械也修務訓曰昔者楚欲攻宋墨子聞而悼之自魯趨而十日十夜足重繭而不休息裂衣裳裹足至於郢見楚王曰臣聞大王舉兵將攻宋計必得宋而後攻之乎忘其苦衆勞民頓兵挫銳負天下以不義之名而不得咫尺之地猶且攻之乎王曰必不得宋又且為不義曷為攻之墨子曰臣見大王必傷義而不得宋王曰公輸天下之巧士作雲梯之械設以攻宋曷為弗取墨子曰令公輸設攻臣請守之於是公輸般設攻宋之械墨子設守宋之備九攻而墨子九却之弗能入於是乃偃兵輟不攻宋以為雖湯武復生蚩尤復起不輕攻也然戍音絮卒陳勝無將去聲帥之任師旅之衆奮空拳而破百萬之師無墻籬之難賈誼曰始皇奮六世之餘烈振長䇿而御宇内吞二周而亡諸侯履至尊而制六合執敲朴以鞭笞天下威振四海南取百粤之地以為桂林象郡百粤之君俛首係頸委命下吏乃使䝉恬北築長城而守藩籬却匈奴七百餘里胡人不敢南下而牧馬士不敢彎弓而報怨於是廢先王之道燔百家之言以愚黔首墮名城殺豪俊收天下之兵聚之咸陽銷鋒鍉鑄以為金人十二以弱天下}
