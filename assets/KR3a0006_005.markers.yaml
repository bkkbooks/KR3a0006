  - {type: variant, offset: 1342, length: 0, content: '', WYG: 主術訓曰古者天子聽朝公卿正諌博士誦詩瞽箴師誦庶人傳語史書其過宰徹其膳猶以為未足也故堯置敢諫之鼓舜立誹謗之木湯有司直之人武王立戒慎之軺過若豪釐而既已備之也失聖人之扵善也無小而不舉其扵過也無微而不改正諌篇曰晏子復扵景公曰朝居嚴乎公曰朝居嚴則曷害扵治國家哉晏子對曰朝居嚴則下無言下無言則上無聞矣下無言則謂之喑上無聞則謂之聾聾喑則非害治國家如何也且合菽粟之微以滿倉廪合疏縷之緯以成緯幕太山之髙非一石也累卑然後髙也夫治天下者非一士之言固有受而不用惡有距而不入者㢤韓嬰曰天子有爭臣七人雖無道不失其天下昔殷王紂殘賊百姓絶逆天道至斮朝涉刳孕婦脯鬼侯醢海伯然所以不亡者以其有箕子比干之故微子去之執囚為奴比干諫而死然後周加兵而誅絶之諸侯有爭臣五人雖無道不失其國吳王夫差為無道至驅一市之民以葬闔閭然所以不亡者有伍子胥之故胥以死越王勾踐欲伐之范蠡諫曰子胥之計策未忘扵吴王之腹心也子胥死後三年越乃䏻攻之大夫有爭臣三人雖無道不失其家季氏為無道僣天子舞八佾旅泰山以雍徹孔子曰是可忍也孰不可忍也然不亡者以冉有季路為宰臣也故曰有諤諤爭臣者其國昌有黙黙諛臣者其國亡詩曰不明爾徳時無背無側爾徳不明以無陪無卿言文王咨嗟痛殷商無輔弼諌諍之臣而亡天下矣晏子曰下無直辭上有隠君民多諱言君有驕行}
