  - {type: variant, offset: 825, length: 2, content: 天下, SBCK: 也文表而柔裏亂實也文學裒衣􅀶帶竊周公}
  - {type: variant, offset: 825, length: 0, content: '', WYG: 語杖貧者語仁賤者語治議不在巳者易稱去聲從旁議者易是其當局則亂故公孫𢎞布被倪寛練袍衣若僕妾食若庸夫淮南逆於内蠻夷暴於外盗賊不為禁奢侈不為節若疫嵗之巫徒能鼓口耳何㪚不足之能治乎賢良曰高皇帝之時蕭曹為公滕灌之屬為卿濟濟然斯則賢矣文景之際建元之始大臣尚有爭去聲引守正之義自此之後多承意從欲少敢直言面議而正刺因公而狥私故武安丞相田蚡也訟園田爭曲直人主之前夫音扶九層之臺一傾公輸子不能正夲朝音潮一邪伊望不能復故公孫丞相倪大夫側身行道分禄以養賢卑已以下士功業顯立日力不足無行人子産之繼而葛繹澎音彭侯之等傳曰公孫賀為丞相封葛繹侯劉屈􅈊為左丞相封澎侯隳壊其緒紕音避亂其紀毁其客館議堂以為馬廐婦舍無養士之禮而尚驕矜之色亷耻陵遲而爭於利矣西京雜記曰平津侯自布衣為宰相乃開東閣營客館以招}
