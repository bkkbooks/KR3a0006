  - {type: variant, offset: 82, length: 228, content: 頓壊也權謀篇曰聖王之舉事必先諦之於謀慮而後考之於蓍龜白屋之士皆關其謀芻蕘之役咸盡其心故萬舉而無遺籌失策傳曰衆人之智可以測天兼聼獨斷惟在一人此大謀之術也謀有二端上謀知命其次知事知命者預見存亡禍福之原早知盛衰廢興之始防事之未萌避難於無形若此人者居亂世則不害於其身在乎太平之世則必得統下之權彼知事者亦尚矣見事而知得失成敗之分而究其所終極故無敗業廢功東野鄙人曰泰山不讓礫石江海不辭小流所以成其大也詩曰先民有言詢于芻蕘博謀也秦王子嬰曰輕慮者不可以治國獨智者不可以存君, SBCK: ''}
