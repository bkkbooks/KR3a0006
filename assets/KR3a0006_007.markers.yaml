  - {type: variant, offset: 1458, length: 0, content: '', SBCK: 冨者鍾鼓五樂歌兒數曹中者鳴竽調瑟鄭儛趙謳古者瓦棺容尸木板堲周足以收形骸藏髮齒而巳及其後桐棺不衣采椁不斵今冨者繡􅘘題湊中者梓棺楩椁貧者􅀞荒衣􅂁繒囊緹槖古者明器有形無實示民不用也及其後則有醯醢之藏桐馬偶人彌􅀕其物不備今厚資多藏噐用如生人郡國繇吏素桑楺偶車櫓輪匹夫無貌領桐人衣紈綈古者不封不樹反虞􅀕於寢無檀宇之居廟堂之位及其後則封之庻人之墳半仞其高可􅀮今冨者積土成}
