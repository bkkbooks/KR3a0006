body:
  text: 執務第三十九丞相曰先王之道軼人而難復賢良文學之言深遠而難行夫稱上聖之高行道至德之美言非當世之所能及也願聞方今之急務可復行於政使百姓咸足於衣食無乏困之憂風􅀨時五榖熟螟螣不生天下安樂盜賊不起流人還歸各反其田里吏皆廉正故以奉職元元各得其理也賢良曰孟子曰尭舜之道非遠人也而人不思之耳詩云求之不得寤寐思服有求如關雎好德如河廣何不濟不得之有故高山仰止景行行止雖不能及離道不遠也顔淵曰舜獨何人也回何人也夫思賢慕能從善不休則成康之俗可致而唐虞之道可及公卿未思也先王之道何遠之有齊􅁊公以諸侯思王政憂周室匡諸夏之難平夷狄之亂存亡接絕信義大行著于天下邵陵之會予之爲主傳曰予積也故土積而成山阜水積而成江海行積而成君子孔子曰吾於河廣知德之至也而欲得之各反其本復諸古而已古者行役不踰時春行秋反秋行春來寒暑未變衣服不易固巳還矣夫婦不失時人安和如適獄訟平刑罰得則隂陽調風雨時上不苛擾下不煩勞各修其業安其性則螟螣不生而水旱不起賦歛省而農不失時則百姓足而流人歸其田里上淸靜而不欲則下廉而不貪􅀂今則繇役極遠盡寒苦之地危難之處渉胡越之域今兹往而來歲旋父母延頸而西望男女怨曠而相思身在東楚志在西河故一人行而郷曲恨一人死而萬人悲詩云王事靡盬不能藝稷􅁰父母何怙念彼恭人涕零如雨豈不懷歸畏此罪罟吏不奉法以存撫倍公任私各以其權充其􅄝欲人愁苦而怨思上不恤理則惡政行而邪氣作邪氣作則蟲螟生而水旱起􅀂此雖禱祀雩祝用事百神無時豈能調隂陽而息盜賊矣能言第四十大夫曰盲者口能言白黒而無目以别之儒者口能言治亂無能以行之夫坐言不行則牧童兼烏􅀗之力逢須苞尭舜之德故使言而近則儒者何患於治亂而盲人何患於白黒哉言之不出耻窮之不逮故卑而言高能言而不能行者君子耻之矣賢良曰能言而不能行者國之寶也能行而不能言者國之用也兼此二者君子也無一者烏􅀗逢須也言滿天下德覆四海周公是也口言之躬行之豈􅀂默然載施其行而巳則執事亦何患何耻之有今道不舉而務小利慕於不急以亂群意君子雖貧勿爲可也藥酒病之利也正言治之藥也公卿誠能自强自􅃘食文學之至言去權詭罷利官一歸之於民親以周公之道則天下治而頌聲作儒者安得治亂而患之乎鹽鐡取下第四十一大夫曰不􅁤之民困橈公利而欲擅山澤從文學賢良之意則利歸於下而縣官無可爲者上之所行則非之上之所言則譏之專欲損上徇下􅉛主而適臣尚安得上下之義君臣之禮而何頌聲能作也賢良曰古者上取有量自養有度樂歳不盜年饑則肆用民之力不過歳三日籍歛不過十一君篤愛臣盡力上下交讓天下平浚發爾私上讓下也遂及我私先公職也孟子曰未有仁而遺其親義而後其君也君君臣臣何爲其無禮義乎及周之末塗德惠塞而嗜欲衆君奢侈而上求多民困於下怠於公乎是以有􅂂畝之稅碩䑕之詩作也衞靈公當隆冬興衆穿池海春諌曰天寒百姓凍餒願公之罷役也公曰天寒哉我何不寒哉人之言曰安者不能恤危飽者不能食饑故餘梁肉者難爲言􅀮約處佚樂者難爲言勤苦夫高堂􅃉宇廣廈洞房者不知專屋狹廬上漏下濕者之廇也繫馬百駟貨財充内儲陳納新者不知有旦無暮稱貸者之急廣第唐園良田連比者不知無運踵之業竄頭宅者之役也原馬被山牛羊滿谷者不知無􅀌豚􅇤犢者之窶也高枕談卧無呌號者不知憂私責與吏正戚者之愁也被紈躡韋􅅮梁齧肥者不知短􅄄之寒糖􅹞之苦也從容房闈之間垂拱持案食者不知蹠耒躬耕者之勤也乗堅驅良列􅀐成行者不知􅀒擔歩行者之難也同牀旃席侍御滿側者不知􅀒輅輓舩登高絶流者之難也衣輕暖􅀍英裘處温室戴安車者不知乗邉城飄胡代鄕淸風者之危寒也妻子好合子孫保之不知老母之顦顇匹婦之悲恨也耳聽五音目視弄優者不知蒙流矢距敵方外之死者也東嚮伏几振筆如文調者不知求索之急箠楚之痛者也坐旃茵之上安圖籍之言若易然亦不知歩渉者之難也昔商鞅之任秦也刑人􅀂刈菅芳用師􅀂彈丸從軍旅者􅁀骨長城戍漕者輦車相望生而往死而旋彼獨非人子耶故君子仁以恕義以度所好惡與天下共之所不施不仁者公利好貨居者有積行者有嚢大王好色内無怨女外無曠夫文王作刑國無怨獄武王行師士樂爲之死民樂爲之用􅀂斯則民何苦而怨何求而譏公卿愀然寂􅀂無人於是遂罷議止詞奏曰賢良文學不明縣官事猥以鹽鐡而爲不便請且罷郡國􅅦沽關内鐡官奏可擊之第四十二賢良曰文學旣拜咸取列大夫辭丞相御史大夫曰前議公事賢良文學稱引往古頗乖世務論者不必相反期於可行往者縣官未事胡越之時邉城四靣受敵北邉尤􅀍其苦先帝絕三方之難撫從方國以爲蕃蔽窮極郡國以討匈奴匈奴壤界獸圈􅀌弱無與此困亡之時也遼遠不遂使得復喘息休養士馬􅀒紿西域西域迫近胡冦沮心内解必爲巨患是以主上欲掃除煩倉廩之費也終日逐禽罷而釋之則非計也盖舜紹緒禹成功今欲以小舉擊之何如文學曰異時縣官修輕賦公用饒人富給其後保胡越通四夷費用不足於是興利害筭車舡以訾助邉贖罪告緡與人以患矣甲士死於軍旅中士罷於轉漕仍之以科適吏徴發極矣夫勞而息之極而反本古之道也雖舜禹興不能易也大夫曰昔夏后底洪水之災百姓孔勤罷於籠臿及至其後咸享其功先帝之時郡國頗煩於戎事然亦寛三陲之役語曰見機不遂者隕功一日違敵累世爲患休勞用供困弊乗時帝王之道聖賢之所不能失也功業有緒惡勞而不卒猶耕者勌休而困止也夫事輟者無功耕怠者無􅀗也文學曰地廣而不得者國危兵强而凌敵者身亡虎兕相據而螻蟻得志兩敵相機而匹夫乗間是以聖王見利慮害見遠存近方今爲縣官計者莫􅀂偃兵休士厚幣結和親修文德而巳􅀂不恤人之急不計其難弊持以窮無用之地亡十􅀗一非文學之所知也鹽鐡論卷第七鹽鐡論卷第八結和第四十三誅秦第四十四伐功第四十五西域第四十六世務第四十七和親第四十八結和第四十三大夫曰漢興以來修好結和親所聘遺單于者甚厚然不紀重質厚賂之故改節而􅁀害滋甚先帝覩其可以武折而不可以德懷故廣將帥招􅁬擊以誅􅍏罪功勲粲然著於海内藏於記府何命亡十􅀗一乎夫偷安者後危慮近者憂邇賢者離俗智士權行君子所慮衆庻疑焉故民可以觀成不可與圖始此有司所獨見而文學所不覩文學曰往者匈奴結和親諸夷納貢即君臣外内相信無胡越之患當此之時上求寡而易贍民安樂而無事耕田而食桑麻而衣家有數年之稸縣官餘貨財閭里耆老或及其澤自是之後退文任武苦師勞衆以略無用之地立郡沙石之間民不能自守發屯乗城輓輦而贍之愚竊見其亡不覩其成大夫曰匈奴以虚名市於漢而實不從數爲蠻貊所紿不痛之何故也高皇帝仗劍定九州今以九州而不行於匈奴閭里常民尚有梟散况萬里之主與小國之匈奴乎夫以天下之力勤何不權以天下之士民何不服今有帝名而威不信長城反賂遺而尚踞敖此五帝所不􅃘三王所畢怒也文學曰湯事夏而卒服之周事殷而卒滅之故以大御小者王以强凌弱者亡聖人不困其衆以兼國良御不困其馬以兼道故造父之御不失和聖人之治不倍德秦攝利衡以御宇内執修箠以笞八極驂服以罷而鞭䇿愈加故有傾衡遺箠之變士民非不衆力勤非不多也皆内倍外附而莫爲用此高皇帝所以仗劍而取天下也夫兩主好合内外交通天下安寜世世無患士民何事三王何愁焉大夫曰伯翳之始封秦地爲七十里穆公開霸孝公廣業自卑至上自小至大故先祖基之子孫成之軒轅戰涿鹿殺兩曎蚩尤而爲帝湯武伐夏商誅桀紂而爲王黃帝以戰成功湯武以伐成孝故手足之勤腹腸之養也當世之務後世之利也今四夷内侵不攘萬世必有此長患先帝興義兵以誅􅁀强東滅朝鮮西定冉駹􅀯擒百越北挫强胡李牧追匈奴以廣北州湯武之舉蚩尤之兵也故聖主斥地非私其利用兵非徒􅁬怒也所以匡難辟害以爲􅀺民遠慮文學曰秦􅀯禽勁越北却强胡竭中國以役四夷人罷極而主不恤國内潰而上不知是以一夫倡而天下和兵破陳渉地奪諸侯何嗣之所利詩云雍雍鳴旭日始旦登得前利不念後咎故吳王知伐齊之便而不知干遂之患秦知進取之利而不知鴻門之難是以知一而不知十也周謹小而得大秦欲大而亡小語曰前車覆後車戒殷􅁥不遠在夏后之世矣誅秦第四十四大夫曰秦楚燕齊周之封國也三晉之君齊之田氏諸侯家臣也内守其國外伐不義地廣壤進故立號萬乗而爲諸侯宗周室脩禮長文然國翦弱不能自存東攝六國西畏於秦身以放遷宗廟絕祀頼先帝大惠紹興其後封嘉頴川號周子男君秦旣并天下東絶沛水并滅朝鮮􅀯取陸梁北却胡狄西略氐羗立帝號朝四夷舟車所通足迹所及靡不畢至非服其德畏其威也力多則人朝力寡則朝於人矣文學曰禹舜尭之佐也湯文夏商之臣也其所以從八極而朝海内者非以陸梁之地兵革之威也秦楚三晉號萬乗不務積德而務相侵搆兵爭强而卒俱亡雖以進壤廣地如食萴之充腸也欲其安存何可得也夫禮讓爲國者􅀂江海流彌乆不竭其本美也苟爲無本􅀂蒿火􅁀怒而無繼其亡可立而待戰國是也周德衰然後列於諸侯至今不絕秦力盡而滅其族安得朝人也大夫曰中國與邉境猶支體與腹心也夫肌膚寒於外腹腸疾於内内外之相勞非相爲助也唇亡則齒寒支體傷而心􅉃怛故無手足則支體廢無邉境則内國害昔者戎狄攻太王於邠踰岐梁而與秦界於涇渭東至晉之陸渾侵􅁀中國中國疾之今匈奴􅁞食内侵遠者不離其苦獨邉境蒙其敗詩云憂心􅃤􅃤念國之爲虐不征備則􅁀害不息故先帝興義兵以征􅍏罪遂破祁連天山散其聚黨北略至龍城大圍匈奴單于失魂僅以身免乗奔逐北斬首捕虜十餘萬控弦之民旃裘之長莫不沮膽挫折遠遁遂乃振旅渾耶率其衆以降置五屬國以治胡則長城之内河山之外罕􅀍冦􅫱於是下詔令減戍漕寛徭役􅀄雖勞苦卒􅀗其慶文學曰周累世積德天下莫不願以爲君故不勞而王恩施由近及遠而蠻貊自至秦任戰勝以并天下小海内而貪胡越之地使蒙恬擊胡取河􅀯以爲新秦而亡其故秦築長城以守胡而亡其所守往者兵革亟動師旅數起長城之北旋車遺鏃相望及李廣利等輕計還馬足莫不寒心雖得渾耶不能更所亡此非社稷之至計也伐功第四十五大夫曰齊􅁊公越燕伐山戎破􅀌竹殘令支趙武靈王踰句注過代谷略滅林胡樓煩燕襲走東胡辟地千里度遼東而攻朝鮮蒙公爲秦擊走匈奴􅀂鷙鳥之追羣雀匈奴􅀔惜不敢􅀯靣而望十餘年及其後蒙公死而諸侯叛秦中國擾亂匈奴紛紛乃敢復爲邉冦夫以小國燕趙尚猶却冦虜以廣地今以漢國之大士民之力非特齊􅁊之衆燕趙之師也然匈奴乆未服者羣臣不并力上下未諧故也文學曰古之用師非貪壤􅁟之利救民之患也民思之者旱之望雨簞食壼漿以逆王師故憂人之患者民一心而歸之湯武是也不愛民之死力盡而潰叛者秦王是也孟子曰君不鄕道不由仁義而爲之强戰雖克必亡此中國所以擾亂非蒙恬死而諸侯叛秦昔周室盛也越裳氏來獻百蠻致貢其後周衰諸侯力征蠻貊分散各有聚黨莫能相一是以燕趙能得意焉其後匈奴稍强􅁞食諸侯故破走月支氏因兵威徙小國引􅃓之民并爲一家一意同力故難制也前君爲先帝􅀞匈奴之䇿兵據西域奪之便勢之地以候其變以漢之强攻於匈奴之衆􅀂以强弩潰癰疽越之禽吳豈足道哉上以爲然用君之義聽君之計雖越王之任種蠡不過以捜粟都尉爲御史大夫持政十有餘年未見種蠡之功而見靡弊之効匈奴不爲加俛而百姓􅀺民以敝矣是君之䇿不能弱匈奴而反衰中國也善爲計者固􅀂此乎西域第四十六大夫曰徃者匈奴據河山之險擅田牧之利民富兵强行入爲冦則句注之内驚動而上郡以􅀯咸城文帝時虜入蕭關烽火通甘泉群臣懼不知所出乃請屯京師以備胡胡西役大宛康居之屬􅀯與群羗通先帝推讓斥奪廣饒之地建張掖以西隔絕羗胡􅀲分其援是以西域之國皆内拒匈奴斷其右臂曵劍而走故募人田畜以廣用長城以南濵塞之郡馬牛故縱蓄積布野未覩其計之所過也夫以弱越而遂意强吳才地計衆非鈞也主思臣謀其往必矣文學曰吳越迫於江海三川循環之處於五湖之間地相迫壤相次其勢易以相禽也金鼓未聞旌旗未舒行陣未定兵以接矣師無輜重之費士無乏絶之勞此所謂食於厨倉而戰於門郊者也今匈奴牧於無窮之澤東西􅀯北不可窮極雖輕車利馬不能得也况􅀒重羸兵以求之乎其勢不相及也茫茫乎􅀂行九臯未知所止皓皓乎􅀂無網羅而漁江海雖及之三軍罷弊適遺之餌也故明王知其所無利以爲役不可數行而權不可乆張也故詔公卿大夫賢良文學所以復枉興㣲之路公卿宜思百姓之急匈奴之害縁聖主之心定安平之業今乃留心於末計雖本議不順上意未爲盡於忠也大夫曰􅀄貳師不克宛而還也議者故使人主不遂忿則西域皆瓦解而附於胡胡得衆國而益强先帝絕竒聽行武威還襲宛宛舉國以降効其器物致其寶馬烏孫之屬駭膽請爲臣妾匈奴失魄奔走遁逃雖未盡服遠處寒苦墝埆之地壮者死於祁連天山其􅀌未復故群臣議以爲匈奴困於漢兵折趐傷翼可遂擊服會先帝棄群臣以故匈奴不革譬如爲山未成一簣而止度功業而無斷成之理是棄與胡而資强敵也輟幾沮成爲主計􅀂斯亦未可謂盡忠也文學曰有司言外國之事議者皆激一時之權不慮其後張騫言大宛之天馬汗血安息之真玉大鳥縣官旣聞如􅅴水焉乃大興師伐宛歴數期而後克之夫萬里而攻人之國兵不戰而物故過半雖破宛得寶馬非計也當此之時將卒方赤靣而事四夷師旅相望郡國並發􅀺人困苦姦僞萌生盜賊並起守尉不能禁城邑不能止然後遣上大夫衣繡衣以興擊之當此時百姓元元莫必其命故山東豪傑頗有異心頼先帝聖靈斐然其咎皆在於欲畢匈奴而遠幾也爲主計􅀂此可謂忠乎世務第四十七大夫曰諸生妄言議者令可詳用無徒守椎車之語滑稽而不可修夫漢之有匈奴譬􅀂木之有蠧如人有疾不治則寖以深故謀臣以爲擊奪以困極之諸生言以德懷之此有其語而不可行也諸生上無以似三王下無以似近秦令有司可舉而行當世安蒸庻而寜邊境者乎文學曰昔齊􅁊公内附百姓外綏諸侯存亡接絶而天下從風其後德􅉛行衰葵丘少會振而矜之叛者九國春秋刺其不崇德而崇力也故任德則强楚告服遠國不召而自至任力則近者不親小國不附此其效也誠上觀三王之所以昌下論秦之所以亡中述齊􅁊所以興去武行文廢力尚德罷關梁除障塞以仁義導之則北垂無冦虜之憂中國無干戈之事矣大夫曰事不豫辯不可以應卒内無備不可以禦敵詩云誥爾民人謹爾侯度用戒不虞故有文事必有武備昔宋襄公倍楚而不備以取大辱焉身執囚而國幾亡故雖有誠信之心不知權變危亡之道也春秋不與夷狄中國爲禮爲其無信也匈奴貪狼因時而動乗可而發颷舉電至而欲以誠信之心金帛之寶而信無義之詐是猶親蹠蹻而扶猛虎也文學曰春秋王者無敵言其仁厚其德美天下賔服莫敢受交也德行延及方外舟車所臻足迹所及莫不􅀍澤蠻貊異國重譯自至方此之時天下和同君臣一德外内相信上下輯睦兵設而不試干戈閉藏而不用老子曰兕無所用其角螫蟲無所輸其毒故君仁莫不仁君義莫不義世安得跖蹻而親之乎大夫曰布心腹質情素信誠内感義形乎色宋華元楚司馬子反之相覩也符契内合誠有以相信也今匈奴挾不信之心懷不測之詐見利如前乗便而起潜進市側以襲無備是猶措重寶於道路而莫之守也求其不亡何可得乎文學曰誠信著乎天下醇德流乎四海則近者歌謳而樂之遠者執禽而朝之故正近者不以威來遠者不以武德義修而任賢良也故民之於事辭佚而就勞於財也辭多而就寡上下交讓道路鴈行方此之時賤貨而貴德重義而輕利賞之不􅀼何寶之守也和親第四十八大夫曰昔徐偃王行義而滅好儒而削知文而不知武知一而不知二故君子篤仁以行然必築城以自守設械以自備爲不仁者之害巳也是以古者蒐獮振旅而數軍實焉恐民之愉佚而亡戒難故兵革者國之用城壘者國之固也而欲罷之是去表見裏示匈奴心腹也匈奴輕舉潜進以襲空虚是猶不介而當矢石之蹊禍必不振此邉境之所懼而有司之所憂也文學曰往者通關梁交有無自單于以下皆親漢内附往來長城之下其後王恢誤謀馬邑匈奴絕和親故當路結禍紛挐而不解兵連而不息邉民不解甲弛弩行數十年介胄而耕耘鉏耰而候望燧燔烽舉丁壯弧弦而出鬬老者超越而入葆言之足以流涕寒心則仁者不􅃘也詩云投我以桃報之以李未聞善往而有惡來者故君子敬而無失與人恭而有禮四海之内皆爲兄弟也故内省不疚夫何憂何懼大夫曰自春秋諸夏之君會聚相結三會之後乖離相疑伐戰不止六國從親冠帶相接然未嘗有堅約况禽獸之國乎春秋存君在楚誥鼬之會書公紿夷狄也匈奴數和親而常先犯約貪侵盜驅長詐謀之國也反復無信百約百叛若朱􅁚之不移商均之不化而欲信其用兵之備親之以德亦難矣文學曰王者中立而聽乎天下德施方外絕國殊俗臻於􅆣庭鳳皇在列樹麒麟在郊藪群生庻物莫不被澤非足行而仁辦之也推其仁恩而皇之誠也范蠡出於越由余長於胡皆爲霸王賢佐故政有不從之敎而世無不可化之民詩云酌彼行潦挹彼注兹故公劉處戎狄戎狄化之大王去豳豳民随之周公修德而越裳氏來其從善如影響爲政務以德親近何憂於彼之不改鹽鐡論卷第八鹽鐡論卷第九繇役第四十九險固第五十論勇第五十一論功第五十二論鄒第五十三論菑第五十四繇役第四十九大夫曰屠者解分中理可橫以手而離也至其抽䈥鑿骨非行金斧不能決聖主循性而化有不從者亦將舉兵而征之是以湯誅葛伯文王誅犬夷及後戎狄猾夏中國不寜周宣王仲山甫式遏冦虐詩云薄伐獫狁至于太原出車彭彭城彼􅃋方自古明王不能無征伐而服不義不能無城壘而禦强􅁀也文學曰舜執干戚而有苗服文王底德而懷四夷詩云鎬京辟雍自西自東自􅀯自北無思不服普天之下惟人靣之倫莫不引領而歸其義故畫地爲境人莫之犯子曰白刃可冒中庸不可入至德之謂也故善攻不待堅甲而克善守不待渠梁而固武王之伐殷也執黃􅃏誓牧之野天下之士莫不願爲之用旣而偃兵搢笏而朝天下之民莫不願爲之臣旣以義取之以德守之秦以力取之以法守之本末不得故亡夫文猶可長用而武難乆行也大夫曰詩云獫狁孔熾我是用戒武夫潢潢經營四方故守禦征伐所由來乆矣春秋譏戎驪未至豫禦之故四支强而躬體固華葉茂而本根據故􅅚四境所以安中國也發戌漕所以審勞佚也主憂者臣勞上危者下死先帝憂百姓不贍出禁錢解乗輿驂貶樂損膳以賑窮備邉費未見報施之義而見沮成之理非所聞也文學曰周道衰王迹熄諸侯爭强大小相凌是以强國務侵弱國設備甲士勞戰陣役於兵革故君勞而民困苦也今中國爲一統而方内不安徭役遠而外内煩也古者無過年之繇無踰時之役今近者數千里遠者過萬里歴二期長子不還父母愁憂妻子詠歎憤懣之恨發動於心慕思之積痛於骨髓此枤杜采􅅔之所爲作也險固第五十大夫曰虎兕所以能執熊羆服群獸者爪牙利而攫便也秦所以超諸侯吞天下并敵國者險阻固而􅀔居然也故龜倡有介狐貉不能禽蝮蛇有螫人忌而不輕故有備則制人無備則制於人故仲山甫􅀘衮職之闕蒙公築長城之固所以備冦難而折衝萬里之外也今不固其外欲安其内猶家人不堅垣牆狗吠夜驚而闇昧妄行也文學曰秦左殽函右隴阺前蜀漢後山河四塞以爲固金城千里良將勇士設利噐而守陘隧墨子守雲梯之械也以爲雖湯武復生蚩尤復起不輕攻也然戍卒陳勝無將帥之任師旅之衆􅁬空拳而破百萬之師無牆籬之難故在德不在固誠以行義爲阻道德爲塞賢人爲兵聖人爲守則莫能入如此則中國無狗吠之警而邉境無鹿駭狼顧之憂矣夫何妄行之有乎大夫曰古者爲國必察土地山陵阻險天時地利然後可以王覇故制地城郭􅅚溝壘以禦冦固國春秋曰冬浚洙脩地利也三軍順天時以實擊虚然固於阻險敵於金城楚莊之圍宋秦師敗崤嶔崟是也故曰天時地利羗胡固近於邉今不敢取必爲四境長患此季孫之所以憂顓􅁷有勾踐之變而爲强吳之所悔也文學曰地利不如人和武力不如文德周之致遠不以地利以人和也百世不奪非以險以德也吳有三江五湖之難而兼於越楚有汝淵滿室之固而滅於秦秦有隴阺崤塞而亡於諸侯晉有河華九河而奪於六卿齊有泰山巨海而􅀒於田常桀紂有天下兼於濟亳秦王以六合困於陳渉非地利不固無術以守之也釋邇憂遠猶吳不内定其國而西絕淮山與齊晉争强也越因其罷擊其虚使吳王用申胥修德無恃極其衆則勾踐不免爲藩臣海崖何謀之敢慮也大夫曰楚自巫山起方城屬巫黔中設扞􅀜以拒秦秦包商洛崤函以禦諸侯韓阻宜陽伊􅆣要成臯太行以安周鄭魏濵洛築城阻山帶河以保晉國趙結飛狐句注孟門以存荆代燕塞碣石絕邪谷繞援遼齊撫阿甄關榮歴􅀝太山􅀒海河梁關者􅀖國之固而山川社稷之寶也徐人滅舒春秋謂之取惡其無備得物之易也故恤來兵仁傷刑君子爲國必有不可犯之難易曰重門擊柝以待􅁀客言備之素脩也文學曰阻險不如阻義昔湯以七十里爲政於天下舒以百里亡於敵國此其所以見惡也使關梁足恃六國不兼於秦河山足保秦不亡於楚漢由此觀之衝隆不足爲强高城不足爲固行善則昌行惡則亡王者􅀶愛遠施外内合同四海各以其職來􅀕何擊柝而待傳曰諸侯之有關梁庻人之有爵禄非升平之興盖自戰國始也論勇第五十一大夫曰荆軻懷數年之謀而事不就者三尺􅍰首不足恃也秦王憚於不意列斷賁育介七尺之利也使專諸空拳不免於爲禽要離無水不能遂其功世言强楚勁鄭有犀兕之甲棠谿之鋌也内㨿金城外任利兵是以威行諸夏强服敵國故孟賁􅁬臂衆人輕之怯夫有備其氣自倍况以吳楚之士舞利劍蹶强弩以與貉虜騁於中原一人當百不足道也夫如此則胡無守谷谿無交兵力不支漢其􅀔必降此商君之走魏而孫臏之破梁也文學曰楚鄭之棠谿墨陽非不利也犀䩜兕甲非不堅也然而不能存者利不足恃也秦兼六國之師據崤函而御宇内金石之固莫耶之利也然陳勝無士民之資甲兵之用鉏耰􅁄橿以破衝隆武昭不擊烏號不發所謂金城者非謂築壤而高土鑿地而深池也所謂利兵者非謂吳越之鋌干將之劍也言以道德爲城以仁義爲郭莫之敢攻莫之敢入文王是也以道德爲䩜以仁義爲劍莫之敢當莫之敢御湯武是也今不建不可攻之城不可當之兵而欲任匹夫之役而行三尺之刃亦細矣大夫曰荆軻提􅍰首入不測之强秦秦王惶恐失守備衞者皆懼專諸手劍􅊗萬乗刺吳王尸孽立正鎬冠千里聶政自衞由韓廷刺其主功成求得退自刑於朝􅁀尸於市今誠得勇士乗强漢之威凌無義之匈奴制其死命責以其過􅀂曹劌之􅀒齊􅁊公遂其求推鋒拊銳穹廬擾亂上下相遁因以輕銳隨其後匈奴必交臂不敢格也文學曰湯得伊尹以區區之亳兼臣海内文王得太公廓酆鄗以爲天下齊􅁊公得管仲以霸諸侯秦穆公得由余西戎八國服聞得賢聖而蠻貊來享未聞刼殺人主以懷遠也詩云惠此中國以綏四方故自彼氐羗莫敢不來王非畏其威畏其德也故義之服無義疾於原馬良􅃓德之召遠疾於馳傳重驛
