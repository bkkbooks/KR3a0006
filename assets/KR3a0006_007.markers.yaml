  - {type: variant, offset: 1823, length: 465, content: 而人不思之耳詩云求之不得寤寐思服有求如關雎好德如河廣何不濟不得之有故高山仰止景行行止雖不能及離道不遠也顏淵曰舜獨何人也回何人也夫思賢慕能從善不休則成康之俗可致而唐虞之道可及公卿未思也先王之道何遠之有齊桓公以諸侯思王政憂周室匡諸夏之難平夷狄之亂存亡接絕信義大行著于天下邵陵之會予之為主傳曰予積也故土積而成山阜水積而成江海行積而成君子孔子曰吾於河廣知德之至也而欲得之各反其本復諸古而已古者行役不踰時春行秋反秋行春來寒暑未變衣服不易固已還矣夫婦不失時人安和如適獄訟平刑罰得則陰陽調風雨時上不苛擾下不煩勞各修其業安其性則螟螣不生而水旱不起賦斂省而農不失時則百姓足而流人歸其田里上清靜而不欲則下廉而不貪若今則繇役極遠盡寒苦之地危難之處涉胡越之域今茲往而來歲旋父母延頸而西望男女怨曠而相思身在東楚志在西河故一人行而鄉曲恨一人死而萬人悲詩云王事靡盬不能藝稷黍父母何怙念彼恭人涕零如雨豈不懷歸畏此罪罟吏不奉法以存撫倍公任私各以其權充其嗜欲人愁苦而怨思上不恤理則惡政行而邪氣作邪氣作則蟲螟生而水旱起若此雖禱祀雩祝用事百神無時豈能調陰陽而息盜賊矣能言, SBCK: 除狹}
