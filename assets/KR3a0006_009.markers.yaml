  - {type: variant, offset: 1192, length: 360, content: 趙結飛狐句注孟門以存邢代燕塞碣石絕邪谷繞援遼齊撫阿甄關榮歷倚太山負海河關梁者邦國之固而山川者社稷之寶也徐人滅舒春秋謂之取惡其無備得物之易也故恤來兵仁傷刑君子為國必有不可犯之難易曰重門擊柝以待暴客言備之素脩也文學曰阻險不如阻義昔湯以七十里為政於天下舒以百里亡於敵國此其所以見惡也使關梁足恃六國不兼於秦河山足保秦不亡於楚漢由此觀之衝隆不足為強高城不足為固行善則昌行惡則亡王者博愛遠施外內合同四海各以其職來祭何擊柝而待傳曰諸侯之有關梁庶人之有爵祿非升平之興蓋自戰國始也論勇第五十一大夫曰荊軻懷數年之謀而事不就者尺八匕首不足恃也秦王憚於不意列斷賁育者介七尺之利也使專諸空拳不免於為禽要離無水不能遂其功世言強楚勁鄭有犀兕之甲棠谿之鋌也內據金城外任利兵是以威行諸夏強服敵國故孟賁奮臂眾人輕之怯夫有備其氣自倍況以吳楚之士舞利劍蹶強弩以, WYG: ''}
