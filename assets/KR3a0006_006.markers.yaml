  - {type: variant, offset: 4160, length: 1, content: 優, SBCK: 飬親雖欲以禮非其貴也文學曰無其能而竊其位無其功而有其禄雖有富貴由蹠蹻之養也高䑓極望食案方丈而不可謂孝老親之腹非盜嚢也何故常盛不道之物夫取非有非職財入而患從之}
