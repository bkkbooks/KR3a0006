  - {type: variant, offset: 4441, length: 2, content: 徐穀, krp: 之劒可負而㧞王從其計軻不解琴故及於難使專諸空拳不免於為禽左傳作鱄設諸禽通作擒要離無水不能遂其功刺客傳曰伍子胥知公子光之欲殺呉王僚乃曰彼光將有内志未可說以外事乃進專諸於公子光光既得專諸善客待之九年而楚平王死春呉王僚欲因楚䘮使其二弟公子盖餘屬庸將兵圍楚之潜使延陵季子於晉以觀諸侯之變楚發兵絶呉將盖餘屬庸路呉兵不得還於是公子光謂專諸曰此時不可失不求何獲且光真王嗣當立季子雖來不吾廢也專諸曰王僚可殺也母老子弱而兩弟將兵伐楚楚絶其後方今呉外困於楚而内空無骨鯁之臣是無如我何公子光頓首曰光之身子之身也四月丙子光伏甲士於窟室中而具酒請王僚王僚使兵陳自宫至光之家門戸階陛左右皆王僚之親戚也夾立侍皆持長鈹酒既酣公子光為足疾入窟室中使專諸置匕首魚炙之腹中而進之既至王前專諸擘魚因以匕首刺王僚王僚立死左右亦殺專諸王人擾亂公子光出其伏甲以攻王僚}
  - {type: variant, offset: 4445, length: 0, content: '', WYG: 盡滅之遂自立為王是為闔閭乃封專諸之子以為上卿呉越春秋曰呉王欲殺王子慶忌而莫之能殺呉王患之要離曰臣能之呉王曰汝惡能乎吾嘗以六馬逐之江上矣而不能及射之矢左右滿把而不能中今汝㧞劒則不能舉臂上車則不能登軾汝惡能要離曰士患不勇耳奚患而不能王誠能助臣請必能呉王曰諾明旦加要離罪焉摯執妻子焚之而揚其灰要離走往見王子慶忌於衞王子慶忌喜曰呉王之無道也子之所見也諸侯之所知也今子得免而去之亦善矣要離與王子慶忌居有間謂王子慶忌曰呉之無道也愈甚請與王子往奪之國王子慶忌曰善乃與要離俱渉於江中江㧞劒以刺王子慶忌捽之投之於江浮則又取而投之如此者三其卒曰汝天下之國士也幸汝以成而名要離得不死歸於呉呉王大說請與分國要離曰不可臣請必死呉王止之要離曰夫殺妻子焚之而揚其灰以便事也臣以為不仁夫為故主殺新主臣以為不義夫捽而浮乎江三入三出特王子慶忌為之賜而不殺耳臣已為辱矣夫不仁不義又且已辱不可以生呉王不能止果仗劒而死要離可謂不為賞動矣故臨大利而不易其義可謂廉矣亷故不以富貴而忘其辱世言强楚勁鄭有犀兕之甲棠谿之鋌音挺也内據金城外任利兵是以威行諸夏强服敵國故孟賁奮臂衆人輕之怯夫有備其氣自倍語曰騏驥之衰也駑馬先之孟賁之倦也女子勝之况以呉楚之士舞利劒蹶音决强弩以與貉虜騁音逞於中原一人當百不足道也夫音扶如此則胡無守谷谿無交兵力不支漢其勢必降此商君之走魏而孫臏之破梁也衞鞅傳曰孝公二十二年使衞鞅將而伐魏魏使公子卬將而擊之軍既相距衞鞅遺魏將公子卬書曰吾始與公子驩今俱為兩國將不忍相攻可與公子曲相見盟樂飲而罷兵以安秦魏魏公子卬以為然㑹盟已飲而衞鞅伏甲士而襲虜魏公子卬因攻其軍盡破之以歸秦魏惠王兵數破於齊秦國内空日以削恐乃使使割西河之地獻於秦以和而魏遂去安邑徙都大梁孫臏傳曰宣王二年魏與趙攻韓韓告急於齊齊使田忌將而往直走大梁魏將龎涓聞之去韓而歸齊軍既已過而西矣孫子謂田忌曰彼三晋之兵素悍勇而輕齊齊號為怯善戰者因其勢而利導之兵法百里而趨利者蹶上將三十里而趨利者軍半至使齊軍入魏地為十萬竈明日為五萬竈龎涓行三日大喜曰我固知齊軍怯入吾地三日士卒亡者過半矣乃棄其歩軍與其輕銳倍日并行逐之孫子度其行暮當至馬陵馬陵道狹而旁多阻隘可伏兵乃斫大樹白而書之曰龎涓死於此樹之下於是令齊軍善射者萬弩夾道而伏期日暮見火舉而俱發龎涓果夜至斫木下見白書乃鑚火燭之讀其書未畢齊軍萬弩俱發魏軍大}
