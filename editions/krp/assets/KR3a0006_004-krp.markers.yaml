  - {type: variant, offset: 6840, length: 485, content: 漢紀曰征和四年捜粟都尉桑𢎞羊與御史大夫奏言故輪臺以東皆故國處有灌溉田其旁小國少錐刀貴黄鐵綿繒可以易榖臣愚以為可遣屯田詣輪臺置校尉二人通利溝渠田一歳有積穀募民敢徙者詣田所就畜積為産業稍稍築亭連城而西以威西國輔烏孫為便事上上乃下詔深陳既往之悔曰前有司則欲益民賦以助邉用是困老弱孤獨也今又請田輪臺曩者朕之不明興師逺攻遣貳師將軍古者出師卿大夫與謀参以蓍龜不吉不行乃者遍召羣臣又筮之卦得大過爻在九五曰匈奴困敗方士占星氣太卜蓍龜皆為吉匈奴必破時不可失卜諸將貳師最吉朕親發貳師詔之必無深入今計謀卦兆皆反謬貳師軍敗士卒離散略盡悲痛常在朕心今有司請逺田輪臺欲起亭燧是唯益擾天下非所以憂民也朕不忍聞當今務在禁苛暴止擅賦務本勸農無乏武備而已由是不復出軍封丞相為富民侯而勸耕農自是田多墾闢而兵革休息善謀篇曰孝武皇帝自將師伏兵於馬邑誘致單于單于既入塞道覺之奔走而去其後交兵接刄結怨連禍相攻撃十年兵凋民勞百姓空虗道殣相望槥車相屬冦盗滿山天下搖動孝武皇帝後悔之御史大夫桑𢎞羊請佃輪臺詔卻曰當今之務務在禁暴止擅賦今乃逺西佃非所以慰民也朕不忍聞封丞相號曰富民侯遂不復言兵事國家以寧繼嗣以定從韓安國之本謀也, SBCK: ''}
