body:
  text: 鹽鐵論卷六散不足第二十九大夫曰吾以賢良為少愈乃反其幽明若胡車相隨而鳴諸生獨不見季夏之螇乎音聲入耳秋風至而聲無者生無易由言不顧其患患至而後默晚矣賢良曰孔子讀史記喟然而歎傷正德之廢君臣之危也夫賢人君子以天下為任者也任大者思遠思遠者忘近誠心閔悼惻隱加爾故忠心獨而無累此詩人所以傷而作比干子胥遺身忘禍也其惡勞人若斯之急安能默乎詩云憂心如惔不敢戲談孔子栖栖疾固也墨子遑遑閔世也大夫默然丞相曰願聞散不足賢良曰宮室輿馬衣服器械喪祭食飲聲色玩好人情之所不能已也故聖人為之制度以防之間者士大夫務於權利怠於禮義故百姓倣傚頗踰制度今故陳之曰古者穀物菜果不時不食鳥獸魚鱉不中殺不食故徼罔不入於澤雜毛不取今富者逐驅殲罔罝掩捕麑鷇躭湎沉酒鋪百川鮮羔䍮幾胎肩皮黃口春鵝秋雛冬葵溫韭浚茈蓼蘇蕈䓴耳菜毛果蟲貉古者采椽茅茨陶桴復冗穴足禦寒暑蔽風雨而已及其後世采椽不斲茅茨不剪無斲削之事磨礱之功大夫達棱楹士穎首庶人斧成木構而已今富者井幹增梁雕文檻楯琧㡪壁飾古者衣服不中制器械不中用不粥於市今民間雕琢不中之物刻畫玩好無用之器玄黃雜青五色繡衣戲弄蒲人雜婦百獸馬戲鬭虎唐銻追人奇蟲胡妲古者諸侯不秣馬天子有命以車就牧庶人之乘馬者足以代其勞而已故行則服枙止則就犁今富者連車列騎驂貳輜軿中者微輿短轂䋣髦掌蹄夫一馬伏櫪當中家六口之食亡丁男一人之事古者庶人耋老而後衣絲其餘則麻枲而已故命曰布衣及其後則絲裏枲表直領無褘袍合不緣夫羅紈文繡者人君后妃之服也繭紬縑練者婚姻之嘉飾也是以文繒薄織不粥於市今富者縟繡羅紈中者素綈冰錦常民而被后妃之服褻人而居婚姻之飾夫紈素之賈倍縑縑之用倍紈也古者椎車無柔棧輿無植及其後木軨不衣長轂數幅蒲薦苙蓋蓋無漆絲之飾大夫士則單複木具盤韋柔革常民漆輿大軨蜀輪今庶人富者銀黃華左搔結綏韜杠中者錯鑣塗采珥靳飛軨古者鹿裘皮冒蹄足不去及其後大夫士狐貉縫腋羔麑豹袪庶人則毛絝衳彤羝襆皮䙏今富者鼲鼦狐白鳧翁中者罽衣金縷燕䶅代黃古者庶人賤騎繩控革鞮皮薦而已及其後革鞍氂成鐵鑣不飾今富者耳銀鑷䪉黃金琅勒罽繡弇汗華䩸明鮮中者漆韋紹系采畫暴乾古者汙尊抔飲蓋無爵觴樽俎及其後庶人器用即竹柳陶匏而已唯瑚璉觴豆而後彫文彤漆今富者銀口黃耳金罍玉鍾中者野王紵器金錯蜀杯夫一文杯得銅杯十賈賤而用不殊箕子之譏始在天子今在匹夫古者燔黍食稗而捭豚以相饗其後鄉人飲酒老者重豆少者立食一醬一肉旅飲而已及其後賓婚相召則豆羹白飯綦膾熟肉今民間酒食殽旅重疊燔炙滿案臑鱉膾鯉麑卵鶉鴳橙枸鮐醴醢醯眾物雜味古者庶人春夏耕耘秋冬收藏昏晨力作夜以繼日詩云晝爾于茅宵爾索綯亟其乘屋其始播百穀非膢臘不休息非祭祀無酒肉今賓昏酒食接連相因析酲什半棄事相隨慮無乏日古者庶人糲食藜藿非鄉飲酒膢臘祭祀無酒肉故諸侯無故不殺牛羊大夫士無故不殺犬豕今閭巷縣佰阡伯屠沽無故烹殺相聚野外負粟而往挈肉而歸夫一豕之肉得中年之收十五斗粟當丁男半月之食古者庶人魚菽之祭春秋脩其祖祠士一廟大夫三以時有事于五祀蓋無出門之祭今富者祈名嶽望山川椎牛擊鼓戲倡儛像中者南居當路水上雲臺屠羊殺狗鼓瑟吹笙貧者雞豕五芳衛保散臘傾蓋社場古者德行求福故祭祀而寬仁義求吉故卜筮而希今世俗寬於行而求於鬼怠於禮而篤於祭嫚親而貴勢至妄而信日聽訑言而幸得出實物而享虛福古者君子夙夜孳孳思其德小人晨昏孜孜思其力故君子不素飡小人不空食今世俗飾偽行詐為民巫祝以取釐謝堅頟健舌或以成業致富故憚事之人釋本相學是以街巷有巫閭里有祝古者無杠樠之寢床栘之案及其後世庶人即采木之杠牒樺之樠士不斤成大夫葦莞而已今富者黼繡帷幄塗屏錯跗中者錦綈高張采畫丹漆古者皮毛草蓐無茵席之加旃蒻之美及其後大夫士復薦草緣蒲平單莞庶人即草蓐索經單藺蘧蒢而已今富者繡茵翟柔蒲子露床中者𤡉皮代旃闒坐平莞古者不粥飪不市食及其後則有屠沽沽酒市脯魚鹽而已今熟食徧列殽施成市作業墮怠食必趣時楊豚韭卵狗䐲馬朘煎魚切肝羊淹雞寒挏馬酪酒蹇捕胃脯胹羔豆賜鷇膹鴈羹臭鮑甘瓠熟粱貊炙古者土鼓凷枹擊木拊石以盡其歡及其後卿大夫有管磬士有琴瑟往者民間酒會各以黨俗彈箏鼓缶而已無要妙之音變羽之轉今富者鐘鼓五樂歌兒數曹中者鳴竽調瑟鄭儛趙謳古者瓦棺容尸木板堲周足以收形骸藏髮齒而已及其後桐棺不衣采椁不斲今富者繡牆題湊中者梓棺楩椁貧者畫荒衣袍繒囊緹橐古者明器有形無實示民不可用也及其後則有醯醢之藏桐馬偶人彌祭其物不備今厚資多藏器用如生人郡國繇吏素桑楺偶車櫓輪匹夫無貌領桐人衣紈綈古者不封不樹反虞祭於寢無壇宇之居廟堂之位及其後則封之庶人之墳半仞其高可隱今富者積土成山列樹成林臺榭連閣集觀增樓中者祠堂屏閤垣闕罘罳古者鄰有喪舂不相杵巷不歌謠孔子食於有喪者之側未嘗飽也子於是日哭則不歌今俗因人之喪以求酒肉幸與小坐而責辨歌舞俳優連笑伎戲古者男女之際尚矣嫁娶之服未之以記及虞夏之後蓋表布內絲骨笄象珥封君夫人加錦尚褧而已今富者皮衣朱貉繁露環佩中者長裾交褘璧瑞簪珥古者事生盡愛送死盡哀故聖人為制節非虛加之今生不能致其愛敬死以奢侈相高雖無哀戚之心而厚葬重幣者則稱以為孝顯名立於世光榮著於俗故黎民相慕效至於發屋賣業古者夫婦之好一男一女而成家室之道及後士一妾大夫二諸侯有姪娣九女而已今諸侯百數卿大夫十數中者侍御富者盈室是以女或曠怨失時男或放死無匹古者凶年不備豐年補敗仍舊貫而不改作今工異變而吏殊心壞敗成功以匿厥意意極乎功業務存乎面目積功以市譽不恤民之急田野不辟而飾亭落邑居丘墟而高其郭古者不以人力徇於禽獸不奪民財以養狗馬是以財衍而力有餘今猛獸奇蟲不可以耕耘而令當耕耘者養食之百姓或短褐不完而犬馬衣文繡黎民或糟糠不接而禽獸食粱肉古者人君敬事愛下使民以時天子以天下為家臣妾各以其時供公職古今之通義也今縣官多畜奴婢坐稟衣食私作產業為姦利力作不盡縣官失實百姓或無斗筲之儲官奴累百金黎民昏晨不釋事奴婢垂拱遨遊也古者親近而䟽遠貴所同而賤非類不賞無功不養無用今蠻貊無功縣官居肆廣屋大第坐稟衣食百姓或旦暮不贍蠻夷或厭酒肉黎民泮汗力作今蠻夷交脛肆踞古者庶人麤菲草芰縮絲尚韋而已及其後則綦下不借鞔鞮革舄今富者革中名工輕靡使容紈裏紃下越端縱緣中者鄧里間作蒯苴蠢豎婢妾韋沓絲履走者茸芰絇綰古聖人勞躬養神節欲適情尊天敬地履德行仁是以上天歆焉永其世而豐其年故堯秀眉高彩享國百載及秦始皇覽怪迂信禨祥使盧生求羡門高徐市等入海求不死之藥當此之時燕齊之士釋鋤耒爭言神仙方士於是趣咸陽者以千數言仙人食金飲珠然後壽與天地相保於是數巡狩五嶽濱海之館以求神仙蓬萊之屬數幸之郡縣富人以貲佐貧者築道旁其後小者亡逃大者藏匿吏捕索掣頓不以道理名宮之旁廬舍丘落無生苗立樹百姓離心怨思者十有半書曰享多儀儀不及物曰不享故聖人非仁義不載於己非正道不御於前是以先帝誅文成五利等宣帝建學官親近忠良欲以絕怪惡之端而昭至德之塗也宮室奢侈林木之蠹也器械雕琢財用之蠹也衣服靡麗布帛之蠹也狗馬食人之食五穀之蠹也口腹從恣魚肉之蠹也用費不節府庫之蠹也漏積不禁田野之蠹也喪祭無度傷生之蠹也墮成變故傷功工商上通傷農故一杯棬用百人之力一屏風就萬人之功其為害亦多矣目脩於五色耳營於五音體極輕薄口極甘脆功積於無用財盡於不急口腹不可為多故國病聚不足即政怠人病聚不足則身危丞相曰治聚不足奈何救匱第三十賢良曰蓋橈枉者過直救文者以質昔者晏子相齊一狐裘三十載故民奢示之以儉民儉示之以禮方今公卿大夫子孫誠能節車輿適衣服躬親節儉率以敦朴罷園池損田宅內無事乎市列外無事乎山澤農夫有所施其功女工有所粥其業如是則氣脈和平無聚不足之病矣大夫曰孤子語孝躄者語杖貧者語仁賤者語治議不在己者易稱從旁議者易是其當局則亂故公孫弘布被倪寬練袍衣若僕妾食若庸夫淮南逆於內蠻夷暴於外盜賊不為禁奢侈不為節若疫歲之巫徒能鼓口耳何散不足之能治乎賢良曰高皇帝之時蕭曹為公滕灌之屬為卿濟濟然斯則賢矣文景之際建元之始大臣尚有爭引守正之義自此之後多承意從欲少敢直言面議而正刺因公而徇私故武安丞相訟園田爭曲直人主之前夫九層之臺一傾公輸子不能正本朝一邪伊望不能復故公孫丞相倪大夫側身行道分祿以養賢卑己以下士功業顯立日力不足無行人子產之繼而葛繹彭侯之等隳壞其緒紕亂其紀毀其客館議堂以為馬廄婦舍無養士之禮而尚驕矜之色廉恥陵遲而爭於利矣故良田廣宅民無所之不恥為利者滿朝市列田畜者彌郡國橫暴掣頓大第巨舍之旁道路且不通此固難醫而不可為工大夫勃然作色默而不應箴石第三十一丞相曰吾聞諸鄭長者曰君子正顏色則遠暴嫚出辭氣則遠鄙倍矣故言可述行可則此有司夙昔所願覩也若夫劍客論博奕辯盛色而相蘇立權以不相假使有司不能取賢良之議而賢良文學被不遜之名竊為諸生不取也公孫龍有言曰論之為道辯故不可以不屬意屬意相寬相寬其歸爭爭而不讓則入於鄙今有司以不仁又蒙素飡無以更責雪恥矣縣官所招舉賢良文學而及親民偉仕亦未見其能用箴石而醫百姓之疾也賢良曰賈生有言曰懇言則辭淺而不入深言則逆耳而失指故曰談何容易談且不易而況行之乎此胡建所以不得其死而吳得幾不免於患也語曰五盜執一良人枉木惡直繩今欲下箴石通關鬲則恐有盛胡之累懷箴橐艾則被不工之名狼跋其胡載踕其尾君子之路行止之道固狹耳此子石所以歎息也除狹第三十二大夫曰賢者處大林遭風雷而不迷愚者雖處平敞大路猶暗惑焉今守相親剖符贊拜蒞一郡之眾古方伯之位也受命專制宰割千里不御於內善惡在於己己不能故耳道何狹之有哉賢良曰古之進士也鄉擇而里選論其才能然後官之勝職任然後爵而祿之故士修之鄉曲升諸朝廷行之幽隱明足顯著䟽遠無失士小大無遺功是以賢者進用不肖者簡黜今吏道雜而不選富者以財賈官勇者以死射功戲車鼎躍咸出補吏累功積日或至卿相垂青繩擐銀龜擅殺生之柄專萬民之命弱者猶使羊將狼也其亂必矣強者則是予狂夫利劍也必妄殺生也是以往者郡國黎民相乘而不能理或至鋸頸殺不辜而不能正執綱紀非其道蓋博亂愈甚古者封賢祿能不過百里百里之中而為都疆垂不過五十猶以為一人之身明不能照聰不得達故立卿大夫士以佐之而政治乃備今守相或無古諸侯之賢而蒞千里之政主一郡之眾施聖主之德擅生殺之法至重也非仁人不能任非其人不能行一人之身治亂在己千里與之轉化不可不熟擇也故人主有私人以財不私人以官縣賞以待功序爵以俟賢舉善若不足黜惡若仇讎固為其非功而殘百姓也夫輔主德開臣途在於選賢而器使之擇練守相然後任之疾貪第三十三大夫曰然為醫以拙矣又多求謝為吏既多不良矣又侵漁百姓長吏厲諸小吏小吏厲諸百姓故不患擇之不熟而患求之與得異也不患其不足也患其貪而無厭也賢良曰古之制爵祿也卿大夫足以潤賢厚士士足以優身及黨庶人為官者足以代其耕而食其祿今小吏祿薄郡國繇役遠至三輔粟米貴不足相贍常居則匱於衣食有故則賣畜粥業非徒是也繇吏相遣官庭攝追小計權吏行施乞貸長吏侵漁上府下求之縣縣求之鄉鄉安取之哉語曰貨賂下流猶水之赴下不竭不止今大川江河飲巨海巨海受之而欲谿谷之讓流潦百官之廉不可得也夫欲影正者端其表欲下廉者先之身故貪鄙在率不在下教訓在政不在民也大夫曰賢不肖有質而貪鄙有性君子內潔己而不能純教於彼故周公非不正管蔡之邪子產非不正鄧晳之偽也夫內不從父兄之教外不畏刑法之罪周公子產不能化必也今一一則責之有司有司豈能縛其手足而使之無為非哉賢良曰駟馬不馴御者之過也百姓不治有司之罪也春秋刺譏不及庶人責其率也故古者大夫將臨刑聲色不御刑以當矣猶三巡而嗟嘆之其恥不能以化而傷其不全也政教闇而不著百姓顛蹶而不扶猶赤子臨井焉聽其入也若此則何以為民父母故君子急於教緩於刑刑一而正百殺一而慎萬是以周公誅管蔡而子產誅鄧晳也刑誅一施民遵禮義矣夫上之化下若風之靡草無不從教何一一而縛之也後刑第三十四大夫曰古之君子善善而惡惡人君不畜惡民農夫不畜無用之苗無用之苗苗之害也無用之民民之賊也鉏一害而眾苗成刑一惡而萬民悅雖周公孔子不能釋刑而用惡家之有姐子器皿不居況姐民乎民者敖於愛而聽刑故刑所以正民鉏所以別苗也賢良曰古者篤教以導民明辟以正刑刑之於治猶策之於御也良工不能無策而御有策而勿用聖人假法以成教教成而刑不施故威厲而不殺刑設而不犯今廢其紀綱而不能張壞其禮義而不能防民陷於罔從而獵之以刑是猶開其闌牢發以毒矢也不盡不止曾子曰上失其道民散久矣如得其情即哀矜而勿喜夫不傷民之不治而伐己之能得姦猶弋者覩鳥獸挂罻羅而喜也今天下之被誅者不必有管蔡之邪鄧晳之偽恐苗盡而不別民欺而不治也孔子曰人而不仁疾之已甚亂也故民亂反之政政亂反之身身正而天下定是以君子嘉善而矜不能恩及刑人德潤窮夫施惠悅爾行刑不樂也授時第三十五大夫曰共其地居是世也非有災害疾疫獨以貧窮非惰則奢也無奇業旁入而猶以富給非儉則力也今曰施惠悅爾行刑不樂則是閔無行之人而養惰奢之民也故妄予不為惠惠惡者不為仁賢良曰三代之盛無亂萌教也夏商之季世無順民俗也是以王者設庠序明教化以防道其民及政教之洽性仁而喻善故禮義立則耕者讓於野禮義壞則君子爭於朝人爭則亂亂則天下不均故或貧或富富則仁生贍則爭止昏暮叩人門戶求水火貪夫不恡何則所饒也夫為政而使菽粟如水火民安有不仁者乎大夫曰博戲馳逐之徒皆富人子弟非不足者也故民饒則僣侈富則驕奢坐而委蛇起而為非未見其仁也夫居事不力用財不節雖有財如水火窮乏可立而待也有民不畜有司雖助之耕織其能足之乎賢良曰周公之相成王也百姓饒樂國無窮人非代之耕織也易其田疇薄其稅歛則民富矣上以奉君親下無饑寒之憂則教可成也語曰既富矣又何加焉曰教之教之以德齊之以禮則民徙義而從善莫不入孝出悌夫何奢侈暴慢之有乎管子曰倉廩實而知禮節百姓足而知榮辱故富民易與適禮難與適道大夫曰縣官之於百姓若慈父之於子也忠焉能勿誨乎愛之而勿勞乎故春親耕以勸農賑貸以贍不足通滀水出輕繫使民務時也蒙恩被澤而至今猶以貧困其難與適道若是夫賢良曰古者春省耕以補不足秋省歛以助不給民勤於財則貢賦省民勤於力則功築罕為民愛力不奪須臾故召伯聽斷於甘棠之下為妨農業之務也今時雨澍澤種懸而不得播秋稼零落乎野而不得收田疇赤地而停落成市發春而後懸青幡而策土牛殆非明主勸耕稼之意而春令之所謂也水旱第三十六大夫曰禹湯聖主后稷伊尹賢相也而有水旱之災水旱天之所為饑穰陰陽之運也非人力故太歲之數在陽為旱在陰為水六歲一饑十二歲一荒天道然殆非獨有司之罪也賢良曰古者政有德則陰陽調星辰理風雨時故行修於內聲聞於外為善於下福應於天周公載紀而天下太平國無夭傷歲無荒年當此之時雨不破塊風不鳴條旬而一雨雨必以夜無丘陵高下皆熟詩曰有渰萋萋興雨祁祁今不省其所以然而曰陰陽之運也非所聞也孟子曰野有餓殍不知收也狗豕食人食不知檢也為民父母民饑而死則曰非我也歲也何異乎以刃殺之則曰非我也兵也方今之務在除饑寒之患罷鹽鐵退權利分土地趣本業養桑麻盡地力也寡功節用則民自富如是則水旱不能憂凶年不能累也大夫曰議者貴其辭約而指明可於眾人之聽不至繁文稠辭多言害有司化俗之計而家人語陶朱為生本末異徑一家數事而治生之道乃備今縣官鑄農器使民務本不營於末則無饑寒之累鹽鐵何害而罷賢良曰農天下之大業也鐵器民之大用也器用便利則用力少而得作多農夫樂事勸功用不具則田疇荒穀不殖用力鮮功自半器便與不便其功相什而倍也縣官鼓鑄鐵器大抵多為大器務應員程不給民用民用鈍弊割草不痛是以農夫作劇得獲者少百姓苦之矣大夫曰卒徒工匠以縣官日作公事財用饒器用備家人合會褊於日而勤於用鐵力不銷鍊堅柔不和故有司請總鹽鐵一其用平其賈以便百姓公私雖虞夏之為治不易於此吏明其教工致其事則剛柔和器用便此則百姓何苦而農夫何疾賢良曰卒徒工匠故民得占租鼓鑄煮鹽之時鹽與五穀同賈器和利而中用今縣官作鐵器多苦惡用費不省卒徒煩而力作不盡家人相一父子戮力各務為善器器不善者不集農事急輓運衍之阡陌之間民相與市買得以財貨五穀新幣易貨或時貰民不棄作業置田器各得所欲更繇省約縣官以徒復作繕治道橋諸發民便之今總其原一其賈器多堅䃘善惡無所擇吏數不在器難得家人不能多儲多儲則鎮生棄膏腴之日遠市田器則後良時鹽鐵賈貴百姓不便貧民或木耕手耨土耰淡食鐵官賣器不售或頗賦與民卒徒作不中呈時命助之發徵無限更繇以均劇故百姓疾苦之古者千室之邑百乘之家陶冶工商四民之求足以相更故農民不離畦畝而足乎田器工人不斬伐而足乎材木陶冶不耕田而足乎粟米百姓各得其便而上無事焉是以王者務本不作末去炫燿除雕琢湛民以禮示民以樸是以百姓務本而不營於末
