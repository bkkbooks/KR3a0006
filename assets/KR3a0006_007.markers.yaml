  - {type: variant, offset: 1365, length: 1, content: 更, SBCK: 大議竊所以聞閭里長老之言往者常民衣服温暖而不靡噐質朴牢而致用衣足以蔽體噐足以便事馬足以易歩車足以自載酒足以合歡而不湛樂足以理心而不淫入無宴樂之聞出無佚遊之觀行即􅀒羸止作鋤耘用約而財饒本修而民富送死哀而不華養生}
  - {type: page-break, offset: 1365, content: '', id: KR3a0006_SBCK_005-24a}
  - {type: punctuation, offset: 1367, content: ，, id: KR3a0006_tls_007-bkkpn321}
  - {type: 'tls:seg', offset: 1367, content: '', id: KR3a0006_tls_007-14a.10}
  - {type: variant, offset: 1367, length: 0, content: '', SBCK: 而不奢大臣正而無欲執政寛而不苛故􅀺民寜其性百吏保其官建元始崇文修德天下乂安其後邪臣各以􅇊藝􅉛亂至治外障山海内興諸利楊可勝告緡江充禁服張大夫革令杜周治獄罰贖科適㣲細並行不可勝載夏蘭之屬妄􅅮王温舒之徒妄殺殘吏萠起擾亂良民當此之時百姓不保其首領豪富莫必其族姓聖主􅁴焉乃刑戮充等誅滅殘賊以殺死罪之怨塞天下之責故居民肆然復安然其禍累世不復瘡痍至今未息故百官尚有殘疾之政而强宰尚有强奪之心大臣擅權而斷擊豪猾}
  - {type: page-break, offset: 1367, content: '', id: KR3a0006_SBCK_005-24b}
  - {type: variant, offset: 1368, length: 2, content: 發則, SBCK: 黨而侵陵富貴奢侈貧賤􅆲殺女工難成而易弊車器難就而易敗車不累朞器不終歳一車千石一衣十鍾常}
  - {type: variant, offset: 1371, length: 0, content: '', SBCK: 文杯畫案几席緝􅗿婢妾衣紈􅂂􅁝匹庻粺飯肉食里有俗黨有塲康莊馳逐窮巷蹹鞠秉耒抱挿躬耕身織者寡娶要歛從容􅀓白黛靑者衆無而爲有貧而强夸文表無裏紈袴枲裝生}
  - {type: page-break, offset: 1371, content: '', id: KR3a0006_SBCK_005-25a}
  - {type: variant, offset: 1372, length: 1, content: 堪, SBCK: 養死厚送葬死殫家遣女滿車冨者欲過貧者欲及富者空藏貧者稱貸是以民年急而歳促貧即寡耻乏即少廉此所以刑非誅惡而姦猶不止也故國有嚴不急之徴即生前不足疾矣鹽鐡論卷第五鹽鐡論卷第六散不足二十九救匱三十鹽鐡箴石三十一除狹三十二疾貪三十三後刑三十四授時三十五水旱三十六散不足第二十九大夫曰吾以賢良爲少愈乃反}
  - {type: page-break, offset: 1372, content: '', id: KR3a0006_SBCK_005-25b}
