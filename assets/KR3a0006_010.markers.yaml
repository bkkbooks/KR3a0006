  - {type: variant, offset: 4394, length: 0, content: '', krp: 為闗中之固金城千里子孫帝王萬世之業也始皇旣沒餘威振于殊俗然而陳涉甕牗䋲樞之子氓𨽻之人而遷徙之徒也材能不及非有仲弓墨翟之賢陶朱猗頓之富躡足行伍之間俛起阡陌之中卒疲散之卒轉而攻秦斬木為兵揭竿為旗天下雲合而響應褁糧而景從山東豪傑遂並起而亡秦族矣故在徳不在固誠以行去聲義為阻道徳為塞賢人為兵聖人為守則莫能入如此則中國無狗吠之警而邊境無鹿駭狼顧之憂矣夫音扶何妄行之有乎魏武侯浮西河而下中流顧謂呉起曰美哉乎河山之固也此魏國之寳也呉起對曰在徳不在險昔三苗氏左洞庭右彭蠡徳義不修而舜滅之夏桀之居左河濟右太華伊闕在其南羊腸在其北修政不仁湯放之殷紂之國左孟門而右太行常山在其北大河經其南修政不徳武王伐之由此觀之在徳不在險若君不修徳船中之人盡敵國也武侯曰善左思曰劒閣雖嶛憑之者蹶非所以深根固蔕也洞庭雖濬負之者北非所以愛人}
  - {type: punctuation, offset: 4395, content: ，, id: KR3a0006_tls_010-bkkpn974}
  - {type: 'tls:seg', offset: 4395, content: '', id: KR3a0006_tls_010-32a.7}
  - {type: variant, offset: 4395, length: 0, content: '', WYG: 國也詩傳曰今有堅甲利兵不足以施敵破虜弓良矢調不足射逺中微與無兵等爾有民不足强用嚴敵與無民等爾故盤石千里不為有地愚民百萬不為有民詩曰維南有箕不可以簸揚維北有斗不可以挹酒漿莊辛曰居不為垣墻人莫能毁傷行不從周衞人莫能暴害此君子之行也大夫曰古者為國必察土地山陵阻險天時地利然後可以王伯音霸故制地城郭飭溝壘音磊以禦冦固國春秋曰冬浚洙音朱修地利也春秋曰冬浚洙公羊傳曰洙者何水也浚之者何深之也曷為深之畏齊也曷為畏齊辭殺子紏也穀梁傳曰浚洙者深洙也著力不足也三軍順天時以實擊虚然固於阻險敵於金城楚莊之圍宋秦師敗崤音爻嶔音欽巖}
