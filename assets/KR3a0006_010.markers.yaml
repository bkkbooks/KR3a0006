  - {type: variant, offset: 1875, length: 0, content: '', WYG: 性善非得明王聖主扶携内之以道則不成為君子詩曰天生蒸民其命匪諶靡不有初鮮克有終言惟明王聖主然後使之然也詩云酌彼行潦挹彼注兹故公劉處戎狄戎狄化之大王去豳豳民隨之周公修徳}
  - {type: variant, offset: 1875, length: 0, content: '', krp: 性善非得明王聖主扶携内之以道則不成為君子詩曰天生蒸民其命匪諶靡不有初鮮克有終言惟明王聖主然後使之然也詩云酌彼行潦挹彼注兹故公劉處戎狄戎狄化之大王去豳豳民隨之周公修徳}
  - {type: variant, offset: 1876, length: 0, content: '', WYG: 越裳氏來周紀曰公劉雖在戎狄之間復修后稷之業務耕種行地宜自漆沮渡渭取財用行者有資居者有畜積民頼其慶百姓懐之多徙而保歸焉周道之興自此始故詩人歌樂思其徳道應篇曰大王亶父居邠翟人攻之事之以皮帛珠玉而弗受曰翟人之所求者地無以財物為也大王亶父曰與人之兄居而殺其弟與人之父處而殺其子弗為皆勉處矣為吾臣與翟人奚以異且吾聞之也}
