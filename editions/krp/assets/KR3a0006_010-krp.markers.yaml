  - {type: variant, offset: 3844, length: 411, content: 也賈誼曰陳渉之位不尊於齊楚趙韓魏宋衞中山之君也鉏耰棘矜不銛於鉤㦸長鎩也謫戍之衆非抗九國之師也深謀逺慮行軍用兵之道非及曩時之士也然而成敗異變功業相反試使山東之國與陳渉度長絜大比權量力則不可同年而語矣然秦以區區之地致萬乗之權招八州而朝同列百有餘年矣然後以六合為家崤函為宫一夫作難而七廟墮身死人手為天下笑者何也仁義不施而攻守之勢異也又曰秦王懐貪鄙之心行自奮之智不信功臣不親士民廢王道而立私愛焚文書而酷刑法先詐力而後仁義以暴虐為天下始夫兼并者髙詐力安危者貴順權以此言之取予攻守不同術也秦雖離戰國而王天下其道不易其政不改是以其所以取之也孤獨而有之故其亡可立而待也班固曰古人有言天生五材民並用之廢一不可誰能去兵鞭朴不可弛於家刑罰不可廢於國征伐不可偃於天下用之有本末行之有逆順者耳孔子曰工欲善其事必先利其器文徳者帝王之利器威武者文徳之輔助也夫文之所加者深則武之所服者大徳之所施者博則威之所制者廣三代之盛至于刑措兵寢者其本末有序帝王之極功, SBCK: ''}
