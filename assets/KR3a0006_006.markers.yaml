  - {type: variant, offset: 151, length: 0, content: '', krp: 事一人焉先達者相收管仲乃従公子糾鮑叔従小白國人果弑君小白先入為君魯人拘管仲而效之鮑叔言而相之故諺曰巫咸雖善祝不能自祓也秦醫雖善除不能自弹也以管仲之聖而待鮑叔之助此鄙諺所謂虜自賣裘而不售士自譽便而不信者也詩傳曰鮑叔薦管仲曰臣所不如管夷吾者五寛惠柔愛臣弗如也忠信可結於百姓臣弗如也制禮約法於四方臣弗如也决獄折中臣弗如也執枹鼓立於軍門使士卒勇臣弗如也齊桓公使管仲治國管仲對曰賤不能臨貴桓公以為上卿而國不治桓公曰何故管仲對曰貧不能使富桓公賜之齊國市租一年而國不治桓公曰何故對曰疏不能制親桓公立以為仲父齊國大安而遂覇天下孔子曰管仲之賢不得此三權者亦不能使其君南面而覇矣尊賢萹曰管仲桓公之賊也鮑叔以為賢於巳而進之為相七十言而說乃聼遂使桓公除報讐之心而委國政焉桓公垂拱無事而朝諸侯鮑叔之力也今不覩鮑叔之力而見汩羅之禍雖欲以夀終惡音烏其能得乎遵道第二十三大夫曰御史御史未應謂丞相去聲史曰文學結髪學語服膺不舍辭}
  - {type: variant, offset: 152, length: 1, content: 斯, WYG: 循環轉若陶鈞結髪猶言總角少時也循環言其旋繞徃来無窮也陶家名轉者為鈞盖取周囘均調}
  - {type: variant, offset: 152, length: 1, content: 斯, krp: 循環轉若陶鈞結髪猶言總角少時也循環言其旋繞徃来無窮也陶家名轉者為鈞盖取周囘均調}
  - {type: variant, offset: 154, length: 0, content: '', WYG: 義也文繁於春華無効於抱風飾虚言以亂實道古以害今従之則縣官用廢虚言不可實而行之不従文學以為非也衆口囂囂不可勝音升聽諸卿都大府曰久矣通先古明當世今將何従而可矣丞相史進曰晋文公譎而不正齊桓公正而不譎所由不同俱歸於伯音覇而必隨古不革襲音集故不改是文質不變而椎車尚在也齊俗訓曰昔齊桓公合諸侯以乗車退誅於國以斧鉞晋文公合諸侯以革車退行於國以禮義桓公前柔而後剛文公前剛而後柔然而令行乎天下權制諸侯鈞者審於勢之變也韓非子曰古者寡事而備簡樸陋而不盡故有珧銚而椎車者古者人寡而相親物多而􅁿利易讓故有揖讓而傳天下者然則行揖讓髙慈惠而道推仁厚皆椎政也處多事之時用寡事之器非智者之備也當大争之世而循揖讓之軌非聖人之治也故智者不乗椎車聖人不行椎政也故或作之或述之然後法令調於民而器械便於用也孔對三君殊意晏子相去聲三君異道非苟相反所務之時異也韓非子曰葉公子髙問政於仲尼仲尼曰政在恱近而来逺魯哀公問政於仲尼仲尼曰政在選賢齊景公問政於仲尼仲尼曰政在節財三公出子貢問曰三公問夫子政一也夫子對之不同何也仲尼曰葉都大而國小民有背心故曰政在恱近而来逺魯哀公有大臣三人外障距諸侯四鄰之士内比周而以愚其君使宗廟不掃除社稷不血食者必是三臣也故曰政在選賢齊景公築雍門為路寢一朝而以三百乗之家賜者三故曰政在節財漢武帝曰五帝不相復禮三代不同法所繇殊路而建徳一也葢孔子對定公以來逺哀公以論臣景公以節用非期不同所}
