  - {type: variant, offset: 636, length: 1, content: 鄙, WYG: 嘻諸生闒音逹茸音戎無行去聲多言而不用情貌不相副若穿踰之盗自古而患之是孔丘斥逐於魯君曾不用於世也何者以其首攝多端迂時而不要也攝引持也故秦王燔去其術而不行坑之渭中而不用秦紀曰李斯請非博士官所職天下敢藏詩書百家語詣守尉雜燒之盧生為始皇求仙藥亡去始皇大怒使御史案問諸生諸生犯禁者四百六十四人皆坑之咸陽潘生曰儒林填於坑穽詩書煬而為煙乃安得鼓口舌申顔眉預前論議是非國家之事也文學曰國有賢士而不用非士之過有國者之耻叢談曰士横道而偃四肢不掩非士之過有土之羞也邦君將昌天遺其道大夫將昌天遺其士庶人將昌必有良子孔子大聖也諸侯莫能用當小位於魯三月不令而行不禁而止沛若時雨之灌萬物莫不興起也家}
