  - {type: variant, offset: 221, length: 0, content: '', WYG: 然不能見将然夫禮者禁於将然之前而法者禁於已然之後是故法之所用易見而禮之所為至難知也若夫慶賞以勸善刑罰以懲惡先王執此之政堅如金石行此之令信如四時據此之公無私如天地耳豈顧不用哉然而曰禮云禮云者貴絶惡扵未萌而起教扵㣲𦕈使民日遷善逺辠而不自知也孔子曰聼訟吾猶人也必也使毋訟乎為人主計者莫如先審取舍取舍之極定於内而安危之萌應於外矣安者非一日而安也危者非一日而危也皆積漸然不可不察也人主之所積在其取舍以禮義治之者積禮義以刑罰治之者積刑罰刑罰積而民怨背禮義積而民和親故世主欲民之善同而所以使民善者或異或道之以徳教或敺之以法令道之以徳教者徳教洽而民氣樂敺之以法令者法令極而民風哀哀樂之感禍福之應也昔秦以武力吞天下而斯髙以妖孽累其禍廢古術隳音灰舊禮專任刑法而儒墨既䘮焉塞士之塗壅人之口道䛕日進而上不聞其過此秦所以失天下而殞音允社稷也賈山曰秦皇帝計其功徳度其後嗣世世無窮然身死纔數月耳天下四面而攻之宗廟滅絶矣秦皇帝居滅絶之中而不自知者何也天下莫敢告也其所以莫敢告者何也亡養老之義亡輔弼之臣亡進諫之士縦恣行誅退誹謗之人殺直諫之士是以道䛕媮合苟容比其徳則賢于堯舜課其功則賢於湯武天下已潰而莫之吿也詩云匪言不能胡此畏忌聼言則對譖言則退此之謂也路温舒曰昔秦之時滅文學好武勇賤仁義之士貴治獄之吏正言謂之誹謗謁過謂之妖言故盛服先生不用于世忠良切言皆欎於胷譽䛕之聲日滿於耳虗羙薫心實祻蔽塞此乃秦之所以亡天下}
