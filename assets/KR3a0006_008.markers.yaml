  - {type: variant, offset: 1130, length: 0, content: '', WYG: 公處謙以卑士執禮以治下天下辭越裳之贄音至見恭讓之禮既與入文王之廟是見大孝之禮也風俗通曰越裳重九譯獻白雉周公薦陳祖廟曰先人之徳有天下尊歸於父此人道之極也目覩威儀干戚之容耳聼清歌雅頌之聲心充至徳欣然以歸此四夷所以慕義内附非重譯音亦狄鞮音低來觀猛獸熊羆也狄鞮西方之民也夫音扶犀象兕虎南夷之所多也騾音蘆驢音离馲音托駞音跎北狄之常畜也中國所鮮上聲外國賤之南越以孔雀珥音二門户崐山之旁以玉璞抵烏鵲今貴人之所賤珍人之所饒非所以厚中國明盛}
  - {type: page-break, offset: 1130, content: '', id: KR3a0006_WYG_008-17a, image: WYG0695/WYG0695-0595c.png}
  - {type: variant, offset: 1130, length: 0, content: '', krp: 公處謙以卑士執禮以治下天下辭越裳之贄音至見恭讓之禮既與入文王之廟是見大孝之禮也風俗通曰越裳重九譯獻白雉周公薦陳祖廟曰先人之徳有天下尊歸於父此人道之極也目覩威儀干戚之容耳聼清歌雅頌之聲心充至徳欣然以歸此四夷所以慕義内附非重譯音亦狄鞮音低來觀猛獸熊羆也狄鞮西方之民也夫音扶犀象兕虎南夷之所多也騾音蘆驢音离馲音托駞音跎北狄之常畜也中國所鮮上聲外國賤之南越以孔雀珥音二門户崐山之旁以玉璞抵烏鵲今貴人之所賤珍人之所饒非所以厚中國明盛}
  - {type: variant, offset: 1131, length: 2, content: 衰然, WYG: 也隋和之名寳也而不能安危存亡故喻徳示威惟賢臣良相去聲不在犬馬珍怪是以聖王以賢為寳不以珠玊為寳雜事篇曰齊宣王與魏惠王㑹田於郊魏王曰亦有寳乎齊王曰無有魏王曰若寡人之小國也尚有徑寸之珠照車前}
