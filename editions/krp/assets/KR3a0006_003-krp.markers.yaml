  - {type: variant, offset: 8849, length: 246, content: 漢紀曰元朔元年冬十有一月詔曰夫十室之邑必有忠信三人並行厥有我師今或至闔郡不薦一人是化不下究而積行之君子壅於上聞也二千石官長紀綱人倫將何以佐朕燭幽隠勸元元厲蒸庶崇鄉黨之訓哉且進賢受上賞蓛賢䝉顯戮古之道也其議不舉賢者罪有司奏議曰古者諸侯貢士一適謂之好德再適謂之賢賢三適謂之有功乃加九錫不貢士一則黜爵再則黜地三則黜爵地畢夫附下罔上者死附上罔下者刑與聞國政而無益於民者斥在上位而不得進賢者退此所以勸善黜惡也今詔書昭先帝聖緒令二千石舉孝亷所以勸元元移風易俗也不舉孝不奉詔當以不敬論不察亷不勝任也當免奏可, SBCK: ''}
