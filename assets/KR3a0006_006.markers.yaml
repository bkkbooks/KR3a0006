  - {type: variant, offset: 144, length: 2, content: 忘禍, WYG: 得重罪不得以夀終徼音古堯反而以為知去聲訐音居謁反而以為直不孫音遜以為勇其遭難去聲固亦宜也文學曰二公懐精白之心行忠正之道直已以事上竭力以狥公奉法推理不避彊禦不阿所親不貴妻子之養不顧私家之業然卒不能免於嫉妬之人為衆枉所排}
