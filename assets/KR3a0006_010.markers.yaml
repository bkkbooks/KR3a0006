  - {type: 'tls:seg', offset: 4438, content: '', id: KR3a0006_tls_010-32a.14}
  - {type: variant, offset: 4438, length: 0, content: '', WYG: 者邦國之固而山川社稷之寳也徐人滅舒春秋謂之取惡音汙其無備得物之易音異也春秋曰徐人取舒公羊傳曰其言取之何易也故恤來兵仁傷刑君子為國必有不可犯之難去聲易曰重門擊柝以待暴客言備之素修也文學曰阻險不如阻義昔湯以七十里為政於天下舒以百里亡於敵國此其所以見惡音汙也泰族訓曰天子得道守在四夷天子失道守在諸侯諸侯得道守在四鄰諸侯失道守在四境故湯處亳七十里文王處鄷百里皆令行禁止於天下周之衰也戎伐凡伯于}
