  - {type: variant, offset: 2171, length: 349, content: 用兵紀曰古之賢王有義兵而無偃兵家無怒笞則豎子嬰兒之有過也立見國無刑罰則百姓之誤相侵也立見天下無誅伐則諸侯之相暴也立見故怒笞不可偃於家刑罰不可偃於國誅伐不可偃於天下有巧有拙而已矣故古之聖王有義兵而無偃兵孟子曰湯居亳與葛為鄰葛伯放而不祀湯使人問之曰何為不祀曰無以供犠牲也湯使遺之牛羊葛伯食之又不以祀湯又使人問之曰何為不祀曰無以供粢盛也湯使亳衆往為之耕老弱饋食葛伯率其民要其有酒食黍稻者奪之不授者殺之有童子以黍肉餉而奪之書曰葛伯仇餉此之謂也為其殺是童子而征之四海之内皆曰非富天下也為匹夫匹婦復讐也匈奴傳曰周西伯昌伐畎夷詩曰肆不殄厥愠亦不殞厥問柞棫㧞矣行道兊矣混夷駾矣維其喙矣顔師古曰西伯昌即文王畎夷即畎戎也又曰昆夷山海經云黄帝生苗龍苗龍生融吾融吾生弄明弄明生白犬犬有二牝牡是為犬戎許慎曰赤狄本犬種故字從犬, SBCK: ''}
