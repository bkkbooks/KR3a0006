  - {type: variant, offset: 924, length: 5, content: 絕祀賴先帝, WYG: 社稷願學所以守之􅉟何對曰臣未嘗聞身治而國亂者也未嘗聞身亂而國治者也故本任於身不敢對以末楚王曰善故老子曰修之身其徳乃真也是以君子嘉善而矜不能恩及刑人徳潤窮夫施惠説音悦爾行刑不樂音洛也授時第三十五}
