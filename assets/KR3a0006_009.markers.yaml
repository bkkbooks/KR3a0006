  - {type: variant, offset: 5, length: 0, content: '', WYG: 漢桓寛撰明張之象註執務第三十九丞相去聲史曰先王之道軼音益人而難復賢良文學之言深逺而難行夫音扶稱上聖之髙行去聲道至德之美言非當世之所能及也泰族訓曰事不本於道德者不可以為儀言不合乎先王者不可以為道願聞方今之急務可復行於政使百姓咸足於衣食無乏困之憂風雨時五穀熟螟音冥螣音特不生天下安樂音洛盗賊不起流人還音旋歸各反其田里吏皆亷正故以奉職元元各得其理也賢良曰孟子曰堯舜之道非逺人也而人不思之耳詩云求之不得寤寐思服有求如關雎好去聲德如河廣何不濟不得之有故髙山仰止景行行止雖不能及離去聲道不逺也徐幹曰詩云髙山仰止景行行止好學之謂也倦立而思逺不如速行之必至也矯首而狥飛不如循雌之必獲也孤居而願智不如務學之必達也孔子曰弗學何以行弗思何以得馬雖有逸足而不閑輿則不為良駿人雖有美質而不習道則不為君子顔淵曰舜獨何人也回何人也夫音扶思賢慕能從善不休則成康之俗可致而唐虞之道可及漢武帝曰昔在唐虞畫象而民不犯日月所燭莫不率俾周之成康刑措不用德及鳥獸教通四海海外肅慎北發渠搜氏羌徠服星辰不孛日月不蝕山川不崩川谷不塞麟鳯在郊藪河洛出圖書公卿未思也先王之道何逺之有齊桓公以諸侯思王政憂周室匡諸夏之難去聲平夷狄之亂存亡接絶信義大行著于天下召陵之會予上聲之為主春秋曰楚屈完來盟于師盟于召陵公羊傳曰其言盟于師盟于召陵何師在召陵也師在召陵則曷為再言盟喜服楚也何言乎喜服楚楚有王者則後服無王者則先叛夷狄也而亟病中國南夷與北夷交中國不絶若綫桓公救中國而攘夷狄卒帖荆以此為王者之事也其言來何與桓為主也前此者有事矣後此者有事矣則曷為獨於此焉與桓公為主序績也要略曰齊桓公之時天子卑弱諸侯力征南夷北狄交伐中國中國之不絶如綫齊國之地東負海而北鄣河地狹田少而民多智巧桓公憂中國之患苦夷狄之亂欲以存亡繼絶崇天子之位廣文武之業故管子之書生焉人間訓曰三代種德而王齊桓繼絶而霸故樹黍者不獲稷樹怨者無報德傳曰予上聲積也故土積而成山阜水積而成江海行去聲積而成君子雜篇曰丘山積卑而為髙江海合小而為大建本篇曰水積成川則蛟龍生焉土積成山則豫樟生焉學積成聖則富貴尊顯至焉貴德篇曰山致其髙雲雨起焉水致其深蛟龍生焉君子致其道德而福祿歸焉夫有隂徳者必有陽報有隠行者必有昭名孔子曰吾於河廣知徳之至也而欲得之各反其本復諸古而已詩序曰河廣宋襄公母歸於衞思而不止故作是詩也古者行役不踰時春行秋反秋往春來寒暑未變衣服不易固已還矣夫婦不失時人安和如適獄訟平刑罰得則隂陽調風雨時上不苛擾下不煩勞各修其業安其性則螟音冥音特今文作螣不生而水旱不起賦歛省而農不失時則百姓足而流人歸其田里上清靜而不欲則下㢘而不貪傳曰太平之時民行役者不踰時男女不失時以偶孝子不失時以養外無曠夫内無怨女上無不慈之父下無不孝之子父子相成夫婦相保天下和平國家安寜人事備乎下天道應乎上故天不變經地不易形日月昭明列宿有常天施地化隂陽和合動以雷電潤以風雨節以山川均其寒暑萬民育生各得其所而制國用故國有所安地有所主又曰夫賢君之治也温良而和寛容而愛刑清而省喜賞而惡罰移風崇教生而不殺布惠施恩仁不偏與不奪民力役不踰時百姓得耕家有收聚民無凍餒食無腐敗士不造無用雕文不粥于肆斧斤以時入山林國無佚士皆用於世黎庶歡樂衍盈方外逺人歸義重譯執贄故得風雨不烈小雅曰有渰萋萋興雨祁祁以是知太平無飄風暴雨明矣若今則}
