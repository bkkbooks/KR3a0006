  - {type: variant, offset: 6914, length: 442, content: 雜事萹曰屈原者名平楚之同姓大夫有博通之知清㓗之行懐王用之秦欲吞滅諸侯并兼天下屈原為楚東使於齊以結强黨秦國患之使張儀之楚貨楚貴臣上官大夫靳尚之屬上及令尹子蘭司馬子椒内賂夫人鄭袖共譛屈原屈原逐於外乃作離騷張儀因使楚絶齊許謝地六百里懐王信左右之姦謀聽張儀之邪說遂絶强齊之大輔楚既絶齊而秦欺以六里懐王大怒舉兵伐秦大戰者數秦兵大敗楚師斬首數萬級秦使人願以漢中地謝懐王不聽願得張儀而甘心焉張儀曰以一儀而易漢中地何愛儀請行遂至楚楚囚之上官大夫之屬共言之王王歸之是時懐王悔不用屈原之策以至於此於是復用屈原屈原使齊還聞張儀已去大為王言張儀之罪懐王使人追之不及後秦嫁女于楚與懐王歡為藍田之㑹屈原以為秦不可信願勿㑹羣臣皆以為可㑹懐王遂㑹果見囚拘客死於秦為天下笑懐王子頃襄王亦知羣臣諂誤懐王不察其罪反聼羣讒之口復放屈原屈原疾闇王亂俗㳊㳊嘿嘿以是為非以清為濁不忍見于世將自投于淵漁父止之屈原曰世皆酔我獨醒世皆濁吾獨清吾獨聞之新浴者必振衣新沐者必彈冠又惡能以其冷冷更事之嘿嘿者哉吾寕投淵而死遂自投湘水汨羅之中而死, SBCK: ''}
