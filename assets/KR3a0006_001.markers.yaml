  - {type: variant, offset: 2023, length: 0, content: '', WYG: 管子曰昔者桀之時女樂三萬人端譟晨樂聞於三衢是無不服文繡衣裳者伊尹以亳之遊女工文繡纂組一純得粟百鍾於桀之國夫桀之國天子之國也桀無天下憂飾婦女鐘鼓之樂故伊尹得其粟而奪之流此之謂來天下之財桀霸有天下而用不足湯有七十里之亳而用有餘天非獨為湯雨菽粟而地非獨為湯出財物也伊尹善通移輕重開闔决塞通於高下徐疾之筴坐起之費時也}
