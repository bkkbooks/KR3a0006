  - {type: variant, offset: 28, length: 3, content: 胡車相, SBCK: 有遺亡非立功成名之士而亦未免於世俗也文學曰蘇秦以從顯於趙張儀以橫任於秦方此之時非不尊貴也然智士}
  - {type: page-break, offset: 28, content: '', id: KR3a0006_SBCK_004-11a}
  - {type: variant, offset: 33, length: 1, content: 鳴, SBCK: 憂}
  - {type: variant, offset: 33, length: 2, content: 鳴諸, WYG: 危國也君不如去一人簡公不聽居無㡬何陳成常果攻宰予於庭中而弑簡公於朝此不知敬小之所}
