  - {type: variant, offset: 384, length: 198, content: 為離騷賦自旦受詔日早食已上愛而祕之天下方術之士多往歸焉於是遂與蘓飛李尚左吳田由雷被毛被伍被晉昌等及諸儒大山小山之徒共講論道徳緫統仁義著書數十篇號曰鴻烈鴻大也烈明也以為大明道之言也司馬遷曰詩之所謂戎狄是膺荆舒是懲信哉是言也淮南衡山親為骨肉疆土千里列為諸侯不務遵蕃臣職以承輔天子而專挾邪僻之計謀為畔逆仍父子再失國各不終其身為天下笑此非獨王過也亦其俗薄臣下漸靡使然也夫荆楚僄勇輕悍好作亂乃自古記之矣使晁, SBCK: 􅄯}
