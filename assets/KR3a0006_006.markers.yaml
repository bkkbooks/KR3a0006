  - {type: variant, offset: 4669, length: 1033, content: 敖於愛而聽刑故刑所以正民鉏所以別苗也賢良曰古者篤教以導民明辟以正刑刑之於治猶策之於御也良工不能無策而御有策而勿用聖人假法以成教教成而刑不施故威厲而不殺刑設而不犯今廢其紀綱而不能張壞其禮義而不能防民陷於罔從而獵之以刑是猶開其闌牢發以毒矢也不盡不止曾子曰上失其道民散久矣如得其情即哀矜而勿喜夫不傷民之不治而伐己之能得姦猶弋者覩鳥獸挂罻羅而喜也今天下之被誅者不必有管蔡之邪鄧晳之偽恐苗盡而不別民欺而不治也孔子曰人而不仁疾之已甚亂也故民亂反之政政亂反之身身正而天下定是以君子嘉善而矜不能恩及刑人德潤窮夫施惠悅爾行刑不樂也授時第三十五大夫曰共其地居是世也非有災害疾疫獨以貧窮非惰則奢也無奇業旁入而猶以富給非儉則力也今曰施惠悅爾行刑不樂則是閔無行之人而養惰奢之民也故妄予不為惠惠惡者不為仁賢良曰三代之盛無亂萌教也夏商之季世無順民俗也是以王者設庠序明教化以防道其民及政教之洽性仁而喻善故禮義立則耕者讓於野禮義壞則君子爭於朝人爭則亂亂則天下不均故或貧或富富則仁生贍則爭止昏暮叩人門戶求水火貪夫不恡何則所饒也夫為政而使菽粟如水火民安有不仁者乎大夫曰博戲馳逐之徒皆富人子弟非不足者也故民饒則僣侈富則驕奢坐而委蛇起而為非未見其仁也夫居事不力用財不節雖有財如水火窮乏可立而待也有民不畜有司雖助之耕織其能足之乎賢良曰周公之相成王也百姓饒樂國無窮人非代之耕織也易其田疇薄其稅歛則民富矣上以奉君親下無饑寒之憂則教可成也語曰既富矣又何加焉曰教之教之以德齊之以禮則民徙義而從善莫不入孝出悌夫何奢侈暴慢之有乎管子曰倉廩實而知禮節百姓足而知榮辱故富民易與適禮難與適道大夫曰縣官之於百姓若慈父之於子也忠焉能勿誨乎愛之而勿勞乎故春親耕以勸農賑貸以贍不足通滀水出輕繫使民務時也蒙恩被澤而至今猶以貧困其難與適道若是夫賢良曰古者春省耕以補不足秋省歛以助不給民勤於財則貢賦省民勤於力則功築罕為民愛力不奪須臾故召伯聽斷於甘棠之下為妨農業之務也今時雨澍澤種懸而不得播秋稼零落乎野而不得收田疇赤地而停落成市發春而後懸青幡而策土牛殆非明主勸耕稼之意而春令之所謂也水旱第三十六大夫曰禹湯聖主后稷伊尹賢相也而有水旱之災水旱天之所為饑穰陰陽之運也非人力故太歲之數在陽為旱在陰為水六歲一饑十二歲一荒天道然殆非獨有司之罪也賢良曰古者政有德則陰陽調星辰理風雨時故行修於內聲聞於外為善於下福應於天周公載紀而天下太平國無夭傷歲無荒年當此之時雨不破塊風不鳴條旬而一雨雨必以夜無丘陵高下皆熟詩曰有渰萋萋興雨祁祁今不省其所以然而曰陰陽之運也非所聞, SBCK: ''}
