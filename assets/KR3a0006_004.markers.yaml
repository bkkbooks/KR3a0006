  - {type: variant, offset: 677, length: 0, content: '', WYG: 漢紀曰南夷道君長有十數夜郎最大其西靡漠之屬以十數靡漠最大自靡漠以北君長以十數卭都最大自越嶲以東北君長以十數莋都最大自莋都以東北君長以十數冉駹最大自冉駹以東北君長以十數白馬景大此皆巴蜀外西南夷也秦時嘗通伍尺之道於此諸國頗置長吏漢興皆棄之及大行王恢之救越也使鄱陽令唐䝉使於南越越食蒙以枸醬蒙問所從來曰從西北牂牁江江漢廣數千里出番禺城下䝉因上書曰南越地東西皆萬餘里名為外臣實一州土今以長沙豫章往來水道絶難竊聞夜郎精兵可數十萬若從夜郎浮舩下牂牁出其不意此制越一竒也可通夜郎道為置吏上許之乃拜蒙中郎將發巴蜀兵千餘人奉幣帛見夜郎侯喻以徳意為置長吏旁小邑皆貪漢贈帛以為道逺漢中不能有也故皆且聼命司馬相如亦言西南夷卭筰可作都上恱之以相如為中郎將往喻意皆聼命後西南夷數反發兵興徭役費用甚多相如知其難通業已逹之乃假巴蜀之諭以諷上且以宣其使㫖於百姓博望侯張騫者漢中人也初為郎應募使月氏時匈奴殺月氏王遂西徙故漢欲與月氏擊匈奴騫行為匈奴所得留騫十餘歳與妻有子然騫常持節不失後亡到月氏月氏未有報匈奴意騫留一歳餘乃還並南山從羌中来歸復為匈奴所得留之歳餘㑹單于死國内亂騫乃與其胡妻來歸漢拜為大中大夫初騫行百餘人惟騫與唐邑氏奴二人得還騫身所到大宛大月支大夏康居而傳聞其旁國名具為上言之西域本三十六國後分為五十四國皆在匈奴之西本志曰孝武之世圖利制匈奴患其兼從西國結黨南羌乃表河曲列四郡開玉門闗通西域以斷匈奴之右臂隔絶南羌月氏單于失援由是逺遁漠北而漠南無王庭遭值文景𤣥黙養民五世天下殷富財力有餘士馬強盛故能積羣貨覩犀象瑇瑁則開犍為朱崖七郡感䈮醬竹杖則開牂牁越嶲聞天馬葡萄則通大宛安息自是之後明珠文貝犀象翠羽之珍盈於後宫􅉊毺琪瑠葡萄龍文魚目汗血名馬充於黄門巨象獅兕猛獸大雀之羣實於外囿殊方異物四面而至}
