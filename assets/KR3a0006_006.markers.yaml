  - {type: variant, offset: 98, length: 0, content: '', SBCK: 時然後言義然後取不}
  - {type: variant, offset: 99, length: 4, content: 天下為任, SBCK: 道得之不居也滿而不溢泰而不驕故袁盎親於景帝秣馬不過一駟公孫弘即三公之位家不過十乗東方先生說聽言行於武帝而不驕溢主父見困厄之日乆此疾在位}
  - {type: variant, offset: 99, length: 0, content: '', WYG: 忠為質以仁為衞不出環堵之内而聞千里之外不善以忠化冦暴以仁圍何必持劍乎子路曰由也請攝齊以事先生矣宰予晝寢論語筆解作畫寢謂以五色畫其寢室也欲損三年之喪孔子曰糞土之墻不可杇也若由不得其死然故内無其質而外學其文雖有賢師良友若畫音壞脂鏤音陋氷費日損功故良師不能飾戚施香澤不能化嫫音模母也修務訓曰曼頬皓齒形夸骨佳不待脂粉芳澤而性可恱者西施陽文也啳􅢦哆噅籧蒢戚施雖粉白黛黑弗能為美者嫫母仳倠也文學曰蒙以不潔鄙夫掩鼻惡人盛飾可以宗祀上帝孟子曰西子蒙不潔則人皆掩鼻而過之雖有惡人齋戒沐浴則可以祀上帝修務訓曰毛嬙西施}
