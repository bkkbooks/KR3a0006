  - {type: variant, offset: 4020, length: 0, content: '', SBCK: 用其角螫蟲無所輸其毒故君仁莫不仁君義莫不義世安得跖蹻而親之乎大夫曰布心腹質情素信誠内感義形乎色宋華元楚司馬子反之相覩也符契内合誠有以相信也今匈奴挾不信之心懷不測之詐見利如前乗便而起潜進市側以襲無備是猶措重寶於道路而莫之守也求其不亡何可得乎文學曰誠信著乎天下醇德流乎四海則近者歌謳而樂之遠者執禽而朝之故正近者不以威來遠者不以武德義修而}
