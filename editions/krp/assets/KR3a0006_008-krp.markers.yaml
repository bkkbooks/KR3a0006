  - {type: variant, offset: 1142, length: 248, content: 也主術訓曰人主之立法先自為檢式儀故令行於天下孔子曰其身正不令而行其身不正雖令不從故禁勝於身則令行於民矣今夫御者馬體調於車御心和于馬則歴險致逺進退周游莫不如志雖有騏驥騄駬之良臧獲御之則馬反自恣而人弗能制矣故治者不貴其自是而貴其不得為非也故曰勿使可欲母曰弗求勿使可奪母曰不争如此則人材釋而公道行矣聖主之治也其猶造父之御乎齊輯之于轡銜之際而急緩之于脣吻之和正度于胷臆之中而執節於掌握之間内得于心中外合于馬志是故能進退履繩而旋曲中規取道致逺而氣力有餘誠得其術也體離車輿之安而手失駟馬之心而能不危者古今未有, SBCK: ''}
