  - {type: page-break, offset: 0, content: '', id: KR3a0006_SBCK_004-11a}
  - {type: variant, offset: 5, length: 0, content: '', SBCK: 已而後求名仕者先辟害而後求禄故香餌非不美也龜龍聞而深藏鸞鳳見而高逝者知其害身也夫爲烏鵲魚鱉食香餌而後狂飛奔走遜頭屈遰無益於死今有司盜秉國法進不顧罪卒然有急然後車馳人趨無益於死所盜不足償於臧􅀗妻子奔亡無處所身在深牢莫知恤視方此之時何暇得以笑乎大夫曰文學節高行矯然若不可卷盛節潔言皦然若不可􅄺然戍卒陳勝釋輓輅首爲叛逆自立張楚素非有回由處士之行宰相列臣之位也􅁬於大澤不過旬月而齊魯儒墨縉紳之徒肆其長衣長衣官之也􅀒孔氏之禮器詩}
  - {type: page-break, offset: 5, content: '', id: KR3a0006_SBCK_004-11b}
  - {type: variant, offset: 6, length: 0, content: '', SBCK: 委質爲臣孔甲爲渉􅀶士卒俱死陳爲天下大笑深藏高逝者固若是也文學曰周室衰禮義壞不能統理天下諸侯交争相滅亡并爲六國兵革不休民不得寜息秦以虎狼之心􅁞食諸侯并吞戰國以爲郡縣伐能矜功自以爲過尭舜而羞與之同棄仁義而尚刑罰以爲今時不師於文而決於武趙高治獄於内蒙恬用兵於外百姓愁苦同心而患秦陳王赫然􅁬爪牙爲天下首事道雖凶而儒墨或干之者以爲無王乆矣道擁遏不得行自孔子以至于兹而秦復重禁之故發憤於陳王也孔子曰如有用我者吾其爲東周乎庻幾成湯文武之功爲百姓除殘去賊豈貪禄樂位哉大夫曰文學言行雖有伯夷之廉不及栁下惠之貞不過高瞻下視潔言汚行觴酒豆肉遷延相讓辭小取大雞廉狼吞趙綰王臧之等以儒術擢爲上卿而有姦利殘􅃘之心主父偃以口舌取大官竊權重欺紿宗室受諸侯之賂卒皆誅死東方朔自稱辯略消堅釋石當世無􅀟然省其私行狂夫不􅃘爲况無東方朔之口其餘無可觀者也文學曰志善者忘惡謹小者致大爼豆之間足以觀禮閨門之内足以論行夫服古之服誦古之道舎而爲非者鮮矣故君子時然後言義然後取不以道得之不居也滿而不溢泰而不驕故袁盎親於景帝秣馬不過一駟公孫弘即三公之位家不過十乗東方先生說聽言行於武帝而不驕溢主父見困厄之日乆此疾在位者不好道而富且貴莫知䘏士也於是取饒􅄛之餘以周窮士之急非爲私家之業也當世􅅝􅅝非患儒之雞廉患在位者之虎飽鷁咽於求覽無所孑遺耳}
