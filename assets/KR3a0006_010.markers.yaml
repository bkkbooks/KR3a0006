  - {type: variant, offset: 2567, length: 335, content: 盜而自矜子貢曰民將欺而況盜乎故吏不以多斷為良毉不以多刺為工子產刑二人殺一人道不拾遺而民無誣心故為民父母以養疾子長恩厚而已自首匿相坐之法立骨肉之恩廢而刑罪多矣聞父母之於子雖有罪猶匿之其不欲服罪爾子為父隱父為子隱未聞父子之相坐也聞兄弟能緩追以免賊未聞兄弟之相坐也聞惡惡止其人疾始而誅首惡未聞什伍而相坐也老子曰上無欲而民樸上無事而民自富君君臣臣父父子子比地何伍而執政何責也御史曰夫負千鈞之重以登無極之高垂峻崖之峭谷下臨不測之淵雖有慶忌之捷賁育之勇莫不震慴悼慄者知墜則身首肝腦塗山石也故未嘗灼而不敢握火者見其有灼也未嘗傷而不敢握刃者見其有傷也彼以知為非罪之必加而戮及父兄必懼而為善故立法制辟若臨百仞之壑握火蹈刃則民畏忌而無敢犯禁矣慈母有敗子小不忍也嚴家無悍虜篤責急也今不立嚴家之, WYG: ''}
