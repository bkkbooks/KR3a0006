  - {type: variant, offset: 880, length: 0, content: '', WYG: 班固曰周道既衰壊扵幽厲禮樂征伐自諸侯出陵夷二百餘年而孔子興以聖徳遭季世知言之不用而道不行廼歎曰鳳鳥不至河不出圖吾已矣夫文王既沒文不在兹乎扵是應聘諸侯以答禮行誼入西周南至楚畏匡戹陳奸七十餘君無所遇趙岐曰孟子生有淑質夙䘮其父㓜被慈母三遷之教長師孔子之孫子思治儒術之道通五經尤長扵詩書周衰之末戰國縦横用兵爭強以相侵奪當世取士務上權謀以為上賢先王大道陵遲隳廢異端並起楊朱墨翟放蕩以干時惑衆者非一孟子憫悼堯舜湯文周孔之業将遂湮微正塗壅底仁義荒怠佞偽馳騁紅紫亂朱扵是則慕仲尼周流憂世遂以儒道干扵諸侯思濟斯民然由不肯枉尺直尋時君咸謂之迂濶扵事終莫能聽納其說}
