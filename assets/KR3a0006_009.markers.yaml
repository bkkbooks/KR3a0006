  - {type: variant, offset: 664, length: 1, content: 固, WYG: 攘萬世必有此長患先帝興義兵以誅暴强東滅朝鮮西定冉駹音尨南夷傳曰自筰以東北君長以十數冉駹最大顔師古曰今䕫州開州首領多姓冉者本皆冉種也南擒百越北挫强胡李牧追匈奴以廣北州湯武之舉蚩音癡尤之兵也故聖主斥地非私}
