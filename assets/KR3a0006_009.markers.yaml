  - {type: variant, offset: 4079, length: 3, content: 巳刑罰, WYG: 是文帝以中尉周舍郎中令張武為將軍發車千乘十萬騎軍長安旁以備胡冦胡西役大宛康居之屬南與羣羌通先帝推讓斥奪廣饒之地建張掖以西隔絶羌胡𤓰分其援是以西域之國皆内拒匈奴斷其右臂曳音異劒而走故募音慕人田畜以廣用長城以南濵塞音賽之郡馬牛放縱蓄積布野未覩其計之所過也匈奴傳曰元鼎三年漢東㧞􅐮貉朝鮮以為郡而西置酒泉郡以隔絶胡與羌通之路又西通月氏大夏以翁主妻烏孫王以分匈奴西方之援國乂北益廣田至胘雷為塞而匈奴終不敢以為言夫音扶以弱越而遂意强吴才地計衆非鈞也主思臣謀其往必矣韓非子曰越王入宦於吴而勸之伐齊以弊呉呉兵既勝齊人於艾陵張之於江濟强之於黄池故可制於五湖故曰將欲翕之必固張之將欲弱之必固强之兵略曰善戰者不在少善守者不在}
  - {type: page-break, offset: 4079, content: '', id: KR3a0006_WYG_009-28b, image: WYG0695/WYG0695-0615b.png}
