  - {type: variant, offset: 4436, length: 1, content: 潰, WYG: 傅相焉乃營成周都雒以為此天下中諸侯四方納貢職道里鈞矣有徳則易以王無徳則易以亡凡居此者欲令務以徳致人不欲阻險令後世驕奢以虐民也汜論曰武王克殷欲築宫於五行之山周公曰不可夫五行之山固塞險阻之地使我徳能覆之則天下納其貢職者廽也我有暴亂之行則天下之伐我難矣此所以三十六世而不奪也周公可謂能持滿矣許慎曰廻迂難也廻或作固固必也周公言我有暴亂之行則天下當來伐我我無為於五行之山使天下來伐我者難也言其依徳不恃險也呉有三江五湖之難而兼於越楚有汝淵滿堂之固而滅於秦秦有隴阺音低崤音肴塞而亡於諸侯晉有河華去聲九河而奪於六卿齊有泰山巨海而負於田常桀紂有天下兼有濟亳音薄秦王以六合困於陳渉非地利不固無術以守之也釋邇憂逺猶呉不内定其國而西絶淮山與齊晉爭强也越因其罷音疲擊其虛蔡澤曰呉王夫差兵無敵於天下勇猛以輕諸侯陵齊晉故遂以殺身亡國使呉王用申胥修徳無恃極其衆則勾踐不免為藩臣海崖何謀之敢慮也呉語解曰申胥楚大夫伍奢之子子胥也名員魯昭二十年奢誅於楚員奔呉呉子與之申地故曰申胥大夫曰楚自巫山起方城屬巫黔音鉗中設扞關以距秦秦包商洛崤音爻函音咸以禦諸侯韓阻宜陽伊闕要成臯太行音杭以安周鄭魏濵洛築城阻山帶河以保晉國趙結飛狐句注孟門以存荆代燕塞碣石絶邪谷繞援遼齊撫阿甄關榮歴倚太山負海河關}
