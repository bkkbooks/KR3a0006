  - {type: variant, offset: 16556, length: 216, content: 音洛貴德篇曰聖人之於天下也譬猶一堂之上也今有滿堂飲酒者有一人獨索然向隅而泣則一堂之人皆不樂矣聖人之於天下也譬猶一堂之上也有一人不得其所者則孝子不敢以其物薦進主術訓曰髙臺層榭接屋連閣非不麗也然民無掘穴狹廬所以托身者明主弗樂肥醲甘脆非不美也然民有糟糠菽粟不接於口者則明主弗甘也匡牀蒻席非不寜也然民有處邉城犯危難澤死暴骸者明主弗安也故古之君人其慘怛於民也國有飢者食不重味民有寒者而冬不被裘嵗登民豐乃始縣鐘鼓陳于戚君臣上下同心而樂之國無哀人, SBCK: ''}
