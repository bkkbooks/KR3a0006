  - {type: variant, offset: 1649, length: 0, content: '', SBCK: 革中名工輕靡使容紈裏紃下越端縱縁中者鄧里間作蒯苴秦堅婢妾韋沓絲􅂂走者茸芰狗官古聖人勞躬養神節欲􅃴情尊天敬地􅂂德行仁是以上天歆焉永其世而豐其年故尭秀眉高彩享國百載及秦始皇覽怪迂信禨祥使盧生求羡門高徐市等入海求不死之藥當此之時燕齊之士釋鋤耒争言神仙方士於是趣咸陽者以千數言仙人食金飲珠然後壽與天地相保於是數巡狩五嶽濵海之館以求神仙􅅾萊之屬數幸之郡縣冨人以貲佐貧者築道旁其後小者亡逃大者藏匿吏捕索掣頓不以道理名宫之旁廬舍丘落無生苗立樹百姓離心怨思者十有半書曰享多儀儀不及物曰不享故聖人}
