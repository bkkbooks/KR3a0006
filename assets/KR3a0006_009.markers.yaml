markers:
  front:
  - {type: variant, offset: 0, length: 4367, content: 鹽鐵論卷九繇役第四十九大夫曰屠者解分中理可橫以手而離也至其抽䈥鑿骨非行金斧不能決聖主循性而化有不從者亦將舉兵而征之是以湯誅葛伯文王誅犬夷及後戎狄猾夏中國不寧周宣王仲山甫式遏寇虐詩云薄伐獫狁至于太原出車彭彭城彼朔方自古明王不能無征伐而服不義不能無城壘而禦強暴也文學曰舜執干戚而有苗服文王底德而懷四夷詩云鎬京辟雍自西自東自南自北無思不服普天之下惟人面之倫莫不引領而歸其義故畫地為境人莫之犯子曰白刃可冒中庸不可入至德之謂也故善攻不待堅甲而克善守不待渠梁而固武王之伐殷也執黃鉞誓牧之野天下之士莫不願為之用既而偃兵搢笏而朝天下之民莫不願為之臣既以義取之以德守之秦以力取之以法守之本末不得故亡夫文猶可長用而武難久行也大夫曰詩云獫狁孔熾我是用戒武夫潢潢經營四方故守禦征伐所由來久矣春秋大戎未至而豫禦之故四支強而躬體固華葉茂而本根據故飭四境所以安中國也發戍漕所以審勞佚也主憂者臣勞上危者下死先帝憂百姓不贍出禁錢解乘輿驂貶樂損膳以賑窮備邊費未見報施之義而見沮成之理非所聞也文學曰周道衰王迹熄諸侯爭強大小相凌是以強國務侵弱國設備甲士勞戰陣役於兵革故君勞而民困苦也今中國為一統而方內不安徭役遠而外內煩也古者無過年之繇無逾時之役今近者數千里遠者過萬里歷二期長子不還父母愁憂妻子詠歎憤懣之恨發動於心慕思之積痛於骨髓此杕杜采薇之所為作也險固第五十大夫曰虎兕所以能執熊羆服群獸者爪牙利而攫便也秦所以超諸侯吞天下并敵國者險阻固而勢居然也故龜倡有介狐貉不能禽蝮蛇有螫人忌而不輕故有備則制人無備則制於人故仲山甫補袞職之闕蒙公築長城之固所以備寇難而折衝萬里之外也今不固其外欲安其內猶家人不堅垣牆狗吠夜驚而闇昧妄行也文學曰秦左殽函右隴阺前蜀漢後山河四塞以為固金城千里良將勇士設利器而守陘隧墨子守雲梯之械也以為雖湯武復生蚩尤復起不輕攻也然戍卒陳勝無將帥之任師旅之眾奮空拳而破百萬之師無牆籬之難故在德不在固誠以仁義為阻道德為塞賢人為兵聖人為守則莫能入如此則中國無狗吠之警而邊境無鹿駭狼顧之憂矣夫何妄行之有乎大夫曰古者為國必察土地山陵阻險天時地利然後可以王霸故制地城郭飭溝壘以禦寇固國春秋曰冬浚洙脩地利也三軍順天時以實擊虛然困於阻險敵於金城楚莊之圍宋秦師敗崤嶔崟是也故曰天時地利羗胡固近於邊今不取必為四境長患此季孫之所以憂顓臾有勾踐之變而為強吳之所悔也文學曰地利不如人和武力不如文德周之致遠不以地利以人和也百世不奪非以險以德也吳有三江五湖之難而兼於越楚有汝淵兩堂之固而滅於秦秦有隴阺崤塞而亡於諸侯晉有河華九河而奪於六卿齊有泰山巨海而脅於田常桀紂有天下兼於滈亳秦王以六合困於陳涉非地利不固無術以守之也釋邇憂遠猶吳不內定其國而西絕淮水與齊晉爭強也越因其罷擊其虛使吳王用申胥修德無恃極其眾則勾踐不免為藩臣海崖何謀之敢慮也大夫曰楚自巫山起方城屬巫黔中設扞關以拒秦秦包商洛崤函以禦諸侯韓阻宜陽伊闕要成皋太行以安周鄭魏濱洛築城阻山帶河以保晉國趙結飛狐句注孟門以存邢代燕塞碣石絕邪谷繞援遼齊撫阿甄關榮歷倚太山負海河關梁者邦國之固而山川者社稷之寶也徐人滅舒春秋謂之取惡其無備得物之易也故恤來兵仁傷刑君子為國必有不可犯之難易曰重門擊柝以待暴客言備之素脩也文學曰阻險不如阻義昔湯以七十里為政於天下舒以百里亡於敵國此其所以見惡也使關梁足恃六國不兼於秦河山足保秦不亡於楚漢由此觀之衝隆不足為強高城不足為固行善則昌行惡則亡王者博愛遠施外內合同四海各以其職來祭何擊柝而待傳曰諸侯之有關梁庶人之有爵祿非升平之興蓋自戰國始也論勇第五十一大夫曰荊軻懷數年之謀而事不就者尺八匕首不足恃也秦王憚於不意列斷賁育者介七尺之利也使專諸空拳不免於為禽要離無水不能遂其功世言強楚勁鄭有犀兕之甲棠谿之鋌也內據金城外任利兵是以威行諸夏強服敵國故孟賁奮臂眾人輕之怯夫有備其氣自倍況以吳楚之士舞利劍蹶強弩以與貉虜騁於中原一人當百不足道也夫如此則胡無守谷谿無交兵力不支漢其勢必降此商君之走魏而孫臏之破梁也文學曰楚鄭之棠谿墨陽非不利也犀䩜兕甲非不堅也然而不能存者利不足恃也秦兼六國之師據崤函而御宇內金石之固莫耶之利也然陳勝無士民之資甲兵之用鉏耰棘橿以破衝隆武昭不擊烏號不發所謂金城者非謂築壤而高土鑿地而深池也所謂利兵者非謂吳越之鋌干將之劍也言以道德為城以仁義為郭莫之敢攻莫之敢入文王是也以道德為䩜以仁義為劍莫之敢當莫之敢御湯武是也今不建不可攻之城不可當之兵而欲任匹夫之役而行三尺之刃亦細矣大夫曰荊軻提匕首入不測之強秦秦王惶恐失守備衛者皆懼專諸手劍摩萬乘刺吳王尸孽立正鎬冠千里聶政自衛由韓廷刺其主功成求得退自刑於朝暴尸於市今誠得勇士乘強漢之威凌無義之匈奴制其死命責以其過若曹劌之脅齊桓公遂其求推鋒折銳穹廬擾亂上下相遁因以輕銳隨其後匈奴必交臂不敢格也文學曰湯得伊尹以區區之亳兼臣海內文王得太公廓酆鄗以為天下齊桓公得管仲以霸諸侯秦穆公得由余西戎八國服聞得賢聖而蠻貊來享未聞劫殺人主以懷遠也詩云惠此中國以綏四方故自彼氐羗莫敢不來王非畏其威畏其德也故義之服無義疾於原馬良弓德之召遠疾於馳傳重驛論功第五十二大夫曰匈奴無城廓之守溝池之固脩戟強弩之用倉廩府庫之積上無義法下無文理君臣嫚易上下無禮織柳為室旃廗為蓋素弧骨鏃馬不粟食內則備不足畏外則禮不足稱夫中國天下腹心賢士之所總禮義之所集財用之所殖也夫以智謀愚以義伐不義若因秋霜而振落葉春秋曰桓公之與戎狄驅之爾況以天下之力乎文學曰匈奴車器無銀黃絲漆之飾素成而務堅絲無文采裙褘曲襟之制都成而務完男無刻鏤奇巧之事宮室城郭之功女無綺繡淫巧之貢纖綺羅紈之作事省而致用易成而難弊雖無脩戟強弩戎馬良弓家有其備人有其用一旦有急貫弓上馬而已資糧不見案首而支數十日之食因山谷為城郭因水草為倉廩法約而易辯求寡而易供是以刑省而不犯指麾而令從嫚於禮而篤於信略於文而敏於事故雖無禮義之書刻骨卷木百官有以相記而君臣上下有以相使群臣為縣官計者皆言其易而實難是以秦欲驅之而反更亡也故兵者凶器不可輕用也其以強為弱以存為亡一朝爾也大夫曰魯連有言秦權使其士虜使其民故政急而不長高皇帝受命平暴亂功德巍巍惟天同大焉而文景承緒潤色之及先帝征不義攘無德以昭仁聖之路純至德之基聖王累年仁義之積也今文學引亡國失政之治而況之於今其謂匈奴難圖宜矣文學曰有虞氏之時三苗不服禹欲伐之舜曰是吾德未喻也退而脩政而三苗服不牧之地不羈之民聖王不加兵不事力焉以為不足煩百姓而勞中國也今明王脩聖緒宣德化而朝有權使之謀尚首功之事臣固怪之夫人臣席天下之勢奮國家之用身享其利而不顧其主此尉佗章邯所以成王秦失其政也孫子曰今夫國家之事一日更百變然而不亡者可得而革也逮出兵乎平原廣牧鼓鳴矢流雖有堯舜之知不能更也戰而勝之退脩禮義繼三代之迹仁義附矣戰勝而不休身死國亡者吳王是也大夫曰順風而呼者易為氣因時而行者易為力文武懷餘力不為後嗣計故三世而德衰昭王南征死而不還凡伯囚執而使不通晉取郊沛王師敗於茅戎今西南諸夷楚莊之後朝鮮之王燕之亡民也南越尉佗起中國自立為王德至薄然皆亡天下之大各自以為一州倔強倨敖自稱老夫先帝為萬世度恐有冀州之累南荊之患於是遣左將軍樓舩平之兵不血刃咸為縣官也七國之時皆據萬乘南面稱王提珩為敵國累世然終不免俛首係虜於秦今匈奴不當漢家之臣郡非有六國之用賢士之謀由此觀難易察然可見也文學曰秦滅六國虜七王沛然有餘力自以為蚩尤不能害黃帝不能斥及二世弒死望夷子嬰係頸降楚曾不得七王之俛首使六國並存秦尚為戰國固未亡也何以明之自孝公以至于始皇世世為諸侯雄百有餘年及兼天下十四歲而亡何則外無敵國之憂而內自縱恣也自非聖人得志而不驕佚者未之有也論鄒第五十三大夫曰鄒子疾晚世之儒墨不知天地之弘昭曠之道將一曲而欲道九折守一隅而欲知萬方猶無準平而欲知高下無規矩而欲知方圓也於是推大聖終始之運以喻王公先列中國名山通谷以至海外所謂中國者天下八十一分之一名曰赤縣神州而分為九州絕陵陸不通乃為一州有大瀛海圜其外此所謂八極而天地際焉禹貢亦著山川高下原隰而不知大道之遙故秦欲達九州而方瀛海牧胡而朝萬國諸生守畦畝之慮閭巷之固未知天下之義也文學曰堯使禹為司空平水土隨山刊木定高下而序九州鄒衍非聖人作怪誤熒惑六國之君以納其說此春秋所謂匹夫熒惑諸侯者也孔子曰未能事人焉能事鬼神近者不達焉能知瀛海故無補於用者君子不為無益於治者君子不由三王信經道而德光於四海戰國信嘉言而破亡如丘山昔秦始皇已吞天下欲并萬國亡其三十六郡欲達瀛海而失其州縣知大義如斯不如守小計也論菑第五十四大夫曰巫祝不可與並祀諸生不可與逐語信往疑今非人自是夫道古者稽之今言遠者合之近日月在天其徵在人菑異之變夭壽之期陰陽之化四時之敘水火金木妖祥之應鬼神之靈祭祀之福日月之行星辰之紀曲言之故何所本始不知則默無苟亂耳文學曰始江都相董生推言陰陽四時相繼父生之子養之母成之子藏之故春生仁夏長德秋成義冬藏禮此四時之序聖人之所則也刑不可任以成化故廣德教言遠必考之邇故內恕以行是以刑罰若加於己勤勞若施於身又安能忍殺其赤子以事無用罷弊所恃而達瀛海乎蓋越人美蠃蚌而簡太牢鄙夫樂咋唶而怪韶濩故不知味者以芬香為臭不知道者以美言為亂耳人無夭壽各以其好惡為命羿奡以巧力不得其死智伯以貪狠亡其身天菑之證禎祥之應猶施與之望報各以其類及故好行善者天助以福符瑞是也易曰自天祐之吉無不利好行惡者天報以禍妖菑是也春秋曰應是而有天菑周文武尊賢受諫敬戒不殆純德上休神祇相況詩云降福穰穰降福簡簡日者陽陽道明月者陰陰道冥君尊臣卑之義故陽光盛於上眾陰之類消於下月望於天蚌蛤盛於淵故臣不臣則陰陽不調日月有變政教不均則水旱不時螟螣生此災異之應也四時代敘而人則其功星列於天而人象其行常星猶公卿也眾星猶萬民也列星正則眾星齊常星亂則眾星墜矣大夫曰文學言剛柔之類五勝相代生易明於陰陽書長於五行春生夏長故火生於寅木陽類也秋生冬死故水生於申金陰物也四時五行迭廢迭興陰陽異類水火不同器金得土而成得火而死金生於巳何說何言然乎文學曰兵者凶器也甲堅兵利為天下殃以母制子故能久長聖人法之厭而不陽詩云載戢干戈載櫜弓矢我求懿德肆于時夏衰世不然逆天道以快暴心僵尸血流以爭壤土牢人之君滅人之祀殺人之子若絕草木刑者肩靡於道以己之所惡而施於人是以國家破滅身受其殃秦王是也大夫曰金生於巳刑罰小加故薺麥夏死易曰履霜堅冰至秋始降霜草木隕零合冬行誅萬物畢藏春夏生長利以行仁秋冬殺藏利以施刑故非其時而樹雖生不成秋冬行德是謂逆天道月令涼風至殺氣動蜻蛚鳴衣裘成天子行微刑始貙蔞以順天令文學同四時合陰陽尚德而除刑如此則鷹隼不鷙猛獸不攫秋不蒐獮冬不田狩者也文學曰天道好生惡殺好賞惡罰故使陽居於實而宣德施陰藏於虛而為陽佐輔陽剛陰柔季不能加孟此天賤冬而貴春申陽屈陰故王者南面而聽天下背陰向陽前德而後刑也霜雪晚至五穀猶成雹霧夏隕萬物皆傷由此觀之嚴刑以治國猶任秋冬以成穀也故法令者治惡之具也而非至治之風也是以古者明王茂其德教而緩其刑罰也網漏吞舟之魚而刑審於繩墨之外及臻其末而民莫犯禁也, SBCK: 對}
