  - {type: variant, offset: 312, length: 425, content: 里之主與小國之匈奴乎夫以天下之力勤何不摧以天下之士民何不服今有帝名而威不信於長城之外反賂遺而尚踞敖此五帝所不忍三王所畢怒也文學曰湯事夏而卒服之周事殷而卒滅之故以大御小者王以強凌弱者亡聖人不困其眾以兼國良御不困其馬以兼道故造父之御不失和聖人之治不倍德秦攝利銜以御宇內執修箠以笞八極驂服以罷而鞭策愈加故有傾銜遺箠之變士民非不眾力勤非不多也皆內倍外附而莫為用此高皇帝所以仗劍而取天下也夫兩主好合內外交通天下安寧世世無患士民何事三王何怒焉大夫曰伯翳之始封秦地為七十里穆公開霸孝公廣業自卑至上自小至大故先祖基之子孫成之軒轅戰涿鹿殺兩皞蚩尤而為帝湯武伐夏商誅桀紂而為王黃帝以戰成功湯武以伐成孝故手足之勤腹腸之養也當世之務後世之利也今四夷內侵不攘萬世必有此長患先帝興義兵以誅暴強東滅朝鮮西定冉駹南擒百越北挫強胡追匈奴以廣北州湯武之舉蚩尤之兵也故聖主斥地非私其利用兵非徒奮怒也所以匡難辟害以為黎民遠慮文學曰秦南禽勁越北卻強胡竭中國以役四夷人罷極而主不恤國內潰而上不知, SBCK: ''}
