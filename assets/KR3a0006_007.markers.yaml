  - {type: variant, offset: 5, length: 0, content: '', krp: 漢桓寛撰明張之象註刺議第二十六丞相去聲史曰山林不讓椒桂以成其}
  - {type: variant, offset: 6, length: 1, content: 禮, SBCK: 君子不辭􅀒薪之言以廣其名故多見者􅀶多聞者知距諫者塞專巳者􅀌故謀及下者無失䇿舉及衆者無頓功詩云詢于蒭蕘故布衣皆得風議何况公卿之史乎春秋士不載文而書咺者以爲宰士也孔子曰雖不吾以吾其與聞諸侯僕雖不敏亦當傾耳下風攝齊勾指受業徑於君子之塗矣使文學言之而是僕之言有何害使文學言之而非雖㣲丞相史孰不非也文學曰以正輔人謂之忠以邪􅋚人謂之佞夫怫過納善者君之忠臣大夫之直士也孔子曰大夫有爭臣三人雖無道不失其家今子處宰士之列無忠正之心枉不能正邪不能匡順流以容身從風以說上上所古則苟聽上所行則曲從􅀂影之隨形響之於聲終無所月非衣儒衣冠儒冠而不能行其道非其儒也譬􅀂土龍文章首目具而非龍也葶歴似菜而味殊玉石相似而異􅀋子非孔氏執經守道之儒乃公卿靣從之儒非吾徒也冉有爲季氏宰而附益之孔子曰小子鳴鼓而攻之可也故輔桀者不爲智爲桀歛者不爲仁氶相史默然不對利議}
  - {type: page-break, offset: 6, content: '', id: KR3a0006_SBCK_005-18b}
  - {type: page-break, offset: 6, content: '', id: KR3a0006_SBCK_005-19a}
  - {type: variant, offset: 6, length: 1, content: 禮, WYG: 君子不辭負薪之言以廣其名故多見者博多聞者知去聲距諫者塞專已者孤故謀及下者無失䇿舉及衆者無頓功頓壊也權謀篇曰聖王之舉事必先諦之於謀慮而後考之於蓍龜白屋之士皆關其謀芻蕘之役咸盡其心故萬舉而無遺籌失策傳曰衆人之智可以測天兼聼獨斷惟在一人此大謀之術也謀有二端上謀知命其次知事知命者預見存亡禍福之原早知盛衰廢興之始防事之未萌避難於無形若此人者居亂世則不害於其身在乎太平之世則必得統下之權彼知事者亦尚矣見事而知得失成敗之分而究其所終極故無敗業廢功東野鄙人曰泰山不讓礫石江海不辭小流所以成其大也詩曰先民有言詢于芻蕘博謀也秦王子嬰曰輕慮者不可以治國獨智者不可以存君詩云詢于芻蕘故布衣皆得風去聲議何况公卿之史乎春秋士不載文而書咺暄上聲者以為宰士也春秋曰天王使宰咺來歸惠公仲子之賵公羊傳曰宰者何官也咺者何名也曷為以官氏宰士也孔子曰雖不吾以吾其與去聲聞諸侯僕雖不敏亦當傾耳下風攝齊音咨勾指受業徑於君子之塗矣使文學言之而是僕之言有何害使文學言之而非雖㣲丞相去聲史孰不非也文學曰以正輔人謂之忠以邪導人謂之佞令尹子西曰為人臣而忠其君者爵禄不足以賞也為人臣而諛其君者刑罰不足以誅也夫音扶怫音勃過納善者君之忠臣大夫之直士也孔子曰大夫有爭去聲臣三人雖無道不失其家韓嬰曰大夫有争臣三人雖無道不失其家季氏為無道僭天子舞八佾旅泰山以雍徹孔子曰是可忍也孰不可忍也然不亡者以冉有季路為宰臣也今子處宰士之列無忠正之心枉不能正邪不能匡順流以容身從風以説音悦上上所言則苟聽上所行則曲從若影之隨形響之於聲終無所是非夏侯𤣥曰夫和羮之美在於合異上下之益在能相濟順從乃安此琴瑟一聲也衣去聲儒衣冠去聲儒冠而不能行其道非真儒也譬若土龍文章首目具而非龍也葶歴似菜而殊味玉石相似而異類汜論曰夫亂人者芎藭之與藁本也蛇牀之與􅐘蕪也此皆相似故劒工惑劒之似莫邪者唯歐冶能名其種玉工眩玉之似碧盧者唯猗頓不失其情魏文侯曰夫物多相類而非也幽莠之㓜也似禾驪牛之黄也似虎白骨疑象武夫類玉此皆似之而非者也子非孔氏執經守道之儒乃公卿面從之儒非吾徒也冉有為季氏宰而附益之孔子曰小子鳴鼓而攻之可也故輔桀者不為知去聲為桀斂者不為仁丞相去聲史黙然不對利議}
