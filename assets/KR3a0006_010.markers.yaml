  - {type: variant, offset: 15, length: 0, content: '', SBCK: 支趙武靈王踰句注過代谷略滅林胡樓煩燕襲走東胡辟地千里度遼東而攻朝鮮蒙公爲秦擊走匈奴􅀂鷙鳥之追羣雀匈奴􅀔惜不敢􅀯靣而望十餘年及其後蒙公死而諸侯叛秦中國擾亂匈奴紛紛乃敢復爲邉冦夫以小國燕趙尚猶却冦虜以廣地今以漢國之大士民之力非特齊􅁊之衆燕趙之師也然匈奴乆未服}
