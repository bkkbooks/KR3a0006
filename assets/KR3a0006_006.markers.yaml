  - {type: variant, offset: 234, length: 0, content: '', WYG: 受賞而不肖者被刑固其然也文學何怪焉文學曰論者相扶以義相喻以道從善不求勝服義不恥窮若相迷以偽相亂以辭相矜於後息期於苟勝非其貴者也傳曰孔子過康子子張子夏從孔子入坐二子相與論終日不决子夏辭氣甚隘顔色甚變子張曰子亦聞夫子之議論邪徐言誾誾威儀翼翼後言先黙得之推讓巍巍乎蕩蕩乎道有歸矣小人之論也專意自是言人之非瞑目搤腕疾言噴噴口沸目赤一幸得勝疾笑嗌嗌威儀固陋辭氣鄙俗是以君子賤之也夫音扶蘇秦張儀熒惑諸侯傾覆萬乘去聲使人主失其所持非不辯然亂之道也泰族訓曰百川並流不注海者不為川谷趣行踳馳不歸善者不為君子故善言歸乎可行善行歸乎仁義田子方段干木輕爵祿而重其身不以欲傷生不以利累形李克竭股肱之力領理百官輯穆萬民使其君生無廢事死無遺憂此異行而歸於善者張儀蘇秦家無常居身無定君約􅀙衡之事為傾覆之謀濁亂天下撓􅉸諸侯使百姓不遑啓居或􅀙或横或合衆弱或輔富强此異行而歸于醜者也故君子之過也猶日月之蝕何害於明小人之行也猶狗之晝吠鴟之夜見何益於善夫知者不妄發擇善而為之計義而行之故事成而功足賴也身死而名足稱也雖有知能必以仁義為之本然後可立也子疾鄙夫之不可與事君患其聼􅀙而無所不至也今子不聼正義以輔卿相去聲又從而順之好去聲須􅁷之說不計其後君子之為人吏宜受上戮子姑黙矣孝養第二十五丞相去聲史曰葢聞}
