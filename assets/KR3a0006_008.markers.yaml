  - {type: 'tls:seg', offset: 1129, content: '', id: KR3a0006_tls_008-10a.25}
  - {type: variant, offset: 1129, length: 0, content: '', WYG: 漢紀曰元封三年春作角抵戲以享外國朝獻者三百餘里内人皆觀張騫傳曰是時上方數廵狩海上廼悉從外國客大都多人過之則散財帛賞賜厚具饒給之以覽視漢富厚焉大角抵出竒戯諸恠物多聚觀者行賞賜酒池肉林令外國客徧觀名倉庫府藏之積欲以見漢廣大傾駭之及加其眩者之工而角抵竒戯嵗增變其益興自此始而外國使更來更去大宛以西皆自恃逺尚驕恣未可詘以禮羈縻而使也昔}
