body:
  text: 鹽鐵論卷十刑德第五十五大夫曰令者所以教民也法者所以督姦也令嚴而民慎法設而姦禁罔疏則獸失法疏則罪漏罪漏則民放佚而輕犯禁故禁不必怯夫徼幸誅誠跖蹻不犯是以古者作五刑刻肌膚而民不踰矩文學曰道徑衆人不知所由也法令衆民不知所避也故王者之制法也昭乎如日月故民不迷曠乎若大路故民不惑幽隱遠方折乎知之室女童婦咸知所避是以法令不犯而獄犴不用也昔秦法繁於秋荼而網密於凝脂然而上下相遁姦僞萌生有司治之若救爛撲焦不能禁非網疏而罪漏禮義廢而刑罰任也方今律令百有餘篇文章繁罪名重郡國用之疑惑或淺或深自吏明習者不知所處而況愚民乎律令塵蠹於棧閣吏不能遍覩而況愚民乎此斷獄所以滋衆而民犯禁滋多也宜犴宜獄握粟出卜自何能穀刺刑法繁也親服之屬甚衆上殺下殺而服不過五五刑之屬三千上附下附而罪不過五故治民之道務篤其教而已大夫曰文學言王者立法曠若大路今馳道不小也而民公犯之以其罰罪之輕也千仞之高人不輕凌千鈞之重人不輕舉商君刑棄灰於道而秦民治故盜馬者死盜牛者加所以重本而絶輕疾之資也武兵名食所以佐邊而重武備也盜傷與殺同罪所以纍其心而責其意也猶魯以楚師伐齊而春秋惡之故輕之為重淺之為深有緣而然法之微者固非衆人之所知也文學曰詩云周道如砥其直如矢言其易也君子所履小人所視言其明也故德明而易從法約而易行今馳道經營陵陸紆周天下是以萬里為民穽也罻羅張而縣其谷辟陷設而當其蹊矰弋飾而加其上能勿離乎聚其所欲開其所利仁義陵遲能勿踰乎故其末途至於攻城入邑損府庫之金盜宗廟之器豈特千仞之高千鈞之重哉管子曰四維不張雖皋陶不能為士故德教廢而詐僞行禮義壞而姦邪興言無仁義也仁者愛之效也義者事之宜也故君子愛仁以及物治近以及遠傳曰凡生之物莫貴於人人主之所貴莫重於人故天之生萬物以奉人也主愛人以順天也聞以六畜禽獸養人未聞以所養害人者也魯廄焚孔子罷朝問人不問馬賤畜而重人也今盜馬者罪死盜牛者加乘騎車馬行馳道中吏舉苛而不止以為盜馬而罪亦死今傷人持其刀劍而亡亦可謂盜武庫兵而殺之乎人主立法而民犯之亦可以為逆而輕主約乎深之可以死輕之可以免非法禁之意也法者緣人情而制非設罪以陷人也故春秋之治獄論心定罪志善而違於法者免志惡而合於法者誅今傷人未有所害志不甚惡而合於法者謂盜而傷人者耶將執法者過耶何於人心不厭也古者傷人有創者刑盜有贓者罰殺人者死今取人兵刃以傷人罪與殺人同得無非其至意與大夫俯仰未應對御史曰執法者國之轡銜刑罰者國之維楫也故轡銜不飭雖王良不能以致遠維楫不設雖良工不能以絶水韓子疾有國者不能明其法勢御其臣下富國強兵以制敵禦難惑於愚儒之文詞以疑賢士之謀舉浮淫之蠹加之功實之上而欲國之治猶釋階而欲登高無銜橛而禦捍馬也今刑法設備而民猶犯之況無法乎其亂必也文學曰轡銜者御之具也得良工而調法勢者治之具也得賢人而化執轡非其人則馬奔馳執軸非其人則船覆傷昔吳使宰嚭持軸而破其船秦使趙高執轡而覆其車今廢仁義之術而任刑名之徒則復吳秦之事也夫為君者法三王為相者法周公為術者法孔子此百世不易之道也韓非非先王而不遵舍正令而不從卒蹈陷穽身幽囚客死於秦夫不通大道而小辨斯足以害其身而已申韓第五十六御史曰待周公而為相則世無列國待孔子而後學則世無儒墨夫衣小缺㡜裂可以補而必待全匹而易之政小缺法令可以防而必待雅頌乃治之是猶舍鄰之醫而求俞跗而後治病廢汙池之水待江海而後救火也迂而不徑闕而無務是以教令不從而治煩亂夫善為政者弊則補之決則塞之故吳子以法治楚魏申商以法彊秦韓也文學曰有國者選衆而任賢學者博覽而就善何必是周公孔子故曰法之而已今商鞅反聖人之道變亂秦俗其後政耗亂而不能治流失而不可復愚人縱火於沛澤不能復振蜂蠆螫人放死不能息其毒也煩而止之躁而靜之上下勞擾而亂益滋故聖人教化上與日月俱照下與天地同流豈曰小補之哉御史曰衣缺不補則日以甚防漏不塞則日以滋大河之始決於瓠子也涓涓爾及其卒泛濫為中國害菑梁楚破曹衛城郭壞沮蓄積漂流百姓木棲千里無廬令孤寡無所依老弱無所歸故先帝閔悼其菑親省河堤舉禹之功河流以復曹衛以寧百姓戴其功詠其德歌宣房塞萬福來焉亦猶是也如何勿小補哉文學曰河決若甕口而破千里況禮決乎其所害亦多矣今斷獄歲以萬計犯法滋多其為菑豈特曹衛哉夫知塞宣房而福來不知塞亂原而天下治也周國用之刑錯不用黎民若四時各終其序而天下不孤頌曰綏我眉壽介以繁祉此夫為福亦不小矣誠信禮義如宣房功業已立垂拱無為有司何補法令何塞也御史曰犀銚利鉏五穀之利而間草之害也明理正法姦邪之所惡而良民之福也故曲木惡直繩姦邪惡正法是以聖人審於是非察於治亂故設明法陳嚴刑防非矯邪若隱括輔檠之正𠇗剌也故水者火之備法者止姦之禁也無法勢雖賢人不能以為治無甲兵雖孫吳不能以制敵是以孔子倡以仁義而民從風伯夷遁首陽而民不可化文學曰法能刑人而不能使人廉能殺人而不能使人仁所貴良醫者貴其審消息而退邪氣也非貴其下針石而鑽肌膚也所貴良吏者貴其絶惡於未萌使之不為非非貴其拘之囹圄而刑殺之也今之所謂良吏者文察則以禍其民強力則以厲其下不本法之所由生而專己之殘心文誅假法以陷不辜纍無罪以子及父以弟及兄一人有罪州里驚駭十家奔亡若癰疽之相濘色淫之相連一節動而百枝搖詩云舍彼有罪既伏其辜若此無罪淪胥以鋪痛傷無罪而纍也非患銚耨之不利患其舍草而藝苗也非患無準平患其舍枉而繩直也故親近為過不必誅是鋤不用也疏遠有功不必賞是苗不養也故世不患無法而患無必行之法也周秦第五十七御史曰春秋罪人無名號謂之云盜所以賤刑人而絶之人倫也故君不臣士不友於閭里無所容故民恥犯之今不軌之民犯公法以相寵舉棄其親不能伏節死理遁逃相連自陷於罪其被刑戮不亦宜乎一室之中父兄之際若身體相屬一節動而知於心故今自關內侯以下比地於伍居家相察出入相司父不教子兄不正弟舍是誰責乎文學曰古者周其禮而明其教禮周教明不從者然後等之以刑刑罰中民不怨矣故舜施四罪而天下咸服誅不仁也輕重各服其誅刑必加而無赦赦惟疑者若此則世安得不軌之人而罪之乎今殺人者生剽攻竊盜者富故良民內解怠輟耕而隕心古者君子不近刑人刑人非人也身放殛而辱後世故無賢不肖莫不恥也今無行之人貪利以陷其身蒙戮辱而捐禮義恆於苟生何者一日下蠶室創未瘳宿衛人主出入宮殿由得受奉祿食太官享賜身以尊榮妻子獲其饒故或載卿相之列就刀鋸而不見閔況衆庶乎夫何恥之有廢其德教而責之以禮義是虐民也春秋傳曰子有罪執其父臣有罪執其君聽失之大者也今以子誅父以弟誅兄親戚相坐什伍相連若引根本之及華葉傷小指之纍四體也如此則以有罪反誅無罪反誅無罪則天下之無罪者寡矣臧文仲治魯勝其盜而自矜子貢曰民將欺而況盜乎故吏不以多斷為良醫不以多刺為工子産刑二人殺一人道不拾遺而民無誣心故為民父母以養疾子長恩厚而已自首匿相坐之法立骨肉之恩廢而刑罪多矣聞父母之於子雖有罪猶匿之其不欲服罪爾子為父隱父為子隱未聞父子之相坐也聞兄弟能緩追以免賊未聞兄弟之相坐也聞惡惡止其人疾始而誅首惡未聞什伍而相坐也老子曰上無欲而民朴上無事而民自富君君臣臣父父子子比地何伍而執政何責也御史曰夫負千鈞之重以登無極之高垂峻崖之峭谷下臨不測之淵雖有慶忌之捷賁育之勇莫不震懾悼栗者知墜則身首肝腦塗山石也故未嘗灼而不敢握火者見其有灼也未嘗傷而不敢握刃者見其有傷也彼以知為非罪之必加而戮及父兄必懼而為善故立法制辟若臨百仞之壑握火蹈刃則民畏忌而無敢犯禁矣慈母有敗子小不忍也嚴家無悍虜篤責急也今不立嚴家之所以制下而修慈母之所以敗子則惑矣文學曰紂為炮格之刑而秦有收帑之法趙高以峻文決罪於內百官以峭法斷割於外死者相枕席刑者相望百姓側目重足不寒而栗詩云謂天蓋高不敢不局謂地蓋厚不敢不蹐哀今之人胡為虺蜥方此之時豈特冒火蹈刃哉然父子相背兄弟相慢至於骨肉相殘上下相殺非刑輕而罰不必令太嚴而仁恩不施也故政寬則下親其上政嚴則民謀其主晉厲以幽二世見殺惡在峻法之不犯嚴家之無悍虜也聖人知之是以務和而不務威故高皇帝約秦苛法以慰怨毒之民而長和睦之心唯恐刑之重而德之薄也是以恩施無窮澤流後世商鞅吳起以秦楚之法為輕而纍之上危其主下沒其身或非特慈母乎詔聖第五十八御史曰夏后氏不倍言殷誓周盟德信彌衰無文武之人欲修其法此殷周之所以失勢而見奪於諸侯也故衣弊而革才法弊而更制高皇帝時天下初定發德音行一切之令權也非撥亂反正之常也其後法稍犯不正於理故姦萌而甫刑作王道衰而詩刺彰諸侯暴而春秋譏夫少目之罔不可以得魚三章之法不可以為治故令不得不加法不得不多唐虞畫衣冠非阿湯武刻肌膚非故時世不同輕重之務異也文學曰民之仰法猶魚之仰水水清則靜濁則擾擾則不安其居靜則樂其業樂其業則富富則仁生贍則爭止是以成康之世賞無所施法無所加非可刑而不刑民莫犯禁也非可賞而不賞民莫不仁也若斯則吏何事而可理乎今之治民者若拙御之御馬也行則頓之止則擊之身創於箠吻傷於銜而求其無失何可得乎乾溪之役土崩梁氏內潰嚴刑不能禁峻法不能止故罷馬不畏鞭箠罷民不畏刑法雖增而纍之其亡益乎御史曰嚴牆三刃樓季難之山高干雲牧豎登之故峻則樓季難三刃陵夷則牧豎易山巔夫鑠金在爐莊蹻不顧錢刀在路匹婦掇之非匹婦貪而莊蹻廉也輕重之制異而利害之分明也故法令可仰而不可踰可臨而不可入詩云不敢暴虎不敢馮河為其無益也魯好禮而有季孟之難燕噲好讓而有子之之亂禮讓不足禁邪而刑法可以止暴明君據法故能長制群下而久守其國也文學曰古者明其仁義之誓使民不踰上乎刑之不教而殺是以虐也與其刑不可踰不若義之不可踰也聞禮義行而刑罰中未聞刑罰行而孝悌興也高牆狹基不可立矣嚴刑峻法不可久也二世信趙高之計泄篤責而任誅斷刑者半道死者日積殺民多者為忠厲民悉者為能百姓不勝其求黔首不勝其刑海內同憂而俱不聊生故過任之事父不得於子無已之求君不得於臣知死不再生窮鼠齧貍匹夫奔萬乘舍人折弓陳勝吳廣是也當此之時天下俱起四面而攻秦聞不一期而社稷為墟惡在其能長制群下而久守其國也御史默然不對大夫曰瞽師不知白黑而善聞言儒者不知治世而善訾議夫善言天者合之人善言古者考之今令何為施法何為加湯武全肌骨而殷周治秦國用之法弊而犯二尺四寸之律古今一也或以治或以亂春秋原罪甫刑制獄今願聞治亂之本周秦所以然乎文學曰春夏生長聖人象而為令秋冬殺藏聖人則而為法故令者教也所以導民人法者刑罰也所以禁強暴也二者治亂之具存亡之效也在上所任湯武經禮義明好惡以道其民刑罪未有所加而民自行義殷周所以治也上無德教下無法則任刑必誅劓鼻盈蔂斷足盈車舉河以西不足以受天下之徒終而以亡者秦王也非二尺四寸之律異所行反古而悖民心也大論第五十九大夫曰呻吟槁簡誦死人之語則有司不似文學文學知獄之在廷後而不知其事聞其事而不知其務夫治民者若大匠之斫斧斤而行之中繩則止杜大夫王中尉之等繩之以法斷之以刑然後寇止姦禁故射者因槷治者因法虞夏以文殷周以武異時各有所施今欲以敦朴之時治抏弊之民是猶遷延而拯溺揖讓而救火也文學曰文王興而民好善幽厲興而民好暴非性之殊風俗使然也故商周之所以昌桀紂之所以亡也湯武非得伯夷之民以治桀紂非得跖蹻之民以亂也故治亂不在於民孔子曰聽訟吾猶人也必也使無訟乎無訟者難訟而聽之易夫不治其本而事其末古之所謂愚今之所謂智以箠楚正亂以刀筆正文古之所謂賊今之所謂賢也大夫曰俗非唐虞之時而世非許由之民而欲廢法以治是猶不用隱括斧斤欲撓曲直枉也故為治者不待自善之民為輪者不待自曲之木往者應少伯正之屬潰梁楚昆盧徐穀之徒亂齊趙山東關內暴徒保人阻險當此之時不任斤斧折之以武而乃始設禮修文有似窮醫欲以短針而攻疽孔丘以禮說跖也文學曰殘材木以成室屋者非良匠也殘賊民人而欲治者非良吏也故公輸子因木之宜聖人不費民之性是以斧斤簡用刑罰不任政立而化成扁鵲攻於腠理絶邪氣故癰疽不得成形聖人從事於未然故亂原無由生是以砭石藏而不施法令設而不用斷已然鑿已發者凡人也治未形覩未萌者君子也大夫曰文學所稱聖知者孔子也治魯不遂見逐於齊不用於衛遇圍於匡困於陳蔡夫知時不用猶說強也知困而不能已貪也不知見欺而往愚也困辱不能死恥也若此四者庸民之所不為也何況君子乎商君以景監見應侯以王稽進故士因士女因媒至其親顯非媒士之力孔子不以因進見而能往者非賢士才女也文學曰孔子生於亂世思堯舜之道東西南北灼頭濡足庶幾世主之悟悠悠者皆是君暗大夫妬孰合有媒是以嫫母飾姿而矜夸西子倣徨而無家非不知窮厄而不見用悼痛天下之禍猶慈母之伏死子也知其不可如何然惡已故適齊景公欺之適衛靈公圍陽虎謗之桓魋害之夫欺害聖人者愚惑也傷毀聖人者狂狡也狡惑之人非人也夫何恥之有孟子曰觀近臣者以所為主觀遠臣者以其所主使聖人僞容苟合不論行擇友則何以為孔子也大夫憮然內慚四據而不言當此之時順風承意之士如編口張而不歙舌舉而不下暗然而懷重負而見責大夫曰諾膠車倏逢雨請與諸生解雜論第六十客曰余覩鹽鐵之義觀乎公卿文學賢良之論意指殊路各有所出或上仁義或務權利異哉吾所聞周秦粲然皆有天下而南面焉然安危長久殊世始汝南朱子伯為豫言當此之時豪俊並進四方輻輳賢良茂陵唐生文學魯國萬生之倫六十有餘人咸聚闕庭舒六藝之風論太平之原智者贊其慮仁者明其施勇者見其斷辨者陳其詞誾誾焉侃侃焉雖未能詳備斯可略觀矣然蔽於雲霧終廢而不行悲夫公卿知任武可以辟地而不知廣德可以附遠知權利可以廣用而不知稼穡可以富國也近者親附遠者說德則何為而不成何求而不得不出於斯路而務畜利長威豈不謬哉中山劉子雍言王道矯當世復諸正務在乎反本直而不徼切而不𤌘斌斌然斯可謂弘博君子矣九江祝生奮由路之意推史魚之節發憤悶刺譏公卿介然直而不撓可謂不畏強禦矣桑大夫據當世合時變推道術尚權利辟略小辨雖非正法然巨儒宿學恧然不能自解可謂博物通達之士矣然攝卿相之位不引準繩以道化下放於利末不師古始易曰焚如棄如處非其位行非其道果隕其性以及厥宗車丞相即周呂之列當軸處中括囊不言容身而去彼哉彼哉若夫群丞相御史兩府之士不能正議以輔宰相成同類長同行阿意苟合以說其上斗筲之人道諛之徒何足算哉
