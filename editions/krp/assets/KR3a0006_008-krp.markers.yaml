  - {type: variant, offset: 11765, length: 397, content: 也榖梁傳曰財盡則怨力盡則懟主父偃曰怒者逆徳也兵者凶器也争者末節也古之人君一怒必伏尸流血故聖王重行之夫務戰勝窮武事者未有不悔者也昔秦皇帝任戰勝之威蠶食天下并吞戰國海内為一功齊三代務勝不休欲攻匈奴李斯諫曰不可夫匈奴無城郭之居委積之守遷徙易舉難得而制也輕兵深入糧食必絶踵糧以行重不及事得其地不足以為利也遇其民不可役而守也勝必殺之非民父母也靡敝中國快心匈奴非長䇿也秦皇帝不聼遂使䝉恬將兵攻胡辟地千里以河為境地固澤鹹鹵不生五榖然後發天下丁男以守北河暴兵露師十有餘年死者不可勝數終不能踰河而北是豈人衆不足兵革不備哉其勢不可也又使天下蜚芻輓粟起於東腄琅琊負海之郡轉輸河北率三十鍾而致一石男子疾耕不足於糧饟女子紡績不足於帷幕百姓靡敝孤寡老弱不能相養道路死者相望盖天下始畔秦也故兵法曰興師十萬日費千金夫秦嘗積衆暴兵數十萬人雖有覆軍殺將係虜單于之功亦適足以結怨深讐不足以償天下之費夫上虚府庫下敝百姓甘心于外國非完事, SBCK: ''}
