  - {type: variant, offset: 4462, length: 0, content: '', krp: 非有牢甲利兵勁弩强衝也伐棘棗而為矜周錐鑿而為刃剡摲筡奮儋钁以當修㦸强弩攻城略地莫}
  - {type: variant, offset: 4463, length: 0, content: '', WYG: 降下天下為之麋沸螘動雲徹席卷方數千里勢位至賤而器械甚不利然一人唱而天下應之者積怨在於民也所謂金城者非謂築壤而髙土鑿地而深池也所謂利兵者非謂呉越之鋌音挺干將之劒也呉越春秋曰呉王闔閭請干將作劒干將者呉人其妻曰莫邪干將采五山之精六金之英候天地伺隂陽百神臨視而金鐵之精未流夫妻乃剪髮及爪而投之罏中金鐵乃濡遂成二劒陽曰干將而作龜文隂曰莫邪而作漫理干將匿其陽出其隂以獻闔閭闔閭甚寳重之言以道徳為城以仁義為郭莫之敢攻莫之敢入文王是也以道徳為䩜音逐以仁義為劒莫之敢當莫之敢御湯武是也今不建不可攻之城不可當之兵而欲}
  - {type: page-break, offset: 4463, content: '', id: KR3a0006_WYG_010-21a, image: WYG0695/WYG0695-0630c.png}
  - {type: variant, offset: 4463, length: 0, content: '', krp: 降下天下為之麋沸螘動雲徹席卷方數千里勢位至賤而器械甚不利然一人唱而天下應之者積怨在於民也所謂金城者非謂築壤而髙土鑿地而深池也所謂利兵者非謂呉越之鋌音挺干將之劒也呉越春秋曰呉王闔閭請干將作劒干將者呉人其妻曰莫邪干將采五山之精六金之英候天地伺隂陽百神臨視而金鐵之精未流夫妻乃剪髮及爪而投之罏中金鐵乃濡遂成二劒陽曰干將而作龜文隂曰莫邪而作漫理干將匿其陽出其隂以獻闔閭闔閭甚寳重之言以道徳為城以仁義為郭莫之敢攻莫之敢入文王是也以道徳為䩜音逐以仁義為劒莫之敢當莫之敢御湯武是也今不建不可攻之城不可當之兵而欲}
  - {type: variant, offset: 4464, length: 3, content: 斤斧折, WYG: 匹夫之役而行三尺之刃亦細矣道應篇曰齊楚呉越皆嘗勝矣然而卒取亡焉不通乎持勝也唯有道之主能持勝孔子勁杓國門之關而不肯以力聞墨子為守攻公輸般服而不肯以兵知善持勝者以强為弱故老子曰道冲而用之又弗盈也惠孟見宋康王蹀足謦欬疾言曰寡人所說者勇有功也不説為仁義者也客將何以教寡人惠孟對曰臣有道於此人雖勇刺之不入雖巧有力擊之不中大王獨無意邪宋王曰善此寡人之所欲聞也惠孟曰夫刺之而不入擊之而不中此猶辱也臣有道於此使人雖有勇弗敢刺雖有力不敢擊夫不敢刺不敢擊非無其意也臣有道於此使人本無其意也夫無其意未有愛利之心也臣有道於此使天下丈夫女子莫不歡然皆欲愛利之心此其賢於勇有力也四累之上也大王獨無意耶宋王曰此寡人所欲得也惠孟對曰孔墨是已孔丘墨翟無地而為君無官而為長天下丈夫女子莫不延頸舉踵而願安利之者今大王萬乗之主也誠有其志則四境之内皆得其利矣賢於孔墨也逺矣宋王無以應惠孟出宋王謂左右曰辯矣客}
  - {type: page-break, offset: 4464, content: '', id: KR3a0006_WYG_010-21b, image: WYG0695/WYG0695-0630d.png}
