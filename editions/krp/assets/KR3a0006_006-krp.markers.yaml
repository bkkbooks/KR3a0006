  - {type: variant, offset: 784, length: 357, content: 尊賢篇曰國家之任賢而吉任不肖而凶案往世而視已事其必然也如合符此為人君者不可以不慎也國公惛亂而良臣見魯國大亂季友之賢見僖公即位而任季子魯國安寕外内無憂行政二十一年季子之卒後邾擊其南齊伐其北魯不勝其患將乞師於楚以取全耳故傳曰患之起必自此始也公子買不可使成衞公遂不聽君命而擅之晋内侵於臣下外困於兵亂弱之患也僖公之性非前二十一年常賢而後乃漸變為不肖也此季子存之所益亡之所損也夫得賢失賢其損益之騐如此而人主急於所用甚可疾痛也夫智不足以見賢無可奈何矣若智能見之而強不能决猶豫不用而大者死亡小者亂傾此甚可悲哀也以宋殤公而不知孔父之賢乎安知孔父死已必死趨而救之趨而救之者是知其賢也以魯荘公不知季子之賢乎安知疾將死召季子而授之國政授之國政者是知其賢也此二君知能見賢而皆不能用故宋殤公以殺死魯荘公以賊嗣使宋殤蚤任孔父将靖鄰國而况自存乎, SBCK: ''}
