  - {type: variant, offset: 696, length: 0, content: '', WYG: 傳曰昔戎将由余使秦秦穆公問以得失之要對曰古有國者未嘗不以恭儉也失國者未嘗不以驕奢也由余因論五帝三王之所以衰布衣之所以亡繆公然之扵是告内史王繆曰鄰國有聖人敵國之憂也由余聖人也将奈之何王繆曰夫戎王居僻陋之地未嘗見中國之聲色也君其遺之女樂以婬其志亂其政其臣下必疎因為由余請緩期使其君臣有間然後可圖繆公曰善乃使王繆以女樂二列遺戎王為由余請期戎王大恱許之扵是張酒聴樂日夜不休終嵗婬縦卒馬多死由余歸數諫不聴去之秦秦公子逆拜之為上卿遂并國十二辟地千里千金書曰管子束縛在魯桓公欲相鮑叔鮑叔曰吾君欲覇王則管夷吾在彼臣弗若也桓公曰夷吾寡人之賊也射我者也不可鮑叔曰夷吾為其君射人者也君若得而用之則彼亦将為君射人桓公不聽強相鮑叔鮑叔固辭讓弗相桓公果聽之扵是使人告魯曰管夷吾寡人之讐也願得之而親加手焉魯君許諾乃使吏鞹其拳膠其目盛之以䲭夷置之車中至齊境桓公使人以朝車迎之祓以灌火釁以犠猳焉生與之如國命有司除廟筵几而薦之曰自孤之聞夷吾之言也目益明耳益聰孤弗敢専故以吿于先君因顧而命管子曰夷吾佐余管子還走再拜稽首受令而出管子治齊國舉事有功桓公必先賞鮑叔曰使齊國得管子者鮑叔也桓公可謂知行賞矣楚莊王曰世不絶聖國不絶賢晉平公㳺扵河而樂曰安得賢士與之樂此也船人盍胥跪而對曰主君亦不好士耳夫珠出扵江海玉出扵崑山無足而至者葢由主君之好也士有足而不至者葢主君無好士之意耳無患乎無士也王符曰夫十步之澤必有香草十室之邑必有忠信是故亂殷有三仁小衞多君子然衰國危君繼踵不絶者豈時無忠信正直之士哉誠苦其道不得行耳仲長統曰物有不求未有無物之嵗也士有不用未有少士之世也}
