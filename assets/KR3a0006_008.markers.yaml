  - {type: variant, offset: 1125, length: 0, content: '', krp: 也有民不畜有司雖助之耕織其能足之乎賢良曰周公之相去聲成王也百姓饒樂音洛國無乏人非代之耕織也易其田疇薄其税斂則民富矣上以奉君親下無饑寒之憂則教可成也傳曰夫百姓内不乏食外不患寒則可教御以禮義矣語曰既富矣又何加焉曰教之以徳齊之以禮則民從義而從善莫不入孝出悌夫音扶何奢侈暴慢之有孔子曰夫民教之以徳齊之以禮則民有格心教之以政齊之以刑則民有遯心故君民者子以愛之則民親之信以結之則民不倍㳟以涖之則民有孫心甫刑曰苖民匪用命制以刑惟作五虐之刑曰法是以民有惡徳而遂絶其世也管子曰倉廪實而知禮節百姓足而知榮辱故民易與適禮難與適道大夫曰縣官之於百姓若慈父之於子也忠焉能勿誨乎愛之能勿勞乎故春親耕以勸農賑貸以澹古贍字不足通滀音畜水出輕繫使民務時也䝉恩被澤而至今猶以貧困其難與適道若是夫音扶賢良曰古者春省耕以補不足秋省歛以助不給民勤於財則貢賦省民勤於力則功業牢為去聲民愛力不奪須臾故召伯聼斷於甘棠之下為妨農業之務也傳曰昔者周道之盛召伯在朝有司請營邵以居召伯曰嗟以吾一身而勞百姓此非吾先君文王之志也於是出而就蒸庻於阡陌隴畆之間而聼斷焉召伯暴處逺野廬於樹下百姓大悦耕桑者倍力以勸於是嵗大稔民給家足其後在位者驕奢不恤元元税賦繁數百姓困乏耕桑失時於是詩人見召伯之所休息樹下美而歌之詩曰蔽茀甘棠勿剪勿伐召伯所苃此之謂也貴徳篇曰聖人之於天下百姓也其猶赤子乎飢者則食之寒者則衣之將之養之育之長之唯恐其不至於大也詩曰蔽芾甘棠勿剪勿伐召伯所苃傳曰自陜以東者周公主之自陜以西者召公主之召公述職當桑蠶之時不欲變民事故不入邑中舍於甘棠之下而聼斷焉陕間之人皆得其所是故後世思而歌詠之善之故言之言之不足故嗟嘆之嗟嘆之不足故歌詠之夫詩思然後積積然後滿滿然後發發由其道而致其位焉百姓嘆其美而致其敬甘棠之不伐也政教惡乎不行孔子曰吾於甘棠見宗廟之敬也甚尊其人必敬其位順安萬物古聖之道幾哉仁人之徳教也誠惻隐於中悃愊於内不能已於其心故其治天下也如救溺人今時雨澍音樹澤澍時雨生萬物也種懸而不得播秋稼零落乎野而不得收田疇赤地而停落成市發春而後懸青幡音番而䇿土牛殆非明主勸耕稼之意而春令之所謂也水旱第三十六大夫曰禹湯聖主后稷伊尹賢相去聲也而有水旱之災水旱天之所為饑穰隂陽之運也非人力故太嵗之數在陽為旱在隂為水天文訓曰八尺之景修徑尺五寸景脩則隂氣勝景短則陽氣勝隂氣勝則為水陽氣勝則為旱六嵗一饑十二嵗一荒天道固然殆非獨有司之罪也賢良曰古者政有徳則隂陽調星辰理風雨時故循行於内聲聞於外為善於下福應於天亢倉子楚曰水隂沴也隂於國政類刑人事類私旱陽過也陽於國政類徳人事類盈楚以為凡遭水旱天子宜正刑修徳百官宜去私戒盈則以類而消百福日至矣周公載紀而天下太平國無夭傷嵗無荒年當此之時雨不破塊風不鳴條旬而一雨雨必以夜無丘陵髙下皆熟傳曰國無道則飄風厲疾暴雨折木隂陽錯氛夏寒冬温春熱秋榮日月無光星辰錯行民多疾病國多不祥羣生不夀而五榖不登當成周之時隂陽調寒暑平羣生遂萬物寧故曰其風治其樂連其驅馬舒其民依依其行遲遲其意好好董仲舒曰太平之世則風不鳴條開甲散萌而已雨不破塊潤葉津莖而已雷不驚人號令啓發而已電不眩目宣示光耀而已霧不寒望浸滛被泊而已雪不封條凌殄毒害而已雲則五色而為慶三色而成矞露則結味而成甘結潤而成膏此聖人之在上則隂陽和風雨時也論衡曰太平瑞應山出車澤出馬男女異路市無二價耕者讓畔斑白不提挈關梁不閉道不擄掠風不鳴條雨不破塊五日一風十日一雨尚書大傳曰成王時越裳重譯而来朝曰久矣天之無烈風迅雨意中國有聖人乎詩曰有渰音掩萋萋興雨祁祁今不省具所然而曰隂陽之運也非所聞也孟子曰野有餓殍不知收也狗豕食人食不知檢也為民父母民饑而死則曰非我也嵗也何異乎以刃殺之則曰非我也兵也方今之務在除饑寒之患罷鹽鐡退權利分土地趣本業養桑麻盡地力也寡功節用則民自富如是則水旱不能憂凶年不能累也周書曰天有四殃水旱飢荒其至無時非務積聚何以脩之夏箴曰小人無兼年之食遇天飢妻子非其有也大夫無兼年之食遇天飢臣妾輿馬非其有也戒之哉弗思弗行至無日矣不明開塞禁舍者其如天下何人各修其學而尊其名聖人制之故諸横生盡以養從生從生盡以養一文夫無殺夭胎無伐不成材無堕四時大夫曰議者貴其辭約而指明可於衆人之聼不至繁文稠辭多言害有司化俗之計而家人語陶朱為生本末異徑一家數事而治生之道乃備今縣官鑄音注農器使民務本不營於末則無饑寒之累鹽鐵何害而罷賢良曰農天下之大業也鐵器民之大用也器用便利則用力少而得作多農夫樂音洛事勸功用不具則田疇荒榖不殖用力鮮功自半器便與不便其功相什而倍也縣官鼔鑄音注鐵器大抵多為大器務應員程不給民用民用鈍弊割草不痛是以農夫作劇音極得獲者少百姓苦之矣大夫曰卒徒工匠以縣官日作公事財用饒器用備家人合會褊於日而勤於用鐵力不銷鍊堅柔不和故有司請總鹽鐵一其用平其賈通作價以便百姓公私雖虞夏之為治不易於此吏明其教工致其事則剛柔和器用便此則百姓何苦而農夫何疾賢良曰卒徒工匠故民得占去聲租鼓鑄音注煮鹽之時鹽與五榖同賈通作價器和利而中用今縣官作鐡器多苦惡臣瓉曰謂作鐵器民患苦其不好也顔師古曰鹽既味苦器又脆惡故總云苦惡也用費不省卒徒煩而力作不盡家人相一父子戮力各務為善器器不善者不集農事急輓音挽運衍之阡陌之間民相與市買得以財貨五榖新弊易貨或貰音世民不棄作業置田器各得所欲更繇音遥省約縣官以徒復作繕音善治道橋諸發民便之今總其原一其賈通作價器多堅䃘音坑善惡無所擇吏數不在器難得家人不能多儲多儲則鎮生棄膏腴音于之日逺市田器則後良時鹽鐡賈通作價貴百姓不便貧民或木耕手耨土耰啖音談食鐵官賣器不售音夀或頗賦於民卒徒作不中去聲程時命助之發徴無限更繇以均劇故百姓疾苦之古者千室之邑百乗去聲之家陶冶工商四民之求足以相更故農民不離畦畆而足乎田器工人不斬伐而足乎陶冶不耕田而足乎粟米百姓各得其便而上無事焉司馬遷曰古者四民因其土宜各在智力夙興夜寐以治其業相與通功易事交利而俱贍非有徴發期會而逺近咸足故易曰后以財成天地之道輔相天地之宜以左右民備物致用立成器以為天下利莫大乎聖人此之謂也是以王者務本不作末去炫音縣燿音耀除雕琢湛民以禮示民以檏是以百姓務本不營於末管子曰凡民從上也不從口之所言從情之所好者也故上之所好民必甚焉是故明君知民之必以上為心也故置法以自治立儀以自正也傳曰聖人不滛佚侈靡者非鄙夫色而愛財用也夏不數浴非愛水也冬不頻湯非愛火也不髙臺榭非無土木也不大鐘鼎非無金錫也直行情性之所安而制度可以為天下法矣昔者舜甑盆無膻而下不以餘獲罪飯乎土簋啜乎土型而農不以力獲罪麑衣而䀈領而女不以巧獲罪傳曰易簡而天下之理得也韓非子曰君無見其所欲見其所欲臣將自雕琢君無見其意君見其意臣將自表異故曰去好去惡臣乃見素去舊去智臣乃自備崇禮第三十七大夫曰飾几杖修樽俎為去聲賔非為去聲主也炫音縣燿音耀竒怪所以陳四夷非為去聲民也夫音扶家人有客尚有倡優竒變之樂而况縣官乎故列羽旄陳戎馬以示威武竒蟲珍怪所以示懐廣逺明徳逺國莫不至也賢良曰王者崇禮施徳上通作尚仁義而賤怪力故聖人絶而不言孔子曰言忠信行去聲篤敬雖蠻貊之邦不可棄也今萬方絶國之君奉贄音至獻者懐天子之盛徳而欲觀中國之禮儀故設明堂辟雍以示之揚干戚昭雅頌以風去聲之今乃玩好去聲不用之器竒蟲不畜之獸角抵諸戲炫音縣燿音耀之物陳夸通作誇之殆與周公待逺方殊刑法志曰春秋之後滅弱吞小並為}
  - {type: variant, offset: 1127, length: 0, content: '', WYG: 稍增講武之禮以為戯樂用相夸視而秦更名角抵先王之禮沒於滛樂中矣應劭曰角者角技也抵者相抵觸也文頴曰抵當也名此樂為角抵者兩兩相當角力角技藝御射故名角抵盖雜技樂也巴俞戲魚龍蔓延之屬也顔師古曰炫耀之物眩人也眩相詐惑也讀與幻同其術本從西域來即今吞刀吐火植𤓰種樹屠人戮馬之術皆}
