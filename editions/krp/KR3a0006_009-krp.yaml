body:
  text: 鹽鐵論卷九漢桓寛撰明張之象註執務第三十九丞相去聲史曰先王之道軼音益人而難復賢良文學之言深逺而難行夫音扶稱上聖之髙行去聲道至德之美言非當世之所能及也泰族訓曰事不本於道德者不可以為儀言不合乎先王者不可以為道願聞方今之急務可復行於政使百姓咸足於衣食無乏困之憂風雨時五穀熟螟音冥螣音特不生天下安樂音洛盗賊不起流人還音旋歸各反其田里吏皆亷正故以奉職元元各得其理也賢良曰孟子曰堯舜之道非逺人也而人不思之耳詩云求之不得寤寐思服有求如關雎好去聲德如河廣何不濟不得之有故髙山仰止景行行止雖不能及離去聲道不逺也徐幹曰詩云髙山仰止景行行止好學之謂也倦立而思逺不如速行之必至也矯首而狥飛不如循雌之必獲也孤居而願智不如務學之必達也孔子曰弗學何以行弗思何以得馬雖有逸足而不閑輿則不為良駿人雖有美質而不習道則不為君子顔淵曰舜獨何人也回何人也夫音扶思賢慕能從善不休則成康之俗可致而唐虞之道可及漢武帝曰昔在唐虞畫象而民不犯日月所燭莫不率俾周之成康刑措不用德及鳥獸教通四海海外肅慎北發渠搜氏羌徠服星辰不孛日月不蝕山川不崩川谷不塞麟鳯在郊藪河洛出圖書公卿未思也先王之道何逺之有齊桓公以諸侯思王政憂周室匡諸夏之難去聲平夷狄之亂存亡接絶信義大行著于天下召陵之會予上聲之為主春秋曰楚屈完來盟于師盟于召陵公羊傳曰其言盟于師盟于召陵何師在召陵也師在召陵則曷為再言盟喜服楚也何言乎喜服楚楚有王者則後服無王者則先叛夷狄也而亟病中國南夷與北夷交中國不絶若綫桓公救中國而攘夷狄卒帖荆以此為王者之事也其言來何與桓為主也前此者有事矣後此者有事矣則曷為獨於此焉與桓公為主序績也要略曰齊桓公之時天子卑弱諸侯力征南夷北狄交伐中國中國之不絶如綫齊國之地東負海而北鄣河地狹田少而民多智巧桓公憂中國之患苦夷狄之亂欲以存亡繼絶崇天子之位廣文武之業故管子之書生焉人間訓曰三代種德而王齊桓繼絶而霸故樹黍者不獲稷樹怨者無報德傳曰予上聲積也故土積而成山阜水積而成江海行去聲積而成君子雜篇曰丘山積卑而為髙江海合小而為大建本篇曰水積成川則蛟龍生焉土積成山則豫樟生焉學積成聖則富貴尊顯至焉貴德篇曰山致其髙雲雨起焉水致其深蛟龍生焉君子致其道德而福祿歸焉夫有隂徳者必有陽報有隠行者必有昭名孔子曰吾於河廣知徳之至也而欲得之各反其本復諸古而已詩序曰河廣宋襄公母歸於衞思而不止故作是詩也古者行役不踰時春行秋反秋往春來寒暑未變衣服不易固已還矣夫婦不失時人安和如適獄訟平刑罰得則隂陽調風雨時上不苛擾下不煩勞各修其業安其性則螟音冥音特今文作螣不生而水旱不起賦歛省而農不失時則百姓足而流人歸其田里上清靜而不欲則下㢘而不貪傳曰太平之時民行役者不踰時男女不失時以偶孝子不失時以養外無曠夫内無怨女上無不慈之父下無不孝之子父子相成夫婦相保天下和平國家安寜人事備乎下天道應乎上故天不變經地不易形日月昭明列宿有常天施地化隂陽和合動以雷電潤以風雨節以山川均其寒暑萬民育生各得其所而制國用故國有所安地有所主又曰夫賢君之治也温良而和寛容而愛刑清而省喜賞而惡罰移風崇教生而不殺布惠施恩仁不偏與不奪民力役不踰時百姓得耕家有收聚民無凍餒食無腐敗士不造無用雕文不粥于肆斧斤以時入山林國無佚士皆用於世黎庶歡樂衍盈方外逺人歸義重譯執贄故得風雨不烈小雅曰有渰萋萋興雨祁祁以是知太平無飄風暴雨明矣若今則繇音遥役極逺盡寒苦之地危難之處渉胡越之域今兹往而來嵗還音旋父母延頸而西望男女怨曠而相思身在東楚志在西河故一人行而鄉曲恨一人死而萬人悲賈捐之曰孝武皇帝探平城之事録冐頓以來數為邉害籍兵厲馬因富民以攘服之西連諸國北卻匈奴當此之時㓂賊並起軍旅數發父戰死於前子鬪傷於後女子乗亭鄣孤兒號於道老母寡婦飲泣巷哭遥設虚祭想魂乎萬里之外是皆廓地泰大征伐不休之故也詩云王事靡盬不能藝稷黍父母何怙念彼恭人涕零如雨豈不懷歸畏此罪罟吏不奉法以存撫倍公任私各以其權充其嗜欲人愁苦而怨思上不恤理則惡政行而邪氣作邪氣作則螟音𡨕音特今文作螣生而水旱起爾雅曰蟲食苖心者曰螟食苖葉者曰京房易傳曰嬖惡生孽蟲食苖心徳無節蟲食葉顓事有知誅罰絶理厥災水人君無施澤惠利於下則致旱若此雖禱祀雩祝用事百神無時豈能調隂陽而息盗賊矣傳曰天地之變隂陽之化物之罕至者也恠之可也畏之非也夫日月之薄蝕怪星之黨見風雨之不時是無世而不甞有也上明政平是雖並至無傷也上闇政險是雖無一無益也能言第四十大夫曰盲者口能言白黑而無目以别之儒者口能言治亂無能以行之主術訓曰問瞽師曰白素何如曰縞然而黒何若曰黮然援白黑而示之則不處焉人之視白黑以目言白黑以口瞽師有以言白黒無以知白黒故言白黒與人同其別白黒與人異夫音扶坐言不行則牧童兼烏獲之力􅑮須苞堯舜之徳烏獲秦武王之力士舉龍文鼎者逢須古本作逢䝉夏太康時人學射於羿者也荀子淮南子及王褒頌乂作逢門故使言而近則儒者何患於治亂而盲人何患於白黑哉言之不出耻躬之不逮故卑而言髙能言而不能行者君子耻之矣賢良曰能言而不能行者國之寳也能行而不能言者國之用也兼此二者君子也無一者烏獲逢須也古作逢䝉言滿天下徳覆四海周公是也口言之躬行之豈若黙然載施其行而已則執事亦何患何耻之有今道不舉而務小利慕於不急以亂羣意君子雖貧勿為可也藥酒病之利也正言治之藥也孫楚曰夫治膏肓者必進苦口之藥决狐疑者必告逆耳之言如其迷謬未知所投恐俞跗見其已困扁鵲知其無功也公卿誠能自强自忍食文學之至言去權詭罷利官一歸之於民親以周公之道則天下治而頌聲作儒者安得治亂而患之乎鹽鐵取下第四十一大夫曰不軌之民困橈音撓公利而欲擅山澤從文學賢良之意則利歸於下而縣官無可為者上之所行則非之上之所言則譏之專欲損上徇下虧主而適臣尚安得上下之義君臣之禮而何頌聲能作也賢良曰古者上取有量自養有度樂音洛嵗不盗年饑則肆用民之力不過嵗三日藉歛不過十一王制曰古者公田藉而不稅市㕓而不稅關譏而不征林麓川澤以時入而不禁夫圭田無征用民之力嵗不過三日田里不粥墓地不請司空執度度地居民山川沮澤時四時量地逺近興事任力凡使民任老者之事食壯者之食也君篤愛臣盡力上下交讓而天下平駿發爾私上讓下也遂及我私先公職也孟子曰未有仁而遺其親義而後其君也君君臣臣何為其無禮義乎主術訓曰夫風疾而波興木茂而鳥集相生之勢也是故臣不得其所欲於君者君亦不能得其所求於臣也君臣之施者相報之勢也是故臣盡力死節以與君計君垂爵以與臣是故君不能賞無功之臣臣亦不能死無德之君君德不下流而欲用之如鞭蹏馬矣是猶不待雨而求熟稼必不可之數也及周之末塗德惠塞而嗜欲衆君奢侈而上求多民困於下怠於公事是以有履畆之稅碩鼠之詩作也春秋曰初稅畆公羊傳曰初者何始也稅畆者何履畆而稅也初稅畆何以書譏也何譏爾譏始履畆而稅也何譏乎始履畆而稅古者什一而藉古者曷為什一而藉什一者天下之中正也多乎什一大桀小桀寡乎什一大貉小貉什一者天下之中正也什一行而頌聲作矣穀梁傳曰初者始也古者什一藉而不税初稅畆非正也古者三百歩為里名曰井田井田九百畆公田居一私田稼不善則非吏公田稼不善則非力初税畆者非公之去公田而履畆十取一也以公之與民為已悉矣古者公田為居井竈葱韭盡取焉詩序曰碩鼠刺重斂也國人刺其君重斂蠶食於民不修其政貪而畏人若大鼠也衞靈公當隆冬興衆穿池宛春諫曰天寒百姓凍餒願公之罷役也公曰天寒哉我何不寒哉雜事篇曰衞靈公以天寒鑿池宛春諌曰天寒起役恐傷民公曰天寒乎宛春曰君衣狐裘坐熊席隩虞有竈是以不寒今民衣弊不補履决不苴君則不寒民誠寒矣公曰善令罷役左右諫曰君鑿池不知天寒以宛春知而罷役是徳歸宛春怨歸於君公曰不然宛春魯國之匹夫吾舉之民未有見馬今將令民以此見之且春也有善寡人有春之善非寡人之善與靈公論宛春可謂知君之道矣王褒曰服絺綌之凉者不苦盛夏之鬱燠襲貂狐之煗者不憂至寒之悽愴人之言曰安者不能恤危飽者不能食饑故餘梁肉者難為言隱約處佚樂者難為言勤苦夫音扶髙堂邃音遂宇廣厦洞房者不知專屋狹廬上漏下濕者之廇音溜也繋馬百駟貨財充内儲陳納新者不知有旦無暮稱貸者之急廣第唐園良田連比者不知無運踵之業竄頭宅者之役也原馬被山牛羊滿谷者不知無孤豚瘠音脊犢音讀者之窶也髙枕談卧無呌號者不知憂私責音債與吏正戚者之愁也被紈躡韋摶梁囓肥者不知短褐之寒糠􅹞之苦也從容房闈之間垂拱持案食者不知蹠音卒耒躬耕者之勤也乗堅驅良列騎成行音杭者不知負擔歩行者之難也同床旃音氊席侍御滿側者不知負輅輓舩音船登髙絶流者之難也衣去聲輕暖被音披英裘處溫室戴安車者不知乗邊城飄胡代鄉音向清風者之危寒也妻子好合子孫保之不知老母之顦音憔顇音悴匹婦之悲恨也耳聽五音目視弄優者不知䝉流矢距敵方外之死者也東嚮伏几振筆如文調者不知求索之急箠推上聲楚之痛者也坐旃音氊茵之上按圖籍之言若易易然亦不知步涉者之難也昔商鞅之任秦也刑人若刈菅音間芳用師若彈丸從軍旅者暴骨長城戍音絮漕者輦車相望生而往死而還音旋彼獨非人子耶公孫鞅曰以戰去戰雖戰可也以殺去殺雖殺可也故君子仁以恕義以度音鐸所好去聲惡音汚與天下共之所不施不仁者公劉好貨居者有積行者有嚢大王好色内無怨女外無曠夫文王作刑國無怨獄武王行師士樂為之死民樂為之用若斯則民何苦而怨何求而譏公卿愀音秋然寂若無人於是遂罷議止詞奏曰賢良文學不明縣官事猥音委以鹽鐵而為不便請且罷郡國𣙜音角酤關内鐵官奏可賢良曰文學既拜咸取列大夫辭丞相去聲御史擊之第四十二大夫曰前議公事賢良文學稱引往古頗乖世務論者不必相反期於可行往者縣官未事胡越之時邊城四面受敵北邊尤被其苦先帝絶三方之難去聲撫從方國以為蕃蔽窮極郡國以討匈奴匈奴壤界獸圏孤弱無與此困亡之時也遼逺不遂使得復喘息休養士馬負紿音怠西域西域迫近胡㓂沮心内解必為巨患是以主上欲掃除煩倉廩之費也終日逐禽罷而釋之則非計也蓋舜紹緒禹成功今欲以小舉擊之何如文學曰異時縣官修輕賦公用饒人富給其後保胡越通四夷費用不足於是興利害算車船以訾音紫助邊漢武紀曰元光六年冬初算商車李竒曰始稅商賈車船令出算也贖罪吿緡音民與人以患矣甲士死於軍旅中士罷音疲於轉漕仍之以科適吏徵發極矣漢武紀曰天漢四年春正月朝諸侯王于甘泉宮發天下七科讁及勇敢士張晏曰吏有罪一亡命二贅壻三賈人四故有市籍五父母有市籍六大父母有市籍七凡七科也夫音扶勞而息之極而反本古之道也雖舜禹興不能易也蔡邕曰書戒猾夏易伐鬼方周有獫狁蠻荆之師漢有闐顔瀚海之事征討殊類所由尚矣然而時有同異勢有可否故謀有得失事有成敗不可齊也武帝情存逺畧志闢四方南誅百越北討强胡西伐大宛東并朝鮮因文景之蓄藉天下之饒數十年間官民俱匱乃具鹽鐵酒𣙜之利設告緡重稅之令民不堪命起為盗賊關東紛擾道路不通繡衣直指之使奮鈇鉞而並出既而覺悟乃息兵罷役封丞相為富民侯故主父偃曰夫務戰勝窮武事未有不悔者也夫專勝者未必克挾疑者未必敗衆所謂疑聖人不任朝議有嫌明王不行也大夫曰昔夏后底洪水之災百姓孔勤罷音疲於籠臿音察及至其後咸享其功吕氏春秋曰禹之决江水也民聚瓦礫事已成功已立為萬世利禹之所見者逺也而民莫之知故民不可與慮化舉始而可以樂成功先帝之時郡國頗煩於戎事然亦寛三陲音垂之役語曰見機不遂者隕音允功一日違敵累世為患先軫曰一日縱敵數世之患也揚雄曰不壹勞者不乆佚不暫費者不永寜休勞用供困弊乗時帝王之道聖賢之所不能失也功業有緒惡音汙勞而不卒猶耕者勌休而困止也夫音扶事輟者無功耕怠者無獲也文學曰地廣而不徳者國危兵强而凌敵者身亡三略曰務廣地者荒務廣徳者强能有其有者安貪人之有者殘殘滅之政累世受患造作過制雖成必敗舍已而教人者逆正已而化人者順逆者亂之招順者治之要虎兕相據而螻蟻得志兩敵相機而匹夫乗間音諫齊䇿曰齊欲伐魏淳于髠謂齊王曰韓子盧者天下之疾犬也東郭逡者海内之狡兎也韓子盧逐東郭逡環山者三騰山者五兎極於前犬廢於後犬兎俱罷各死其處田父見之無勞勌之苦而擅其功今齊魏乆相持以頓其兵敝其衆臣恐强秦大楚乗其後有田父之功齊王懼謝將休士燕䇿曰趙且伐燕蘇代為燕謂惠王曰今者臣來過易水蚌方出曝而鷸啄其肉蚌合而箝其喙鷸曰今日不雨明日不雨即有死蚌蚌亦謂鷸曰今日不出明日不出即有死鷸兩者不肯相舍漁者得而并擒之今趙且伐燕燕趙乆相攻以敝大衆臣恐强秦之為漁父也願王熟計之也惠王曰善乃止是以聖王見利慮害見逺存近方今為縣官計者莫若偃兵休士厚幣結和親修文德而已指武篇曰聖人之治天下也先文徳而後武力凡武之興為不服也文化不改然後加誅夫下愚不移純徳之所不能化而後武力加焉若不恤人之急不計其難弊持以窮無用之地亡十獲一非文學之所知也結和第四十三大夫曰漢興以來修好結和親所聘遺單音蟬于者甚厚然不紀重質厚賂之故改節而暴害滋甚先帝覩其可以武折而不可以德懐故廣將帥招奮擊以誅厥罪功勲粲然著於海内藏於紀府何命亡十獲一乎漢武紀曰元光二年春詔問公卿曰朕飾子女以配單于金幣文繡賂之甚厚單于待命加嫚侵盗亡已邊境被害朕甚閔之今欲舉兵攻之何如大行王恢建議宜擊夏六月御史大夫韓安國為䕶軍將軍衞尉李廣為驍騎將軍太僕公孫賀為輕車將軍大行王恢為將屯將軍大夫李息為材官將軍將三十萬衆屯馬邑谷中誘致單于欲襲擊之單于入塞覺之走出嚴尤曰漢武選將練兵約齎輕糧深入逺戍匈奴創艾而天下稱武夫音扶偷安者後危慮近者憂邇賢者離俗知士權行君子所慮衆庶疑焉故民可以觀成不可以圖始此有司所獨見而文學所不覩公孫鞅曰有髙世之行者必見非於世有獨知之慮者固見敖於民故曰愚者暗於成事智者見於未萌民不可與慮始可與樂成功班固曰和親之論發於劉敬是時天下初定新遭平城之難故從其言約結和親賂遺單于以救安邊境孝惠髙后時遵而不違匈奴冦盗不為衰止而單于反以加驕倨逮至孝文與通關市妻以漢女増厚其賂嵗以千金而匈奴數背約束邊境屢被其害是以文帝中年赫然發憤遂躬戍服親御鞍馬從六郡良家材力之士馳射上林講習戰陳聚天下精兵積於廣武顧問馮唐與論將帥喟然嘆息思古臣此則和親無益已然之明效也仲舒親見四世之事猶欲復守舊文頗増其約以為義動君子利動貪人如匈奴者非可以仁義説也獨可以厚利結之於天耳故與之厚利以沒其意與盟於天以堅其約質其愛子以累其心匈奴雖欲展轉奈失重利何奈欺上天何奈殺愛子何夫賦斂行賂不足以當三軍之費城郭之固無以異於貞士之約而使邊城守境之民父母緩帶稚子咽哺胡馬不窺於長城而羽檄不行於中國不亦便於天下乎察仲舒之論考諸行事廼知其未合於當時而有闕於後世也當孝武時雖征伐克復而士馬物故亦略相當雖開河南之野建朔方之郡亦棄造陽之北九百餘里匈奴人民每來降漢單于亦輒拘留漢使以相報復其桀驁尚如斯安肯以憂子而為質哉此不合當時之言也若不置質空約和親是襲孝文既往之悔而長匈奴無已之詐也夫邊境不選守境武畧之臣修障隧備塞之具厲長㦸勁弩之械恃吾所以待邊冦而務賦斂於民逺行貨賂割剥百姓以奉冦讐信甘言守空約而㡬胡馬之不窺不已過乎夫規事建議不圖萬世之利而媮恃一時之事者未可以經逺也文學曰往者匈奴結和親諸夷納貢即君臣外内相信無胡越之患當此之時上求寡而易澹古贍字民安樂音洛而無事耕田而食桑麻而衣家有數年之稸縣官餘貨財閭里耆老或及其澤韓安國曰髙皇帝嘗圍于平城匈奴至而投鞍髙於城者數所平城之厄七日不食天下歎之及解圍反位無忿怨之色雖得天下而不報平城之怨者非以力不能也夫聖人以天下為度者也不以已之私怒傷天下之公義故遣劉敬結為和親至今為世利孝文皇帝甞一屯天下之精兵於甞谿廣武無尺寸之功天下黔首約要之民無不憂者孝文皇帝悟兵之不可宿也乃為和親之約至今為後世利兩主之迹足以為效自是之後退文任武苦師勞衆以略無用之地立郡沙石之間民不能自守發屯乗城輓音挽輦而澹古贍字之愚竊見其亡不覩其成大夫曰匈奴以虛名市於漢而實不從數音朔為蠻貊所紿音怠不痛之何故也髙皇帝仗劒定九州今以九州而不行於匈奴閭里常民尚有梟散梟散流離也關西人謂梟曰流離故云梟散况萬里之主與小國之匈奴乎夫音扶以天下之力勤何不權以天下之士民何不服今有帝名而威不信音伸長城反賂遺而尚踞敖音傲此五帝所不忍三王所畢一作必怒也匈奴傳曰太初四年漢遣中郎將蘇武厚幣賂遺單于單于益驕禮甚倨非漢所望也征和四年單于遣使遺漢書云南有大漢北有强胡胡者天之驕子也不為小禮以自煩今欲與漢闓大關取漢女為妻嵗給遺我蘖酒萬石稷米五十斛雜繒萬匹它如故約則邊不相盗矣文學曰湯事夏而卒服之周事殷而卒滅之本經訓曰晩世之時帝有桀紂為璇室瑶臺象廊玉牀紂為肉圃酒池燎焚天下之財罷苦萬民之力刳諫者剔孕婦攘天下虐百姓於是湯乃以革車三百乗伐桀于南巢放之夏臺武王甲卒三千破紂牧野殺之于宣室天下寜定百姓和集是以稱湯武之賢語曰桀紂不為王湯武不為放故以大御小者王去聲以强凌弱者亡聖人不困其衆以兼國良御不困其馬以兼道故造父之御不失和聖人之治不倍德吕氏春秋曰宋人有取道者其馬不進倒而投之鸂水又復取道其馬不進又倒而投之鸂水如此者三雖造父之所以威馬不過此矣不得造父之道而徒得其威無益於御繆稱訓曰戎狄之馬皆可以馳驅或近或逺唯造父能盡其力三苖之民皆可使忠信或賢或不肖唯唐虞能齊其美秦攝利衡以御宇内執修箠推上聲以笞音痴八極驂服以罷音疲而鞭䇿愈加故有傾衡遺箠推上聲之變士民非不衆力勤非不多也皆内倍外附而莫為用此髙皇帝所以仗劒而取天下也司馬遷曰昔詩書述虞夏之際舜禹受禪積徳累功洽於百姓攝位行政考之於天經數十年然後在位殷周之王乃繇卨稷修仁行義歴十餘世至于湯武然後放殺秦起襄公章文繆獻孝昭襄稍嚴蠶食六國百有餘載至始皇廼并天下以徳若彼用力如此其囏難也秦既稱帝患周之敗以為起於處士横議諸侯力爭四夷交侵以弱見奪於是削去五等墮城銷刃箝語燒書内鋤雄俊外攘胡粤用壹威權為萬世安然十餘年間猛敵横發乎不虞適戍强于五伯閭閻偪於戎狄嚮應㿊於謗議奮臂威於甲兵鄉秦之禁適所以資豪傑而速自斃也是以漢亡尺土之階繇一劒之任五載而成帝業書傳所記未嘗有焉何則古世相革皆成聖王之烈今漢獨收孤秦之斃鐫金石者難為功摧枯朽者易為力其勢然也夫音扶兩主好合内外交通天下安寜世世無患士民何事三王何愁焉大夫曰伯翳音意之始封秦地為七十里穆公開伯音覇孝公廣業自卑至上自小至大故先祖基之子孫成之司馬遷曰秦之先伯翳嘗有勲於唐虞之際受土賜姓及殷夏之間㣲散至周之衰秦興邑於西垂自繆公以來稍蠶食諸侯竟成始皇軒轅戰涿音卓鹿殺兩曎音驛蚩音癡尤而為帝湯武伐夏商誅桀紂而為王黄帝以戰成功湯武以伐成孝魚龍河圖云黄帝攝政有蚩尤兄弟八十一人並獸身人語銅鐵額食沙造五兵仗刀㦸大弩威振天下誅殺無道萬民欽命黄帝行天子事黄帝以仁義不能禁止蚩尤乃仰天而歎天遣𤣥女下授黄帝兵符伏蚩尤後天下復擾亂黄帝遂畫蚩尤形像以威天下咸謂蚩尤不死八方皆為殄滅山海經云黄帝令應龍攻蚩尤蚩尤請風伯雨師以從大風雨黄帝乃下天女曰魃以止雨雨止遂殺蚩尤權謀篇曰湯欲伐桀伊尹曰請阻乏貢職以觀其動桀怒起九夷之師以伐之伊尹曰未可彼尚猶能起九夷之師是罪在我也湯乃謝罪請服復入貢職明年又不供其職桀怒起九夷之師九夷之師不起伊尹曰可矣湯乃興師伐而殘之遷桀南巢氏焉武王伐紂過遂斬岸過水折舟過谷發梁過山焚萊示民無返志也至於有戎之隧大風折斾散宜生諫曰此其妖歟武王曰非也天落兵也風霽而乗以大雨水平地而嗇散宜生又諫曰此其妖歟武王曰非也天洒兵也卜而龜􅑒散宜生又諫曰此其妖歟武王曰不利以禱祠利以撃衆是􅑒之已故武王順天地犯三妖而禽紂於牧野其所獨見者精也希寫曰昔者文王拘於羑里而武王羇於王門卒斬紂之頭而懸於太白者是武王之功也故手足之勤腹腸之養去聲也當世之務後世之利也今四夷内侵不攘萬世必有此長患先帝興義兵以誅暴强東滅朝鮮西定冉駹音尨南夷傳曰自筰以東北君長以十數冉駹最大顔師古曰今䕫州開州首領多姓冉者本皆冉種也南擒百越北挫强胡李牧追匈奴以廣北州湯武之舉蚩音癡尤之兵也故聖主斥地非私其利用兵非徒奮怒也所以匡難去聲避害以為黎民逺慮劉歆曰孝武皇帝愍中國罷勞無安寜之時乃遣大將軍驃騎伏波樓船之屬南滅百粤起七郡北攘匈奴降昆邪十萬之衆置五屬國起朔方以奪其肥饒之地東伐朝鮮起𤣥兎樂浪以斷匈奴之左臂西伐大宛并三十六國結烏孫起敦煌酒泉張掖以鬲婼羌裂匈奴之右臂單于孤特逺遁於漠北四陲無事斥地逺境起十餘郡功業既定永無逆爭之心至今累世頼之單于守藩百蠻服從萬世之基也中興之功未有髙焉者也文學曰秦南禽勁越北却強胡竭中國以役四夷人罷音疲極而主不恤國内潰而上不知是以一夫倡而天下和去聲兵破陳渉地奪諸侯何嗣之所利賈山曰昔者秦政力并萬國富有天下破六國以為郡縣築長城以為闗塞秦地之固大小之執輕重之權其與一家之富一夫之彊胡可勝計也然而兵破於陳渉地奪於劉氏者何也秦王貪狼暴虐殘賊天下窮困萬民以適其欲也詩云雍雍鳴􅀈旭日始旦登得前利不念後咎故呉王知伐齊之便而不知干遂之患秦知進取之利而不知鴻門之難去聲是以知一而不知十也黄歇曰易曰狐濡其尾此言始之易終之難也何以知其然也智氏見伐趙之利而不知榆次之禍也呉見伐齊之便而不知干隧之散也此二國者非無大功也沒利於前而易患於後也呉之信越也從而伐齊人於艾陵還為越王禽於三江之浦智氏信韓魏從而伐趙攻晉陽之城勝有日矣韓魏反之殺智伯瑶於鑿臺之上詩云他人有心予忖度之躍躍毚兎遇犬獲之賈生曰秦兼諸侯山東三十餘郡循津關據嶮塞繕甲兵而守之然陳渉率散亂之衆數百奮臂大呼不用弓㦸之兵鉏耰白挺望屋而食横行天下秦人阻嶮不守闗梁不閉長㦸不刺彊弩不射楚沛深入戰於鴻門曾無藩籬之難也周謹小而得大秦欲大而亡小語曰前車覆後車戒殷監不逺在夏后之世矣傳曰昔者禹以夏王桀以夏亡湯以殷王紂以殷亡故無常安之國宜治之民得賢則昌不肖則亡自古及今未有不然者也夫明鏡者所以照形也徃古者所以知今也夫知惡往古之所以危亡而不襲蹈其所以安存者則無以異乎却行而求逮於前人鄙語曰不知為吏視已成事或曰前車覆而後車不誡是以後車覆也故夏之所以亡者而殷為之殷之所以亡者而周為之故殷可以鑒於夏而周可以鑒於殷詩曰殷鑒不逺在夏后之世蔡澤曰鑒於水者見面之容鑒於人者知吉與凶誅秦第四十四大夫曰秦楚燕齊周之封國也三晉之君齊之田氏諸侯家臣也内守其國外伐不義地廣壤進故立號萬乗去聲而為諸侯宗周室修禮長音掌文然國翦弱不能自存東攝六國西畏於秦身以放遷宗廟絶祀頼先帝大惠紹興其後封嘉潁川號周子男君古本作周子南君漢武紀曰元鼎四年十一月甲子立后土祠于汾隂脽上禮畢行幸滎陽還至洛陽詔曰祭地兾州瞻望河洛廵省豫州觀於周室邈而無祀詢問耆老乃得孽子嘉其封嘉為周子南君以奉周祀顔師古曰子南其封邑之號以為周後故總言周子南君也秦既并天下東絶沛水并滅朝鮮南取陸梁北却胡狄西畧氏羌立帝號朝音潮四夷舟車所通足迹所及靡不畢至非服其德畏其威也力多則人朝音潮力寡則朝音潮於人矣文學曰禹舜堯之佐也湯文夏商之臣也其所以從八極而朝音潮海内者非以陸梁之地兵革之威也秦紀曰始皇三十三年發諸亡人贅壻賈人略取陸梁地為桂林司馬貞曰南方之人其性陸梁故曰陸梁晉灼曰走者陸梁而跳也秦楚三晉號萬乗去聲不務積徳而負相侵搆兵爭强而卒俱亡雖以進壤廣地如食萴之充腸也廣雅曰附子一嵗曰萴子二嵗烏喙三嵗附子四嵗烏頭五嵗天雄蘇秦為燕說齊王曰人之飢所以不食烏喙者以為雖偷充腹而與死同患也今燕雖弱小强秦之少壻也王利其十城而深與强秦為仇今使弱燕為鴈行而强秦制其後以招天下之精兵此食烏喙之類也欲其安存何可得也夫音扶禮譲為國者若江海流彌乆不竭其本美也苟為無本若蒿火暴怒而無繼其亡可立而待戰國是也周徳衰然後列於諸侯至今不絶秦力盡而滅其族安得朝音潮人也嚴安曰周有天下其治三百餘嵗成康其隆也刑措四十餘年而不用及其衰亦三百餘年故五伯更起伯者常佐天子興利除害誅暴禁邪匡正海内以尊天子五伯既沒聖賢莫續天子孤弱號令不行諸侯恣行强凌弱衆暴寡田常簒齊六卿分晉並為戰國此民之始苦也於是强國務攻弱國修守合從連衡車馳轂撃介胄生蟣蝨民無所告愬及至秦王蠶食天下并吞戰國稱號皇帝一海内之政意廣心逸欲威海外當是時秦禍北搆於胡南挂於越宿兵於無用之地進而不得退行十餘年丁男被甲丁女轉輸苦不聊生自經於道樹死者相望及秦皇帝崩天下大畔陳勝呉廣舉陳武臣張耳舉趙項梁舉呉田儋舉齊景駒舉郢周市舉魏韓廣舉燕窮山通谷豪士並進不可勝載秦貴為天子富有天下滅世絶祀窮兵之禍也大夫曰中國與邊境猶支體與腹心也夫音扶肌膚寒於外腹腸疾於内内外之相勞非相為助也唇亡則齒寒支體傷而心􅉃音慘怛故無手足則支體廢無邊境則内國害昔戎狄攻太王於邠踰岐梁而與秦界於涇渭東至晉之陸渾侵暴中國中國疾之匈奴傳曰夏道衰而公劉失其稷官變于西戎邑于豳其後三百有餘嵗戎狄攻大王亶父亶父亡走于岐下豳人悉從亶父而邑焉作周至于幽王用寵姬褒姒之故與申侯有隙申侯怒而與犬戎共攻殺幽王于驪山之下遂取周之地鹵獲而居于涇渭之間侵暴中國秦襄救周伐戎至岐周襄王時戎狄或居於陸渾東至于衞侵盗尤甚晉文公初立欲修霸業廼興師伐戎翟當是時秦晉為强國晉文公攘戎翟居於河西圜洛之間號曰赤翟白翟而秦穆公得由余西戎八國服諸戎各分散谿谷自有君長往往而聚者百有餘戎然莫能相一其後千有餘嵗至冐頓而匈奴最强大盡服從北夷而南與諸夏為敵國今匈奴蠶食内侵逺者不離去聲其苦獨邊境䝉其敗詩云憂心慘慘念國之為虐不征備則暴害不息故先帝興義兵以征厥罪遂破祁連天山散其聚黨北略至龍城大圍匈奴單音蟬于失魂僅以身免乗奔逐北斬首捕虜十餘萬控弦之民旃音氊裘之長音掌莫不沮膽挫折逺遁遂乃振旅渾古本作昆耶古本作邪率其衆以降置五屬國以距胡則長城之内河山之外罕被冦􅫱音菑於是下詔令减音檢戍音絮漕寛繇音遥役初雖勞苦卒獲其慶匈奴傳曰匈奴右賢王怨漢奪之河南地而築朔方數冦盗邊及入河南侵擾朔方殺畧吏民甚衆元狩二年春漢使大將軍衞青將六將軍十餘萬人出朔方髙闕右賢王以為漢兵不能至飲酒醉漢兵出塞六七百里夜圍右賢王右賢王大驚脱身逃走精騎往往隨後去漢將軍得右賢王人衆男女萬五千人禆小王十餘人其夏驃騎將軍霍去病復與合騎侯數萬騎出隴西北地二千里過居延攻祁連山得胡首虜三萬餘級禆小王以下十餘人衞青傳曰其秋單于怒昆邪王休屠王居西方為漢所殺虜數萬人欲召誅之昆邪休屠王恐謀降漢漢使驃騎將軍迎之昆邪王殺休屠王并將其衆降漢凡四萬餘人號十萬既至長安天子所以賞賜者數十巨萬封昆邪王萬户為漯隂侯封其禆王呼毒尼為下麾侯鷹庇為輝渠侯禽黎為河綦侯大當戸銅離為常樂侯漢已得昆邪則隴西北地河西益少胡冦於是天子嘉驃騎之功曰驃騎將軍去病率師攻匈奴西域昆邪王及厥衆萌咸相犇率以軍糧接食并將控弦萬有餘人誅獟悍獲首虜八千餘級降異國之王三十二人戰士不離傷十萬之衆咸懐集服仍與之勞爰及河塞庶㡬無患幸旣永綏矣以千七百戶益封繇驃騎將軍减隴西北地上郡戍卒之半以寛天下之文學曰周累世積徳天下莫不願以為君故不勞而王去聲恩施由近及逺而蠻貊自至蕭綺曰武王資聖智而剋伐觀天命以行誅不驅熊羆之師不勞三戰之旅一戎衣而定王業慿神力而協符瑞至于成王制禮崇樂姬徳方盛營洛邑而居九鼎寢刑廟堂萬國來賔雖大禹之隆夏績帝乙之興殷道未足方焉故能繼夏稷之先基紹公劉之聖徳文武之跡不墜故大稚稱為令徳播聲教於八荒之外流仁惠於九圍之表神智之所綏化遐邇之所來服靡不越岳航海交賮於遼險之路瑰寳殊恠之物充於王庭靈禽異獸之類遊集林蘌詭麗殊用之物鐫斵異於人功方册未之或載篆素或所不紀及乎王人風舉之使直指踰於日月之陲窮昬明之際覘風星以望路慿雲波而逺逝所謂道通幽微徳被冥昧者也秦任戰勝以兼天下小海内而貪胡越之地使蒙恬撃胡取河南以為新秦而亡其故秦築長城以守胡而亡其所守王恢曰昔者秦穆公都雍郊地方三百里攻取西戎辟地千里并國十二隴西北地是也其後䝉恬為秦侵胡以河為境累石為城積木為寨匈奴不敢飲馬北河置烽燧然後敢牧馬應劭曰秦始皇遣䝉恬攘卻匈奴得其河南造陽之北千里地甚好於是築為城郭徙民充之名曰新秦四方錯雜奢儉不同今俗名新富貴者為新秦由是名也人間訓曰忠臣者務崇君之徳諂臣者務廣君之地往者兵革亟動師旅數音朔起長城之北還音旋車遺鏃相望及李廣利等輕計還馬足莫不寒心雖得渾耶古作昆邪不能更所亡此非社稷之至計也應劭曰更償也言所得不足以償其所失也李廣傳曰天漢二年秋貳師將軍李廣利將三萬騎撃匈奴右賢王於祈連天山而使陵將其射士歩兵五千人出居延北可千餘里欲以分匈奴兵毋令專走貳師也陵既至期還而單于以兵八萬圍撃陵軍陵軍五千人兵矢既盡士死者過半而所殺傷匈奴亦萬餘人且引且戰連鬪八日還未到居延百餘里匈奴遮狹絶道陵食乏而救兵不到虜急擊招降陵陵曰無面目報陛下遂降匈奴其兵盡沒餘亡散得歸漢者四百餘人伐功第四十五大夫曰齊桓公越燕伐山戎破孤竹殘令音零支古本作離枝令離聲相近也趙武靈王踰句注過代谷畧滅林胡樓煩燕襲音集走東胡辟音闢地千里度遼東而攻朝鮮齊世家曰桓公二十三年山戎伐燕燕告急於齊齊桓公救燕遂伐山戎至於孤竹而還燕莊公遂送桓公入齊境桓公曰非天子諸侯相送不出境吾不可以無禮於燕於是分溝割燕君所至與燕命燕君復修召公之政納貢於周如成康之時諸侯聞之皆從齊齊語曰桓公遂北伐山戎刜令支斬孤竹而南歸海濵諸侯莫不來服趙世家曰武靈王二十年王略中山地至寜葭西略胡地至榆中林胡王獻馬歸使樓緩之秦仇液之韓王賁之楚富丁之魏趙爵之齊代相趙固主胡致其兵二十一年攻中山趙祒為右軍許鈞為左軍公子章為中軍王并將之牛翦將車騎趙希并將胡代趙與之陘合軍曲陽攻取丹丘華陽鴟之塞王軍取鄗石邑封龍東垣中山獻四邑和王許之罷兵二十三年攻中山二十六年復攻中山攘地北至燕代西至雲中九原惠文王二年主父行新北遂出代西遇樓煩王於西河而致其兵朝鮮傳曰朝鮮王滿者故燕人也自始全燕時嘗畧屬真番朝鮮為置吏築鄣塞䝉公為秦擊走匈奴若鷙音至鳥之追羣雀匈奴勢慴音疊不敢南面而望十餘年慴懼也秦紀曰始皇三十三年䝉恬於西北斥遂匈奴單于不勝秦北徙盡收河南地並河以東屬之隂山因河為塞築長城因邊山險塹谿谷可繕者治之起臨洮至遼東萬餘里始皇又使䝉恬渡河取髙闕陶山北假中築亭鄣以逐戎人恬居上郡十餘年威振匈奴及其後䝉公死而諸侯叛秦中國擾亂匈奴紛紛乃敢復為邊冦匈奴傳曰匈奴單于曰頭曼頭曼不勝秦北徙十有餘年而䝉恬死諸侯叛秦中國擾亂諸秦所遣戍邊者皆復去於是匈奴得寛復稍度河南與中國界於故塞單于有太子名曰冐頓東襲擊東胡東胡初輕冐頓不為備及冐頓以兵至大破滅東胡王虜其民衆畜産既歸西擊走月氏南并樓煩白羊河南王悉復收秦所使䝉恬所奪匈奴地與漢關故河南塞至朝那膚施遂侵燕代是時漢方與項羽相距中國罷於兵革以故冐頓得自强控弦之士三十餘萬匈奴最强大盡服從北夷而南與中夏為敵國夫音扶以小國燕趙尚猶却冦虜以廣地今以漢國之大士民之力非特齊桓之衆燕趙之師也然匈奴乆未服者羣臣不并力上下未諧故也文學曰古之用師非貪壤土之利救民之患也銓言訓曰夫為地戰者不能成其王為身戰者不能立其功舉事以為人者衆助之舉事以自為者衆去之衆之所助雖弱必强衆之所去雖大必亡民思之者若旱之望雨孫卿曰仁者愛人愛人故惡人之害之也義者循理循理故惡人之亂之也彼兵者所以禁暴除害也非爭奪也故仁者之兵所存者神所過者化若時雨之降莫不說喜簞食壺漿以迎王師故憂人之患者民一心而歸之湯武是也兵略曰得道之兵車不發軔騎不被鞅鼓不振塵旗不解卷甲不離矢刃不嘗血朝不易位賈不去肆農不離野招義而責之大國必朝小國必下因民之欲乗民之力而為之去殘除賊也故同利相死同情相成同欲相助順道而動天下為嚮因民而慮天下為鬪不愛民之死力盡而潰叛者秦王是也兵略曰殺無罪之民而養無義之君害莫大焉殫天下之財而贍一人之欲禍莫深焉故至於攘天下害百姓肆一人之邪而長海内之禍此天之所以誅也民之所以仇也孟子曰君不鄉音向道不由仁義而為之强戰雖克必亡此中國所以擾亂非䝉恬死而諸侯叛秦律書曰秦二世宿軍無用之地連兵於邊陲力非弱也結怨匈奴絓禍於越勢非寡也及其威盡勢極閭巷之人為敵國咎生窮武之不知足甘得之心不息也昔周室盛也越裳氏來獻百蠻致貢其後周衰諸侯力征蠻貊分散各有聚黨莫能相一是以燕趙能得意焉匈奴傳曰諸戎分散谿谷自有君長往往而聚者百有餘戎然莫能相壹其後燕有賢將秦開為質於胡胡甚信之歸而襲破東胡東胡却千餘里燕乃築長城自造陽至襄平置上谷漁陽右北平遼西遼東郡以距胡於是趙武靈王亦變俗胡服習騎射北破林胡樓煩自代並隂山下至髙闕為塞而置雲中鴈門代郡及李牧為將匈奴不敢近趙邊其後匈奴稍强蠶食諸侯故破走月支氏因兵威徙小國引弓之民并為一家一意同力故難制也前君為先帝畫匈奴之册通作䇿兵據西域奪之便勢之地以候其變以漢之强攻於匈奴之衆若以强弩潰癰疽越之禽吴豈足道哉王恢曰夫匈奴可以力服也不可以仁畜也今以中國之大萬倍之資遣百分之一以攻匈奴譬如以千石之弩射癰潰疽必不留行也上以為然用君之義聽君之計雖越王之任種蠡音禮不過以搜粟都尉為御史大夫持政十有餘年未見種蠡音禮之功而見靡弊之効匈奴不為加俛音免而百姓黎民以敝矣是君之册通作䇿不能弱匈奴而反衰中國也善為計者固若此乎蔡邕曰夫邊陲之患手足之疥掻中國之困胷背之瘭疽也西域第四十六大夫曰往者匈奴據河山之險擅田牧之利民富兵强行入為冦則句注之内驚動而上郡以南咸城文帝時虜入蕭關烽火通甘泉羣臣懼不知所出乃請屯京師以備胡匈奴傳曰孝文十四年匈奴單于十四萬騎入朝那蕭關殺北地都尉卬虜人民畜産甚多遂至彭陽使騎兵入燒回中宫候騎至雍甘泉於是文帝以中尉周舍郎中令張武為將軍發車千乘十萬騎軍長安旁以備胡冦胡西役大宛康居之屬南與羣羌通先帝推讓斥奪廣饒之地建張掖以西隔絶羌胡𤓰分其援是以西域之國皆内拒匈奴斷其右臂曳音異劒而走故募音慕人田畜以廣用長城以南濵塞音賽之郡馬牛放縱蓄積布野未覩其計之所過也匈奴傳曰元鼎三年漢東㧞􅐮貉朝鮮以為郡而西置酒泉郡以隔絶胡與羌通之路又西通月氏大夏以翁主妻烏孫王以分匈奴西方之援國乂北益廣田至胘雷為塞而匈奴終不敢以為言夫音扶以弱越而遂意强吴才地計衆非鈞也主思臣謀其往必矣韓非子曰越王入宦於吴而勸之伐齊以弊呉呉兵既勝齊人於艾陵張之於江濟强之於黄池故可制於五湖故曰將欲翕之必固張之將欲弱之必固强之兵略曰善戰者不在少善守者不在小勝在得威敗在失氣夫實則鬪虚則走盛則强衰則北吴王夫差地方二千里帶甲七十萬南與越戰棲之會稽北與齊戰破之艾陵西遇晉公擒之黄池此用民氣之實也其後驕溢縱欲拒諫喜諛憢悍遂過不可正喻大臣怨懟百姓不附越王選卒三千人擒之干隧因制其虚也夫氣之有虚實也苦明之必晦也故勝兵者非常實也敗兵者非常虚也善者能實其民氣以待人之虚也不能者虚其民氣以待人之實也故虗實之氣兵之貴者也文學曰呉越廹於江海三川循環之處於五湖之間地相廹壤相次其勢易相禽通作擒也金鼓未聞旌旗未舒行音杭陳音陣未定兵以接矣師無輜音之重之費士無乏絶之勞此所謂食於㕑倉而戰於門郊者也伍子胥曰夫吴之與越也仇讐敵戰之國也三江環之民無所移有吴則無越有越則無吴將不可改於是矣吾聞之陸人居陸水人居水夫上黨之國我攻而勝之吾不能居其地不能乗其車夫越國吾攻而勝之吾能居其地吾能乗其舟此利也不可失也已君必滅之失此利也雖悔之亦無及已今匈奴牧於無窮之澤東西南北不可窮極雖輕車利馬不能得也况負重羸音縲兵以求之乎其勢不相及也茫茫乎若行九臯未知所止皓皓古本浩浩乎若無網羅而漁江海雖及之三軍罷音疲弊適遺之餌也故明王知其所無利以為役不可數音朔行而權不可乆張也故詔公卿大夫賢良文學所以復枉興微之路公卿宜思百姓之急匈奴之害縁聖主之心定安平之業今乃留心於末計雖本議不順上意未為盡於忠也大夫曰初貳師不克宛而還也議者故使人主不遂忿則西域皆瓦解而附於胡胡得衆國而益强先帝絶竒聽行武威還襲音集宛宛舉國以降効其器物致其寳馬烏孫之屬駭膽請為臣妾匈奴失魄奔走遁逃雖未盡服逺處寒苦墝音敲埆音殼之地壯者死於祁巨夷反連天山其孤未復漢武帝紀曰太初元年秋八月行幸安定遣貳師將軍李廣利發天下讁民西征大宛四年春貳師斬大宛王首獲汗血馬作西極天馬之歌匈奴傳曰漢既誅大宛威震外國天子意欲遂困胡乃下詔曰髙皇帝遺朕平城之憂髙后時單于書極悖逆昔齊襄公復九世之讎春秋大之是嵗太初四年也其明年漢使貳師將軍將三萬騎出酒泉撃右賢王於天山得首虜萬餘級而還顔師古曰天山即祁連山也匈奴謂天為祁連今鮮卑語尚然也故羣臣議以為匈奴困於漢兵折翅傷翼可遂擊服會先帝棄羣臣以故匈奴不革譬如為山未成一簣而止度音鐸功業而無斷成之理是棄與胡而資强敵也輟㡬沮成為主計若斯亦未可謂盡忠也文學曰有司言外國之事議者皆激一時之權不慮其後張騫言大宛之天馬汗血安息之真玉大鳥縣官既聞如甘水焉張騫傳曰張騫言大宛及大夏安息之屬皆大國多竒物土著頗與中國同俗而兵弱貴漢財物其北則大月氏康居之屬兵强可以賂遺設利朝也誠得而以義屬之則廣地萬里重九譯致殊俗威信徧於四海天子欣欣以騫言為然發使四出皆各行三千里初天子發書易曰神馬當從西北來得烏孫馬好名曰天馬及得宛汗血馬益壯更名烏孫馬曰西極馬宛馬曰天馬云大宛諸國發使隨漢使來觀漢廣大以大鳥卵及犛靬眩人獻於漢天子大說而漢使窮河源其山多玉石采來天子案古閻書名河所出山曰昆侖山乃大興師伐宛歴數期而後克之夫音扶萬里而攻人之國兵不戰而物故過半顔師古曰物故謂死也言其同於鬼物而故也或曰不欲斥言但云其所服用之物皆已故耳雖破宛得寳馬非計也劉向曰貳師將軍李廣利捐五萬之師靡億萬之費經四年之勞而厪獲駿馬三十匹雖斬宛王母寡之首猶不足以復其費也當此之時將卒方赤面而事四夷師旅相望郡國並發黎人困苦姦偽萌生盗賊並起守尉不能禁城邑不能止然後遣上大夫衣繡衣以興擊之當此時百姓元元莫必其命故山東豪傑頗有異心漢武紀曰天漢二年秋泰山琅邪羣盗徐㪍等阻山攻城道路不通遣直指使者暴勝之等衣繡衣杖斧分部逐捕刺史郡守以下皆伏誅冬十一月詔關都尉曰今豪傑多逺交依東方羣盗其謹察出入者酷吏傳曰自温舒等以惡為治而吏民益輕犯法盗賊滋起大羣至數千人小羣以百數掠鹵鄉里者不可勝數於是上始使御史中丞丞相長史使督之猶弗能禁乃使光祿大夫范昆諸部都尉及故九卿張徳等衣繡衣持節虎符以興擊斬首萬餘級及以法誅通行飲食坐相連郡甚者數十人數嵗乃頗得其渠率散卒失士復聚黨阻山川往往而羣無可奈何於是作沈命法曰羣盗起不發覺發覺而捕不滿品者二千石以下至小吏主者皆死其後小吏畏誅雖有盗不敢發恐不能得坐課累府府亦使不言故盜賊寖多上下相為慝以避文法焉頼先帝聖靈斐然其咎皆在於欲畢匈奴而逺㡬音機也為主計若此可謂忠乎世務第四十七大夫曰諸生妄言議者令平聲可詳用無徒守椎音槌車之語滑稽而不可修崔浩曰滑稽酒器也吐酒終日不已言出口成章詞不窮竭若滑稽之吐酒也姚察曰滑稽猶俳諧也滑讀如字稽音計也以言諧語滑利其智計疾出故云滑稽也司馬貞曰滑亂也稽同也以言辯捷之人言非若是言是若非能亂同異也夫音扶漢之有匈奴譬若木之有蠧音妬如人有疾不治則寖音浸以深故謀臣以為擊奪以困極之諸生言以徳懷之此有其語而不可行也諸生上無以似三王下無以似近秦令平聲有司可舉而行當世安蒸庶而寜邊境者乎文學曰昔齊桓公内附百姓外綏諸侯存亡接絶而天下從風其後徳虧行去聲衰葵丘之會振而矜之叛者九國春秋刺其不崇徳而崇力也春秋曰九月戊辰諸侯盟于葵丘左傳曰秋齊侯盟諸侯于葵丘曰凡我同盟之人既盟之後言歸于好宰孔先歸遇晉侯曰可無㑹也齊侯不務徳而勤逺略故北伐山戎南伐楚西為此㑹也東略之不知西則否矣其在亂乎君務靖亂無勤於行晉侯乃還公羊傳曰桓之盟不日此何以日危之也何危爾貫澤之會桓公有憂中國之心不召而至者江人黄人也葵丘之會桓公震而矜之叛者九國震之者何猶曰振振然矜之者何猶曰莫若我也故任徳則强楚告服逺國不召而自至任力則近者不親小國不附此其效也誠上觀三王之所以昌下論秦之所以亡中述齊桓所以興去武行文廢力尚徳罷關梁除障音瘴塞音賽以仁義導之則北垂無冦虜之憂中國無干戈之事矣說山訓曰國有賢君折衝萬里大夫曰事不豫辦不可以應卒内無備不可以禦敵叢談曰兵不豫定無以待敵計不先慮無以應卒詩云詰爾民人謹爾侯度用戒不虞故有文事必有武備國語曰襄王至自鄭以陽樊賜晉文公陽人不服晉侯圍之倉葛曰武不可覿文不可匿覿武無烈匿文不昭君道篇曰成王封伯禽為魯公召而告之曰夫有文無武無以威下有武無文民畏不親文武俱行威徳乃成既成威徳民親以服指武篇曰司馬法曰國雖大好戰必亡天下雖安忘戰必危易曰君子以除戎器戒不虞夫兵不可玩玩則無威兵不可廢廢則召冦昔吴王夫差好戰而亡徐偃王無武亦滅故明王之制國也上不玩兵下不廢武易曰存不忘亡是以身安而國家可保也昔宋襄公倍楚而不備以取大辱焉身執囚而國㡬亡宋世家曰襄公八年齊桓公卒宋欲為盟會十二年春宋襄公為鹿上之盟以求諸侯於楚楚人許之公子目夷諫曰小國爭盟禍也不聼秋諸侯會宋公盟于盂目夷曰禍其在此乎君欲已甚何以堪之於是楚執宋襄公以伐宋故雖有誠信之心不知權變危亡之道也春秋不與中國為禮為去聲其無信也匈奴貪狠因時而動乗可而發飈音標舉電至而欲以誠信之心金帛之寳而信無義之詐是猶親蹠音質蹻音脚而扶猛虎也周書曰毋為虎傅翼將飛入邑擇人而食之文學曰春秋王者無敵言其仁厚其徳美天下賔服莫敢受交也淮南王安曰天子之兵有征而無戰言莫敢校也徳行延及方外舟車所臻足迹所及莫不被澤蠻貊異國重譯音亦自至方此之時天下和同君臣一徳外内相信上下輯睦兵設而不試干戈蔽藏而不用老子曰兕無所用其角螫音式蟲無所輸其毒覽冥訓曰昔者黄帝治天下而力牧太山稽輔之以治日月之行律治隂陽之氣節四時之度正律厯之數别男女異雌雄明上下等貴賤使强不掩弱衆不暴寡人民保命而不夭嵗時熟而不凶百官正而無私上下調而無尤法令明而不闇輔佐公而不阿田者不侵畔漁者不爭隈道不拾遺市不預賈城郭不關邑無盗賊鄙旅之人相讓以財狗彘吐菽粟於路而無忿爭之心於是日月精明星辰不失其行風雨時節五穀登熟虎狼不妄噬鷙鳥不妄搏鳯凰翔於庭麒麟游於郊青龍進駕飛黄伏皂諸北儋耳之國莫不獻其貢職又曰女媧之時卧倨倨興眄眄一自以為馬一自以為牛其行蹎蹎其視瞑瞑侗然皆得其和莫知所由生浮游不知所求魍魎不知所往當此之時禽獸蝮蛇無不匿其爪牙藏其螫毒無有攫噬之心考其功烈上際九天下契黄壚名聲被後世光輝重萬物詮言曰在智則人與之訟在力則人與之爭未有使人無智者有使人不能用其智於已者未有使人無力者也有使人不能施其力於已者也此兩者常在乆見故君賢不見諸侯不備不肖不見則百姓不怨百姓不怨則民用可得諸侯弗備則天下之時可承事所與衆同也攻所與時成也聖人無焉故老子曰虎無所措其爪兕無所措其角蓋謂此也故君仁莫不仁君義莫不義世安得跖音質蹻音脚而親之乎大夫曰布心腹質情素信誠内感義形乎色宋華元楚司馬子反之相覩也符契内合誠有以相信也詩傳曰楚莊王圍宋有七日之糧曰盡此而不克將去而歸於是使司馬子反乗闥而窺宋城宋使華元乗闥而應之子反曰子之國何若矣華元曰憊矣易子而食之析骸而㸑之子反曰嘻甚矣憊雖然吾聞圍者之國箝馬而抹之使肥者應客今何吾子之情也華元曰吾聞君子見人之困則矜之小人見人之困則幸之吾望見吾子似於君子是以情也子反曰諾子其勉之矣吾軍有七日糧爾揖而去子反告莊王莊王曰若何子反曰憊矣易子而食之析骸而㸑之莊王曰嘻甚矣憊今得此而歸爾子反曰不可吾已告之矣曰軍亦有七日糧爾莊王怒曰吾使子視之子曷為而告之子反曰區區之宋猶有不欺之臣何以楚國而無乎吾是以告之也莊王曰雖然吾子今得此而歸爾子反曰王請處此臣請歸耳王曰子去我以歸吾孰與處乎此吾將從子而歸遂師而歸君子善其平已也華元以誠告子反得以解圍全二國之命詩云彼姝者子何以告之君子善其以誠相告也今匈奴挾不信之心懐不測之詐見利如前如一作而古而字通作如字樂府艾而張亦作艾如張也乗便而起潛進市側以襲無備是猶措重寳於道路而莫之守也求其不亡何可得乎文學曰誠信著乎天下醇徳流乎四海則近者歌謳而樂之逺者執禽而朝之泰族訓曰周處鄷鎬之地方不過百里而誓紂牧之野入據殷國朝成湯之廟表商容之閭封比干之墓解箕子之囚乃折枹毁鼔偃五兵縱牛馬搢笏而朝天下百姓歌謳而樂之諸侯執禽而朝之得民心也道應訓曰昔武王伐紂破之收野乃封比干之墓表商容之閭柴箕子之門朝成湯之廟發鉅橋之粟散鹿臺之錢破鼓折枹弛弓絶絃去舍露宿以示平易解劒帶笏以示無仇於此天下歌謡而樂之諸侯執幣相朝三十四世不奪故老子曰善閉者無關鍵而不可開也善結者無繩約而不可解也故正近者不以威來逺者不以武徳義修而任賢良也故民之於事辭佚音逸而就勞於財也辭多而就寡上下交讓道路鴈行方此之時賤貨而貴徳重義而輕利賞之不竊何寳之守也鹽鐵論卷九
