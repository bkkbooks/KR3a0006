  - {type: variant, offset: 4225, length: 1, content: 實, WYG: 四海天子欣欣以騫言為然發使四出皆各行三千里初天子發書易曰神馬當從西北來得烏孫馬好名曰天馬及得宛汗血馬益壯更名烏孫馬曰西極馬宛馬曰天馬云大宛諸國發使隨漢使來觀漢廣大以大鳥卵及犛靬眩人獻於漢天子大說}
