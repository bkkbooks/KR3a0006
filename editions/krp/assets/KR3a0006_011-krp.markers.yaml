  - {type: variant, offset: 11504, length: 228, content: 管子曰國有四維一維絶則傾二維絶則危三維絶則覆四維絶則滅傾可正也危可安也覆可起也滅不可復錯也何謂四維一曰禮二曰義三曰亷四曰耻禮不踰節義不自進亷不蔽惡恥不從枉故不踰節則上位安不自進則民無巧詐不蔽惡則行自全不從枉則邪事不生故曰四維不張國乃滅亡主術訓曰臯陶喑而為大理天下無虐刑有貴于言者也師曠瞽而為大宰晉無亂政有貴于見者也不言之令不視之見此伏羲神農之所以為師也故民之化也不從其所言而從所行又曰國之所以存者仁義是也人之所以生者行善是也國無仁義雖大必亡人無善志雖勇必傷, SBCK: ''}
