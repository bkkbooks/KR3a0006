  - {type: variant, offset: 5071, length: 58, content: 倫六十有餘人咸聚闕庭舒六藝之風論太平之原智者贊其慮仁者明其施勇者見其斷辯者陳其詞誾誾焉侃侃焉雖未能詳備斯可略觀矣然蔽, SBCK: 召遠疾}
  - {type: variant, offset: 5074, length: 362, content: 有餘人咸聚闕庭舒六藝之風論太平之原智者贊其慮仁者明其施勇者見其斷辯者陳其詞誾誾焉侃侃焉雖未能詳備斯可略觀矣然蔽於雲霧終廢而不行悲夫公卿知任武可以辟地而不知廣德可以附遠知權利可以廣用而不知稼穡可以富國也近者親附遠者說德則何為而不成何求而不得不出於斯路而務畜利長威豈不謬哉中山劉子雍言王道矯當世復諸正務在乎反本直而不徼切而不𤌘斌斌然斯可謂弘博君子矣九江祝生奮由路之意推史魚之節發憤懣刺譏公卿介然直而不撓可謂不畏強禦矣桑大夫據當世合時變推道術尚權利辟略小辯雖非正法然巨儒宿學恧然不能自解可謂博物通達之士矣然攝卿相之位不引準繩以道化下放於利末不師古始易曰焚如棄如處非其位行非其道果隕其性以及厥宗車丞相即周呂之列當軸處中括囊不言容身而去彼哉彼哉若夫群丞相御史兩府之士不能正議以輔宰相成同類長同行阿意苟合以說其上斗筲之人道諛之徒何足筭哉, WYG: ''}
