  - {type: variant, offset: 10017, length: 279, content: 隠平凖書曰武帝之時嚴助朱買臣等招來東甌事两越江淮之間蕭然煩費矣唐䝉司馬相如開路西南夷鑿山通道千餘里以廣巴蜀巴蜀之民罷焉彭吳賈滅朝鮮置滄海之郡則燕齊之間靡然發動及王恢設謀馬邑匈奴絶和親侵擾北邉兵連而不觧天下苦其勞而干戈日滋行者齎居者送中外騷擾而相奉百姓抗弊以巧法財賂衰耗而不贍入物者補官出貨者除罪選舉凌遲㢘恥相冐武力進用法嚴令具興利之臣自此始也尚書中候曰吕尚釣磻溪得玉璜刻曰姬受命吕佐旌六韜曰文王卜田史扁為卜曰于渭之陽將大得焉非熊非羆非虎非彲兆得公侯天遺汝師文王齋戒三日田于渭陽卒見吕尚坐茅以漁武王曰朂哉夫子尚桓桓如虎如貔如熊如羆于商郊弗迓克奔以役西土朂哉夫子, SBCK: 􅀮}
