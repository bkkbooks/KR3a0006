  - {type: variant, offset: 217, length: 0, content: '', WYG: 雜事篇曰魏文侯出游見路人反裘而負芻文侯曰胡為反裘而負芻對曰臣愛其毛文侯曰若不知其裏盡而毛無所恃耶明年東陽上計錢布十倍大夫畢賀文侯曰此非所以賀我也譬無異夫路人反裘而負芻也將愛其毛不知其裏盡毛無所恃也今吾田地不加廣士民不加衆而錢布十倍必取之士大夫也吾聞之下不安者上不可居也此非所以賀我也}
