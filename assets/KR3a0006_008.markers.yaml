  - {type: variant, offset: 3348, length: 719, content: 信之心懷不測之詐見利如前乘便而起潛進市側以襲無備是猶措重寶於道路而莫之守也求其不亡何可得乎文學曰誠信著乎天下醇德流乎四海則近者歌謳而樂之遠者執禽而朝之故正近者不以威來遠者不以武德義修而任賢良也故民之於事也辭佚而就勞於財也辭多而就寡上下交讓道路鴈行方此之時賤貨而貴德重義而輕利賞之不竊何寶之守也和親第四十八大夫曰昔徐偃王行義而滅魯哀公好儒而削知文而不知武知一而不知二故君子篤仁以行然必築城以自守設械以自備為不仁者之害己也是以古者蒐獮振旅而數軍實焉恐民之愉佚而亡戒難故兵革者國之用城壘者國之固也而欲罷之是去表見裏示匈奴心腹也匈奴輕舉潛進以襲空虛是猶不介而當矢石之蹊禍必不振此邊境之所懼而有司之所憂也文學曰往者通關梁交有無自單于以下皆親漢內附往來長城之下其後王恢誤謀馬邑匈奴絕和親攻當路塞禍紛拏而不解兵連而不息邊民不解甲弛弩行數十年介冑而耕耘鉏耰而候望燧燔烽舉丁壯弧弦而出鬭老者超越而入葆言之足以流涕寒心則仁者不忍也詩云投我以桃報之以李未聞善往而有惡來者故君子敬而無失與人恭而有禮四海之內皆為兄弟也故內省不疚夫何憂何懼大夫曰自春秋諸夏之君會聚相結三會之後乖離相疑伐戰不止六國從親冠帶相接然未嘗有堅約況禽獸之國乎春秋存君在楚誥鼬之會書公紿夷狄也匈奴數和親而常先犯約貪侵盜驅長詐謀之國也反復無信百約百叛若朱象之不移商均之不化而欲信其用兵之備親之以德亦難矣文學曰王者中立而聽乎天下德施方外絕國殊俗臻於闕庭鳳皇在列樹麒麟在郊藪群生庶物莫不被澤非足行而仁辦之也推其仁恩而皇之誠也范蠡出於越由余長於胡皆為霸王賢佐故政有不從之教而世無不可化之民詩云酌彼行潦挹彼注茲故公劉處戎狄戎狄化之大王去豳豳民隨之周公修德而越裳氏來其從善如影響為政務以德親近何憂於彼之不改, SBCK: 對}
