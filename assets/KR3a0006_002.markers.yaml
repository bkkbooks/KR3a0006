  - {type: variant, offset: 1477, length: 0, content: '', WYG: 繆稱訓曰人為之天成之終身為善非天不行終身為不善非天不亡故善否我也禍福非我也故君子順其在已者而已矣性者所受於天也命者所遭於時也有其材不遇其世天也太公何力比干何罪循性而行或害或利求之有道得之有命故君子能為善而不能必其得福不忍為非而不能必免其禍傳曰伯竒孝而棄於親隐公慈而殺於弟叔武賢而殺於兄比干忠而誅於君詩曰予慎無􅇳}
