  - {type: variant, offset: 47, length: 145, content: 漢書食貨志曰昭帝即位六年詔郡國舉賢良文學之士問以民所疾苦教化之要車千秋傳曰武帝疾立皇子鉤弋夫人男為太子拜大将軍霍光車騎将軍金日磾御史大夫桑𢎞羊及丞相千秋並受遺詔輔道少主武帝崩昭帝初即位未任聼政政事壹決大将軍光千秋居丞相位謹厚有重徳始元六年昭帝詔郡國舉賢良文學之士問以民所疾苦於是鹽鐵之議起焉, SBCK: ''}
