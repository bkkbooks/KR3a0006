  - {type: variant, offset: 234, length: 0, content: '', krp: 受賞而不肖者被刑固其然也文學何怪焉文學曰論者相扶以義相喻以道從善不求勝服義不恥窮若相迷以偽相亂以辭相矜於後息期於苟勝非其貴者也傳曰孔子過康子子張子夏從孔子入坐二子相與論終日不决子夏辭氣甚隘顔色甚變子張曰子亦聞夫子之議論邪徐言誾誾威儀翼翼後言先黙得之推讓巍巍乎蕩蕩乎道有歸矣小人之論也專意自是言人之非瞑目搤腕疾言噴噴口沸目赤一幸得勝疾笑嗌嗌威儀固陋辭氣鄙俗是以君子賤之也夫音扶蘇秦張儀熒惑諸侯傾覆萬乘去聲使人主失其所持非不辯然亂之道也泰族訓曰百川並流不注海者不為川谷趣行踳馳不歸善者不為君子故善言歸乎可行善行歸乎仁義田子方段干木輕爵祿而重其身不以欲傷生不以利累形李克竭股肱之力領理百官輯穆萬民使其君生無廢事死無遺憂此異行而歸於善者張儀蘇秦家無常居身無定君約從衡之事為傾覆之謀濁亂天下撓􅉸諸侯使百姓不遑啓居或從或横或合衆弱或輔富强此異行而歸于醜者也故君子之過也猶日月之蝕何害於明小人之行也猶狗之晝吠鴟之夜見何益於善夫知者不妄發擇善而為之計義而行之故事成而功足賴也身死而名足稱也雖有知能必以仁義為之本然後可立也子疾鄙夫之不可與事君患其聼從而無所不至也今子不聼正義以輔卿相去聲又從而順之好去聲須臾之說不計其後君子之為人吏宜受上戮子姑黙矣孝養第二十五丞相去聲史曰葢聞}
  - {type: variant, offset: 235, length: 0, content: '', WYG: 之居世也衣服足以勝身食飲足以供親内足以相䘏外不求於人故身修然後可以理家家治然後可以治官故飯上聲䓸音奸糲音辣者不可以言孝䓸蔬菜也孟康曰糲粗米也張晏曰一斗粟七升米為糲妻子饑寒者不可以言慈緒業不備者不可以言理居斯世行斯身而有此三累者斯亦足以黙矣韓嬰曰曽子仕於莒得粟三秉方是之時曽子重其祿而輕其身親沒之後齊迎以相楚迎以令尹晋迎以上卿方是之時曽子重其身而輕其祿懐其寶而迷其國者不可以語仁窘其身而約其親者不可與語孝任重道逺者不擇地而息家貧親老者不擇官而仕故君子釋褐趨時當務為急傳云不逢時而仕任事而敦其慮為之使而不入其謀貧焉故也詩曰夙夜在公實命不同文學曰善養去聲者不必芻豢也善供服者不必錦繡也韓非子曰糟糠不飽者不務粱肉裋褐不􅩘者不待文繡以已之所有盡事其親孝之至也故匹夫勤勞猶足以順禮歠音轍菽飲水足以致其敬子路曰傷哉貧也生無以為養死無以為禮也孔子曰啜菽飲水盡其歡斯之謂孝歛首足形還葬而無椁稱其財斯謂之禮孔子曰今之孝者是謂能養去聲不敬何以别乎故上孝養去聲志其次養去聲色其次養去聲體貴其禮不貪其養禮順心和養去聲雖不備可也曾子曰孝有三大孝尊親其次弗辱其下能養公明儀問於曽子曰夫子可以為孝乎曽子曰是何言與是何言與君子之所謂孝者先意承志諭父母於道参直養者也安能為孝乎易曰東鄰殺牛不如西鄰之禴祭也反質萹曰信鬼神者失謀信日者失時何以知其然夫賢聖周知能不時日而事利敬法令貲功勞不卜筮而身吉謹仁義順道理不禱祠而福故卜數擇日㓗齊盛肥犧牲飾珪璧精祠祀而終不能除悖逆之祸以神明有知而事之乃欲背道妄行而以祠祀求福神明必違之矣天子祭天地五嶽四瀆諸侯祭社稷}
