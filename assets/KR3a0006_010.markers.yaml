  - {type: variant, offset: 1089, length: 0, content: '', SBCK: 况􅀒重羸兵以求之乎其勢不相及也茫茫乎􅀂行九臯未知所止皓皓乎􅀂無網羅而漁江海雖及之三軍罷弊適遺之餌也故明王知其所無利以爲役不可數行而權不可乆張也故詔公卿大夫賢良文學所以復枉興㣲之路公卿宜思百姓之急匈奴之害縁聖主之心定安平之業今乃留心於末計雖本議不順上意未爲盡於忠也大夫曰􅀄貳師不克宛而還也議者故使人主不遂忿則西域皆瓦解而附於胡胡}
