  - {type: variant, offset: 3, length: 3, content: 庫全書, SBCK: 十大夫曰盲者口能言白黒而無目以别之儒者口能言治亂無能以行之夫坐言不行則牧童兼烏􅀗之力逢須苞尭舜之德故使言而近則儒者何患於治亂而盲人何患於白黒哉言之不出耻窮之不逮故卑而言高能言而不能行者君子耻之矣賢良曰能言而不能行者國之寶也能行而不能言者國之用也兼此二者君子也無一者烏􅀗逢須也言滿天下德覆四海周公是也口言之躬行之豈􅀂默然載施其行而巳則執事亦何患何耻之有今道不舉而務小利慕於不急以亂群意君子雖貧勿爲可也藥酒病之利也正言治之藥也公卿誠能自强自􅃘食文學之至言去權詭罷利官一歸之於民親以周公之道則天下治而頌聲作儒者安得治亂而患之乎}
