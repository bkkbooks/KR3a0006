  - {type: variant, offset: 10533, length: 385, content: 周書曰文王受命之九年時緋暮春在鄗謂太子發曰吾語汝所保所守守之哉厚徳廣惠忠信愛人君子之行不為驕侈不為靡泰不淫於美括拄茅茨為愛費山林非時不升斤斧以成草木之長川凙非時不入網罟以成魚鼈之長不麛不卵以成鳥獸之長畋漁以時童不夭胎馬不馳騖土不失宜土可犯材可蓄潤濕不穀樹之竹葦莞蒲礫石不可穀樹之葛木以為絺綌以為材用故凡天地之間聖人裁之並為民利是魚鼈歸其泉鳥歸其林孤寡辛苦咸賴其生山以遂其材工匠以為其器百物以平其利商賈以通其貨工不失其務農不失其時是謂和徳主術訓曰先王之法畋不掩羣不取麛夭不蒸澤而漁不焚林而獵豺未祭獸罝罦不得布於野獺未祭魚網罟不得入於水鷹隼未摰羅網不得張於谿谷草木未落斧斤不得入山林昆蟲未蟄不得以火燒田孕育不得殺􅙿卵不得探魚不長尺不得取彘不期年不得食是故草木之發若蒸氣禽獸歸之若流泉飛鳥歸之若煙雲有所以致之也雍季曰焚林而田得獸雖多而明年無復也乾澤而漁得魚雖多而明年無復也若其, SBCK: 􅀂則}
