  - {type: variant, offset: 1336, length: 0, content: '', WYG: 范睢曰伍子胥橐載而出昭關夜行晝伏至於陵水無以餬其口膝行蒲伏稽首肉袒鼓腹吹篪乞食於呉市卒興呉國闔閭為霸越絶書曰子胥賜劔將自殺歎曰嗟乎衆曲矯直一人固不能獨立吾挾弓矢以逸鄭楚之間自以為可復吾見凌之仇乃先王之功想得報焉自致於此吾先得榮後僇者非智衰也先遇明後遭險君之易移也已矣坐不遇時復何言哉此吾命也亡將安之莫如早死從吾先王于地下葢吾之志也}
