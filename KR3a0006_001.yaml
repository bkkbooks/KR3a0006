body:
  text: 鹽鐵論卷一本議第一惟始元六年有詔書使丞相御史與所舉賢良文學語問民間所疾苦文學對曰竊聞治人之道防淫佚之原廣道德之端抑末利而開仁義毋示以利然後教化可興而風俗可移也今郡國有鹽鐵酒榷均輸與民爭利散敦厚之樸成貪鄙之化是以百姓就本者寡趨末者眾夫文繁則質衰末盛則本虧末修則民淫本修則民愨民愨則財用足民侈則饑寒生願罷鹽鐵酒榷均輸所以進本退末廣利農業便也大夫曰匈奴背叛不臣數為寇暴於邊鄙備之則勞中國之士不備則侵盜不止先帝哀邊人之久患苦為虜所係獲也故修障塞飭烽燧屯戍以備之邊用度不足故興鹽鐵設酒榷置均輸蕃貨長財以佐助邊費今議者欲罷之內空府庫之藏外乏執備之用使備塞乘城之士饑寒於邊將何以贍之罷之不便也文學曰孔子曰有國有家者不患寡而患不均不患貧而患不安故天子不言多少諸侯不言利害大夫不言得喪畜仁義以風之廣德行以懷之是以近者親附而遠者悅服故善克者不戰善戰者不師善師者不陣修之於廟堂而折衝還師王者行仁政無敵於天下惡用費哉大夫曰匈奴桀黠擅恣入塞犯厲中國殺伐郡縣朔方都尉甚悖逆不軌宜誅討之日久矣陛下垂大惠哀元元之未贍不忍暴士大夫於原野縱難被堅執銳有北面復匈奴之志又欲罷鹽鐵均輸擾邊用損武略無憂邊之心於其義未便也文學曰古者貴以德而賤用兵孔子曰遠人不服則修文德以來之既來之則安之今廢道德而任兵革興師而伐之屯戍而備之暴兵露師以支久長轉輸糧食無已使邊境之士饑寒於外百姓勞苦於內立鹽鐵始張利官以給之非長策也故以罷之為便也大夫曰古之立國家者開本末之途通有無之用市朝以一其求致士民聚萬貨農商工師各得所欲交易而退易曰通其變使民不倦故工不出則農用乏商不出則寶貨絕農用乏則穀不殖寶貨絕則財用匱故鹽鐵均輸所以通委財而調緩急罷之不便也文學曰夫導民以德則民歸厚示民以利則民俗薄俗薄則背義而趨利趨利則百姓交於道而接於市老子曰貧國若有餘非多財也嗜慾眾而民躁也是以王者崇本退末以禮義防民欲實菽粟貨財市商不通無用之物工不作無用之器故商所以通鬱滯工所以備器械非治國之本務也大夫曰管子云國有沃野之饒而民不足於食者器械不備也有山海之貨而民不足於財者商工不備也隴蜀之丹漆旄羽荊揚之皮革骨象江南之柟梓竹箭燕齊之魚鹽旃裘兗豫之漆絲絺紵養生送終之具也待商而通待工而成故聖人作為舟楫之用以通川谷服牛駕馬以達陵陸致遠窮深所以交庶物而便百姓是以先帝建鐵官以贍農用開均輸以足民財鹽鐵均輸萬民所戴仰而取給者罷之不便也文學曰國有沃野之饒而民不足於食者工商盛而本業荒也有山海之貨而民不足於財者不務民用而淫巧眾也故川源不能實漏卮山海不能贍溪壑是以盤庚萃居舜藏黃金高帝禁商賈不得仕宦所以遏貪鄙之俗而醇至誠之風也排困市井防塞利門而民猶為非也況上之為利乎傳曰諸侯好利則大夫鄙大夫鄙則士貪士貪則庶人盜是開利孔為民罪梯也大夫曰往者郡國諸侯各以其方物貢輸往來煩雜物多苦惡或不償其費故郡國置輸官以相給運而便遠方之貢故曰均輸開委府于京師以籠貨物賤即買貴即賣是以縣官不失實商賈無所貿利故曰平準平準則民不失職均輸則民齊勞逸故平準均輸所以平萬物而便百姓非開利孔而為民罪梯者也文學曰古者之賦稅於民也因其所工不求所拙農人納其獲女工效其功今釋其所有責其所無百姓賤賣貨物以便上求間者郡國或令民作布絮吏恣留難與之為市吏之所入非獨齊阿之縑蜀漢之布也亦民間之所為耳行姦賣平農民重苦女工再稅未見輸之均也縣官猥發闔門擅市則萬物並收萬物並收則物騰躍騰躍則商賈侔利自市則吏容姦豪吏富商積貨儲物以待其急輕賈姦吏收賤以取貴未見準之平也蓋古之均輸所以齊勞逸而便貢輸非以為利而賈萬物也力耕第二大夫曰王者塞天財禁關市執準守時以輕重御民豐年歲登則儲積以備乏絕凶年惡歲則行幣物流有餘而調不足也昔禹水湯旱百姓匱乏或相假以接衣食禹以歷山之金湯以莊山之銅鑄幣以贖其民而天下稱仁往者財用不足戰士或不得祿而山東被災齊趙大饑賴均輸之蓄倉廩之積戰士以奉饑民以賑故均輸之物府庫之財非所以賈萬民而專奉兵師之用亦所以賑困乏而備水旱之災也文學曰古者十一而稅澤梁以時入而無禁黎民咸被南畝而不失其務故三年耕而餘一年之蓄九年耕有三年之蓄此禹湯所以備水旱而安百姓也草萊不闢田疇不治雖擅山海之財通百末之利猶不能贍也是以古者尚力務本而種樹繁躬耕趣時而衣食足雖累凶年而人不病也故衣食者民之本稼穡者民之務也二者修則國富而民安也詩云百室盈止婦子寧止也大夫曰賢聖治家非一寶富國非一道昔管仲以權譎霸而紀氏以強本亡使治家養生必於農則舜不甄陶而伊尹不為庖故善為國者天下之下我高天下之輕我重以末易其本以虛蕩其實今山澤之財均輸之藏所以御輕重而役諸侯也汝漢之金纖微之貢胡所以誘外國而釣羗之寶也夫中國一端之縵得匈奴累金之物而損敵國之用是以驘驢馲駞衘尾入塞驒騱騵馬盡為我畜鼲鼦狐貉采旃文罽充於內府而璧玉珊瑚瑠璃咸為國之寶是則外國之物內流而利不外泄也異物內流則國用饒利不外泄則民用給矣詩曰百室盈止婦子寧止文學曰古者商通物而不豫工致牢而不偽故君子耕稼田魚其實一也商則長詐工則飾罵內懷闚𨵦而心不怍是以薄夫欺而敦夫薄昔桀女樂充宮室文繡衣裳故伊尹高逝遊薄而女樂終廢其國今驘驢之用不中牛馬之功鼲鼦旃罽不益錦綈之實美玉珊瑚出於昆山珠璣犀象出於桂林此距漢萬有餘里計耕桑之功資財之費是一物而售百倍其價也一揖而中萬鍾之粟也夫上好珍怪則淫服下流貴遠方之物則貨財外充是以王者不珍無用以節其民不愛奇貨以富其國故理民之道在於節用尚本分土井田而已大夫曰自京師東西南北歷山川經郡國諸殷富大都無非街衢五通商賈之所湊萬物之所殖者故聖人因天時智者因地財上士取諸人中士勞其形長沮桀溺無百金之積蹠蹻之徒無猗頓之富宛周齊魯商遍天下故乃商賈之富或累萬金追利乘羡之所致也富國何必用本農足民何必井田也文學曰洪水滔天而有禹之績河水泛濫而有宣房之功商紂暴虐而有孟津之謀天下煩擾而有乘羨之富夫上古至治民樸而貴本安愉而寡求當此之時道路罕行市朝生草故耕不強者無以充虛織不強者無以掩形雖有湊會之要陶宛之術無所施其巧自古及今不施而得報不勞而有功者未之有也通有第三大夫曰燕之涿薊趙之邯鄲魏之溫軹韓之滎陽齊之臨淄楚之宛陳鄭之陽翟三川之二周富冠海內皆為天下名都非有助之耕其野而田其地者也居五諸之衝跨街衢之路也故物豐者民衍宅近市者家富富在術數不在勞身利在勢居不在力耕也文學曰荊揚南有桂林之饒內有江湖之利左陵陽之金右蜀漢之材伐木而樹穀燔萊而播粟火耕而水耨地廣而饒材然民鮆窳偷生好衣甘食雖白屋草廬歌謳鼓琴日給月單朝歌暮戚趙中山帶大河纂四通神衢當天下之蹊商賈錯於路諸侯交於道然民淫好末侈靡而不務本田疇不修男女矜飾家無斗筲鳴琴在室是以楚趙之民均貧而寡富宋衛韓梁好本稼穡編戶齊民無不家衍人給故利在自惜不在勢居街衢富在儉力趣時不在歲司羽鳩也大夫曰五行東方木而丹章有金銅之山南方火而交趾有大海之川西方金而蜀隴有名材之林北方水而幽都有積沙之地此天地所以均有無而通萬物也今吳越之竹隋唐之材不可勝用而曹衛梁宋采棺轉尸江湖之魚萊黃之鮐不可勝食而鄒魯周韓藜藿蔬食天地之利無不贍而山海之貨無不富也然百姓匱乏財用不足多寡不調而天下財不散也文學曰古者采椽不斲茅茨不翦衣布褐飯土硎鑄金為鉏埏埴為器工不造奇巧世不寶不可衣食之物各安其居樂其俗甘其食便其器是以遠方之物不交而昆山之玉不至今世俗壞而競於淫靡女極纖微工極技巧雕素樸而尚珍怪鑽山石而求金銀沒深淵求珠璣設機陷求犀象張網羅求翡翠求蠻貉之物以眩中國徙邛筰之貨致之東海交萬里之財曠日費功無益於用是以褐夫匹婦勞罷力屈而衣食不足也故王者禁溢利節漏費溢利禁則反本漏費節則民用給是以生無乏資死無轉尸也大夫曰古者宮室有度輿服以庸采椽茅茨非先王之制也君子節奢刺儉儉則固昔孫叔敖相楚妻不衣帛馬不秣粟孔子曰不可大儉極下此蟋蟀所為作也管子曰不飾宮室則材木不可勝用不充庖廚則禽獸不損其壽無末利則本業無所出無黼黻則女工不施故工商梓匠邦國之用器械之備也自古有之非獨於此弦高販牛於周五羖賃車入秦公輸子以規矩歐冶以鎔鑄語曰百工居肆以成其事農商交易以利本末山居澤處蓬蒿墝埆財物流通有以均之是以多者不獨衍少者不獨饉若各居其處食其食則是橘柚不鬻朐鹵之鹽不出旃罽不市而吳唐之財不用也文學曰孟子云不違農時穀不可勝食蠶麻以時布帛不可勝衣也斧斤以時入材木不可勝用田漁以時魚肉不可勝食若則飾宮室增臺榭梓匠斲巨為小以圓為方上成雲氣下成山林則材木不足用也男子去本為末雖雕文刻鏤以象禽獸窮物究變則穀不足食也婦女飾微治細以成文章極技盡巧則絲布不足衣也庖宰烹殺胎卵煎炙齊和窮極五味則魚肉不足食也當今世非患禽獸不損材木不勝患僣侈之無窮也非患無旃罽橘柚患無狹廬糠糟也錯幣第四大夫曰交幣通施民事不及物有所并也計本量委民有饑者穀有所藏也智者有百人之功愚者有不更本之事人君不調民有相萬之富也此其所以或儲百年之餘或不厭糟糠也民大富則不可以祿使也大彊則不可以罰威也非散聚均利者不齊故人主積其食守其用制其有餘調其不足禁溢羡厄利塗然後百姓可家給人足也文學曰古者貴德而賤利重義而輕財三王之時迭盛迭衰衰則扶之傾則定之是以夏忠殷敬周文庠序之教恭讓之禮粲然可得而觀也及其後禮義弛崩風俗滅息故自食祿之君子違於義而競於財大小相吞激轉相傾此所以或儲百年之餘或無以充虛蔽形也古之仕者不穡田者不漁抱關擊柝皆有常秩不得兼利盡物如此則愚智同功不相傾也詩云彼有遺秉此有滯穗伊寡婦之利言不盡物也大夫曰湯文繼衰漢興乘弊一質一文非苟易常也俗弊更法非務變古也亦所以救失扶衰也故教與俗改弊與世易夏后以玄貝周人以紫石後世或金錢刀布物極而衰終始之運也故山澤無征則君臣同利刀幣無禁則姦貞並行夫臣富則相侈下專利則相傾也文學曰古者市朝而無刀幣各以其所有易所無抱布貿絲而已後世即有龜貝金錢交施之也幣數變而民滋偽夫救偽以質防失以禮湯文繼衰革法易化而殷周道興漢初乘弊而不改易畜利變幣欲以反本是猶以煎止燔以火止沸也上好禮則民闇飾上好貨則下死利也大夫曰文帝之時縱民得鑄錢冶鐵煮鹽吳王擅鄣海澤鄧通專西山山東奸猾咸聚吳國秦雍漢蜀因鄧氏吳鄧錢布天下故有鑄錢之禁禁禦之法立而奸偽息奸偽息則民不期於妄得而各務其職不反本何為故統一則民不二也幣由上則下不疑也文學曰往古幣眾財通而民樂其後稍去舊幣更行白金龜龍民多巧新幣幣數易而民益疑於是廢天下諸錢而專命水衡三官作吏匠侵利或不中式故有薄厚輕重農人不習物類比之信故疑新不知姦貞商賈以美貿惡以半易倍買則失實賣則失理其疑或滋益甚夫鑄偽金錢以有法而錢之善惡無增損於故擇錢則物稽滯而用人尤被其苦春秋曰算不及蠻夷則不行故王者外不鄣海澤以便民用內不禁刀幣以通民施禁耕第五大夫曰家人有寶器尚函匣而藏之況人主之山海乎夫權利之處必在深山窮澤之中非豪民不能通其利異時鹽鐵未籠布衣有朐邴人君有吳王皆鹽鐵初議也吳王專山澤之饒薄賦其民賑贍窮乏以成私威私威積而逆節之心作夫不蚤絕其源而憂其末若決呂梁沛然其所傷必多矣太公曰一家害百家百家害諸侯諸侯害天下王法禁之今放民於權利罷鹽鐵以資暴彊遂其貪心眾邪群聚私門成黨則強禦日以不制而并兼之徒姦形成也文學曰民人藏於家諸侯藏於國天子藏於海內故民人以垣墻為藏閉天子以四海為匣匱天子適諸侯升自阼階諸侯納管鍵執策而聽命示莫為主也是以王者不畜聚下藏於民遠浮利務民之義義禮立則民化上若是雖湯武生存於世無所容其慮工商之事歐冶之任何姦之能成三桓專魯六卿分晉不以鹽鐵故權利深者不在山海在朝廷一家害百家在蕭墻而不在朐邴也大夫曰山海有禁而民不傾貴賤有平而民不疑縣官設衡立準人從所欲雖使五尺童子適市莫之能欺今罷去之則豪民擅其用而專其利決市閭巷高下在口吻貴賤無常端坐而民豪是以養強抑弱而藏於跖也彊養弱抑則齊民消若眾穢之盛而害五穀一家害百家不在朐邴如何也文學曰山海者財用之寶路也鐵器者農夫之死士也死士用則仇讎滅仇讎滅則田野闢田野闢而五穀熟寶路開則百姓贍而民用給民用給則國富國富而教之以禮則行道有讓而工商不相豫人懷敦樸以相接而莫相利夫秦楚燕齊土力不同剛柔異勢巨小之用居句之宜黨殊俗易各有所便縣官籠而一之則鐵器失其宜而農民失其便器用不便則農夫罷於野而草萊不辟草萊不辟則民困乏故鹽冶之處大傲皆依山川近鐵炭其勢咸遠而作劇郡中卒踐更者多不勘責取庸代縣邑或以戶口賦鐵而賤平其準良家以道次發僦運鹽鐵煩費百姓病苦之愚竊見一官之傷千里未覩其在朐邴也復古第六大夫曰故扇水都尉彭祖寧歸言鹽鐵令品令品甚明卒徒衣食縣官作鑄鐵器給用甚眾無妨於民而吏或不良禁令不行故民煩苦之令意總一鹽鐵非獨為利入也將以建本抑末離朋黨禁淫侈絕并兼之路也古者名山大澤不以封為下之專利也山海之利廣澤之畜天地之藏也皆宜屬少府陛下不私以屬大司農以佐助百姓浮食奇民好欲擅山海之貨以致富業役利細民故沮事議者眾鐵器兵刃天下之大用也非眾庶所宜事也往者豪強大家得管山海之利采鐵石鼓鑄煮海為鹽一家聚眾或至千餘人大抵盡收放流人民也遠去鄉里棄墳墓依倚大家聚深山窮澤之中成姦偽之業遂朋黨之權其輕為非亦大矣今者廣進賢之途練擇守尉不待去鹽鐵而安民也文學曰扇水都尉所言當時之權一切之術也不可以久行而傳世此非明王所以君國子民之道也詩云哀哉為猶匪先民是程匪大猶是經維邇言是聽此詩人刺不通於王道而善為權利者孝武皇帝攘九夷平百越師旅數起糧食不足故立田官置錢入穀射官救急贍不給今陛下繼大功之勤養勞勌之民此用麋鬻之時公卿宜思所以安集百姓致利除害輔明主以仁義修潤洪業之道明主即位以來六年于茲公卿無請減除不急之官省罷機利之人人權縣太久民良望於上陛下宣聖德昭明光令郡國賢良文學之士乘傳詣公車議五帝三王之道六藝之風冊陳安危利害之分指意粲然今公卿辯議未有所定此所謂守小節而遺大體抱小利而忘大利者也大夫曰宇棟之內鷰雀不知天地之高坎井之鼃不知江海之大窮夫否婦不知國家之慮負荷之商不知猗頓之富先帝計外國之利料胡越之兵兵敵弱而易制用力少而功大故因勢變以主四夷地濱山海以屬長城北略河外開路匈奴之鄉功未卒蓋文王受命伐崇作邑于豐武王繼之載尸以行破商擒紂遂成王業曹沫棄三北之恥而復侵地管仲負當世之累而立霸功故志大者遺小用權者離俗有司思師望之計遂先帝之業志在絕胡貉擒單于故未遑扣扃之義而錄拘儒之論文學曰鷰雀離巢宇而有鷹隼之憂坎井之鼃離其居而有蛇鼠之患況翱翔千仞而游四海乎其禍必大矣此李斯之所以折翼而趙高沒淵也聞文武受命伐不義以安諸侯大夫未聞弊諸夏以役夷狄也昔秦常舉天下之力以事胡越竭天下之財以奉其用然眾不能畢而以百萬之師為一夫之任此天下共聞也且數戰則民勞久師則兵弊此百姓所疾苦而拘儒之所憂也
