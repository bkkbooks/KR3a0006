body:
  text: 鹽鐵論目録儒家類卷一本議一力耕二通有三卷二錯幣四禁耕五復古六非鞅七卷三晁錯八刺權九刺復十論儒十一憂邊十二卷四園池十三輕重十四未通十五地廣十六貧富十七卷五毁學十八褒賢十九相刺二十卷六殊路二十一頌賢二十二遵道二十三論誹二十四孝養二十五卷七刺議二十六利議二十七國疾二十八散不足二十九救匱三十鹽鐵鍼石三十一除狭三十二卷八疾貪三十三後刑三十四授時三十五水旱三十六崇禮三十七備胡三十八卷九執務三十九能言四十鹽鐵取下四十一擊之四十二結和四十三誅秦四十四伐功四十五西域四十六世務四十七卷十和親四十八繇役四十九險固五十論勇五十一卷十一論功五十二論鄒五十三論菑五十四刑徳五十五卷十二申韓五十六周秦五十七詔聖五十八大論五十九雜論六十欽定四庫全書鹽鐡論提要臣等謹案鹽鐡論十二卷漢桓寛撰寛字次公汝南人宣帝時舉為郎官至廬江太守丞昭帝始元六年詔郡國舉賢良文學之士問以民所疾苦皆請罷鹽鐡𣙜酤與御史大夫桑宏羊等建議相詰難寛集其所論為書凡六十篇篇各標目實則反覆問答諸篇皆首尾相屬後罷𣙜酤而鹽鐡則如舊故寛作是書惟以鹽鐡為名葢惜其議不盡行也書末襍論一篇述汝南朱子伯之言記賢良茂陵唐生文學魯萬生等六十餘人而最推中山劉子雍九江祝生於桑宏羊車千秋深著微詞葢其著書之大㫖所論雖食貨之事而言皆述先王稱六經故諸史皆列之儒家黄虞稷千頃堂書目改𨽻史部食貨類中循名而失其實矣明嘉靖癸丑華亭張之象為之註雖無所發明然事實亦粗具梗槩今並錄之以備考核焉乾隆四十三年六月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀張之象註鹽鐵論原序張子曰余嘗謂文學政事孔門設教判為兩科要之皆儒者之能事通一無間者也是故學優乃仕仕優乃學此烏可以偏業語之哉借所謂文學云者而不通政事則空言無當殆非達儒之謂矣余於桓氏鹽鐡論不獨好其文盖多其善言政事焉夫君子非患不文也患不適用耳乃世之䇿士云者徒騁章句之學而中無卓見牽合雷同阿狥逢迎多所顧忌不能一張膽正言吐露忠赤畢展其志何者大抵以干禄為累得失動心雖欲抗論不可得已苟如是則上負天子下負所學是尚可以為士乎夫士貴立志亦貴養氣志不立則中懦氣不養則外怯孔子曰三軍可奪帥也匹夫不可奪志也孟子曰我善養吾浩然之氣且云説大人則藐之勿視其巍巍然盖君子求諸已而已其用其舍其得其失當自有任其責者於我何與焉孔子欲行王道東西南北七十説而無所遇孟子亦奔走齊梁所如不合道之不行豈孔孟之罪哉然萬世之下六經昭如七篇具在道頼以傳至今不泯説者謂夫子賢於堯舜孟子功不在禹下信哉言也漢興百有餘載敦尚儒術文學賢良皆誦法孔孟知所自好其議罷鹽鐡酒𣙜均輸憤切時政貫綜國體至能以韋布直詆公卿辯難侃侃無少假借不降其志不餒其氣雖古稱國士何以加焉當其時雖不見用卒乃頼桓氏采録為書遂至不朽後之儒者試取而讀之不以俗學自困則志意奮揚待問而發臨文不遜盡言不諱将以堯舜待其君伊周待其相孔孟待其身又何疑懼之有如其不遇則從吾所好簟瓢陋巷帶索鼓琴以詠先王之風不然或撰造一家之言建不朽之業寄知音於後世亦可矣詩云優哉㳺哉聊以卒嵗此之謂也盖古之人得志則澤加於民不得志修身見於世達則兼善天下窮則獨善其身囂囂如也何必枉道求合哉夫一言之間推見心術窺測至隠若是乎言之不可不慎也漢武帝時頗多䇿士後先奏對各異其説董生一言主正公孫氏一言主和至觀其終世行業亦以類判如其所言自此以降則文學賢良茂陵唐生九江祝生劉子雄魯萬生者聲稱孝昭之世跡其行事雖不少概見然深考其説立意較然不詭於道其為孔孟之徒也必矣往余嘗師事涇野吕公西𤣥馬公學儒者言朂余以立志養氣之説自孔孟求之毋曲學以阿世及指稱漢代作者此書為最其言治理並可施設儒者之能事畢在是也嗟乎哲人既逝雅訓猶存不敢廢墜謹為註釋因著其説如此若鹽鐡終始之詳余别有序姑蔵之山中以俟知者此不具載云嘉靖癸丑閏三月朔旦雲間張之象序
