  - {type: variant, offset: 8153, length: 364, content: 聲子曰古之治民者勸賞而畏刑賞以春夏刑以秋冬是以將賞為之加膳加膳則飫賜此以知其勸賞也将刑為之不舉不舉則徹樂此以知其畏刑也管子曰法者天地之位象四時之行以治天下四時之行有寒有暑聖人法之故有文有武天地之位有前有後有左有右聖人法之以建經紀春生於左秋殺於右夏長於前冬藏於後生長之事文也收藏之事武也是故文事在左武事在右聖人法之以行法令以治事理也司馬談曰夫陰陽四時八節十二度二十四節各有教令曰順之者昌逆之者不死則亡未必然也故曰使人拘而多畏夫春生夏長秋收冬藏此天道之大經也弗順則無以為天下綱紀故曰天下之大順不可失也魯恭曰夫陰陽之氣相扶而行發動用事各有時節若不當其時則物隨而傷應劭曰刑罰威獄以類天之震燿殺戮也温慈和惠以放天之生殖長育也是故春一木枯則為災秋一木華亦為異時則訓曰孟秋之月涼風至白露降寒蟬鳴鷹乃祭鳥用始行戮求不孝不弟戮暴傲悍而罰之以助損氣, SBCK: ''}
