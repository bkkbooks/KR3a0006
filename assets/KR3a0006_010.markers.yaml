  - {type: variant, offset: 780, length: 297, content: 刀劍而亡亦可謂盜武庫兵而殺之乎人主立法而民犯之亦可以為逆而輕主約乎深之可以死輕之可以免非法禁之意也法者緣人情而制非設罪以陷人也故春秋之治獄論心定罪志善而違於法者免志惡而合於法者誅今傷人未有所害志不甚惡而合於法者謂盜而傷人者耶將執法者過耶何於人心不厭也古者傷人有創者刑盜有贓者罰殺人者死今取人兵刃以傷人罪與殺人同得無非其至意與大夫俛仰未應對御史曰執法者國之轡銜刑罰者國之維楫也故轡銜不飭雖王良不能以致遠維楫不設雖良工不能以絕水韓子疾有國者不能明其法勢御其臣下富國強兵以制敵禦難惑於愚儒之文詞以疑賢士之謀舉浮淫之蠹加之功實之上而欲國之治猶釋階而欲登高無銜橛而禦捍馬也今刑法設備而民猶犯之況無法乎其亂, SBCK: 往}
