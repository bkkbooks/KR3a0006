  - {type: variant, offset: 8, length: 1, content: 撰, SBCK: 徭役􅀄雖勞苦卒􅀗其慶文學曰周累世積德天下莫不願以爲君故不勞而王恩施由近及遠而蠻貊自至秦任戰勝以并天下小海内而貪胡越之地使蒙恬擊胡取河􅀯以爲新秦而亡其故秦築長城以守胡而亡其所守往者兵革亟動師旅數起長城之北旋車遺鏃相望及李廣利等輕計還馬足莫不寒心雖得渾耶不能更所亡此非社稷之至計也伐功第四十五大夫曰齊􅁊公越燕伐山戎破􅀌竹殘令支趙武靈王踰句注過代谷略滅林胡樓煩燕襲走東胡辟地千里度遼東而攻朝鮮蒙公爲秦擊走匈奴􅀂鷙鳥之追羣雀匈奴􅀔惜不敢􅀯靣而望十餘年及其後蒙公死而諸侯叛秦中國擾亂匈奴紛紛乃敢復爲邉冦夫以小國燕趙尚猶却冦虜以廣地今以漢國之大士民之力非特齊􅁊之衆燕趙之師也然匈奴乆未服者羣臣不并力上下未諧故也文學曰古之用師非貪壤􅁟之利救民之患也民思之者旱之望雨簞食壼漿以逆王師故憂人之患者民一心而歸之湯武是也不愛民之死力盡而潰叛者秦王是也孟子曰君不鄕道不由仁義而爲之强戰雖克必亡此中國所以擾亂非蒙恬死而諸侯叛秦昔周室盛也越裳氏來獻百蠻致貢其後周衰諸侯力征蠻貊分散各有聚黨莫能相一是以燕趙能得意焉其後匈奴稍强􅁞食諸侯故破走月支氏因兵威徙小國引􅃓之民并爲一家一意同力故難制也前君爲先帝􅀞匈奴之䇿兵據西域奪之便勢之地以候其變以漢之强攻於匈奴之衆􅀂以强弩潰癰疽越之禽吳豈足道哉上以爲然用君之義聽君之計雖越王之任種蠡不過以捜粟都尉爲御史大夫持政十有餘年未見種蠡之功而見靡弊之効匈奴不爲加俛而百姓􅀺民以敝矣是君之䇿不能弱匈奴而反衰中國也善爲計者固􅀂此乎西域第四十六大夫曰徃者匈奴據河山之險擅田牧之利民富兵强行入爲冦則句注之内驚動而上郡以􅀯咸城文帝時虜入蕭關烽火通甘泉群臣懼不知所出乃請屯京師以備胡胡西役大宛康居之屬􅀯與群羗通先帝推讓斥奪廣饒之地建張掖以西隔絕羗胡􅀲分其援是以西域之國皆内拒匈奴斷其右臂曵劍而走故募人田畜以廣用長城以南濵塞之郡馬牛故縱蓄積布野未覩其計之所過也夫以弱越而遂意强吳才地計衆非鈞也主思臣謀其往必矣文學曰吳越迫於江海三川循環之處於五湖之間地相迫壤相次其勢易以相禽也金鼓未聞旌旗未舒行陣未定兵以接矣師無輜重之費士無乏絶之勞此所謂食於厨倉而戰於門郊者也今匈奴牧於無窮之澤東西􅀯北不可窮極雖輕車利馬不能得也况􅀒重羸兵以求之乎其勢不相及也茫茫乎􅀂行九臯未知所止皓皓乎􅀂無網羅而漁江海雖及之三軍罷弊適遺之餌也故}
