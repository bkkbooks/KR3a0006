  - {type: variant, offset: 8676, length: 269, content: 董仲舒曰王者欲有所為宜求其端於天天道之大者在隂陽陽為徳隂為刑刑主殺而徳主生是故陽常居大夏而以生育養長為事隂常居大冬而積於空虚不用之處以此見天之任徳不任刑也天使陽出布施於上而主嵗功使隂入伏於下而時出佐陽陽不得隂之助亦不能獨成嵗終陽以成嵗為名此天意也王者承天意以從事故任徳教而不任刑刑者不可任以治世猶隂之不可任以成嵗也為政而任刑不順於天故先王莫之肯為也丁儀曰天垂象聖人則之天之為嵗也先春而後秋君之為治也先禮而後刑春以生長為徳秋以殺戮為功禮以教訓為美刑以威嚴為用故先生而後殺天之為嵗先教而後罰君之為治也天不以久逺更其春冬而人也得以古今改其禮刑哉, SBCK: ''}
