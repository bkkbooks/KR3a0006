  - {type: variant, offset: 111, length: 189, content: 能無征伐而服不義不能無城壘而禦強暴也文學曰舜執干戚而有苗服文王底德而懷四夷詩云鎬京辟雍自西自東自南自北無思不服普天之下惟人面之倫莫不引領而歸其義故畫地為境人莫之犯子曰白刃可冒中庸不可入至德之謂也故善攻不待堅甲而克善守不待渠梁而固武王之伐殷也執黃鉞誓牧之野天下之士莫不願為之用既而偃兵搢笏而朝天下之民莫不願為之臣既以義取之以德守之秦以力取之以法守之本末不得故亡夫文猶可長用而武難久, WYG: ''}
