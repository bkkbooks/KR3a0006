  - {type: variant, offset: 4539, length: 3, content: 斧斤簡, SBCK: 憂顓􅁷有勾踐之變而爲强吳之所悔也文學曰地利不如人和武力不如文德周之致遠不以地利以人和也百世不奪非以險以德也吳有三江五湖之難而兼於越楚有汝淵滿室之固而滅於秦秦有隴阺崤塞而亡於諸侯晉有河華九河而奪於六卿齊有泰山巨海而􅀒於田常桀紂有天下兼於濟亳秦王以六合困於陳渉非地利不固無術以守之也釋邇憂遠猶吳不内定其國而西絕淮山與齊晉争强也越因其罷擊其虚使吳王}
