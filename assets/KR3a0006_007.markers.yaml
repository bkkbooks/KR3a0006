  - {type: variant, offset: 813, length: 5, content: 侯腹心干城, SBCK: 卿欲成}
  - {type: variant, offset: 813, length: 0, content: '', WYG: 職古今之通義也王符曰王者以四海為家兆民為子一夫不耕天下受其飢一婦不織天下受其寒一夫耕百人食之一婦桑百人衣之以一奉百孰能供之是故明主之養民憂之勞之教之誨之慎㣲防萌以㫁其邪故易美節以制度不傷財不害民七月之詩大小敎之終而復始由此觀之人固不可恣也今縣官多畜奴婢坐禀衣食私作産業為姦利力作不盡縣官失實百姓或無斗筲之儲官奴累百金黎民昏晨不釋事奴婢垂拱遨遊也垂拱言晏安無事垂衣拱手而已古者親近而疏逺貴所同而賤非類不賞無功不養無用今蠻貊無功縣官居肆廣屋大第坐禀衣食百姓或旦暮不澹古贍字蠻夷或厭酒肉黎民泮汗力作令蠻夷交脛肆踞古者庶人鹿菲草芰音技縮絲尚韋而已及其後則綦音其下不借鞔音漫鞮音低革舄今富者革中名工輕靡使容紈音丸裏紃音廵下越端縱縁中者鄧里間作蒯音快苴音蛆秦堅婢妾韋沓絲履走者茸音戎芰音技狗官古聖人勞躬養神節欲適情尊天敬地履徳行仁是以上天歆焉永其世而豐其年故堯秀眉髙彩享國百載修務解曰堯母慶都葢天帝之女寄伊長孺家年二十無夫出觀於河有赤龍負圖而至曰赤龍受天下之圖有人赤衣光面八彩鬢鬚長赤帝起成元寳奄然隂雲赤龍與慶都合而生堯帝如圖故眉有八彩之色及秦始皇覽怪迂信禨音幾祥使盧生求羡門高徐市等入海求不死之藥當此之時燕齊之士釋鋤耒爭言神仙方士於是趣咸陽者以千數言仙人食金飲珠然後夀與天地相保於是數音朔廵狩五嶽濵海之館以求神仙蓬莱之屬數音朔幸之郡縣富人以貲音兹佐貧者築道旁其後小者亡逃大者藏匿吏捕索掣音徹頓釋名曰掣制也制頓之使順已也不以道理名宫之旁廬舍丘落無生苗立樹百姓離心怨思者十有半半一作九封禪書曰自齊威宣之時騶子之徒論著終始五徳之運及秦帝而齊人奏之故始皇采用之而宋母忌正伯僑充尚羡門子高最後皆燕人為方僊道形解銷化依於鬼神之事騶衍以隂陽主運顯於諸}
