  - {type: variant, offset: 639, length: 0, content: '', WYG: 孔子初仕為中都宰制為養生送死之節長㓜異食彊弱異任男女别塗路無拾遺噐不彫偽為四寸之棺五寸之槨因丘陵為墳不封不樹行之一年而四方之諸侯則焉况乎位天下之本朝音潮而施聖主之徳音教澤乎今公卿處尊位執天下之要十有餘年功徳不施於天下而勤勞於百姓百姓貧陋困窮而私家累萬金此君子所耻而伐檀所刺也詩序曰伐檀刺貪也在位貪鄙無功而受禄君子不得進仕爾昔者商鞅相去聲秦後禮讓先貪鄙尚首功務進取魯仲連曰彼秦者棄禮義而尚首功之國也譙周曰秦用衛鞅計制爵二十等以戰獲首級者計而受爵是以秦人每戰勝老弱婦人皆死計功賞至萬數天下謂之尚首功之國皆以惡之也司馬貞曰秦法斬首多為上功謂斬一人首賜爵一級故謂秦為首功之國也無徳序於民而嚴刑罰於國俗日壊而民滋怨故惠王烹葅其身以謝天下當此之時亦不能論事矣今執政患儒貧賤而多言儒亦憂執事富貴而多患也大夫視文學悒悒而不言也悒悒不安也丞相去聲史曰夫音扶辯國家之政事論執政之得失何不徐徐道理相喻何至切切如此乎大夫難罷鹽鐡者非有利也憂國家之用邊境之費也諸生誾誾音銀爭去聲鹽鐡亦非為去聲已也欲反之於古而輔成仁義也二者各有所宗時世異務又安可堅任古術而非今之理也且夫音扶小雅非人必有以易之諸生莫有能安集國中懐臧之来逺方使邊境無冦虜之災租税盡為諸生除之何况鹽鐡均輸乎所以貴術儒者貴其處謙推讓以道盡人今辯訟愕愕音鄂然無赤賜之辭而見鄙倍之色非所聞也大夫言過而諸生亦如之諸生不直謝大夫耳}
