  - {type: variant, offset: 4456, length: 2, content: 阻險, WYG: 迹所至舟檝所通莫不為郡縣然縱耳目之欲窮侈靡之變不顧百姓之飢寒窮匱也興萬乗之駕而作阿房之宫發閭左之戍牧太半之賦百姓之隨逮肆刑挽輅首路死者一旦不知千萬之數天下敖然若焦熱傾然若苦烈上下不相寜吏民不相憀戍卒陳勝興於大澤攘臂􅃝右稱為大楚而天下響應}
