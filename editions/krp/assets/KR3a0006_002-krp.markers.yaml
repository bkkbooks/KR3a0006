  - {type: variant, offset: 11595, length: 770, content: 衞鞅傳曰秦孝公卒太子立公子䖍告商君欲反發吏捕商君商君亡至闗下欲舍客舍客人不知其是商君也曰商君之法舍人無驗者坐之商君喟然歎曰嗟乎為政之弊一至此哉去之魏魏人怨具欺公子卭而破魏師弗受商君欲之他國魏人曰商君秦之賊秦强而賊入弗歸不可遂内秦商君既復入秦走商邑與其徒屬發邑兵北出擊鄭秦發兵攻商君殺之於鄭黽池秦惠王車裂以狗曰莫如商鞅反者遂滅商君之家司馬遷曰商君其天資刻薄人也跡其所干孝公以帝王術扶持浮説非其資矣且所因由嬖臣及得用刑公子䖍欺魏將卬不師趙良之言亦足發明商君之少恩矣余嘗讀商君開塞耕戰書與其人行事相類卒受惡名於秦有以也夫劉歆曰秦孝公保崤函之固以廣雍州之地東幷河西北收上郡國富兵强長雄諸侯周室歸胙四方來賀為戰國霸君秦遂以强六世而幷諸侯亦皆商君之謀也夫商君極身無二慮盡公不顧私使民内急耕織之業以富國外重戰伐之賞以勸戎士法令必行内不阿貴寵外不偏疏逺是以令行而禁止法出而姦息故雖書云無偏無黨詩云周道如砥其直如矢司馬法之勵戎士周后稷之勸農業無以易此此所以并諸侯也故孫卿曰四世有勝非幸也數也然無信諸侯畏而不親夫霸君君齊桓晉文者桓不倍柯之盟文不負原之期而諸侯畏其强而親信之存亡繼絶四方歸之以管仲舅犯之謀也今商君倍公子卬之舊恩棄交魏之明信詐取三軍之衆故諸侯畏其强而不親信也藉使孝公遇齊桓晉文得諸侯之統將合諸侯之君驅天下之兵以伐秦秦則亡矣天下無桓文之君故秦得以兼諸侯衛鞅始自以為知霸王之徳原其事不諭也昔周召施善政及其死也後世思之蔽芾甘棠之詞是也嘗舍於樹下後世思其徳不忍伐其樹况害其身乎管氏奪伯氏邑三百户無怨言今衛鞅内刻刀鋸之刑外深鈇鉞之誅歩過六尺者有罰棄灰於道者被刑一日臨渭而論囚七百餘人渭水盡赤號哭之聲動於天地畜怨積讐比於丘山所逃莫之隐所歸莫之容身死車裂滅族無姓其去霸王之佐亦逺矣然惠王殺之亦非也可輔而用也使衛鞅施寛平之法加之以恩申之以信庶幾伯者之佐哉鹽鐡論卷二, SBCK: ''}
