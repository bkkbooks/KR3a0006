  - {type: variant, offset: 1660, length: 4, content: 春秋動眾, SBCK: 宫室奢侈林木之蠹也器械雕琢財用之蠹也衣服靡麗布帛之蠹也狗馬食人之食五榖之蠹也口腹從恣魚肉之蠹也用費不節府庫之蠹也漏積不禁田野之蠹也喪􅀕無度傷生之蠹也墮成變故傷功工商上通傷農故一杯棬用百人之力一屏風就萬人之功其爲害亦多矣目脩於五色耳營於五音體極輕薄口極􅅴脆功積於無用財盡於不急口腹不可爲多故國病聚不足即政怠人病聚不足}
