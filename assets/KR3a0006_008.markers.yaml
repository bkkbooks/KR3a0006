  - {type: variant, offset: 2373, length: 2, content: 文學, SBCK: 曰古者君子立仁修義以綏其民故邇者習善遠者順之是以孔子仕於魯前仕三月及齊平後仕三月及鄭平務以德安近而綏遠當此之時魯無敵國之難鄰境之患强臣變節而忠順故季􅁊隳其都城大國畏義而合好齊人來歸鄆讙龜隂之田故爲政而以德非獨辟害折衝也所欲不求而自得今百姓}
