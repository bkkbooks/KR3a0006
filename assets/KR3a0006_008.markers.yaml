  - {type: variant, offset: 14, length: 2, content: 漢興, SBCK: 然爲醫}
  - {type: variant, offset: 14, length: 0, content: '', WYG: 然為醫以拙矣又多求謝為吏既多不良矣又侵漁百姓顔師古曰侵漁言侵奪百姓若漁者之取魚也長吏厲諸小吏厲病也小吏厲諸百姓故不患擇之不熟而患求之與得異也不患其不足也患其貪而無厭也賢良曰古之制爵禄也卿大夫足以潤賢厚士足以優身及黨庻人為官者足以代其耕而食其禄管子曰爵不尊禄不重者不與圖難犯危以其道為未可以求之也是故先王制軒冕足以著貴賤不求其美設爵禄足以守其服不求其親使君子食於道小人食於力今小吏禄薄郡國繇音遥役逺至三輔粟米貴不足相澹古聸字常居則匱於衣食有故則賣畜粥業非徒是也繇吏相遣官庭攝追小計權吏行施乞貸長吏侵漁上府下求之縣縣求之鄉鄉安取之哉荀悦曰先王之制禄也下足以代耕上足以充祀故食禄之家不與下民爭利所以厲其公義塞其私心其或犯逾之者則繩以政法是以君子慕義小人無怨若位苟禄薄外而不充憂匱是䘏所求不贍則私利之制萌矣放而聼之則貪利之心濫矣以法繩之則下情怨矣故位必稱徳禄必稱爵故一物而不稱亂之道也今}
