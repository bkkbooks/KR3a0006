  - {type: variant, offset: 811, length: 0, content: '', krp: 晨昏孜孜思其力故君子不素飡小人不空食世俗飾偽行詐為去聲民巫祝以取釐謝堅頟音額徤舌或以成業致富故憚事之人釋夲相學是以街巷有巫閭里有祝古者無杠樠音䐽之寢牀栘音移之案及其後世庶人即采木之杠葉華之樠士不斤成大夫葦莞而已今富者黼繡幃幄塗屏錯跗音夫中者錦綈音提高張采畫音壊丹漆古者皮毛草蓐無茵席之加旃音氊蒻音弱之美及其後大夫士復薦草縁蒲平單莞庶人即草蓐索經單藺音吝蘧音瞿蒢音除而已今富者繡茵翟柔蒲子露林中者􅱽皮代旃音氊闒音逹坐平莞古者不粥絍不市食及其後則有屠沽沽酒市脯魚鹽而已今熟食徧列殽施成市作業墮怠食必趣時楊豚韭卵狗䐲音摺馬朘音唆煎魚切肝羊淹雞寒蜩馬駱日蹇音簡捕庸脯胹音而羔豆賜􅑹音谷膹音憤鴈羮自鮑丼瓠熱梁和炙古者土皷凷音塊枹音浮擊木拊音府石以盡其歡明堂篇曰土鼔蕢桴葦籥伊耆氏之樂也齊俗訓曰古者}
  - {type: variant, offset: 812, length: 0, content: '', SBCK: 儒無成事}
  - {type: variant, offset: 812, length: 0, content: '', WYG: 不能陳鐘鼓盛筦簫揚干戚奮羽旄以為費財亂政制樂足以合歡宣意而已喜不羡於音也及其後卿大夫有管磬士有琴瑟往者民間酒會各以黨俗彈筝鼓缶浮去聲而已無要玅之音變羽之轉今富者鐘鼓五樂歌兒數曹中者鳴竽調瑟鄭儛趙謳古者瓦棺容尸木板堲音即周足以收形骸藏髮齒而已國子高曰𦵏也者藏也藏也者欲人之弗得見也是故衣足以飾身棺周於衣椁周於棺土周於椁反壤樹之哉齊俗訓曰古者非不能竭國靡民虚府殫財舍珠鱗施綸組節以為窮民絶業而無益於槁骨腐肉也故𦵏薶足以收歛葢藏而已昔舜𦵏蒼梧之野商不變其肆禹葬㑹稽之山農不易其畆明乎死生之分通乎侈儉之適者也及其後桐棺不衣采棺不斵音卓今富者繡墻題湊音腠題湊棺木内向也中者梓棺楩椁貧者畫荒衣袍繒囊緹音提槖古者明器有形無實示民不用也檀弓曰孔子曰之死而致死之不仁而不可為也之死而致生之不知而不可為也是故竹不成用瓦不成味木不成斵琴瑟張而不平竽笙備而不和有鐘磬而無簨簴其曰明器神明之也仲憲言於曾子曰夏后氏用明器示民無知也殷人用祭器示民有知也周人兼用之示民疑也曾子曰其不然乎其不然乎夫明器鬼器也祭器人器也夫古之人胡為而死其親乎孔子謂明器者知䘮道矣備物而不可用也哀哉死者而用生者之器也不殆於物殉乎哉其曰明器神明之也塗車芻靈自古有之明器之道也孔子謂為芻靈者善謂為俑者不仁不殆於用人乎哉及其後則有醯音希醢音海之藏桐馬偶人彌祭其物不備今厚資多藏器用如生人郡國繇音遙吏素桑楺柔上聲偶車櫓輪匹夫無貎領桐人衣去聲紈音丸綈音提古者不封不樹反虞祭於寢無檀宇之居廟堂之位易曰占之葬者厚衣之以薪𦵏之中野不封不樹䘮期無數及其後則封之庶人之墳半仞其高可隐今富者積土成山列樹成林臺榭連閣集觀去聲增樓中者祠堂屏閣垣闕罘音浮罳音思顔師古曰罘罳謂連闕曲閣也以覆重刻垣墉之處其形罘罳然也劉熈曰罘復也罳思也言臣將請事於此復思也蘇鶚曰按罘罳从四是形不思是聲罘浮也罳絲也謂織絲之文輕疎浮虚之貌葢宫殿簷户之間也古者鄰有䘮舂不相杵巷不歌謡曲禮曰適墓不登壟助葬必執紼臨䘮不笑揖人必違其位望柩不歌入臨不翔當食不歎鄰有䘮舂不相里有殯不巷歌適墓不歌哭日不歌送䘮不由徑送𦵏不辟塗潦臨䘮則必有哀色執紼不笑臨樂不歎孔子食於有䘮者之側未嘗飽也子於是日哭則不歌今俗因人之䘮以求酒肉幸與小坐而責辦歌舞俳音排優連笑伎音至戯古者男女之際尚矣嫁娶之服未之以記及虞夏之後蓋表布内絲骨笄音記象珥音二封君夫人加錦尚褧而已今富者皮衣朱貉繁露環珮中者長裾交禕音揮璧端簮珥音二古者事生盡愛送死盡哀故聖人為制節非虚加之檀弓曰子游問䘮具夫子曰稱家之有亡子游曰有亡烏乎齊夫子曰有母過禮茍亡矣歛首足形還𦵏懸棺而封人豈有非之者哉今生不能致其愛敬死以奢侈相髙雖無哀戚之心而厚𦵏重幣者則稱以為孝顯名立於世光榮著於俗故黎民相慕效至於廢屋賣業古者夫婦之好一男一女而成家室之道及後士一妾大夫二諸侯有姪娣九女而已今諸侯百數卿大夫十數中者侍御富者盈室是以女或曠怨失時男或放死無匹古者凶年不備豐年補敗仍舊貫而不改作今工異變而吏殊心壊敗成功以匿厥意意極乎功業務存乎面目積功以市譽不恤民之急田野不辟而飾亭落邑居丘墟而髙其郭古者不以人力徇於禽獸不奪民財以養狗馬是以財衍而力有餘今猛獸竒蟲不可以耕耘而令當耕耘者養食之百姓或短褐不完而犬馬衣去聲文繡黎民或糠糟不接而禽獸食肉雜事篇曰昔者燕相得罪於君將出亡召門下諸大夫曰有能從我出者乎三問諸大夫莫對燕相曰嘻亦有士之不足養也大夫有進者曰亦有君之不能養士安有士之不足養者凶年飢嵗士糟粕不厭而君之犬馬有餘榖粟隆冬烈寒士短褐不完四體不蔽而君之臺觀帷㡘錦繡隨風飄飄而弊財者君之所輕死者士之所重也君不能施君之所輕而求得士之所重不亦難乎燕相遂慙遁逃不復敢見古者人君敬事愛下使民以時天子以天下為家臣妾各以其時共音供}
