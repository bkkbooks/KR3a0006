  - {type: variant, offset: 372, length: 0, content: '', WYG: 字榖梁傳曰善為國者不師善師者不陳善陳者不戰善戰者不死善死者不亡班固曰齊之技擊不可以遇魏之武卒魏之武卒不可以直秦之鋭士秦之鋭士不可以當桓文之節制桓文之節制不可以敵湯武之仁義故曰善師者不陳善陳者不戰善戰者不敗善敗者不亡若夫舜修百僚咎繇作士命以蠻夷猾夏冦賊姦軌而刑無所用所謂善師不陳者也湯武征伐陳師誓衆而放禽桀紂所謂善陳不戰者也齊桓南服强楚使貢周室北伐山戎為燕開路存亡繼絶功為伯首所謂善戰不敗者也楚昭王遭闔廬之禍國滅出亡父老送之王曰父老反矣何患無君父老曰有君如是其賢也相與從之或奔走赴秦號哭請救秦人憐之為之出兵昭王返國所謂善敗不亡者也}
