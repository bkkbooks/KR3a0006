  - {type: variant, offset: 5, length: 1, content: 刑, SBCK: 三誅秦第四十四伐功第四十五西域第四十六世務第四十七和親第四十八結和第四十三大夫曰漢興以來修好結和親所聘遺單于者甚厚然不紀重質厚賂之故改節而􅁀害滋甚先帝覩其可以武折而不可以}
  - {type: variant, offset: 5, length: 2, content: 刑德, WYG: 漢桓寛撰明張之象註和親}
  - {type: variant, offset: 5, length: 2, content: 刑德, krp: 漢桓寛撰明張之象註和親}
  - {type: variant, offset: 7, length: 0, content: '', SBCK: 懷故廣將帥招􅁬擊以誅􅍏罪功勲粲然著於海内藏於記府何命亡十􅀗一乎夫偷安者後危慮近者憂邇賢者離俗智士權行君子所慮衆庻疑焉故民可以觀成不可與圖始此有司所獨見而文學所不覩文學曰往者匈奴結和親諸夷納貢即君臣外内相信無胡越之患當此之時上求寡而易贍民安樂而無事耕田而食桑麻而衣家有數年之稸縣官餘貨財閭里耆老或及其澤自是之後退文任武苦師勞衆以略無用之地立郡沙石之間民不能自守發屯乗城輓輦而贍之愚竊見其亡不覩其成大夫曰匈奴以虚名市於漢而實不從數爲蠻貊所紿不痛之何故也高皇帝仗劍定九州今以九州而不行於匈奴閭里常民尚有梟散况萬里之主與小國之匈奴乎夫以天下之力勤何不權以天下之士民何不服今有帝名而威不信長城反賂遺而尚踞敖此五帝所不􅃘三王所畢怒也文學曰湯事夏而卒服之周事殷而卒滅之故以大御小者王以强凌弱者亡聖人不困其衆以兼國良御不困其馬以兼道故造父之御不失和聖人之治不倍德秦攝利衡以御宇内執修箠以笞八極驂服以罷而鞭䇿愈加故有傾衡遺箠之變士民非不衆力勤非不多也皆内倍外附而莫爲用此高皇帝所以仗劍而取天下也夫兩主好合内外交通天下安寜世世無患士民何事三王何愁焉大夫曰伯翳之始封秦地爲七十里穆公開霸孝公廣業自卑至上自小至大故先祖基之子孫成之軒轅戰涿鹿殺兩曎蚩尤而爲帝湯武伐夏商誅桀紂而爲王黃帝以戰成功湯武以伐成孝故手足之勤腹腸之養也當世之務後世之利也今四夷内侵不攘萬世必有此長患先帝興義兵以誅􅁀强東滅朝鮮西定冉駹􅀯擒百越北挫强胡李牧追匈奴以廣北州湯武之舉蚩尤之兵也故聖主斥地非私其利用兵非徒􅁬怒也所以匡難辟害以爲􅀺民遠慮文學曰秦􅀯禽勁越北却强胡竭中國以役四夷人罷極而主不恤國内潰而上不知是以一夫倡而天下和兵破陳渉地奪諸侯何嗣之所利詩云雍雍鳴旭日始旦登得前利不念後咎故吳王知伐齊之便而不知干遂之患秦知進取之利而不知鴻門之難是以知一而不知十也周謹小而得大秦欲大而亡小語曰前車覆後車戒殷􅁥不遠在夏后之世矣誅秦}
