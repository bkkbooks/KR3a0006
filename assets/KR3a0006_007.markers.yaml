  - {type: variant, offset: 1325, length: 2, content: 匈奴, SBCK: 窮巷多曲辯而寡見者難喻文學守死渣滓}
  - {type: variant, offset: 1328, length: 2, content: 地廣, SBCK: 語而終不移夫往古之事昔有之語巳可覩矣今以近世觀之自以目有所見耳有所聞世殊而事異文景之際建元之始民朴而歸本吏廉而自重殷殷屯屯人􅄛而家富今政非改而敎非易也何世之彌薄而俗之滋衰也吏即少廉民即寡耻刑非誅惡而姦猶不止世人有言鄙儒不如都士文學皆岀山東希渉}
