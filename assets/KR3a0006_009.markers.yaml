  - {type: variant, offset: 1969, length: 1, content: 聞, WYG: 諸戎各分散谿谷自有君長往往而聚者百有餘戎然莫能相一其後千有餘嵗至冐頓而匈奴最强大盡服從北夷而南與諸夏為敵國今匈奴蠶食内侵逺者不離去聲其苦獨邊境䝉其敗詩云憂心慘慘念國之為虐不征備則暴害不息故先帝興義兵以征厥罪遂破祁連天山散其聚黨北略至龍城大圍匈奴單音蟬于失魂僅以身免乗奔逐北斬首捕虜十餘萬控弦之民旃音氊裘之長音掌莫不沮膽挫折逺遁遂乃振旅渾古本作昆耶古本作邪率其衆以降置五屬國以距胡則長城之内河山之外罕被冦􅫱音菑於是下詔令减音檢戍音絮漕寛繇音遥役初雖勞苦卒獲其慶匈奴傳曰匈奴右賢王怨漢奪之河南地而築朔方數冦盗邊及入河南侵擾朔方殺畧吏民甚衆元狩二年春漢使大將軍衞青將六將軍十餘萬人出朔方髙闕右賢王以為漢兵不能至飲酒醉漢兵出塞六七百里夜圍右賢王右賢王大驚脱身逃走精騎往往隨後去漢將軍}
