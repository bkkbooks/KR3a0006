  - {type: variant, offset: 1, length: 1, content: 鐵, SBCK: 吳王擅鄣海澤鄧通專西山山東姧猾咸聚吳國秦雍漢蜀因鄧氏吳鄧錢布天下故有鑄錢之禁禁禦之法立而姧僞息姧僞息則民不期於妄得而各務其職不反本何爲故統一則民不二也幣由上則下不疑也文學曰往古幣衆財通而民樂其後稍去舊幣更行白金龜龍民多巧新幣幣數易而民益疑於是廢天下諸錢而專命水衝二官作吏近侵利或不中式故有薄厚輕重農人不習物􅀋比之信故疑新不知姦真商賈以美貿惡以半易倍買則失實賣則失理其疑或滋益甚夫鑄僞金錢以有法而錢之善惡無增損於政擇錢則物稽滯而用人尤被其苦春秋曰算不及蠻夷則不行故王者外不鄣海澤以便民用内不禁刀幣以通民施禁耕第五大夫曰家人有寶器尚凾匣而藏之况人主之山海乎夫權利之處必在深山窮澤之中非豪民不能通其利異時鹽鐡未籠布衣有朐邴朐邴人吳王皆鹽鐡初議也君有吳王專山澤之饒薄賦其民賑贍窮小以成私威私威積而逆節之心作夫不蚤絶其源而憂其末􅀂決吕梁沛然其所傷必多矣太公曰一家害百家百家害諸侯諸侯害天下王法禁之今放民於權利罷鹽鐡以資􅁀彊遂其貪心衆邪羣聚私門成黨則强禦日以不制而并兼之徒姦形成也文學曰民人藏於家諸侯藏於國天子藏於海内故民人以垣墻爲藏閉天子以四海爲匣匱天子適諸侯升自阼階諸侯納管鍵執䇿而聽命示莫爲主也是以王者不畜聚下藏於民遠浮利務民之義義禮立則民化上若是雖湯武生存於世無所容其慮工商之事歐冶之任何姦之能成三栢專魯六卿分晉不以鹽鐡故權利深者不在山海在朝廷一家害百家在蕭墻而不在朐邴也大夫曰山海有禁而民不傾貴賤有平而民不疑縣官設衡立凖人從所欲雖使五尺童子適市莫之能欺今罷去之則豪民擅其用而專其利決市閭巷高下在口吻貴賤無常端坐而民豪是以養强抑弱而藏於跖也疆養弱抑則齊民消若衆穢之盛而害五榖一家害百家不在朐邴如何也文學曰山海者財用之寳也鐡器者農夫之死生也死生用則仇讐滅仇讐滅則田野闢田野闢而五榖熟寳路開則百姓贍而民用給民用給則國富國富而敎之以禮則行道有讓而工商不相豫人懷敦樸以自相接而莫相利夫秦楚燕齊士力不同剛柔異􅀔巨小之用居局之宜黨殊俗易各有所便縣官籠而一之則鐡器失其宜而農民失其便器用不便則農夫罷於壄而草萊不辟草萊不辟則民困乏故鹽冶之處大傲皆依山川近鐡炭其􅀔咸遠而作劇郡中卒踐更者多不勘責取庸代縣邑或以戸口賦鐡而賤平其凖良家以道次發僦運鹽鐡煩費邑或以戸百姓病苦之愚竊見一官之傷千里未覩其在朐邴也復古第六大夫曰故扇水都尉彭祖寜歸言鹽鐡令品令品甚明卒徒衣食縣官作鑄鐡器給用甚衆無妨於民而吏或不良禁令不行故民煩苦之今意總一鹽錢非獨爲利入也將以建本抑末離朋黨禁淫侈絶并兼之路也古者名山大澤不以封爲下之專利也山海之利廣澤之畜天下之藏也皆宜屬少府陛下不私以屬大司農以佐助百姓浮食豪民好欲擅山海之貨以致富業役利細民故沮事議者衆鐡器兵刃天下之大用也非衆庻所宜事也往者豪强大家得管山海之利采鐡石鼔鑄煑鹽一家聚衆或至千餘人大抵盡收放流人民也遠去鄕里棄墳墓依􅀝大家聚深山窮澤之中成姦僞之業遂朋黨之權其輕爲非亦大矣今自廣進賢之途練擇守尉不待去鹽鐡而安民也文學曰扇水都尉所言當時之利權一切之術也不可以乆行而傳世此非明王所以君國子民之道也詩云哀哉爲猶匪先民是程匪大猶是經雜邇言是聽此詩人刺不通於王道而善爲權利者孝武皇帝攘九夷平百越師旅數起糧食不足故立田官置錢入榖射官救急贍不給今陛下繼大功之勤養勞勌之民此用麋鬻之時公卿冝思所以安集百姓致利除害輔明主以仁義修潤洪業之道明主卽位以來六年于兹公卿無請減除不急之官省罷機利之人人權縣太乆民良望於上陛下宣聖德昭明光令郡國賢良文學之士乗傳詣公車議五帝三王之道六藝之風􅁽陳安危利害之分指意粲然今公卿辯議未有所定此所謂守小節而遺大體抱小利而忘大利者也大夫曰宇宙之内鷰雀不知天地之高也坎井之鼃不知江海之大窮夫否婦不知國家之慮􅀒荷之商不知猗頓之富先帝計外國之利料胡越之兵兵敵弱而易制用力少而功大故因􅀔變以主四夷地濱山海以屬長城北略河外開路匈奴之鄕功未卒善文王受命伐崇作邑于豐武王繼之載尸以行破商擒紂遂成王業曹沫棄三北之耻而復侵地管仲􅀒當世之累而立霸功故志大者遺小用權者離俗有司思師望之計遂先帝之業志在絕胡貉擒單于故未遑扣扄之義而録拘儒之論文學曰鷰雀離巢宇而有鷹隼之憂坎井之鼃離其居而有蛇䑕之患况翺翔千仞而㳺四海乎其禍必大矣此李斯之所以折翼而趙高没淵也聞文武受命伐不義以安諸侯大夫未聞弊諸夏以役夷狄也昔秦常舉天下之力以事胡越竭天下之財以奉其用然衆不能畢而以百萬之師爲一夫之任此天下共聞也且數戰則民勞乆師則兵弊此百姓所疾苦而拘儒之所憂也鹽鐡}
