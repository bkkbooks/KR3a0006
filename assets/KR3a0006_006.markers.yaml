  - {type: variant, offset: 219, length: 0, content: '', WYG: 足者也大為之坊民猶踰之故君子禮以坊徳刑以坊滛命以坊欲傳曰在天者莫明乎日月在地者莫明乎水火在人者莫明乎禮義故日月不髙則所照不逺水火不積則光炎不博禮義不加乎國家則功名不白詩曰人而無禮胡不遄死孔子曰禮與其奢也寧儉䘮與其易也寧戚故禮之所為作非以害生傷業也威儀節文非以亂化傷俗也治國謹其禮危國謹其法賈生曰凡人之智}
  - {type: variant, offset: 219, length: 0, content: '', krp: 足者也大為之坊民猶踰之故君子禮以坊徳刑以坊滛命以坊欲傳曰在天者莫明乎日月在地者莫明乎水火在人者莫明乎禮義故日月不髙則所照不逺水火不積則光炎不博禮義不加乎國家則功名不白詩曰人而無禮胡不遄死孔子曰禮與其奢也寧儉䘮與其易也寧戚故禮之所為作非以害生傷業也威儀節文非以亂化傷俗也治國謹其禮危國謹其法賈生曰凡人之智}
