  - {type: variant, offset: 4129, length: 0, content: '', SBCK: 􅃪從而無所不至也今子不聽正義以輔卿相又從而順之好須􅁷之說不計其後若子之爲人吏宜受上戮子姑默矣丞相史曰盖聞士之居世也衣服足以勝身食飲足以供親内足以相䘏外不求於人故身修然後可以理家家治然後可以治官故飯䓸糲者不可以言孝妻子饑寒者不可以言慈緒業不備者不可以言理居斯世行斯身而有此三累者斯亦足以默矣孝養第二十五文學曰善養者不必芻豢也善供服者不必錦繡也以己之所有盡事其親孝之至也故匹夫勤勞猶足以順禮歠菽飮水足以致其敬孔子曰今之孝者是爲能養不敬何以别乎故上孝養志其次養色其次養體貴禮不貪其養禮順心和養雖不備可也易曰東鄰殺牛不知西鄰之禴􅀕也故富貴而無禮不如貧賤之孝悌閨門之内盡孝焉閨門之外盡悌焉朋友之道盡信焉三者孝之至也居家理者非謂積財也事親孝者非謂鮮肴也亦和顔色承意盡禮義而巳矣丞相史曰八十曰耋七十曰耄耄食非肉不飽衣非帛不暖故孝子曰甘毳以養口輕暖以養體曾子養曾晳必有酒肉無端絻雖公西赤不能以養爲容無肴膳雖閔曽不能以養卒禮無虚加故必有其實然後爲之父子與其禮有餘而養}
