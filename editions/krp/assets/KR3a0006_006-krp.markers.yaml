  - {type: variant, offset: 8199, length: 429, content: 韓非子曰葉公子髙問政於仲尼仲尼曰政在恱近而来逺魯哀公問政於仲尼仲尼曰政在選賢齊景公問政於仲尼仲尼曰政在節財三公出子貢問曰三公問夫子政一也夫子對之不同何也仲尼曰葉都大而國小民有背心故曰政在恱近而来逺魯哀公有大臣三人外障距諸侯四鄰之士内比周而以愚其君使宗廟不掃除社稷不血食者必是三臣也故曰政在選賢齊景公築雍門為路寢一朝而以三百乗之家賜者三故曰政在節財漢武帝曰五帝不相復禮三代不同法所繇殊路而建徳一也葢孔子對定公以來逺哀公以論臣景公以節用非期不同所急異務也臣瓉曰論語及韓子皆言葉公問政於孔子孔子答以恱近来逺今云定公與二書異晏嬰傳曰晏平仲嬰者莱之夷維人也事齊靈公莊公景公以節儉力行重於齊既相齊食不重肉妾不衣帛其在朝君語及之即危言語不及之即危行國有道即順命無道即衡命以此三世顕名于諸侯晏子春秋曰梁丘據問晏子曰子事三君君不同心子俱従焉仁人固多心乎對曰一心可以事百君百心不可以事一君王恢曰五帝不相同樂三王不相襲禮者非故相反也各因世之宜也教與時變備與敵化守一而不易不足以子民, SBCK: ''}
