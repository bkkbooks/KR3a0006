  front:
  - {type: variant, offset: 0, length: 0, content: '', SBCK: 錯幣第四大夫曰交幣通施民事不及物有所并也計本量委民有饑者榖有所藏也智者有百人之功愚者不更本之事人君不調民有相妨之富也此其所以或儲百年之餘或不厭糟糠也民大富則不可以禄使也大疆則不可以威罰也非散聚均利者不齊故人主積其食守其用制其有餘調其不足禁溢羨厄利塗然後百姓可家給人足也文學曰古者貴德而賤利重義而輕財三王之時迭盛迭衰衰則扶之傾則定之是以夏忠殷敬周文庠序之敎恭讓之禮粲然可得而觀也及其後禮義弛崩風俗㓕息故自食禄之君子違於義而競於財大小相吞激轉相傾此所以或儲百年之餘或無以充虚蔽形也古之仕者不穡田者不漁抱關擊柝皆有常秩不得兼利盡物如此則愚智同功不相傾也詩云彼有遺秉此有滯穗伊寡婦之利言不盡物也大夫曰湯文繼衰漢興乗弊一質一文非苟易常也俗弊家法非務變古也亦所以救失扶衰也故敎與俗改弊與世易夏后以玄貝周人以紫石後世或金錢刀布物極而衰終始之運也故山澤無征則君臣同利刀幣無禁則姦貞並行夫臣冨相侈下專利則相傾也文學曰古者市朝而無刀幣各以其所有易無抱布貿絲而巳後世即有龜貝金錢交施之也幣數變而民滋僞夫救僞以質防失以禮湯文􅁇衰革法易化而殷周道興漢初乗弊而不改易畜利變幣欲以反本是猶以煎止燔以火止沸也上好禮則民闇飾上好貨則下死利也大夫曰文帝之時縱民得鑄錢冶鐡煑}
