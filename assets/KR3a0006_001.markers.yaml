  - {type: variant, offset: 1609, length: 0, content: '', WYG: 韓嬰曰王者之等賦正事田野什一關市譏而不征山林澤梁以時入而不禁相地而正壤理道而致貢萬物羣來無有流滯以相通移近者不隐其能逺者不疾其勞雖幽閒僻陋之國莫不趨使而安樂之夫是之謂王者之等賦正事詩曰敷政優優百禄是遒}
