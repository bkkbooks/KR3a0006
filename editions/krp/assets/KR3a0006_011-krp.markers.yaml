  - {type: variant, offset: 9856, length: 398, content: 刑法志曰孝武即位外事四夷之功内盛耳目之好徴發煩數百姓貧耗窮民犯法酷吏擊斷姦軌不勝於是招進張湯趙禹之屬條定法令作見知故縱監臨部主之法緩深故之罪急縱出之誅其後姦軌巧法轉相比况禁罔寖密律令凡三百五十九章大辟四百九條千八百八十二事死罪决事比萬三千四百七十二事文書盈於几閣典者不能徧睹是以郡國承用者駮或罪同而論異姦吏因縁為市所欲活則傅生議所欲陷則予死比議者咸寃傷之漢元帝曰夫法令者所以抑暴扶弱欲其難犯而易避也今律令煩多而不約自典文者不能分明而欲羅元元之不逮斯豈刑中之意哉漢成帝曰甫刑云五刑之屬三千大辟之罰其屬二百今大辟之刑千有餘條律令煩多百有餘萬言竒請他比日以益滋自明習者不知所由欲以曉喻衆庻不亦難乎於以羅元元之民夭絶亡辜豈不哀哉泰族訓曰不言而信不施而仁不怒而威是以天心動化者也施而仁言而信怒而威是以精誠感之者也施而不仁言而不信怒而不威是以外貌為之者也故有道以統之法雖少足以化矣無道以行之法雖衆足以亂矣詩云, SBCK: ''}
