  - {type: variant, offset: 10018, length: 359, content: 立節篇曰曾子衣弊衣以耕魯君使人往致邑焉曰請以此修衣曽子不受往復反又不受使者曰先生非求於人人則獻之奚為不受曾子曰臣聞之受人者畏人予人者驕人縱子有賜不我驕也我能勿畏乎終不受孔子曰參之言足以全其節也孟子曰曾子曰晉楚之富不可及也彼以其富我以其仁彼以其爵我以其義吾何歉乎哉仲尼弟子傳曰閔損字子騫不仕大夫不食汙君之禄季氏使閔子騫為費宰子騫曰善為我辭焉如有復我者則吾必在汶上矣伯夷傳曰伯夷叔齊孤竹君之二子也父欲立叔齊及父卒叔齊讓伯夷伯夷曰父命也遂逃去叔齊亦不肯立而逃之國人立其中子論語曰伯夷叔齊餓于首陽之下民到于今稱之齊景公有馬千駟民無得而稱焉詩曰誠不以富亦祇以異其此之異與繆稱訓曰伯夷餓死首山之下猶不自悔棄其所賤得其所貴也說山訓曰琬琰之玉在洿泥之中雖廉者弗釋弊箄甑瓾在袇茵之上雖貪者不摶美之所在雖汙辱世不能賤惡之所在雖髙隆世不能貴, SBCK: ''}
