  - {type: variant, offset: 4398, length: 10, content: 用隱括斧斤欲撓曲直枉, WYG: 解宋城中急無食華元乃夜私見楚將子反子反告莊王王問城中何如曰析骸而炊易子而食莊王曰誠哉言我軍亦有七日糧以信故遂罷兵去公羊傳曰秦伯將襲鄭百里子與蹇叔子諫曰千里而襲人未有不亡者也秦伯怒曰若爾之年者宰上之木拱矣爾曷知師出百里子與蹇叔子送其子而戒之曰爾即死必於殽之嶔巖是文王之所辟風雨者也吾將尸爾焉子揖師而行百里子與蹇叔子從其子而哭之秦伯怒曰爾曷為哭吾師對曰臣非敢哭君師哭臣之子也弦髙者鄭商也遇之殽矯以鄭伯之命而犒師焉或曰往矣或曰反矣然而晉人與姜戎要之殽而撃之匹馬隻輪無反者}
