  - {type: variant, offset: 11301, length: 300, content: 賈生曰凡人之智能見已然不能見将然夫禮者禁於将然之前而法者禁於已然之後是故法之所用易見而禮之所為至難知也若夫慶賞以勸善刑罰以懲惡先王執此之政堅如金石行此之令信如四時據此之公無私如天地耳豈顧不用哉然而曰禮云禮云者貴絶惡扵未萌而起教扵㣲𦕈使民日遷善逺辠而不自知也孔子曰聼訟吾猶人也必也使毋訟乎為人主計者莫如先審取舍取舍之極定於内而安危之萌應於外矣安者非一日而安也危者非一日而危也皆積漸然不可不察也人主之所積在其取舍以禮義治之者積禮義以刑罰治之者積刑罰刑罰積而民怨背禮義積而民和親故世主欲民之善同而所以使民善者或異或道之以徳教或敺之以法令道之以徳教者徳教洽而民氣樂敺之以法令者法令極而民風哀哀樂之感禍福之應也, SBCK: ''}
