  - {type: variant, offset: 47, length: 291, content: 汜論曰徐偃王被服慈惠身行仁義陸地之朝者三十二國然而身死國亡子孫無類指武篇曰王孫厲謂楚文王曰徐偃王好行仁義之道漢東諸侯三十二國盡服矣王若不伐楚必事徐王曰若信有道不可伐也對曰大之伐小强之伐弱猶大魚之吞小魚也若虎之食豚也惡有其不得理文王遂興師伐徐殘之徐偃王將死曰吾頼於文徳而不明武備好行仁義之道而不知詐人之心以至於此夫古之王者其有備乎人間訓曰昔徐偃王好行仁義陸地之朝者三十二國王孫厲謂楚莊王曰王不伐徐必反朝徐王曰偃王有道之君也好行仁義不可伐王孫厲曰臣聞之大之與小强之與弱也猶石之投卵虎之啗豚又何疑焉且聞為文而不能達其徳為武而不能任其力亂莫大焉楚王曰善乃舉兵而伐徐遂滅之知仁義而不知世變者也, SBCK: ''}
