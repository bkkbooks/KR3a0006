body:
  text: 鹽鐡論卷七漢桓寛撰明張之象註刺議第二十六丞相去聲史曰山林不讓椒桂以成其崇君子不辭負薪之言以廣其名故多見者博多聞者知去聲距諫者塞專已者孤故謀及下者無失䇿舉及衆者無頓功頓壊也權謀篇曰聖王之舉事必先諦之於謀慮而後考之於蓍龜白屋之士皆關其謀芻蕘之役咸盡其心故萬舉而無遺籌失策傳曰衆人之智可以測天兼聼獨斷惟在一人此大謀之術也謀有二端上謀知命其次知事知命者預見存亡禍福之原早知盛衰廢興之始防事之未萌避難於無形若此人者居亂世則不害於其身在乎太平之世則必得統下之權彼知事者亦尚矣見事而知得失成敗之分而究其所終極故無敗業廢功東野鄙人曰泰山不讓礫石江海不辭小流所以成其大也詩曰先民有言詢于芻蕘博謀也秦王子嬰曰輕慮者不可以治國獨智者不可以存君詩云詢于芻蕘故布衣皆得風去聲議何况公卿之史乎春秋士不載文而書咺暄上聲者以為宰士也春秋曰天王使宰咺來歸惠公仲子之賵公羊傳曰宰者何官也咺者何名也曷為以官氏宰士也孔子曰雖不吾以吾其與去聲聞諸侯僕雖不敏亦當傾耳下風攝齊音咨勾指受業徑於君子之塗矣使文學言之而是僕之言有何害使文學言之而非雖㣲丞相去聲史孰不非也文學曰以正輔人謂之忠以邪導人謂之佞令尹子西曰為人臣而忠其君者爵禄不足以賞也為人臣而諛其君者刑罰不足以誅也夫音扶怫音勃過納善者君之忠臣大夫之直士也孔子曰大夫有爭去聲臣三人雖無道不失其家韓嬰曰大夫有争臣三人雖無道不失其家季氏為無道僭天子舞八佾旅泰山以雍徹孔子曰是可忍也孰不可忍也然不亡者以冉有季路為宰臣也今子處宰士之列無忠正之心枉不能正邪不能匡順流以容身從風以説音悦上上所言則苟聽上所行則曲從若影之隨形響之於聲終無所是非夏侯𤣥曰夫和羮之美在於合異上下之益在能相濟順從乃安此琴瑟一聲也衣去聲儒衣冠去聲儒冠而不能行其道非真儒也譬若土龍文章首目具而非龍也葶歴似菜而殊味玉石相似而異類汜論曰夫亂人者芎藭之與藁本也蛇牀之與􅐘蕪也此皆相似故劒工惑劒之似莫邪者唯歐冶能名其種玉工眩玉之似碧盧者唯猗頓不失其情魏文侯曰夫物多相類而非也幽莠之㓜也似禾驪牛之黄也似虎白骨疑象武夫類玉此皆似之而非者也子非孔氏執經守道之儒乃公卿面從之儒非吾徒也冉有為季氏宰而附益之孔子曰小子鳴鼓而攻之可也故輔桀者不為知去聲為桀斂者不為仁丞相去聲史黙然不對利議第二十七大夫曰作世明主憂勞萬人思念北邉之未安故使使去聲者舉賢良文學髙第詳延有道之士將欲觀殊議異冊虚心傾耳以聽庶幾云得諸生無能出竒計逺圖匃奴安邊境之冊通作䇿明枯竹守空言不知趨舍之宜時世之變議論無所依如膝癢而搔背辯訟公門之下訩訩音凶不可勝音升聽訩訩衆言也如品即口以成事此豈明主所欲聞哉文學曰諸生對册通作䇿殊路同歸指在於崇禮義退財利復往古之道匡當世之失莫不云太平雖未盡可亶用亶信也宜略有可行者焉執事闇於明禮而喻於利末沮事隳音灰議計利籌册通作䇿以故至今未决非儒無成事公卿欲成利也大夫曰色厲而内荏亂真者也文表而柔裏亂實者也文學裒衣博帶竊周公之服鞠躬踧踖竊仲尼之容議論稱誦竊商賜之辭刺譏言治過管晏之才心卑卿相去聲志小萬乗去聲及授之政昏亂不治故以言舉人若以毛相去聲馬仲尼弟子傳曰孔子曰吾以言取人失之宰予以貌取人失之子羽道應訓曰秦繆公請伯樂曰子之年長矣子姓有可使求馬者乎對曰良馬者可以形容筋骨相也相天下之馬者若滅若失若亡其一若此馬者絶塵弭轍臣之子皆下材也可告以良馬而不可告以天下之馬臣有所與供儋纒采薪者九方堙此其於馬非臣之下也請見之穆公見之使之求馬三月而反報曰已得馬矣在於沙丘穆公曰何馬也對曰牡而黄使人往取之牝而驪穆公不説召伯樂而問之曰敗矣子之所使求者毛物牝牡弗能知又何馬之能知伯樂喟然太息曰一至此乎是乃其所以千萬臣而無數者也若堙之所觀者天機也得其精而忘其粗得其在内而忘其外見其所見而不見其所不見視其所視而遺其所不視若彼之所相者乃有貴乎馬者馬至而果千里之馬此其所以多不稱去聲舉詔册通作䇿曰朕嘉宇内之士故詳延四方豪俊文學博習之士超遷官祿言者不必有徳何者言之易而行之難有舍其車而識其牛貴其不言而多成事也漢書曰劉寛嘗行有人失牛者乃於路就寛車中認之寛無所言下駕步歸有頃認者得牛而送還叩頭謝曰蹔負長者寛曰物有相類事容脱誤幸勞見歸何為謝也吳鐸以其舌自破主父偃以其舌自殺繆稱訓曰吳鐸以聲自毁膏燭以明自爍許慎曰鏎大鈴出於吳也叢談曰口者闗也舌者機也出言不當四馬不能追也口者關也舌者兵也出言不當反自傷也言出於已不可止於人行發於邇不可止於逺夫言行者君子之樞機樞機之發榮辱之本也可不慎乎故蒯子羽曰言猶射也括既離弦雖有所悔焉不可從而追已詩曰白珪之玷尚可磨也斯言之玷不可為也鶡音押鴠音旦夜鳴無益於明主父鳴鴟無益於死鶡鴠渇鴠也詩云相彼鳱鴠尚或惡之鳴急旦也增韻曰鳱鴠求旦之鳥形似雞晝夜常鳴陸佃曰怪鴟其鳴即雨為繇可以聚衆鳥一名隻狐晝無所見夜即飛也非有司欲成利文學桎音只梏音谷於舊術木在足曰桎在手曰梏牽於間音閑言者也文學曰能言之能行之者湯武也能言不能行者有司也文學竊周公之服有司竊周公之位文學桎音只梏音谷於舊術有司桎音只梏音谷於財利主父偃以舌自殺有司以利自困夫音扶驥之才千里非造父不能使禹之知萬人非舜為相去聲不能用雜事篇曰顔淵侍魯定公于臺東野畢御馬于臺下定公曰善哉東野畢之御顔淵曰善則善矣雖然其馬將失定公不悦以告左右曰吾聞之君子不讒人君子亦讒人乎顔淵不悦歴階而去須㬰馬敗聞矣定公躐席而起曰趨駕請顔淵顔淵至定公曰向寡人曰善哉東野畢御也吾子曰善則善矣雖然其馬將失矣不識君子何以知之也顔淵曰臣以政知之昔有舜工於使人造父工於使馬舜不窮於其民造父不盡其馬是以舜無失民造父無失馬今東野畢之御也上車執轡御體正矣周旋步驟朝禮畢矣歴險致逺而馬力殫矣然求不已是以知其失矣定公曰善可少進與顔淵曰獸窮則觸鳥窮則喙人窮則詐自古及今有窮其下能無危者未之有也詩曰執轡如組両驂如舞善御之謂也定公曰善哉寡人之過也故季桓子聼政桞下惠忽然不見孔子為司冦然後悖熾泰族訓曰孔子為魯司冦道不拾遺市買不豫賈田漁皆譲長斑白不戴負驥舉之在伯樂音洛其功在造父造父攝轡馬無駑音奴良皆可取道周公之時士無賢不肖皆可與言至治故御之良者善調馬相去聲之賢者善使士今舉異才而使减音撿騶音鄒御之是猶扼驥鹽車而使責之疾騶廐御也扼通作軛轅端横木駕馬領者此賢良文學多不稱去聲舉也國病第二十八大夫曰嘻諸生闒音逹茸音戎無行去聲多言而不用情貌不相副若穿踰之盗自古而患之是孔丘斥逐於魯君曾不用於世也何者以其首攝多端迂時而不要也攝引持也故秦王燔去其術而不行坑之渭中而不用秦紀曰李斯請非博士官所職天下敢藏詩書百家語詣守尉雜燒之盧生為始皇求仙藥亡去始皇大怒使御史案問諸生諸生犯禁者四百六十四人皆坑之咸陽潘生曰儒林填於坑穽詩書煬而為煙乃安得鼓口舌申顔眉預前論議是非國家之事也文學曰國有賢士而不用非士之過有國者之耻叢談曰士横道而偃四肢不掩非士之過有土之羞也邦君將昌天遺其道大夫將昌天遺其士庶人將昌必有良子孔子大聖也諸侯莫能用當小位於魯三月不令而行不禁而止沛若時雨之灌萬物莫不興起也家語曰孔子初仕為中都宰制為養生送死之節長㓜異食彊弱異任男女别塗路無拾遺噐不彫偽為四寸之棺五寸之槨因丘陵為墳不封不樹行之一年而四方之諸侯則焉况乎位天下之本朝音潮而施聖主之徳音教澤乎今公卿處尊位執天下之要十有餘年功徳不施於天下而勤勞於百姓百姓貧陋困窮而私家累萬金此君子所耻而伐檀所刺也詩序曰伐檀刺貪也在位貪鄙無功而受禄君子不得進仕爾昔者商鞅相去聲秦後禮讓先貪鄙尚首功務進取魯仲連曰彼秦者棄禮義而尚首功之國也譙周曰秦用衛鞅計制爵二十等以戰獲首級者計而受爵是以秦人每戰勝老弱婦人皆死計功賞至萬數天下謂之尚首功之國皆以惡之也司馬貞曰秦法斬首多為上功謂斬一人首賜爵一級故謂秦為首功之國也無徳序於民而嚴刑罰於國俗日壊而民滋怨故惠王烹葅其身以謝天下當此之時亦不能論事矣今執政患儒貧賤而多言儒亦憂執事富貴而多患也大夫視文學悒悒而不言也悒悒不安也丞相去聲史曰夫音扶辯國家之政事論執政之得失何不徐徐道理相喻何至切切如此乎大夫難罷鹽鐡者非有利也憂國家之用邊境之費也諸生誾誾音銀爭去聲鹽鐡亦非為去聲已也欲反之於古而輔成仁義也二者各有所宗時世異務又安可堅任古術而非今之理也且夫音扶小雅非人必有以易之諸生莫有能安集國中懐臧之来逺方使邊境無冦虜之災租税盡為諸生除之何况鹽鐡均輸乎所以貴術儒者貴其處謙推讓以道盡人今辯訟愕愕音鄂然無赤賜之辭而見鄙倍之色非所聞也大夫言過而諸生亦如之諸生不直謝大夫耳賢良文學皆離席曰鄙人固陋希涉大庭狂言多不稱去聲以逆執事夫藥酒苦於口而利於病忠言逆於耳而利於行去聲湯曰藥食先嘗於卑然後至於貴藥言先獻於貴然後聞于卑道也故使人味食然後食者其得味也多使人味言然後聞言者其得言也少是故求道者不以目而以心取道者不以手而以耳孔子曰良藥苦於口利於病忠言逆於耳利於行故武王諤諤而昌紂嘿嘿而亡君無諤諤之臣父無諤諤之子兄無諤諤之弟夫無諤諤之婦士無諤諤之友其亡可立而待故曰君失之臣得之父失之子得之兄失之弟得之夫失之婦得之士失之友得之故無亡國敗家悖父亂子放兄棄弟狂夫滛婦絶交敗友韓非子曰夫良藥苦於口而智者勤而飲之知其入而已已疾也忠言拂於耳而明主聼之知其可以致功也故愕愕音鄂者福也諓諓音淺者賤也林中多疾風富貴多䛕言萬里之朝音潮日聞唯唯而後聞諸生之愕愕音鄂此乃公卿之良藥鍼音針石正諫篇曰趙簡子有臣曰周舍立於門下三日三夜簡子使問之曰子欲見寡人何事周舍對曰願為諤諤之臣墨筆操牘從君之過而日有記也月有成也嵗有效也簡子居則與之居出則與之出居無幾何而周舍死簡子如䘮子後與諸大夫飲於洪波之臺酒酣簡子涕泣諸大夫皆出走曰臣有罪而不自知簡子曰大夫皆無罪昔者吾有周舍有言曰千羊之皮不若一狐之腋衆人諾諾不若一士之諤諤昔者商紂黙黙而亡武王諤諤而昌今自周舍之死吾未嘗聞吾過也吾亡無日矣是以寡人泣也諸葛恪曰良藥苦口惟病者能甘之忠言逆耳惟逹者能受之大夫色少寛面文學而蘇也蘇氣索貌不安也丞相去聲史曰窮巷多曲辯而寡見者難喻公孫鞅曰窮巷多恡曲學多辯文學守死渣滓之語而終不移夫音扶往古之事昔有之語已可覩矣今以近世觀之自以目有所見耳有所聞世殊而事異文景之際建元之始民朴而歸本吏亷而自重殷殷屯屯人衍而家富今政非改而敎非易也何世之彌薄而俗之滋衰也吏即少亷民即寡耻刑非誅惡而姦猶不止食貨志曰文景之時屢敕有司以農為務民遂樂業至武帝之初七十年間國家亡事非遇水旱則民人給家足都鄙廩庾盡滿而府庫餘財京師之錢累百鉅萬貫朽而不可校大倉之粟陳陳相因充溢露積於外腐敗不可食衆庻街巷有馬阡陌之間成羣乗牸牝者擯而不得會聚守閭閻者食梁肉為吏者長子孫居官者以為姓號人人自愛而重犯法先行誼而黜媿辱焉於是㒺疏而民富役財驕溢或至并兼豪黨之徒以武斷至鄉曲宗室有土公卿大夫以下争於奢侈室廬車服僣上亡限物盛而衰固其變也世人有言鄙儒不如都士都美也都者鄙之對也左傳曰都鄙有章淮南子云始乎都者常卒乎鄙葢天子所居輦轂之下聲名文物之所聚故其士女雍容閑雅之態生故謂之都相如傳云車從甚都是也邉氓所居蕞爾之邑狐狸豺狼之所嚎故其閭閻吝嗇村陋之狀出故謂之鄙老子云衆人皆有以而我獨頑似鄙是也文學皆出山東希涉大論子大夫論京師之日乆顧分明政治識之事故所以然者也顔師古曰子者人之嘉稱大夫學官之稱也志在優賢故謂之子大夫也賢良曰夫音扶山東天下之腹心賢士之戰塲也高皇帝龍飛鳯舉於宋楚之間山東子弟蕭曹樊酈滕灌之屬為輔雖既異世亦即閎夭太顛而已班固曰高祖起於布衣之中奮劒而取天下不由唐虞之禪不階湯武之王龍行虎變卒從風雲征亂伐暴廓清帝宇八載之間海内克定遂荷天之衢登建皇極上古以来書籍所載未嘗有也非雄俊之材寛明之畧歴數所授神祇所相安能致功如此夫帝王之作必有神人之助非徳無以建業非命無以定衆或以文昭或以武興或以聖立或以人崇焚魚斬蛇異功同符豈非精靈之感哉書曰天工人其代之易曰湯武革命順乎天而應乎人其斯之謂乎蕭曹樊酈滕灌之屬謂鄼侯蕭何平陽侯曹參舞陽侯樊噲曲周侯酈商汝隂侯滕公頴隂侯灌嬰也禹出西羌文王生北夷戴叔鸞傳云大禹生西羌帝王世紀曰伯禹生於石坳水經注云禹生于蜀之廣柔縣石紐村今之石泉縣也石紐村今之石鼓山其山朝暮二時有五色霞氣孟子曰文王生於岐周余氏解云周自古公遷於岐山之下周原故號岐周即今鳯翔府岐山縣也地與畎夷近故曰北夷然聖徳髙世有萬人之才負迭羣之任迭通作軼相過也出入都市一旦不知返數然後終於厮音斯役而已僕雖不生長音掌京師才駑音奴下愚不足以大議竊者以聞閭里長音掌老之言往者常民衣服温暖而不靡器質朴牢而致用衣足以蔽體噐足以便事馬足以易步車足以自載酒足以合歡而不湛音酖樂足以理心而不滛入無宴樂音洛之聞出無佚音逸遊之觀行即負羸音縲止作鋤耘用約而財饒夲修而民富送死哀而不華養生適而不奢大臣正而無欲執政寛而不苛故黎民寧其性百吏保其官建元始崇文修徳天下乂安其後邪臣各以伎藝虧亂至治外障音瘴山海内興諸利楊可勝告緡江充禁服張大夫革令杜周治獄罰贖科適微細並行不可勝音升載夏蘭之屬妄搏音博王溫舒之徒妄殺殘吏萌起擾亂良民平凖書曰縣官悉禁郡國無鑄錢専令上林三官鑄錢既多而令天下非三官錢不得行諸郡國所前鑄錢皆廢銷之輸其銅三官而民之鑄錢益少計其費不能相當唯真工大姦乃盗為之楊可告緡徧天下中家以上大抵皆遇告杜周治之獄少反者江充傳曰上拜充為直指繡衣使者督三輔盗賊禁察踰侈貴戚近臣多奢僣充皆舉劾奏請沒入車馬令身待北軍擊匈奴奏可食貨志曰自造白金五銖錢後五嵗而赦吏民之坐盗鑄金錢死者數十萬人其不發覺相殺者不可勝計赦自出者百餘萬人然不能率自出天下大抵無慮皆鑄金錢矣犯法者衆吏不能盡誅於是遣博士禇大徐偃等分行郡國舉并兼之徒守相為利而御史大夫張湯方貴用事减宣杜周等為中丞義縱尹齊王温舒等用慘急苛刻為九卿直指夏蘭之屬始出而大農顔異誅矣當此之時百姓不保其首領豪富莫必其族姓聖主覺焉乃刑戮充等誅滅殘賊以殺所戒切死罪之怨塞天下之責故居民肆然復安然其禍累世不復瘡痍至今未息故百官尚有殘疾之政而強宰尚有強奪之心大臣擅權而斷擊豪猾多黨而侵陵富貴奢侈貧賤簒殺女紅音工難成而易弊車器難就而易敗車不累朞噐不終嵗一車千石一衣十鍾常民文杯畫音壊案几席緝􅗿音牒婢妾衣紈履絲匹庶粺音稗飯肉食里有俗黨有塲康莊馳逐窮巷蹋音逹鞠秉耒抱挿躬耕身織者寡娶要古腰字歛古本作臉從容傅白黛青者衆無而為有貧而强巨両切夸文表無裏紈袴音褲枲音徙裝生不養去聲死厚𦵏送死殫音丹家遣女滿車富者欲過貧者欲及富者空藏去聲貧者稱貸是以民年急而嵗促貧即寡耻乏即少亷此所以刑非誅惡而姦猶不止也反質篇曰魏文侯問李克曰刑罰之源安生李克曰生於奸邪淫佚之行凡奸邪之心飢寒而起淫佚者乆飢之詭也彫文刻鏤害農事者也錦繡纂組傷女工者也農事害則飢之夲也女工傷則寒之原也飢寒並至而能不為奸邪者未之有也男女飾羙以相矜而能無淫佚者未甞有也故上不禁伎巧則國貧民侈國貧窮者為奸邪而富足者為淫佚則驅民而為邪也民以為邪因以法隨誅之不赦其罪則是為民設陷也刑罰之起有原人主不塞其夲而替其末傷國之道乎文侯曰善以為法服也故國有嚴不急之徵即生前不足疾矣散不足第二十九大夫曰吾以賢良為少愈乃反其幽明若胡車相隨而鳴諸生獨不見季夏之螇音奚乎方言曰􅀈􅀈齊謂之螇螰蟬之别名也音聲入耳秋風至而聲無者生無易音異由言不顧其患患至而後黙晩矣賢良曰孔子讀史記喟然而歎傷正徳之廢君臣之危也孔子世家曰孔子云弗乎弗乎君子病沒世而名不稱焉吾道不行矣吾何以自見於後世乃因史記作春秋上至隱公下訖哀公十四年十二公據魯親周故殷運之三代其文辭而指博故吳楚之君自稱王而春秋貶之曰子踐土之㑹實召周天子而春秋諱之曰天王狩於河陽推此類以䋲當世貶損之義後有王者舉而開之春秋之義行則天下亂臣賊子懼焉孔子在位聼訟文辭有可與人共者弗獨有也至於為春秋筆則筆削則削子夏之徒不能贊一辭弟子受春秋孔子曰後世知丘者以春秋而罪丘者亦以春秋夫音扶賢人君子以天下為任者也任大者思逺思逺者忘近誠心閔悼惻𨼆加爾故忠心獨而無累此詩人所以傷而作比干子胥遺身忘禍也其惡音汚勞人若斯之急安能黙乎子路曰夫士欲立身行道無顧難易然後能行之欲行義白召無顧利害然後能行之令狐茂曰子胥盡忠而忘其號比干盡仁而遺其身忠臣竭誠不顧鈇鉞之誅以陳其愚志在匡君安社稷也詩云憂心如惔不敢戲談孔子栖栖疾固也墨子遑遑閔世也文子曰墨子無黔突孔子無煖席非以貪禄慕位起天下之利除萬民之害也修務訓曰孔子無墨突墨子無煖席是以聖人不高山不廣河䝉耻辱以干世主非以貪禄慕位欲事起天下利而除萬民之害葢聞傳書曰神農憔悴堯瘐臞舜黴黑禹胼胝由此觀之則聖人之憂勞百姓甚矣故自天子以下至於庻人四胑不動思慮不用事治求贍者未之聞也班固曰太上有立徳其次有立功夫徳不得後身而特盛功不得背時而獨彰是以聖哲之治栖栖遑遑孔席不㬉墨突不黔大夫黙然丞相去聲史曰願聞㪚不足賢良曰宫室輿馬衣服噐械䘮祭食飲聲色玩好去聲人情之所不能已也故聖人為之制度以坊古防字之泰族訓曰良匠不能斵金巧冶不能鑠木金之勢不可斵而木之性不可鑠也埏埴而為器窬木而為舟鑠鐵而為月鑄金而為鐘因其可也駕馬服牛令雞司夜令狗守門因其然也民有好色之性故有大婚之禮有飲食之性故有大饗之誼有喜樂之性故有鐘鼓筦絃之音有悲哀之性故有衰絰哭踊之節故先王之制法也因民之所好而為之節文者也因其好色而制婚姻之禮故男女有别因其喜音而正雅頌之聲故風俗不流因其寧家室樂妻子敎之以順故父子有親因其喜朋友而教之以悌故長㓜有序然後修朝聘以明貴賤鄉飲習射以明長㓜時搜振旅以習用兵也入學庠序以修人倫此皆人之所有於性而聖人之所匠成也傳曰人有六情目欲視好色耳欲聼宫商鼻欲嗅芬香口欲嗜丼㫖其身體四肢欲安而不作衣欲被文繡而輕煖此六者民之六情也失之則亂從之則穆故聖王之敎其民也必因其情而節之以禮必從其欲而制之以義義簡而備禮易而法去情不逺故民之從命也速孔子知道之易行曰詩云牖民孔易非虚辭也間音諫者士大夫務於權利怠於禮義故百姓倣傚頗踰制度今故陳之曰古者榖物菜果不時不食鳥獸魚鱉不中去聲殺不食故繳網不入於澤雜毛不取王制曰五榖不時果實未熟不粥於市木不中伐不粥於市禽獸魚鼈不中殺不粥於市今富者遂驅殱音尖網罝掩捕麑鷇音冦躭音耽湎沉猶鋪百川鮮羔䍮音兆􅶢音幾胎扁皮黄口春鵝秋雛冬葵温韭浚芘音疪蓼蘇豐奕耳菜毛果蟲貉古者采椽茅茨陶桴復穴足禦寒暑蔽風雨而已及其後世采椽不斵音卓茅茨不剪無斵音卓削之事磨礱之功大夫達棱楹士頴音影首庶人斧成木構而已今富者井幹增梁井幹復屋熒井刻花置其中也雕文檻修雕文雕鏤文章也􅀢音珎憂壁飾古者衣服不中去聲制器械不中去聲用不粥於市王制曰用器不中度不粥於市兵車不中度不粥於市布帛精麤不中數幅廣狭不中量不粥於市姦色亂正色不粥於市今民間雕琢不中去聲之物刻畫音壊無用之器玩好𤣥黄雜青五色繡衣戲弄蒲人雜婦百獸馬戲鬬虎唐銻音提追人竒蟲胡妲古者諸侯不秣馬天子有命以車就牧庶人之乗者馬足以代其勞而已故行則服扼止則就犁今富者連車列騎驂貳輜音之軿音駢中者微輿短轂煩尾掌蹄夫音扶一馬伏􅇫當去聲中家六口之食亡丁男一人之事古者庶人耋老而後衣去聲絲其餘則麻枲音徙而已故命曰布衣及其後則絲裏枲表直領無禕音揮袍合不縁夫音扶羅紈文繡者人君后妃之服也繭紬縑練者婚姻之嘉飾也是以文繒音曾薄織不粥於市今富者縟繡羅紈中者素綈音啼錦氷常民而被后妃之服褻人而居婚姻之飾夫音扶紈素之賈倍縑縑之用倍紈也古者椎車無柔棧音湛輿無植及其後木軨音零不衣長轂數幅蒲薦苙音立蓋蓋無染絲之飾大夫士則單椱木具盤韋柔革常民染輿大軨蜀輪今庶人富者銀黄華左搔結綏韜杠中者錯鏕音鹿塗采珥音二靳飛鈴古者鹿裘皮冐蹄足不去及其後大夫士狐貉縫腋羔麑豹祛庶人則毛絝音庫衳音鍾彤音同樸羝皮傳今富者鼲音渾鼯音吾狐白鳬翥音註中者罽音計衣金縷燕䶅音喝代黄古者庶人賤騎繩控革鞮音低皮廌而已及其後革鞍氂音茅成鐡鑣不飾今富者􅀈音劇耳銀鑷音聶䪉音列黄金琅勒罽音計繡弇音掩汙垂珥音二胡鮮中者染緯紹系采畫音壊暴乾古者汙尊坏飲葢無爵觴樽爼及其後庶人器用即行桞陶瓠而已唯瑚璉觴豆而後彫文彤漆今富者銀口黄耳金罍玉鍾中者舒玉紵器金錯蜀杯夫音扶一文杯得銅杯十賈通作價賤而用不殊箕子之譏始在天子今在匹夫宋世家曰紂始為象箸箕子歎曰彼為象箸必為玉杯為杯則必思逺方珍怪之物而御之輿馬宫室之漸自此始不可振也韓非子曰昔者紂為象箸而箕子怖以為象箸必不加於土鉶必將犀玉之杯象箸玉杯必不羮菽藿則必旄象豹胎必不衣短褐而食於茅屋之下則錦衣九重廣室廣室高臺吾畏其卒故怖其始故箕子見象箸以知天下之禍故曰見小曰明古者燔黍食稗而熚音畢豚以相饗其後鄉人飲酒老者重豆少者立食一醬一肉旅飲而已及其後賔婚相召則豆羮白飯綦膾熟肉今民間酒食殽旅重疊燔炙滿案臑音如鼈膾腥麑卵鶉音純鷃音晏撜抅鮐音台鱧音禮醢音海醯音希衆物雜味古者庶人春夏耕耘秋冬收藏昏晨力作夜以繼日詩云晝爾于茅宵爾索綯亟其乗屋其始播百榖非膢音婁臘不休息非祭祀無酒肉今賔昏酒食接連相因折醒什半棄事相隨慮無之日古者庶人糲食藜藿非鄉飲酒膢臘祭祀無酒肉故諸侯無故不殺牛羊大夫士無故不殺犬豕王制曰諸侯無故不殺牛大夫無故不殺羊士無故不殺犬豕庶人無故不食珎今閭巷縣伯阡陌屠沽無故烹殺相聚野外負粟而往挈肉而歸夫音扶一豕之肉得中年之收十五斗粟當去聲丁男半月之食古者庶人魚菽之祭春秋修其祖祠士一廟大夫三以時有事于五祀月令曰孟春之月其祀户孟夏祀竈中央祀中霤孟秋祀門孟冬祀行謂之五祀葢無出門之祭今富者祈名嶽望山川椎牛擊鼓戯倡舞像中者南居當路水上雲臺屠羊殺狗皷瑟吹笙貧者雞豕五芳衛保散臘傾葢社塲古者徳行去聲求福故祭祀而寛仁義求吉故卜筮而希今世俗寛於行去聲而求於鬼怠於禮而篤於祭嫚音慢親而貴勢至妄而信日聼馳音移言而幸得出實物而享虗福古者君子夙夜孳孳思其徳小人晨昏孜孜思其力故君子不素飡小人不空食世俗飾偽行詐為去聲民巫祝以取釐謝堅頟音額徤舌或以成業致富故憚事之人釋夲相學是以街巷有巫閭里有祝古者無杠樠音䐽之寢牀栘音移之案及其後世庶人即采木之杠葉華之樠士不斤成大夫葦莞而已今富者黼繡幃幄塗屏錯跗音夫中者錦綈音提高張采畫音壊丹漆古者皮毛草蓐無茵席之加旃音氊蒻音弱之美及其後大夫士復薦草縁蒲平單莞庶人即草蓐索經單藺音吝蘧音瞿蒢音除而已今富者繡茵翟柔蒲子露林中者􅱽皮代旃音氊闒音逹坐平莞古者不粥絍不市食及其後則有屠沽沽酒市脯魚鹽而已今熟食徧列殽施成市作業墮怠食必趣時楊豚韭卵狗䐲音摺馬朘音唆煎魚切肝羊淹雞寒蜩馬駱日蹇音簡捕庸脯胹音而羔豆賜􅑹音谷膹音憤鴈羮自鮑丼瓠熱梁和炙古者土皷凷音塊枹音浮擊木拊音府石以盡其歡明堂篇曰土鼔蕢桴葦籥伊耆氏之樂也齊俗訓曰古者非不能陳鐘鼓盛筦簫揚干戚奮羽旄以為費財亂政制樂足以合歡宣意而已喜不羡於音也及其後卿大夫有管磬士有琴瑟往者民間酒會各以黨俗彈筝鼓缶浮去聲而已無要玅之音變羽之轉今富者鐘鼓五樂歌兒數曹中者鳴竽調瑟鄭儛趙謳古者瓦棺容尸木板堲音即周足以收形骸藏髮齒而已國子高曰𦵏也者藏也藏也者欲人之弗得見也是故衣足以飾身棺周於衣椁周於棺土周於椁反壤樹之哉齊俗訓曰古者非不能竭國靡民虚府殫財舍珠鱗施綸組節以為窮民絶業而無益於槁骨腐肉也故𦵏薶足以收歛葢藏而已昔舜𦵏蒼梧之野商不變其肆禹葬㑹稽之山農不易其畆明乎死生之分通乎侈儉之適者也及其後桐棺不衣采棺不斵音卓今富者繡墻題湊音腠題湊棺木内向也中者梓棺楩椁貧者畫荒衣袍繒囊緹音提槖古者明器有形無實示民不用也檀弓曰孔子曰之死而致死之不仁而不可為也之死而致生之不知而不可為也是故竹不成用瓦不成味木不成斵琴瑟張而不平竽笙備而不和有鐘磬而無簨簴其曰明器神明之也仲憲言於曾子曰夏后氏用明器示民無知也殷人用祭器示民有知也周人兼用之示民疑也曾子曰其不然乎其不然乎夫明器鬼器也祭器人器也夫古之人胡為而死其親乎孔子謂明器者知䘮道矣備物而不可用也哀哉死者而用生者之器也不殆於物殉乎哉其曰明器神明之也塗車芻靈自古有之明器之道也孔子謂為芻靈者善謂為俑者不仁不殆於用人乎哉及其後則有醯音希醢音海之藏桐馬偶人彌祭其物不備今厚資多藏器用如生人郡國繇音遙吏素桑楺柔上聲偶車櫓輪匹夫無貎領桐人衣去聲紈音丸綈音提古者不封不樹反虞祭於寢無檀宇之居廟堂之位易曰占之葬者厚衣之以薪𦵏之中野不封不樹䘮期無數及其後則封之庶人之墳半仞其高可隐今富者積土成山列樹成林臺榭連閣集觀去聲增樓中者祠堂屏閣垣闕罘音浮罳音思顔師古曰罘罳謂連闕曲閣也以覆重刻垣墉之處其形罘罳然也劉熈曰罘復也罳思也言臣將請事於此復思也蘇鶚曰按罘罳从四是形不思是聲罘浮也罳絲也謂織絲之文輕疎浮虚之貌葢宫殿簷户之間也古者鄰有䘮舂不相杵巷不歌謡曲禮曰適墓不登壟助葬必執紼臨䘮不笑揖人必違其位望柩不歌入臨不翔當食不歎鄰有䘮舂不相里有殯不巷歌適墓不歌哭日不歌送䘮不由徑送𦵏不辟塗潦臨䘮則必有哀色執紼不笑臨樂不歎孔子食於有䘮者之側未嘗飽也子於是日哭則不歌今俗因人之䘮以求酒肉幸與小坐而責辦歌舞俳音排優連笑伎音至戯古者男女之際尚矣嫁娶之服未之以記及虞夏之後蓋表布内絲骨笄音記象珥音二封君夫人加錦尚褧而已今富者皮衣朱貉繁露環珮中者長裾交禕音揮璧端簮珥音二古者事生盡愛送死盡哀故聖人為制節非虚加之檀弓曰子游問䘮具夫子曰稱家之有亡子游曰有亡烏乎齊夫子曰有母過禮茍亡矣歛首足形還𦵏懸棺而封人豈有非之者哉今生不能致其愛敬死以奢侈相髙雖無哀戚之心而厚𦵏重幣者則稱以為孝顯名立於世光榮著於俗故黎民相慕效至於廢屋賣業古者夫婦之好一男一女而成家室之道及後士一妾大夫二諸侯有姪娣九女而已今諸侯百數卿大夫十數中者侍御富者盈室是以女或曠怨失時男或放死無匹古者凶年不備豐年補敗仍舊貫而不改作今工異變而吏殊心壊敗成功以匿厥意意極乎功業務存乎面目積功以市譽不恤民之急田野不辟而飾亭落邑居丘墟而髙其郭古者不以人力徇於禽獸不奪民財以養狗馬是以財衍而力有餘今猛獸竒蟲不可以耕耘而令當耕耘者養食之百姓或短褐不完而犬馬衣去聲文繡黎民或糠糟不接而禽獸食肉雜事篇曰昔者燕相得罪於君將出亡召門下諸大夫曰有能從我出者乎三問諸大夫莫對燕相曰嘻亦有士之不足養也大夫有進者曰亦有君之不能養士安有士之不足養者凶年飢嵗士糟粕不厭而君之犬馬有餘榖粟隆冬烈寒士短褐不完四體不蔽而君之臺觀帷㡘錦繡隨風飄飄而弊財者君之所輕死者士之所重也君不能施君之所輕而求得士之所重不亦難乎燕相遂慙遁逃不復敢見古者人君敬事愛下使民以時天子以天下為家臣妾各以其時共音供公職古今之通義也王符曰王者以四海為家兆民為子一夫不耕天下受其飢一婦不織天下受其寒一夫耕百人食之一婦桑百人衣之以一奉百孰能供之是故明主之養民憂之勞之教之誨之慎㣲防萌以㫁其邪故易美節以制度不傷財不害民七月之詩大小敎之終而復始由此觀之人固不可恣也今縣官多畜奴婢坐禀衣食私作産業為姦利力作不盡縣官失實百姓或無斗筲之儲官奴累百金黎民昏晨不釋事奴婢垂拱遨遊也垂拱言晏安無事垂衣拱手而已古者親近而疏逺貴所同而賤非類不賞無功不養無用今蠻貊無功縣官居肆廣屋大第坐禀衣食百姓或旦暮不澹古贍字蠻夷或厭酒肉黎民泮汗力作令蠻夷交脛肆踞古者庶人鹿菲草芰音技縮絲尚韋而已及其後則綦音其下不借鞔音漫鞮音低革舄今富者革中名工輕靡使容紈音丸裏紃音廵下越端縱縁中者鄧里間作蒯音快苴音蛆秦堅婢妾韋沓絲履走者茸音戎芰音技狗官古聖人勞躬養神節欲適情尊天敬地履徳行仁是以上天歆焉永其世而豐其年故堯秀眉髙彩享國百載修務解曰堯母慶都葢天帝之女寄伊長孺家年二十無夫出觀於河有赤龍負圖而至曰赤龍受天下之圖有人赤衣光面八彩鬢鬚長赤帝起成元寳奄然隂雲赤龍與慶都合而生堯帝如圖故眉有八彩之色及秦始皇覽怪迂信禨音幾祥使盧生求羡門高徐市等入海求不死之藥當此之時燕齊之士釋鋤耒爭言神仙方士於是趣咸陽者以千數言仙人食金飲珠然後夀與天地相保於是數音朔廵狩五嶽濵海之館以求神仙蓬莱之屬數音朔幸之郡縣富人以貲音兹佐貧者築道旁其後小者亡逃大者藏匿吏捕索掣音徹頓釋名曰掣制也制頓之使順已也不以道理名宫之旁廬舍丘落無生苗立樹百姓離心怨思者十有半半一作九封禪書曰自齊威宣之時騶子之徒論著終始五徳之運及秦帝而齊人奏之故始皇采用之而宋母忌正伯僑充尚羡門子高最後皆燕人為方僊道形解銷化依於鬼神之事騶衍以隂陽主運顯於諸侯而燕齊海上之方士傳其術不能通然則怪迂阿䛕苟合之徒自此興不可勝數也自威宣燕昭使人入海求蓬莱方丈瀛洲此三神山者其傳在渤海中去人不逺患且至則船風引而去葢嘗有至者諸僊人及不死之藥皆在焉其物禽獸盡白而黄金銀為宫闕未至望之如雲及到三神山反居水下臨之風輙引去終莫能至云世主莫不丼心焉及至秦始皇并天下至海上則方士言之不可勝數始皇自以為至海上而恐不及矣使人乃齎童男女入海求之船交海中皆以風為解曰未能至望見之焉其明年始皇復游海上至琅邪過恒山從上黨歸後三年逰碣石考入海方士從上郡歸後五年始皇南至湘山遂登㑹稽並海上冀遇海中三神山之竒藥不得還至沙丘崩反質篇曰秦始皇既兼天下大侈靡即位三十五年猶不息治大馳道從九原抵雲陽塹山堙谷直通之厭先王宫室之小乃於豐鎬之間文武之處營作朝宫渭南山林苑中作前殿阿房東西五百步南北五十丈上可以坐萬人下可建五丈旗周為閣道自殿直抵南山之嶺以為闕為複道由阿房度渭水屬咸陽以象天極閤道絶漢抵營室也又興驪山之役錮三泉之底闗中離宫三百所闗外四百所皆有鐘磬帷帳婦女倡優立石闕東海上朐山界中以為秦東門於是有方士韓客侯生齊客盧生相與謀曰當今時不可以居上樂以刑殺為威天下畏罪持禄莫敢盡忠上不聞過而日驕下懾伏以漫欺而取容諫者不用而失道滋甚吾黨乆居且為所害乃相與亡去始皇聞之大怒曰吾異日厚盧生尊爵而事之今乃誹謗我吾聞諸生多為妖言以亂黔首乃使御史悉上諸生諸生轉相告犯法者四百六十餘人皆坑之盧生不得而侯生後得始皇聞之召而見之升阿東之臺臨四通之街將數而車裂之始皇望見侯生大怒曰老虜不良誹謗而主廼敢復見我侯生至仰臺而言曰臣聞知死必勇陛下肯聼臣一言乎始皇曰若欲何言言之侯生曰臣聞禹立誹謗之木欲以知過也今陛下奢侈失本淫泆趨末宫室臺閣連屬増累珠玉重寳積襲成山錦繡文綵滿府有餘婦女倡優數巨萬人鐘鼔之樂流漫無窮酒食珎味盤錯於前衣服輕煖輿馬文飾所以自奉麗靡爛漫不可勝極黔首匱竭民力單盡尚不自知又急誹謗嚴威克下下喑上聾臣等故去臣等不惜臣之身惜陛下國之亡耳聞古之明王食足以飽衣足以暖宫室足以處輿馬足以行故上不見棄於天下不見棄於黔首堯茅茨不剪采椽不斵土階三等而樂終身者以其文采之少而質素之多也丹朱傲虐好慢淫不修理化遂不以升今陛下之淫萬丹朱而千昆吾桀紂臣恐陛下之十亡也而曾不一存始皇黙黙乆之曰如何不早言侯生曰陛下之意方乘青雲飄揺於文章之觀自賢自徤上侮五帝下凌三王棄素樸就末技陛下亡徵見乆矣臣等恐言之無益也而自取死故逃而不敢言今臣必死故為陛下陳之雖不能使陛下不亡欲使陛下自知也始皇曰吾可以變乎侯生曰形已成矣陛下坐而待亡耳若陛下欲更之能若堯與禹乎不然無異也陛下之佐又非也臣恐變之不能存也始皇喟然而嘆遂釋不誅後三年始皇崩二世即位三年而秦亡書曰享多儀儀不及物曰不享故聖人非仁義不載於已非正道不禦於前是以先帝誅文成五利等谷永曰明天地之性者不可惑以神怪知萬物之情者不可罔以非類諸背仁義之正道不遵五經之法言而盛稱竒怪鬼神廣崇祭祀之方求報無福之祠及言世有僊人服食不終之藥遙興輕舉覽觀縣圃浮游蓬莱耕耘五徳朝種暮獲與山石無極黄冶變化堅氷淖溺化色五倉之術者皆姦人惑衆挟左道懷詐偽以欺罔世主聼其言洋洋滿耳若將可遇求之盪盪如係風捕景終不可得是以明主拒而不聽聖人絶而不言封禪書曰齊人少翁以鬼神方見上上有所幸王夫人夫人卒少翁以方葢夜致王夫人及竈鬼之貌云天子自帷中望見焉於是乃拜少翁為文成將軍賞賜甚多以客禮禮之居嵗餘其方益衰神不至乃為帛書以飯牛佯不知言曰此牛腹中有竒殺視得書書言甚怪天子識其手書問其人果是偽書於是誅文成將軍隐之欒大因樂成侯見求言方天子既誅文成後悔其蚤死惜其方不盡及見欒大大説大為人長美言多方畧而敢為大言處之不疑是時上方憂河决有黄金不就乃拜大為五利將軍其後五利妄言見其師其方多不讐上乃誅五利陛下建學官親近忠良欲以絶怪惡之端而昭至徳之塗也宫室奢侈林木之蠧音妬也器械雕琢財用之蠧音妬也衣服靡麗布帛之蠧音妬也狗馬食人之食五榖之蠧音妬也口腹縱恣魚肉之蠧音妬也用費不節府庫之蠧音妬也漏積不禁田野之蠧音妬也䘮祭無度傷生之蠧音妬也諺曰蠧衆而木折隙大而墻壊墮成變故傷功工商上通傷農故一杯棬用百人之力一屏風就萬人之功其為害亦多矣目修於五色耳營於五音體極輕薄口極甘脆音翠功積於無用財盡於不急口腹不可為多故國病聚不足即政怠人病聚不足則身危傳曰福生於無為而患生於多欲知足然後富從之徳宜君人然後貴從之故貴爵而賤徳者雖為天子不尊矣貪物而不知止者雖有天下不富矣夫土地之生不益山澤之出有盡懐不富之心而求不益之物挟百倍之欲而求有盡之財是桀紂之所以失其位也救匱第三十丞相去聲史曰治聚不足奈何賢良曰蓋橈音閙枉者過直橈通作撓屈也救文者以質昔者晏子相去聲齊一狐裘三十載故民奢示之以儉民儉示之以禮曽子曰晏子可謂知禮也已恭敬之有焉有若曰晏子一狐裘三十年遣車一乗及墓而反國君七个遣車七乘大夫五个遣車五乗晏子焉知禮曾子曰國無道君子耻盈禮焉國奢則示之以儉國儉則示之以禮方今公卿大夫子孫誠能節車輿適衣服躬親節儉率以敦朴罷園池損田宅内無事乎市列外無事乎山澤農夫有所施其功女紅音工有所粥其業如是則氣脉和平無聚不足之病矣反質篇曰齊桓公謂管仲曰吾國甚小而財用甚少而羣臣衣服輿馬甚汰吾欲禁之可乎管仲曰臣聞之君嘗之臣食之君好之臣服之今君之食也必桂之漿衣練紫之衣狐白之裘此羣臣之所奢大也詩云不躬不親庻民不信君欲禁之胡不自親乎桓公曰善於是更制練帛之衣大帛之冠朝一年而齊國儉也大夫曰孤子語孝躄音璧者語杖貧者語仁賤者語治議不在巳者易稱去聲從旁議者易是其當局則亂故公孫𢎞布被倪寛練袍衣若僕妾食若庸夫淮南逆於内蠻夷暴於外盗賊不為禁奢侈不為節若疫嵗之巫徒能鼓口耳何㪚不足之能治乎賢良曰高皇帝之時蕭曹為公滕灌之屬為卿濟濟然斯則賢矣文景之際建元之始大臣尚有爭去聲引守正之義自此之後多承意從欲少敢直言面議而正刺因公而狥私故武安丞相田蚡也訟園田爭曲直人主之前夫音扶九層之臺一傾公輸子不能正夲朝音潮一邪伊望不能復故公孫丞相倪大夫側身行道分禄以養賢卑已以下士功業顯立日力不足無行人子産之繼而葛繹澎音彭侯之等傳曰公孫賀為丞相封葛繹侯劉屈􅈊為左丞相封澎侯隳壊其緒紕音避亂其紀毁其客館議堂以為馬廐婦舍無養士之禮而尚驕矜之色亷耻陵遲而爭於利矣西京雜記曰平津侯自布衣為宰相乃開東閣營客館以招天下之士其一曰欽賢館以待大賢次曰翹材館以待大材次曰接士館以待國士其有徳任毗賛佐理隂陽者處欽賢之館其有才堪九列將軍二千石者居翹材之館其有一介之善一方之藝居接士之館而躬自菲薄所得俸禄以奉待之公孫𢎞傳曰時上方興功業屢舉賢良𢎞自見為舉首起徒步數年至宰相封侯於是起客館開東閣以延賢人與參謀議𢎞身食一肉脱粟飯故人賔客仰衣食奉禄皆以給之家無所餘凡為丞相御史六嵗年八十終丞相位其後李蔡嚴青瞿趙石慶公孫賀劉屈􅈊繼踵為丞相自蔡至慶丞相館舍丘虚而已至賀屈􅈊時壊以為馬廐車庫奴婢室矣故良田廣宅民無所之不耻為利者滿朝音潮市列田畜者彌郡國横暴掣音徹頓大第巨舍之旁道路且不通此固難醫而不可為工大夫勃然作色黙而不應鹽鐡鍼石第三十一丞相去聲史曰吾聞諸鄭長音掌孫曰君子正顔色則逺暴嫚出辭氣則逺鄙倍矣故言可述行可則此有司夙昔所願覩也若夫音扶劒客論博奕辯盛色而相蘇秦立權以不相假使有司不能取賢良之議而賢良文學被不遜之名竊為諸生不取也公孫龍有言曰論之為道辯故不可以不屬意屬去聲意相寛顔師古曰屬意猶言注意也相寛其歸爭爭而不讓則入於鄙今有司以不仁又䝉素飡無以更責雪耻矣顔師古曰素空也素飡者徳不稱官空當食禄縣官所招舉賢良文學而及親民偉仕亦未見其能用鍼音針石而醫百姓之疾也賢良曰賈生有言曰懇言則辭淺而不入深言則逆耳而失指故曰談何容易談且不易而况行之乎此胡建所以不得其死而吳得㡬不免於患也胡建傳曰胡建為渭城令治甚有聲值昭帝㓜皇后父上官將軍安與帝姊蓋主私夫丁外人相善外人驕恣怨故京兆尹樊福使客射殺之客藏公主廬吏不敢捕渭城令建將吏卒圍捕蓋主聞之與外人上官將軍多從奴客往犇射追吏吏散走主使僕射劾渭城令游徼傷主家奴建報亡它坐蓋主怒使人上書告建侵辱長公主射甲舍門知吏賊傷奴辟報故不窮審大將軍霍光寢其奏後光病上官氏代聼事下吏捕建建自殺吏民稱寃至今渭城立其祠語曰五盗執一良人枉木惡直繩説山訓曰衆曲不容直衆枉不容正故人衆則食狼狼衆則食人也今欲下鍼音針石通闗鬲則恐有盛胡之累懐鍼音針槖音托艾則被不工之名狼䟦其胡載􅠶其尾君子之路行止之道固狭耳此子石所以歎息也雜言曰子石登吳山而四望喟然而歎息曰嗚呼悲哉世有明於事情不合於人心者有合於人心不明於事情者弟子問曰何謂也子石曰昔者吳王夫差不聼伍子胥盡忠極諌抉目而辜太宰嚭公孫雒偷合苟容以順夫差之志而伐吳二子沉身江湖頭懸越旗昔者費仲惡來革長鼻决耳崇侯虎順紂之心欲以合於意武王伐紂四子身死牧之野頭足異所比干盡忠剖心而死今欲明事情恐有抉目剖心之禍欲合人心恐有頭足異所之患由是觀之君子道狭耳誠不逢其明主狭道之中又將險危閉塞無可從出者子石公孫龍也除狹第三十二大夫曰賢者處大林遭風雷而不迷舜典曰納于大麓烈風雷雨弗迷愚者雖處平敞音昶大路猶暗惑焉今守相去聲親剖符贊拜蒞一郡之衆古方伯之位也受命專制宰割千里不御於内善惡在於己已不能故耳道何狹之有哉賢良曰古之進士也鄉擇而里選論其才能然後官之勝音升職任然後爵而禄之王制曰大樂正論造士之秀者以告于王而升諸司馬曰進士司馬辨論官材論進士之賢者以告於王而定其論論定然後官之任官然後爵之位定然後祿之故士修之鄉曲升諸朝音潮廷行之幽隱明足顯著疏逺無失士小大無遺功是以賢者進用不肖者簡黜傳曰王者之論徳也而不尊無功不官無徳不誅無罪朝無幸位民無幸生故上賢使能而等級不踰折暴禁悍而刑罰不過百姓曉然皆知夫為善於家取賞於朝也為不善於幽而䝉刑於顯夫是之謂定論是王者之徳詩云明昭有周式序在位今吏道壅而不選古作通富者以財賈音古官勇者以死射功戱車鼎躍咸出補吏衛綰傳曰以戯車為郎顔師古曰若今之弄車之技也累功積日或至卿相去聲垂青繩擐音灌銀龜擅殺生之柄專萬民之命弱者猶使羊將狼也其亂必矣强者則是予狂夫利劒也必妄殺生也酷吏傳曰寧成家居上欲以為郡守御史大夫𢎞曰臣居山東為小吏時寧成為濟南都尉其治如狼牧羊成不可使治民上乃拜成為闗都尉主術訓曰不仁而有勇力果敢則狂而操利劒不知而辨慧懐給則棄􅂹而不式雖有材能其施之不當其處之不宜適足以轉偽餙非伎藝之衆不如其寡也故有野心者不可借便勢有愚質者不可與利器是以往者郡國黎民相乗而不能理或至鋸頸殺不辜而不能正執綱紀非其道蓋博亂愈甚古者封賢禄能不過百里百里之中而為都疆垂不過五十猶以為一人之身明不能照聦不能逹故立卿大夫士以佐之而政治乃備今守相或無古諸侯之賢而蒞千里之政主一郡之衆施聖主之徳擅生殺之法至重也非仁人不能任非其人不能行一人之身治亂在已千里與之轉化不可不熟擇也管子曰堯舜之民非生而治桀紂之民非生而亂故治亂在上商君曰善治者使盗跖可信不能治者使伯夷可疑故人主有私人以財不私人以官韓嬰曰明主有私人以百金名珠玉而無私以官職事業者何也曰本不利所私也彼不能而主使之是闇主也臣不能而為之是詐臣也主闇於上臣詐於下滅亡無日矣俱害之道也故惟明主能愛其所愛闇主則必危其所愛懸賞以待功序爵以俟賢舉善若不足黜惡若仇讐固為去聲其非功而殘百姓也夫音扶傅音輔主徳開臣途在於選賢而器使之擇揀守相然後任之樂毅曰賢聖之君不以禄私親其功多者賞之其能當者處之故察能而授官者成功之君也論行而結交者立名之士也韓非子曰夫物者有所宜材者有所施各處其宜故上下無為使雞司夜狸執䑕皆用其能上乃無事泰族訓曰或輕或重或貪或亷此四者相反而不可一無也輕者欲發重者欲止貪者欲取亷者不利非其有故勇者可令進鬭而不可令持牢重者可令埴固而不可令凌敵貪者可令進取而不可令守職亷者可令守分而不可令進取信者可令持約而不可令應變五者相反聖人兼用而財使之夫天地不包一物隂陽不生一類海不讓水潦以成其大山不讓土石以成其高夫守一隅而遺萬方取一物而棄其餘則所得者鮮而所治者淺矣道應訓曰聖人之處世不遺有技能之士老子曰人無棄人物無棄物主術訓曰積力之所舉無不勝也衆智之所為無不成也聾者可令嗺筋而不可使有聞也喑者可令守圉而不可使有言也是故有一形者處一位有一能者服一事力勝其任則舉之者不重也能稱其事則為之者不難也無大小修短各得其宜則天下一齊無以相過也聖人兼而用之故無棄才鹽鐡論卷七
