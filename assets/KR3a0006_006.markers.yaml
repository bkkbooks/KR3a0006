  - {type: variant, offset: 154, length: 0, content: '', krp: 義也文繁於春華無効於抱風飾虚言以亂實道古以害今従之則縣官用廢虚言不可實而行之不従文學以為非也衆口囂囂不可勝音升聽諸卿都大府曰久矣通先古明當世今將何従而可矣丞相史進曰晋文公譎而不正齊桓公正而不譎所由不同俱歸於伯音覇而必隨古不革襲音集故不改是文質不變而椎車尚在也齊俗訓曰昔齊桓公合諸侯以乗車退誅於國以斧鉞晋文公合諸侯以革車退行於國以禮義桓公前柔而後剛文公前剛而後柔然而令行乎天下權制諸侯鈞者審於勢之變也韓非子曰古者寡事而備簡樸陋而不盡故有珧銚而椎車者古者人寡而相親物多而輕利易讓故有揖讓而傳天下者然則行揖讓髙慈惠而道推仁厚皆椎政也處多事之時用寡事之器非智者之備也當大争之世而循揖讓之軌非聖人之治也故智者不乗椎車聖人不行椎政也故或作之或述之然後法令調於民而器械便於用也孔對三君殊意晏子相去聲三君異道非苟相反所務之時異也韓非子曰葉公子髙問政於仲尼仲尼曰政在恱近而来逺魯哀公問政於仲尼仲尼曰政在選賢齊景公問政於仲尼仲尼曰政在節財三公出子貢問曰三公問夫子政一也夫子對之不同何也仲尼曰葉都大而國小民有背心故曰政在恱近而来逺魯哀公有大臣三人外障距諸侯四鄰之士内比周而以愚其君使宗廟不掃除社稷不血食者必是三臣也故曰政在選賢齊景公築雍門為路寢一朝而以三百乗之家賜者三故曰政在節財漢武帝曰五帝不相復禮三代不同法所繇殊路而建徳一也葢孔子對定公以來逺哀公以論臣景公以節用非期不同所}
