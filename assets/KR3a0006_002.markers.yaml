  - {type: variant, offset: 3663, length: 162, content: 文學曰冰炭不同器日月不竝明當公孫弘之時人主方設謀垂意於四夷故權譎之謀進荊楚之士用將帥或至封侯食邑而勀獲者咸蒙厚賞是以奮擊之士由此興其後干戈不休軍旅相望甲士糜弊縣官用不足故設險興利之臣起磻溪熊羆之士隱涇渭造渠以通漕運東郭咸陽孔僅建鹽鐵策諸利富者買爵販官免刑除罪公用彌多而為者徇私上下兼求百姓不堪抏弊而從法故憯急之臣進而見知廢格, WYG: 使衛鞅施寛平}
