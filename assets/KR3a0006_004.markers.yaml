  - {type: variant, offset: 5, length: 0, content: '', WYG: 漢桓寛撰明張之象註園池第十三大夫曰諸侯以國為家其憂在内天子以八極為境其慮在外故宇小者用菲功巨者用大是以縣官開園池總山海致利以助貢賦修溝渠立諸農廣田收盛􅁐囿太僕水衡少府大農嵗課諸入田收之利池籞音御之假説文曰籞禁苑也顔師古曰池籞謂於水邊作小屋落障魚鳥籞者禁苑之遮衛也本御幸者假與貧民及北邊置任田官以澹古贍字諸用猶不足今欲罷之絶其原杜其流上下俱殫音丹困乏之應也雖好省事節用如之何其可也文學曰古者制地足以養民民足以承其上千乗去聲之國百里之地公侯伯子男各充其求澹古贍字其欲秦兼萬國之地有四海之富而意不澹古贍字非宇小而用菲者欲多而下不堪其求也賈山曰昔者周盖千八百國以九州之民養千八百國之君用民之力嵗不過三日什一而籍君有餘財民有餘力而頌聲作秦始皇以千八百國之民自養力罷不能勝其役財盡不能勝其求一君之身耳所以自養者馳騁弋獵之虞天下弗能供也語曰厨有腐肉國有饑民廐有肥馬路有餧音餒人孟子曰庖有肥肉廐有肥馬民有饑色野有餓莩此率獸而食人也獸相食且人惡之為民父母行政不免於率獸而食人惡在其為民父母也今狗馬之養蟲獸之食豈特腐肉秣馬之費哉無用之官不急之作服􅁋侈之變無功而衣食縣官者衆是以上不足而下困乏也今不減除其本而欲澹古瞻字其末設機利造田畜與百姓争薦草與商賈音古爭市利非所以明主徳而相去聲國家也夫音扶男耕女織天下之大業也故古者分地而處之利田畆而事之是以業無不食之地國無乏作之民今縣官之多張苑囿公田池澤公家有鄣假之名而利歸權家三輔廹近於山河三輔黄圖曰三輔者謂主爵中尉及左右内史漢武帝改曰京兆尹左馮翊右扶風共治長安城中是為三輔地狹人衆四方並臻粟米薪菜不能相澹古贍字公田轉假桑榆菜菓不植地力不盡愚以為非先帝之開苑囿池籞音御可賦歸之於民縣官租稅而已假稅殊名其實一也夫音扶如是匹夫之力盡於南畆匹婦之力盡於麻枲音徙田野辟音闢麻枲音徙治則上下俱衍何困乏之有矣公孫鞅曰女事盡於内男事盡於外則入多矣吕氏春秋曰丈夫不織而衣婦人不耕而食男女貿功以長生此聖人之制也故敬時愛日非老不休非疾不息非死不舎賈生曰民不足而可治者自古及今未之嘗聞古之人曰一夫不耕或受之飢一女不織或受之寒生之有時而用之無度則物力必屈今驅民而歸之農皆著于本使天下各食其力末議游食之民轉而緣南畆則畜積足而人樂其所矣大夫黙然視其丞相去聲御史輕重第十四御史進曰昔太公封於營丘辟音闢草萊而居焉地薄人少於是通利末之道極女紅音工之巧是以鄰國交於齊財畜貨殖世為彊國管仲相去聲桓公襲先君之業行輕重之變南服彊楚而伯音霸諸侯齊世家曰武王已平商而王天下封師尚父於齊營丘東就國萊侯來伐與之争營丘營丘邉萊萊人夷也㑹紂之亂而周初定未能集逺方是以與太公爭國太公至國修政因其俗簡其禮通商工之業便魚塩之利而人民多歸齊齊為大國桓公之時管仲為大夫修齊國政連五家之兵設輕重魚塩之利以贍貧窮禄賢能齊人皆説七年諸侯㑹桓公於甄而桓公於是始覇焉貨殖傳曰太公望封於營丘人民寡於是太公勸其女功極技巧通魚鹽則人物歸之繦至而輻凑故齊冠帯衣履天下海岱之間歛袵而往朝焉其後齊中衰管子修之設輕重九府則桓公以霸九合諸侯一匡天下而管子氏亦有三歸位在陪臣富於列國之君是以齊富強至於威宣也今大夫各修太公桓管之術總一鹽鐵通山川之利而萬物殖是以縣官用饒足民不困乏本末並利上下俱足此籌計之所致非獨耕桑農業也文學曰禮義者國之基也而權利者政之殘也孔子曰能以禮讓為國乎何有伊尹太公以百里興其君桓公以千乗去聲之齊而不能至於王其所務非也故功名隳音灰壞而道不濟當此之時諸侯莫能以德而爭於公私故以權相傾今天下合為一家利末惡音汚欲行􅁋巧惡音汚欲施大夫君以心計册通作䇿國用食貨志曰桑𢎞羊以心計顔師古曰心計不用籌􅄸也構諸侯參以酒𣙜音較咸陽孔僅增以鹽鐵江充耕谷之等各以鋒銳言利末之事析秋毫可謂無間音諫矣非特管仲設九府徼音呌山海也平凖書曰東郭咸陽孔僅為大農丞領鹽鐵事而桑𢎞羊貴幸咸陽齊之大鬻鹽孔僅南陽大冶皆致産累千金故鄭當時進言之𢎞羊洛陽賈人之子以心計年十三侍中故三人言利事析秋毫矣食貨志曰太公為周立九府圜法太公退又行之于齊至管仲相桓公通輕重之權桓公遂用區區之齊合諸侯顯霸名顔師古曰周官太府玉府内府外府泉府天府職内職金職幣謂之九府皆掌財幣之官也然而國家衰耗城郭空虗故非崇仁義無以化民非力本農無以富邦也御史曰水有猵音篇獺音塔而池魚勞國有強禦而齊民消兵略訓曰畜池魚者必去猵獺養禽獸者必去豺狼故茂林之下無豐草大塊之間無美苗叢談曰髙山之巔無美木傷於多陽也大樹之下無美草傷於多隂也記曰髙山浚源不出草木松栢之地其土不肥夫音扶理國之道除穢鉏音鋤豪然後百姓均平各安其宇張廷尉論定律令明法以繩天下誅姦猾絶并兼之徒而強不凌弱衆不暴寡大夫各運籌册通作䇿逹國用籠天下鹽鐵諸利以排富商大賈音古買官贖罪損有餘補不足以齊黎民是以兵革東西征伐賦歛不増而用足夫音扶損益之事賢者所覩非衆人之所知也文學曰扁鵲撫息脉而知疾所由生陽氣盛則損乏而調隂寒氣盛則損乏而調陽是以氣脉調和而邪氣無所留矣扁鵲傳曰扁鵲過虢虢太子死扁鵲至虢宫門下問中庻子喜方者曰太子何病國中治穰過於衆事中庻子曰太子病血氣不時交錯而不得泄暴發於外則為中害精神不能止邪氣畜積而不得泄是以陽緩而隂急故暴蹷而死扁鵲曰其死何如時曰雞鳴至今曰收乎曰未也其死未能半日也言臣齊勃海越人也家在於鄭未嘗得望精光侍謁於前也聞太子不幸而死臣得生之中庶子曰先生得無誕之乎何以言太子可生也臣聞上古之時醫有俞跗治病不以湯液醴灑鑱石橋引案杌毒熨一撥見病之應因五臟之輸乃割皮解肌訣脉結筋搦髓腦揲荒𤓰幕前浣腸胃潄滌五藏練精易形先生之方能若是則太子可生也不能若是而欲生之曾不可以告咳嬰之兒終日扁鵲仰天歎曰夫子之為方也若以管窺天以郄視文越人之為方也不待切脉望色聼聲寫形言病之所在聞病之陽論得其隂聞病之隂論得其陽病應見於大表不出千里决者至衆不可曲止也子以吾言為不誠試入診太子當聞其耳鳴而􅈹張循其兩股以至於隂當尚温也中庶子聞扁鵲言目眩然而不瞚舌撟然而不下乃以扁鵲言入報虢君虢君聞之大驚出見扁鵲於中闕曰竊聞髙義之日乆矣然未嘗得拜謁於前也先生過小國幸而舉之偏國寡臣幸甚有先生則活無先生則棄捐填溝壑長終而不得反言未卒因􅌵唏服臆䰟精泄横流涕長􅏰忽忽承䀹悲不能自止容貎變更扁鵲曰若太子病所謂尸蹷者也夫以陽入隂中動胃繵緣中經維絡别下於三焦膀胱是以陽脉下遂隂脉上爭㑹氣閉而不通隂上而陽内行下内鼔而不起上外絶而不為使上有絶陽之絡下有破隂之紐破隂絶陽之色已廢脉亂故形静如死狀太子未死也夫以陽入隂支蘭藏者生以隂入陽支蘭藏者死凡此數事皆五藏蹷中之時暴作也良工取之拙者疑殆扁鵲乃使弟子子陽厲鍼砥石以取外三陽五㑹有間太子蘓乃使子豹為五分之熨以八减之齊和煑之以更熨兩脇下太子起坐更適隂陽但服湯二旬而復故夫音扶拙醫不知脉理之腠血氣之分妄刺而無益於疾傷肌膚而已矣今欲損有餘補不足富者益富貧者益貧矣嚴法任刑欲以禁暴止姦而姦猶不止意者非扁鵲之用鍼音箴石故衆人未得其職也王符曰凡療病者必知脉之虗實氣之所結然後為之方故疾可愈而壽可長也為國者必先知民之所苦禍之所起然後為之禁故姦可塞而國可安也御史曰周之建國也盖千八百諸侯其後強吞弱大兼小并為六國六國連兵結難去聲數百年内拒敵國外攘四夷由此觀之兵甲不休戰伐不乏軍旅外奉倉庫内實今以天下之富海内之財百郡之貢非特齊楚之畜趙魏之庫也計委量入雖急用之宜無乏絶之時顧大農等以術體躬稼則后稷之烈周紀曰周后稷名棄帝嚳之子也棄為兒時屹如巨人之志其游􅃧好種樹麻菽麻菽美遂好耕農相地之宜宜榖者稼穡焉民皆法則之帝堯聞之舉棄為農師天下得其利有功帝舜曰棄黎民始饑爾后稷播時百榖封棄於邰號曰后稷軍四出而用不繼非天之財少也用鍼音箴石調均有無補不足亦非也上大夫君與治粟都尉管領大農事炙刺稽滯開利百脉是以萬物流通而縣官富實當此之時四方征暴亂車甲之費克獲之賞皆澹古贍字大司農此皆扁鵲之力而鹽鐵之福也文學曰邉郡山居谷處隂陽不和寒凍裂地衝風飄鹵音魯沙石凝積地勢無所宜地形訓曰北方曰大𡨕曰寒澤北方有不釋之氷中國天地之中隂陽之際也地形訓曰中央四逹風氣之所通雨露之所㑹也日月經其南斗極出其北含衆和之氣産育庶物今去而侵邉多斥不毛寒苦之地是猶棄江臯河濱而田於嶺坂音反菹音疽澤也轉倉廩之委飛府庫之財以給邉民中國困於繇音遥役邊民苦於戍音絮禦力耕不便種糴無桑麻之利仰中國絲絮而後衣去聲之皮裘蒙毛曾不足盖形夏不失複音復重衣也冬不離去聲窟苦骨切土室也父子夫婦内藏於專室土圜之中中外空虗扁鵲何力而鹽鐵何福也未通第十五御史曰内郡人衆水泉薦草不能相澹古贍字地勢温濕不宜牛馬民蹠音隻耒而耕負擔而行勞罷音疲而寡功是以百姓貧苦而衣食不足老弱負輅於路而列卿大夫或乗牛車孝武皇帝平百越以為囿圃却羌胡以為􅁐囿是以珍怪異物充於後宮騊音陶駼音余駃音决騠音蹄實於外廐騊駼馬類也生北海駃騠俊馬也生七日而超其母匹夫莫不乗堅良而民間厭橘柚由此觀之邊郡之利亦饒矣而曰何福之有未通於計也文學曰禹平水土定九州四方各以土地所生貢獻足以充宫室供人主之欲膏壤萬里山川之利足以富百姓不待蠻貊之地逺方之物而用足五帝紀曰禹披九山通九澤决九河定九州各以其職來貢不失厥宜方五千里至於荒服食貨志曰禹平洪水定九州制土田各因所生逺近賦入貢棐楙遷有無萬國作乂徃者未伐胡越之時繇音遥賦省而民富足温衣飽食藏新食陳布帛充用牛馬成羣農夫以馬耕載而民莫不騎乗當此之時却走馬以糞老子德經曰天下有道却走馬以糞韓非子曰凡馬之所以大用者外供甲兵而内給􅁋奢也今有道之君外希用甲兵而内禁􅁋奢上不事馬於戰鬪逐北而民不以馬逺滛力唯田疇積力於田疇必且糞灌故曰天下有道却走馬以糞也許慎曰却止也糞田也止馬不以走但以田行至德之效也或曰國君無道則天下多事戎馬生於郊原國君有道則天下無事止走馬以糞田也其後師旅數音朔發戎馬不足牸音字牝入陣牸牝牛也凡獸育子曰牸牝畜母也故駒犢生於戰地六畜不育於家五榖不殖於野民不足於糟糠何橘柚之所厭傳去聲曰大軍之後累世不復老子曰師之所處荆棘生焉大軍之後必有凶年方今郡國田野有壟而不墾城郭有宇而不實邉郡何饒之有乎御史曰古者制田百歩為畆民井田而耕什而籍一義先公而後已民臣之職也詩曰雨我公田遂及我私孟子曰方里而井井九百畆其中為公田八家皆私百畆同養公田公事畢然後敢治私事所以别野人也先帝哀憐百姓之愁苦衣食不足制田二百四十歩而一畆率三十而稅一惰民不務田作饑寒及已固其理也其不耕而欲播不種而欲穫鹽鐵又何過乎文學曰什一而籍民之力也豐耗美惡與民共之民饉已不獨衍民衍已不獨饉故曰什一者天下之中正也田雖三十而以頃畆出稅樂歳粒米狼戾而寡取之凶年饑饉而必求足加之以口賦更繇音遥之役率一人之作中分其功農夫悉其所得或假貸而益之是以百姓疾耕力作而饑寒遂及已也築城者先厚其基而求其髙畜民者先厚其業而後求其澹古贍字老子曰貴必以賤為本髙必以下為基泰族訓曰城有基木有根根深即本固基美則上寧不益其厚而張其廣者毁不廣其基而增其髙者覆潘氏曰髙以下為基民以食為天正其末者端其本善其後者慎其先夫九土之宜弗任四人之務不一野有菜蔬之色民靡代耕之秩無儲畜以虞災徒望歳以自必三季之衰皆此物也論語曰百姓足君孰與不足乎御史曰古者諸侯爭強戰國並起甲兵不休民曠於田疇什一而藉不違其職今賴陛下神靈甲兵不動乆矣然則民不齊出於南畆以口率被墾田而不足空倉廩而賑貧乏寖益日甚是以愈惰而仰利縣官也食貨志曰商賈以幣之變多積貨逐利於是公卿言郡國頗被災害貧民無産業者募徙廣饒之地陛下損膳省用出禁錢以振元元寛貸而民不齊出南畆商賈滋衆貧者畜積無有皆仰縣官異時筭軺車賈人之緡錢皆有差請筭如故為斯君者亦病矣反以身勞民民猶背恩棄義而逺流亡避匿上公之事民相倣傚田地日蕪租賦不入抵扞縣官君雖欲足誰與之足乎文學曰樹木數音朔徙則􅖖音委蟲獸徙居則壊故代馬依北風飛鳥翔故巢莫不哀其生原道訓曰今夫徙樹者失其隂陽之性則莫不枯槁故橘樹之江北則化而為枳鴝鵒不過濟貈渡汶而死形性不易勢居不可移也伍子胥曰胡馬望北風而立越燕向日而熈誰不愛其所近悲其所思者乎韓嬰曰詩云代馬依北風飛鳥棲故巢皆不忘本之謂也由此觀之民非利避上公之事而樂流亡也徃者軍陣數音朔起用度不足以貲音資徵賦常取給見民田家又被其勞故不齊出於南畆也大抵逋流皆在大家吏正畏憚不敢督責刻急細民細民不堪流亡逺去中家為之色出後亡者為先亡者服事録民數創音瘡於惡吏故相去尤甚而就少愈多傳去聲曰政寛者民死之政急者父子離韓嬰曰治國者譬若乎張琴然大絃急則小絃絶矣故急轡䘖者非千里之御也是以田地日荒城郭空虚夫音扶牧民之道除其所疾適其所安安而不擾使而不勞是以百姓勸業而樂公賦若此則君無賑於民民無利於上上下交議而頌聲作故取而民不厭役而民不苦靈臺之詩非或使之民自為之若斯則君何不足之有乎賈生曰文王志之所在意之所欲百姓不愛其死不憚其勞從之如集詩曰經始靈臺庻民攻之不日成之經始勿亟庶民子來文王有志為臺近規之民聞之者麏裹而至問業而作之日日以衆命其臺曰靈臺命其囿曰靈囿謂其沼曰靈沼愛敬之至也詩曰王在靈囿麀鹿攸伏麀鹿濯濯白鳥翯翯王在靈沼於仭魚躍文王之澤下被禽獸洽于魚鱉咸若攸樂而况士民乎修文篇曰積恩為愛積愛為仁積仁為靈靈臺之所以為靈者積仁也神靈著天地之本而為萬物之始也是故文王始接民以仁而天下莫不仁焉文徳之至也御史曰古者十五入太學與去聲小役二十冠去聲而成人與去聲戎事五十以上血脉溢剛曰艾壯詩曰方叔元老克壯其猶故商師若荼周師若烏荼苦茶也烏燕烏也白項而羣飛者也鄒陽曰秦信左右而殺周用烏集而王今陛下哀憐百姓寛力役之政二十三始賦五十六而免所以輔耆壯而息老艾也丁者治其田里老者修其塘園儉力趨時無饑寒之患不治其家而訟縣官亦悖矣文學曰十九年已下為殤音傷未成人也二十而冠去聲三十而娶可以從戎事五十已上曰艾老杖於鄉不從力役所以扶不足而息髙年也曲禮曰人生十年曰幼學二十曰弱冠三十曰壯有室四十曰強而仕五十曰艾服官政七十曰老而傳八十九十曰耄七年曰悼悼與耄雖有罪不加刑百年曰期頥王制曰五十不從力政六十不與服戎七十不與賓客之事八十齊䘮之事弗及也鄉飲酒之禮耆老異饌所以優耆耄而明養老也鄉飲酒義曰鄉飲酒之禮六十者坐五十者立侍以聼政役所以明尊長也六十者三豆七十者四豆八十者五豆九十者六豆所以明養老也民知尊長養老而後乃能入孝弟民入孝弟出尊長養老而後成教成教而後國可安也君子之所謂孝者非家至而日見之也合諸鄉射教之鄉飲酒之禮而孝弟之行立矣故老者非肉不飽非帛不煖非杖不行王制曰五十異粻六十宿肉七十貳膳八十常珍九十飲食不離寝膳飲從於遊可也五十始衰六十非肉不飽七十非帛不煖八十非人不煖九十雖得人不煖矣五十杖於家六十杖於鄉七十杖於國八十杖於朝九十者天子欲有問焉則就其室以珍從今五十已上至六十與子孫服輓輸並給徭音遥役非養老之意也古有大䘮者君三年不呼其門通其孝道遂其哀戚之心也君子之所重而自盡者其惟親之䘮乎王制曰八十者一子不從政九十者其家不從政廢疾非人不養者一人不從政父母之䘮三年不從政齊衰大功之䘮三月不從政將徙於諸侯三月不從政自諸侯來徙家期不從政陳忠曰夫父母於子同氣異息一體而分三年乃免於懐抱先聖縁人情而著其節制服二十五月是以春秋臣有大䘮君三年不呼其門曾子曰吾聞諸夫子人未有自致者也必也親䘮乎周公抱成王聼天下恩塞海内澤被四表矧惟南面含仁保德靡不得其所春秋元命苞曰文王造之而未遂武王遂之而未成周公旦抱少主而成之故曰成王尸子曰昔者武王崩成王幼周公旦踐東宫履乗石假為天子十年蒙恬曰昔周成王初立未離襁褓周公旦負王以朝卒定天下越絶書曰周公以盛德武王封周公使傅相成王成王少周公臣事之當是之時賞賜不加於無功刑罰不加於無罪天下家給人足米麥茂美使人以時說之以禮上順天地澤及夷狄君道篇曰周公踐天子之位布德施恵逺而逾明十三牧方三人出舉逺方之民有饑寒而不得衣食者有獄訟而失職者有賢才而不舉者以入告乎天子天子於其君之朝也揖而進之曰意朕之政教有不得者歟何其所臨之民有飢寒不得衣食者有獄訟而失職者有賢才而不舉者也其君歸也乃召其國大夫告周天子之言百姓聞之皆喜曰此誠天子也何居之深逺而見我之明也豈可欺哉故牧者所以辟四門明四目逹四聪也是以近者親之逺者安之詩曰柔逺能邇以定我王此之謂矣詩云夙夜基命宥宻陛下富於春秋委任大臣公卿輔政政教未均故庶人議也御史黙不答也}
