  - {type: line-break, offset: 9, content: '', id: KR3a0006_WYG_010-1a04}
  - {type: indent, offset: 9, content: 　　　　　　　　　　　　, id: KR3a0006_krp_010-bkkind6}
  - {type: indent, offset: 10, content: 　, id: KR3a0006_krp_010-bkkind7}
  - {type: variant, offset: 10, length: 0, content: '', SBCK: 王知其所無利以爲役不可數行而權不可乆}
  - {type: variant, offset: 11, length: 0, content: '', SBCK: 也故詔公卿大夫賢良文學所以復枉興㣲}
  - {type: variant, offset: 12, length: 2, content: 象註, SBCK: 路公卿宜思百姓之急匈奴之害縁聖主之心定安平之業今乃留心於末計雖本議不順上意未爲盡於忠也大夫曰􅀄貳師不克宛而還也議者故使人主不遂忿則西域皆瓦解而附於胡胡得衆國而益强先帝絕竒聽行武威還襲宛宛舉國以降効其器物致其寶馬烏孫之屬駭膽請爲臣妾匈奴失魄奔走遁逃雖未盡服遠處寒苦墝埆之地壮者死於祁連天山其􅀌未復故群臣議以爲匈奴困於漢兵折趐傷翼可遂擊服會先帝棄群臣以故匈奴不革譬如爲山未成一簣而止度功業而無斷成之理是棄與胡而資强敵也輟幾沮成爲主計􅀂斯亦未可謂盡忠也文學曰有司言外國之事議者皆激一時之權不慮其後張騫言大宛之天馬汗血安息之真玉大鳥縣官旣聞如􅅴水焉乃大興師伐宛歴數期而後克之夫萬里而攻人之國兵不戰而物故過半雖破宛得寶馬非計也當此之時將卒方赤靣而事四夷師旅相望郡國並發􅀺人困苦姦僞萌生盜賊並起守尉不能禁城邑不能止然後遣上大夫衣繡衣以興擊之當此時百姓元元莫必其命故山東豪傑頗有異心頼先帝聖靈斐然其咎皆在於欲畢匈奴而遠幾也爲主計􅀂此可謂忠乎世務第四十七大夫曰諸生妄言議者令可詳用無徒守椎車之語滑稽而不可修夫漢之有匈奴譬􅀂木之有蠧如人有疾不治則寖以深故謀臣以爲擊奪以困極之諸生言以德懷之此有其語而不可行也諸生上無以似三王下無以似近秦令有司可舉而行當世安蒸庻而寜邊境者乎文學曰昔齊􅁊公内附百姓外綏諸侯存亡接絶而天下從風其後德􅉛行衰葵丘少會振而矜之叛者九國春秋刺其不崇德而崇力也故任德則强楚告服遠國不召而自至任力則近者不親小國不附此其效也誠上觀三王之所以昌下論秦之所以亡中述齊􅁊所以興去武行文廢力尚德罷關梁除障塞以仁義導之則北垂無冦虜之憂中國無干戈之事矣大夫曰事不豫辯不可以應卒内無備不可以禦敵詩云誥爾民人謹爾侯度用戒不虞故有文事必有武備昔宋襄公倍楚而不備以取大辱焉身執囚而國幾亡故雖有誠信之心不知權變危亡之道也春秋不與夷狄中國爲禮爲其無信也匈奴貪狼因時而動乗可而發颷舉電至而欲以誠信之心金帛之寶而信無義之詐是猶親蹠蹻而扶猛虎也文學曰春秋王者無敵言其仁厚其德美天下賔服莫敢受交也德行延及方外舟車所臻足迹所及莫不􅀍澤蠻貊異國重譯自至方此之時天下和同君臣一德外内相信上下輯睦兵設而不試干戈閉藏而不用老子曰兕無所用其角螫蟲無所輸其毒故君仁莫不仁君義莫不義世安得跖蹻而親之乎大夫曰布心腹質情素信誠内感義形乎色宋華元楚司馬子反之相覩也符契内合誠有以相信也今匈奴挾不信之心懷不測之詐見利如前乗便而起潜進市側以襲無備是猶措重寶於道路而莫之守也求其不亡何可得乎文學曰誠信著乎天下醇德流乎四海則近者歌謳而樂之遠者執禽而朝之故正近者不以威來遠者不以武德義修而任賢良也故民之於事辭佚而就勞於財也辭多而就寡上下交讓道路鴈行方此之時賤貨而貴德重義而輕利賞之不􅀼何寶之守也}
