  - {type: variant, offset: 1226, length: 368, content: 夏紀曰當帝堯之時鴻水㴞天浩浩懐山襄陵下民其憂堯求能治水者群臣四岳皆曰鯀可堯曰鯀為人負命毁族不可四岳曰等之未有賢於鯀者願帝試之於是堯聽四岳用鯀治水九年而水不息功用不成於是帝堯乃求人更得舜舜登用攝行天子之政廵狩行視鯀之治水無狀乃殛鯀於羽山以死天下皆以舜之誅為是於是舜舉鯀子禹而使續鯀之業堯崩帝舜問四岳曰有能成美堯之事者使居官皆曰伯禹為司空可成美堯之功舜曰嗟然命禹汝平水土禹拜稽首譲於契后稷咎繇舜曰汝其往視爾事矣禹傷先人父鯀功之不成受誅乃勞身焦思居外十三年過家門不敢入左傳曰初臼季使過兾見兾缺耨其妻饁之敬相待如賓與之歸言諸文公曰敬德之聚也能敬必有徳徳以治民君請用之臣聞之出門如賓承事如祭仁之則也公曰其父有罪可乎對曰舜之罪也殛鯀其舉也興禹管敬仲桓之賊也實相以濟康誥曰父不慈子不祗兄不友弟不共不相及也詩曰采葑采菲無以下體君取節焉可也文公以為下軍大, SBCK: ''}
