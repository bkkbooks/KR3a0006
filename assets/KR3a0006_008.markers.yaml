  - {type: variant, offset: 15, length: 1, content: 興, WYG: 之賦禄薄而吏非員者衆在位者貪於財産規奪官民之利則殖貨無厭奪民之利不}
  - {type: variant, offset: 15, length: 1, content: 興, krp: 之賦禄薄而吏非員者衆在位者貪於財産規奪官民之利則殖貨無厭奪民之利不}
  - {type: variant, offset: 17, length: 11, content: 來修好結和親所聘遺單于, SBCK: 拙矣又多求謝爲吏旣多不良矣又侵漁百姓長吏厲諸小吏小吏厲諸百姓故不患擇之不熟而患求之與得異也不患其不足也患其貪而無厭也賢良曰古之制爵禄也卿大夫足以潤賢厚士足以優身及黨庻人爲官}
  - {type: variant, offset: 17, length: 4, content: 來修好結, WYG: 為耻是以清節毁傷公義損缺富者比公室貧者匱朝夕非所為濟俗也語曰貨賂音路下流猶水之赴下不竭不止今大川江河飲巨海巨海受之而欲谿谷之讓流潦百官之廉不可得也夫音扶欲影正者端其表欲下廉者先之身曾子曰響不辭聲鑑不辭形君子正一而萬物皆成夫行非為影也而影随之呼非為響也而響}
