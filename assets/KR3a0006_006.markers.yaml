  - {type: variant, offset: 283, length: 2240, content: 於澤雜毛不取今富者逐驅殲罔罝掩捕麑鷇躭湎沉酒鋪百川鮮羔䍮幾胎肩皮黃口春鵝秋雛冬葵溫韭浚茈蓼蘇蕈䓴耳菜毛果蟲貉古者采椽茅茨陶桴復冗穴足禦寒暑蔽風雨而已及其後世采椽不斲茅茨不剪無斲削之事磨礱之功大夫達棱楹士穎首庶人斧成木構而已今富者井幹增梁雕文檻楯琧㡪壁飾古者衣服不中制器械不中用不粥於市今民間雕琢不中之物刻畫玩好無用之器玄黃雜青五色繡衣戲弄蒲人雜婦百獸馬戲鬭虎唐銻追人奇蟲胡妲古者諸侯不秣馬天子有命以車就牧庶人之乘馬者足以代其勞而已故行則服枙止則就犁今富者連車列騎驂貳輜軿中者微輿短轂䋣髦掌蹄夫一馬伏櫪當中家六口之食亡丁男一人之事古者庶人耋老而後衣絲其餘則麻枲而已故命曰布衣及其後則絲裏枲表直領無褘袍合不緣夫羅紈文繡者人君后妃之服也繭紬縑練者婚姻之嘉飾也是以文繒薄織不粥於市今富者縟繡羅紈中者素綈冰錦常民而被后妃之服褻人而居婚姻之飾夫紈素之賈倍縑縑之用倍紈也古者椎車無柔棧輿無植及其後木軨不衣長轂數幅蒲薦苙蓋蓋無漆絲之飾大夫士則單複木具盤韋柔革常民漆輿大軨蜀輪今庶人富者銀黃華左搔結綏韜杠中者錯鑣塗采珥靳飛軨古者鹿裘皮冒蹄足不去及其後大夫士狐貉縫腋羔麑豹袪庶人則毛絝衳彤羝襆皮䙏今富者鼲鼦狐白鳧翁中者罽衣金縷燕䶅代黃古者庶人賤騎繩控革鞮皮薦而已及其後革鞍氂成鐵鑣不飾今富者耳銀鑷䪉黃金琅勒罽繡弇汗華䩸明鮮中者漆韋紹系采畫暴乾古者汙尊抔飲蓋無爵觴樽俎及其後庶人器用即竹柳陶匏而已唯瑚璉觴豆而後彫文彤漆今富者銀口黃耳金罍玉鍾中者野王紵器金錯蜀杯夫一文杯得銅杯十賈賤而用不殊箕子之譏始在天子今在匹夫古者燔黍食稗而捭豚以相饗其後鄉人飲酒老者重豆少者立食一醬一肉旅飲而已及其後賓婚相召則豆羹白飯綦膾熟肉今民間酒食殽旅重疊燔炙滿案臑鱉膾鯉麑卵鶉鴳橙枸鮐醴醢醯眾物雜味古者庶人春夏耕耘秋冬收藏昏晨力作夜以繼日詩云晝爾于茅宵爾索綯亟其乘屋其始播百穀非膢臘不休息非祭祀無酒肉今賓昏酒食接連相因析酲什半棄事相隨慮無乏日古者庶人糲食藜藿非鄉飲酒膢臘祭祀無酒肉故諸侯無故不殺牛羊大夫士無故不殺犬豕今閭巷縣佰阡伯屠沽無故烹殺相聚野外負粟而往挈肉而歸夫一豕之肉得中年之收十五斗粟當丁男半月之食古者庶人魚菽之祭春秋脩其祖祠士一廟大夫三以時有事于五祀蓋無出門之祭今富者祈名嶽望山川椎牛擊鼓戲倡儛像中者南居當路水上雲臺屠羊殺狗鼓瑟吹笙貧者雞豕五芳衛保散臘傾蓋社場古者德行求福故祭祀而寬仁義求吉故卜筮而希今世俗寬於行而求於鬼怠於禮而篤於祭嫚親而貴勢至妄而信日聽訑言而幸得出實物而享虛福古者君子夙夜孳孳思其德小人晨昏孜孜思其力故君子不素飡小人不空食今世俗飾偽行詐為民巫祝以取釐謝堅頟健舌或以成業致富故憚事之人釋本相學是以街巷有巫閭里有祝古者無杠樠之寢床栘之案及其後世庶人即采木之杠牒樺之樠士不斤成大夫葦莞而已今富者黼繡帷幄塗屏錯跗中者錦綈高張采畫丹漆古者皮毛草蓐無茵席之加旃蒻之美及其後大夫士復薦草緣蒲平單莞庶人即草蓐索經單藺蘧蒢而已今富者繡茵翟柔蒲子露床中者𤡉皮代旃闒坐平莞古者不粥飪不市食及其後則有屠沽沽酒市脯魚鹽而已今熟食徧列殽施成市作業墮怠食必趣時楊豚韭卵狗䐲馬朘煎魚切肝羊淹雞寒挏馬酪酒蹇捕胃脯胹羔豆賜鷇膹鴈羹臭鮑甘瓠熟粱貊炙古者土鼓凷枹擊木拊石以盡其歡及其後卿大夫有管磬士有琴瑟往者民間酒會各以黨俗彈箏鼓缶而已無要妙之音變羽之轉今富者鐘鼓五樂歌兒數曹中者鳴竽調瑟鄭儛趙謳古者瓦棺容尸木板堲周足以收形骸藏髮齒而已及其後桐棺不衣采椁不斲今富者繡牆題湊中者梓棺楩椁貧者畫荒衣袍繒囊緹橐古者明器有形無實示民不可用也及其後則有醯醢之藏桐馬偶人彌祭其物不備今厚資多藏器用如生人郡國繇吏素桑楺偶車櫓輪匹夫無貌領桐人衣紈綈古者不封不樹反虞祭於寢無壇宇之居廟堂之位及其後則封之庶人之墳半仞其高可隱今富者積土成山列樹成林臺榭連閣集觀增樓中者祠堂屏閤垣闕罘罳古者鄰有喪舂不相杵巷不歌謠孔子食於有喪者之側未嘗飽也子於是日哭則不歌今俗因人之喪以求酒肉幸與小坐而責辨歌舞俳優連笑伎戲古者男女之際尚矣嫁娶之服未之以記及虞夏之後蓋表布內絲骨笄象珥封君夫人加錦尚褧而已今富者皮衣朱貉繁露環佩中者長裾交褘璧瑞簪珥古者事生盡愛送死盡哀故聖人為制節非虛加之今生不能致其愛敬死以奢侈相高雖無哀戚之心而厚葬重幣者則稱以為孝顯名立於世光榮著於俗故黎民相慕效至於發屋賣業古者夫婦之好一男一女而成家室之道及後士一妾大夫二諸侯有姪娣九女而已今諸侯百數卿大夫十數中者侍御富者盈室是以女或曠怨失時男或放死無匹古者凶年不備豐年補敗仍舊貫而不改作今工異變而吏殊心壞敗成功以匿厥意意極乎功業務存乎面目積功以市譽不恤民之急田野不辟而飾亭落邑居丘墟而高其郭古者不以人力徇於禽獸不奪民財以養狗馬是以財衍而力有餘今猛獸奇蟲不可以耕耘而令當耕耘者養食之百姓或短褐不完而犬馬衣文繡黎民或糟糠不接而禽獸食粱肉古者人君敬事愛下使民以時天子以天下為家臣妾各以其時供公職古今之通義也今縣官多畜奴婢坐稟衣食私作產業為姦利力作不盡縣官失實百姓或無斗筲之儲官奴累百金黎民昏晨不釋事奴婢垂拱遨遊也古者親近而䟽遠貴所同而賤非類不賞無功不養無用今蠻貊無功縣官居肆廣屋大第坐稟衣食百姓或旦暮不贍蠻夷或厭酒肉黎民泮汗力作今蠻夷交脛肆踞古者庶人麤菲草芰縮絲尚韋而已及其後則綦下不借鞔鞮革舄今富者革中名工輕靡使容紈裏紃下越端縱緣中者鄧里間作蒯苴蠢豎婢妾韋沓絲履走者茸芰絇綰古聖人勞躬養神節欲適情尊天敬地履德行仁是以上天歆焉永其世而豐其年故堯秀眉高彩享國百載及秦始皇覽怪迂信禨祥使盧生求羡門高徐市等入海求不死之藥, SBCK: ''}
