  - {type: variant, offset: 1392, length: 3, content: 怨此秦, SBCK: 身忘禍也其惡勞人若斯之急安能黙乎詩云憂心如惔不敢戯談孔子栖栖疾固也墨子遑遑閔世也大夫黙然丞相曰願聞散不足賢良曰宮室輿馬衣服器械喪􅀕食飲聲色玩好人情}
  - {type: punctuation, offset: 1393, content: 。, id: KR3a0006_tls_007-bkkpn326}
  - {type: 'tls:seg', offset: 1393, content: '', id: KR3a0006_tls_007-14a.15}
  - {type: variant, offset: 1397, length: 0, content: '', SBCK: 不能巳也故聖人爲之制度}
  - {type: variant, offset: 1398, length: 1, content: 失, SBCK: 防之間者士大夫務於權利忌於禮義故百姓倣傚頗踰制度今故陳之曰古者􅂖物菜果不時不食鳥獸魚鼈不中殺不食故繳罔不入於澤雜毛不取今冨者逐驅殱罔􅆯掩捕麑鷇躭􅊺沉猶鋪百川鮮羔䍮􅶢胎扁皮黄口春鵝秋雛冬葵温非浚茈蓼蘇豐奕耳菜毛果蟲貉古者采椽茅茨陶桴復冗足禦寒暑蔽風雨而巳及其後世采椽不斵茅茨不剪無斵削之事磨礱之功大夫逹棱楹士潁首庻人斧成木構而巳今冨者井幹増梁雕文檻脩憂壁飾古者衣服不中制器械不中用不粥於市今}
  - {type: page-break, offset: 1398, content: '', id: KR3a0006_SBCK_006-2a}
  - {type: page-break, offset: 1398, content: '', id: KR3a0006_SBCK_006-2b}
  - {type: variant, offset: 1400, length: 4, content: 心隕社稷, SBCK: 間雕琢不中之物刻畫無用之器玩好玄黄雜青五色繡衣􅃧弄蒲人雜婦百獸馬􅃧􅃲虎唐銻追人竒蟲胡妲古者諸侯不秣馬天子有命以車就牧庻人之乗者馬足以代其勞而巳故行則服枙止則就犂今冨者連車列􅀐驂貳輜軿中者微輿短轂煩尾掌蹄夫一馬伏􅇫當中家六口之食亡丁男一人之事古者庻人耋老而後衣絲其餘則麻枲而巳故命曰布衣及其後則絲裏枲表直領無禕􅂁合不縁夫羅紈文繡者人君后妃之服也繭紬縑練者㛰姻之嘉飾也是以文繒薄織不粥於市今冨者縟繡羅紈中者素綈錦冰常民而􅀍后妃之服褻人而居㛰姻之飾夫紈素之賈倍縑縑之用倍紈}
  - {type: page-break, offset: 1400, content: '', id: KR3a0006_SBCK_006-3a}
