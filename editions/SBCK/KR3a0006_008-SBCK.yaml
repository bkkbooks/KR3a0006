body:
  text: 疾貪第三十三大夫曰然爲醫以拙矣又多求謝爲吏旣多不良矣又侵漁百姓長吏厲諸小吏小吏厲諸百姓故不患擇之不熟而患求之與得異也不患其不足也患其貪而無厭也賢良曰古之制爵禄也卿大夫足以潤賢厚士足以優身及黨庻人爲官者足以代其耕而食其禄今小吏禄薄郡國繇役遠至三輔粟米貴不足相贍常居則匱於衣食有故則賣畜粥業非徒是也繇吏相遣官庭攝追小計權吏行施乞貸長吏侵漁上府下求之縣縣求之鄕鄕安取之哉語曰貨賂下流猶水之赴下不竭不止今大川江河飮巨海臣海受之而欲谿谷之譲流潦百官之廉不可得也夫欲影正者端其表欲下廉者先之身故貪鄙在率不在下教訓在政不在民也大夫曰賢不肖有質而貪鄙有性君子内潔巳而不能純教於彼故周公非不正管蔡之邪子産非不正鄧晳之僞也夫内不從父兄之教外不畏刑法之罪周公子産不能化必也今一二則責之有司有司豈能􅅞其手足而使之無爲非哉賢良曰駟馬不馴御者之過也百姓不治有司之罪也春秋刺譏不及庻人責其率也故古者大夫將臨刑聲色不御刑以當矣猶三巡而嗟嘆之其耻不能以化而傷其不全也政教闇而不著百姓顛蹶而不扶猶赤子臨井焉聽其入也􅀂此則何以爲民父毋故君子急於教緩於刑刑一而正百殺一而慎萬是以周公誅管蔡而子産誅鄧晳也刑誅一施民遵禮義矣夫上之化下􅀂風之靡草無不從教何一一而縳之也後刑第三十四大夫曰古之君子善善而惡惡人君不畜惡民農夫不畜無用之苗無用之苗苗之害也無用之民民之賊也鉏一害而衆苗成刑一惡而萬民悅雖周公孔子不能釋刑而用惡家之有鉏子器皿不居况鉏民乎民者教於愛而聽刑故刑所以正民鉏所以别苗也賢良曰古者篤教以導民明辟以正刑刑之於治猶䇿之於御也良工不能無䇿而御有䇿而勿用聖人假法以成敎敎成而刑不施故威厲而不殺刑設而不犯今廢其紀綱而不能張壞其禮義而不能防民䧟於罔從而獵之以刑是猶開其䦨牢發以毒矢也不盡不止曾子曰上失其道民散乆矣如得其情即哀矜而勿喜夫不傷民之不治而伐巳之能得姦猶弋者覩鳥獸挂罻羅而喜也今天下之􅀍誅者不必有管蔡之邪鄧晳之僞恐苗盡而不别民欺而不治也孔子曰人而不仁疾之巳甚亂也故民亂反之政政亂反之身身正而天下定是以君子嘉善而矜不能恩及刑人德潤窮夫施惠悦爾行刑不樂也授時第三十五大夫曰共其地居是世也非有災害疾疫獨以貧窮非惰則奢也無竒業旁入而猶以冨給非儉則力也今日施惠悅爾行刑不樂則是閔無行之人而養惰奢之民也故妄予不爲惠惠惡者不爲仁賢良曰三代之盛無亂萌敎也夏商之季世無順民俗也是以王者設庠序明教化以防道其民及政教之洽性仁而喻善故禮義立則耕者讓於野禮義壞則君子爭於朝人爭則亂亂則天下不均故或貧或富富則仁生贍則民爭止昏暮叩人門戸求水火貪夫不恡何則所饒也夫爲政而使菽粟如水火民安有不仁者乎大夫曰􅀶戯馳逐之徒皆富人子弟非不足者也故民饒則僣侈冨則驕奢坐而委蛇起而爲非未見其仁也夫居事不力用財不節雖有財如水火窮乏可立而待也有民不畜有司雖助之耕織其能足之乎賢良曰周公之相成王也百姓饒樂國無窮乏人非代之耕織也易其田疇薄其税歛則民冨矣上以奉君親下無饑寒之憂則敎可成也語曰既富矣又何加焉曰教之以德齊之以禮則民從義而從善莫不入孝出悌夫何奢侈􅁀慢之有管子曰倉廩實而知禮節百姓足而知榮辱故民易與適禮難與適道大夫曰縣官之於百姓􅀂慈父之於子也忠焉能勿誨乎愛之而勿勞乎故春親耕以勸農賑貸以贍不足通滀水出輕繫使民務時也蒙恩被澤而至今猶以貧困其難與適道􅀂是夫賢良曰古者春省耕以􅀘不足秋省歛以助不給民勤於財則貢賦省民勤於力則功業牢爲民愛力不奪須􅁷故召伯聽斷於􅅴棠之下爲妨農業之務也今時雨澍澤種懸而不得播秋稼零落乎野而不得收田疇赤地而停落成市發春而後懸靑幡而策土牛殆非明主勸耕稼之意而春令之所謂也水旱第三十六大夫曰禹湯聖主后稷伊尹賢相也而有水旱之災水旱天之所爲饑穰隂陽之運也非人力故太歲之數在陽爲旱在隂爲水六歲一饑十二歲一荒天道然殆非獨有司之罪也賢良曰古者政有德則隂陽調星辰理風雨時故循行於内聲聞於外爲善於下福應於天周公載紀而天下太平國無夭傷歲無荒年當此之時雨不破塊風不鳴條旬而一雨雨必以夜無丘陵高下皆熟詩曰有渰萋萋興雨祁祁今不省其所然而曰隂陽之運也非所聞也孟子曰野有餓殍不知收也狗豕食人食不知檢也爲民父母民饑而死則曰非我也歲也何異乎以刃殺之則曰非我也兵也方今之務在除饑寒之患罷鹽鐡退權利分土地趣本業養桑麻盡地力也寡功節用則民自富如是則水旱不能憂凶年不能累也大夫曰議者貴其辭約而指明可於衆人之聽不至繁文稠辭多言害有司化俗之計而家人語陶朱爲生本末異徑一家數事而治生之道乃備今縣官鑄農器使民務本不營於末則無饑寒之累鹽鐡何害而罷賢良曰農天下之大業也鐡器民之大用也器用便利則用力少而得作多農夫樂事勸功用不具則田疇荒榖不殖用力鮮功自半器便與不便其功相什而倍也縣官鼓鑄鐡器大抵多爲大器務應員程不給民用民用鈍弊割草不痛是以農夫作劇得􅀗者少百姓苦之矣大夫曰卒徒工匠以縣官日作公事財用饒器用備家人合㑹􅄶於日而勤於用鐡力不銷鍊堅柔不和故有司請􅄣鹽鐡一其用平其賈以便百姓公私雖虞夏之爲治不易於此吏明其敎工致其事則剛柔和器用便此則百姓何苦而農夫何疾賢良曰卒徒工匠故民得占租鼓鑄煮鹽之時鹽與五榖同賈器和利而中用今縣官作鐡器多苦惡用費不省卒徒煩而力作不盡家人相一父子戮力各務爲善器器不善者不集農事急輓運􅄛之阡陌之間民相與市買得以財貨五榖新弊易貨或時貰民不棄作業置田器各得所欲更繇省約縣官以徒復作繕治道橋諸發民便之今總其原一其賈器多堅䃘善惡無所擇吏數不在器難得家人不能多儲多儲則鎮生棄膏􅃾之日遠市田器則後良時鹽鐡賈貴百姓不便貧民或木耕手耨土耰啖食鐡官賣器不售或頗賦與民卒徒作不中呈時命助之發徵無限更繇以均劇故百姓疾苦之古者千室之邑百乗之家陶冶工商四民之求足以相更故農民不離畦畝而足乎田器工人不斬伐而足乎陶冶不耕田而足乎粟米百姓各得其便而上無事焉是以王者務本不作末去炫燿除雕琢湛民以禮示民以樸是以百姓務本不營於末鹽鐡論卷第六鹽鐡論卷第七崇禮第三十七備胡第三十八執務第三十九能言第四十鹽鐡取下四十一擊之第四十二崇禮第三十七大夫曰飾几杖脩樽爼爲賔非爲主也炫燿竒怪所以陳四夷非爲民也夫家人有客尚有倡優竒變之樂而况縣官乎故列羽旄陳戎馬以示威武竒蟲珍怪所以示懷廣遠明德遠國莫不至也賢良曰王者崇禮施德上仁義而賤怪力故聖人絕而不言孔子曰言忠信行篤敬雖蠻貊之􅀖不可棄也今萬方絕國之君奉䞇獻者懷天子之盛德而欲觀中國之禮儀故設明堂辟雍以示之揚于戚昭雅頌以風之今乃玩好不用之器竒蟲不畜之獸角抵諸戯炫燿之物陳夸之殆與周公之待遠方殊昔周公處謙以卑士執禮以治下天下辭越裳之贄見恭讓之禮旣與入文王之廟是見大孝之禮也目覩威儀干戚之容耳聽清歌雅頌之聲心充至德欣然以歸此四夷所以慕義内附非重譯狄鞮來觀猛獸熊羆也夫犀􅁚兕虎􅀯夷之所多也騾驢馲駞北狄之常畜也中國所鮮外國賤之南越以孔雀珥門户崐山之旁以玉璞抵烏鵲今貴人之所賤珍人之所饒非所以厚中國明盛德也隋和之名寶也而不能安危存亡故喻德示威惟賢臣良相不在犬馬珍怪是以聖王以賢爲寶不以珠玉爲寶昔晏子修之罇爼之間而折衝乎千里不能者雖隋和滿篋無益於存亡大夫曰晏子相齊三君崔慶無道刼其君亂其國靈公同圍莊公弑死景公之時晉人來攻取埀都舉臨菑邉邑削城郭焚宫室隳寶器盡何衝之所能折乎由此觀之賢良所言賢人爲寶則損益無輕重也賢良曰管仲去魯入齊齊覇魯削非恃其衆而歸齊也伍子胥挾􅃓干闔閭破楚入郢非􅀒其兵而適吳也故賢者所在國重所去國輕楚有子玉得臣文公側席虞有宫之竒晉獻不􅄰夫臣所在辟除開塞者亦遠矣故春秋曰山有虎豹葵藿爲之不採國有賢士邉境爲之不害也備胡第三十八大夫曰鄙語曰賢者容不辱以世俗言之鄕曲有桀人尚辟之今明天子在上匈奴公爲㓂侵擾邉境是仁義犯而藜藿不採昔狄人侵太王匡人畏孔子故不仁者仁之賊也是以縣官厲武以討不義設機械以備不仁賢良曰匈奴處沙漠之中生不食之地天所賤而棄之無壇宇之居男女之别以廣野爲閭里以穹廬爲家室衣皮蒙毛食肉飮血會市行牧豎居如中國之麋鹿耳好事之臣求其義責之禮使中國干戈至今未息萬里設備此兎􅆯之所刺故小人非公侯腹心干城也大夫曰天子者天下之父母也四方之衆其義莫不願爲臣妾然猶修城郭設關梁厲武士備衞於宫室所以遠折難而備萬方者也今匈奴未臣雖無事欲釋備如之何賢良曰吳王所以見禽於越者以其越近而􅁜遠也秦所以亡者以外備胡越而内亡其政也夫用軍於外政敗於内備爲所患增主所憂故人主得其道則遐邇潜行而歸之文王是也不得其道則臣妾爲冦秦王是也夫文衰則武勝德盛則備寡大夫曰往者四夷俱强並爲冦虐朝鮮踰徼刼燕之東地東越東海略浙江之􅀯􅀯越内侵滑服令氏􅁄人冉駹嶲唐昆明之屬擾隴西巴蜀今三垂巳平唯北邉未定夫一舉則匈奴中外震懼釋備而何寡也賢良曰古者君子立仁修義以綏其民故邇者習善遠者順之是以孔子仕於魯前仕三月及齊平後仕三月及鄭平務以德安近而綏遠當此之時魯無敵國之難鄰境之患强臣變節而忠順故季􅁊隳其都城大國畏義而合好齊人來歸鄆讙龜隂之田故爲政而以德非獨辟害折衝也所欲不求而自得今百姓所以􅅝􅅝中外不寜者咎在匈奴内無室宇之守外無田疇之積隨美草􅅴水而驅牧匈奴不變業而中國以搔動矣風合而雲觧就之則亡擊之則散未可一世而舉也大夫曰古者明王討􅁀衞弱定傾扶危則小國之君悦討􅁀定傾則無罪之人附今不征伐則􅁀害不息不備則是以􅀺民委敵也春秋貶諸侯之後刺不卒戍行役戍備自古有之非獨今也賢良曰匈奴之地廣大而戎馬之足輕利其勢易搔動也利則虎曵病則鳥折辟鋒銳而牧罷極少􅀤則不足以更適多發則民不堪其役役煩則力罷用多則財乏二者不息則民遺怨此秦之所失民心隕社稷也古者天子封畿千里繇役五百里勝聲相聞疾病相恤無過時之師無踰時之役内節於民心而事適其力是以行者勸務而止者安業今山東之戎馬甲士戍邉郡者絕殊遼逺身在胡越心懷老母老母垂泣室婦悲恨推其饑渴念其寒苦詩云昔我往矣楊栁依依我今來思􅀨雪霏霏行道遲遲載渴載饑我心傷悲莫之我哀故聖人憐其如此閔其乆去父母妻子􅁀露中野居寒苦之地故春使使者勞賜舉失職者所以哀遠民而慰撫老母也德惠甚厚而吏未稱奉職承詔以存恤或侵侮士卒與之爲市并力兼作使之不以理故也士卒失職而老母妻子感恨也宋伯􅁎愁思而宋國火魯妾不得意而魯寑災今天下不得其意者非獨西宫之女宋之老母也春秋動衆則書重民也宋人圍長葛譏乆役也君子之用心必􅀂是大夫默然不對
