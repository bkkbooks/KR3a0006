  - {type: variant, offset: 7396, length: 359, content: 玊為寳雜事篇曰齊宣王與魏惠王㑹田於郊魏王曰亦有寳乎齊王曰無有魏王曰若寡人之小國也尚有徑寸之珠照車前後十二乗者十枚奈何以萬乗之國無寳乎齊王曰寡人之所以為寳與王異吾臣有檀子者使之守南城則楚人不敢為冦泗水上有十二諸侯皆來朝吾臣有盼子者使之守髙唐則趙人不敢東漁于河吾臣有黔夫者使之守徐州則燕人祭北門趙人祭西門從而歸之者十千餘家吾臣有種首者使之備盗賊而道不拾遺吾將以照千里之外豈特十二乗哉魏王慙不懌而去詩曰辭之懌矣民之莫矣反質篇曰經侯徃適魏太子左帯羽玊具劔右帯環珮左光照右右光照左坐有頃太子不視也又不問也經侯曰魏國亦有寳乎太子曰有經侯曰其寳何如太子曰主信臣忠百姓上戴此魏之寳也經侯曰吾所問者非是之謂也乃問其器而已太子曰有徒師沼治魏而市無預賈郄辛治陽而道不拾遺芒卯在朝而四鄰賢士無不相因而見此三大夫乃魏國之大寳於是經侯黙然不應左觧, SBCK: ''}
