markers:
  front:
  - {type: variant, offset: 0, length: 0, content: '', SBCK: 園池第十三輕重第十四未通第十五園池第十三大夫曰諸侯以國爲家其憂在内天子以八極爲境其慮在外故宇小者用菲功巨者用大是以縣官開園池總山海致利以助貢賦脩溝渠立諸農廣田收盛苑囿太僕水衡少府大農歲課諸入田收之利池籞之假及北邉置任任田官以贍諸用而猶未足今欲罷之絕其原杜其流上下俱殫困乏之應也雖好省事節用如之何其可也文學曰古者制地足以養民民足以承其上千乗之國百里之地公侯伯子男各充其求贍其欲秦兼萬國之地有四海之富而意不贍非宇小而用菲者欲多而下不堪其求也語曰􅌮有腐肉國有饑民廐有肥馬路有餧人今狗馬之養蟲獸之食豈特腐肉秣馬之費哉無用之官不急之作服淫侈之變無功而衣食縣官者衆是以上不足而下困乏也今不減除其本而欲贍其末設機利造田畜與百姓爭薦草與商賈爭市利非所以明主德而相國家也夫男耕女績天下之大業也故古者分地而處之利田畝而事之是以業無不食之地國無乏作之民今縣官之多張苑囿公田池澤公家有鄣假之名而利歸權家三輔迫近於山河地狹人衆四方並臻粟米薪菜不能相贍公田轉假桑榆菜菓不殖地力不盡愚以爲非先帝之開苑囿池籞可賦歸之於民縣官租稅而巳假稅殊名其實一也夫如是匹夫之力盡於􅀯畝匹婦之力盡於麻枲田野闢麻枲治則上下俱􅄛何困乏之有矣大夫默然視其丞相御史輕重第十四御史進曰昔太公封於營丘辟草萊而居焉地薄人少於是通利末之道極女工之巧是以鄰國交於齊財畜貨殖世爲彊國管仲相􅁊公襲先君之業行輕重之變􅀯服彊楚而霸諸侯今大夫各修太公􅁊管之術總一}
