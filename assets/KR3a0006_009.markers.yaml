  - {type: variant, offset: 660, length: 0, content: '', WYG: 主與小國之匈奴乎夫音扶以天下之力勤何不權以天下之士民何不服今有帝名而威不信音伸長城反賂遺而尚踞敖音傲此五帝所不忍三王所畢一作必怒也匈奴傳曰太初四年漢遣中郎將蘇武厚幣賂遺單于單于益驕禮甚倨非漢所望也征和四年單于遣使遺漢書云南有大漢北有强胡胡者天之驕子也不為小禮以自煩今欲與漢闓大關取漢女為妻嵗給遺我蘖酒萬石稷米五十斛雜繒萬匹它如故約則邊不相盗矣文學曰湯事夏而卒服之周事殷而卒滅之本經訓曰晩世之時帝有桀紂為璇室瑶臺象廊玉牀紂為肉圃酒池燎焚天下之財罷苦萬民之力刳諫者剔孕婦攘天下虐百姓於是湯乃以革車三百乗伐桀于南巢放之夏臺武王甲卒三千破紂牧野殺之于宣室天下寜定百姓和集是以稱湯武之賢語曰桀紂不為王湯武不為放故以大御小者王去聲以强凌弱者亡聖人不困其衆以兼國良御不困其馬以兼道故造父之御不失和聖人之治不倍德吕氏春秋曰宋人有取道者其馬不進倒而投之鸂水又復取道其馬不進又倒而投之鸂水如此者三雖造父之所以威馬不過此矣不得造父之道而徒得其威無益於御繆稱訓曰戎狄之馬皆可以馳驅或近或逺唯造父能盡其力三苖之民皆可使忠信或賢或不肖唯唐虞能齊其美秦攝利衡以御宇内執修箠推上聲以笞音痴八極驂服以罷音疲而鞭䇿愈加故有傾衡遺箠推上聲之變士民非不衆力勤非不多也皆内倍}
