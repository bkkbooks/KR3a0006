  - {type: variant, offset: 1277, length: 0, content: '', WYG: 也泰族訓曰古者法設而不犯刑措而不用非可刑而不刑也百工維時庶績咸熈禮義修而任賢得也故舉天下之髙以為三公一國之髙以為九卿一縣之髙以為二十七大夫一鄉之髙以為八十一元士故知過萬人者謂之英千人者謂之俊百人者謂之豪十人者謂之傑英俊豪傑各以小大之材處其位得其宜由夲流末以重制輕上唱而民和上動而下隨四海之内一心同歸背貪鄙而向義理其扵化民也若風之揺草木無一而不靡今使愚教智使不肖臨賢雖嚴刑罰民弗從也小不能制大弱不能使強}
