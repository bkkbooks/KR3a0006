  - {type: 'tls:seg', offset: 1407, content: '', id: KR3a0006_tls_007-14a.18}
  - {type: variant, offset: 1407, length: 0, content: '', SBCK: 椎車無柔棧輿無植及其後木軨不衣長轂數幅蒲薦苙蓋蓋無染絲之飾大夫士則單􅃨木具盤韋柔革常民染輿大軨蜀輪今庻人冨者銀黄華左搔結綏韜杠中者錯鏕塗采珥靳飛鈴古者鹿裘皮冐蹄足不去及其後大夫士􅈢貉縫腋羔麑豹祛庻人則毛絝衳彤樸羝皮􅀓今冨者鼯􅈢白鳬翥中者罽衣金縷燕䶅代黄古者庻人賤􅀐䋲控革鞮皮廌而巳及其後革鞍􅈊成鐡鑣不飾今冨者耳銀鑷黄金琅勒罽繡弇汙垂珥胡鮮中者染韋紹系采畫􅁀乾古者汗尊坏飮盖無爵觴樽爼及其後庻人器用即竹桞陶瓠而巳唯瑚璉觴豆而後彫文彤􅃮今冨者銀口黄耳金罍玉鍾中者舒玉紵器金錯蜀杯夫一文杯得銅杯十賈賤而用不殊箕子之譏始在}
  - {type: page-break, offset: 1407, content: '', id: KR3a0006_SBCK_006-3b}
  - {type: page-break, offset: 1407, content: '', id: KR3a0006_SBCK_006-4a}
  - {type: variant, offset: 1409, length: 6, content: 封畿千里繇役, SBCK: 今在匹夫古者燔􅁰食稗而熚豚以相饗其後鄕人飮酒老者重豆少者立食一醬一肉旅飮而巳及其後賔㛰相召則豆􅅅白飯綦膾熟肉今民間酒食殽旅重疊燔炙滿案臑鼈膾腥麑􅆑鶉鴳撜抅鮐醴醢醯衆物雜味古者庻人春夏耕耘秋冬收藏昏晨力作夜以繼日詩云晝爾于茅宵爾索綯亟其乗屋其始播百榖非膢臘不休息今賔昏酒食接連相因折醒什半棄事相隨慮無乏日古者庻人糲食藜藿非鄕飮酒膢臘􅀕祀無酒肉故諸侯無故不殺牛羊大夫士無故不殺犬豕今閭巷縣佰阡伯屠沽無故烹殺相聚野外􅀒粟而往挈肉而歸夫一豕之肉得中年之收十}
