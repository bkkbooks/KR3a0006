  - {type: variant, offset: 209, length: 1, content: 飲, WYG: 則我不能使也功成而不利于人則我不能勸也故疏河以導之鑿江通于九派􅎈五湖而定東海民亦勞矣然而不怨苦者利歸于民也衞鞅傳曰商君相秦十年宗室貴戚多怨望者趙良見商君謂曰君之見秦王也因嬖人景監以為主非所以為名也相秦不以百姓為事而大築冀闕非所以為功也刑黥太子之師傅殘傷民以駿刑是積怨蓄禍也教之化民也深於命民之效上也㨗于令今君又左建外易非所以為教也君又南面而稱寡人日䋲秦之貴公子詩曰相鼠有體人而無禮人而無禮胡不遄死以詩觀之非所以為夀也公子䖍杜門不出已八年矣君又殺祝懽而黥公孫賈詩曰得人者興失人者崩此數事者非所以得人也君之危若朝露尚將欲延年益夀乎則何不歸十五都灌園于鄙勸秦王顕巖穴之士養老存孤敬父兄序有功尊有徳可以稍安君尚將貪商於之富寵秦國之教畜百姓之怨秦王一旦捐賔客而不立朝秦國之所以收君者豈其㣲哉故夏后功立而王去}
