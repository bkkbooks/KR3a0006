  - {type: variant, offset: 7756, length: 478, content: 具右觧環佩委之坐愆然而起黙然不謝趨而出上車驅去魏太子使騎操劔佩逐與經侯使告經侯曰吾無徳所寳不能為珠玉所守此寒不可衣飢不可食無為遺我賊於是經侯杜門不出傳死雜事篇曰秦欲伐楚使使者徃觀楚之寳器楚王聞之召令尹子西而問焉曰秦欲觀楚之寳器吾和氏之璧随侯之珠可以示諸令尹子西對曰不知也召昭奚恤而問焉昭奚恤對曰此欲觀吾國得失而圖之不在寳器在賢臣珠玉玩好之物非寳重者王遂使昭奚恤應之昭奚恤發精兵三百人陳於西門之内為東面之壇一為南面之壇四為西面之壇一秦使者至昭奚恤曰君客也請就上位東面令尹子西南面太宗子敖次之葉公子髙次之司馬子反次之昭奚恤自居西面之壇稱曰客欲觀楚國之寳器楚國之所寳者賢臣也理百姓實倉廩使民各得其所令尹子西在此奉珪璧使諸侯觧忿悁之難交兩國之歡使無兵革之憂太宗子敖在此守封疆謹境界不侵鄰國鄰國亦不見侵葉公子髙在此理師旅整兵戎以當疆敵提抱鼓以動百萬之衆所使皆趨湯火蹈白刃出萬死不顧一生之難司馬子反在此懐覇王之餘議攝治亂之遺風昭奚恤在此唯大國之所觀秦使者戄然無以對昭奚恤遂揖而去秦使者反言於秦君曰楚多賢臣未可謀也遂不伐楚詩云濟濟多士文王以寧斯之謂也語曰黄金累千不如一賢, SBCK: 爲寶}
