  - {type: variant, offset: 908, length: 8, content: 自存東攝六國西畏, SBCK: 釋刑而用惡家之有鉏子器皿不居况鉏民乎民者教}
  - {type: variant, offset: 908, length: 0, content: '', WYG: 愛無益之子君不能愛不軌之民曹植曰唐堯至仁不能容無益之子湯武至聖不能養無益之臣無用之苖苖之害也無用之民民之賊也鉏音鋤一害而衆苖成刑一惡而萬民説音悦王符曰養稂莠者傷禾稼惠姦軌者賊良民管子曰先王者為民興利除害故天下之民歸之所謂興利者利農事者也所謂除害者禁害農者也兵略訓曰治國者若耨田去害苖者而已今沐者堕髪而猶為之不已以其所去者少所利者多也雖周公孔子不能釋刑而用惡家之有鉏音鋤子器皿不居况鉏音鋤民乎指武篇曰昔堯誅四㓙以懲惡周公殺管蔡以弭亂子産殺鄧晳以威侈孔子斬少正卯以變衆佞賊之人而不誅亂之道也易曰不威小不懲大此小人之福也民者教於愛而聼刑故刑所以正民鉏音鋤所以别苖也韓非子曰夫惜草茅者害禾穗惠盗賊者傷良民今緩刑罰行寛惠是利姦邪而害善人也此非所以為治也賢良曰古者篤教以導民明辟以正刑刑之於治猶策之於御也良工不能無策而御有策而勿用聖人假法以成教教成而刑不施故威厲而不殺刑設而不犯白虎通曰刑罰者五帝之鞭䇿也覽㝠訓曰鉗且大丙不施轡銜而以善御聞於天下伏戯女媧不設法度而以至徳遺於後世仲尼曰至刑無所用政至政無所用刑今廢其紀綱而不能張壊其禮義而不能坊古防字民陷於罔從而獵之以刑是猶開其闌牢發以毒矢也不盡不止詩傳曰孔子曰詩曰俾民不迷昔之君子道其百姓不使迷是以威厲而刑措不用也故形其仁義謹其教道使民目晰焉而見之使民耳晰焉而聞之使民心晰焉而知之則道不迷而民志不惑矣詩曰示我顯徳行故道義不易民不由也禮樂不明民不見也詩曰周道如砥其直如矢言其易也君子所履小人所視言其明也睠言顧之澘焉出涕哀其不聞禮教而就刑誅也夫散其本教而待之刑辟猶决其牢而發以毒矢也亦不哀乎故曰未可殺也昔者先王使民以禮譬之如御也刑者鞭䇿也今猶無轡銜而鞭䇿以御也欲馬之進則䇿其後欲馬之退則䇿其前御者以勞而馬亦多傷矣今猶此也上憂勞而民多罹刑詩曰人而無禮胡不遄死為上無禮則不免乎患為下無禮則不免乎刑上下無禮胡不遄死曾子曰上失其道民散久矣如得其情則哀矜而勿喜夫音扶不傷民之不治而伐已之能得姦猶弋者覩鳥獸挂音卦罻音尉羅而喜也孔融曰古者敦厖善否不别吏端刑清政無過失百姓有罪皆}
