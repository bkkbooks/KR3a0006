  - {type: variant, offset: 4246, length: 2, content: 加孟, krp: 禁城邑不能止然後遣上大夫衣繡衣以興擊之當此時百姓元元莫必其命故山東豪傑頗有異心漢武紀曰天漢二年秋泰山琅邪羣盗徐㪍等阻山攻城道路不通遣直指使者暴勝之等衣繡衣杖斧分部逐捕刺史郡守以下皆伏誅冬十一月詔關都尉曰今豪傑多逺交依東方羣盗其謹察出入者酷吏傳曰自温舒等以惡為治而吏民益輕犯法盗賊滋起大羣至數千人小羣以百數掠鹵鄉里者不可勝數於是上始使御史中丞丞相長史使督之猶弗能禁乃使光祿大夫范昆諸部都尉及故九卿張徳等衣繡衣持節虎符以興擊斬首萬餘級及以法誅通行飲食坐相連郡甚者數十人數嵗乃頗得其渠率散卒失士復聚黨阻山川往往而羣無可奈何於是作沈命法曰羣盗起不發覺發覺而捕不滿品者二千石以下至小吏主者皆死其後小吏畏誅雖有盗不敢發恐不能得坐課累府府亦使不言故盜賊寖多上下相為慝以避文法焉頼先帝聖靈斐然其咎皆在於欲畢匈奴而逺㡬音機也為主計若此可謂忠乎世務第四十七大夫曰諸生妄言議者令平聲可詳用無徒守椎音槌車之語滑稽而不可修崔浩曰滑稽酒器也吐酒終日不已言出口成章詞不窮竭若滑稽之吐酒也姚察曰滑稽猶俳諧也滑讀如字稽音計也以言諧語滑利其智計疾出故云滑稽也司馬貞曰滑亂也稽同也以言辯捷之人言非若是言是若非能亂同異也夫音扶漢之有匈奴譬若木之有蠧音妬如人有疾不治則寖音浸以深故謀臣以為擊奪以困極之諸生言以徳懷之此有其語而不可行也諸生上無以似三王下無以似近秦令平聲有司可舉而行當世安蒸庶而寜邊境者乎文學曰昔齊桓公内附百姓外綏諸侯存亡接絶而天下從風其後徳虧行去聲衰葵丘之會振而矜之叛者九國春秋刺其不崇徳而崇力也春秋曰九月戊辰諸侯盟于葵丘左傳曰秋齊侯盟諸侯于葵丘曰凡我同盟之人既盟之後言歸于好宰孔先歸遇晉侯曰可無㑹也齊侯不務徳而勤逺略故北伐山戎南伐楚西為此㑹也東略之不知西則否矣其在亂乎君務靖亂無勤於行晉侯乃還公羊傳曰桓之盟不日此何以日危之也何危爾貫澤之會桓公有憂中國之心不召而至者江人黄人也葵丘之會桓公震而矜之叛者九國震之者何猶曰振振然矜之者何猶曰莫若我也故任徳則强楚告服逺國不召而自至任力則近者不親小國不附此其效也誠上觀三王之所以昌下論秦之所以亡中述齊桓所以興去武行文廢力尚徳罷關梁除障音瘴塞音賽以仁義導之則北垂無冦虜之憂中國無干戈之事矣說山訓曰國有賢君折衝萬里大夫曰事不豫辦不可以應卒内無備不可以禦敵叢談曰兵不豫定無以待敵計不先慮無以應卒詩云詰爾民人謹爾侯度用戒不虞故有文事必有武備國語曰襄王至自鄭以陽樊賜晉文公陽人不服晉侯圍之倉葛曰武不可覿文不可匿覿武無烈匿文不昭君道篇曰成王封伯禽為魯公召而告之曰夫有文無武無以威下有武無文民畏不親文武俱行威徳乃成既成威徳民親以服指武篇曰司馬法曰國雖大好戰必亡天下雖安忘戰必危易曰君子以除戎器戒不虞夫兵不可玩玩則無威兵不可廢廢則召冦昔吴王夫差好戰而亡徐偃王無武亦滅故明王之制國也上不玩兵下不廢武易曰存不忘亡是以身安而國家可保也昔宋襄公倍楚而不備以取大辱焉身執囚而國㡬亡宋世家曰襄公八年齊桓公卒宋欲為盟會十二年春宋襄公為鹿上之盟以求諸侯於楚楚人許之公子目夷諫曰小國爭盟禍也不聼秋諸侯會宋公盟于盂目夷曰禍其在此乎君欲已甚何以堪之於是楚執宋襄公以伐宋故雖有誠信之心不知權變危亡之道也春秋不與中國為禮為去聲其無信也匈奴貪狠因時而動乗可而發飈音標舉電至而欲以誠信之心金帛之寳而信無義之詐是猶親蹠音質蹻音脚而扶猛虎也周書曰毋為虎傅翼將飛入邑擇人而食之文學曰春秋王者無敵言其仁厚其徳美天下賔服莫敢受交也淮南王安曰天子之兵有征而無戰言莫敢校也徳行延及方外舟車所臻足迹所及莫不被澤蠻貊異國重譯音亦自至方此之時天下和同君臣一徳外内相信上下輯睦兵設而不試干戈蔽藏而不用老子曰兕無所用其角螫音式蟲無所輸其毒覽冥訓曰昔者黄帝治天下而力牧太山稽輔之以治日月之行律治隂陽之氣節四時之度正律厯之數别男女異雌雄明上下等貴賤使强不掩弱衆不暴寡人民保命而不夭嵗時熟而不凶百官正而無私上下調而無尤法令明而不闇輔佐公而不阿田者不侵畔漁者不爭隈道不拾遺市不預賈城郭不關邑無盗賊鄙旅之人相讓以財狗彘吐菽粟於路而無忿爭之心於是日月精明星辰不失其行風雨時節五穀登熟虎狼不妄噬鷙鳥不妄搏鳯凰翔於庭麒麟游於郊青龍進駕飛黄伏皂諸北儋耳之國莫不獻其貢職又曰女媧之時卧倨倨興眄眄一自以為馬一自以為牛其行蹎蹎其視瞑瞑侗然皆得其和莫知所由生浮游不知所求魍魎不知所往當此之時禽獸蝮蛇無不匿其爪牙藏其螫毒無有攫噬之心考其功烈上際九天下契黄壚名聲被後世光輝重萬物詮言曰在智則人與之訟在力則人與之爭未有使人無智者有使人不能用其智於已者未有使人無力者也有使人不能施其力於已者也此兩者常在乆見故君賢不見諸侯不備不肖不見則百姓不怨百姓不怨則民用可得諸侯弗備則天下之時可承事所與衆同也攻所與時成也聖人無焉故老子曰虎無所措其爪兕無所措其角蓋謂此也故君仁莫不仁君義莫不義世安得跖音質蹻音脚而親之乎大夫曰布心腹質情素信誠内感義形乎色宋華元楚司馬子反之相覩也符契内合誠有以相信也詩傳曰楚莊王圍宋有七日之糧曰盡此而不克將去而歸於是使司馬子反乗闥而窺宋城宋使華元乗闥而應之子反曰子之國何若矣華元曰憊矣易子而食之析骸而㸑之子反曰嘻甚矣憊雖然吾聞圍者之國箝馬而抹之使肥者應客今何吾子之情也華元曰吾聞君子見人之困則矜之小人見人之困則幸之吾望見吾子似於君子是以情也子反曰諾子其勉之矣吾軍有七日糧爾揖而去子反告莊王莊王曰若何子反曰憊矣易子而食之析骸而㸑之莊王曰嘻甚矣憊今得此而歸爾子反曰不可吾已告之矣曰軍亦有七日糧爾莊王怒曰吾使子視之子曷為而告之子反曰區區之宋猶有不欺之臣何以楚國而無乎吾是以告之也莊王曰雖然吾子今得此而歸爾子反曰王請處此臣請歸耳王曰子去我以歸吾孰與處乎此吾將從子而歸遂師而歸君子善其平已也華元以誠告子反得以解圍全二國之命詩云彼姝者子何以告之君子善其以誠相告也今匈奴挾不信之心懐不測之詐見利如前如一作而古而字通作如字樂府艾而張亦作艾如張也乗便而起潛進市側以襲無備是猶措重寳於道路而莫之守也求其不亡何可得乎文學曰誠信著乎天下醇徳流乎四海則近者歌謳而樂之逺者執禽而朝之泰族訓曰周處鄷鎬之地方不過百里而誓紂牧之野入據殷國朝成湯之廟表商容之閭封比干之墓解箕子之囚乃折枹毁鼔偃五兵縱牛馬搢笏而朝天下百姓歌謳而樂之諸侯執禽而朝之得民心也道應訓曰昔武王伐紂破之收野乃封比干之墓表商容之閭柴箕子之門朝成湯之廟發鉅橋之粟散鹿臺之錢破鼓折枹弛弓絶絃去舍露宿以示平易解劒帶笏以示無仇於}
