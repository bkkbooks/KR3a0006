  - {type: variant, offset: 3725, length: 2019, content: 質一文非苟易常也俗弊更法非務變古也亦所以救失扶衰也故教與俗改弊與世易夏后以玄貝周人以紫石後世或金錢刀布物極而衰終始之運也故山澤無征則君臣同利刀幣無禁則姦貞並行夫臣富則相侈下專利則相傾也文學曰古者市朝而無刀幣各以其所有易所無抱布貿絲而已後世即有龜貝金錢交施之也幣數變而民滋偽夫救偽以質防失以禮湯文繼衰革法易化而殷周道興漢初乘弊而不改易畜利變幣欲以反本是猶以煎止燔以火止沸也上好禮則民闇飾上好貨則下死利也大夫曰文帝之時縱民得鑄錢冶鐵煮鹽吳王擅鄣海澤鄧通專西山山東奸猾咸聚吳國秦雍漢蜀因鄧氏吳鄧錢布天下故有鑄錢之禁禁禦之法立而奸偽息奸偽息則民不期於妄得而各務其職不反本何為故統一則民不二也幣由上則下不疑也文學曰往古幣眾財通而民樂其後稍去舊幣更行白金龜龍民多巧新幣幣數易而民益疑於是廢天下諸錢而專命水衡三官作吏匠侵利或不中式故有薄厚輕重農人不習物類比之信故疑新不知姦貞商賈以美貿惡以半易倍買則失實賣則失理其疑或滋益甚夫鑄偽金錢以有法而錢之善惡無增損於故擇錢則物稽滯而用人尤被其苦春秋曰算不及蠻夷則不行故王者外不鄣海澤以便民用內不禁刀幣以通民施禁耕第五大夫曰家人有寶器尚函匣而藏之況人主之山海乎夫權利之處必在深山窮澤之中非豪民不能通其利異時鹽鐵未籠布衣有朐邴人君有吳王皆鹽鐵初議也吳王專山澤之饒薄賦其民賑贍窮乏以成私威私威積而逆節之心作夫不蚤絕其源而憂其末若決呂梁沛然其所傷必多矣太公曰一家害百家百家害諸侯諸侯害天下王法禁之今放民於權利罷鹽鐵以資暴彊遂其貪心眾邪群聚私門成黨則強禦日以不制而并兼之徒姦形成也文學曰民人藏於家諸侯藏於國天子藏於海內故民人以垣墻為藏閉天子以四海為匣匱天子適諸侯升自阼階諸侯納管鍵執策而聽命示莫為主也是以王者不畜聚下藏於民遠浮利務民之義義禮立則民化上若是雖湯武生存於世無所容其慮工商之事歐冶之任何姦之能成三桓專魯六卿分晉不以鹽鐵故權利深者不在山海在朝廷一家害百家在蕭墻而不在朐邴也大夫曰山海有禁而民不傾貴賤有平而民不疑縣官設衡立準人從所欲雖使五尺童子適市莫之能欺今罷去之則豪民擅其用而專其利決市閭巷高下在口吻貴賤無常端坐而民豪是以養強抑弱而藏於跖也彊養弱抑則齊民消若眾穢之盛而害五穀一家害百家不在朐邴如何也文學曰山海者財用之寶路也鐵器者農夫之死士也死士用則仇讎滅仇讎滅則田野闢田野闢而五穀熟寶路開則百姓贍而民用給民用給則國富國富而教之以禮則行道有讓而工商不相豫人懷敦樸以相接而莫相利夫秦楚燕齊土力不同剛柔異勢巨小之用居句之宜黨殊俗易各有所便縣官籠而一之則鐵器失其宜而農民失其便器用不便則農夫罷於野而草萊不辟草萊不辟則民困乏故鹽冶之處大傲皆依山川近鐵炭其勢咸遠而作劇郡中卒踐更者多不勘責取庸代縣邑或以戶口賦鐵而賤平其準良家以道次發僦運鹽鐵煩費百姓病苦之愚竊見一官之傷千里未覩其在朐邴也復古第六大夫曰故扇水都尉彭祖寧歸言鹽鐵令品令品甚明卒徒衣食縣官作鑄鐵器給用甚眾無妨於民而吏或不良禁令不行故民煩苦之令意總一鹽鐵非獨為利入也將以建本抑末離朋黨禁淫侈絕并兼之路也古者名山大澤不以封為下之專利也山海之利廣澤之畜天地之藏也皆宜屬少府陛下不私以屬大司農以佐助百姓浮食奇民好欲擅山海之貨以致富業役利細民故沮事議者眾鐵器兵刃天下之大用也非眾庶所宜事也往者豪強大家得管山海之利采鐵石鼓鑄煮海為鹽一家聚眾或至千餘人大抵盡收放流人民也遠去鄉里棄墳墓依倚大家聚深山窮澤之中成姦偽之業遂朋黨之權其輕為非亦大矣今者廣進賢之途練擇守尉不待去鹽鐵而安民也文學曰扇水都尉所言當時之權一切之術也不可以久行而傳世此非明王所以君國子民之道也詩云哀哉為猶匪先民是程匪大猶是經維邇言是聽此詩人刺不通於王道而善為權利者孝武皇帝攘九夷平百越師旅數起糧食不足故立田官置錢入穀射官救急贍不給今陛下繼大功之勤養勞勌之民此用麋鬻之時公卿宜思所以安集百姓致利除害輔明主以仁義修潤洪業之道明主即位以來六年于茲公卿無請減除不急之官省罷機利之人人權縣太久民良望於上陛下宣聖德昭明光令郡國賢良文學之士乘傳詣公車議五帝三王之道六藝之風冊陳安危利害之分指意粲然今公卿辯議未有所定此所謂守小節而遺大體抱小利而忘大利者也大夫曰宇棟之內鷰雀不知天地之高坎井之鼃不知江海之大窮夫否婦不知國家之慮負荷之商不知猗頓之富先帝計外國之利料胡越之兵兵敵弱而易制用力少而功大故因勢變以主四夷地濱山海以屬長城北略河外開路匈奴之鄉功未卒蓋文王受命伐崇作邑于豐武王繼之載尸以行破商擒紂遂成王業曹沫棄三北之恥而復侵地管仲負當世之累而立霸功故志大者遺小用權者離俗有司思師望之計遂先帝之業志在絕胡貉擒單于故未遑扣扃之義而錄拘儒之論文學曰鷰雀離巢宇而有鷹隼之憂坎井之鼃離其居而有蛇鼠之患況翱翔千仞而游四海乎其禍必大矣此李斯之所以折翼而趙高沒淵也聞文武受命伐不義以安諸侯大夫未聞弊諸夏以役夷狄也昔秦常舉天下之力以事胡越竭天下之財以奉其用然眾不能畢而以百萬之師為一夫之任此天下共聞也且數戰則民勞久師則兵弊此百姓所疾苦而拘儒之所憂也, WYG: ''}
