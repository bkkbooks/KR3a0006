  - {type: variant, offset: 3057, length: 0, content: '', WYG: 仲孫他諫曰子為魯上郷妾不衣帛馬不食粟人其以子為愛且不華國也文子曰然乎吾觀國人之父母衣麄食蔬吾是以不敢且吾聞君子以徳華國不聞以妾與馬夫徳者得於我又得於彼故可行若淫於奢侈沉於文章不能自反何以守國仲孫他慙而退}
