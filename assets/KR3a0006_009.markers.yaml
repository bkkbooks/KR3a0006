  - {type: variant, offset: 39, length: 2, content: 決聖, WYG: 行者君子耻之矣賢良曰能言而不能行者國之寳也能行而不能言者國之用也兼此二者君子也無一者烏獲逢須也古作逢䝉言滿天下徳覆四海周公是也口言之躬行之豈若黙然載施其行而已則執事亦何患何耻之有今道不舉而務小利慕於不急以亂羣意君子雖貧勿為可也藥酒病之利也正言治之藥也孫楚曰夫治膏肓者必進苦口之藥决狐疑者必告逆耳之言如其迷謬未知所投恐俞跗見其已困扁鵲知其無功也公卿誠能自强自忍食文學之至言去權詭罷利官一歸之於民親以周公之道則天下治而頌聲作儒者安得治亂而患之乎鹽鐵取下第四十一大夫曰不軌之民困橈音撓公利而欲擅山澤從文學賢良之意則利歸於下而縣官無可為者上之所行則非之上之所言則譏之專欲損上徇下虧}
